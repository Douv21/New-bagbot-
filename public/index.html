<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BagBot Designer Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #ed4245; --bg: #0b0b0b; --card: #1e1f22; --border: #2b2d31; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: white; font-family: 'Helvetica Neue', sans-serif; display: flex; height: 100vh; overflow: hidden; }

        /* SIDEBAR PRO */
        #sidebar { width: 240px; background: #000; border-right: 1px solid var(--border); flex-shrink: 0; display: flex; flex-direction: column; transition: 0.3s; }
        .sidebar-header { padding: 25px 20px; font-weight: 900; color: var(--accent); font-size: 22px; letter-spacing: 1px; }
        .nav-item { padding: 15px 20px; color: white; background: rgba(237, 66, 69, 0.1); border-left: 4px solid var(--accent); display: flex; align-items: center; gap: 12px; cursor: pointer; }

        /* CONTENU PRINCIPAL */
        .main { flex-grow: 1; display: flex; flex-direction: column; min-width: 0; }
        .top-bar { height: 60px; background: #050505; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; font-weight: bold; font-size: 14px; }
        .scroll-area { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; align-items: center; }

        /* EMBED CARD - DESIGN FIXE */
        .embed-card { width: 100%; max-width: 480px; background: var(--card); border-left: 4px solid var(--accent); padding: 16px; border-radius: 4px; position: relative; margin-top: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .thumb-box { position: absolute; top: 16px; right: 16px; width: 70px; height: 70px; border: 2px dashed var(--border); display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.2); border-radius: 4px; }
        
        .inp { background: transparent; border: none; color: white; outline: none; width: 100%; }
        .title-inp { font-size: 18px; font-weight: bold; width: calc(100% - 85px); margin-bottom: 8px; }
        .desc-inp { font-size: 14px; color: #dbdee1; resize: none; min-height: 100px; line-height: 1.4; }

        /* SELECTEUR ET BOUTON */
        .controls-container { width: 100%; max-width: 480px; margin-top: 25px; }
        .label-style { font-size: 11px; font-weight: bold; color: #949ba4; text-transform: uppercase; margin-bottom: 8px; display: block; }
        select { width: 100%; background: #111214; color: white; padding: 14px; border: 1px solid var(--border); border-radius: 4px; outline: none; }
        .btn-send { width: 100%; background: var(--accent); color: white; padding: 16px; border: none; border-radius: 4px; font-weight: bold; margin-top: 20px; cursor: pointer; font-size: 15px; }
    </style>
</head>
<body>
    <div id="sidebar">
        <div class="sidebar-header">BAGBOT</div>
        <div class="nav-item"><i class="fas fa-magic"></i> Designer</div>
    </div>
    <div class="main">
        <div class="top-bar">DASHBOARD</div>
        <div class="scroll-area">
            <div class="embed-card">
                <div class="thumb-box"><i class="fas fa-plus"></i></div>
                <input type="text" class="title-inp" value="Titre de l'Embed">
                <textarea class="inp desc-inp" placeholder="Entrez le contenu de votre message..."></textarea>
            </div>
            
            <div class="controls-container">
                <label class="label-style">Salon de destination</label>
                <select id="chan-list"></select>
                <button class="btn-send"><i class="fas fa-paper-plane"></i> DÉPLOYER LE MESSAGE</button>
            </div>
        </div>
    </div>

    <script>
        async function updateInfo() {
            try {
                const res = await fetch('/api/get_server_info');
                const data = await res.json();
                if (data.channels) {
                    document.getElementById('chan-list').innerHTML = data.channels.map(c => 
                        `<option value="${c.id}"># ${c.name}</option>`
                    ).join('');
                }
            } catch(e) {
                document.getElementById('chan-list').innerHTML = "<option>Erreur de chargement</option>";
            }
        }
        window.onload = updateInfo;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BagBot Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #ed4245; --bg: #0b0b0b; --card: #1e1f22; --border: #2b2d31; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: white; font-family: sans-serif; display: flex; height: 100vh; overflow: hidden; }

        /* SIDEBAR */
        #sidebar { width: 260px; background: #000; border-right: 1px solid var(--border); flex-shrink: 0; display: flex; flex-direction: column; }
        .logo { padding: 30px 20px; font-size: 24px; font-weight: 900; color: var(--accent); }
        .nav-item { padding: 15px 20px; display: flex; align-items: center; gap: 12px; color: #949ba4; cursor: pointer; }
        .nav-item.active { background: rgba(237, 66, 69, 0.1); color: white; border-left: 4px solid var(--accent); }

        /* MAIN */
        .main { flex-grow: 1; display: flex; flex-direction: column; }
        .header { height: 60px; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; gap: 10px; font-weight: bold; }
        .content { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; align-items: center; }

        /* EMBED CARD */
        .embed-card { width: 100%; max-width: 500px; background: var(--card); border-left: 4px solid var(--accent); padding: 16px; border-radius: 4px; position: relative; }
        .thumb-add { position: absolute; top: 16px; right: 16px; width: 80px; height: 80px; border: 2px dashed #444; display: flex; align-items: center; justify-content: center; border-radius: 4px; }
        
        .title-in { background: transparent; border: none; color: white; font-size: 18px; font-weight: bold; width: calc(100% - 90px); outline: none; }
        .desc-in { background: transparent; border: none; color: #dbdee1; width: 100%; outline: none; resize: none; margin-top: 10px; min-height: 40px; }
        .img-placeholder { width: 100%; height: 200px; background: #2b2d31; margin-top: 20px; border-radius: 4px; display: flex; align-items: center; justify-content: center; }

        /* CONTROLS */
        .label { width: 100%; max-width: 500px; font-size: 11px; font-weight: 800; color: #949ba4; text-transform: uppercase; margin: 25px 0 8px; }
        select { width: 100%; max-width: 500px; background: #111214; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 4px; outline: none; }
        .btn { width: 100%; max-width: 500px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 15px; }
        .btn-gray { background: #2b2d31; color: white; padding: 12px; }
        .btn-red { background: var(--accent); color: white; padding: 16px; margin-top: 30px; font-size: 16px; }
    </style>
</head>
<body>
    <div id="sidebar">
        <div class="logo">BAGBOT</div>
        <div class="nav-item active"><i class="fas fa-envelope"></i> Message</div>
        <div class="nav-item"><i class="fas fa-cog"></i> Paramètres</div>
    </div>
    <div class="main">
        <div class="header"><i class="fas fa-bars" style="color:var(--accent)"></i> DASHBOARD</div>
        <div class="content">
            <div class="embed-card">
                <div class="thumb-add"><i class="fas fa-plus"></i></div>
                <input type="text" class="title-in" value="Titre de l'Embed">
                <textarea class="desc-in">Votre message ici...</textarea>
                <div class="img-placeholder"><i class="fas fa-image" style="font-size:40px; color:#444"></i></div>
            </div>
            <div class="label">Salon de destination</div>
            <select id="chan-list"><option>Chargement...</option></select>
            <button class="btn btn-gray"><i class="fas fa-plus-circle"></i> Ajouter une réaction</button>
            <button class="btn btn-red"><i class="fas fa-paper-plane"></i> DÉPLOYER LE MESSAGE</button>
        </div>
    </div>
    <script>
        async function load() {
            const res = await fetch('/api/get_server_info');
            const data = await res.json();
            if (data.channels) {
                document.getElementById('chan-list').innerHTML = data.channels.map(c => 
                    `<option value="${c.id}"># ${c.name}</option>`
                ).join('');
            }
        }
        window.onload = load;
    </script>
</body>
</html>

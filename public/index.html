<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAGBOT ELITE V9 - DEBUG</title>
    <style>
        /* CSS INTERNE COMPLET */
        :root { --bg: #0a0a0a; --accent: #ed4245; --card: #141414; --border: #252525; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; }
        
        /* HEADER */
        .header { height: 60px; background: #000; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; position: fixed; width: 100%; top: 0; z-index: 100; }
        .burger { font-size: 24px; color: var(--accent); cursor: pointer; margin-right: 20px; border: 1px solid var(--accent); padding: 5px 10px; border-radius: 5px; }

        /* SIDEBAR */
        #sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100vh; background: #000; border-right: 1px solid var(--border); transition: 0.3s; z-index: 200; padding-top: 20px; }
        #sidebar.open { left: 0; }
        .nav-item { padding: 15px 20px; border-bottom: 1px solid #111; cursor: pointer; color: #888; font-weight: bold; }
        .nav-item:hover { background: #111; color: white; }
        .nav-item.active { color: var(--accent); background: rgba(237, 66, 69, 0.1); }

        /* CONTENU */
        main { padding: 80px 20px; height: 100vh; overflow-y: auto; box-sizing: border-box; }
        .section { display: none; max-width: 700px; margin: 0 auto; }
        .section.active { display: block; }

        /* PREVIEW DISCORD */
        .preview { background: #2b2d31; border-left: 4px solid var(--accent); padding: 15px; border-radius: 4px; margin-bottom: 20px; }
        .pv-title { color: #00a8fc; font-weight: bold; margin-bottom: 5px; }
        .pv-img { width: 100%; height: 120px; background: #222; margin-top: 10px; border-radius: 5px; display: flex; align-items: center; justify-content: center; color: #444; border: 1px dashed #444; }
        .pv-img img { width: 100%; height: 100%; object-fit: cover; }

        /* FORMULAIRE */
        .card { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        label { display: block; font-size: 12px; color: #777; margin: 10px 0 5px; text-transform: uppercase; }
        input, textarea, select { width: 100%; background: #000; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 8px; box-sizing: border-box; }
        .btn { background: var(--accent); color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        .gallery { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .g-item { height: 100px; background: #000; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; cursor: pointer; }
        .g-item img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <div class="header">
        <div class="burger" onclick="toggleMenu()">☰</div>
        <div style="font-weight: bold; color: var(--accent);">BAGBOT ELITE V9</div>
    </div>

    <div id="sidebar">
        <div style="text-align: center; padding: 20px; color: var(--accent); font-weight: bold; border-bottom: 1px solid var(--border);">MENU</div>
        <div class="nav-item active" onclick="showSection('welcome')">BIENVENUE</div>
        <div class="nav-item" onclick="showSection('leave')">DÉPART</div>
        <div class="nav-item" onclick="showSection('gallery')">GALERIE</div>
    </div>

    <main>
        <div id="welcome" class="section active">
            <div class="preview" id="preview-w">
                <div class="pv-title" id="pv-w-title">Titre Bienvenue</div>
                <div id="pv-w-desc">Message de bienvenue...</div>
                <div class="pv-img" id="pv-w-banner-box">Bannière</div>
            </div>
            <div class="card">
                <label>Titre</label>
                <input type="text" id="w-title" oninput="live()" placeholder="Bienvenue {user} !">
                <label>Description</label>
                <textarea id="w-desc" rows="4" oninput="live()" placeholder="Bienvenue sur le serveur {server}"></textarea>
                <label>Couleur</label>
                <input type="color" id="w-color" oninput="live()" value="#ed4245">
                <button class="btn" onclick="save()">SAUVEGARDER</button>
            </div>
        </div>

        <div id="leave" class="section">
            <div class="preview" id="preview-l">
                <div class="pv-title" id="pv-l-title">Titre Départ</div>
                <div id="pv-l-desc">Message de départ...</div>
            </div>
            <div class="card">
                <label>Titre</label>
                <input type="text" id="l-title" oninput="live()">
                <label>Description</label>
                <textarea id="l-desc" rows="4" oninput="live()"></textarea>
                <button class="btn" onclick="save()">SAUVEGARDER</button>
            </div>
        </div>

        <div id="gallery" class="section">
            <div class="card">
                <h3>Images disponibles</h3>
                <div id="gallery-list" class="gallery"></div>
                <button class="btn" style="background:#444" onclick="showSection('welcome')">RETOUR</button>
            </div>
        </div>
    </main>

    <script>
        // DONNEES PAR DEFAUT (Si l'API échoue)
        let data = {
            config: {
                welcome: { title: "Bienvenue !", desc: "Heureux de vous voir", color: "#ed4245" },
                leave: { title: "Au revoir", desc: "À bientôt !", color: "#ed4245" }
            },
            images: []
        };

        // FONCTION NAVIGATION
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => {
                if(n.innerText.toLowerCase() === id) n.classList.add('active');
                else n.classList.remove('active');
            });
            document.getElementById('sidebar').classList.remove('open');
        }

        // MISE A JOUR EN DIRECT
        function live() {
            // Bienvenue
            const wt = document.getElementById('w-title').value;
            const wd = document.getElementById('w-desc').value;
            const wc = document.getElementById('w-color').value;
            document.getElementById('pv-w-title').innerText = wt || "Titre Bienvenue";
            document.getElementById('pv-w-desc').innerText = wd || "Message...";
            document.getElementById('preview-w').style.borderLeftColor = wc;

            // Départ
            const lt = document.getElementById('l-title').value;
            const ld = document.getElementById('l-desc').value;
            document.getElementById('pv-l-title').innerText = lt || "Titre Départ";
            document.getElementById('pv-l-desc').innerText = ld || "Message...";
        }

        // INITIALISATION
        async function load() {
            try {
                console.log("Tentative de chargement...");
                const res = await fetch('/api/get_data');
                const cloudData = await res.json();
                if(cloudData) data = cloudData;
                
                // Remplissage des champs
                document.getElementById('w-title').value = data.config.welcome.title || "";
                document.getElementById('w-desc').value = data.config.welcome.desc || "";
                document.getElementById('w-color').value = data.config.welcome.color || "#ed4245";

                document.getElementById('l-title').value = data.config.leave.title || "";
                document.getElementById('l-desc').value = data.config.leave.desc || "";

                // Galerie
                const gList = document.getElementById('gallery-list');
                if(data.images && data.images.length > 0) {
                    gList.innerHTML = data.images.map(img => `<div class="g-item"><img src="${img}"></div>`).join('');
                } else {
                    gList.innerHTML = "<p style='color:#777'>Aucune image.</p>";
                }

                live();
                console.log("Chargement réussi");
            } catch (e) {
                console.error("Erreur API :", e);
                live(); // On lance quand même l'aperçu avec les données par défaut
            }
        }

        // SAUVEGARDE
        async function save() {
            const payload = {
                welcome: {
                    title: document.getElementById('w-title').value,
                    desc: document.getElementById('w-desc').value,
                    color: document.getElementById('w-color').value
                },
                leave: {
                    title: document.getElementById('l-title').value,
                    desc: document.getElementById('l-desc').value
                }
            };
            
            try {
                const res = await fetch('/api/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if(res.ok) alert("✅ Sauvegardé !");
            } catch (e) {
                alert("❌ Erreur lors de l'envoi");
            }
        }

        // Lancement immédiat au chargement
        window.onload = load;
    </script>
</body>
</html>

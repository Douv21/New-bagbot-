<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BagBot Mobile OS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #ed4245; --bg: #050505; --card: #111214; --embed: #2b2d31; --text-m: #949ba4; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; font-family: 'Helvetica Neue', Arial, sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* HEADER MOBILE */
        header { height: 60px; background: #000; display: flex; align-items: center; padding: 0 20px; border-bottom: 1px solid #2b2d31; justify-content: space-between; flex-shrink: 0; }
        .logo { color: var(--accent); font-weight: 900; font-size: 20px; }

        /* MAIN CONTENT */
        .content { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 20px; padding-bottom: 40px; }

        /* DISCORD EMBED RESPONSIVE */
        .embed {
            background: var(--embed); border-left: 4px solid var(--accent);
            border-radius: 4px; padding: 12px; width: 100%; max-width: 500px; margin: 0 auto;
        }
        .author { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; cursor: pointer; padding: 5px; border-radius: 4px; }
        .author:active { background: rgba(255,255,255,0.05); }
        .author img { width: 20px; height: 20px; border-radius: 50%; }

        .main-row { display: flex; justify-content: space-between; gap: 10px; }
        .title { font-size: 16px; font-weight: bold; margin-bottom: 5px; cursor: pointer; }
        .desc { font-size: 14px; color: #dbdee1; cursor: pointer; min-height: 20px; }

        .thumb { width: 65px; height: 65px; background: #1e1f22; border-radius: 4px; border: 1px dashed #444; flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .thumb img { width: 100%; height: 100%; object-fit: cover; }

        .banner { width: 100%; height: 140px; background: #1e1f22; border-radius: 4px; border: 1px dashed #444; margin-top: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .banner img { width: 100%; height: 100%; object-fit: cover; }

        .footer { display: flex; align-items: center; gap: 8px; margin-top: 12px; font-size: 11px; color: var(--text-m); cursor: pointer; }
        .footer img { width: 16px; height: 16px; border-radius: 50%; }

        /* EDITOR FORM */
        .editor { background: var(--card); border-radius: 12px; padding: 15px; border: 1px solid #2b2d31; max-width: 500px; margin: 0 auto; width: 100%; }
        .editor label { font-size: 10px; font-weight: bold; color: var(--accent); text-transform: uppercase; display: block; margin-bottom: 8px; }
        input, textarea, select { width: 100%; background: #080808; border: 1px solid #2b2d31; color: white; padding: 12px; border-radius: 8px; margin-bottom: 15px; font-size: 14px; }
        .btn { width: 100%; background: var(--accent); color: white; border: none; padding: 16px; border-radius: 8px; font-weight: bold; font-size: 14px; text-transform: uppercase; box-shadow: 0 4px 10px rgba(237, 66, 69, 0.2); }

        /* SIDEBAR (HIDE ON MOBILE BY DEFAULT) */
        #sidebar { display: none; }
    </style>
</head>
<body>

    <header>
        <i class="fas fa-bars"></i>
        <div class="logo">BAGBOT</div>
        <i class="fas fa-cog" style="color: var(--text-m)"></i>
    </header>

    <div class="content">
        <div class="embed">
            <div class="author" onclick="focusField('author', 'Lien Image Auteur')">
                <img id="p-auth-img" src="">
                <span id="p-auth-name" style="font-weight: 700; font-size: 13px;">Chargement...</span>
            </div>

            <div class="main-row">
                <div style="flex:1">
                    <div class="title" id="p-title" onclick="focusField('title', 'Titre de l\'Embed')">Bienvenue !</div>
                    <div class="desc" id="p-desc" onclick="focusField('desc', 'Description')">Cliquez ici pour éditer...</div>
                </div>
                <div class="thumb" id="p-thumb" onclick="focusField('thumb', 'Lien Miniature (Carrée)')">
                    <i class="fas fa-plus"></i>
                </div>
            </div>

            <div class="banner" id="p-banner" onclick="focusField('banner', 'Lien Grande Image')">
                <i class="fas fa-image" style="font-size: 24px; color:#333"></i>
            </div>

            <div class="footer" onclick="focusField('footer', 'Texte du Bas')">
                <img id="p-foot-img" src="">
                <span id="p-foot-text">ID: {user_id} • BagBot</span>
            </div>
        </div>

        <div class="editor">
            <label id="edit-label">ÉDITION : SÉLECTIONNEZ UNE ZONE</label>
            <input type="text" id="main-input" placeholder="Tapez ici..." autocomplete="off">
            <textarea id="main-area" style="display:none" placeholder="Tapez la description..."></textarea>
            
            <label>SALON DE DESTINATION</label>
            <select id="chan-list"></select>

            <button class="btn" onclick="save()">Enregistrer</button>
        </div>
    </div>

    <script>
        let current = '';
        const input = document.getElementById('main-input');
        const area = document.getElementById('main-area');
        const label = document.getElementById('edit-label');

        function focusField(type, text) {
            current = type;
            label.innerText = "ÉDITER : " + text;
            input.style.display = (type === 'desc') ? 'none' : 'block';
            area.style.display = (type === 'desc') ? 'block' : 'none';
            
            // Scroll automatique vers le champ sur mobile
            input.scrollIntoView({ behavior: 'smooth', block: 'center' });
            input.focus();
        }

        // Live Update
        const update = (e) => {
            const val = e.target.value;
            if(current === 'title') document.getElementById('p-title').innerText = val;
            if(current === 'desc') document.getElementById('p-desc').innerText = val;
            if(current === 'footer') document.getElementById('p-foot-text').innerText = val;
            if(current === 'thumb') document.getElementById('p-thumb').innerHTML = `<img src="${val}">`;
            if(current === 'banner') document.getElementById('p-banner').innerHTML = `<img src="${val}">`;
            if(current === 'author') document.getElementById('p-auth-img').src = val;
        };

        input.oninput = update;
        area.oninput = update;

        async function save() {
            const data = {
                category: "accueil",
                settings: {
                    title: document.getElementById('p-title').innerText,
                    description: document.getElementById('p-desc').innerText,
                    footer: document.getElementById('p-foot-text').innerText,
                    channel: document.getElementById('chan-list').value
                }
            };
            const res = await fetch('/api/save_settings', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            const r = await res.json();
            alert(r.message);
        }

        window.onload = async () => {
            const res = await fetch('/api/get_server_info');
            const data = await res.json();
            if(data.channels) {
                document.getElementById('chan-list').innerHTML = data.channels.map(c => `<option value="${c.id}"># ${c.name}</option>`).join('');
                document.getElementById('p-auth-img').src = data.bot.avatar;
                document.getElementById('p-foot-img').src = data.bot.avatar;
                document.getElementById('p-auth-name').innerText = data.bot.name;
            }
        }
    </script>
</body>
</html>

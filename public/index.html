<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BagBot Ultimate Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #ff4d4d; --bg: #111214; --card: #2b2d31; --sidebar: #0b0b0b; --text: #dbdee1; --draft-coral: #d37f6a; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        /* SIDEBAR PRO */
        .sidebar { width: 70px; background: var(--sidebar); display: flex; flex-direction: column; align-items: center; padding: 20px 0; gap: 20px; border-right: 1px solid #1a1a1a; }
        .side-btn { width: 45px; height: 45px; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #555; cursor: pointer; transition: 0.2s; font-size: 20px; }
        .side-btn.active { background: var(--accent); color: white; }
        .side-btn:hover:not(.active) { background: #1e1f22; color: white; }

        /* MAIN CONTENT */
        .main { flex: 1; display: flex; flex-direction: column; overflow-y: auto; align-items: center; padding: 20px; }

        /* EMBED DISCORD DESIGN */
        .discord-preview { background: #313338; border-radius: 8px; padding: 15px; width: 100%; max-width: 500px; margin-bottom: 20px; }
        .embed { background: #1e1f22; border-left: 4px solid var(--accent); border-radius: 4px; padding: 12px; position: relative; }
        .up-slot { border: 2px dashed #4e5058; border-radius: 4px; display: flex; align-items: center; justify-content: center; cursor: pointer; background: rgba(0,0,0,0.2); position: relative; overflow: hidden; }
        .up-slot img { width: 100%; height: 100%; object-fit: cover; position: absolute; }
        .thumb-slot { position: absolute; top: 12px; right: 12px; width: 60px; height: 60px; }
        .banner-slot { width: 100%; min-height: 120px; margin: 10px 0; }
        .embed-title { font-size: 16px; font-weight: 700; color: white; outline: none; margin: 5px 0; }
        .embed-desc { font-size: 14px; color: #dbdee1; outline: none; min-height: 40px; }

        /* CONTROLES */
        .card { background: var(--card); border-radius: 12px; padding: 15px; width: 100%; max-width: 500px; box-sizing: border-box; }
        .label { font-size: 11px; font-weight: 800; color: #b5bac1; text-transform: uppercase; margin-bottom: 8px; display: block; }
        select, .search-input { width: 100%; background: #1e1f22; border: 1px solid #111; color: white; padding: 12px; border-radius: 8px; margin-bottom: 12px; outline: none; }
        
        .reaction-row { background: #1e1f22; border-radius: 8px; padding: 10px; display: flex; align-items: center; gap: 10px; margin-bottom: 8px; border: 1px solid #111; }
        .emoji-trigger { width: 45px; height: 45px; background: #2b2d31; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; }
        .emoji-trigger img { width: 32px; height: 32px; }

        /* PICKER EMOJI PRO */
        #emojiPicker { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 10000; display: none; align-items: flex-end; }
        .picker-box { background: #111214; width: 100%; height: 75vh; border-radius: 25px 25px 0 0; display: flex; flex-direction: column; border-top: 3px solid var(--accent); }
        .picker-scroll { flex: 1; overflow-y: auto; padding: 15px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
        .emoji-item { font-size: 32px; text-align: center; cursor: pointer; padding: 10px; border-radius: 10px; }
        .emoji-item:hover { background: #222; }
        .emoji-item img { width: 40px; height: 40px; }

        /* MODAL IMAGE */
        #imgModal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 11000; display: none; align-items: center; justify-content: center; }
        .btn-deploy { background: var(--accent); color: white; border: none; padding: 16px; width: 100%; border-radius: 8px; font-weight: 800; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="side-btn active"><i class="fas fa-home"></i></div>
        <div class="side-btn"><i class="fas fa-bullhorn"></i></div>
        <div class="side-btn"><i class="fas fa-robot"></i></div>
        <div class="side-btn" style="margin-top:auto"><i class="fas fa-cog"></i></div>
    </div>

    <div class="main">
        <div class="discord-preview">
            <div class="embed">
                <div class="up-slot thumb-slot" onclick="openImgChoice('thumb')">
                    <i class="fas fa-plus" id="ic-thumb"></i>
                    <img id="v-thumb" style="display:none">
                </div>
                <div style="display:flex; align-items:center; gap:8px; font-size:13px; font-weight:600; color:white;">
                    <div class="up-slot" onclick="openImgChoice('auth')" style="width:20px; height:20px; border-radius:50%">
                        <img id="v-auth" style="display:none">
                    </div>
                    <span contenteditable="true" id="txt-auth">Nom de l'auteur</span>
                </div>
                <div class="embed-title" contenteditable="true" id="txt-title">Titre du message</div>
                <div class="embed-desc" contenteditable="true" id="txt-desc">Cliquez pour modifier la description...</div>
                <div class="up-slot banner-slot" onclick="openImgChoice('banner')">
                    <i class="fas fa-image" id="ic-banner" style="font-size: 24px;"></i>
                    <img id="v-banner" style="display:none">
                </div>
            </div>
        </div>

        <div class="card">
            <span class="label">Salon de réception</span>
            <select id="sel-chans"></select>
            
            <span class="label">Mode d'attribution</span>
            <select id="sel-mode">
                <option value="multiple">Multiple (Ajout/Retrait)</option>
                <option value="unique">Unique (Sélectif)</option>
                <option value="definitif">Définitif (Fixe)</option>
            </select>

            <div id="reacs-box"></div>
            <button onclick="addReacRow()" style="width:100%; padding:10px; background:#3a3c41; border:none; color:white; border-radius:8px; cursor:pointer; font-weight:bold;">+ AJOUTER UN RÔLE RÉACTION</button>
            <button class="btn-deploy" onclick="deploy()">🚀 DÉPLOYER SUR DISCORD</button>
        </div>
    </div>

    <div id="imgModal">
        <div style="background:var(--card); padding:20px; border-radius:12px; width:280px; text-align:center;">
            <button onclick="document.getElementById('f-in').click()" style="width:100%; padding:12px; background:var(--draft-coral); border:none; color:white; border-radius:8px; margin-bottom:10px;">TÉLÉVERSER IMAGE</button>
            <button onclick="promptUrl()" style="width:100%; padding:12px; background:#444; border:none; color:white; border-radius:8px;">LIEN URL DIRECT</button>
            <button onclick="closeImgChoice()" style="background:none; border:none; color:#888; margin-top:15px; cursor:pointer;">Annuler</button>
        </div>
    </div>

    <div id="emojiPicker">
        <div class="picker-box">
            <div style="padding:15px; border-bottom:1px solid #222">
                <input type="text" class="search-input" placeholder="Rechercher un émoji..." oninput="searchEmoji(this.value)">
            </div>
            <div class="picker-scroll" id="emoji-grid"></div>
            <button onclick="document.getElementById('emojiPicker').style.display='none'" style="padding:15px; background:var(--sidebar); color:var(--accent); border:none; font-weight:800;">FERMER</button>
        </div>
    </div>

    <input type="file" id="f-in" style="display:none" onchange="handleFile(this)">

<script>
    const API = "http://192.168.1.133:49501";
    let roles = [], allEmojis = [], activeBtn = null, curZone = null;

    async function init() {
        fetch(`${API}/api/channels`).then(r => r.json()).then(d => document.getElementById('sel-chans').innerHTML = d.map(c => `<option value="${c.id}"># ${c.name}</option>`).join(''));
        fetch(`${API}/api/roles`).then(r => r.json()).then(d => roles = d);
        
        const srvEmojis = await fetch(`${API}/api/emojis`).then(r => r.json());
        const stds = ["😀","😃","😄","😁","😆","😅","😂","🤣","😊","😇","🙂","🙃","😉","😌","😍","🥰","😘","😋","😛","😜","🤪","🤨","😎","🤩","🥳","😏","😒","😞","😔","😟","😕","🙁","😣","😖","😫","😩","🥺","😢","😭","😤","😠","😡","🤬","🤯","😳","🥵","🥶","😱","😨","😰","😥","😓","🤗","🤔","🤭","🤫","🤥","😶","😐","😑","😬","🙄","😯","😦","😧","😮","😲","🥱","😴","🤤","😪","😵","🤐","🥴","🤢","🤮","🤧","😷","🤒","🤕","🔥","✅","❌","🔞","⭐","✨","⚡","🎁","🏆","💎","🌈","🌍","🌙","☀️","⚽","🎮","🎧","📸","🚗","🚀","💡","🔑","❤️","💔","✔️","⚠️"];
        
        allEmojis = [
            ...srvEmojis.map(e => ({id: e.id, url: e.url, name: e.name, isCust: true})),
            ...stds.map(s => ({id: s, name: s, isCust: false}))
        ];
        renderEmojis(allEmojis);
    }

    function renderEmojis(list) {
        document.getElementById('emoji-grid').innerHTML = list.map(e => `
            <div class="emoji-item" onclick="pickEmoji('${e.id}', ${e.isCust}, '${e.url||''}')">
                ${e.isCust ? `<img src="${e.url}">` : e.id}
            </div>
        `).join('');
    }

    function searchEmoji(query) {
        const filtered = allEmojis.filter(e => e.name.toLowerCase().includes(query.toLowerCase()));
        renderEmojis(filtered);
    }

    function openImgChoice(z) { curZone = z; document.getElementById('imgModal').style.display = 'flex'; }
    function closeImgChoice() { document.getElementById('imgModal').style.display = 'none'; }
    function promptUrl() { const url = prompt("Lien direct :"); if(url) updateImg(url); closeImgChoice(); }

    async function handleFile(input) {
        if(!input.files[0]) return;
        const fd = new FormData(); fd.append('file', input.files[0]);
        try {
            const res = await fetch(`${API}/api/upload`, { method: 'POST', body: fd });
            const data = await res.json();
            if(data.url) updateImg(data.url);
        } catch(e) { alert("Erreur lors de l'envoi de l'image."); }
        closeImgChoice();
    }

    function updateImg(url) {
        const v = document.getElementById(`v-${curZone}`);
        v.src = url; v.style.display = 'block';
        if(document.getElementById(`ic-${curZone}`)) document.getElementById(`ic-${curZone}`).style.display = 'none';
    }

    function addReacRow() {
        const div = document.createElement('div');
        div.className = 'reaction-row';
        div.innerHTML = `
            <div class="emoji-trigger" onclick="openPicker(this)">😀</div>
            <select style="margin:0; flex:1;">${roles.map(r => `<option value="${r.id}">${r.name}</option>`).join('')}</select>
            <i class="fas fa-trash" style="color:#444; cursor:pointer;" onclick="this.parentElement.remove()"></i>
        `;
        document.getElementById('reacs-box').appendChild(div);
    }

    function openPicker(b) { activeBtn = b; document.getElementById('emojiPicker').style.display = 'flex'; }
    function pickEmoji(id, isCust, url) {
        activeBtn.innerHTML = isCust ? `<img src="${url}" data-id="${id}">` : id;
        if(!isCust) activeBtn.removeAttribute('data-id');
        document.getElementById('emojiPicker').style.display = 'none';
    }

    async function deploy() {
        const reactions = Array.from(document.querySelectorAll('.reaction-row')).map(row => ({
            emoji: row.querySelector('.emoji-trigger img')?.getAttribute('data-id') || row.querySelector('.emoji-trigger').innerText,
            roleId: row.querySelector('select').value
        }));
        await fetch(`${API}/api/deploy`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                channelId: document.getElementById('sel-chans').value,
                mode: document.getElementById('sel-mode').value,
                title: document.getElementById('txt-title').innerText,
                description: document.getElementById('txt-desc').innerText,
                author: document.getElementById('txt-auth').innerText,
                author_img: document.getElementById('v-auth').style.display !== 'none' ? document.getElementById('v-auth').src : null,
                thumbnail: document.getElementById('v-thumb').style.display !== 'none' ? document.getElementById('v-thumb').src : null,
                banner: document.getElementById('v-banner').style.display !== 'none' ? document.getElementById('v-banner').src : null,
                reactions: reactions
            })
        });
        alert("✅ Message envoyé !");
    }
    window.onload = init;
</script>
</body>
</html>

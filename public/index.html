<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BagBot | Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #d78266; --bg: #2f3136; --side: #202225; --card: #36393f; --input: #202225; --text: #dcddde; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; }

        .sidebar { width: 260px; background: var(--side); height: 100vh; position: fixed; left: -260px; transition: 0.3s; z-index: 1000; border-right: 1px solid #1e1f22; }
        .sidebar.open { left: 0; }
        .nav-item { padding: 15px 25px; display: flex; align-items: center; gap: 12px; cursor: pointer; color: #8e9297; }
        .nav-item.active { background: #34373c; color: white; border-left: 4px solid var(--accent); }

        .main { flex: 1; padding: 20px; box-sizing: border-box; }
        .top-nav { display: flex; align-items: center; gap: 15px; margin-bottom: 30px; }
        
        /* Onglets Pilules DraftBot */
        .tabs { display: flex; background: #202225; padding: 5px; border-radius: 30px; width: fit-content; margin: 0 auto 30px; }
        .tab { padding: 8px 35px; border-radius: 20px; cursor: pointer; color: #b9bbbe; font-size: 14px; font-weight: 600; transition: 0.2s; border: 1px solid transparent; }
        .tab.active { background: #4f545c; color: white; }
        #tab-embed.active { background: rgba(215, 130, 102, 0.1); color: var(--accent); border-color: var(--accent); }

        /* Formulaire */
        .card { background: var(--card); border-radius: 12px; padding: 25px; max-width: 750px; margin: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        label { display: block; font-size: 11px; font-weight: 800; color: #8e9297; text-transform: uppercase; margin-bottom: 10px; letter-spacing: 0.5px; }
        .input-wrapper { background: var(--input); border: 1px solid #1e1f22; border-radius: 8px; transition: 0.2s; }
        .input-wrapper:focus-within { border-color: var(--accent); }
        select, input, textarea { width: 100%; background: transparent; border: none; color: white; padding: 12px; outline: none; font-size: 14px; box-sizing: border-box; }

        /* Emoji Grid */
        .emoji-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(45px, 1fr)); gap: 10px; background: #202225; padding: 15px; border-radius: 8px; max-height: 120px; overflow-y: auto; border: 1px solid #1e1f22; }
        .emoji-item { cursor: pointer; padding: 8px; border-radius: 6px; display: flex; justify-content: center; align-items: center; transition: 0.2s; }
        .emoji-item:hover, .emoji-item.selected { background: var(--accent); }
        .emoji-item img { width: 26px; height: 26px; }

        /* APERÇU DISCORD */
        .preview-section { margin-top: 30px; border-top: 1px solid #4f545c; padding-top: 20px; }
        .discord-msg { background: #36393f; padding: 10px; border-radius: 4px; display: flex; gap: 15px; font-size: 15px; }
        .discord-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
        .discord-content { flex: 1; }
        .discord-author { font-weight: 600; color: white; margin-bottom: 4px; }
        .discord-embed { background: #2f3136; border-left: 4px solid var(--accent); padding: 12px; border-radius: 4px; margin-top: 8px; max-width: 400px; }
        .discord-btn { display: inline-flex; align-items: center; gap: 8px; background: #4f545c; color: white; padding: 7px 14px; border-radius: 3px; font-size: 14px; margin-top: 10px; cursor: default; }

        .btn-deploy { background: var(--accent); color: white; border: none; padding: 18px; width: 100%; border-radius: 8px; font-weight: 700; cursor: pointer; margin-top: 30px; font-size: 16px; transition: 0.2s; }
        .btn-deploy:hover { filter: brightness(1.1); transform: translateY(-1px); }
    </style>
</head>
<body>

<div class="sidebar" id="sidebar">
    <div style="padding: 25px; border-bottom: 1px solid #2f3136; display: flex; justify-content: space-between; align-items: center;">
        <span style="font-weight: 800; color: var(--accent); font-size: 18px;">BAGBOT</span>
        <i class="fas fa-times" onclick="toggleMenu()" style="cursor:pointer; color:#8e9297;"></i>
    </div>
    <div class="nav-item active"><i class="fas fa-fingerprint"></i> Rôles Réactions</div>
    <div class="nav-item"><i class="fas fa-cog"></i> Configuration</div>
</div>

<div class="main">
    <div class="top-nav">
        <button style="background:var(--side); border:none; color:white; padding:10px; border-radius:5px; cursor:pointer;" onclick="toggleMenu()"><i class="fas fa-bars"></i></button>
        <h3 style="margin:0;">Ajouter un rôle réaction</h3>
    </div>

    <div class="tabs">
        <div class="tab active" id="tab-simple" onclick="setMode('simple')">Contenu</div>
        <div class="tab" id="tab-embed" onclick="setMode('embed')">Embed</div>
    </div>

    <div class="card">
        <div class="form-grid">
            <div>
                <label>Salon Discord</label>
                <div class="input-wrapper"><select id="cId" onchange="updatePreview()"></select></div>
            </div>
            <div>
                <label>Rôle à attribuer</label>
                <div class="input-wrapper"><select id="rId" onchange="updatePreview()"></select></div>
            </div>
        </div>

        <label>Texte du bouton</label>
        <div class="input-wrapper" style="margin-bottom: 20px;">
            <input type="text" id="btnLabel" placeholder="Ex: Accès Membre" oninput="updatePreview()">
        </div>

        <label>Émojis du serveur</label>
        <div class="emoji-grid" id="emojiPicker"></div>
        <input type="hidden" id="selectedEmoji">

        <div id="sec-simple" style="margin-top: 25px;">
            <label>Message texte</label>
            <div class="input-wrapper"><textarea id="txt" rows="3" oninput="updatePreview()">Cliquez ci-dessous pour le rôle !</textarea></div>
        </div>

        <div id="sec-embed" style="display:none; margin-top: 25px;">
            <label>Titre de l'Embed</label>
            <div class="input-wrapper" style="margin-bottom:15px;"><input type="text" id="tit" oninput="updatePreview()" placeholder="Titre de l'embed..."></div>
            <label>Description</label>
            <div class="input-wrapper"><textarea id="des" rows="3" oninput="updatePreview()" placeholder="Description détaillée..."></textarea></div>
        </div>

        <div class="preview-section">
            <label>Aperçu du rendu final</label>
            <div class="discord-msg">
                <div class="discord-avatar"></div>
                <div class="discord-content">
                    <div class="discord-author">BagBot <span style="background:#5865f2; font-size:10px; padding:2px 4px; border-radius:3px; margin-left:5px;">APP</span></div>
                    <div id="viewSimple">Message texte ici...</div>
                    <div id="viewEmbed" class="discord-embed" style="display:none;">
                        <div style="font-weight:bold; color:white;" id="viewTit">Titre</div>
                        <div id="viewDes" style="font-size:14px; margin-top:4px;">Description...</div>
                    </div>
                    <div class="discord-btn">
                        <span id="viewEmo"></span> <span id="viewLab">Bouton</span>
                    </div>
                </div>
            </div>
        </div>

        <button class="btn-deploy" onclick="deploy()">DÉPLOYER SUR DISCORD</button>
    </div>
</div>

<script>
    let currentMode = 'simple';
    function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); }
    
    function setMode(m) {
        currentMode = m;
        document.getElementById('tab-simple').classList.toggle('active', m === 'simple');
        document.getElementById('tab-embed').classList.toggle('active', m === 'embed');
        document.getElementById('sec-simple').style.display = m === 'simple' ? 'block' : 'none';
        document.getElementById('sec-embed').style.display = m === 'embed' ? 'block' : 'none';
        updatePreview();
    }

    async function loadData() {
        try {
            const [cR, rR, eR] = await Promise.all([fetch('/api/channels'), fetch('/api/roles'), fetch('/api/emojis')]);
            const c = await cR.json(); const r = await rR.json(); const e = await eR.json();
            
            document.getElementById('cId').innerHTML = c.map(x => `<option value="${x.id}"># ${x.name}</option>`).join('');
            document.getElementById('rId').innerHTML = r.map(x => `<option value="${x.id}">${x.name}</option>`).join('');
            document.getElementById('emojiPicker').innerHTML = e.map(x => `
                <div class="emoji-item" onclick="selectEmoji('${x.id}', '${x.url}', this)">
                    <img src="${x.url}">
                </div>`).join('') + `<div class="emoji-item" onclick="selectEmoji('', '', this)"><i class="fas fa-ban"></i></div>`;
            updatePreview();
        } catch(err) { console.error("Erreur chargement"); }
    }

    function selectEmoji(id, url, el) {
        document.querySelectorAll('.emoji-item').forEach(i => i.classList.remove('selected'));
        el.classList.add('selected');
        document.getElementById('selectedEmoji').value = id;
        document.getElementById('viewEmo').innerHTML = url ? `<img src="${url}" style="width:16px; vertical-align:middle;">` : '';
    }

    function updatePreview() {
        const label = document.getElementById('btnLabel').value || document.getElementById('rId').options[document.getElementById('rId').selectedIndex]?.text || 'Rôle';
        document.getElementById('viewLab').innerText = label;

        if (currentMode === 'simple') {
            document.getElementById('viewSimple').style.display = 'block';
            document.getElementById('viewEmbed').style.display = 'none';
            document.getElementById('viewSimple').innerText = document.getElementById('txt').value;
        } else {
            document.getElementById('viewSimple').style.display = 'none';
            document.getElementById('viewEmbed').style.display = 'block';
            document.getElementById('viewTit').innerText = document.getElementById('tit').value || 'Titre de l\'embed';
            document.getElementById('viewDes').innerText = document.getElementById('des').value || 'Description...';
        }
    }

    async function deploy() {
        const fd = new FormData();
        fd.append('channelId', document.getElementById('cId').value);
        fd.append('roleId', document.getElementById('rId').value);
        fd.append('mode', currentMode);
        fd.append('buttonLabel', document.getElementById('btnLabel').value);
        fd.append('emojiId', document.getElementById('selectedEmoji').value);
        fd.append('content', document.getElementById('txt').value);
        fd.append('title', document.getElementById('tit').value);
        fd.append('description', document.getElementById('des').value);
        fd.append('roleMode', 'normal');

        const res = await fetch('/api/deploy', { method: 'POST', body: fd });
        const d = await res.json();
        alert(d.success ? "✅ Message envoyé !" : "❌ Erreur");
    }
    loadData();
</script>
</body>
</html>

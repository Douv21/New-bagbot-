<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BagBot | Accueil</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #050505; --bg-panel: #0f0f0f; --sidebar-bg: #000000;
            --accent: #ed4245; --embed-bg: #2b2d31; --text-muted: #949ba4; --border: #1e1e1e;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-dark); color: white; display: flex; height: 100vh; overflow: hidden; }

        /* SIDEBAR */
        #sidebar { width: 260px; background: var(--sidebar-bg); border-right: 1px solid var(--border); position: fixed; height: 100%; transition: 0.3s ease; z-index: 1000; }
        .sidebar-header { padding: 30px 20px; font-weight: 900; font-size: 24px; color: var(--accent); letter-spacing: 1px; }
        .nav-item { padding: 15px 25px; display: flex; align-items: center; gap: 15px; color: var(--accent); background: rgba(237, 66, 69, 0.05); font-weight: 700; border-right: 3px solid var(--accent); }

        /* CONTENT */
        main { flex: 1; margin-left: 260px; display: flex; flex-direction: column; transition: 0.3s; }
        header { height: 70px; background: var(--bg-panel); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 25px; justify-content: space-between; flex-shrink: 0; }
        .menu-toggle { display: none; font-size: 20px; cursor: pointer; }
        .content-wrapper { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; align-items: center; }

        /* EMBED DISCORD CLIQUE-IMAGE */
        .discord-embed { width: 100%; max-width: 520px; background: var(--embed-bg); border-left: 4px solid var(--accent); border-radius: 4px; padding: 16px; margin-bottom: 30px; }
        .embed-author { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-size: 13px; font-weight: 600; }
        .embed-author img { width: 24px; height: 24px; border-radius: 50%; }
        
        .embed-main { display: flex; justify-content: space-between; gap: 10px; }
        .embed-title { font-size: 16px; font-weight: 700; color: #fff; margin-bottom: 5px; }
        .embed-description { font-size: 14px; color: #dbdee1; line-height: 1.4; white-space: pre-wrap; }
        
        /* Zones cliquables pour images */
        .img-zone { border: 1px dashed #444; border-radius: 4px; cursor: pointer; overflow: hidden; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .img-zone:hover { border-color: var(--accent); background: rgba(255,255,255,0.05); }
        .thumb-box { width: 80px; height: 80px; flex-shrink: 0; }
        .banner-box { width: 100%; height: 160px; margin-top: 15px; }
        .img-zone img { width: 100%; height: 100%; object-fit: cover; }

        .embed-footer { display: flex; align-items: center; gap: 8px; margin-top: 12px; font-size: 12px; color: var(--text-muted); }
        .embed-footer img { width: 20px; height: 20px; border-radius: 50%; }

        /* FORMULAIRE TEXTE UNIQUEMENT */
        .config-card { width: 100%; max-width: 520px; background: var(--bg-panel); border-radius: 12px; border: 1px solid var(--border); padding: 20px; }
        label { display: block; font-size: 11px; font-weight: 800; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; }
        input, textarea, select { width: 100%; background: #000; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 8px; margin-bottom: 15px; }
        .btn-save { background: var(--accent); color: white; border: none; padding: 15px; border-radius: 8px; font-weight: 800; cursor: pointer; width: 100%; }

        /* MODALE IMAGE */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; display: none; padding: 20px; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: var(--bg-panel); border-radius: 15px; padding: 20px; width: 100%; max-width: 450px; }
        .gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; max-height: 200px; overflow-y: auto; }
        .gallery img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 5px; cursor: pointer; border: 2px solid transparent; }
        .gallery img.selected { border-color: var(--accent); }

        @media (max-width: 900px) { main { margin-left: 0; } #sidebar { transform: translateX(-100%); } #sidebar.open { transform: translateX(0); } .menu-toggle { display: block; } }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; z-index: 999; }
        .overlay.active { display: block; }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <nav id="sidebar">
        <div class="sidebar-header">BAGBOT</div>
        <div class="nav-item"><i class="fas fa-home"></i> Accueil</div>
    </nav>

    <main>
        <header>
            <i class="fas fa-bars menu-toggle" onclick="toggleMenu()"></i>
            <div style="display: flex; align-items: center; gap: 12px;">
                <span id="bot-name" style="font-weight: 700;">Dashboard</span>
                <img id="bot-avatar" src="" style="width: 35px; height: 35px; border-radius: 50%; border: 2px solid var(--accent);">
            </div>
        </header>

        <div class="content-wrapper">
            <div class="discord-embed">
                <div class="embed-author">
                    <img id="prev-auth" src=""> <span id="bot-name-prev">Bot</span>
                </div>
                <div class="embed-main">
                    <div style="flex:1">
                        <div class="embed-title" id="p-title">Titre</div>
                        <div class="embed-description" id="p-desc">Description...</div>
                    </div>
                    <div class="img-zone thumb-box" onclick="openImgModal('thumb')">
                        <div id="box-thumb"><i class="fas fa-plus"></i></div>
                    </div>
                </div>
                <div class="img-zone banner-box" onclick="openImgModal('banner')">
                    <div id="box-banner"><i class="fas fa-image" style="font-size: 24px; color: #333;"></i></div>
                </div>
                <div class="embed-footer">
                    <img id="prev-foot" src=""> <span>ID: {user_id} • BagBot System</span>
                </div>
            </div>

            <div class="config-card">
                <label>Titre</label>
                <input type="text" id="in-title" placeholder="Bienvenue !" oninput="sync()">
                <label>Message</label>
                <textarea id="in-desc" rows="4" oninput="sync()"></textarea>
                <label>Salon</label>
                <select id="chan-list"></select>
                <button class="btn-save" onclick="save()">DÉPLOYER</button>
            </div>
        </div>
    </main>

    <div id="imgModal" class="modal">
        <div class="modal-content">
            <h3 style="margin-bottom: 15px; color: var(--accent);">Modifier l'image</h3>
            <label>Lien Direct (URL)</label>
            <input type="text" id="url-input" placeholder="https://...">
            <label>Ou choisir un fichier</label>
            <input type="file" id="file-input" style="display:none" onchange="upload()">
            <button class="btn-save" style="background:#222; margin-bottom:10px" onclick="document.getElementById('file-input').click()">TÉLÉVERSER</button>
            
            <div class="gallery" id="gallery-box"></div>
            
            <button class="btn-save" style="margin-top:20px" onclick="applyImg()">APPLIQUER</button>
            <button class="btn-save" style="background:transparent; color:#666" onclick="closeModal()">ANNULER</button>
        </div>
    </div>

    <script>
        let currentTarget = '', selectedUrl = '';

        function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay').classList.toggle('active'); }
        function sync() {
            document.getElementById('p-title').innerText = document.getElementById('in-title').value || "Titre";
            document.getElementById('p-desc').innerText = document.getElementById('in-desc').value || "Description...";
        }

        function openImgModal(target) {
            currentTarget = target;
            loadGallery();
            document.getElementById('imgModal').classList.add('active');
        }

        function closeModal() { document.getElementById('imgModal').classList.remove('active'); }

        async function loadGallery() {
            const res = await fetch('/api/images'); const data = await res.json();
            document.getElementById('gallery-box').innerHTML = data.images.map(u => `<img src="${u}" onclick="selectedUrl='${u}';loadGallery()" class="${selectedUrl===u?'selected':''}">`).join('');
        }

        async function upload() {
            const fd = new FormData(); fd.append('file', document.getElementById('file-input').files[0]);
            await fetch('/api/upload', {method:'POST', body:fd}); loadGallery();
        }

        function applyImg() {
            const final = document.getElementById('url-input').value || selectedUrl;
            if(final) document.getElementById('box-'+currentTarget).innerHTML = `<img src="${final}">`;
            closeModal();
        }

        async function init() {
            const res = await fetch('/api/get_server_info'); const data = await res.json();
            document.getElementById('bot-name').innerText = data.bot.name;
            document.querySelectorAll('#bot-name-prev').forEach(e => e.innerText = data.bot.name);
            document.getElementById('bot-avatar').src = data.bot.avatar;
            document.getElementById('prev-auth').src = data.bot.avatar;
            document.getElementById('prev-foot').src = data.bot.avatar;
            document.getElementById('chan-list').innerHTML = data.channels.map(c => `<option value="${c.id}"># ${c.name}</option>`).join('');
        }

        window.onload = init;
    </script>
</body>
</html>

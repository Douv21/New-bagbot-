<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BagBot Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050505; --panel: #0f0f0f; --accent: #ed4245; --border: #1e1e1e; --discord: #2b2d31; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: white; display: grid; grid-template-columns: 260px 1fr; height: 100vh; overflow: hidden; }

        /* SIDEBAR ESPACE DÉDIÉ */
        #sidebar { background: #000; border-right: 1px solid var(--border); display: flex; flex-direction: column; height: 100vh; }
        .sidebar-header { padding: 30px; font-weight: 900; color: var(--accent); font-size: 20px; border-bottom: 1px solid var(--border); }
        .nav-item { padding: 18px 30px; cursor: pointer; color: #888; font-weight: bold; transition: 0.2s; border-right: 4px solid transparent; }
        .nav-item.active { color: var(--accent); background: rgba(237,66,69,0.1); border-right-color: var(--accent); }

        main { overflow-y: auto; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }
        .content-section { display: none; width: 100%; max-width: 650px; flex-direction: column; }
        .content-section.active { display: flex; }

        /* CARDS */
        .card { background: var(--panel); padding: 25px; border-radius: 15px; border: 1px solid var(--border); margin-bottom: 20px; width: 100%; }
        h3 { color: var(--accent); font-size: 14px; text-transform: uppercase; margin-bottom: 15px; }
        input, textarea, select { width: 100%; background: #000; border: 1px solid var(--border); color: white; padding: 14px; border-radius: 8px; margin-bottom: 15px; }

        /* ROLES LIST */
        .role-row { display: flex; align-items: center; gap: 15px; padding: 12px; border-bottom: 1px solid #1a1a1a; cursor: pointer; }
        .role-row input { width: 18px; height: 18px; accent-color: var(--accent); }

        /* EMBED DISCORD */
        .discord-embed { background: var(--discord); border-left: 4px solid var(--accent); padding: 16px; border-radius: 4px; margin-bottom: 20px; cursor: pointer; }
        .banner-box { width: 100%; height: 130px; border: 2px dashed #444; border-radius: 8px; margin-top: 10px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .banner-box img { width: 100%; height: 100%; object-fit: cover; }

        .btn { padding: 16px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; width: 100%; color: white; text-transform: uppercase; }
        .btn-save { background: var(--accent); margin-bottom: 10px; }

        /* MODAL GALERIE */
        #modal-gal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 5000; align-items: center; justify-content: center; }
        .modal-inner { background: var(--panel); width: 90%; max-width: 500px; padding: 25px; border-radius: 15px; border: 1px solid var(--border); }
        .gal-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 15px; max-height: 300px; overflow-y: auto; }
        .gal-item img { width: 100%; aspect-ratio: 16/9; object-fit: cover; border-radius: 8px; cursor: pointer; border: 2px solid transparent; }
        .gal-item img:hover { border-color: var(--accent); }

        /* LOGIN SCREEN */
        #login-screen { position: fixed; inset: 0; background: #000; z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <div id="login-screen">
        <h1 style="color:var(--accent); margin-bottom:20px;">BAGBOT DASHBOARD</h1>
        <button class="btn btn-save" style="width:auto; padding: 20px 40px;" onclick="window.location.href='/api/login'">Se connecter via Discord</button>
    </div>

    <nav id="sidebar">
        <div class="sidebar-header">BAGBOT</div>
        <div class="nav-item active" onclick="show('BIENVENUE', this)">BIENVENUE</div>
        <div class="nav-item" onclick="show('ADMIN', this)">ACCÈS ADMIN</div>
        <div class="nav-item" onclick="show('GALERIE', this)">GALERIE</div>
    </nav>

    <main>
        <section id="section-BIENVENUE" class="content-section active">
            <div class="discord-embed" onclick="openGal('banner')">
                <div id="p-title" style="font-weight:bold;">Bienvenue {user}</div>
                <div id="p-desc" style="font-size:14px; color:#ccc; margin-top:5px;">Aperçu du message...</div>
                <div class="banner-box">
                    <img id="img-banner" style="display:none">
                    <span id="banner-text"><i class="fas fa-plus"></i> Ajouter une image</span>
                </div>
            </div>
            <div class="card">
                <h3>Configuration</h3>
                <input type="text" id="w-title" placeholder="Titre" oninput="sync()">
                <textarea id="w-desc" placeholder="Description" rows="3" oninput="sync()"></textarea>
                <select id="w-chan"></select>
                <button class="btn btn-save" onclick="save()">Enregistrer</button>
                <button class="btn" style="background:#5865f2" onclick="fetch('/api/test_welcome',{method:'POST'})">Envoyer un Test</button>
            </div>
        </section>

        <section id="section-ADMIN" class="content-section">
            <div class="card">
                <h3>Rôles autorisés</h3>
                <p style="font-size:12px; color:#888; margin-bottom:15px;">Ton ID a un accès permanent. Ajoute les rôles secondaires ici.</p>
                <div id="admin-roles-list"></div>
                <button class="btn btn-save" style="margin-top:15px;" onclick="saveAdmin()">Mettre à jour les accès</button>
            </div>
        </section>

        <section id="section-GALERIE" class="content-section">
            <div class="card">
                <h3>Téléverser</h3>
                <input type="file" id="up-file" onchange="upload()">
                <div id="admin-gal" class="gal-grid"></div>
            </div>
        </section>
    </main>

    <div id="modal-gal">
        <div class="modal-inner">
            <div style="display:flex; justify-content:space-between; margin-bottom:15px">
                <h3>Choisir une image</h3>
                <i class="fas fa-times" onclick="document.getElementById('modal-gal').style.display='none'" style="cursor:pointer"></i>
            </div>
            <div id="modal-list" class="gal-grid"></div>
        </div>
    </div>

    <script>
        let fullConfig = {};

        async function init() {
            const res = await fetch('/api/get_server_info');
            if(res.status === 401) { document.getElementById('login-screen').style.display='flex'; return; }
            const data = await res.json();
            fullConfig = data.config;

            document.getElementById('w-chan').innerHTML = data.channels.map(c => `<option value="${c.id}"># ${c.name}</option>`).join('');
            document.getElementById('admin-roles-list').innerHTML = data.all_roles.map(r => `
                <div class="role-row" onclick="const ck=this.querySelector('input'); ck.checked=!ck.checked;">
                    <input type="checkbox" value="${r}" class="admin-ck" ${fullConfig.admin_roles?.includes(r)?'checked':''}>
                    <span>${r}</span>
                </div>
            `).join('');

            if(fullConfig.welcome) {
                document.getElementById('w-title').value = fullConfig.welcome.title || "";
                document.getElementById('w-desc').value = fullConfig.welcome.desc || "";
                document.getElementById('w-chan').value = fullConfig.welcome.channel || "";
                if(fullConfig.welcome.banner) selectImg(fullConfig.welcome.banner);
            }
            sync();
        }

        function sync() {
            document.getElementById('p-title').innerText = document.getElementById('w-title').value || "Titre";
            document.getElementById('p-desc').innerText = document.getElementById('w-desc').value || "Description...";
        }

        function show(id, el) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('section-'+id).classList.add('active');
            el.classList.add('active');
            if(id === 'GALERIE') loadGal('admin-gal');
        }

        async function loadGal(containerId) {
            const res = await fetch('/api/images');
            const data = await res.json();
            document.getElementById(containerId).innerHTML = data.images.map(img => `
                <div class="gal-item"><img src="${img}" onclick="selectImg('${img}')"></div>
            `).join('') || "<p style='grid-column:span 2; text-align:center; opacity:0.5'>Galerie vide</p>";
        }

        function openGal() { document.getElementById('modal-gal').style.display='flex'; loadGal('modal-list'); }

        function selectImg(path) {
            const img = document.getElementById('img-banner');
            img.src = path; img.style.display = 'block';
            img.dataset.path = path;
            document.getElementById('banner-text').style.display = 'none';
            document.getElementById('modal-gal').style.display = 'none';
        }

        async function upload() {
            const fd = new FormData();
            fd.append('file', document.getElementById('up-file').files[0]);
            await fetch('/api/upload', {method:'POST', body:fd});
            loadGal('admin-gal');
        }

        async function save() {
            fullConfig.welcome = {
                title: document.getElementById('w-title').value,
                desc: document.getElementById('w-desc').value,
                channel: document.getElementById('w-chan').value,
                banner: document.getElementById('img-banner').dataset.path || ""
            };
            await fetch('/api/save_config', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(fullConfig)});
            alert("Configuration sauvegardée !");
        }

        async function saveAdmin() {
            fullConfig.admin_roles = Array.from(document.querySelectorAll('.admin-ck:checked')).map(i => i.value);
            await fetch('/api/save_config', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(fullConfig)});
            alert("Accès admin mis à jour !");
        }

        window.onload = init;
    </script>
</body>
</html>

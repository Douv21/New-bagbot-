<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BagBot Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-dark: #050505; --bg-panel: #0f0f0f; --accent: #ed4245; --border: #1e1e1e; --embed-bg: #2b2d31; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-dark); color: white; display: flex; height: 100vh; overflow: hidden; }
        
        #sidebar { width: 260px; background: #000; border-right: 1px solid var(--border); transition: 0.3s; }
        main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        header { height: 60px; background: var(--bg-panel); display: flex; align-items: center; padding: 0 20px; border-bottom: 1px solid var(--border); }
        
        .content-section { display: none; flex-direction: column; align-items: center; padding: 20px; overflow-y: auto; flex: 1; }
        .content-section.active { display: flex; }

        .discord-preview-msg { width: 100%; max-width: 450px; color: #949ba4; font-size: 14px; margin-bottom: 5px; }
        .discord-embed { width: 100%; max-width: 450px; background: var(--embed-bg); border-left: 4px solid var(--accent); padding: 16px; border-radius: 4px; position: relative; margin-bottom: 20px; }
        .thumb-preview { width: 80px; height: 80px; position: absolute; right: 16px; top: 16px; background: rgba(255,255,255,0.05); border: 1px dashed #444; overflow: hidden; cursor: pointer; }
        .banner-preview { width: 100%; height: 120px; margin-top: 10px; background: rgba(255,255,255,0.05); border: 1px dashed #444; overflow: hidden; cursor: pointer; }
        .img-zone img { width: 100%; height: 100%; object-fit: cover; }

        .config-card { width: 100%; max-width: 450px; background: var(--bg-panel); border-radius: 12px; padding: 20px; border: 1px solid var(--border); margin-bottom: 20px; }
        h3 { font-size: 14px; color: var(--accent); margin-bottom: 15px; text-transform: uppercase; }
        input, textarea, select { width: 100%; background: #000; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 8px; margin-bottom: 15px; }
        
        .checkbox-list { background: #000; border: 1px solid var(--border); border-radius: 8px; max-height: 150px; overflow-y: auto; padding: 5px; margin-bottom: 15px; }
        .checkbox-item { display: flex; align-items: center; padding: 10px; gap: 12px; border-bottom: 1px solid #111; cursor: pointer; }
        .checkbox-item:hover { background: #080808; }
        .checkbox-item input { width: 18px; height: 18px; accent-color: var(--accent); cursor: pointer; }

        .btn { border: none; padding: 15px; border-radius: 8px; font-weight: 800; cursor: pointer; width: 100%; color: white; margin-bottom: 10px; }
        .btn-save { background: var(--accent); }
        .btn-test { background: #5865F2; }

        #gallery { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 450px; }
        .gallery-card { aspect-ratio: 1; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); cursor: pointer; position: relative; }
        .gallery-card img { width: 100%; height: 100%; object-fit: cover; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 2000; }
        @media (max-width: 900px) { #sidebar { display: none; } }
    </style>
</head>
<body>
    <nav id="sidebar">
        <div style="padding: 25px; font-size: 22px; font-weight: 900; color: var(--accent);">BAGBOT</div>
        <div style="padding: 15px 25px; cursor:pointer;" onclick="show('accueil')"><i class="fas fa-home"></i> Accueil</div>
        <div style="padding: 15px 25px; cursor:pointer;" onclick="show('images')"><i class="fas fa-images"></i> Images</div>
    </nav>

    <main>
        <header><span id="bot-name" style="font-weight: 800;">...</span></header>

        <section id="accueil" class="content-section active">
            <div class="discord-preview-msg">Mention : <span id="p-ping">@Utilisateur</span></div>
            <div class="discord-embed">
                <div class="thumb-preview img-zone" onclick="openM('thumb')" id="box-thumb"></div>
                <div id="p-title" style="font-weight: bold; margin-bottom: 5px;">Titre</div>
                <div id="p-desc" style="font-size: 14px; white-space: pre-wrap;">Description...</div>
                <div class="banner-preview img-zone" onclick="openM('banner')" id="box-banner"></div>
            </div>

            <div class="config-card">
                <h3>Paramètres</h3>
                <input type="text" id="in-title" placeholder="Titre..." oninput="sync()">
                <textarea id="in-desc" rows="3" placeholder="Message ({user}, {server}...)" oninput="sync()"></textarea>
                
                <label style="font-size:11px; color:#666">Salon de bienvenue :</label>
                <select id="chan-list"></select>

                <label style="font-size:11px; color:#666">Rôles déclencheurs (optionnel) :</label>
                <div id="role-checkboxes" class="checkbox-list"></div>

                <button class="btn btn-save" onclick="save()">ENREGISTRER</button>
                <button class="btn btn-test" onclick="test()">TESTER MAINTENANT</button>
            </div>
        </section>

        <section id="images" class="content-section">
            <div class="config-card">
                <input type="file" id="file-in" onchange="up()">
            </div>
            <div id="gallery"></div>
        </section>
    </main>

    <div id="modal" class="modal">
        <div style="background:var(--bg-panel); padding:20px; border-radius:12px; width:300px;">
            <p>Image envoyée !</p>
            <button class="btn btn-save" onclick="document.getElementById('modal').style.display='none'">OK</button>
        </div>
    </div>

    <script>
        const API = window.location.origin;
        let target = '';
        let userData = { name: "Utilisateur" };

        function show(id) { 
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'images') loadG();
        }

        function sync() {
            const t = document.getElementById('in-title').value;
            const d = document.getElementById('in-desc').value;
            document.getElementById('p-ping').innerText = "@" + userData.name;
            document.getElementById('p-title').innerText = t || "Titre";
            document.getElementById('p-desc').innerText = d.replace(/{user}/g, userData.name) || "Bienvenue sur le serveur !";
        }

        function openM(t) { target = t; document.getElementById('file-in').click(); }

        async function up() {
            const file = document.getElementById('file-in').files[0];
            if(!file) return;
            const fd = new FormData(); fd.append('file', file);
            const res = await fetch(`${API}/api/upload`, { method: 'POST', body: fd });
            const data = await res.json();
            document.getElementById('box-'+target).innerHTML = `<img src="${API+data.url}">`;
            document.getElementById('box-'+target).dataset.path = data.url;
        }

        async function loadG() {
            const res = await fetch(`${API}/api/images`);
            const d = await res.json();
            document.getElementById('gallery').innerHTML = d.images.map(img => `
                <div class="gallery-card" onclick="document.getElementById('box-banner').innerHTML='<img src=${API+img}>'; document.getElementById('box-banner').dataset.path='${img}'; show('accueil')">
                    <img src="${API+img}">
                </div>`).join('');
        }

        async function save() {
            const roles = [];
            document.querySelectorAll('#role-checkboxes input:checked').forEach(i => roles.push(i.value));
            const p = {
                title: document.getElementById('in-title').value,
                desc: document.getElementById('in-desc').value,
                target_channel: document.getElementById('chan-list').value,
                trigger_roles: roles,
                thumb: document.getElementById('box-thumb').dataset.path || null,
                banner: document.getElementById('box-banner').dataset.path || null
            };
            await fetch(`${API}/api/save_config`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(p) });
            alert("✅ Configuration sauvegardée !");
        }

        async function test() {
            const roles = [];
            document.querySelectorAll('#role-checkboxes input:checked').forEach(i => roles.push(i.value));
            const p = {
                channel: document.getElementById('chan-list').value,
                title: document.getElementById('in-title').value,
                desc: document.getElementById('in-desc').value,
                target_channel: document.getElementById('chan-list').value,
                trigger_roles: roles,
                thumb: document.getElementById('box-thumb').dataset.path || null,
                banner: document.getElementById('box-banner').dataset.path || null
            };
            const res = await fetch(`${API}/api/test_message`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(p) });
            if(res.ok) alert("🚀 Test envoyé !");
        }

        async function init() {
            const res = await fetch(`${API}/api/get_server_info`);
            if(!res.ok) { window.location.href = "/login"; return; }
            const d = await res.json();
            userData.name = d.user_connected;
            document.getElementById('bot-name').innerText = d.bot.name;
            document.getElementById('chan-list').innerHTML = d.channels.map(c => `<option value="${c.id}" ${d.config.target_channel == c.id ? 'selected':''}># ${c.name}</option>`).join('');
            document.getElementById('role-checkboxes').innerHTML = d.all_roles.map(r => `
                <div class="checkbox-item">
                    <input type="checkbox" value="${r}" ${(d.config.trigger_roles || []).includes(r) ? 'checked' : ''}>
                    <label>${r}</label>
                </div>`).join('');

            if(d.config) {
                document.getElementById('in-title').value = d.config.title || "";
                document.getElementById('in-desc').value = d.config.desc || "";
                if(d.config.thumb) { document.getElementById('box-thumb').innerHTML = `<img src="${API+d.config.thumb}">`; document.getElementById('box-thumb').dataset.path = d.config.thumb; }
                if(d.config.banner) { document.getElementById('box-banner').innerHTML = `<img src="${API+d.config.banner}">`; document.getElementById('box-banner').dataset.path = d.config.banner; }
                sync();
            }
        }
        window.onload = init;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BagBot | Control Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* CONFIGURATION DES COULEURS BAGBOT */
        :root {
            --accent: #ed4245;       /* Rouge Discord/BagBot */
            --bg-dark: #0b0b0b;      /* Noir profond */
            --bg-sidebar: #000000;   /* Noir pur */
            --border: #1e1f22;       /* Gris très sombre */
            --text: #ffffff;
            --text-muted: #949ba4;
            --sidebar-w: 260px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }

        body {
            background: var(--bg-dark);
            color: var(--text);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        #sidebar {
            width: var(--sidebar-w);
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        /* État quand la sidebar est cachée */
        #sidebar.closed {
            transform: translateX(-100%);
            position: absolute;
            height: 100%;
        }

        .sidebar-header {
            padding: 30px 24px;
            font-size: 24px;
            font-weight: 900;
            color: var(--accent);
            letter-spacing: 2px;
        }

        .nav-list {
            flex: 1;
            padding: 10px;
        }

        .nav-item {
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 8px;
            transition: 0.2s;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(237, 66, 69, 0.1);
            color: white;
        }

        .nav-item.active {
            color: var(--accent);
        }

        /* --- CONTENU --- */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        header {
            height: 60px;
            background: #050505;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 20px;
        }

        #burger {
            font-size: 22px;
            color: var(--accent);
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .content {
            flex: 1;
            padding: 40px 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Message temporaire pour le centre */
        .placeholder {
            color: var(--text-muted);
            text-align: center;
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <nav id="sidebar">
        <div class="sidebar-header">BAGBOT</div>
        <div class="nav-list">
            <div class="nav-item active"><i class="fas fa-home"></i> Dashboard</div>
            <div class="nav-item"><i class="fas fa-envelope"></i> Messages</div>
            <div class="nav-item"><i class="fas fa-cog"></i> Paramètres</div>
        </div>
    </nav>

    <div class="main">
        <header>
            <div id="burger"><i class="fas fa-bars"></i></div>
            <div style="font-weight: 900; letter-spacing: 1px; font-size: 14px;">CONTROLE</div>
        </header>

        <div class="content">
            <div class="placeholder">
                <h2>Bienvenue sur BagBot</h2>
                <p>La structure est prête. Prêt à ajouter tes modules.</p>
            </div>
        </div>
    </div>

    <script>
        const sidebar = document.getElementById('sidebar');
        const burger = document.getElementById('burger');

        // Fonction pour ouvrir/fermer au clic
        burger.onclick = () => {
            sidebar.classList.toggle('closed');
        };

        // Sur mobile, on ferme la sidebar par défaut au chargement
        if (window.innerWidth < 768) {
            sidebar.classList.add('closed');
        }
    </script>
</body>
</html>

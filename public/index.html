<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BagBot Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #ff4d4d; --bg: #0a0a0a; --panel: #161616; --text: #ffffff; --subtext: #888; --draft-coral: #d37f6a; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; min-height: 100vh; padding: 15px; box-sizing: border-box; }

        /* APERÇU DISCORD */
        .discord-msg { background: #313338; border-radius: 8px; padding: 12px; display: flex; gap: 10px; margin-bottom: 20px; }
        .avatar { width: 35px; height: 35px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
        .embed { background: #1e1f22; border-left: 4px solid var(--accent); border-radius: 4px; padding: 12px; position: relative; width: 100%; }
        .embed-title { font-weight: 700; margin-bottom: 5px; outline: none; }
        .embed-desc { font-size: 14px; color: #dbdee1; outline: none; min-height: 20px; margin-bottom: 10px; }
        .embed-img { width: 100%; border-radius: 4px; background: #111; margin: 10px 0; display: flex; align-items: center; justify-content: center; min-height: 80px; cursor: pointer; border: 1px dashed #444; }
        .embed-img img { width: 100%; border-radius: 4px; }
        
        /* CONFIGURATION */
        .card { background: var(--panel); border-radius: 15px; padding: 20px; border: 1px solid #222; }
        label { display: block; font-size: 10px; color: var(--subtext); text-transform: uppercase; font-weight: 800; margin: 15px 0 5px; }
        select { width: 100%; background: #000; border: 1px solid #333; color: white; padding: 12px; border-radius: 8px; outline: none; appearance: none; }

        /* RÉACTIONS */
        .reaction-row { background: #1e1e1e; border-radius: 8px; padding: 10px; display: flex; align-items: center; gap: 10px; margin-bottom: 8px; border: 1px solid #333; }
        .emoji-btn { font-size: 20px; background: #0a0a0a; border: 1px solid #444; border-radius: 6px; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .role-select { flex: 1; background: transparent; border: none; color: white; font-size: 14px; outline: none; }

        .btn-add { background: var(--draft-coral); color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; font-weight: 700; cursor: pointer; margin: 15px 0; }
        .btn-deploy { background: var(--accent); color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: 800; cursor: pointer; text-transform: uppercase; }

        /* SÉLECTEUR EMOJI SMARTPHONE STYLE */
        #emojiSelector { display: none; position: fixed; bottom: 0; left: 0; width: 100%; height: 300px; background: #161616; border-top: 2px solid var(--accent); z-index: 9999; padding: 15px; overflow-y: auto; }
        .emoji-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 10px; font-size: 24px; text-align: center; }
        .emoji-item { cursor: pointer; padding: 5px; border-radius: 5px; }
        .emoji-item:hover { background: #333; }
    </style>
</head>
<body>

    <h3 style="text-align:center;">Configuration du message</h3>

    <div class="discord-msg">
        <div class="avatar"></div>
        <div class="embed">
            <div class="embed-title" contenteditable="true" id="p-title">Role accès</div>
            <div class="embed-desc" contenteditable="true" id="p-desc">Débloque l'accès aux contenus...</div>
            <div class="embed-img" id="p-banner" onclick="addBanner()">
                <i class="fas fa-plus" id="banner-icon"></i>
            </div>
        </div>
    </div>

    <div class="card">
        <label>Salon de réception</label>
        <select id="channelSelect"><option>Chargement des salons...</option></select>

        <div id="reactionsList"></div>

        <button class="btn-add" onclick="addRow()">Ajouter un rôle réaction</button>
        <button class="btn-deploy" onclick="sendToDiscord()">Déployer sur Discord</button>
    </div>

    <div id="emojiSelector">
        <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
            <b>Choisir un Emoji</b>
            <i class="fas fa-times" onclick="closeEmoji()" style="cursor:pointer;"></i>
        </div>
        <div class="emoji-grid" id="emojiGrid"></div>
    </div>

<script>
    let activeBtn = null;
    let allRoles = [];
    const commonEmojis = ['😀','🔥','🔞','🌙','🎭','📸','📜','✅','⚠️','⭐','💎','🎁','🛡️','🏹','🗡️','🧬'];

    // 1. Chargement des données
    async function loadData() {
        try {
            const [cRes, rRes] = await Promise.all([fetch('/api/channels'), fetch('/api/roles')]);
            const channels = await cRes.json();
            allRoles = await rRes.json();

            document.getElementById('channelSelect').innerHTML = channels.map(c => 
                `<option value="${c.id}"># ${c.name}</option>`).join('');
        } catch (e) {
            console.error("Erreur API");
        }
    }

    // 2. Gestion des réactions
    function addRow() {
        const div = document.createElement('div');
        div.className = 'reaction-row';
        div.innerHTML = `
            <div class="emoji-btn" onclick="openEmoji(this)">😀</div>
            <select class="role-select">
                <option value="">Lier un rôle...</option>
                ${allRoles.map(r => `<option value="${r.id}">${r.name}</option>`).join('')}
            </select>
            <i class="fas fa-trash" style="color:#444" onclick="this.parentElement.remove()"></i>
        `;
        document.getElementById('reactionsList').appendChild(div);
    }

    // 3. Sélecteur d'emojis smartphone + serveur
    function openEmoji(btn) {
        activeBtn = btn;
        const grid = document.getElementById('emojiGrid');
        grid.innerHTML = commonEmojis.map(e => `<span class="emoji-item" onclick="pickEmoji('${e}')">${e}</span>`).join('');
        // Note: Ici tu pourrais ajouter les emojis du serveur via une boucle sur une API /api/server-emojis
        document.getElementById('emojiSelector').style.display = 'block';
    }

    function pickEmoji(emoji) {
        if(activeBtn) activeBtn.innerText = emoji;
        closeEmoji();
    }
    function closeEmoji() { document.getElementById('emojiSelector').style.display = 'none'; }

    // 4. Déploiement
    async function sendToDiscord() {
        const data = {
            channelId: document.getElementById('channelSelect').value,
            title: document.getElementById('p-title').innerText,
            description: document.getElementById('p-desc').innerText,
            reactions: Array.from(document.querySelectorAll('.reaction-row')).map(row => ({
                emoji: row.querySelector('.emoji-btn').innerText,
                roleId: row.querySelector('.role-select').value
            }))
        };

        const res = await fetch('/api/deploy', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });

        if(res.ok) alert("✅ Déployé avec succès !");
        else alert("❌ Erreur de déploiement.");
    }

    function addBanner() {
        const url = prompt("Lien de l'image :");
        if(url) document.getElementById('p-banner').innerHTML = `<img src="${url}">`;
    }

    window.onload = loadData;
</script>
</body>
</html>

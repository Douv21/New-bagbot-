<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BagBot Advanced Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050505; --panel: #0f0f0f; --accent: #ed4245; --border: #1e1e1e; --embed: #2b2d31; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: white; display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar - Design original corrigé */
        #sidebar { 
            width: 260px; background: #000; border-right: 1px solid var(--border); 
            position: fixed; height: 100%; z-index: 2000; transition: 0.3s;
        }
        #sidebar.closed { transform: translateX(-100%); }

        .nav-item { padding: 18px 25px; display: flex; align-items: center; gap: 15px; color: #949ba4; cursor: pointer; font-weight: bold; }
        .nav-item.active { color: var(--accent); background: rgba(237, 66, 69, 0.05); border-right: 3px solid var(--accent); }

        main { flex: 1; margin-left: 260px; display: flex; flex-direction: column; transition: 0.3s; }
        header { height: 60px; background: var(--panel); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; gap: 15px; }

        .content-section { display: none; flex-direction: column; align-items: center; padding: 20px; overflow-y: auto; flex: 1; }
        .content-section.active { display: flex; }

        /* Embed Preview */
        .discord-embed { 
            width: 100%; max-width: 480px; background: var(--embed); border-left: 4px solid var(--accent); 
            border-radius: 4px; padding: 16px; position: relative; margin-bottom: 20px;
        }
        .thumb-p { width: 80px; height: 80px; position: absolute; right: 16px; top: 16px; border: 1px dashed #444; border-radius: 4px; overflow: hidden; }
        .banner-p { width: 100%; height: 140px; margin-top: 10px; border: 1px dashed #444; border-radius: 4px; overflow: hidden; }
        img { width: 100%; height: 100%; object-fit: cover; }

        /* Forms */
        .card { width: 100%; max-width: 480px; background: var(--panel); border-radius: 12px; padding: 20px; border: 1px solid var(--border); margin-bottom: 20px; }
        input, textarea, select { width: 100%; background: #000; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 8px; margin-bottom: 12px; font-size: 14px; }
        
        .var-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 15px; }
        .v-btn { background: #0a0a0a; border: 1px solid #222; padding: 10px; text-align: center; color: var(--accent); font-size: 11px; border-radius: 5px; cursor: pointer; font-weight: 800; }

        .btn { border: none; padding: 16px; border-radius: 8px; font-weight: 800; cursor: pointer; width: 100%; color: white; margin-top: 10px; }
        
        .footer-spacer { height: 120px; flex-shrink: 0; }

        @media (max-width: 900px) {
            main { margin-left: 0; }
            #sidebar { transform: translateX(-100%); }
            #sidebar.open { transform: translateX(0); }
        }
    </style>
</head>
<body>

    <nav id="sidebar">
        <div style="padding: 25px; color: var(--accent); font-weight: 900; font-size: 22px; display: flex; justify-content: space-between;">
            BAGBOT <i class="fas fa-times" onclick="toggleM()" style="cursor:pointer"></i>
        </div>
        <div class="nav-item active" onclick="showSec('home', this)"><i class="fas fa-home"></i> Accueil</div>
        <div class="nav-item" onclick="showSec('galerie', this)"><i class="fas fa-images"></i> Galerie</div>
    </nav>

    <main>
        <header>
            <i class="fas fa-bars" onclick="toggleM()" style="color:var(--accent); cursor:pointer"></i>
            <span id="bot-title" style="font-weight: bold;">Panel</span>
        </header>

        <section id="home" class="content-section active">
            <div class="discord-embed">
                <div class="thumb-p" onclick="openUpload('thumb')" id="box-thumb"></div>
                <div id="p-title" style="font-weight: bold; font-size: 16px;">Titre</div>
                <div id="p-desc" style="font-size: 13px; color: #dcddde; margin-top: 5px;">Description...</div>
                <div class="banner-p" onclick="openUpload('banner')" id="box-banner"></div>
            </div>

            <div class="card">
                <input id="in-title" placeholder="Titre..." oninput="sync()">
                <textarea id="in-desc" rows="5" placeholder="Message..." oninput="sync()"></textarea>
                
                <div class="var-grid">
                    <div class="v-btn" onclick="addV('{user}')">{user}</div>
                    <div class="v-btn" onclick="addV('{server}')">{server}</div>
                    <div class="v-btn" onclick="addV('{count}')">{count}</div>
                    <div class="v-btn" onclick="addV('{channel}')">{channel}</div>
                    <div class="v-btn" onclick="addV('{everyone}')">{everyone}</div>
                    <div class="v-btn" onclick="addV('{here}')">{here}</div>
                </div>

                <select id="chan-list"></select>
                <button class="btn" style="background:var(--accent)" onclick="save()">ENREGISTRER</button>
                <button class="btn" style="background:#5865F2" onclick="test()">TESTER SUR DISCORD</button>
            </div>
            <div class="footer-spacer"></div>
        </section>

        <section id="galerie" class="content-section">
            <div id="gallery-grid" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; width: 100%; max-width: 500px;"></div>
            <div class="footer-spacer"></div>
        </section>
    </main>

    <div id="modal" style="position:fixed; inset:0; background:rgba(0,0,0,0.9); display:none; align-items:center; justify-content:center; z-index:3000;">
        <div style="background:var(--panel); padding:25px; border-radius:12px; width:90%; max-width:320px; border:1px solid var(--border);">
            <input type="file" id="file-in" style="display:none" onchange="upload()">
            <button class="btn" style="background:#222" onclick="document.getElementById('file-in').click()">TÉLÉVERSER</button>
            <button class="btn" style="background:transparent" onclick="document.getElementById('modal').style.display='none'">FERMER</button>
        </div>
    </div>

    <script>
        let target = '';
        const API = window.location.origin;

        function toggleM() { document.getElementById('sidebar').classList.toggle('open'); }
        
        function showSec(id, el) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
            if(id === 'galerie') loadGal();
            if(window.innerWidth < 900) toggleM();
        }

        function sync() {
            document.getElementById('p-title').innerText = document.getElementById('in-title').value || "Titre";
            document.getElementById('p-desc').innerText = document.getElementById('in-desc').value || "Description...";
        }

        function addV(v) { document.getElementById('in-desc').value += v; sync(); }
        function openUpload(t) { target = t; document.getElementById('modal').style.display = 'flex'; }

        async function upload() {
            const fd = new FormData();
            fd.append('file', document.getElementById('file-in').files[0]);
            const res = await fetch(`${API}/api/upload`, { method: 'POST', body: fd });
            const data = await res.json();
            setImg(target, data.url);
            document.getElementById('modal').style.display = 'none';
        }

        function setImg(type, path) {
            document.getElementById(`box-${type}`).innerHTML = `<img src="${API+path}">`;
            document.getElementById(`box-${type}`).dataset.path = path;
        }

        async function save() {
            const payload = {
                channel: document.getElementById('chan-list').value,
                title: document.getElementById('in-title').value,
                desc: document.getElementById('in-desc').value,
                thumb: document.getElementById('box-thumb').dataset.path || null,
                banner: document.getElementById('box-banner').dataset.path || null
            };
            await fetch(`${API}/api/save_config`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
            alert("✅ Configuration sauvegardée !");
        }

        async function test() {
            const payload = {
                channel: document.getElementById('chan-list').value,
                title: document.getElementById('in-title').value,
                desc: document.getElementById('in-desc').value,
                thumb: document.getElementById('box-thumb').dataset.path || null,
                banner: document.getElementById('box-banner').dataset.path || null
            };
            await fetch(`${API}/api/test_message`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
            alert("🚀 Test envoyé !");
        }

        async function loadGal() {
            const res = await fetch(`${API}/api/images`);
            const data = await res.json();
            document.getElementById('gallery-grid').innerHTML = data.images.map(img => `
                <div style="aspect-ratio:1; background:#000; border-radius:8px; overflow:hidden; border:1px solid #222" onclick="setImg('banner', '${img}'); alert('Image définie en bannière !')">
                    <img src="${API+img}" style="width:100%; height:100%; object-fit:cover;">
                </div>
            `).join('');
        }

        async function init() {
            const res = await fetch(`${API}/api/get_server_info`);
            const data = await res.json();
            document.getElementById('bot-title').innerText = data.bot.name;
            document.getElementById('chan-list').innerHTML = data.channels.map(c => `<option value="${c.id}"># ${c.name}</option>`).join('');
            
            if(data.config) {
                document.getElementById('in-title').value = data.config.title || "";
                document.getElementById('in-desc').value = data.config.desc || "";
                if(data.config.thumb) setImg('thumb', data.config.thumb);
                if(data.config.banner) setImg('banner', data.config.banner);
                sync();
            }
        }
        window.onload = init;
    </script>
</body>
</html>

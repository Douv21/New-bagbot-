<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>BagBot Ultimate Panel</title>
    <style>
        :root { --bg: #050505; --panel: #0f0f0f; --accent: #ed4245; --border: #1e1e1e; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; }
        
        /* Sidebar */
        #sidebar { width: 260px; background: #000; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .nav-item { padding: 20px 30px; cursor: pointer; color: #888; font-weight: bold; border-right: 4px solid transparent; }
        .nav-item.active { color: var(--accent); background: rgba(237,66,69,0.1); border-right-color: var(--accent); }

        main { flex-grow: 1; padding: 40px; overflow-y: auto; }
        .section { display: none; max-width: 800px; margin: 0 auto; }
        .section.active { display: block; }

        /* Cards & Inputs */
        .card { background: var(--panel); padding: 25px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; }
        input, textarea, select { width: 100%; background: #000; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 8px; margin-top: 10px; }
        
        .role-list { max-height: 200px; overflow-y: auto; background: #000; border-radius: 8px; padding: 10px; margin-top: 10px; }
        .role-item { display: flex; align-items: center; gap: 10px; padding: 8px; border-bottom: 1px solid #1a1a1a; cursor: pointer; }
        
        .btn { width: 100%; padding: 15px; background: var(--accent); border: none; color: white; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 15px; }
        .btn-upload { background: #5865F2; } /* Style bouton galerie */

        /* Galerie */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; margin-top: 20px; }
        .grid img { width: 100%; height: 150px; object-fit: cover; border-radius: 8px; border: 2px solid var(--border); }
    </style>
</head>
<body>
    <nav id="sidebar">
        <div style="padding: 30px; font-weight: 900; color: var(--accent); font-size: 24px;">BAGBOT</div>
        <div class="nav-item active" onclick="show('welcome', this)">BIENVENUE</div>
        <div class="nav-item" onclick="show('galerie', this)">GALERIE</div>
        <div class="nav-item" onclick="show('admin', this)">ACCÈS PANEL</div>
    </nav>

    <main>
        <div id="welcome" class="section active">
            <div class="card">
                <h3>Configuration Bienvenue</h3>
                <input type="text" id="w-title" placeholder="Titre (ex: Bienvenue {user})">
                <textarea id="w-desc" placeholder="Message..." rows="4"></textarea>
                <select id="w-chan"></select>
                <h4>Rôles à donner à l'arrivée :</h4>
                <div id="welcome-roles" class="role-list"></div>
                <button class="btn" onclick="save()">ENREGISTRER</button>
            </div>
        </div>

        <div id="galerie" class="section">
            <div class="card">
                <h3>Ma Galerie</h3>
                <input type="file" id="file-up" style="display:none" onchange="doUpload()">
                <button class="btn btn-upload" onclick="document.getElementById('file-up').click()">TÉLÉVERSER UNE IMAGE</button>
                <div id="images-grid" class="grid"></div>
            </div>
        </div>

        <div id="admin" class="section">
            <div class="card">
                <h3>Permissions Admin</h3>
                <p>Rôles autorisés à modifier ce panel :</p>
                <div id="admin-roles" class="role-list"></div>
                <button class="btn" onclick="save()">METTRE À JOUR</button>
            </div>
        </div>
    </main>

    <script>
        let fullData = {};

        async function load() {
            const res = await fetch('/api/get_data');
            if(!res.ok) return window.location.href='/api/login';
            fullData = await res.json();
            
            // Remplir salons
            document.getElementById('w-chan').innerHTML = fullData.channels.map(c => `<option value="${c.id}"># ${c.name}</option>`).join('');
            
            // Remplir listes de rôles
            const renderRoles = (container, configKey) => {
                document.getElementById(container).innerHTML = fullData.roles.map(r => `
                    <div class="role-item" onclick="const ck=this.querySelector('input'); ck.checked=!ck.checked;">
                        <input type="checkbox" value="${r}" data-key="${configKey}" ${fullData.config[configKey]?.includes(r)?'checked':''}> ${r}
                    </div>`).join('');
            };
            renderRoles('welcome-roles', 'selected_roles');
            renderRoles('admin-roles', 'admin_roles');

            // Remplir galerie
            document.getElementById('images-grid').innerHTML = fullData.images.map(img => `<img src="${img}">`).join('');
            
            // Valeurs textes
            document.getElementById('w-title').value = fullData.config.welcome?.title || "";
            document.getElementById('w-desc').value = fullData.config.welcome?.desc || "";
        }

        function show(id, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        async function save() {
            const config = {
                welcome: { title: document.getElementById('w-title').value, desc: document.getElementById('w-desc').value, channel: document.getElementById('w-chan').value },
                selected_roles: Array.from(document.querySelectorAll('[data-key="selected_roles"]:checked')).map(i => i.value),
                admin_roles: Array.from(document.querySelectorAll('[data-key="admin_roles"]:checked')).map(i => i.value)
            };
            await fetch('/api/save', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(config)});
            alert("Sauvegardé avec succès !");
        }

        async function doUpload() {
            const fd = new FormData(); fd.append('file', document.getElementById('file-up').files[0]);
            await fetch('/api/upload', {method:'POST', body:fd});
            load();
        }

        window.onload = load;
    </script>
</body>
</html>

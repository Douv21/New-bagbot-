<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BAGBOT ELITE V9</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #0a0a0a; --card: #141414; --accent: #ed4245; --border: #252525; --d-bg: #2b2d31; }
        * { box-sizing: border-box; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: sans-serif; height: 100vh; overflow: hidden; }

        .header { position: fixed; top: 0; left: 0; right: 0; height: 60px; background: #000; display: flex; align-items: center; padding: 0 20px; z-index: 2500; border-bottom: 1px solid var(--border); }
        .burger { font-size: 22px; color: var(--accent); cursor: pointer; }
        
        #sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100vh; background: #000; z-index: 3000; transition: 0.3s; border-right: 1px solid var(--border); }
        #sidebar.open { left: 0; }
        .nav-item { padding: 18px 20px; border-bottom: 1px solid #111; cursor: pointer; color: #888; display: flex; align-items: center; justify-content: space-between; font-weight: bold; }
        .nav-item.active { color: var(--accent); background: #ed424510; }
        
        .submenu { display: none; background: #050505; }
        .submenu.show { display: block; }
        .sub-item { padding: 15px 50px; cursor: pointer; color: #666; font-size: 14px; border-bottom: 1px solid #0a0a0a; }
        .sub-item.active { color: var(--accent); background: #111; }

        main { height: 100vh; overflow-y: auto; padding: 80px 15px 150px; }
        .section { display: none; max-width: 600px; margin: 0 auto; }
        .section.active { display: block; }

        .preview { background: var(--d-bg); border-left: 4px solid var(--accent); border-radius: 4px; padding: 15px; margin-bottom: 25px; }
        .pv-top { display: flex; justify-content: space-between; gap: 10px; }
        .pv-thumb { width: 60px; height: 60px; border-radius: 4px; background: #222; overflow: hidden; border: 1px dashed #444; }
        .pv-banner { width: 100%; height: 120px; border-radius: 8px; background: #222; margin-top: 10px; overflow: hidden; border: 1px dashed #444; }
        .pv-f-icon { width: 18px; height: 18px; border-radius: 50%; background: #222; }
        img { width: 100%; height: 100%; object-fit: cover; }

        .card { background: var(--card); border-radius: 15px; padding: 20px; border: 1px solid var(--border); margin-bottom: 20px; }
        label { display: block; font-size: 11px; color: #555; text-transform: uppercase; margin: 15px 0 5px; font-weight: bold; }
        input, textarea, select { width: 100%; background: #000; border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 8px; outline: none; }
        .btn { border: none; padding: 15px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; }
        .btn-save { background: var(--accent); color: #fff; }
        
        .gallery-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .img-card { height: 100px; border-radius: 8px; border: 1px solid var(--border); overflow: hidden; }
    </style>
</head>
<body>

    <div class="header"><i class="fas fa-bars burger" onclick="toggleSidebar(event)"></i><div style="margin-left: 20px; font-weight: 900; color: var(--accent);">BAGBOT ELITE</div></div>

    <div id="sidebar">
        <div style="padding: 30px; color: var(--accent); font-weight: 900; text-align: center;">DASHBOARD</div>
        <div class="nav-item active" onclick="toggleSubmenu('sub-config', event)"><span>CONFIGURATION</span><i class="fas fa-chevron-down"></i></div>
        <div id="sub-config" class="submenu show">
            <div id="mi-welcome" class="sub-item active" onclick="showTab('welcome', this)">Bienvenue</div>
            <div id="mi-leave" class="sub-item" onclick="showTab('leave', this)">Départ</div>
        </div>
        <div class="nav-item" onclick="showTab('admin', this)">PERMISSIONS</div>
        <div class="nav-item" onclick="showTab('gallery', this)">GALERIE</div>
    </div>

    <main onclick="closeSidebar()">
        <div id="welcome" class="section active">
            <div class="preview" id="pv-box-welcome">
                <div class="pv-top">
                    <div style="flex-grow:1">
                        <div id="pv-w-title" style="color:#00a8fc; font-weight:bold;">Titre</div>
                        <div id="pv-w-desc" style="font-size:14px; margin-top:5px; white-space:pre-wrap;">Message...</div>
                    </div>
                    <div class="pv-thumb" onclick="openPicker('welcome', 'thumbnail')"><img id="w-img-thumb"></div>
                </div>
                <div class="pv-banner" onclick="openPicker('welcome', 'banner')"><img id="w-img-banner"></div>
                <div style="display:flex; align-items:center; gap:8px; margin-top:10px; font-size:11px; color:#b5bac1;">
                    <div class="pv-f-icon" onclick="openPicker('welcome', 'footer_icon')"><img id="w-img-footer"></div>
                    <span id="pv-w-footer">Footer</span>
                </div>
            </div>
            <div class="card">
                <h2>Bienvenue</h2>
                <label>Couleur</label><input type="color" id="w-color" oninput="sync('welcome')">
                <label>Titre</label><input type="text" id="w-title" oninput="sync('welcome')">
                <label>Message</label><textarea id="w-desc" rows="3" oninput="sync('welcome')"></textarea>
                <label>Footer</label><input type="text" id="w-footer" oninput="sync('welcome')">
                <label>Salon</label><select id="w-channel"></select>
                <button class="btn btn-save" onclick="save()">SAUVEGARDER</button>
                <button class="btn" style="background:#5865f2; color:white;" onclick="test('welcome')">TESTER</button>
            </div>
        </div>

        <div id="leave" class="section">
            <div class="preview" id="pv-box-leave">
                <div class="pv-top">
                    <div style="flex-grow:1">
                        <div id="pv-l-title" style="color:#00a8fc; font-weight:bold;">Titre</div>
                        <div id="pv-l-desc" style="font-size:14px; margin-top:5px; white-space:pre-wrap;">Message...</div>
                    </div>
                    <div class="pv-thumb" onclick="openPicker('leave', 'thumbnail')"><img id="l-img-thumb"></div>
                </div>
                <div class="pv-banner" onclick="openPicker('leave', 'banner')"><img id="l-img-banner"></div>
                <div style="display:flex; align-items:center; gap:8px; margin-top:10px; font-size:11px; color:#b5bac1;">
                    <div class="pv-f-icon" onclick="openPicker('leave', 'footer_icon')"><img id="l-img-footer"></div>
                    <span id="pv-l-footer">Footer</span>
                </div>
            </div>
            <div class="card">
                <h2>Départ</h2>
                <label>Couleur</label><input type="color" id="l-color" oninput="sync('leave')">
                <label>Titre</label><input type="text" id="l-title" oninput="sync('leave')">
                <label>Message</label><textarea id="l-desc" rows="3" oninput="sync('leave')"></textarea>
                <label>Footer</label><input type="text" id="l-footer" oninput="sync('leave')">
                <label>Salon</label><select id="l-channel"></select>
                <button class="btn btn-save" onclick="save()">SAUVEGARDER</button>
                <button class="btn" style="background:#5865f2; color:white;" onclick="test('leave')">TESTER</button>
            </div>
        </div>

        <div id="admin" class="section"><div class="card"><h2>Admin</h2><div id="admin-list"></div><button class="btn btn-save" onclick="save()">SAUVER</button></div></div>
        <div id="gallery" class="section"><div class="card"><h2>Galerie</h2><input type="file" id="f-up" onchange="upload()"><div id="g-list" class="gallery-grid" style="margin-top:15px;"></div><button class="btn btn-save" onclick="showTab(lastTab)">RETOUR</button></div></div>
    </main>

    <script>
        let db = {}; let activeMode = ''; let activeType = ''; let lastTab = 'welcome';

        async function init() {
            const res = await fetch('/api/get_data');
            db = await res.json();
            const chans = db.channels.map(c => `<option value="${c.id}"># ${c.name}</option>`).join('');
            document.getElementById('w-channel').innerHTML = chans;
            document.getElementById('l-channel').innerHTML = chans;

            const setup = (m) => {
                const p = m[0]; const c = db.config[m];
                document.getElementById(`${p}-title`).value = c.title || "";
                document.getElementById(`${p}-desc`).value = c.desc || "";
                document.getElementById(`${p}-footer`).value = c.footer || "";
                document.getElementById(`${p}-color`).value = c.color || "#ed4245";
                document.getElementById(`${p}-channel`).value = c.channel || "";
                setImg(m, 'thumbnail', c.thumbnail); setImg(m, 'banner', c.banner); setImg(m, 'footer_icon', c.footer_icon);
            };
            setup('welcome'); setup('leave');
            renderGallery(); sync('welcome'); sync('leave');
        }

        function sync(mode) {
            const p = mode[0];
            document.getElementById(`pv-box-${mode}`).style.borderLeftColor = document.getElementById(`${p}-color`).value;
            document.getElementById(`pv-${p}-title`).innerText = document.getElementById(`${p}-title`).value || "Titre";
            document.getElementById(`pv-${p}-desc`).innerText = document.getElementById(`${p}-desc`).value || "Message...";
            document.getElementById(`pv-${p}-footer`).innerText = document.getElementById(`${p}-footer`).value || "Footer";
        }

        function setImg(m, t, u) {
            const el = document.getElementById(`${m[0]}-img-${t === 'footer_icon' ? 'footer' : t}`);
            if(!el) return;
            if(u) { el.src = u; el.style.display='block'; el.dataset.url=u; } else { el.style.display='none'; el.dataset.url=""; }
        }

        function openPicker(m, t) { activeMode = m; activeType = t; lastTab = m; showTab('gallery'); }
        function selectImg(u) { setImg(activeMode, activeType, u); showTab(activeMode); sync(activeMode); }

        async function upload() {
            const fd = new FormData(); fd.append('file', document.getElementById('f-up').files[0]);
            const r = await (await fetch('/api/upload', {method:'POST', body:fd})).json();
            db.images.push(r.path); renderGallery(); selectImg(r.path);
        }

        function renderGallery() { document.getElementById('g-list').innerHTML = db.images.map(i => `<img src="${i}" style="width:100%;height:100px;object-fit:cover;border-radius:5px;" onclick="selectImg('${i}')">`).join(''); }

        async function save() {
            const getConf = (m) => {
                const p = m[0];
                return {
                    title: document.getElementById(`${p}-title`).value, desc: document.getElementById(`${p}-desc`).value,
                    footer: document.getElementById(`${p}-footer`).value, color: document.getElementById(`${p}-color`).value,
                    channel: document.getElementById(`${p}-channel`).value,
                    thumbnail: document.getElementById(`${p}-img-thumb`).dataset.url || "",
                    banner: document.getElementById(`${p}-img-banner`).dataset.url || "",
                    footer_icon: document.getElementById(`${p}-img-footer`).dataset.url || ""
                };
            };
            const config = { welcome: getConf('welcome'), leave: getConf('leave'), admin_roles: [] };
            await fetch('/api/save', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(config)});
            alert("Sauvegardé !");
        }

        async function test(mode) {
            const p = mode[0];
            const conf = { channel: document.getElementById(`${p}-channel`).value, title: document.getElementById(`${p}-title`).value, desc: document.getElementById(`${p}-desc`).value, color: document.getElementById(`${p}-color`).value, thumbnail: document.getElementById(`${p}-img-thumb`).dataset.url, banner: document.getElementById(`${p}-img-banner`).dataset.url, footer_icon: document.getElementById(`${p}-img-footer`).dataset.url, footer: document.getElementById(`${p}-footer`).value };
            await fetch('/api/test_message', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({mode, config:conf})});
        }

        function toggleSidebar(e) { e.stopPropagation(); document.getElementById('sidebar').classList.toggle('open'); }
        function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); }
        function toggleSubmenu(id, e) { e.stopPropagation(); document.getElementById(id).classList.toggle('show'); }
        function showTab(id, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item, .sub-item').forEach(n => n.classList.remove('active'));
            if(el) el.classList.add('active');
            closeSidebar();
        }
        window.onload = init;
    </script>
</body>
</html>

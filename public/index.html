<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BagBot | Dashboard Elite</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050505; --side: #000; --card: #0f0f0f; --accent: #ed4245; --border: #1e1e1e; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; }
        
        #sidebar { width: 280px; background: var(--side); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .brand { padding: 30px; font-size: 24px; font-weight: 900; color: var(--accent); text-align: center; border-bottom: 1px solid var(--border); }
        .nav-item { padding: 18px 30px; display: flex; align-items: center; gap: 15px; color: #888; cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: var(--accent); background: rgba(237, 66, 69, 0.1); border-right: 4px solid var(--accent); }

        main { flex-grow: 1; padding: 40px; overflow-y: auto; }
        .section { display: none; max-width: 900px; margin: 0 auto; }
        .section.active { display: block; }

        /* DISCORD MOCKUP */
        .discord-mockup { background: #2b2d31; border-left: 4px solid var(--accent); border-radius: 4px; padding: 15px; margin-bottom: 25px; max-width: 500px; }
        .embed-title { color: #00a8fc; font-weight: bold; }
        .embed-desc { font-size: 14px; color: #dbdee1; margin: 5px 0; }
        .embed-banner { width: 100%; height: 180px; background: #1e1f22; border: 2px dashed #444; border-radius: 8px; margin-top: 10px; overflow: hidden; cursor: pointer; }
        .embed-banner img { width: 100%; height: 100%; object-fit: cover; }

        /* FORM */
        .card { background: var(--card); border: 1px solid var(--border); padding: 25px; border-radius: 15px; margin-bottom: 20px; }
        label { display: block; margin: 15px 0 5px; color: #888; font-size: 11px; font-weight: 800; text-transform: uppercase; }
        input, textarea, select { width: 100%; background: #000; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 8px; }
        .btn { width: 100%; padding: 15px; background: var(--accent); border: none; color: white; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        
        /* ROLES */
        .role-item { display: flex; align-items: center; justify-content: space-between; padding: 12px; border-bottom: 1px solid #1a1a1a; }
        .role-item input { width: 18px; height: 18px; accent-color: var(--accent); }
    </style>
</head>
<body>
    <nav id="sidebar">
        <div class="brand">BAGBOT</div>
        <div class="nav-item active" onclick="showSection('welcome', this)"><i class="fas fa-home"></i> BIENVENUE</div>
        <div class="nav-item" onclick="showSection('admin', this)"><i class="fas fa-user-shield"></i> ACCÈS PANEL</div>
    </nav>

    <main>
        <div id="welcome" class="section active">
            <div class="discord-mockup">
                <div id="pv-title" class="embed-title">Titre</div>
                <div id="pv-desc" class="embed-desc">Description...</div>
                <div class="embed-banner" onclick="alert('Ouvrir galerie')">
                    <img id="pv-banner-img" style="display:none">
                </div>
            </div>

            <div class="card">
                <label>Titre</label><input type="text" id="w-title" oninput="sync()">
                <label>Description</label><textarea id="w-desc" rows="4" oninput="sync()"></textarea>
                <label>Salon d'envoi</label><select id="w-chan"></select>
                <button class="btn" onclick="saveConfig()">ENREGISTRER</button>
                <button class="btn" style="background:#4e5058" onclick="testWelcome()">ENVOYER UN TEST</button>
            </div>
        </div>

        <div id="admin" class="section">
            <div class="card">
                <h2>Rôles autorisés</h2>
                <div id="admin-roles-list"></div>
                <button class="btn" onclick="saveConfig()">VALIDER</button>
            </div>
        </div>
    </main>

    <script>
        let serverData = {};

        async function init() {
            const res = await fetch('/api/get_data');
            serverData = await res.json();
            
            document.getElementById('w-chan').innerHTML = serverData.channels.map(c => `<option value="${c.id}"># ${c.name}</option>`).join('');
            document.getElementById('admin-roles-list').innerHTML = serverData.roles.map(r => `
                <div class="role-item">
                    <span>${r}</span>
                    <input type="checkbox" value="${r}" class="adm-ck" ${serverData.config.admin_roles.includes(r)?'checked':''}>
                </div>`).join('');
        }

        function showSection(id, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        function sync() {
            document.getElementById('pv-title').innerText = document.getElementById('w-title').value || "Titre";
            document.getElementById('pv-desc').innerText = document.getElementById('w-desc').value || "Description...";
        }

        async function saveConfig() {
            const data = {
                welcome: {
                    title: document.getElementById('w-title').value,
                    desc: document.getElementById('w-desc').value,
                    channel: document.getElementById('w-chan').value
                },
                admin_roles: Array.from(document.querySelectorAll('.adm-ck:checked')).map(i => i.value)
            };
            await fetch('/api/save', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)});
            alert("Sauvegardé !");
        }

        async function testWelcome() {
            const res = await fetch('/api/test_welcome', {method:'POST'});
            if(res.ok) alert("Test envoyé !");
        }

        window.onload = init;
    </script>
</body>
</html>

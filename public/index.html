<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>BAGBOT | Elite Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --bg: #050505; --side: #000; --card: #0f0f0f; --accent: #ed4245; 
            --border: #1a1a1a; --d-bg: #2b2d31; --text: #ffffff; --text-dim: #666;
        }

        * { box-sizing: border-box; }
        body { 
            background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; 
            margin: 0; display: flex; height: 100vh; overflow: hidden; 
        }

        /* SIDEBAR */
        #sidebar { 
            width: 280px; background: var(--side); border-right: 1px solid var(--border); 
            display: flex; flex-direction: column; transition: 0.4s ease; z-index: 2000;
        }
        .brand { padding: 35px; font-size: 26px; font-weight: 900; color: var(--accent); text-align: center; border-bottom: 1px solid var(--border); letter-spacing: 4px; }
        .nav-item { padding: 18px 30px; display: flex; align-items: center; gap: 15px; color: var(--text-dim); cursor: pointer; transition: 0.3s; font-weight: bold; text-transform: uppercase; font-size: 13px; }
        .nav-item.active { color: var(--accent); background: rgba(237, 66, 69, 0.05); border-right: 4px solid var(--accent); }

        /* MOBILE */
        .mobile-header { display: none; position: fixed; top: 0; left: 0; right: 0; height: 70px; background: var(--side); border-bottom: 1px solid var(--border); z-index: 1500; align-items: center; padding: 0 25px; }
        .burger { font-size: 26px; color: var(--accent); }

        main { flex-grow: 1; padding: 40px; overflow-y: auto; position: relative; }
        .section { display: none; max-width: 850px; margin: 0 auto; animation: fadeInUp 0.4s ease; }
        .section.active { display: block; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; } }

        /* --- EMBED DISCORD COMPLET --- */
        .preview-container { 
            background: var(--d-bg); border-left: 4px solid var(--accent); border-radius: 4px; 
            padding: 15px; margin-bottom: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        .pv-top { display: flex; justify-content: space-between; gap: 10px; }
        .pv-title { color: #00a8fc; font-weight: 700; font-size: 16px; margin-bottom: 4px; }
        .pv-desc { color: #dbdee1; font-size: 14px; white-space: pre-wrap; line-height: 1.4; }
        .pv-thumb { width: 60px; height: 60px; border-radius: 4px; border: 1px dashed #444; overflow: hidden; flex-shrink: 0; cursor: pointer; }
        .pv-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .pv-banner { width: 100%; height: 160px; margin-top: 10px; border-radius: 8px; border: 1px dashed #444; overflow: hidden; cursor: pointer; }
        .pv-banner img { width: 100%; height: 100%; object-fit: cover; }
        .pv-footer { margin-top: 10px; color: #949ba4; font-size: 11px; }

        /* --- DROPDOWN MULTI --- */
        .dropdown-box { position: relative; width: 100%; }
        .drop-btn { background: #000; border: 1px solid var(--border); padding: 15px; border-radius: 12px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
        .drop-menu { display: none; position: absolute; top: 100%; left: 0; right: 0; background: #0a0a0a; border: 1px solid var(--border); border-radius: 12px; z-index: 100; max-height: 200px; overflow-y: auto; margin-top: 5px; box-shadow: 0 10px 30px #000; }
        .drop-menu.show { display: block; }
        .drop-item { display: flex; align-items: center; gap: 12px; padding: 12px 20px; cursor: pointer; border-bottom: 1px solid #111; }
        .drop-item:hover { background: #151515; }
        .drop-item input { width: 18px; height: 18px; accent-color: var(--accent); }

        /* UI */
        .card { background: var(--card); border: 1px solid var(--border); padding: 30px; border-radius: 25px; margin-bottom: 30px; }
        label { display: block; margin: 20px 0 8px; color: #444; font-size: 11px; font-weight: 900; text-transform: uppercase; }
        input, textarea, select { width: 100%; background: #000; border: 1px solid var(--border); color: #fff; padding: 16px; border-radius: 12px; }
        .btn-elite { background: var(--accent); color: white; border: none; padding: 20px; border-radius: 15px; font-weight: 900; width: 100%; cursor: pointer; margin-top: 20px; }

        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        .gallery-card { background: #0a0a0a; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); position: relative; }
        .gallery-card img { width: 100%; height: 100px; object-fit: cover; cursor: pointer; }
        .del-btn { position: absolute; top: 5px; right: 5px; background: var(--accent); color: white; border: none; padding: 6px; border-radius: 5px; cursor: pointer; opacity: 0.8; }

        @media (max-width: 768px) {
            .mobile-header { display: flex; }
            #sidebar { position: fixed; left: -285px; height: 100vh; }
            #sidebar.open { left: 0; }
            main { padding: 100px 20px 40px; }
        }
    </style>
</head>
<body>

    <div class="mobile-header">
        <i class="fas fa-bars burger" onclick="toggleSide()"></i>
        <div style="font-weight: 900; color: var(--accent); margin-left: 20px;">BAGBOT</div>
    </div>

    <nav id="sidebar">
        <div class="brand">BAGBOT</div>
        <div class="nav-item active" onclick="showTab('welcome', this)"><i class="fas fa-paper-plane"></i> BIENVENUE</div>
        <div class="nav-item" onclick="showTab('gallery', this)"><i class="fas fa-images"></i> GALERIE</div>
        <div class="nav-item" onclick="showTab('admin', this)"><i class="fas fa-user-shield"></i> PERMISSIONS</div>
    </nav>

    <main onclick="closeSide()">
        <div id="welcome" class="section active">
            <div class="preview-container">
                <div class="pv-top">
                    <div style="flex-grow:1">
                        <div id="pv-title" class="pv-title">...</div>
                        <div id="pv-desc" class="pv-desc">...</div>
                    </div>
                    <div class="pv-thumb" onclick="openPicker('thumbnail')">
                        <img id="pv-thumb-img" style="display:none">
                    </div>
                </div>
                <div class="pv-banner" onclick="openPicker('banner')">
                    <img id="pv-banner-img" style="display:none">
                </div>
                <div id="pv-footer" class="pv-footer">...</div>
            </div>

            <div class="card">
                <h2>Configuration</h2>
                <label>Titre de l'embed</label>
                <input type="text" id="w-title" oninput="sync()">
                <label>Description</label>
                <textarea id="w-desc" rows="4" oninput="sync()"></textarea>
                <label>Pied de page (Footer)</label>
                <input type="text" id="w-footer" oninput="sync()">

                <label>Rôles de déclenchement (inclut @JOIN)</label>
                <div class="dropdown-box">
                    <div class="drop-btn" onclick="toggleDrop('w-drop')">
                        <span id="w-drop-label">Sélectionner...</span>
                        <i class="fas fa-chevron-down"></i>
                    </div>
                    <div id="w-drop" class="drop-menu"></div>
                </div>

                <label>Salon d'envoi</label>
                <select id="w-channel"></select>

                <button class="btn-elite" onclick="saveData()">SAUVEGARDER</button>
            </div>
        </div>

        <div id="gallery" class="section">
            <div class="card">
                <h2>Galerie & Suppression</h2>
                <div id="gallery-list" class="gallery-grid"></div>
            </div>
        </div>

        <div id="admin" class="section">
            <div class="card">
                <h2>Permissions Admin</h2>
                <div class="dropdown-box">
                    <div class="drop-btn" onclick="toggleDrop('a-drop')">
                        <span id="a-drop-label">Choisir les rôles...</span>
                        <i class="fas fa-chevron-down"></i>
                    </div>
                    <div id="a-drop" class="drop-menu"></div>
                </div>
                <button class="btn-elite" onclick="saveData()">APPLIQUER</button>
            </div>
        </div>
    </main>

    <script>
        let data = {};
        let activeType = '';

        async function init() {
            const res = await fetch('/api/get_data');
            data = await res.json();

            // Salon
            document.getElementById('w-channel').innerHTML = data.channels.map(c => `<option value="${c.id}"># ${c.name}</option>`).join('');
            document.getElementById('w-channel').value = data.config.welcome.channel;

            // Rôles
            renderDrop('w-drop', 'w-check', data.config.welcome.trigger_roles);
            renderDrop('a-drop', 'a-check', data.config.admin_roles);

            // Inputs
            const w = data.config.welcome;
            document.getElementById('w-title').value = w.title;
            document.getElementById('w-desc').value = w.desc;
            document.getElementById('w-footer').value = w.footer;

            if(w.banner) { const b = document.getElementById('pv-banner-img'); b.src = w.banner; b.style.display = 'block'; b.dataset.url = w.banner; }
            if(w.thumbnail) { const t = document.getElementById('pv-thumb-img'); t.src = w.thumbnail; t.style.display = 'block'; t.dataset.url = w.thumbnail; }

            renderGallery();
            sync();
        }

        function renderDrop(id, cls, selected) {
            document.getElementById(id).innerHTML = data.roles.map(r => `
                <div class="drop-item" onclick="this.querySelector('input').click(); event.stopPropagation();">
                    <input type="checkbox" class="${cls}" value="${r}" ${selected.includes(r)?'checked':''} onchange="upLab('${id}')" onclick="event.stopPropagation()">
                    <span>${r}</span>
                </div>
            `).join('');
            upLab(id);
        }

        function upLab(id) {
            const c = document.querySelectorAll(`#${id} input:checked`).length;
            document.getElementById(id+'-label').innerText = c > 0 ? c + " rôle(s)" : "Sélectionner...";
        }

        function renderGallery() {
            document.getElementById('gallery-list').innerHTML = data.images.map(img => `
                <div class="gallery-card">
                    <button class="del-btn" onclick="delImg('${img}')"><i class="fas fa-trash"></i></button>
                    <img src="${img}" onclick="pick('${img}')">
                </div>
            `).join('');
        }

        async function delImg(path) {
            if(!confirm("Supprimer ?")) return;
            await fetch('/api/delete_image', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({path}) });
            data.images = data.images.filter(i => i !== path);
            renderGallery();
        }

        function sync() {
            document.getElementById('pv-title').innerText = document.getElementById('w-title').value || "Titre";
            document.getElementById('pv-desc').innerText = document.getElementById('w-desc').value || "Description...";
            document.getElementById('pv-footer').innerText = document.getElementById('w-footer').value || "Footer...";
        }

        function openPicker(t) { activeType = t; showTab('gallery', document.querySelector('.nav-item:nth-child(2)')); }
        
        function pick(url) {
            if(!activeType) return;
            const el = document.getElementById(`pv-${activeType}-img`);
            el.src = url; el.style.display = 'block'; el.dataset.url = url;
            activeType = '';
            showTab('welcome', document.querySelector('.nav-item:nth-child(1)'));
        }

        async function saveData() {
            const config = {
                welcome: {
                    title: document.getElementById('w-title').value,
                    desc: document.getElementById('w-desc').value,
                    footer: document.getElementById('w-footer').value,
                    channel: document.getElementById('w-channel').value,
                    banner: document.getElementById('pv-banner-img').dataset.url || "",
                    thumbnail: document.getElementById('pv-thumb-img').dataset.url || "",
                    trigger_roles: Array.from(document.querySelectorAll('.w-check:checked')).map(i => i.value)
                },
                admin_roles: Array.from(document.querySelectorAll('.a-check:checked')).map(i => i.value)
            };
            await fetch('/api/save', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(config) });
            alert("Enregistré !");
        }

        function toggleDrop(id) { document.getElementById(id).classList.toggle('show'); }
        function toggleSide() { document.getElementById('sidebar').classList.toggle('open'); }
        function closeSide() { document.getElementById('sidebar').classList.remove('open'); }
        function showTab(id, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        window.onclick = (e) => { if(!e.target.closest('.dropdown-box')) document.querySelectorAll('.drop-menu').forEach(m => m.classList.remove('show')); };
        window.onload = init;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>BagBot Management</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050505; --panel: #0f0f0f; --accent: #ed4245; --border: #1e1e1e; --discord: #2b2d31; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        #sidebar { width: 260px; background: #000; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .nav-item { padding: 20px 30px; cursor: pointer; color: #888; font-weight: bold; transition: 0.2s; border-right: 4px solid transparent; }
        .nav-item.active { color: var(--accent); background: rgba(237,66,69,0.1); border-right-color: var(--accent); }

        main { flex-grow: 1; padding: 40px; overflow-y: auto; }
        .section { display: none; max-width: 900px; margin: 0 auto; }
        .section.active { display: block; }

        .card { background: var(--panel); padding: 25px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; }
        input, textarea, select { width: 100%; background: #000; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 8px; margin-top: 10px; }
        
        /* Aperçu Embed */
        .preview-card { background: var(--discord); border-left: 4px solid var(--accent); padding: 15px; border-radius: 4px; margin-bottom: 20px; width: 100%; max-width: 500px; cursor: pointer; }
        .banner-box { width: 100%; height: 150px; border: 2px dashed #333; border-radius: 8px; margin-top: 10px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .banner-box img { width: 100%; height: 100%; object-fit: cover; }

        .role-list { max-height: 200px; overflow-y: auto; background: #000; padding: 10px; border-radius: 8px; margin-top: 10px; }
        .role-item { display: flex; align-items: center; gap: 10px; padding: 8px; border-bottom: 1px solid #1a1a1a; cursor: pointer; }

        .btn { width: 100%; padding: 15px; background: var(--accent); border: none; color: white; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        
        /* Modale Galerie */
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: var(--panel); padding: 25px; border-radius: 15px; width: 90%; max-width: 500px; border: 1px solid var(--border); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; max-height: 300px; overflow-y: auto; }
        .grid img { width: 100%; height: 100px; object-fit: cover; border-radius: 8px; cursor: pointer; border: 2px solid transparent; }
        .grid img:hover { border-color: var(--accent); }

        #overlay { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <div id="overlay">
        <h1 style="color:var(--accent)">BAGBOT ACCESS</h1>
        <button class="btn" style="width:auto; padding: 15px 40px" onclick="location.href='/api/login'">CONNEXION DISCORD</button>
    </div>

    <nav id="sidebar">
        <div style="padding: 30px; font-weight: 900; color: var(--accent); font-size: 24px;">BAGBOT</div>
        <div class="nav-item active" onclick="show('welcome', this)">BIENVENUE</div>
        <div class="nav-item" onclick="show('admin', this)">ADMINISTRATION</div>
        <div class="nav-item" onclick="show('files', this)">FICHIERS</div>
    </nav>

    <main>
        <div id="welcome" class="section active">
            <div class="preview-card" onclick="openGal()">
                <div id="p-title" style="font-weight:bold;">Titre du message</div>
                <div id="p-desc" style="color:#ccc; font-size:14px; margin-top:5px;">Description...</div>
                <div class="banner-box">
                    <img id="p-img" style="display:none">
                    <span id="p-txt"><i class="fas fa-image"></i> Ajouter une bannière</span>
                </div>
            </div>
            <div class="card">
                <h3>Editeur d'Embed</h3>
                <input type="text" id="w-title" placeholder="Titre" oninput="sync()">
                <textarea id="w-desc" placeholder="Description" rows="3" oninput="sync()"></textarea>
                <select id="w-chan"></select>
                <button class="btn" onclick="save()">SAUVEGARDER CONFIG</button>
                <button class="btn" style="background:#5865F2" onclick="fetch('/api/test_welcome',{method:'POST'})">TESTER L'ENVOI</button>
            </div>
        </div>

        <div id="admin" class="section">
            <div class="card">
                <h3>Accès au Dashboard</h3>
                <p style="font-size:12px; color:#888;">Coche les rôles autorisés à voir ce panel.</p>
                <div id="admin-roles" class="role-list"></div>
                <button class="btn" onclick="save()">METTRE À JOUR LES DROITS</button>
            </div>
        </div>

        <div id="files" class="section">
            <div class="card">
                <h3>Téléverser des images</h3>
                <input type="file" id="file-up" onchange="upload()">
                <div id="full-grid" class="grid"></div>
            </div>
        </div>
    </main>

    <div id="modal">
        <div class="modal-content">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h3>Ma Galerie</h3>
                <i class="fas fa-times" onclick="closeGal()" style="cursor:pointer"></i>
            </div>
            <div id="gal-grid" class="grid"></div>
        </div>
    </div>

    <script>
        let data = {};

        async function init() {
            const res = await fetch('/api/get_data');
            if(res.status === 401) { document.getElementById('overlay').style.display='flex'; return; }
            data = await res.json();
            
            document.getElementById('w-chan').innerHTML = data.channels.map(c => `<option value="${c.id}"># ${c.name}</option>`).join('');
            document.getElementById('admin-roles').innerHTML = data.roles.map(r => `
                <div class="role-item" onclick="const ck=this.querySelector('input'); ck.checked=!ck.checked;">
                    <input type="checkbox" value="${r}" class="adm-ck" ${data.config.admin_roles?.includes(r)?'checked':''}> ${r}
                </div>`).join('');

            if(data.config.welcome) {
                document.getElementById('w-title').value = data.config.welcome.title || "";
                document.getElementById('w-desc').value = data.config.welcome.desc || "";
                document.getElementById('w-chan').value = data.config.welcome.channel || "";
                if(data.config.welcome.banner) setImg(data.config.welcome.banner);
            }
            sync();
            loadGrids();
        }

        function sync() {
            document.getElementById('p-title').innerText = document.getElementById('w-title').value || "Titre";
            document.getElementById('p-desc').innerText = document.getElementById('w-desc').value || "Description...";
        }

        function show(id, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        function loadGrids() {
            const html = data.images.map(img => `<img src="${img}" onclick="setImg('${img}')">`).join('');
            document.getElementById('gal-grid').innerHTML = html;
            document.getElementById('full-grid').innerHTML = html;
        }

        function openGal() { document.getElementById('modal').style.display='flex'; }
        function closeGal() { document.getElementById('modal').style.display='none'; }

        function setImg(path) {
            const img = document.getElementById('p-img');
            img.src = path; img.style.display = 'block';
            img.dataset.path = path;
            document.getElementById('p-txt').style.display = 'none';
            closeGal();
        }

        async function upload() {
            const fd = new FormData(); fd.append('file', document.getElementById('file-up').files[0]);
            await fetch('/api/upload', {method:'POST', body:fd});
            init(); // Recharge tout
        }

        async function save() {
            const config = {
                welcome: {
                    title: document.getElementById('w-title').value,
                    desc: document.getElementById('w-desc').value,
                    channel: document.getElementById('w-chan').value,
                    banner: document.getElementById('p-img').dataset.path || ""
                },
                admin_roles: Array.from(document.querySelectorAll('.adm-ck:checked')).map(i => i.value)
            };
            await fetch('/api/save', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(config)});
            alert("Sauvegardé !");
        }

        window.onload = init;
    </script>
</body>
</html>

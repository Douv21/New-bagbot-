<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BagBot | Dashboard Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #ff0000; --bg: #000000; --side: #050505; --card: #111111; --input: #000000; --text: #ffffff; --subtext: #888888; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; }

        /* Sidebar */
        .sidebar { width: 260px; background: var(--side); height: 100vh; position: fixed; left: -260px; transition: 0.3s; z-index: 1000; border-right: 1px solid #222; }
        .sidebar.open { left: 0; }
        .nav-item { padding: 15px 25px; display: flex; align-items: center; gap: 12px; cursor: pointer; color: var(--subtext); transition: 0.2s; }
        .nav-item.active { background: #111; color: var(--accent); border-left: 4px solid var(--accent); }

        .main { flex: 1; padding: 20px; box-sizing: border-box; margin-left: 0; }
        .top-nav { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        
        /* Tabs Rouge */
        .tabs { display: flex; background: #111; padding: 5px; border-radius: 8px; width: fit-content; margin: 0 auto 25px; border: 1px solid #222; }
        .tab { padding: 10px 30px; border-radius: 5px; cursor: pointer; color: var(--subtext); font-weight: bold; font-size: 13px; }
        .tab.active { background: var(--accent); color: white; }

        /* Form & Cards */
        .card { background: var(--card); border-radius: 12px; padding: 25px; max-width: 850px; margin: auto; border: 1px solid #222; box-shadow: 0 0 20px rgba(255,0,0,0.05); }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        label { display: block; font-size: 10px; font-weight: 800; color: var(--subtext); text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px; }
        .input-box { background: var(--input); border: 1px solid #333; border-radius: 6px; }
        .input-box:focus-within { border-color: var(--accent); }
        select, input, textarea { width: 100%; background: transparent; border: none; color: white; padding: 10px; outline: none; font-size: 14px; box-sizing: border-box; }

        /* Emoji Grid */
        .emoji-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(40px, 1fr)); gap: 8px; background: #000; padding: 10px; border-radius: 6px; max-height: 100px; overflow-y: auto; border: 1px solid #222; }
        .emoji-item { cursor: pointer; padding: 5px; border-radius: 4px; display: flex; justify-content: center; border: 1px solid transparent; }
        .emoji-item.selected { background: #222; border-color: var(--accent); }
        .emoji-item img { width: 22px; height: 22px; }

        /* Preview Discord Pro */
        .preview-area { margin-top: 30px; background: #000; border-radius: 8px; padding: 20px; border: 1px dashed #333; }
        .discord-msg { background: #36393f; padding: 15px; border-radius: 4px; display: flex; gap: 15px; font-family: 'Whitney', sans-serif; }
        .discord-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
        .discord-author { font-weight: 600; color: white; font-size: 15px; margin-bottom: 4px; }
        .discord-embed { background: #2f3136; border-left: 4px solid var(--accent); padding: 12px; border-radius: 4px; margin-top: 5px; max-width: 450px; }
        .author-box { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .author-img { width: 20px; height: 20px; border-radius: 50%; object-fit: cover; }
        .footer-box { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #dcddde; margin-top: 8px; }
        .discord-btn { display: inline-flex; align-items: center; gap: 8px; background: #4f545c; color: white; padding: 6px 14px; border-radius: 3px; font-size: 13px; margin-top: 10px; }

        .btn-send { background: var(--accent); color: white; border: none; padding: 15px; width: 100%; border-radius: 6px; font-weight: 800; cursor: pointer; margin-top: 20px; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="sidebar" id="sidebar">
    <div style="padding: 25px; border-bottom: 1px solid #222; display: flex; justify-content: space-between;">
        <span style="font-weight: 900; color: var(--accent);">BAGBOT</span>
        <i class="fas fa-times" onclick="toggleMenu()" style="cursor:pointer;"></i>
    </div>
    <div class="nav-item active"><i class="fas fa-bolt"></i> Rôles Réactions</div>
    <div class="nav-item"><i class="fas fa-sliders-h"></i> Configuration</div>
</div>

<div class="main">
    <div class="top-nav">
        <button style="background:none; border:none; color:white; font-size:20px; cursor:pointer;" onclick="toggleMenu()"><i class="fas fa-bars"></i></button>
        <h2 style="margin:0; font-size: 18px;">CRÉATEUR DE RÔLES</h2>
    </div>

    <div class="tabs">
        <div class="tab active" id="tab-simple" onclick="setMode('simple')">MESSAGE SIMPLE</div>
        <div class="tab" id="tab-embed" onclick="setMode('embed')">EMBED PRO</div>
    </div>

    <div class="card">
        <div class="form-grid">
            <div>
                <label>Salon</label>
                <div class="input-box"><select id="cId" onchange="update()"></select></div>
            </div>
            <div>
                <label>Rôle</label>
                <div class="input-box"><select id="rId" onchange="update()"></select></div>
            </div>
        </div>

        <div class="form-grid">
            <div>
                <label>Nom de l'auteur</label>
                <div class="input-box"><input type="text" id="authName" placeholder="Ex: Staff BagBot" oninput="update()"></div>
            </div>
            <div>
                <label>Image de l'auteur (URL)</label>
                <div class="input-box"><input type="text" id="authImg" placeholder="Lien .png ou .jpg" oninput="update()"></div>
            </div>
        </div>

        <label>Texte du bouton</label>
        <div class="input-box" style="margin-bottom:15px;"><input type="text" id="btnLab" placeholder="Ex: Valider" oninput="update()"></div>

        <label>Émojis</label>
        <div class="emoji-grid" id="emojiPicker"></div>
        <input type="hidden" id="selectedEmoji">

        <div id="sec-simple" style="margin-top:20px;">
            <label>Contenu du message</label>
            <div class="input-box"><textarea id="msgTxt" rows="3" oninput="update()">Clique ici !</textarea></div>
        </div>

        <div id="sec-embed" style="display:none; margin-top:20px;">
            <label>Titre</label>
            <div class="input-box" style="margin-bottom:10px;"><input type="text" id="embTit" oninput="update()"></div>
            <label>Description</label>
            <div class="input-box"><textarea id="embDes" rows="3" oninput="update()"></textarea></div>
        </div>

        <label style="margin-top:20px;">Texte du Footer (Bas de page)</label>
        <div class="input-box"><input type="text" id="footTxt" placeholder="Ex: Propulsé par BagBot" oninput="update()"></div>

        <div class="preview-area">
            <label>Aperçu Discord</label>
            <div class="discord-msg">
                <div class="discord-avatar"></div>
                <div class="discord-content">
                    <div class="discord-author">BagBot <span style="background:#5865f2; font-size:10px; padding:2px 4px; border-radius:3px;">BOT</span></div>
                    
                    <div id="viewAuteur" class="author-box" style="display:none;">
                        <img src="" id="viewAuthImg" class="author-img">
                        <span id="viewAuthName" style="font-weight:bold; font-size:13px;"></span>
                    </div>

                    <div id="viewSimple">Contenu...</div>
                    
                    <div id="viewEmbed" class="discord-embed" style="display:none;">
                        <div style="font-weight:bold; color:white;" id="vEmbTit">Titre</div>
                        <div id="vEmbDes" style="font-size:14px; margin-top:4px;">Description...</div>
                    </div>

                    <div id="viewFooter" class="footer-box" style="display:none;">
                        <span id="vFootTxt"></span>
                    </div>

                    <div class="discord-btn">
                        <span id="vEmo"></span> <span id="vBtn">Bouton</span>
                    </div>
                </div>
            </div>
        </div>

        <button class="btn-send" onclick="send()">ENVOYER LE MESSAGE</button>
    </div>
</div>

<script>
    let mode = 'simple';
    function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); }
    function setMode(m) {
        mode = m;
        document.getElementById('tab-simple').classList.toggle('active', m === 'simple');
        document.getElementById('tab-embed').classList.toggle('active', m === 'embed');
        document.getElementById('sec-simple').style.display = m === 'simple' ? 'block' : 'none';
        document.getElementById('sec-embed').style.display = m === 'embed' ? 'block' : 'none';
        update();
    }

    async function load() {
        try {
            const [cR, rR, eR] = await Promise.all([fetch('/api/channels'), fetch('/api/roles'), fetch('/api/emojis')]);
            const c = await cR.json(); const r = await rR.json(); const e = await eR.json();
            document.getElementById('cId').innerHTML = c.map(x => `<option value="${x.id}"># ${x.name}</option>`).join('');
            document.getElementById('rId').innerHTML = r.map(x => `<option value="${x.id}">${x.name}</option>`).join('');
            document.getElementById('emojiPicker').innerHTML = e.map(x => `
                <div class="emoji-item" onclick="selEmo('${x.id}', '${x.url}', this)"><img src="${x.url}"></div>
            `).join('') + `<div class="emoji-item" onclick="selEmo('', '', this)"><i class="fas fa-ban"></i></div>`;
            update();
        } catch(e) { console.error("API Error"); }
    }

    function selEmo(id, url, el) {
        document.querySelectorAll('.emoji-item').forEach(i => i.classList.remove('selected'));
        el.classList.add('selected');
        document.getElementById('selectedEmoji').value = id;
        document.getElementById('vEmo').innerHTML = url ? `<img src="${url}" style="width:16px;">` : '';
    }

    function update() {
        const lab = document.getElementById('btnLab').value || document.getElementById('rId').options[document.getElementById('rId').selectedIndex]?.text || 'Rôle';
        document.getElementById('vBtn').innerText = lab;

        // Auteur
        const an = document.getElementById('authName').value;
        const ai = document.getElementById('authImg').value;
        document.getElementById('viewAuteur').style.display = an ? 'flex' : 'none';
        document.getElementById('viewAuthName').innerText = an;
        document.getElementById('viewAuthImg').src = ai;
        document.getElementById('viewAuthImg').style.display = ai ? 'block' : 'none';

        // Footer
        const ft = document.getElementById('footTxt').value;
        document.getElementById('viewFooter').style.display = ft ? 'block' : 'none';
        document.getElementById('vFootTxt').innerText = ft;

        if(mode === 'simple') {
            document.getElementById('viewSimple').style.display = 'block';
            document.getElementById('viewEmbed').style.display = 'none';
            document.getElementById('viewSimple').innerText = document.getElementById('msgTxt').value;
        } else {
            document.getElementById('viewSimple').style.display = 'none';
            document.getElementById('viewEmbed').style.display = 'block';
            document.getElementById('vEmbTit').innerText = document.getElementById('embTit').value || 'Titre';
            document.getElementById('vEmbDes').innerText = document.getElementById('embDes').value || 'Description...';
        }
    }

    async function send() {
        const fd = new FormData();
        fd.append('channelId', document.getElementById('cId').value);
        fd.append('roleId', document.getElementById('rId').value);
        fd.append('mode', mode);
        fd.append('buttonLabel', document.getElementById('btnLab').value);
        fd.append('emojiId', document.getElementById('selectedEmoji').value);
        fd.append('content', document.getElementById('msgTxt').value);
        fd.append('title', document.getElementById('embTit').value);
        fd.append('description', document.getElementById('embDes').value);
        fd.append('authorName', document.getElementById('authName').value);
        fd.append('authorIcon', document.getElementById('authImg').value);
        fd.append('footerText', document.getElementById('footTxt').value);

        const res = await fetch('/api/deploy', { method: 'POST', body: fd });
        const d = await res.json();
        alert(d.success ? "✅ Envoyé !" : "❌ Erreur");
    }
    load();
</script>
</body>
</html>

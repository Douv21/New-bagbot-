<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BagBot Dashboard v2</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #ed4245; --bg: #050505; --card: #111214; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: white; font-family: sans-serif; display: flex; height: 100vh; }
        
        /* SIDEBAR CORRIGÉE */
        #sidebar { width: 250px; background: #000; border-right: 1px solid #2b2d31; }
        .nav-item { padding: 15px 20px; display: flex; align-items: center; gap: 10px; color: #949ba4; font-weight: bold; }
        .nav-item.active { color: var(--accent); background: rgba(237, 66, 69, 0.1); }

        .main { flex: 1; padding: 20px; overflow-y: auto; }
        .embed { background: #2b2d31; border-left: 4px solid var(--accent); padding: 15px; border-radius: 4px; margin-bottom: 20px; }
        
        /* ZONES D'IMAGES */
        .img-zone { border: 1px dashed #444; background: #1e1f22; display: flex; align-items: center; justify-content: center; cursor: pointer; margin: 10px 0; overflow: hidden; }
        .banner { width: 100%; height: 120px; }
        .thumb { width: 60px; height: 60px; float: right; }
        
        input, textarea, select { width: 100%; background: #080808; border: 1px solid #2b2d31; color: white; padding: 12px; margin-bottom: 10px; border-radius: 6px; }
        .btn { width: 100%; background: var(--accent); color: white; border: none; padding: 15px; border-radius: 6px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <nav id="sidebar">
        <div style="padding: 25px; color: var(--accent); font-weight: 900; font-size: 20px;">BAGBOT</div>
        <div class="nav-item active"><i class="fas fa-home"></i> ACCUEIL</div>
        <div class="nav-item"><i class="fas fa-shield-alt"></i> AUTO-MOD</div>
    </nav>
    <div class="main">
        <div class="embed">
            <div id="p-thumb" class="img-zone thumb" onclick="edit('thumb')"><i class="fas fa-plus"></i></div>
            <div id="p-title" style="font-weight:bold; font-size:18px;" onclick="edit('title')">Titre de l'accueil</div>
            <div id="p-desc" style="color:#dbdee1;" onclick="edit('desc')">Cliquez ici pour changer la description...</div>
            <div id="p-banner" class="img-zone banner" onclick="edit('banner')"><i class="fas fa-image"></i></div>
            <div id="p-footer" style="font-size:12px; color:#949ba4; margin-top:10px;" onclick="edit('footer')">Footer • BagBot</div>
        </div>

        <div style="background: var(--card); padding: 15px; border-radius: 8px;">
            <label id="edit-label" style="font-size:12px; color:var(--accent)">MODE ÉDITION : Sélectionnez un élément</label>
            <input type="text" id="main-input" placeholder="Entrez la valeur ici...">
            <select id="chan-list"></select>
            <button class="btn" onclick="save()">VALIDER ET DÉPLOYER</button>
        </div>
    </div>

    <script>
        let current = '';
        function edit(type) {
            current = type;
            document.getElementById('edit-label').innerText = "MODIFIER : " + type.toUpperCase();
        }

        document.getElementById('main-input').oninput = (e) => {
            const val = e.target.value;
            if(current === 'title') document.getElementById('p-title').innerText = val;
            if(current === 'desc') document.getElementById('p-desc').innerText = val;
            if(current === 'footer') document.getElementById('p-footer').innerText = val;
            if(current === 'banner') document.getElementById('p-banner').innerHTML = `<img src="${val}" style="width:100%">`;
            if(current === 'thumb') document.getElementById('p-thumb').innerHTML = `<img src="${val}" style="width:100%">`;
        }

        async function save() {
            const data = {
                category: "accueil",
                settings: {
                    title: document.getElementById('p-title').innerText,
                    description: document.getElementById('p-desc').innerText,
                    channel: document.getElementById('chan-list').value
                }
            };
            await fetch('/api/save_settings', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            alert("Sauvegardé avec succès !");
        }

        window.onload = async () => {
            const res = await fetch('/api/get_server_info');
            const data = await res.json();
            document.getElementById('chan-list').innerHTML = data.channels.map(c => `<option value="${c.id}"># ${c.name}</option>`).join('');
        }
    </script>
</body>
</html>

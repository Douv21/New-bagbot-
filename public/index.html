<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BagBot Designer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #ed4245; --bg: #000000; --sidebar-w: 240px; --border: #2b2d31; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: white; font-family: sans-serif; display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar fixe */
        #sidebar { width: var(--sidebar-w); background: #080808; border-right: 1px solid var(--border); flex-shrink: 0; }
        .sidebar-header { padding: 25px 20px; font-weight: 900; color: var(--accent); font-size: 22px; }
        .nav-item { padding: 15px 20px; color: white; background: rgba(237,66,69,0.1); border-left: 4px solid var(--accent); display: flex; align-items: center; gap: 10px; }

        /* Contenu principal */
        .main { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        /* Embed fixe */
        .embed-card { width: 100%; max-width: 480px; background: #1e1f22; border-left: 4px solid var(--accent); padding: 16px; border-radius: 4px; position: relative; margin-top: 20px; }
        .thumb-zone { position: absolute; top: 16px; right: 16px; width: 80px; height: 80px; border: 2px dashed var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; }
        
        input, textarea, select { width: 100%; background: transparent; border: none; color: white; outline: none; margin-bottom: 10px; }
        .title-in { font-size: 18px; font-weight: bold; width: calc(100% - 90px); }

        .btn-send { width: 100%; max-width: 480px; background: var(--accent); color: white; padding: 15px; border: none; border-radius: 4px; font-weight: bold; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="sidebar">
        <div class="sidebar-header">BAGBOT</div>
        <div class="nav-item"><i class="fas fa-envelope"></i> Embeds/Message</div>
    </div>
    <div class="main">
        <div class="embed-card">
            <div class="thumb-zone"><i class="fas fa-plus"></i></div>
            <input type="text" class="title-in" value="Titre de l'Embed">
            <textarea rows="4" placeholder="Description..."></textarea>
        </div>
        <label style="align-self: flex-start; max-width: 480px; margin: 20px auto 5px; font-size: 12px; color: #949ba4;">SALON</label>
        <select id="chan-list" style="width: 100%; max-width: 480px; background: #111214; padding: 12px; border: 1px solid var(--border); border-radius: 4px;"></select>
        <button class="btn-send">DÉPLOYER</button>
    </div>

    <script>
        async function load() {
            try {
                const res = await fetch('/api/get_server_info');
                const data = await res.json();
                document.getElementById('chan-list').innerHTML = data.channels.map(c => `<option value="${c.id}"># ${c.name}</option>`).join('');
            } catch(e) {
                document.getElementById('chan-list').innerHTML = "<option>Bot hors ligne</option>";
            }
        }
        window.onload = load;
    </script>
</body>
</html>

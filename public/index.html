<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BagBot Designer Pro - Connexion Serveur</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* =========================================
           STYLE GLOBAL (NON COMPRESSÉ)
           ========================================= */
        :root {
            --accent-color: #d37f6a;
            --bg-main: #2b2d31;
            --bg-sidebar: #1e1f22;
            --bg-darker: #111214;
            --text-primary: #dbdee1;
            --text-muted: #949ba4;
            --embed-bg: #313338;
            --border-discord: #3f4147;
            --red-discord: #ed4245;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        #sidebar {
            width: 260px;
            background-color: var(--bg-sidebar);
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--bg-darker);
            transition: all 0.3s ease-in-out;
            flex-shrink: 0;
            z-index: 1000;
        }

        #sidebar.retract {
            width: 0;
            opacity: 0;
            pointer-events: none;
        }

        .sidebar-header {
            padding: 20px;
            background-color: var(--bg-darker);
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 60px;
        }

        .logo-text {
            color: var(--accent-color);
            font-weight: 800;
            font-size: 18px;
            text-transform: uppercase;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 20px;
            color: var(--text-muted);
            cursor: pointer;
            transition: 0.2s;
        }

        .nav-link.active, .nav-link:hover {
            background: rgba(211, 127, 106, 0.1);
            color: white;
            border-left: 4px solid var(--accent-color);
        }

        /* --- CONTENU --- */
        .main-view {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .top-bar {
            height: 60px;
            background: var(--bg-main);
            border-bottom: 1px solid var(--bg-darker);
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 20px;
        }

        .hamburger {
            font-size: 22px;
            color: var(--accent-color);
            cursor: pointer;
        }

        .workspace {
            flex-grow: 1;
            overflow-y: auto;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- APERCU EMBED --- */
        .embed-preview {
            width: 100%;
            max-width: 500px;
            background: var(--embed-bg);
            border-left: 4px solid var(--accent-color);
            border-radius: 4px;
            padding: 16px;
            position: relative;
        }

        .thumbnail-zone {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 80px;
            height: 80px;
            border: 2px dashed #4e5058;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .thumbnail-zone img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .author-box {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
        }

        .author-img {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #4e5058;
            cursor: pointer;
            overflow: hidden;
        }

        .author-img img { width: 100%; height: 100%; object-fit: cover; }

        .transparent-input {
            background: transparent;
            border: none;
            color: white;
            outline: none;
            width: 100%;
        }

        .title-input { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
        .desc-input { font-size: 14px; min-height: 40px; line-height: 1.4; color: var(--text-primary); }

        .banner-zone {
            width: 100%;
            height: 180px;
            border: 2px dashed #4e5058;
            border-radius: 4px;
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            overflow: hidden;
        }

        .banner-zone img { width: 100%; height: 100%; object-fit: cover; }

        /* --- CONTROLES --- */
        .controls {
            width: 100%;
            max-width: 500px;
            margin-top: 30px;
            padding-bottom: 80px;
        }

        .label {
            display: block;
            font-size: 11px;
            font-weight: 800;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .discord-select {
            width: 100%;
            background: var(--bg-darker);
            border: 1px solid #000;
            color: white;
            padding: 14px;
            border-radius: 4px;
            margin-bottom: 20px;
            outline: none;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 15px center;
            background-size: 16px;
        }

        .reaction-row {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg-sidebar);
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 10px;
            border: 1px solid var(--border-discord);
        }

        .emoji-btn {
            font-size: 24px;
            width: 48px;
            height: 48px;
            background: rgba(0,0,0,0.3);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 4px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-add { background: #4e5058; color: white; margin-bottom: 12px; }
        .btn-send { background: var(--accent-color); color: white; }

        /* --- MODAL EMOJI --- */
        #emoji-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal-content {
            background: #2f3136;
            width: 90%;
            max-width: 400px;
            height: 450px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
        }

        .modal-header {
            padding: 15px;
            background: var(--bg-darker);
            display: flex;
            justify-content: space-between;
        }

        .emoji-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
            padding: 15px;
            overflow-y: auto;
        }

        .emoji-item {
            font-size: 26px;
            text-align: center;
            cursor: pointer;
            padding: 5px;
            border-radius: 4px;
        }

        .emoji-item:hover { background: rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="sidebar-header">
            <span class="logo-text">BAGBOT PRO</span>
            <i class="fas fa-chevron-left" onclick="toggleSidebar()" style="cursor:pointer; color: #555;"></i>
        </div>
        <div class="nav-links">
            <div class="nav-link active"><i class="fas fa-edit"></i> Designer</div>
            <div class="nav-link"><i class="fas fa-cog"></i> Paramètres</div>
        </div>
    </div>

    <div class="main-view">
        <div class="top-bar">
            <i class="fas fa-bars hamburger" onclick="toggleSidebar()"></i>
            <span style="font-weight: 700; font-size: 13px; text-transform: uppercase;">Constructeur d'Embed</span>
        </div>

        <div class="workspace">
            
            <div class="embed-preview">
                <div class="thumbnail-zone" onclick="triggerFile('thumb')">
                    <i class="fas fa-plus" id="icon-thumb"></i>
                    <img id="img-thumb" style="display:none">
                </div>

                <div class="author-box">
                    <div class="author-img" onclick="triggerFile('author')">
                        <img id="img-author" style="display:none">
                    </div>
                    <input type="text" class="transparent-input" value="Auteur du message" style="font-size:13px; font-weight:600;">
                </div>

                <input type="text" class="transparent-input title-input" value="Titre de l'embed">
                <textarea class="transparent-input desc-input" placeholder="Votre message ici..."></textarea>

                <div class="banner-zone" onclick="triggerFile('banner')">
                    <i class="fas fa-image" id="icon-banner" style="font-size:32px; color:#4e5058"></i>
                    <img id="img-banner" style="display:none">
                </div>
            </div>

            <div class="controls">
                <label class="label">Salon Discord</label>
                <select class="discord-select" id="channel-dropdown">
                    <option value="">Chargement des salons...</option>
                </select>

                <label class="label">Rôles-Réactions</label>
                <div id="reactions-list"></div>

                <button class="btn btn-add" onclick="createNewReactionRow()">
                    <i class="fas fa-plus"></i> Ajouter une réaction
                </button>

                <button class="btn btn-send" onclick="sendEmbed()">
                    <i class="fas fa-paper-plane"></i> DÉPLOYER LE MESSAGE
                </button>
            </div>
        </div>
    </div>

    <div id="emoji-modal">
        <div class="modal-content">
            <div class="modal-header">
                <span style="font-weight:800; color:white;">Emojis Standards</span>
                <i class="fas fa-times" onclick="closeEmojiModal()" style="cursor:pointer;"></i>
            </div>
            <div class="emoji-grid" id="emoji-grid-box"></div>
        </div>
    </div>

    <input type="file" id="file-input" style="display:none" accept="image/*" onchange="previewImage(this)">

<script>
    // =========================================
    // JAVASCRIPT LOGIQUE SERVEUR
    // =========================================
    
    let activeFileTarget = "";
    let activeEmojiBtn = null;
    let cachedRoles = []; // Pour stocker les rôles reçus du serveur

    // Liste d'emojis pour le sélecteur
    const emojis = ["✅","❌","🔥","⭐","🚀","📢","🛠️","🎁","🎉","🤖","🔞","👋","💡","🛡️","💎","👑","🌈","🎯","🎧","🎮"];

    // --- 1. FONCTION CRUCIALE : RÉCUPÉRER LES VRAIS CHANNELS ET RÔLES ---
    async function fetchDiscordData() {
        try {
            // On appelle l'API Python
            const response = await fetch('/api/get_server_info');
            const data = await response.json();

            // Remplissage du sélecteur de salons
            const chanSelect = document.getElementById('channel-dropdown');
            if (data.channels && data.channels.length > 0) {
                chanSelect.innerHTML = data.channels.map(c => 
                    `<option value="${c.id}"># ${c.name}</option>`
                ).join('');
            } else {
                chanSelect.innerHTML = '<option value="">Aucun salon trouvé</option>';
            }

            // Mise en cache des rôles pour les lignes de réaction
            cachedRoles = data.roles || [];
            console.log("Données serveur chargées !");

        } catch (error) {
            console.error("Erreur lors de l'appel au bot :", error);
            document.getElementById('channel-dropdown').innerHTML = '<option value="">Erreur de connexion au bot</option>';
        }
    }

    // --- 2. GESTION DE LA SIDEBAR ---
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('retract');
    }

    // --- 3. GESTION DES RÉACTIONS ---
    function createNewReactionRow() {
        const list = document.getElementById('reactions-list');
        const row = document.createElement('div');
        row.className = 'reaction-row';
        
        // Création dynamique des options de rôles à partir du cache serveur
        const roleOptions = cachedRoles.map(r => 
            `<option value="${r.id}">${r.name}</option>`
        ).join('');

        row.innerHTML = `
            <div class="emoji-btn" onclick="openEmojiModal(this)">😀</div>
            <select class="discord-select" style="margin-bottom:0; flex-grow:1;">
                <option value="">Attribuer un rôle...</option>
                ${roleOptions}
            </select>
            <i class="fas fa-trash-alt" onclick="this.parentElement.remove()" style="color:var(--red-discord); cursor:pointer; padding:10px;"></i>
        `;
        list.appendChild(row);
    }

    // --- 4. EMOJI PICKER ---
    function openEmojiModal(btn) {
        activeEmojiBtn = btn;
        const grid = document.getElementById('emoji-grid-box');
        grid.innerHTML = emojis.map(e => `<div class="emoji-item" onclick="pickEmoji('${e}')">${e}</div>`).join('');
        document.getElementById('emoji-modal').style.display = 'flex';
    }

    function closeEmojiModal() {
        document.getElementById('emoji-modal').style.display = 'none';
    }

    function pickEmoji(e) {
        if(activeEmojiBtn) activeEmojiBtn.innerText = e;
        closeEmojiModal();
    }

    // --- 5. IMAGES ---
    function triggerFile(t) {
        activeFileTarget = t;
        document.getElementById('file-input').click();
    }

    function previewImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = document.getElementById('img-' + activeFileTarget);
                const icon = document.getElementById('icon-' + activeFileTarget);
                img.src = e.target.result;
                img.style.display = 'block';
                if(icon) icon.style.display = 'none';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function sendEmbed() {
        alert("Envoi des données vers Discord...");
    }

    // --- LANCEMENT ---
    window.onload = function() {
        fetchDiscordData(); // Appelle le bot dès l'ouverture
        if(window.innerWidth < 768) toggleSidebar();
    };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BagBot Builder</title>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --accent: #ff4d4d; --text: #e0e0e0; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; }
        
        .sidebar { width: 280px; background: #0c0c0c; height: 100vh; border-right: 1px solid #333; }
        .nav-item { padding: 15px 25px; cursor: pointer; color: #888; display: flex; align-items: center; }
        .nav-item.active { background: #1a1a1a; color: white; border-left: 4px solid var(--accent); }

        .main { flex: 1; padding: 40px; display: flex; justify-content: center; overflow-y: auto; }
        .builder-container { width: 100%; max-width: 900px; display: grid; grid-template-columns: 1fr 350px; gap: 20px; }
        
        .panel { background: var(--card); border-radius: 8px; padding: 25px; border: 1px solid #333; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .tab-btn { background: #333; border: none; color: white; padding: 8px 15px; border-radius: 4px; cursor: pointer; }
        .tab-btn.active { background: var(--accent); }

        label { display: block; margin: 15px 0 8px; font-weight: bold; font-size: 0.85rem; color: var(--accent); }
        input, select, textarea { width: 100%; padding: 12px; background: #2a2a2a; border: 1px solid #444; color: white; border-radius: 5px; box-sizing: border-box; }
        
        /* Preview Style (DraftBot like) */
        .preview { background: #2f3136; border-left: 4px solid var(--accent); padding: 15px; border-radius: 4px; position: sticky; top: 0; }
        .preview-title { font-weight: bold; margin-bottom: 5px; }
        .preview-img { width: 100%; border-radius: 4px; margin-top: 10px; display: none; }
        
        .btn-deploy { background: var(--accent); color: white; border: none; padding: 15px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 20px; transition: 0.2s; }
        .btn-deploy:hover { background: #cc0000; transform: scale(1.02); }
    </style>
</head>
<body>

<div class="sidebar">
    <div style="padding: 30px; font-size: 1.5rem; font-weight: 900; color: var(--accent);">BAG BOT</div>
    <div class="nav-item">🏠 Général</div>
    <div class="nav-item active">🎭 Rôles-Réactions</div>
    <div class="nav-item">🛡️ Modération</div>
</div>

<div class="main">
    <div class="builder-container">
        <div class="panel">
            <h2>Configurez votre message</h2>
            <div class="tabs">
                <button class="tab-btn active">Contenu</button>
                <button class="tab-btn">Image</button>
                <button class="tab-btn">Embed</button>
            </div>

            <label>Salon de destination</label>
            <select id="channelId"><option>Chargement...</option></select>

            <label>Rôle à attribuer</label>
            <select id="roleId"><option>Chargement...</option></select>

            <label>Titre de l'Embed</label>
            <input type="text" id="title" placeholder="Titre du message..." oninput="updatePreview()">

            <label>Description (Contenu)</label>
            <textarea id="description" rows="4" placeholder="Tapez votre texte ici..." oninput="updatePreview()"></textarea>

            <label>URL de l'image (Optionnel)</label>
            <input type="text" id="imageUrl" placeholder="https://..." oninput="updatePreview()">

            <label>Mode d'affichage</label>
            <select id="displayType">
                <option value="button">Bouton</option>
                <option value="select">Sélecteur (Menu déroulant)</option>
            </select>
        </div>

        <div class="preview-panel">
            <h3 style="margin-top: 0;">Aperçu direct</h3>
            <div class="preview">
                <div class="preview-title" id="pre-title">Titre de l'Embed</div>
                <div id="pre-desc">Ceci est la description du message tel qu'il apparaîtra sur Discord.</div>
                <img id="pre-img" class="preview-img" src="">
                <div style="margin-top: 15px; background: #4f545c; padding: 8px; border-radius: 3px; text-align: center; font-size: 0.8rem;">
                    Exemple de Bouton / Sélecteur
                </div>
            </div>
            <button class="btn-deploy" onclick="deploy()">DÉPLOYER LE MESSAGE</button>
        </div>
    </div>
</div>

<script>
    function updatePreview() {
        document.getElementById('pre-title').innerText = document.getElementById('title').value || "Titre de l'Embed";
        document.getElementById('pre-desc').innerText = document.getElementById('description').value || "Ceci est la description du message...";
        const img = document.getElementById('imageUrl').value;
        const preImg = document.getElementById('pre-img');
        if(img) { preImg.src = img; preImg.style.display = 'block'; } 
        else { preImg.style.display = 'none'; }
    }

    async function load() {
        const [c, r] = await Promise.all([fetch('/api/channels'), fetch('/api/roles')]);
        const channels = await c.json();
        const roles = await r.json();
        document.getElementById('channelId').innerHTML = channels.map(x => `<option value="${x.id}"># ${x.name}</option>`).join('');
        document.getElementById('roleId').innerHTML = roles.map(x => `<option value="${x.id}">${x.name}</option>`).join('');
    }

    async function deploy() {
        const data = {
            channelId: document.getElementById('channelId').value,
            roleId: document.getElementById('roleId').value,
            title: document.getElementById('title').value,
            description: document.getElementById('description').value,
            imageUrl: document.getElementById('imageUrl').value,
            displayType: document.getElementById('displayType').value
        };
        await fetch('/update-bot', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
        alert("✅ Message envoyé !");
    }
    load();
</script>

</body>
</html>

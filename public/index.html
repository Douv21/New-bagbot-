<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BagBot Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050505; --panel: #0f0f0f; --accent: #ed4245; --border: #1e1e1e; --discord-bg: #2b2d31; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: var(--bg); color: white; display: flex; }

        /* SIDEBAR */
        #sidebar { width: 260px; background: #000; border-right: 1px solid var(--border); height: 100vh; position: fixed; left: 0; z-index: 1000; transition: 0.3s; }
        main { flex: 1; margin-left: 260px; width: calc(100% - 260px); min-height: 100vh; }

        @media (max-width: 900px) {
            #sidebar { left: -260px; }
            #sidebar.open { left: 0; }
            main { margin-left: 0; width: 100%; }
            .menu-toggle { display: block !important; }
        }

        .menu-toggle { position: fixed; top: 15px; left: 15px; z-index: 1100; display: none; background: var(--accent); padding: 10px; border-radius: 5px; cursor: pointer; }
        header { height: 70px; background: var(--panel); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding-left: 70px; font-weight: bold; }

        .content-section { display: none; padding: 20px; flex-direction: column; align-items: center; }
        .content-section.active { display: flex; }

        /* ROLES ALIGNMENT FIX */
        .option { padding: 12px 15px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #1a1a1a; cursor: pointer; width: 100%; }
        .option input { width: 18px; height: 18px; cursor: pointer; margin: 0; }
        .option span { flex: 1; font-size: 14px; }

        .card { width: 100%; max-width: 500px; background: var(--panel); padding: 20px; border-radius: 12px; border: 1px solid var(--border); }
        input, textarea, select { width: 100%; background: #000; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 8px; margin-bottom: 10px; }
        
        .dropdown-content { display: none; background: #0d0d0d; border: 1px solid var(--border); max-height: 250px; overflow-y: auto; width: 100%; }
        .dropdown-content.show { display: block; }

        /* GALERIE MODAL */
        #modal-gal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 5000; padding: 20px; }
        .gal-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 15px; }
        .gal-item { aspect-ratio: 16/9; border: 1px solid var(--border); overflow: hidden; }
        .gal-item img { width: 100%; height: 100%; object-fit: cover; cursor: pointer; }

        .btn { padding: 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; width: 100%; color: white; text-transform: uppercase; margin-bottom: 10px; }
        .btn-save { background: var(--accent); }
        .btn-test { background: #5865f2; }

        /* EMBED PREVIEW */
        .discord-embed { width: 100%; max-width: 500px; background: var(--discord-bg); border-left: 4px solid var(--accent); padding: 15px; border-radius: 4px; margin-bottom: 20px; position: relative; }
        .img-click { cursor: pointer; border: 1px dashed #444; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.3); }
        .p-thumb-box { width: 60px; height: 60px; float: right; }
        .p-banner-box { width: 100%; height: 100px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></div>
    <nav id="sidebar">
        <div style="padding: 25px; font-weight: 900; color: var(--accent); font-size: 20px;">BAGBOT</div>
        <div class="nav-item" onclick="show('BIENVENUE', this)" style="padding: 15px 25px; cursor: pointer;">BIENVENUE</div>
    </nav>

    <main>
        <header id="main-title">BIENVENUE</header>
        <section id="section-BIENVENUE" class="content-section active">
            <div class="discord-embed">
                <div class="img-click p-thumb-box" onclick="openGal('thumb')">
                    <img id="img-thumb" style="width:100%; display:none"><i class="fas fa-camera" id="icon-thumb"></i>
                </div>
                <div id="p-title" style="font-weight:bold">Titre</div>
                <div id="p-desc" style="font-size:14px; margin-top:5px">Description...</div>
                <div class="img-click p-banner-box" onclick="openGal('banner')">
                    <img id="img-banner" style="width:100%; display:none"><i class="fas fa-plus" id="icon-banner"></i>
                </div>
            </div>

            <div class="card">
                <input type="text" id="w-title" placeholder="Titre" oninput="sync()">
                <textarea id="w-desc" placeholder="Description" oninput="sync()"></textarea>
                <select id="w-chan"></select>
                <div style="background:#000; padding:12px; border:1px solid var(--border); cursor:pointer; margin-bottom:10px" onclick="document.getElementById('drop-roles').classList.toggle('show')">
                    Choisir les rôles <i class="fas fa-chevron-down" style="float:right"></i>
                </div>
                <div id="drop-roles" class="dropdown-content"></div>
                <button class="btn btn-save" onclick="save()">Sauvegarder</button>
                <button class="btn btn-test" onclick="testMessage()">Tester l'Embed</button>
            </div>
        </section>
    </main>

    <div id="modal-gal">
        <div style="max-width:500px; margin:auto; background:var(--panel); padding:20px; border-radius:10px">
            <h3>Galerie <span onclick="closeGal()" style="float:right; cursor:pointer">&times;</span></h3>
            <input type="file" id="file-in" style="display:none" onchange="uploadFile()">
            <button class="btn btn-test" onclick="document.getElementById('file-in').click()" style="margin-top:15px">Téléverser Image</button>
            <div id="gal-container" class="gal-grid"></div>
        </div>
    </div>

    <script>
        const API = window.location.origin;
        let targetSlot = '';

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
        function show(name, el) { 
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.getElementById('section-'+name).classList.add('active');
        }

        function sync() {
            document.getElementById('p-title').innerText = document.getElementById('w-title').value || "Titre";
            document.getElementById('p-desc').innerText = document.getElementById('w-desc').value || "Description...";
        }

        async function openGal(slot) {
            targetSlot = slot;
            document.getElementById('modal-gal').style.display = 'block';
            const res = await fetch(`${API}/api/images`);
            const data = await res.json();
            document.getElementById('gal-container').innerHTML = data.images.map(img => `
                <div class="gal-item"><img src="${API}${img}" onclick="selectImg('${img}')"></div>
            `).join('');
        }

        function selectImg(path) {
            const img = document.getElementById(`img-${targetSlot}`);
            img.src = API + path; img.style.display = 'block';
            img.dataset.path = path;
            if(document.getElementById(`icon-${targetSlot}`)) document.getElementById(`icon-${targetSlot}`).style.display = 'none';
            closeGal();
        }

        async function uploadFile() {
            const fd = new FormData();
            fd.append('file', document.getElementById('file-in').files[0]);
            await fetch(`${API}/api/upload`, { method: 'POST', body: fd });
            openGal(targetSlot);
        }

        function closeGal() { document.getElementById('modal-gal').style.display = 'none'; }

        async function save() {
            const data = {
                welcome: {
                    title: document.getElementById('w-title').value,
                    desc: document.getElementById('w-desc').value,
                    channel: document.getElementById('w-chan').value,
                    thumb: document.getElementById('img-thumb').dataset.path || "",
                    banner: document.getElementById('img-banner').dataset.path || "",
                    roles: Array.from(document.querySelectorAll('#drop-roles input:checked')).map(i => i.value)
                }
            };
            await fetch(`${API}/api/save_config`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
            alert("Sauvegardé !");
        }

        async function testMessage() {
            await save();
            await fetch(`${API}/api/test_welcome`, { method: 'POST' });
            alert("Test envoyé !");
        }

        async function init() {
            const res = await fetch(`${API}/api/get_server_info`);
            const data = await res.json();
            if(data.status === "loading") return setTimeout(init, 2000);
            document.getElementById('w-chan').innerHTML = data.channels.map(c => `<option value="${c.id}"># ${c.name}</option>`).join('');
            document.getElementById('drop-roles').innerHTML = data.all_roles.map(r => `
                <div class="option" onclick="this.querySelector('input').click()">
                    <input type="checkbox" value="${r}" onclick="event.stopPropagation()">
                    <span>${r}</span>
                </div>
            `).join('');
        }
        window.onload = init;
    </script>
</body>
</html>

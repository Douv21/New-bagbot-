<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>BagBot Panel v3</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050505; --panel: #0f0f0f; --accent: #ed4245; --border: #1e1e1e; --discord: #2b2d31; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        #sidebar { width: 260px; background: #000; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .nav-item { padding: 20px 30px; cursor: pointer; color: #888; font-weight: bold; border-right: 4px solid transparent; }
        .nav-item.active { color: var(--accent); background: rgba(237,66,69,0.1); border-right-color: var(--accent); }

        main { flex-grow: 1; padding: 40px; overflow-y: auto; }
        .section { display: none; max-width: 900px; margin: 0 auto; }
        .section.active { display: block; }

        .card { background: var(--panel); padding: 25px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; }
        input, textarea, select { width: 100%; background: #000; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 8px; margin-top: 10px; box-sizing: border-box;}
        
        /* Discord Preview */
        .preview-embed { background: var(--discord); border-left: 4px solid var(--accent); padding: 15px; border-radius: 4px; max-width: 500px; margin-bottom: 20px; cursor: pointer; }
        .preview-banner { width: 100%; height: 160px; border: 2px dashed #333; border-radius: 8px; margin-top: 10px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .preview-banner img { width: 100%; height: 100%; object-fit: cover; }

        .role-box { max-height: 180px; overflow-y: auto; background: #000; border-radius: 8px; padding: 10px; margin-top: 10px; border: 1px solid var(--border); }
        .role-item { display: flex; align-items: center; gap: 10px; padding: 10px; border-bottom: 1px solid #1a1a1a; cursor: pointer; font-size: 14px; }

        .btn { width: 100%; padding: 15px; background: var(--accent); border: none; color: white; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        
        /* Galerie Modal */
        #gal-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center; }
        .modal-body { background: var(--panel); padding: 25px; border-radius: 15px; width: 500px; border: 1px solid var(--border); }
        .img-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; max-height: 300px; overflow-y: auto; padding: 10px; }
        .img-grid img { width: 100%; height: 80px; object-fit: cover; cursor: pointer; border-radius: 5px; border: 2px solid transparent; }
        .img-grid img:hover { border-color: var(--accent); }
    </style>
</head>
<body>
    <nav id="sidebar">
        <div style="padding: 30px; font-weight: 900; color: var(--accent); font-size: 24px;">BAGBOT</div>
        <div class="nav-item active" onclick="show('welcome', this)"><i class="fas fa-door-open"></i> BIENVENUE</div>
        <div class="nav-item" onclick="show('roles', this)"><i class="fas fa-user-tag"></i> AUTO-RÔLES</div>
        <div class="nav-item" onclick="show('admin', this)"><i class="fas fa-lock"></i> ADMIN</div>
    </nav>

    <main>
        <div id="welcome" class="section active">
            <div class="preview-embed" onclick="openGal()">
                <div id="pv-title" style="font-weight:bold; font-size: 1.1em;">Titre du message</div>
                <div id="pv-desc" style="color:#dcddde; margin-top:8px;">Description...</div>
                <div class="preview-banner">
                    <img id="pv-img" style="display:none">
                    <span id="pv-hint"><i class="fas fa-image"></i> Cliquer pour bannière</span>
                </div>
            </div>
            <div class="card">
                <input type="text" id="w-title" placeholder="Titre (ex: Bienvenue {user})" oninput="sync()">
                <textarea id="w-desc" placeholder="Description (ex: {user} vient de rejoindre !)" rows="3" oninput="sync()"></textarea>
                <select id="w-chan"></select>
                <button class="btn" onclick="save()">SAUVEGARDER CONFIG</button>
            </div>
        </div>

        <div id="roles" class="section">
            <div class="card">
                <h3>Auto-Rôles</h3>
                <p style="color:#888; font-size: 13px;">Rôles donnés automatiquement aux nouveaux arrivants.</p>
                <div id="auto-roles-list" class="role-box"></div>
                <button class="btn" onclick="save()">METTRE À JOUR</button>
            </div>
        </div>

        <div id="admin" class="section">
            <div class="card">
                <h3>Accès au Panel</h3>
                <div id="admin-roles-list" class="role-box"></div>
                <button class="btn" onclick="save()">SAUVEGARDER</button>
            </div>
        </div>
    </main>

    <div id="gal-modal">
        <div class="modal-body">
            <div style="display:flex; justify-content:space-between; margin-bottom: 15px;">
                <h3>Galerie d'images</h3>
                <input type="file" id="up-input" style="display:none" onchange="upload()">
                <button onclick="document.getElementById('up-input').click()" style="background:none; border: 1px solid var(--accent); color: white; cursor: pointer;">+ Ajouter</button>
            </div>
            <div id="modal-grid" class="img-grid"></div>
            <button class="btn" onclick="closeGal()">FERMER</button>
        </div>
    </div>

    <script>
        let state = {};

        async function init() {
            const res = await fetch('/api/get_data');
            if(!res.ok) return;
            state = await res.json();
            
            // Remplir les salons
            document.getElementById('w-chan').innerHTML = state.channels.map(c => `<option value="${c.id}"># ${c.name}</option>`).join('');
            
            // Remplir les rôles
            const makeRoles = (id, key) => {
                document.getElementById(id).innerHTML = state.roles.map(r => `
                    <div class="role-item" onclick="const ck=this.querySelector('input'); ck.checked=!ck.checked;">
                        <input type="checkbox" value="${r}" class="${key}-ck" ${state.config[key]?.includes(r)?'checked':''}> ${r}
                    </div>`).join('');
            };
            makeRoles('auto-roles-list', 'auto_roles');
            makeRoles('admin-roles-list', 'admin_roles');

            // Remplir les valeurs existantes
            const w = state.config.welcome || {};
            document.getElementById('w-title').value = w.title || "";
            document.getElementById('w-desc').value = w.desc || "";
            document.getElementById('w-chan').value = w.channel || "";
            if(w.banner) setImg(w.banner);
            
            sync();
            updateGal();
        }

        function sync() {
            document.getElementById('pv-title').innerText = document.getElementById('w-title').value || "Titre";
            document.getElementById('pv-desc').innerText = document.getElementById('w-desc').value || "Description...";
        }

        function setImg(path) {
            const img = document.getElementById('pv-img');
            img.src = path; img.style.display = 'block';
            img.dataset.path = path;
            document.getElementById('pv-hint').style.display = 'none';
            closeGal();
        }

        function updateGal() {
            document.getElementById('modal-grid').innerHTML = state.images.map(img => `<img src="${img}" onclick="setImg('${img}')">`).join('');
        }

        async function upload() {
            const fd = new FormData(); fd.append('file', document.getElementById('up-input').files[0]);
            await fetch('/api/upload', {method:'POST', body:fd});
            init();
        }

        async function save() {
            const config = {
                welcome: {
                    title: document.getElementById('w-title').value,
                    desc: document.getElementById('w-desc').value,
                    channel: document.getElementById('w-chan').value,
                    banner: document.getElementById('pv-img').dataset.path || ""
                },
                auto_roles: Array.from(document.querySelectorAll('.auto_roles-ck:checked')).map(i => i.value),
                admin_roles: Array.from(document.querySelectorAll('.admin_roles-ck:checked')).map(i => i.value)
            };
            await fetch('/api/save', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(config)});
            alert("Sauvegardé !");
        }

        function show(id, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        function openGal() { document.getElementById('gal-modal').style.display='flex'; }
        function closeGal() { document.getElementById('gal-modal').style.display='none'; }

        window.onload = init;
    </script>
</body>
</html>

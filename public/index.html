<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BagBot Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #ff4d4d; --bg: #1e1f22; --card: #2b2d31; --text: #dbdee1; --draft-coral: #d37f6a; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 15px; }

        /* EMBED COMPLET */
        .discord-msg { background: #313338; border-radius: 8px; padding: 15px; display: flex; gap: 12px; margin-bottom: 20px; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: #ff4d4d; flex-shrink: 0; }
        .embed { background: #1e1f22; border-left: 4px solid var(--accent); border-radius: 4px; padding: 12px; position: relative; width: 100%; max-width: 450px; }
        
        .embed-author { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600; color: white; margin-bottom: 8px; cursor: pointer; }
        .author-icon { width: 20px; height: 20px; border-radius: 50%; background: #444; overflow: hidden; }
        .embed-title { font-size: 16px; font-weight: 700; color: white; margin-bottom: 4px; outline: none; }
        .embed-desc { font-size: 14px; color: #dbdee1; margin-bottom: 10px; outline: none; white-space: pre-wrap; }
        
        /* Media Slots */
        .embed-thumb { position: absolute; top: 12px; right: 12px; width: 60px; height: 60px; border-radius: 4px; border: 1px dashed #444; display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; }
        .embed-banner { width: 100%; border-radius: 4px; margin: 10px 0; border: 1px dashed #444; min-height: 80px; display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; }
        .embed-footer { font-size: 12px; color: #949ba4; display: flex; align-items: center; gap: 5px; margin-top: 8px; cursor: pointer; }

        /* CONFIGURATION */
        .card { background: var(--card); border-radius: 12px; padding: 20px; border: 1px solid #222; }
        .label-style { font-size: 11px; color: #b5bac1; text-transform: uppercase; font-weight: 800; margin-bottom: 8px; display: block; }
        select { width: 100%; background: #1e1f22; border: 1px solid #111; color: white; padding: 12px; border-radius: 6px; margin-bottom: 15px; }

        .reaction-row { background: #1e1f22; border-radius: 8px; padding: 10px; display: flex; align-items: center; gap: 10px; margin-top: 10px; border: 1px solid #111; }
        .emoji-trigger { font-size: 22px; cursor: pointer; width: 40px; height: 40px; background: #2b2d31; border-radius: 6px; display: flex; align-items: center; justify-content: center; }

        /* SÉLECTEUR EMOJI DRAFTBOT */
        #emojiPicker { position: fixed; bottom: 0; left: 0; width: 100%; height: 60vh; background: #111214; border-top-left-radius: 15px; border-top-right-radius: 15px; display: none; flex-direction: column; z-index: 10000; box-shadow: 0 -5px 25px rgba(0,0,0,0.5); }
        .picker-header { padding: 15px; }
        .search-bar { width: 100%; background: #1e1f22; border: none; padding: 10px; border-radius: 4px; color: white; box-sizing: border-box; }
        .emoji-content { display: flex; flex: 1; overflow: hidden; }
        .emoji-sidebar { width: 45px; background: #0b0b0b; display: flex; flex-direction: column; align-items: center; padding-top: 10px; gap: 20px; }
        .emoji-grid { flex: 1; overflow-y: auto; padding: 10px; display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; align-content: start; }
        .emoji-item { font-size: 28px; text-align: center; cursor: pointer; padding: 5px; border-radius: 5px; }
        .emoji-item:hover { background: #333; }

        .btn-add { background: var(--draft-coral); color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; font-weight: 700; cursor: pointer; margin-top: 15px; }
        .btn-deploy { background: var(--accent); color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: 700; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="top-header" style="text-align:center; padding: 20px;">
        <h3 style="margin:0;">Configuration du message</h3>
    </div>

    <div class="discord-msg">
        <div class="avatar"></div>
        <div class="embed">
            <div class="embed-thumb" onclick="setMedia('thumb')"><i class="fas fa-image" style="color:#333;"></i></div>
            <div class="embed-author" onclick="setMedia('author')">
                <div class="author-icon" id="preview-auth-img"></div>
                <span id="preview-auth-name">Nom de l'auteur</span>
            </div>
            <div class="embed-title" contenteditable="true">Role accès</div>
            <div class="embed-desc" contenteditable="true">Débloque l'accès aux contenus réservés :</div>
            <div class="embed-banner" onclick="setMedia('banner')"><i class="fas fa-image" style="color:#333; font-size: 24px;"></i></div>
            <div class="embed-footer" onclick="setMedia('footer')">
                <div class="author-icon" id="preview-foot-img" style="width:16px; height:16px;"></div>
                <span id="preview-foot-text">Footer</span>
            </div>
        </div>
    </div>

    <div class="card">
        <span class="label-style">Salon de réception</span>
        <select id="channels"><option>Chargement...</option></select>

        <div id="reactionsArea"></div>

        <button class="btn-add" onclick="addNewRow()">AJOUTER UN RÔLE RÉACTION</button>
        <button class="btn-deploy" onclick="deployMessage()">DÉPLOYER SUR DISCORD</button>
    </div>

    <div id="emojiPicker">
        <div class="picker-header">
            <input type="text" class="search-bar" placeholder="Choisissez un émoji">
        </div>
        <div class="emoji-content">
            <div class="emoji-sidebar">
                <i class="fas fa-clock" style="color:#888;"></i>
                <i class="fas fa-smile" style="color:#888;"></i>
                <i class="fas fa-leaf" style="color:#888;"></i>
            </div>
            <div class="emoji-grid" id="emojiGrid">
                </div>
        </div>
        <div style="padding: 10px; text-align: center; background: #0b0b0b; color: #555;" onclick="closeEmoji()">Fermer</div>
    </div>

<script>
    let activeBtn = null;
    const currentIp = "192.168.1.133:49500"; // Ton IP locale

    // Liste d'emojis exemple (à compléter avec ceux du serveur)
    const emojis = ['😀','🔥','🔞','🌙','📜','✅','⭐','💎','🎁','🛡️','🏹','🗡️','🧬','📸','🎭'];

    async function init() {
        try {
            const [cRes, rRes] = await Promise.all([
                fetch(`http://${currentIp}/api/channels`),
                fetch(`http://${currentIp}/api/roles`)
            ]);
            const channels = await cRes.json();
            window.allRoles = await rRes.json();
            
            document.getElementById('channels').innerHTML = channels.map(c => 
                `<option value="${c.id}"># ${c.name}</option>`).join('');
        } catch(e) { console.error("Erreur API"); }
    }

    function addNewRow() {
        const div = document.createElement('div');
        div.className = 'reaction-row';
        div.innerHTML = `
            <div class="emoji-trigger" onclick="openEmoji(this)">😀</div>
            <select style="margin:0; flex:1;">
                <option value="">Lier un rôle...</option>
                ${window.allRoles ? window.allRoles.map(r => `<option value="${r.id}">${r.name}</option>`).join('') : ''}
            </select>
            <i class="fas fa-times" style="color:#444; cursor:pointer;" onclick="this.parentElement.remove()"></i>
        `;
        document.getElementById('reactionsArea').appendChild(div);
    }

    function openEmoji(btn) {
        activeBtn = btn;
        const grid = document.getElementById('emojiGrid');
        grid.innerHTML = emojis.map(e => `<span class="emoji-item" onclick="selectEmoji('${e}')">${e}</span>`).join('');
        document.getElementById('emojiPicker').style.display = 'flex';
    }

    function selectEmoji(emoji) {
        if(activeBtn) activeBtn.innerText = emoji;
        closeEmoji();
    }

    function closeEmoji() { document.getElementById('emojiPicker').style.display = 'none'; }

    function setMedia(type) {
        const url = prompt(`URL de l'image (${type}) :`);
        if(!url) return;
        if(type === 'thumb') document.querySelector('.embed-thumb').innerHTML = `<img src="${url}" width="100%">`;
        if(type === 'banner') document.querySelector('.embed-banner').innerHTML = `<img src="${url}" width="100%">`;
        if(type === 'author') document.getElementById('preview-auth-img').innerHTML = `<img src="${url}" width="100%">`;
    }

    async function deployMessage() {
        const data = {
            channelId: document.getElementById('channels').value,
            embed: {
                title: document.querySelector('.embed-title').innerText,
                description: document.querySelector('.embed-desc').innerText
            }
        };
        
        const res = await fetch(`http://${currentIp}/api/deploy`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });
        
        if(res.ok) alert("Déployé !");
    }

    window.onload = init;
</script>
</body>
</html>

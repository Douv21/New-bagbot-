<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BagBot Elite Mobile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050505; --side: #000; --card: #0f0f0f; --accent: #ed4245; --border: #1a1a1a; --d-bg: #2b2d31; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: row; height: 100vh; overflow: hidden; }

        /* RESPONSIVE SIDEBAR */
        #sidebar { width: 260px; background: var(--side); border-right: 1px solid var(--border); flex-shrink: 0; transition: 0.3s; }
        .brand { padding: 25px; font-size: 20px; font-weight: 900; color: var(--accent); text-align: center; border-bottom: 1px solid var(--border); }
        .nav-item { padding: 15px 25px; display: flex; align-items: center; gap: 12px; color: #666; cursor: pointer; font-weight: bold; }
        .nav-item.active { color: var(--accent); background: rgba(237, 66, 69, 0.05); border-right: 4px solid var(--accent); }

        main { flex-grow: 1; padding: 20px; overflow-y: auto; width: 100%; }
        .section { display: none; max-width: 800px; margin: 0 auto; }
        .section.active { display: block; }

        /* DISCORD PREVIEW */
        .discord-ui { background: var(--d-bg); border-left: 4px solid var(--accent); border-radius: 4px; padding: 12px; margin-bottom: 20px; }
        .embed-header { display: flex; justify-content: space-between; gap: 10px; }
        .embed-title { color: #00a8fc; font-weight: bold; font-size: 15px; }
        .embed-thumb { width: 60px; height: 60px; border-radius: 6px; background: #1e1f22; border: 1px dashed #444; overflow: hidden; }
        .embed-banner { width: 100%; height: 140px; border-radius: 6px; background: #1e1f22; margin-top: 10px; border: 1px dashed #444; overflow: hidden; }
        .embed-thumb img, .embed-banner img { width: 100%; height: 100%; object-fit: cover; }

        /* CARDS */
        .card { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        label { display: block; margin: 15px 0 5px; color: #555; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        input, textarea, select { width: 100%; background: #000; border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 8px; box-sizing: border-box; }
        
        /* SELECTEUR MULTIPLE */
        select[multiple] { height: 100px; padding: 5px; }
        .hint { font-size: 11px; color: #444; margin-top: 4px; }

        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-main { background: var(--accent); color: white; }

        /* GALLERY MAIN PAGE */
        .gallery-main { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .img-card { background: #111; border-radius: 10px; overflow: hidden; border: 1px solid var(--border); }
        .img-card img { width: 100%; height: 100px; object-fit: cover; }

        /* MOBILE OPTIMIZATION */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            #sidebar { width: 100%; height: auto; flex-direction: row; border-right: none; border-bottom: 1px solid var(--border); }
            .brand { padding: 15px; border-bottom: none; border-right: 1px solid var(--border); }
            .nav-item { padding: 15px; font-size: 12px; flex: 1; justify-content: center; }
            .nav-item span { display: none; } /* Cache le texte pour laisser que les icônes sur petit tel */
            .nav-item.active { border-right: none; border-bottom: 3px solid var(--accent); }
            main { padding: 15px; }
        }

        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; }
        .modal-box { background: var(--card); width: 90%; max-width: 500px; padding: 20px; border-radius: 15px; }
    </style>
</head>
<body>

    <nav id="sidebar">
        <div class="brand">BAG</div>
        <div class="nav-item active" onclick="tab('welcome', this)"><i class="fas fa-home"></i> <span>BIENVENUE</span></div>
        <div class="nav-item" onclick="tab('gallery', this)"><i class="fas fa-images"></i> <span>GALERIE</span></div>
        <div class="nav-item" onclick="tab('admin', this)"><i class="fas fa-lock"></i> <span>ADMIN</span></div>
    </nav>

    <main>
        <div id="welcome" class="section active">
            <div class="discord-ui">
                <div class="embed-header">
                    <div style="flex-grow:1">
                        <div id="pv-title" class="embed-title">Titre</div>
                        <div id="pv-desc" style="font-size:13px; color:#aaa;">Description...</div>
                    </div>
                    <div class="embed-thumb" onclick="openPicker('thumb')"><img id="pv-thumb-img" style="display:none"></div>
                </div>
                <div class="embed-banner" onclick="openPicker('banner')"><img id="pv-banner-img" style="display:none"></div>
            </div>

            <div class="card">
                <label>Titre & Description</label>
                <input type="text" id="w-title" oninput="sync()" placeholder="Titre">
                <textarea id="w-desc" rows="3" oninput="sync()" placeholder="Message..." style="margin-top:8px;"></textarea>
                
                <label>Rôles de déclenchement</label>
                <select id="trigger-roles" multiple></select>
                <div class="hint">Maintenez Ctrl (ou appui long sur tel) pour en choisir plusieurs.</div>

                <label>Salon d'envoi</label>
                <select id="w-chan"></select>

                <button class="btn btn-main" onclick="save()">ENREGISTRER</button>
            </div>
        </div>

        <div id="gallery" class="section">
            <div id="main-gallery" class="gallery-main"></div>
        </div>

        <div id="admin" class="section">
            <div class="card">
                <label>Rôles accès Panel</label>
                <select id="admin-roles" multiple></select>
                <button class="btn btn-main" onclick="save()" style="margin-top:20px;">VALIDER LES DROITS</button>
            </div>
        </div>
    </main>

    <div id="modal">
        <div class="modal-box">
            <h3>Choisir une image</h3>
            <div id="picker-grid" class="gallery-main" style="max-height:300px; overflow-y:auto;"></div>
            <button class="btn" onclick="closePicker()" style="background:#222; color:white;">FERMER</button>
        </div>
    </div>

    <script>
        let server = { config: { welcome: {}, admin_roles: [] }, images: [], roles: [] };
        let currentTarget = '';

        async function init() {
            const res = await fetch('/api/get_data');
            server = await res.json();

            // Remplir sélecteurs (Salons & Rôles)
            document.getElementById('w-chan').innerHTML = server.channels.map(c => `<option value="${c.id}"># ${c.name}</option>`).join('');
            
            const roleOpts = server.roles.map(r => `<option value="${r}">${r}</option>`).join('');
            document.getElementById('trigger-roles').innerHTML = roleOpts;
            document.getElementById('admin-roles').innerHTML = roleOpts;

            // Galerie
            document.getElementById('main-gallery').innerHTML = server.images.map(img => `
                <div class="img-card"><img src="${img}"></div>
            `).join('');

            // Charger config
            const w = server.config.welcome;
            document.getElementById('w-title').value = w.title || "";
            document.getElementById('w-desc').value = w.desc || "";
            
            // Sélectionner les rôles déjà sauvegardés
            if(w.trigger_roles) Array.from(document.getElementById('trigger-roles').options).forEach(opt => {
                if(w.trigger_roles.includes(opt.value)) opt.selected = true;
            });
            if(server.config.admin_roles) Array.from(document.getElementById('admin-roles').options).forEach(opt => {
                if(server.config.admin_roles.includes(opt.value)) opt.selected = true;
            });

            if(w.banner) setImg('banner', w.banner);
            if(w.thumb) setImg('thumb', w.thumb);
            sync();
        }

        function tab(id, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active'); el.classList.add('active');
        }

        function sync() {
            document.getElementById('pv-title').innerText = document.getElementById('w-title').value || "Titre";
            document.getElementById('pv-desc').innerText = document.getElementById('w-desc').value || "Description...";
        }

        function openPicker(type) {
            currentTarget = type;
            document.getElementById('picker-grid').innerHTML = server.images.map(img => `
                <img src="${img}" onclick="selectImg('${img}')" style="cursor:pointer; border-radius:5px;">
            `).join('');
            document.getElementById('modal').style.display = 'flex';
        }
        function closePicker() { document.getElementById('modal').style.display = 'none'; }
        function selectImg(url) { setImg(currentTarget, url); closePicker(); }
        function setImg(t, url) {
            const img = document.getElementById(`pv-${t}-img`);
            img.src = url; img.style.display = 'block'; img.dataset.url = url;
        }

        async function save() {
            const config = {
                welcome: {
                    title: document.getElementById('w-title').value,
                    desc: document.getElementById('w-desc').value,
                    channel: document.getElementById('w-chan').value,
                    banner: document.getElementById('pv-banner-img').dataset.url || "",
                    thumb: document.getElementById('pv-thumb-img').dataset.url || "",
                    trigger_roles: Array.from(document.getElementById('trigger-roles').selectedOptions).map(o => o.value)
                },
                admin_roles: Array.from(document.getElementById('admin-roles').selectedOptions).map(o => o.value)
            };
            await fetch('/api/save', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(config) });
            alert("Sauvegardé !");
        }

        window.onload = init;
    </script>
</body>
</html>

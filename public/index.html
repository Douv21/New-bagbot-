<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BagBot Dashboard</title>
    <style>
        :root { --bg: #0f1012; --card: #18191c; --accent: #ff4d4d; --text: #f2f3f5; }
        body { margin: 0; font-family: 'Helvetica Neue', sans-serif; background: var(--bg); color: var(--text); padding: 10px; }
        
        .panel { background: var(--card); border-radius: 12px; padding: 15px; border: 1px solid #282a2e; max-width: 600px; margin: auto; }
        .tabs { display: flex; background: #2f3136; border-radius: 8px; margin-bottom: 20px; cursor: pointer; }
        .tab { flex: 1; text-align: center; padding: 12px; font-size: 14px; }
        .tab.active { background: var(--accent); border-radius: 8px; font-weight: bold; }

        label { display: block; margin: 15px 0 5px; font-size: 11px; color: #8e9297; text-transform: uppercase; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 12px; background: #202225; border: 1px solid #111; color: white; border-radius: 6px; box-sizing: border-box; }
        
        /* Aperçu Style Discord */
        .preview-area { margin-top: 25px; padding: 15px; background: #2f3136; border-radius: 8px; border-left: 4px solid var(--accent); }
        #pre-img { width: 100%; border-radius: 4px; margin-top: 10px; display: none; }
        
        .btn-send { background: var(--accent); color: white; border: none; padding: 18px; width: 100%; border-radius: 8px; font-weight: bold; margin-top: 20px; cursor: pointer; }
        .upload-row { display: flex; gap: 10px; margin-bottom: 5px; }
        .btn-file { background: #4f545c; color: white; border: none; padding: 10px; border-radius: 6px; flex: 1; cursor: pointer; }
    </style>
</head>
<body>

<div class="panel">
    <div class="tabs">
        <div class="tab active" id="t-simple" onclick="setMode('simple')">Simple</div>
        <div class="tab" id="t-embed" onclick="setMode('embed')">Embed</div>
    </div>

    <label>ID Message Existant (Optionnel)</label>
    <input type="text" id="messageId" placeholder="Collez l'ID ici pour modifier">

    <label>Salon</label>
    <select id="channelId"></select>

    <label>Rôle</label>
    <select id="roleId"></select>

    <label>Mode (DraftBot Style)</label>
    <select id="roleMode">
        <option value="normal">Normal (Ajout/Retrait)</option>
        <option value="inverse">Inversé</option>
        <option value="definitif">Définitif</option>
    </select>

    <div id="simple-fields">
        <label>Texte</label>
        <textarea id="simpleContent" rows="3" oninput="updatePreview()"></textarea>
    </div>

    <div id="embed-fields" style="display:none;">
        <label>Titre</label>
        <input type="text" id="title" oninput="updatePreview()">
        <label>Description</label>
        <textarea id="description" rows="3" oninput="updatePreview()"></textarea>
        <label>Image</label>
        <div class="upload-row">
            <button class="btn-file" onclick="document.getElementById('imageFile').click()">📁 Choisir un fichier</button>
            <input type="file" id="imageFile" style="display:none" accept="image/*" onchange="previewFile(this)">
        </div>
        <input type="text" id="imageUrl" placeholder="Ou lien URL..." oninput="updatePreview()">
    </div>

    <div class="preview-area">
        <div id="pre-title" style="font-weight:bold;">Aperçu du titre</div>
        <div id="pre-desc">Description en attente...</div>
        <img id="pre-img">
    </div>

    <button class="btn-send" onclick="deploy()">DÉPLOYER SUR DISCORD</button>
</div>

<script>
    let mode = 'simple';

    function setMode(m) {
        mode = m;
        document.getElementById('t-simple').classList.toggle('active', m === 'simple');
        document.getElementById('t-embed').classList.toggle('active', m === 'embed');
        document.getElementById('simple-fields').style.display = m === 'simple' ? 'block' : 'none';
        document.getElementById('embed-fields').style.display = m === 'embed' ? 'block' : 'none';
        updatePreview();
    }

    function previewFile(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => {
                const img = document.getElementById('pre-img');
                img.src = e.target.result;
                img.style.display = 'block';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function updatePreview() {
        if(mode === 'simple') {
            document.getElementById('pre-title').innerText = "Message Simple";
            document.getElementById('pre-desc').innerText = document.getElementById('simpleContent').value || "...";
            document.getElementById('pre-img').style.display = 'none';
        } else {
            document.getElementById('pre-title').innerText = document.getElementById('title').value || "Titre Embed";
            document.getElementById('pre-desc').innerText = document.getElementById('description').value || "Description...";
        }
    }

    async function load() {
        const [c, r] = await Promise.all([fetch('/api/channels'), fetch('/api/roles')]);
        const channels = await c.json();
        const roles = await r.json();
        document.getElementById('channelId').innerHTML = channels.map(x => `<option value="${x.id}"># ${x.name}</option>`).join('');
        document.getElementById('roleId').innerHTML = roles.map(x => `<option value="${x.id}">${x.name}</option>`).join('');
    }

    async function deploy() {
        const fd = new FormData();
        fd.append('mode', mode);
        fd.append('channelId', document.getElementById('channelId').value);
        fd.append('roleId', document.getElementById('roleId').value);
        fd.append('roleMode', document.getElementById('roleMode').value);
        fd.append('messageId', document.getElementById('messageId').value);
        fd.append('content', document.getElementById('simpleContent').value);
        fd.append('title', document.getElementById('title').value);
        fd.append('description', document.getElementById('description').value);
        fd.append('imageUrl', document.getElementById('imageUrl').value);
        
        const file = document.getElementById('imageFile').files[0];
        if (file) fd.append('imageFile', file);

        const res = await fetch('/update-bot', { method: 'POST', body: fd });
        const data = await res.json();
        alert(data.success ? "✅ Succès !" : "❌ Erreur : " + data.message);
    }
    load();
</script>
</body>
</html>

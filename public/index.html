<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BagBot Dashboard | Fix Final</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #ff4d4d; --bg: #111214; --card: #2b2d31; --text: #dbdee1; --sidebar: #0b0b0b; --draft-coral: #d37f6a; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 10px; display: flex; flex-direction: column; align-items: center; }

        /* --- EMBED DISCORD --- */
        .discord-msg { background: #313338; border-radius: 8px; padding: 15px; width: 100%; max-width: 500px; margin-bottom: 20px; box-sizing: border-box; }
        .embed { background: #1e1f22; border-left: 4px solid var(--accent); border-radius: 4px; padding: 12px; position: relative; }
        
        .up-slot { border: 1px dashed #4e5058; border-radius: 4px; display: flex; align-items: center; justify-content: center; cursor: pointer; background: rgba(0,0,0,0.2); overflow: hidden; position: relative; }
        .up-slot img { width: 100%; height: 100%; object-fit: cover; position: absolute; }
        
        .thumb-slot { position: absolute; top: 12px; right: 12px; width: 60px; height: 60px; }
        .banner-slot { width: 100%; min-height: 100px; margin: 10px 0; }
        
        .embed-author { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600; color: white; margin-bottom: 8px; }
        .auth-img { width: 22px; height: 22px; border-radius: 50%; overflow: hidden; }

        /* Champs de saisie URL sous les zones */
        .url-input { width: 100%; background: #0b0b0b; border: 1px solid #333; color: #888; font-size: 10px; padding: 4px 8px; border-radius: 4px; margin-top: 4px; outline: none; box-sizing: border-box; }

        /* --- CONFIGURATION --- */
        .card { background: var(--card); border-radius: 12px; padding: 15px; border: 1px solid #1a1a1a; width: 100%; max-width: 500px; box-sizing: border-box; margin-bottom: 15px; }
        .label-style { font-size: 10px; color: #b5bac1; text-transform: uppercase; font-weight: 800; margin-bottom: 8px; display: block; }
        select { width: 100%; background: #1e1f22; border: 1px solid #111; color: white; padding: 12px; border-radius: 8px; margin-bottom: 10px; outline: none; }

        .reaction-row { background: #1e1f22; border-radius: 8px; padding: 10px; display: flex; align-items: center; gap: 10px; margin-bottom: 8px; border: 1px solid #111; }
        .emoji-trigger { width: 40px; height: 40px; background: #2b2d31; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; }
        .emoji-trigger img { width: 26px; }

        .btn-deploy { background: var(--accent); color: white; border: none; padding: 16px; width: 100%; border-radius: 8px; font-weight: 800; cursor: pointer; margin-top: 10px; }

        /* --- MENU EMOJI --- */
        #emojiPicker { position: fixed; bottom: 0; left: 0; width: 100%; height: 70vh; background: #111214; border-top: 1px solid #333; display: none; flex-direction: column; z-index: 10000; border-radius: 20px 20px 0 0; }
        .emoji-body { display: flex; flex: 1; overflow: hidden; }
        .emoji-sidebar { width: 55px; background: var(--sidebar); display: flex; flex-direction: column; align-items: center; padding-top: 20px; gap: 25px; border-right: 1px solid #222; }
        .emoji-sidebar i, .emoji-sidebar img { font-size: 20px; color: #555; cursor: pointer; }
        .emoji-scroll { flex: 1; overflow-y: auto; padding: 15px; scroll-behavior: smooth; }
        .emoji-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; margin-bottom: 20px; }
        .emoji-item { font-size: 28px; text-align: center; cursor: pointer; }
        .emoji-item img { width: 30px; height: 30px; }
    </style>
</head>
<body>

    <h3 style="margin: 15px 0;">Dashboard BagBot</h3>

    <div class="discord-msg">
        <div class="embed">
            <div class="up-slot thumb-slot" onclick="openFile('thumb')">
                <i class="fas fa-plus" id="ic-thumb"></i>
                <img id="v-thumb" style="display:none">
            </div>
            <input type="text" class="url-input" placeholder="URL Miniature..." onchange="setImg('thumb', this.value)" style="width: 70%; margin-left: auto; display: block;">

            <div class="embed-author">
                <div class="up-slot auth-img" onclick="openFile('auth')" style="width:22px; height:22px;">
                    <img id="v-auth" style="display:none">
                </div>
                <span contenteditable="true" id="txt-auth">Nom de l'auteur</span>
            </div>
            <input type="text" class="url-input" placeholder="URL Image Auteur..." onchange="setImg('auth', this.value)">

            <div class="embed-title" contenteditable="true" id="txt-title" style="color:white; font-size:16px; font-weight:700; margin-top:10px;">Titre</div>
            <div class="embed-desc" contenteditable="true" id="txt-desc">Description du message...</div>

            <div class="up-slot banner-slot" onclick="openFile('banner')">
                <i class="fas fa-image" id="ic-banner"></i>
                <img id="v-banner" style="display:none">
            </div>
            <input type="text" class="url-input" placeholder="URL Bannière..." onchange="setImg('banner', this.value)">
        </div>
    </div>

    <div class="card">
        <span class="label-style">Salon de réception</span>
        <select id="sel-channels"><option value="">Chargement des salons...</option></select>
        
        <div id="reacs-container"></div>
        <button onclick="addReactionRow()" style="width:100%; padding:10px; background:#444; border:none; color:white; border-radius:5px; cursor:pointer;">+ AJOUTER UN RÔLE</button>
        
        <button class="btn-deploy" onclick="deployMessage()">DÉPLOYER SUR DISCORD</button>
    </div>

    <div id="emojiPicker">
        <div class="emoji-body">
            <div class="emoji-sidebar">
                <img src="https://draftbot.fr/assets/img/logo.png" style="width:24px;" onclick="goTo('sec-srv')">
                <i class="fas fa-smile" onclick="goTo('sec-smile')"></i>
            </div>
            <div class="emoji-scroll">
                <div id="sec-srv">
                    <p class="label-style">Émojis du serveur</p>
                    <div class="emoji-grid" id="grid-srv"></div>
                </div>
                <div id="sec-smile">
                    <p class="label-style">Smileys standards</p>
                    <div class="emoji-grid" id="grid-smile"></div>
                </div>
            </div>
        </div>
        <button onclick="document.getElementById('emojiPicker').style.display='none'" style="padding:15px; border:none; background:#0b0b0b; color:var(--accent); font-weight:800;">FERMER</button>
    </div>

    <input type="file" id="hidden-file" style="display:none" onchange="handleFile(this)">

<script>
    const API = "http://192.168.1.133:49500";
    let rolesData = [], activeTrigger = null, curZone = null;

    // 1. Initialisation des données
    async function start() {
        loadSmileys();
        try {
            const [cRes, rRes, eRes] = await Promise.all([
                fetch(`${API}/api/channels`),
                fetch(`${API}/api/roles`),
                fetch(`${API}/api/emojis`)
            ]);
            
            const channels = await cRes.json();
            rolesData = await rRes.json();
            const serverEmojis = await eRes.json();

            document.getElementById('sel-channels').innerHTML = channels.map(c => `<option value="${c.id}"># ${c.name}</option>`).join('');

            // Affichage des émojis personnalisés
            if(serverEmojis.length > 0) {
                document.getElementById('grid-srv').innerHTML = serverEmojis.map(e => 
                    `<span class="emoji-item" onclick="selectEmoji('${e.id}', true, '${e.url}')"><img src="${e.url}"></span>`).join('');
            }
        } catch(e) { console.error("Erreur de connexion au bot"); }
    }

    // 2. Gestion des Images (URL + Téléchargement)
    function openFile(zone) { curZone = zone; document.getElementById('hidden-file').click(); }
    
    function setImg(zone, src) {
        if(!src) return;
        const img = document.getElementById(`v-${zone}`);
        const ic = document.getElementById(`ic-${zone}`);
        if(ic) ic.style.display = 'none';
        img.src = src; img.style.display = 'block';
    }

    function handleFile(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => setImg(curZone, e.target.result);
            reader.readAsDataURL(input.files[0]);
        }
    }

    // 3. Réactions et Emojis
    function addReactionRow() {
        const div = document.createElement('div');
        div.className = 'reaction-row';
        div.innerHTML = `
            <div class="emoji-trigger" onclick="openPicker(this)">😀</div>
            <select style="margin:0; flex:1;">
                <option value="">Choisir un rôle...</option>
                ${rolesData.map(r => `<option value="${r.id}">${r.name}</option>`).join('')}
            </select>
            <i class="fas fa-trash" style="color:#444;" onclick="this.parentElement.remove()"></i>
        `;
        document.getElementById('reacs-container').appendChild(div);
    }

    function openPicker(btn) { activeTrigger = btn; document.getElementById('emojiPicker').style.display = 'flex'; }
    function selectEmoji(val, isCustom, url) {
        if(isCustom) activeTrigger.innerHTML = `<img src="${url}">`;
        else activeTrigger.innerText = val;
        document.getElementById('emojiPicker').style.display = 'none';
    }
    function goTo(id) { document.getElementById(id).scrollIntoView({behavior: "smooth"}); }

    function loadSmileys() {
        const list = ['😀','😃','😄','😁','😆','😅','😂','🤣','😊','😇','🙂','🙃','😉','😌','😍','🥰','😘','😗','😙','😚','😋','😛','😝','😜','🤪','🤨','🧐','🤓','😎','🤩','🥳','😏','😒','😞','😔','😟','😕','🙁','☹️','😣','😖','😫','😩','🥺','😢','😭','😤','😠','😡','🤬','🤯','😳','🥵','🥶','😱','😨','😰','😥','😓','🤗','🤔','🤭','🤫','🤥','😶','😐','😑','😬','🙄','😯','😦','😧','😮','😲','🥱','😴','🤤','😪','😵','🤐','🥴','🤢','🤮','🤧','😷','🤒','🤕','🔥','✅','❌','🔞'];
        document.getElementById('grid-smile').innerHTML = list.map(e => `<span class="emoji-item" onclick="selectEmoji('${e}', false)">${e}</span>`).join('');
    }

    // 4. DÉPLOIEMENT (Fonction d'envoi API)
    async function deployMessage() {
        const payload = {
            channelId: document.getElementById('sel-channels').value,
            title: document.getElementById('txt-title').innerText,
            description: document.getElementById('txt-desc').innerText,
            thumbnail: document.getElementById('v-thumb').src || null,
            banner: document.getElementById('v-banner').src || null
            // Tu peux ajouter ici la liste des réactions
        };

        try {
            const res = await fetch(`${API}/api/deploy`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if(res.ok) alert("Message déployé avec succès !");
            else alert("Erreur lors du déploiement.");
        } catch(e) { alert("Impossible de contacter le bot."); }
    }

    window.onload = start;
</script>
</body>
</html>

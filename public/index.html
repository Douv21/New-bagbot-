<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BagBot OS | Multimedia</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #ed4245; --bg: #050505; --card: #111214; --embed: #2b2d31; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; display: flex; height: 100vh; }

        /* SIDEBAR (Simple) */
        #sidebar { width: 260px; background: #000; border-right: 1px solid #2b2d31; position: fixed; left: -260px; height: 100%; transition: 0.3s; z-index: 1000; }
        #sidebar.open { left: 0; }

        .viewport { flex: 1; display: flex; flex-direction: column; width: 100%; }
        header { height: 60px; background: #080808; display: flex; align-items: center; padding: 0 20px; border-bottom: 1px solid #2b2d31; gap: 15px; }

        .content { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; align-items: center; }

        /* EMBED */
        .embed { background: var(--embed); border-left: 4px solid var(--accent); border-radius: 4px; padding: 16px; width: 100%; max-width: 500px; }
        .clickable { cursor: pointer; transition: 0.2s; border: 1px solid transparent; }
        .clickable:hover { border-color: var(--accent); background: rgba(255,255,255,0.05); }
        .banner { width: 100%; height: 140px; background: #1e1f22; border: 1px dashed #444; margin-top: 10px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .banner img { width: 100%; height: 100%; object-fit: cover; }

        /* MODALE IMAGE & TEXTE */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; display: none; flex-direction: column; padding: 20px; }
        .modal.active { display: flex; }
        .modal-content { background: var(--card); border-radius: 15px; padding: 20px; max-width: 500px; width: 100%; margin: auto; max-height: 80vh; overflow-y: auto; }

        /* GALERIE */
        .gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .gallery-item { position: relative; aspect-ratio: 1; background: #000; border-radius: 5px; overflow: hidden; border: 2px solid transparent; }
        .gallery-item.selected { border-color: var(--accent); }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }
        .delete-btn { position: absolute; top: 2px; right: 2px; background: rgba(237,66,69,0.8); border: none; color: white; border-radius: 3px; padding: 2px 5px; font-size: 10px; }

        input, textarea { width: 100%; background: #000; border: 1px solid #2b2d31; color: white; padding: 12px; border-radius: 8px; margin-bottom: 10px; }
        .btn { width: 100%; background: var(--accent); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; margin-top: 5px; cursor: pointer; }
        .btn-outline { background: transparent; border: 1px solid #444; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div style="padding: 40px 25px; color: var(--accent); font-weight: 900; font-size: 24px;">BAGBOT</div>
        <div style="padding: 15px 25px; color: white;">🏠 ACCUEIL</div>
    </div>

    <div class="viewport">
        <header>
            <i class="fas fa-bars" onclick="document.getElementById('sidebar').classList.toggle('open')"></i>
            <span style="font-weight: 800;">DASHBOARD ACCUEIL</span>
        </header>

        <div class="content">
            <div class="embed">
                <div class="clickable" onclick="openTextEdit('title')"><h3 id="p-title">Titre</h3></div>
                <div class="clickable" onclick="openTextEdit('desc')" style="margin-top: 10px;"><p id="p-desc">Description...</p></div>
                <div class="banner clickable" onclick="openImageEdit('banner')">
                    <div id="p-banner-box" style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;">
                        <i class="fas fa-image"></i>
                    </div>
                </div>
            </div>
            <button class="btn" onclick="saveAll()" style="max-width: 500px; margin-top: 20px;">DÉPLOYER SUR DISCORD</button>
        </div>
    </div>

    <div id="textModal" class="modal">
        <div class="modal-content">
            <h4 id="textModalTitle" style="margin-bottom: 15px;">ÉDITER</h4>
            <textarea id="textInput" rows="5"></textarea>
            <button class="btn" onclick="applyText()">VALIDER</button>
            <button class="btn btn-outline" onclick="closeModals()">ANNULER</button>
        </div>
    </div>

    <div id="imageModal" class="modal">
        <div class="modal-content">
            <h4 style="margin-bottom: 15px;">BIBLIOTHÈQUE D'IMAGES</h4>
            
            <label style="font-size: 11px;">PAR LIEN URL</label>
            <input type="text" id="imgUrlInput" placeholder="https://...">
            
            <label style="font-size: 11px;">TÉLÉVERSER DEPUIS MOBILE</label>
            <input type="file" id="fileInput" style="display:none" onchange="uploadImage(event)">
            <button class="btn btn-outline" onclick="document.getElementById('fileInput').click()">CHOISIR UN FICHIER</button>
            
            <div style="margin-top: 15px; border-top: 1px solid #2b2d31; padding-top: 10px;">
                <label style="font-size: 11px;">MES IMAGES ENREGISTRÉES</label>
                <div class="gallery" id="imageGallery"></div>
            </div>

            <button class="btn" onclick="applyImage()" style="margin-top: 20px;">UTILISER CETTE IMAGE</button>
            <button class="btn btn-outline" onclick="closeModals()">FERMER</button>
        </div>
    </div>

    <script>
        let currentTarget = '';
        let selectedImageUrl = '';

        function openTextEdit(type) {
            currentTarget = type;
            document.getElementById('textModalTitle').innerText = "MODIFIER " + type.toUpperCase();
            document.getElementById('textInput').value = document.getElementById('p-' + type).innerText;
            document.getElementById('textModal').classList.add('active');
        }

        function openImageEdit(type) {
            currentTarget = type;
            loadGallery();
            document.getElementById('imageModal').classList.add('active');
        }

        function closeModals() {
            document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));
        }

        function applyText() {
            document.getElementById('p-' + currentTarget).innerText = document.getElementById('textInput').value;
            closeModals();
        }

        function selectGalleryImage(url) {
            selectedImageUrl = url;
            document.getElementById('imgUrlInput').value = ""; // Priorité galerie
            loadGallery(); // Rafraîchit pour montrer la sélection
        }

        function applyImage() {
            const finalUrl = document.getElementById('imgUrlInput').value || selectedImageUrl;
            if(finalUrl) {
                document.getElementById('p-' + currentTarget + '-box').innerHTML = `<img src="${finalUrl}">`;
            }
            closeModals();
        }

        async function uploadImage(event) {
            const file = event.target.files[0];
            const formData = new FormData();
            formData.append('file', file);
            const res = await fetch('/api/upload', { method: 'POST', body: formData });
            const data = await res.json();
            loadGallery();
        }

        async function loadGallery() {
            const res = await fetch('/api/images');
            const data = await res.json();
            const gallery = document.getElementById('imageGallery');
            gallery.innerHTML = data.images.map(url => `
                <div class="gallery-item ${selectedImageUrl === url ? 'selected' : ''}" onclick="selectGalleryImage('${url}')">
                    <img src="${url}">
                    <button class="delete-btn" onclick="deleteImage(event, '${url}')">X</button>
                </div>
            `).join('');
        }

        async function deleteImage(event, url) {
            event.stopPropagation();
            if(!confirm("Supprimer cette image ?")) return;
            await fetch('/api/images/delete', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({url})
            });
            loadGallery();
        }

        async function saveAll() {
            const payload = {
                title: document.getElementById('p-title').innerText,
                desc: document.getElementById('p-desc').innerText,
                banner: document.querySelector('#p-banner-box img')?.src || ""
            };
            await fetch('/api/save_settings', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            alert("Déployé !");
        }
    </script>
</body>
</html>

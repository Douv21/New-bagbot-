<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BagBot Pro Mobile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #d37f6a; --bg: #2b2d31; --sidebar: #1e1f22; --text: #dbdee1; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); color: var(--text); overflow: hidden; display: flex; }

        /* SIDEBAR OVERLAY (Correction Bug Affichage) */
        #sidebar { position: fixed; left: -100%; top: 0; bottom: 0; width: 280px; background: var(--sidebar); z-index: 9999; transition: 0.3s; padding: 20px; box-shadow: 5px 0 15px rgba(0,0,0,0.5); }
        #sidebar.open { left: 0; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 9998; display: none; }
        
        .main { flex: 1; display: flex; flex-direction: column; height: 100vh; width: 100%; }
        .topbar { background: var(--sidebar); padding: 15px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #111; }
        
        /* BUILDER RESPONSIVE */
        .content { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .embed { background: #313338; border-radius: 8px; padding: 12px; width: 100%; max-width: 450px; border-left: 4px solid var(--accent); position: relative; }
        
        .slot { border: 2px dashed #4e5058; border-radius: 4px; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.2); cursor: pointer; min-height: 40px; position: relative; overflow: hidden; }
        .slot img { width: 100%; height: 100%; object-fit: cover; position: absolute; }
        
        .banner-slot { width: 100%; height: 150px; margin-top: 10px; }
        .thumb-slot { position: absolute; top: 12px; right: 12px; width: 65px; height: 65px; }

        /* EMOJI PICKER (DRAFTBOT STYLE) */
        #picker { position: fixed; bottom: -100%; left: 0; right: 0; height: 70vh; background: var(--bg); z-index: 10000; transition: 0.4s; border-radius: 20px 20px 0 0; display: flex; flex-direction: column; }
        #picker.open { bottom: 0; }
        .p-side { width: 60px; background: #111; display: flex; flex-direction: column; align-items: center; padding-top: 20px; gap: 20px; border-right: 1px solid #333; }
        .p-grid { flex: 1; overflow-y: auto; display: grid; grid-template-columns: repeat(5, 1fr); padding: 15px; gap: 10px; }
        .emo { font-size: 30px; text-align: center; cursor: pointer; }
        .emo img { width: 35px; height: 35px; }

        .btn-deploy { background: var(--accent); color: white; border: none; padding: 18px; width: 100%; border-radius: 8px; font-weight: bold; margin-top: 20px; font-size: 16px; }
        [contenteditable] { outline: none; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="closeMenu()"></div>
    <div id="sidebar">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
            <h2 style="color:var(--accent); margin:0;">BAGBOT PRO</h2>
            <i class="fas fa-times" onclick="closeMenu()" style="font-size:24px;"></i>
        </div>
        <div style="color:white; padding:15px 0; border-bottom:1px solid #333;"><i class="fas fa-edit"></i> Builder</div>
        <div style="color:#888; padding:15px 0;"><i class="fas fa-images"></i> Galerie</div>
    </div>

    <div class="main">
        <div class="topbar">
            <i class="fas fa-bars" onclick="openMenu()" style="color:var(--accent); font-size:24px;"></i>
            <span style="font-weight: bold;">Nouveau Message</span>
        </div>

        <div class="content">
            <div class="embed">
                <div class="thumb-slot slot" onclick="triggerImg('thumb')">
                    <i class="fas fa-plus" id="ic-thumb"></i>
                    <img id="v-thumb" style="display:none">
                </div>
                <div style="display:flex; align-items:center; gap:8px; margin-bottom:10px;">
                    <div class="slot" onclick="triggerImg('auth')" style="width:24px; height:24px; border-radius:50%; min-height:auto;">
                        <img id="v-auth" style="display:none">
                    </div>
                    <span contenteditable="true" id="txt-auth" style="font-size:13px; font-weight:600;">Nom de l'auteur</span>
                </div>
                <div id="txt-title" contenteditable="true" style="font-weight:bold; font-size:16px; color:white;">Titre de l'embed</div>
                <div id="txt-desc" contenteditable="true" style="font-size:14px;">Description...</div>
                <div class="banner-slot slot" onclick="triggerImg('banner')">
                    <i class="fas fa-image" id="ic-banner" style="font-size:30px; color:#4e5058"></i>
                    <img id="v-banner" style="display:none">
                </div>
            </div>

            <div style="width:100%; max-width:450px; margin-top:20px;">
                <label style="font-size:11px; color:#888;">SALON DISCORD</label>
                <select id="sel-chans" style="width:100%; padding:12px; background:#111; color:white; border:none; border-radius:8px; margin-bottom:15px;"></select>
                
                <div id="reacs"></div>
                <button onclick="addReacRow()" style="width:100%; padding:12px; background:#383a40; border:none; color:white; border-radius:8px;">+ AJOUTER UN RÔLE</button>
                <button class="btn-deploy" onclick="deploy()">🚀 DÉPLOYER MAINTENANT</button>
            </div>
        </div>
    </div>

    <div id="picker">
        <div style="display:flex; height:100%;">
            <div class="p-side"><i class="fas fa-smile"></i><i class="fas fa-users"></i></div>
            <div style="flex:1; display:flex; flex-direction:column;">
                <div style="padding:15px; background:#111; display:flex; justify-content:space-between;">
                    <b>Émojis</b><i class="fas fa-times" onclick="closePicker()"></i>
                </div>
                <div class="p-grid" id="emo-grid"></div>
            </div>
        </div>
    </div>

    <input type="file" id="f-in" style="display:none" onchange="processFile(this)">

<script>
    const API = "http://192.168.1.133:49501";
    let activeZone = null, activeBtn = null, data = {emojis:[], roles:[]};

    function openMenu() { document.getElementById('sidebar').classList.add('open'); document.getElementById('overlay').style.display = 'block'; }
    function closeMenu() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').style.display = 'none'; }
    function closePicker() { document.getElementById('picker').classList.remove('open'); }
    function triggerImg(z) { activeZone = z; document.getElementById('f-in').click(); }

    async function init() {
        const res = await fetch(`${API}/api/init`).then(r => r.json());
        data = res;
        document.getElementById('sel-chans').innerHTML = res.channels.map(c => `<option value="${c.id}"># ${c.name}</option>`).join('');
        const stds = ["😀","🔥","✅","❌","🔞","⭐","✨","🎁"];
        document.getElementById('emo-grid').innerHTML = res.emojis.map(e => `<div class="emo" onclick="pickEmoji('${e.id}', true, '${e.url}')"><img src="${e.url}"></div>`).join('') + stds.map(s => `<div class="emo" onclick="pickEmoji('${s}', false)">${s}</div>`).join('');
    }

    function processFile(input) {
        if(!input.files[0]) return;
        const reader = new FileReader();
        reader.onload = async (e) => {
            const res = await fetch(`${API}/api/upload`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({file: e.target.result})
            }).then(r => r.json());
            if(res.url) {
                const img = document.getElementById(`v-${activeZone}`);
                img.src = res.url; img.style.display = 'block';
                const ic = document.getElementById(`ic-${activeZone}`);
                if(ic) ic.style.display = 'none';
            }
        };
        reader.readAsDataURL(input.files[0]);
    }

    function addReacRow() {
        const div = document.createElement('div');
        div.style = "background:#111; padding:10px; border-radius:8px; margin-bottom:10px; display:flex; align-items:center; gap:10px;";
        div.innerHTML = `<div class="e-trig" onclick="openPicker(this)" style="font-size:24px; cursor:pointer;">😀</div><select style="flex:1; background:transparent; color:white; border:none;">${data.roles.map(r => `<option value="${r.id}">${r.name}</option>`).join('')}</select>`;
        document.getElementById('reacs').appendChild(div);
    }

    function openPicker(btn) { activeBtn = btn; document.getElementById('picker').classList.add('open'); }
    function pickEmoji(id, isCust, url) {
        activeBtn.innerHTML = isCust ? `<img src="${url}" data-id="${id}" width="24">` : id;
        closePicker();
    }

    async function deploy() {
        const reacs = Array.from(document.querySelectorAll('#reacs > div')).map(row => ({
            emoji: row.querySelector('.e-trig img')?.dataset.id || row.querySelector('.e-trig').innerText,
            roleId: row.querySelector('select').value
        }));
        await fetch(`${API}/api/deploy`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                channelId: document.getElementById('sel-chans').value,
                title: document.getElementById('txt-title').innerText,
                description: document.getElementById('txt-desc').innerText,
                author: document.getElementById('txt-auth').innerText,
                author_img: document.getElementById('v-auth').style.display === 'block' ? document.getElementById('v-auth').src : null,
                thumbnail: document.getElementById('v-thumb').style.display === 'block' ? document.getElementById('v-thumb').src : null,
                banner: document.getElementById('v-banner').style.display === 'block' ? document.getElementById('v-banner').src : null,
                reactions: reacs
            })
        });
        alert("✅ Déployé avec succès !");
    }
    window.onload = init;
</script>
</body>
</html>

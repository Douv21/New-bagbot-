<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>BagBot Ultimate Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #ff4d4d; --bg: #111214; --card: #2b2d31; --text: #dbdee1; --sidebar: #0b0b0b; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 10px; display: flex; flex-direction: column; align-items: center; }

        /* DESIGN EMBED (STYLE CAPTURE) */
        .discord-msg { background: #313338; border-radius: 8px; padding: 15px; width: 100%; max-width: 500px; margin-bottom: 20px; box-sizing: border-box; }
        .embed { background: #1e1f22; border-left: 4px solid var(--accent); border-radius: 4px; padding: 12px; position: relative; }
        .up-slot { border: 1px dashed #4e5058; border-radius: 4px; display: flex; align-items: center; justify-content: center; cursor: pointer; background: rgba(0,0,0,0.2); position: relative; overflow: hidden; min-height: 40px; }
        .up-slot img { width: 100%; height: 100%; object-fit: cover; position: absolute; }
        .thumb-slot { position: absolute; top: 12px; right: 12px; width: 60px; height: 60px; }
        .banner-slot { width: 100%; min-height: 120px; margin: 10px 0; }
        .embed-title { font-size: 16px; font-weight: 700; color: white; margin: 10px 0 5px; outline: none; }
        .embed-desc { font-size: 14px; color: #dbdee1; outline: none; min-height: 30px; }

        /* CONTROLES */
        .card { background: var(--card); border-radius: 12px; padding: 15px; width: 100%; max-width: 500px; }
        select, input { width: 100%; background: #1e1f22; border: 1px solid #111; color: white; padding: 12px; border-radius: 8px; margin-bottom: 10px; }
        .reaction-row { background: #1e1f22; border-radius: 8px; padding: 10px; display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .emoji-trigger { width: 40px; height: 40px; background: #2b2d31; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; }
        
        /* PICKER EMOJI AMÉLIORÉ */
        #emojiPicker { position: fixed; bottom: 0; left: 0; width: 100%; height: 60vh; background: #111214; display: none; flex-direction: column; z-index: 3000; border-radius: 20px 20px 0 0; border-top: 2px solid var(--accent); }
        .emoji-scroll { flex: 1; overflow-y: auto; padding: 15px; }
        .emoji-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; margin-bottom: 20px; }
        .emoji-item { font-size: 24px; text-align: center; cursor: pointer; padding: 5px; border-radius: 5px; }
        .emoji-item:hover { background: #333; }
        .emoji-item img { width: 30px; height: 30px; }

        #imgModal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 4000; display: none; align-items: center; justify-content: center; }
        .btn-deploy { background: var(--accent); color: white; border: none; padding: 16px; width: 100%; border-radius: 8px; font-weight: 800; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <h3 style="margin: 15px 0;">BagBot Designer</h3>

    <div class="discord-msg">
        <div class="embed">
            <div class="up-slot thumb-slot" onclick="openImgChoice('thumb')">
                <i class="fas fa-plus" id="ic-thumb"></i>
                <img id="v-thumb" style="display:none">
            </div>
            <div style="display:flex; align-items:center; gap:8px;">
                <div class="up-slot" onclick="openImgChoice('auth')" style="width:22px; height:22px; border-radius:50%; min-height:auto;">
                    <img id="v-auth" style="display:none">
                </div>
                <span contenteditable="true" id="txt-auth" style="font-size:13px; font-weight:600; color:white;">Nom de l'auteur</span>
            </div>
            <div class="embed-title" contenteditable="true" id="txt-title">Titre du message</div>
            <div class="embed-desc" contenteditable="true" id="txt-desc">Cliquez ici pour modifier la description...</div>
            <div class="up-slot banner-slot" onclick="openImgChoice('banner')">
                <i class="fas fa-image" id="ic-banner" style="font-size: 30px;"></i>
                <img id="v-banner" style="display:none">
            </div>
        </div>
    </div>

    <div class="card">
        <label style="font-size: 11px; color: #888;">SALON DISCORD</label>
        <select id="sel-chans"></select>
        
        <label style="font-size: 11px; color: #888;">MODE DE RÔLE</label>
        <select id="sel-mode">
            <option value="multiple">Multiple (Ajout/Retrait)</option>
            <option value="unique">Unique (1 seul à la fois)</option>
            <option value="definitif">Définitif (Pas de retrait)</option>
        </select>

        <div id="reacs-box"></div>
        <button onclick="addReacRow()" style="width:100%; padding:12px; background:#3a3c41; border:none; color:white; border-radius:8px; cursor:pointer;">+ AJOUTER UN RÔLE RÉACTION</button>
        <button class="btn-deploy" onclick="deploy()">🚀 DÉPLOYER SUR DISCORD</button>
    </div>

    <div id="imgModal">
        <div style="background:var(--card); padding:20px; border-radius:12px; width:280px; text-align:center;">
            <button onclick="document.getElementById('f-in').click()" style="width:100%; padding:12px; background:var(--accent); border:none; color:white; border-radius:8px; margin-bottom:10px;">Téléverser Image</button>
            <button onclick="promptUrl()" style="width:100%; padding:12px; background:#444; border:none; color:white; border-radius:8px;">Lien URL direct</button>
            <button onclick="closeImgChoice()" style="background:none; border:none; color:#888; margin-top:15px;">Annuler</button>
        </div>
    </div>

    <div id="emojiPicker">
        <div class="emoji-scroll">
            <p style="font-size: 12px; font-weight: bold; color: var(--accent);">ÉMOJIS SERVEUR</p>
            <div class="emoji-grid" id="grid-srv"></div>
            <p style="font-size: 12px; font-weight: bold; color: var(--accent);">STANDARDS</p>
            <div class="emoji-grid" id="grid-std"></div>
        </div>
        <button onclick="document.getElementById('emojiPicker').style.display='none'" style="padding:15px; background:#000; color:white; border:none;">FERMER</button>
    </div>

    <input type="file" id="f-in" style="display:none" onchange="handleFile(this)">

<script>
    const API = "http://192.168.1.133:49501";
    let roles = [], activeBtn = null, curZone = null;

    async function init() {
        // Salons
        fetch(`${API}/api/channels`).then(r => r.json()).then(data => {
            document.getElementById('sel-chans').innerHTML = data.map(c => `<option value="${c.id}"># ${c.name}</option>`).join('');
        });
        // Rôles
        fetch(`${API}/api/roles`).then(r => r.json()).then(data => roles = data);
        // Emojis Serveur
        fetch(`${API}/api/emojis`).then(r => r.json()).then(data => {
            document.getElementById('grid-srv').innerHTML = data.map(e => `<div class="emoji-item" onclick="pickEmoji('${e.id}', true, '${e.url}')"><img src="${e.url}"></div>`).join('');
        });
        // Generation de bcp d'emojis standards
        const stds = ["😀","😃","😄","😁","😆","😅","😂","🤣","😊","😇","🙂","🙃","😉","😌","😍","🥰","😘","😗","😙","😚","😋","😛","😜","🤪","🤨","🧐","🤓","😎","🤩","🥳","😏","😒","😞","😔","😟","😕","🙁","😣","😖","😫","😩","🥺","😢","😭","😤","😠","😡","🤬","🤯","😳","🥵","🥶","😱","😨","😰","😥","😓","🤗","🤔","🤭","🤫","🤥","😶","😐","😑","😬","🙄","😯","😦","😧","😮","😲","🥱","😴","🤤","😪","😵","🤐","🥴","🤢","🤮","🤧","😷","🤒","🤕","🤑","🤠","😈","👿","👹","👺","🤡","💩","👻","💀","☠️","👽","👾","🤖","🎃","😺","😸","😹","😻","😼","😽","🙀","😿","😾","🔥","✨","⭐","✅","❌","🔞"];
        document.getElementById('grid-std').innerHTML = stds.map(s => `<div class="emoji-item" onclick="pickEmoji('${s}', false)">${s}</div>`).join('');
    }

    function openImgChoice(z) { curZone = z; document.getElementById('imgModal').style.display = 'flex'; }
    function closeImgChoice() { document.getElementById('imgModal').style.display = 'none'; }
    
    function promptUrl() {
        const url = prompt("Collez le lien direct (http...) :");
        if(url) updateImg(url);
        closeImgChoice();
    }

    async function handleFile(input) {
        if(!input.files[0]) return;
        let fd = new FormData(); fd.append('file', input.files[0]);
        let res = await fetch(`${API}/api/upload`, {method:'POST', body:fd});
        let data = await res.json();
        updateImg(data.url);
        closeImgChoice();
    }

    function updateImg(url) {
        const v = document.getElementById(`v-${curZone}`);
        v.src = url; v.style.display = 'block';
        if(document.getElementById(`ic-${curZone}`)) document.getElementById(`ic-${curZone}`).style.display = 'none';
    }

    function addReacRow() {
        const div = document.createElement('div');
        div.className = 'reaction-row';
        div.innerHTML = `
            <div class="emoji-trigger" onclick="openPicker(this)">😀</div>
            <select style="margin:0; flex:1;">${roles.map(r => `<option value="${r.id}">${r.name}</option>`).join('')}</select>
            <i class="fas fa-trash" style="color:#444; cursor:pointer;" onclick="this.parentElement.remove()"></i>
        `;
        document.getElementById('reacs-box').appendChild(div);
    }

    function openPicker(b) { activeBtn = b; document.getElementById('emojiPicker').style.display = 'flex'; }
    function pickEmoji(val, isCust, url) {
        activeBtn.innerHTML = isCust ? `<img src="${url}" data-id="${val}" style="width:24px">` : val;
        if(!isCust) activeBtn.removeAttribute('data-id');
        document.getElementById('emojiPicker').style.display = 'none';
    }

    async function deploy() {
        const reactions = Array.from(document.querySelectorAll('.reaction-row')).map(row => ({
            emoji: row.querySelector('.emoji-trigger img')?.getAttribute('data-id') || row.querySelector('.emoji-trigger').innerText,
            roleId: row.querySelector('select').value
        }));

        const payload = {
            channelId: document.getElementById('sel-chans').value,
            mode: document.getElementById('sel-mode').value,
            title: document.getElementById('txt-title').innerText,
            description: document.getElementById('txt-desc').innerText,
            author: document.getElementById('txt-auth').innerText,
            author_img: document.getElementById('v-auth').style.display === 'block' ? document.getElementById('v-auth').src : null,
            thumbnail: document.getElementById('v-thumb').style.display === 'block' ? document.getElementById('v-thumb').src : null,
            banner: document.getElementById('v-banner').style.display === 'block' ? document.getElementById('v-banner').src : null,
            reactions: reactions
        };

        await fetch(`${API}/api/deploy`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });
        alert("✅ Déploiement envoyé !");
    }
    window.onload = init;
</script>
</body>
</html>

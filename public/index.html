<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BagBot Admin</title>
    <style>
        :root { --accent: #ff4d4d; --bg: #0f1012; --card: #18191c; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); color: white; display: flex; }
        .sidebar { width: 260px; background: #0b0c0e; height: 100vh; position: fixed; left: -260px; transition: 0.3s; z-index: 1000; border-right: 1px solid #222; }
        .sidebar.open { left: 0; }
        .sidebar-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
        .close-btn { background: none; border: none; color: var(--accent); font-size: 32px; cursor: pointer; }
        .main { flex: 1; padding: 20px; width: 100%; box-sizing: border-box; }
        .panel { background: var(--card); border-radius: 12px; padding: 20px; max-width: 500px; margin: auto; border: 1px solid #282a2e; }
        .tabs { display: flex; background: #2f3136; border-radius: 8px; margin-bottom: 20px; padding: 4px; }
        .tab { flex: 1; text-align: center; padding: 10px; cursor: pointer; border-radius: 6px; color: #888; }
        .tab.active { background: var(--accent); color: white; font-weight: bold; }
        label { display: block; margin: 12px 0 4px; font-size: 11px; color: #8e9297; text-transform: uppercase; font-weight: bold; }
        select, input, textarea { width: 100%; padding: 12px; background: #202225; border: 1px solid #111; color: white; border-radius: 6px; box-sizing: border-box; }
        .btn-send { background: var(--accent); color: white; border: none; padding: 16px; width: 100%; border-radius: 8px; font-weight: bold; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>
<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <b style="color: var(--accent)">BAG BOT V2</b>
        <button class="close-btn" onclick="toggleMenu()">×</button>
    </div>
    <div style="padding: 20px; border-left: 4px solid var(--accent); background: #1a1a1a;">🎭 Rôles-Réactions</div>
</div>
<div class="main">
    <button onclick="toggleMenu()" style="background:#2f3136; color:white; border:none; padding:10px 15px; border-radius:6px; margin-bottom:15px;">☰ Menu</button>
    <div class="panel">
        <div class="tabs">
            <div class="tab active" id="t-simple" onclick="setMode('simple')">Simple</div>
            <div class="tab" id="t-embed" onclick="setMode('embed')">Embed</div>
        </div>
        
        <label>Salon Discord</label>
        <select id="channelId"><option value="">Chargement...</option></select>
        
        <label>Rôle</label>
        <select id="roleId"><option value="">Chargement...</option></select>

        <div id="f-simple">
            <label>Message</label>
            <textarea id="txtSimple">Cliquez pour obtenir votre rôle</textarea>
        </div>

        <div id="f-embed" style="display:none;">
            <label>Titre de l'Embed</label>
            <input type="text" id="title">
            <label>Description</label>
            <textarea id="desc"></textarea>
            <label>Image</label>
            <input type="file" id="img">
        </div>

        <label>ID Message (Optionnel)</label>
        <input type="text" id="msgId">

        <label>Affichage</label>
        <select id="disp"><option value="button">Bouton</option><option value="select">Menu</option></select>

        <button class="btn-send" id="btn" onclick="deploy()">DÉPLOYER SUR DISCORD</button>
    </div>
</div>

<script>
    let mode = 'simple';
    function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); }
    function setMode(m) {
        mode = m;
        document.getElementById('t-simple').className = (m === 'simple' ? 'tab active' : 'tab');
        document.getElementById('t-embed').className = (m === 'embed' ? 'tab active' : 'tab');
        document.getElementById('f-simple').style.display = (m === 'simple' ? 'block' : 'none');
        document.getElementById('f-embed').style.display = (m === 'embed' ? 'block' : 'none');
    }

    async function load() {
        try {
            const [cR, rR] = await Promise.all([fetch('/api/channels'), fetch('/api/roles')]);
            const c = await cR.json(); const r = await rR.json();
            document.getElementById('channelId').innerHTML = c.map(x => `<option value="${x.id}"># ${x.name}</option>`).join('');
            document.getElementById('roleId').innerHTML = r.map(x => `<option value="${x.id}">${x.name}</option>`).join('');
        } catch(e) { console.error("Erreur chargement"); }
    }

    async function deploy() {
        const cId = document.getElementById('channelId').value;
        const rId = document.getElementById('roleId').value;
        if(!cId || cId === "undefined") return alert("Sélectionnez un salon.");

        const btn = document.getElementById('btn');
        btn.disabled = true; btn.innerText = "ENVOI...";

        const fd = new FormData();
        fd.append('mode', mode);
        fd.append('displayType', document.getElementById('disp').value);
        fd.append('messageId', document.getElementById('msgId').value.trim());
        fd.append('content', document.getElementById('txtSimple').value);
        fd.append('title', document.getElementById('title').value);
        fd.append('description', document.getElementById('desc').value);
        if(document.getElementById('img').files[0]) fd.append('imageFile', document.getElementById('img').files[0]);

        try {
            const res = await fetch(`/update-bot/${cId}/${rId}`, { method: 'POST', body: fd });
            const d = await res.json();
            alert(d.success ? "✅ Succès !" : "❌ " + d.message);
        } catch(e) { alert("❌ Erreur serveur."); }
        
        btn.disabled = false; btn.innerText = "DÉPLOYER SUR DISCORD";
    }
    load();
</script>
</body>
</html>

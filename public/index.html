<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>BagBot Panel | Full Embed</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050505; --card: #0f0f0f; --accent: #ed4245; --border: #1e1e1e; --discord: #2b2d31; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; }
        
        #sidebar { width: 260px; background: #000; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .nav-item { padding: 20px 30px; cursor: pointer; color: #888; font-weight: bold; transition: 0.2s; border-right: 4px solid transparent; }
        .nav-item.active { color: var(--accent); background: rgba(237,66,69,0.1); border-right-color: var(--accent); }

        main { flex-grow: 1; padding: 40px; overflow-y: auto; }
        .section { display: none; max-width: 900px; margin: 0 auto; }
        .section.active { display: block; }

        .card { background: var(--card); padding: 25px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; }
        input, textarea, select { width: 100%; background: #000; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 8px; margin-top: 10px; box-sizing: border-box; }

        /* Discord Embed Mockup */
        .discord-ui { background: var(--discord); border-left: 4px solid var(--accent); padding: 15px; border-radius: 4px; max-width: 520px; position: relative; }
        .embed-top { display: flex; justify-content: space-between; }
        .embed-thumb { width: 80px; height: 80px; background: #202225; border-radius: 8px; cursor: pointer; overflow: hidden; border: 1px dashed #444; flex-shrink: 0; }
        .embed-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .embed-banner { width: 100%; height: 180px; background: #202225; border-radius: 8px; margin-top: 15px; cursor: pointer; overflow: hidden; border: 1px dashed #444; }
        .embed-banner img { width: 100%; height: 100%; object-fit: cover; }
        .embed-footer { font-size: 12px; color: #b9bbbe; margin-top: 10px; display: flex; align-items: center; gap: 5px; }

        .btn { width: 100%; padding: 15px; background: var(--accent); border: none; color: white; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; }
        .modal-box { background: var(--card); padding: 25px; border-radius: 15px; width: 500px; border: 1px solid var(--border); }
        .img-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; max-height: 300px; overflow-y: auto; padding: 10px; }
        .img-grid img { width: 100%; height: 80px; object-fit: cover; border-radius: 5px; cursor: pointer; border: 2px solid transparent; }
        .img-grid img:hover { border-color: var(--accent); }
    </style>
</head>
<body>
    <nav id="sidebar">
        <div style="padding: 30px; font-weight: 900; color: var(--accent); font-size: 24px;">BAGBOT</div>
        <div class="nav-item active" onclick="show('welcome', this)"><i class="fas fa-home"></i> BIENVENUE</div>
        <div class="nav-item" onclick="show('admin', this)"><i class="fas fa-lock"></i> ADMIN</div>
    </nav>

    <main>
        <div id="welcome" class="section active">
            <div class="discord-ui">
                <div class="embed-top">
                    <div style="flex-grow: 1;">
                        <div id="pv-title" style="font-weight:bold; font-size: 1.1em; color:#00a8fc">Titre</div>
                        <div id="pv-desc" style="color:#dbdee1; margin-top:8px; font-size:14px; white-space:pre-wrap;">Description...</div>
                    </div>
                    <div class="embed-thumb" onclick="openGal('thumb')">
                        <img id="pv-thumb" style="display:none">
                        <div id="thumb-hint" style="font-size:10px; text-align:center; padding-top:25px; color:#444;">THUMB</div>
                    </div>
                </div>
                <div class="embed-banner" onclick="openGal('banner')">
                    <img id="pv-banner" style="display:none">
                    <div id="banner-hint" style="text-align:center; padding-top:80px; color:#444;">CLIQUE POUR BANNIÈRE</div>
                </div>
                <div class="embed-footer">
                    <img id="pv-foot-img" src="" style="width:18px; height:18px; border-radius:50%; display:none">
                    <span id="pv-foot-txt">Bas de page</span>
                </div>
            </div>

            <div class="card">
                <label>Titre</label><input type="text" id="w-title" oninput="sync()">
                <label>Description</label><textarea id="w-desc" rows="3" oninput="sync()"></textarea>
                <label>Footer (Bas de page)</label><input type="text" id="w-foot" oninput="sync()">
                <label>Salon d'envoi</label><select id="w-chan"></select>
                <label>Rôle Déclencheur (Facultatif)</label><select id="w-trigger"><option value="">Immédiat (Join)</option></select>
                <button class="btn" onclick="save()"><i class="fas fa-save"></i> SAUVEGARDER</button>
            </div>
        </div>

        <div id="admin" class="section">
            <div class="card">
                <h3>Permissions Admin</h3>
                <div id="admin-roles" style="background:#000; border-radius:8px; padding:10px; max-height:300px; overflow-y:auto;"></div>
                <button class="btn" onclick="save()">METTRE À JOUR</button>
            </div>
        </div>
    </main>

    <div id="modal">
        <div class="modal-box">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h3>Ma Galerie</h3>
                <input type="file" id="file-input" style="display:none" onchange="upload()">
                <button class="btn" style="width:auto; font-size:12px;" onclick="document.getElementById('file-input').click()">+ UPLOAD</button>
            </div>
            <div id="modal-grid" class="img-grid"></div>
            <button class="btn" style="background:#444" onclick="closeGal()">ANNULER</button>
        </div>
    </div>

    <script>
        let server = {};
        let targetImg = ''; // 'thumb' ou 'banner'

        async function init() {
            const res = await fetch('/api/get_data');
            if(!res.ok) return location.href='/api/login';
            server = await res.json();
            
            document.getElementById('w-chan').innerHTML = server.channels.map(c => `<option value="${c.id}"># ${c.name}</option>`).join('');
            document.getElementById('w-trigger').innerHTML += server.roles.map(r => `<option value="${r}">${r}</option>`).join('');
            
            document.getElementById('admin-roles').innerHTML = server.roles.map(r => `
                <div style="display:flex; gap:10px; padding:8px; border-bottom:1px solid #1a1a1a;">
                    <input type="checkbox" value="${r}" class="adm-ck" ${server.config.admin_roles?.includes(r)?'checked':''}> ${r}
                </div>`).join('');

            const w = server.config.welcome || {};
            document.getElementById('w-title').value = w.title || "";
            document.getElementById('w-desc').value = w.desc || "";
            document.getElementById('w-foot').value = w.footer || "";
            document.getElementById('w-chan').value = w.channel || "";
            document.getElementById('w-trigger').value = w.trigger_role || "";
            
            if(w.banner) setImg('banner', w.banner);
            if(w.thumbnail) setImg('thumb', w.thumbnail);
            
            sync();
            updateGrid();
        }

        function sync() {
            document.getElementById('pv-title').innerText = document.getElementById('w-title').value || "Titre";
            document.getElementById('pv-desc').innerText = document.getElementById('w-desc').value || "Description...";
            document.getElementById('pv-foot-txt').innerText = document.getElementById('w-foot').value || "Bas de page";
        }

        function updateGrid() {
            document.getElementById('modal-grid').innerHTML = server.images.map(i => `<img src="${i}" onclick="selectImg('${i}')">`).join('');
        }

        function openGal(t) { targetImg = t; document.getElementById('modal').style.display='flex'; }
        function closeGal() { document.getElementById('modal').style.display='none'; }

        function selectImg(path) {
            setImg(targetImg, path);
            closeGal();
        }

        function setImg(type, path) {
            const el = document.getElementById('pv-' + type);
            const hint = document.getElementById(type + '-hint');
            el.src = path; el.style.display = 'block';
            el.dataset.path = path;
            if(hint) hint.style.display = 'none';
        }

        async function upload() {
            const fd = new FormData(); fd.append('file', document.getElementById('file-input').files[0]);
            const r = await fetch('/api/upload', {method:'POST', body:fd});
            const d = await r.json();
            server.images.push(d.url);
            updateGrid();
        }

        async function save() {
            const config = {
                welcome: {
                    title: document.getElementById('w-title').value,
                    desc: document.getElementById('w-desc').value,
                    footer: document.getElementById('w-foot').value,
                    channel: document.getElementById('w-chan').value,
                    trigger_role: document.getElementById('w-trigger').value,
                    banner: document.getElementById('pv-banner').dataset.path || "",
                    thumbnail: document.getElementById('pv-thumb').dataset.path || ""
                },
                admin_roles: Array.from(document.querySelectorAll('.adm-ck:checked')).map(i => i.value)
            };
            await fetch('/api/save', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(config)});
            alert("Sauvegardé !");
        }

        function show(id, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        window.onload = init;
    </script>
</body>
</html>

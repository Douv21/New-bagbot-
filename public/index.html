<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BagBot Designer v2</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #ed4245; --bg: #000000; --card: #111214; --border: #2b2d31; }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        #sidebar { width: 220px; background: #050505; border-right: 1px solid var(--border); padding: 20px; flex-shrink: 0; }
        .main { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        /* EMBED PREVIEW */
        .embed-preview { width: 100%; max-width: 450px; background: #1e1f22; border-left: 4px solid var(--accent); padding: 15px; border-radius: 4px; position: relative; margin-bottom: 20px; }
        
        .upload-zone { border: 2px dashed var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; background: rgba(0,0,0,0.3); position: relative; z-index: 10; }
        .thumb-upload { position: absolute; top: 15px; right: 15px; width: 70px; height: 70px; }
        .banner-upload { width: 100%; height: 140px; margin-top: 15px; }
        .upload-zone img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }

        input, textarea, select { width: 100%; background: transparent; border: none; color: white; outline: none; margin-bottom: 8px; }
        .title-in { font-size: 1.2em; font-weight: bold; }
        
        /* BOUTONS ET SELECTION */
        .controls { width: 100%; max-width: 450px; z-index: 20; position: relative; padding-bottom: 50px; }
        .btn { width: 100%; padding: 14px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; display: block; position: relative; z-index: 30; }
        .btn-add { background: #2b2d31; color: white; border: 1px solid var(--border); }
        .btn-send { background: var(--accent); color: white; font-size: 1.1em; }
        
        .reaction-row { display: flex; gap: 10px; background: var(--card); padding: 10px; border-radius: 5px; margin-top: 10px; border: 1px solid var(--border); align-items: center; }
        .chan-style { background: var(--card); padding: 12px; border: 1px solid var(--border); border-radius: 5px; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2 style="color:var(--accent); margin-bottom: 30px;">BAGBOT</h2>
    <div style="color:white; font-weight: bold;"><i class="fas fa-magic"></i> Designer</div>
</div>

<div class="main">
    <div class="embed-preview">
        <div class="upload-zone thumb-upload" onclick="openPicker('thumb')">
            <i class="fas fa-plus" id="icon-thumb"></i>
            <img id="img-thumb" style="display:none">
        </div>

        <input type="text" class="title-in" value="Titre de l'Embed">
        <textarea placeholder="Description du message..." rows="4"></textarea>

        <div class="upload-zone banner-upload" onclick="openPicker('banner')">
            <i class="fas fa-image" id="icon-banner" style="font-size: 2em;"></i>
            <img id="img-banner" style="display:none">
        </div>
    </div>

    <div class="controls">
        <label style="font-size: 0.8em; color: #949ba4;">SALON DISCORD</label>
        <select id="chan-select" class="chan-style"></select>

        <div id="reactions-list"></div>
        
        <button class="btn btn-add" onclick="addRow()"><i class="fas fa-plus"></i> Ajouter une réaction</button>
        <button class="btn btn-send" onclick="alert('Envoi au bot...')">DÉPLOYER L'EMBED</button>
    </div>
</div>

<input type="file" id="file-input" style="display:none" onchange="previewFile(this)">

<script>
    let cachedRoles = [];
    let activeType = "";

    async function init() {
        try {
            const res = await fetch('/api/get_server_info');
            const data = await res.json();
            cachedRoles = data.roles || [];
            document.getElementById('chan-select').innerHTML = data.channels.map(c => 
                `<option value="${c.id}"># ${c.name}</option>`
            ).join('');
        } catch(e) {
            console.error("Erreur de connexion au bot");
        }
    }

    function openPicker(type) {
        activeType = type;
        document.getElementById('file-input').click();
    }

    function previewFile(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = document.getElementById('img-' + activeType);
                img.src = e.target.result;
                img.style.display = 'block';
                document.getElementById('icon-' + activeType).style.display = 'none';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function addRow() {
        const container = document.getElementById('reactions-list');
        const div = document.createElement('div');
        div.className = 'reaction-row';
        div.innerHTML = `
            <div style="font-size: 1.2em;">😀</div>
            <select style="margin:0; flex:1; background:transparent;">
                ${cachedRoles.map(r => `<option value="${r.id}">${r.name}</option>`).join('')}
            </select>
            <i class="fas fa-trash" onclick="this.parentElement.remove()" style="color:var(--accent); cursor:pointer"></i>
        `;
        container.appendChild(div);
    }

    window.onload = init;
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BagBot Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-dark: #050505; --bg-panel: #0f0f0f; --accent: #ed4245; --border: #1e1e1e; --text-muted: #949ba4; }
        body { background: var(--bg-dark); color: white; font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; }
        
        #sidebar { width: 260px; background: #000; border-right: 1px solid var(--border); transition: 0.3s; }
        main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        header { height: 60px; background: var(--bg-panel); display: flex; align-items: center; padding: 0 20px; border-bottom: 1px solid var(--border); }
        
        .content-section { display: none; flex-direction: column; align-items: center; padding: 20px; overflow-y: auto; flex: 1; }
        .content-section.active { display: flex; }

        .discord-embed { width: 100%; max-width: 450px; background: #2b2d31; border-left: 4px solid var(--accent); padding: 16px; border-radius: 4px; position: relative; margin-bottom: 20px; }
        .thumb-preview { width: 80px; height: 80px; position: absolute; right: 16px; top: 16px; background: rgba(0,0,0,0.1); border: 1px dashed #444; }
        .banner-preview { width: 100%; height: 120px; margin-top: 10px; background: rgba(0,0,0,0.1); border: 1px dashed #444; }
        .img-zone img { width: 100%; height: 100%; object-fit: cover; }

        .config-card { width: 100%; max-width: 450px; background: var(--bg-panel); border-radius: 12px; padding: 20px; border: 1px solid var(--border); margin-bottom: 20px; }
        input, textarea, select { width: 100%; background: #000; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 8px; margin-bottom: 15px; }
        
        /* CHECKBOX LIST STYLE */
        .checkbox-list { background: #000; border: 1px solid var(--border); border-radius: 8px; max-height: 200px; overflow-y: auto; padding: 10px; margin-bottom: 15px; }
        .checkbox-item { display: flex; align-items: center; gap: 10px; padding: 8px; border-bottom: 1px solid #111; cursor: pointer; }
        .checkbox-item:last-child { border: none; }
        .checkbox-item input { width: auto; margin: 0; cursor: pointer; }
        .checkbox-item label { cursor: pointer; font-size: 14px; flex: 1; }

        .btn { border: none; padding: 15px; border-radius: 8px; font-weight: 800; cursor: pointer; width: 100%; color: white; margin-bottom: 10px; }
        .btn-save { background: var(--accent); }

        #gallery { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 450px; }
        .gallery-card { aspect-ratio: 1; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); position: relative; }
        .gallery-card img { width: 100%; height: 100%; object-fit: cover; }

        @media (max-width: 900px) { #sidebar { display: none; } }
    </style>
</head>
<body>
    <nav id="sidebar">
        <div style="padding: 25px; font-size: 20px; font-weight: 900; color: var(--accent);">BAGBOT</div>
        <div style="padding: 15px 25px; color: var(--accent); cursor: pointer;" onclick="show('accueil')">ACCUEIL</div>
        <div style="padding: 15px 25px; color: #666; cursor: pointer;" onclick="show('images')">IMAGES</div>
    </nav>

    <main>
        <header><span id="bot-name">Chargement...</span></header>

        <section id="accueil" class="content-section active">
            <div class="discord-embed">
                <div class="thumb-preview img-zone" onclick="openM('thumb')" id="box-thumb"></div>
                <div id="p-title" style="font-weight: bold; margin-bottom: 5px;">Titre</div>
                <div id="p-desc" style="font-size: 14px; white-space: pre-wrap;">Description...</div>
                <div class="banner-preview img-zone" onclick="openM('banner')" id="box-banner"></div>
            </div>

            <div class="config-card">
                <h3>Paramètres</h3>
                <input type="text" id="in-title" placeholder="Titre..." oninput="sync()">
                <textarea id="in-desc" rows="3" placeholder="Description..." oninput="sync()"></textarea>
                
                <label style="font-size:12px; color:var(--text-muted)">Salon :</label>
                <select id="chan-list"></select>

                <label style="font-size:12px; color:var(--text-muted)">Rôles déclencheurs (facultatif) :</label>
                <div id="role-checkboxes" class="checkbox-list"></div>

                <button class="btn btn-save" onclick="save()">ENREGISTRER</button>
            </div>
        </section>

        <section id="images" class="content-section">
            <div id="gallery"></div>
        </section>
    </main>

    <div id="modal" style="position:fixed; inset:0; background:rgba(0,0,0,0.8); display:none; align-items:center; justify-content:center; z-index:100;">
        <div style="background:var(--bg-panel); padding:20px; border-radius:12px; width:90%; max-width:300px;">
            <input type="file" id="file-in" onchange="up()">
            <button class="btn btn-save" onclick="document.getElementById('modal').style.display='none'">FERMER</button>
        </div>
    </div>

    <script>
        const API = window.location.origin;
        let target = '';

        function show(id) { 
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'images') loadG();
        }

        function sync() {
            document.getElementById('p-title').innerText = document.getElementById('in-title').value || "Titre";
            document.getElementById('p-desc').innerText = document.getElementById('in-desc').value || "Description...";
        }

        function openM(t) { target = t; document.getElementById('modal').style.display = 'flex'; }

        async function up() {
            const fd = new FormData(); fd.append('file', document.getElementById('file-in').files[0]);
            const res = await fetch(`${API}/api/upload`, { method: 'POST', body: fd });
            const data = await res.json();
            document.getElementById('box-'+target).innerHTML = `<img src="${API+data.url}">`;
            document.getElementById('box-'+target).dataset.path = data.url;
            document.getElementById('modal').style.display = 'none';
        }

        async function loadG() {
            const res = await fetch(`${API}/api/images`);
            const d = await res.json();
            document.getElementById('gallery').innerHTML = d.images.map(img => `<div class="gallery-card" onclick="document.getElementById('box-banner').innerHTML='<img src=${API+img}>'; document.getElementById('box-banner').dataset.path='${img}'; show('accueil')"><img src="${API+img}"></div>`).join('');
        }

        async function save() {
            const roles = [];
            document.querySelectorAll('#role-checkboxes input:checked').forEach(i => roles.push(i.value));
            
            const p = {
                title: document.getElementById('in-title').value,
                desc: document.getElementById('in-desc').value,
                target_channel: document.getElementById('chan-list').value,
                trigger_roles: roles,
                thumb: document.getElementById('box-thumb').dataset.path || null,
                banner: document.getElementById('box-banner').dataset.path || null
            };
            await fetch(`${API}/api/save_config`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(p) });
            alert("Sauvegardé !");
        }

        async function init() {
            const res = await fetch(`${API}/api/get_server_info`);
            const d = await res.json();
            document.getElementById('bot-name').innerText = d.bot.name;
            document.getElementById('chan-list').innerHTML = d.channels.map(c => `<option value="${c.id}" ${d.config.target_channel == c.id ? 'selected':''}># ${c.name}</option>`).join('');
            
            // Generate checkboxes
            document.getElementById('role-checkboxes').innerHTML = d.all_roles.map(r => `
                <div class="checkbox-item">
                    <input type="checkbox" id="role-${r}" value="${r}" ${(d.config.trigger_roles || []).includes(r) ? 'checked' : ''}>
                    <label for="role-${r}">${r}</label>
                </div>
            `).join('');

            if(d.config) {
                document.getElementById('in-title').value = d.config.title || "";
                document.getElementById('in-desc').value = d.config.desc || "";
                sync();
            }
        }
        window.onload = init;
    </script>
</body>
</html>

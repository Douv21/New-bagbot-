<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BagBot Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050505; --panel: #0f0f0f; --accent: #ed4245; --border: #1e1e1e; --embed: #2b2d31; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: white; display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar Design Original */
        #sidebar { 
            width: 260px; background: #000; border-right: 1px solid var(--border); 
            position: fixed; height: 100%; z-index: 2000; transition: 0.3s;
        }
        #sidebar.closed { transform: translateX(-100%); }

        .nav-item { padding: 18px 25px; display: flex; align-items: center; gap: 15px; color: #949ba4; cursor: pointer; font-weight: bold; }
        .nav-item.active { color: var(--accent); background: rgba(237, 66, 69, 0.05); border-right: 3px solid var(--accent); }

        main { flex: 1; margin-left: 260px; display: flex; flex-direction: column; transition: 0.3s; }
        header { height: 60px; background: var(--panel); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; gap: 15px; }

        .content-section { display: none; flex-direction: column; align-items: center; padding: 20px; overflow-y: auto; flex: 1; }
        .content-section.active { display: flex; }

        /* Preview Discord */
        .discord-embed { 
            width: 100%; max-width: 450px; background: var(--embed); border-left: 4px solid var(--accent); 
            border-radius: 4px; padding: 16px; position: relative; margin-bottom: 20px;
        }
        .th-p { width: 70px; height: 70px; position: absolute; right: 16px; top: 16px; border: 1px dashed #444; border-radius: 4px; overflow: hidden; }
        .ba-p { width: 100%; height: 130px; margin-top: 10px; border: 1px dashed #444; border-radius: 4px; overflow: hidden; }
        img { width: 100%; height: 100%; object-fit: cover; }

        /* Galerie d'images */
        .gallery-item { position: relative; aspect-ratio: 1; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
        .delete-btn { position: absolute; top: 5px; right: 5px; background: var(--accent); border: none; color: white; width: 25px; height: 25px; border-radius: 50%; cursor: pointer; font-size: 12px; }

        /* Form Card */
        .card { width: 100%; max-width: 450px; background: var(--panel); border-radius: 12px; padding: 20px; border: 1px solid var(--border); }
        input, textarea, select { width: 100%; background: #000; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 8px; margin-bottom: 10px; }
        
        .var-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-bottom: 15px; }
        .v-btn { background: #111; border: 1px solid #222; padding: 8px; text-align: center; color: var(--accent); font-size: 11px; border-radius: 4px; cursor: pointer; font-weight: bold; }

        .btn { border: none; padding: 15px; border-radius: 8px; font-weight: 800; cursor: pointer; width: 100%; color: white; margin-top: 10px; }
        .footer-spacer { height: 100px; flex-shrink: 0; }

        @media (max-width: 900px) {
            main { margin-left: 0; }
            #sidebar { transform: translateX(-100%); }
            #sidebar.open { transform: translateX(0); }
        }
    </style>
</head>
<body>

    <nav id="sidebar">
        <div style="padding: 25px; color: var(--accent); font-weight: 900; font-size: 20px; display: flex; justify-content: space-between; align-items: center;">
            BAGBOT <i class="fas fa-times" onclick="toggleMenu()" style="cursor:pointer"></i>
        </div>
        <div class="nav-item active" onclick="showS('home', this)"><i class="fas fa-home"></i> Accueil</div>
        <div class="nav-item" onclick="showS('images', this)"><i class="fas fa-images"></i> Images</div>
    </nav>

    <main>
        <header>
            <i class="fas fa-bars" onclick="toggleMenu()" style="color:var(--accent); cursor:pointer; font-size: 20px;"></i>
            <span id="bot-name" style="font-weight: bold;">Dashboard</span>
        </header>

        <section id="home" class="content-section active">
            <div class="discord-embed">
                <div class="th-p" onclick="openUp('thumb')" id="box-thumb"></div>
                <div id="p-title" style="font-weight: bold;">Bienvenue</div>
                <div id="p-desc" style="font-size: 13px; color: #ccc; margin-top: 5px;">...</div>
                <div class="ba-p" onclick="openUp('banner')" id="box-banner"></div>
            </div>
            <div class="card">
                <input id="in-title" placeholder="Titre..." oninput="sync()">
                <textarea id="in-desc" rows="4" placeholder="Description..." oninput="sync()"></textarea>
                <div class="var-grid">
                    <div class="v-btn" onclick="addV('{user}')">{user}</div>
                    <div class="v-btn" onclick="addV('{server}')">{server}</div>
                    <div class="v-btn" onclick="addV('{count}')">{count}</div>
                </div>
                <select id="chan-list"></select>
                <button class="btn" style="background:var(--accent)" onclick="test()">ENREGISTRER</button>
                <button class="btn" style="background:#5865F2" onclick="test()">TESTER SUR DISCORD</button>
            </div>
            <div class="footer-spacer"></div>
        </section>

        <section id="images" class="content-section">
            <div id="gallery" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; width: 100%; max-width: 450px;"></div>
            <div class="footer-spacer"></div>
        </section>
    </main>

    <div id="modal" style="position:fixed; inset:0; background:rgba(0,0,0,0.9); display:none; align-items:center; justify-content:center; z-index:3000;">
        <div style="background:var(--panel); padding:20px; border-radius:12px; width:90%; max-width:320px;">
            <input type="file" id="file-in" style="display:none" onchange="upload()">
            <button class="btn" style="background:#222" onclick="document.getElementById('file-in').click()">TÉLÉVERSER</button>
            <button class="btn" style="background:transparent" onclick="document.getElementById('modal').style.display='none'">ANNULER</button>
        </div>
    </div>

    <script>
        let target = '';
        const API = window.location.origin;

        function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); }
        
        function showS(id, el) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
            if(id === 'images') loadG();
            if(window.innerWidth < 900) toggleMenu();
        }

        function sync() {
            document.getElementById('p-title').innerText = document.getElementById('in-title').value || "Titre";
            document.getElementById('p-desc').innerText = document.getElementById('in-desc').value || "Description...";
        }

        function addV(v) { document.getElementById('in-desc').value += v; sync(); }
        function openUp(t) { target = t; document.getElementById('modal').style.display = 'flex'; }

        async function upload() {
            const fd = new FormData();
            fd.append('file', document.getElementById('file-in').files[0]);
            const res = await fetch(`${API}/api/upload`, { method: 'POST', body: fd });
            const data = await res.json();
            setImg(target, data.url);
            document.getElementById('modal').style.display = 'none';
        }

        function setImg(type, path) {
            document.getElementById(`box-${type}`).innerHTML = `<img src="${API+path}">`;
            document.getElementById(`box-${type}`).dataset.path = path;
        }

        async function loadG() {
            const res = await fetch(`${API}/api/images`);
            const data = await res.json();
            document.getElementById('gallery').innerHTML = data.images.map(img => `
                <div class="gallery-item">
                    <img src="${API+img}" onclick="setImg('banner', '${img}')">
                    <button class="delete-btn" onclick="deleteImg('${img}')"><i class="fas fa-trash"></i></button>
                </div>
            `).join('');
        }

        async function deleteImg(path) {
            if(confirm("Supprimer cette image ?")) {
                await fetch(`${API}/api/delete_image`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({path}) });
                loadG();
            }
        }

        async function test() {
            const payload = {
                channel: document.getElementById('chan-list').value,
                title: document.getElementById('in-title').value,
                desc: document.getElementById('in-desc').value,
                thumb: document.getElementById('box-thumb').dataset.path || null,
                banner: document.getElementById('box-banner').dataset.path || null
            };
            await fetch(`${API}/api/test_message`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
            alert("🚀 Test envoyé !");
        }

        async function init() {
            const res = await fetch(`${API}/api/get_server_info`);
            const data = await res.json();
            document.getElementById('chan-list').innerHTML = data.channels.map(c => `<option value="${c.id}"># ${c.name}</option>`).join('');
        }
        window.onload = init;
    </script>
</body>
    </html>

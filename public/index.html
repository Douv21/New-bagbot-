<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BagBot OS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #ed4245; --bg: #050505; --card: #111214; --embed-bg: #2b2d31; --text: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        /* SIDEBAR FORCE */
        #sidebar { width: 260px; background: #000; border-right: 1px solid #2b2d31; display: flex; flex-direction: column; }
        .nav-item { padding: 15px 20px; display: flex; align-items: center; gap: 10px; color: #949ba4; cursor: pointer; font-weight: bold; }
        .nav-item.active { background: rgba(237, 66, 69, 0.1); color: var(--accent); }

        /* MAIN */
        .main { flex: 1; display: flex; flex-direction: column; overflow-y: auto; padding: 20px; }
        .embed-preview { background: var(--embed-bg); border-left: 4px solid var(--accent); padding: 15px; border-radius: 4px; margin-bottom: 20px; }
        .author { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; font-size: 13px; font-weight: bold; }
        .author img { width: 22px; height: 22px; border-radius: 50%; }
        
        .thumb { width: 60px; height: 60px; background: #1e1f22; float: right; border-radius: 4px; border: 1px dashed #444; }
        .banner { width: 100%; height: 120px; background: #1e1f22; margin-top: 10px; border-radius: 4px; border: 1px dashed #444; display: flex; align-items: center; justify-content: center; }
        .footer { margin-top: 10px; font-size: 11px; color: #949ba4; display: flex; align-items: center; gap: 5px; }
        
        .input-group { background: #080808; padding: 15px; border-radius: 8px; border: 1px solid #2b2d31; }
        input, select, textarea { width: 100%; background: #111; border: 1px solid #2b2d31; color: white; padding: 10px; margin-bottom: 10px; border-radius: 5px; }
        .btn { width: 100%; background: var(--accent); color: white; border: none; padding: 15px; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <nav id="sidebar">
        <div style="padding: 25px; color: var(--accent); font-weight: 900; font-size: 20px;">BAGBOT</div>
        <div class="nav-item active"><i class="fas fa-home"></i> ACCUEIL</div>
        <div class="nav-item"><i class="fas fa-shield-alt"></i> AUTO-MOD</div>
    </nav>
    <div class="main">
        <div class="embed-preview" onclick="document.getElementById('edit-box').style.display='block'">
            <div class="author"><img id="auth-img" src=""> <span id="auth-name">Bot</span></div>
            <div class="thumb" id="p-thumb"></div>
            <div id="p-title" style="font-weight: bold; font-size: 16px;">Titre</div>
            <div id="p-desc" style="font-size: 14px; color: #dcddde;">Description</div>
            <div class="banner" id="p-banner"><i class="fas fa-image"></i></div>
            <div class="footer"><img id="foot-img" src="" style="width:15px; border-radius:50%"> <span id="p-foot">Footer</span></div>
        </div>

        <div class="input-group">
            <label>Salon</label>
            <select id="chan-list"></select>
            <div id="edit-box">
                <input type="text" id="in-title" placeholder="Titre..." oninput="document.getElementById('p-title').innerText=this.value">
                <textarea id="in-desc" placeholder="Description..." oninput="document.getElementById('p-desc').innerText=this.value"></textarea>
                <input type="text" id="in-banner" placeholder="Lien Image..." oninput="document.getElementById('p-banner').innerHTML='<img src=\''+this.value+'\' style=\'width:100%;height:100%;object-fit:cover\'>'">
            </div>
            <button class="btn" onclick="save()">DÉPLOYER</button>
        </div>
    </div>

    <script>
        async function load() {
            const res = await fetch('/api/get_server_info');
            const data = await res.json();
            document.getElementById('chan-list').innerHTML = data.channels.map(c => `<option value="${c.id}"># ${c.name}</option>`).join('');
            document.getElementById('auth-img').src = data.bot.avatar;
            document.getElementById('foot-img').src = data.bot.avatar;
            document.getElementById('auth-name').innerText = data.bot.name;
        }
        async function save() {
            const settings = {
                title: document.getElementById('p-title').innerText,
                description: document.getElementById('p-desc').innerText,
                channel: document.getElementById('chan-list').value
            };
            await fetch('/api/save_settings', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({category: 'accueil', settings})
            });
            alert("Enregistré !");
        }
        window.onload = load;
    </script>
</body>
</html>

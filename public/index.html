<label>Image de l'Embed</label>
<div style="display:flex; gap:10px; margin-bottom:10px;">
    <button class="tab-btn" onclick="document.getElementById('imageFile').click()" style="background:#444; width:100%;">📁 Téléverser (Smartphone/PC)</button>
    <input type="file" id="imageFile" style="display:none" accept="image/*" onchange="previewLocalFile(this)">
</div>
<input type="text" id="imageUrl" placeholder="Ou collez une URL https://..." oninput="updatePreview()">
<p id="fileNameDisplay" style="font-size: 11px; color: var(--accent); margin-top: -5px;"></p>

<script>
    function previewLocalFile(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const preImg = document.getElementById('pre-img');
                preImg.src = e.target.result;
                preImg.style.display = 'block';
                document.getElementById('fileNameDisplay').innerText = "Fichier prêt : " + input.files[0].name;
            }
            reader.readAsDataURL(input.files[0]);
        }
    }

    async function deploy() {
        // On utilise FormData au lieu de JSON pour envoyer des fichiers
        const formData = new FormData();
        formData.append('mode', mode);
        formData.append('channelId', document.getElementById('channelId').value);
        formData.append('roleId', document.getElementById('roleId').value);
        formData.append('content', document.getElementById('simpleContent').value);
        formData.append('title', document.getElementById('title').value);
        formData.append('description', document.getElementById('description').value);
        formData.append('imageUrl', document.getElementById('imageUrl').value);
        formData.append('displayType', document.getElementById('displayType').value);
        
        const fileInput = document.getElementById('imageFile');
        if (fileInput.files[0]) {
            formData.append('imageFile', fileInput.files[0]);
        }

        const res = await fetch('/update-bot', { 
            method: 'POST', 
            body: formData // Pas de Header Content-Type, le navigateur le gère seul ici
        });
        
        if(res.ok) alert("✅ Déployé avec succès !");
    }
</script>

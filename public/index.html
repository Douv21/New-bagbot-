<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BAGBOT ELITE V9 - FINAL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #0a0a0a; --card: #141414; --accent: #ed4245; --border: #252525; --d-bg: #2b2d31; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: #fff; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        .header { height: 60px; background: #000; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; z-index: 2500; }
        .burger { font-size: 22px; color: var(--accent); cursor: pointer; }
        
        #sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100vh; background: #000; z-index: 3000; transition: 0.3s; border-right: 1px solid var(--border); }
        #sidebar.open { left: 0; }
        .nav-item { padding: 20px; border-bottom: 1px solid #111; cursor: pointer; display: flex; align-items: center; justify-content: space-between; color: #888; font-weight: bold; }
        .nav-item.active { color: var(--accent); background: #ed424510; }
        .submenu { background: #050505; }
        .sub-item { padding: 15px 55px; cursor: pointer; color: #666; font-size: 14px; }
        .sub-item.active { color: var(--accent); background: #111; border-left: 3px solid var(--accent); }

        main { flex-grow: 1; overflow-y: auto; padding: 20px 15px 100px; }
        .section { display: none; max-width: 600px; margin: 0 auto; animation: fadeIn 0.3s; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* EMBED PREVIEW */
        .preview { background: var(--d-bg); border-left: 4px solid var(--accent); border-radius: 4px; padding: 15px; margin-bottom: 25px; }
        .pv-title { color: #fff; font-weight: bold; margin-bottom: 5px; }
        .pv-desc { font-size: 14px; color: #dbdee1; white-space: pre-wrap; }
        .pv-container { position: relative; margin-top: 10px; }
        .pv-thumb { width: 65px; height: 65px; background: #1e1f22; border-radius: 4px; border: 1px dashed #444; overflow: hidden; float: right; }
        .pv-banner { width: 100%; height: 140px; background: #1e1f22; border-radius: 8px; border: 1px dashed #444; overflow: hidden; margin-top: 10px; }
        .remove-img { position: absolute; top: -5px; right: -5px; background: var(--accent); color: white; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; cursor: pointer; z-index: 10; border: 2px solid var(--d-bg); }
        img { width: 100%; height: 100%; object-fit: cover; }

        /* INPUTS */
        .card { background: var(--card); border-radius: 20px; padding: 25px; border: 1px solid var(--border); margin-bottom: 20px; }
        label { display: block; font-size: 11px; color: #777; text-transform: uppercase; margin: 15px 0 5px; font-weight: bold; }
        input, textarea, select { width: 100%; background: #000; border: 1px solid var(--border); color: #fff; padding: 14px; border-radius: 10px; outline: none; font-size: 14px; }
        input[type="color"] { height: 45px; padding: 5px; cursor: pointer; }
        
        .var-badge { display: inline-block; background: #1e1f22; color: #00a8fc; padding: 5px 10px; border-radius: 5px; font-size: 12px; margin: 5px 5px 10px 0; cursor: pointer; border: 1px solid #2b2d31; }
        
        .btn { border: none; padding: 16px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 10px; }
        .btn-save { background: var(--accent); color: white; }
        .btn-test { background: #4e5058; color: white; }

        /* GALLERY & SHOP */
        .gallery-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .img-card { height: 100px; border-radius: 10px; border: 1px solid var(--border); overflow: hidden; position: relative; }
        .shop-item { background: #080808; padding: 15px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 10px; display: flex; justify-content: space-between; }
    </style>
</head>
<body onload="init()">

    <div class="header">
        <i class="fas fa-bars burger" onclick="toggleSidebar()"></i>
        <div style="margin-left: 20px; font-weight: 900; color: #fff;">BAGBOT <span style="color:var(--accent)">ELITE V9</span></div>
    </div>

    <div id="sidebar">
        <div style="padding: 30px; text-align: center; color: var(--accent); font-weight: 900;">DASHBOARD</div>
        <div class="nav-item" onclick="document.getElementById('sub-em').classList.toggle('hidden')">
            <span>CONFIG EMBEDS</span><i class="fas fa-chevron-down"></i>
        </div>
        <div id="sub-em" class="submenu">
            <div id="nav-welcome" class="sub-item" onclick="showTab('welcome')">Bienvenue</div>
            <div id="nav-leave" class="sub-item" onclick="showTab('leave')">Départ</div>
        </div>
        <div class="nav-item" onclick="showTab('boutique')"><span>BOUTIQUE</span><i class="fas fa-shopping-cart"></i></div>
        <div class="nav-item" onclick="showTab('admin')"><span>PERMISSIONS</span><i class="fas fa-shield-alt"></i></div>
        <div class="nav-item" onclick="showTab('gallery')"><span>GALERIE</span><i class="fas fa-images"></i></div>
    </div>

    <main onclick="closeSidebar()">
        <div id="welcome" class="section active">
            <div class="preview" id="pv-box-welcome">
                <div class="pv-thumb"><img id="w-img-thumbnail"></div>
                <div id="pv-w-title" class="pv-title">Chargement...</div>
                <div id="pv-w-desc" class="pv-desc">...</div>
                <div class="pv-banner"><img id="w-img-banner"></div>
            </div>
            <div class="card">
                <h2>Configuration Bienvenue</h2>
                <label>Couleur Embed</label><input type="color" id="w-color" oninput="sync('welcome')">
                <label>Titre</label><input type="text" id="w-title" oninput="sync('welcome')">
                <div class="var-badge" onclick="addVar('w-title','{user}')">{user}</div>
                <label>Description</label><textarea id="w-desc" rows="4" oninput="sync('welcome')"></textarea>
                <div>
                    <span class="var-badge" onclick="addVar('w-desc','{user}')">{user}</span>
                    <span class="var-badge" onclick="addVar('w-desc','{server}')">{server}</span>
                    <span class="var-badge" onclick="addVar('w-desc','{count}')">{count}</span>
                </div>
                <label>Salon d'envoi</label><select id="w-channel"></select>
                <div class="btn-group">
                    <button class="btn btn-save" onclick="save()">ENREGISTRER</button>
                    <button class="btn btn-test" onclick="sendTest('welcome')">TESTER</button>
                </div>
            </div>
        </div>

        <div id="leave" class="section">
            <div class="preview" id="pv-box-leave">
                <div id="pv-l-title" class="pv-title">Chargement...</div>
                <div id="pv-l-desc" class="pv-desc">...</div>
                <div class="pv-banner"><img id="l-img-banner"></div>
            </div>
            <div class="card">
                <h2>Configuration Départ</h2>
                <label>Couleur Embed</label><input type="color" id="l-color" oninput="sync('leave')">
                <label>Titre</label><input type="text" id="l-title" oninput="sync('leave')">
                <label>Description</label><textarea id="l-desc" rows="4" oninput="sync('leave')"></textarea>
                <div class="var-badge" onclick="addVar('l-desc','{user}')">{user}</div>
                <label>Salon d'envoi</label><select id="l-channel"></select>
                <label>Image de fond (Bannière)</label>
                <button class="btn btn-test" onclick="openPicker('leave','banner')">Choisir une image</button>
                <div class="btn-group">
                    <button class="btn btn-save" onclick="save()">ENREGISTRER</button>
                    <button class="btn btn-test" onclick="sendTest('leave')">TESTER</button>
                </div>
            </div>
        </div>

        <div id="boutique" class="section">
            <div class="card">
                <h2>Nouvel Article</h2>
                <input type="text" id="sh-name" placeholder="Nom de l'item">
                <input type="number" id="sh-price" placeholder="Prix" style="margin-top:10px">
                <button class="btn btn-save" onclick="addShop()">AJOUTER</button>
            </div>
            <div id="shop-container"></div>
        </div>

        <div id="gallery" class="section">
            <div class="card">
                <h2>Ma Galerie</h2>
                <input type="file" id="f-upload" onchange="uploadFile()">
                <div class="gallery-grid" id="gallery-list" style="margin-top:20px"></div>
            </div>
        </div>
    </main>

    <script>
        let db = { channels:[], roles:[], config:{welcome:{}, leave:{}}, shop:{items:[]}, images:[] };
        let activeM = 'welcome', activeT = 'banner';

        async function init() {
            try {
                const res = await fetch('/api/get_data');
                const data = await res.json();
                if(data) db = data;
                
                // Salons
                const opts = db.channels.map(c => `<option value="${c.id}"># ${c.name}</option>`).join('');
                document.getElementById('w-channel').innerHTML = opts;
                document.getElementById('l-channel').innerHTML = opts;

                // Chargement des données configurées
                ['welcome', 'leave'].forEach(m => {
                    const conf = db.config[m] || {};
                    const p = m[0];
                    document.getElementById(p+'-title').value = conf.title || "Titre par défaut";
                    document.getElementById(p+'-desc').value = conf.desc || "Description par défaut";
                    document.getElementById(p+'-color').value = conf.color || "#ed4245";
                    document.getElementById(p+'-channel').value = conf.channel || "";
                    
                    if(conf.banner) {
                        const img = document.getElementById(p+'-img-banner');
                        img.src = conf.banner; img.style.display = 'block';
                    }
                });

                renderShop();
                renderGallery();
                sync('welcome'); sync('leave');
            } catch(e) { console.error("Erreur de chargement", e); }
        }

        function sync(m) {
            const p = m[0];
            const title = document.getElementById(p+'-title').value;
            const desc = document.getElementById(p+'-desc').value;
            const color = document.getElementById(p+'-color').value;

            document.getElementById('pv-box-'+m).style.borderLeftColor = color;
            document.getElementById('pv-'+p+'-title').innerText = title || "Titre";
            document.getElementById('pv-'+p+'-desc').innerText = desc || "Message...";
        }

        function showTab(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.sub-item, .nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id !== 'gallery') localStorage.setItem('lastTab', id);
            closeSidebar();
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
        function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); }

        function openPicker(m, t) { activeM = m; activeT = t; showTab('gallery'); }

        function selectImg(url) {
            const p = activeM[0];
            const img = document.getElementById(p+'-img-'+activeT);
            img.src = url; img.style.display = 'block';
            db.config[activeM][activeT] = url;
            showTab(localStorage.getItem('lastTab') || 'welcome');
            sync(activeM);
        }

        function renderGallery() {
            document.getElementById('gallery-list').innerHTML = db.images.map(img => `
                <div class="img-card" onclick="selectImg('${img}')"><img src="${img}"></div>
            `).join('');
        }

        function renderShop() {
            document.getElementById('shop-container').innerHTML = (db.shop.items || []).map((it, i) => `
                <div class="shop-item">
                    <div><b>${it.name}</b><br><small>${it.price} coins</small></div>
                    <i class="fas fa-trash" onclick="delShop(${i})"></i>
                </div>
            `).join('');
        }

        async function save() {
            ['welcome', 'leave'].forEach(m => {
                const p = m[0];
                db.config[m].title = document.getElementById(p+'-title').value;
                db.config[m].desc = document.getElementById(p+'-desc').value;
                db.config[m].color = document.getElementById(p+'-color').value;
                db.config[m].channel = document.getElementById(p+'-channel').value;
                // Les images sont déjà dans db via selectImg
            });
            await fetch('/api/save', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(db.config) });
            alert("Données sauvegardées !");
        }

        function addVar(id, v) { 
            const el = document.getElementById(id); 
            el.value += v; 
            sync(id.startsWith('w') ? 'welcome' : 'leave'); 
        }

        window.onload = init;
    </script>
</body>
</html>

<div class="card">
    <h2>Configuration de l'Autorole</h2>
    <input type="text" id="title" placeholder="Titre de l'embed"><br><br>
    <input type="text" id="roleId" placeholder="ID du Rôle Discord"><br><br>
    <input type="text" id="channelId" placeholder="ID du Salon Discord"><br><br>
    <button onclick="sendToBot()">Envoyer le panneau sur Discord</button>
</div>

<script>
async function sendToBot() {
    const data = {
        title: document.getElementById('title').value,
        roleId: document.getElementById('roleId').value,
        channelId: document.getElementById('channelId').value
    };

    const response = await fetch('/update-bot', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    });
    
    const result = await response.json();
    alert(result.message);
}
</script>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BagBot | Dashboard Elite</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #0b0b0b; --side: #000; --card: #121212; --accent: #ed4245; --border: #1e1e1e; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        #sidebar { width: 280px; background: var(--side); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .brand { padding: 30px; font-size: 24px; font-weight: 900; color: var(--accent); text-align: center; border-bottom: 1px solid var(--border); }
        .nav-item { padding: 18px 30px; display: flex; align-items: center; gap: 15px; color: #888; cursor: pointer; font-weight: 600; }
        .nav-item.active { color: var(--accent); background: rgba(237, 66, 69, 0.1); border-right: 4px solid var(--accent); }

        main { flex-grow: 1; padding: 40px; overflow-y: auto; }
        .section { display: none; max-width: 850px; margin: 0 auto; animation: fadeIn 0.3s; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } }

        /* PREVIEW DISCORD (Style 10223.jpg) */
        .discord-mockup { background: #2b2d31; border-left: 4px solid var(--accent); border-radius: 4px; padding: 15px; margin-bottom: 25px; }
        .embed-main { display: flex; justify-content: space-between; }
        .embed-title { color: #00a8fc; font-weight: bold; font-size: 16px; }
        .embed-desc { font-size: 14px; color: #dbdee1; margin: 8px 0; white-space: pre-wrap; }
        .embed-thumb { width: 80px; height: 80px; border-radius: 8px; background: #1e1f22; border: 1px dashed #444; overflow: hidden; cursor: pointer; }
        .embed-banner { width: 100%; height: 200px; background: #1e1f22; border: 2px dashed #444; border-radius: 8px; margin-top: 15px; overflow: hidden; cursor: pointer; }
        .embed-thumb img, .embed-banner img { width: 100%; height: 100%; object-fit: cover; }
        .embed-footer { margin-top: 10px; font-size: 12px; color: #b9bbbe; display: flex; align-items: center; gap: 5px; }

        /* CARDS & INPUTS */
        .card { background: var(--card); border: 1px solid var(--border); padding: 30px; border-radius: 15px; margin-bottom: 25px; }
        .var-hint { background: #1a1a1a; padding: 10px; border-radius: 8px; font-size: 12px; color: #888; margin-bottom: 15px; }
        .var-tag { color: var(--accent); font-weight: bold; margin-right: 10px; }
        label { display: block; margin: 15px 0 5px; color: #888; font-size: 11px; font-weight: 800; text-transform: uppercase; }
        input, textarea, select { width: 100%; background: #000; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; background: var(--accent); border: none; color: white; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 20px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-gray { background: #333; }

        /* ROLES (Screenshot_2026-04-12-22-14-21-535) */
        .role-item { display: flex; align-items: center; justify-content: space-between; padding: 15px; border-bottom: 1px solid #1a1a1a; }
        .role-item input[type="checkbox"] { width: 22px; height: 22px; accent-color: var(--accent); }

        /* MODAL GALERIE */
        #gallery-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: var(--card); width: 90%; max-width: 500px; padding: 25px; border-radius: 20px; border: 1px solid var(--border); }
        .img-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; max-height: 300px; overflow-y: auto; margin-top: 15px; }
        .img-grid img { width: 100%; height: 80px; object-fit: cover; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .img-grid img:hover { transform: scale(1.05); }
    </style>
</head>
<body>

    <nav id="sidebar">
        <div class="brand">BAGBOT</div>
        <div class="nav-item active" onclick="showSection('welcome', this)"><i class="fas fa-home"></i> BIENVENUE</div>
        <div id="btn-admin" class="nav-item" onclick="showSection('admin', this)"><i class="fas fa-user-shield"></i> ACCÈS PANEL</div>
    </nav>

    <main>
        <div id="welcome" class="section active">
            <div class="discord-mockup">
                <div class="embed-main">
                    <div>
                        <div id="pv-title" class="embed-title">Titre</div>
                        <div id="pv-desc" class="embed-desc">Bienvenue sur le serveur...</div>
                    </div>
                    <div class="embed-thumb" onclick="openGallery('thumb')">
                        <img id="pv-thumb-img" style="display:none">
                    </div>
                </div>
                <div class="embed-banner" onclick="openGallery('banner')">
                    <img id="pv-banner-img" style="display:none">
                </div>
                <div class="embed-footer">
                    <i class="fas fa-info-circle"></i> <span id="pv-footer-txt">Bas de page</span>
                </div>
            </div>

            <div class="card">
                <h2><i class="fas fa-pen"></i> Configuration</h2>
                <div class="var-hint">
                    Variables : <span class="var-tag">{user}</span> <span class="var-tag">{guild}</span> <span class="var-tag">{count}</span>
                </div>
                <label>Titre</label><input type="text" id="w-title" oninput="sync()">
                <label>Description</label><textarea id="w-desc" rows="4" oninput="sync()"></textarea>
                <label>Bas de page (Footer)</label><input type="text" id="w-footer" oninput="sync()">
                <label>Salon d'envoi</label><select id="w-chan"></select>
                
                <button class="btn" onclick="saveConfig()"><i class="fas fa-save"></i> ENREGISTRER</button>
                <button class="btn btn-gray" onclick="testWelcome()"><i class="fas fa-paper-plane"></i> ENVOYER UN TEST DISCORD</button>
            </div>
        </div>

        <div id="admin" class="section">
            <div class="card">
                <h2><i class="fas fa-lock"></i> Rôles autorisés au Dashboard</h2>
                <div id="admin-roles-list"></div>
                <button class="btn" onclick="saveConfig()"><i class="fas fa-check"></i> VALIDER LES DROITS</button>
            </div>
        </div>
    </main>

    <div id="gallery-modal">
        <div class="modal-content">
            <h3>Galerie d'images</h3>
            <div id="gallery-grid" class="img-grid"></div>
            <button class="btn btn-gray" onclick="closeGallery()">FERMER</button>
        </div>
    </div>

    <script>
        let serverData = { config: { welcome: {}, admin_roles: [] }, images: [], user_name: "Utilisateur" };
        let activeTarget = '';

        async function init() {
            const res = await fetch('/api/get_data');
            if(!res.ok) { location.href='/api/login'; return; }
            serverData = await res.json();

            document.getElementById('w-chan').innerHTML = serverData.channels.map(c => `<option value="${c.id}"># ${c.name}</option>`).join('');
            
            document.getElementById('admin-roles-list').innerHTML = serverData.roles.map(r => `
                <div class="role-item">
                    <span>${r}</span>
                    <input type="checkbox" value="${r}" class="adm-ck" ${serverData.config.admin_roles.includes(r)?'checked':''}>
                </div>`).join('');

            const w = serverData.config.welcome || {};
            document.getElementById('w-title').value = w.title || "";
            document.getElementById('w-desc').value = w.desc || "";
            document.getElementById('w-footer').value = w.footer || "";
            document.getElementById('w-chan').value = w.channel || "";
            if(w.banner) setImg('banner', w.banner);
            if(w.thumbnail) setImg('thumb', w.thumbnail);

            sync();
            renderGallery();
        }

        function showSection(id, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        function sync() {
            const u = serverData.user_name;
            const rep = (t) => t.replace(/{user}/g, u).replace(/{guild}/g, "Mon Serveur").replace(/{count}/g, "123");
            document.getElementById('pv-title').innerText = rep(document.getElementById('w-title').value) || "Titre";
            document.getElementById('pv-desc').innerText = rep(document.getElementById('w-desc').value) || "Description...";
            document.getElementById('pv-footer-txt').innerText = rep(document.getElementById('w-footer').value) || "Bas de page";
        }

        function openGallery(t) { activeTarget = t; document.getElementById('gallery-modal').style.display='flex'; }
        function closeGallery() { document.getElementById('gallery-modal').style.display='none'; }
        function renderGallery() { 
            document.getElementById('gallery-grid').innerHTML = serverData.images.map(img => `<img src="${img}" onclick="selectImg('${img}')">`).join(''); 
        }

        function selectImg(url) { setImg(activeTarget, url); closeGallery(); }
        function setImg(target, url) {
            const img = document.getElementById('pv-' + target + '-img');
            img.src = url; img.style.display = 'block'; img.dataset.path = url;
        }

        async function saveConfig() {
            const data = {
                welcome: {
                    title: document.getElementById('w-title').value,
                    desc: document.getElementById('w-desc').value,
                    footer: document.getElementById('w-footer').value,
                    channel: document.getElementById('w-chan').value,
                    banner: document.getElementById('pv-banner-img').dataset.path || "",
                    thumbnail: document.getElementById('pv-thumb-img').dataset.path || ""
                },
                admin_roles: Array.from(document.querySelectorAll('.adm-ck:checked')).map(i => i.value)
            };
            await fetch('/api/save', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)});
            alert("Sauvegardé !");
        }

        async function testWelcome() {
            const res = await fetch('/api/test_welcome', {method:'POST'});
            if(res.ok) alert("Test envoyé !"); else alert("Erreur d'envoi.");
        }

        window.onload = init;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BagBot | Elite Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050505; --side: #000; --card: #0f0f0f; --accent: #ed4245; --border: #1a1a1a; --d-bg: #2b2d31; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        #sidebar { width: 280px; background: var(--side); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
        .brand { padding: 30px; font-size: 24px; font-weight: 900; color: var(--accent); text-align: center; border-bottom: 1px solid var(--border); }
        .nav-item { padding: 18px 30px; display: flex; align-items: center; gap: 15px; color: #666; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .nav-item.active { color: var(--accent); background: rgba(237, 66, 69, 0.05); border-right: 4px solid var(--accent); }

        main { flex-grow: 1; padding: 40px; overflow-y: auto; }
        .section { display: none; max-width: 900px; margin: 0 auto; animation: fadeIn 0.3s; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* DISCORD PREVIEW */
        .discord-ui { background: var(--d-bg); border-left: 4px solid var(--accent); border-radius: 4px; padding: 15px; margin-bottom: 25px; }
        .embed-header { display: flex; justify-content: space-between; gap: 10px; }
        .embed-title { color: #00a8fc; font-weight: bold; }
        .embed-thumb { width: 80px; height: 80px; border-radius: 8px; background: #1e1f22; border: 1px dashed #444; cursor: pointer; overflow: hidden; }
        .embed-banner { width: 100%; height: 180px; border-radius: 8px; background: #1e1f22; margin-top: 15px; border: 1px dashed #444; cursor: pointer; overflow: hidden; }
        .embed-thumb img, .embed-banner img { width: 100%; height: 100%; object-fit: cover; }

        /* CARDS */
        .card { background: var(--card); border: 1px solid var(--border); padding: 25px; border-radius: 15px; margin-bottom: 20px; }
        label { display: block; margin: 15px 0 5px; color: #555; font-size: 11px; font-weight: 800; text-transform: uppercase; }
        input, textarea, select { width: 100%; background: #000; border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 8px; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-main { background: var(--accent); color: white; }

        /* ROLES SELECTOR */
        .roles-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #000; padding: 15px; border-radius: 8px; border: 1px solid var(--border); max-height: 200px; overflow-y: auto; }
        .role-item { display: flex; align-items: center; gap: 10px; font-size: 13px; color: #aaa; }

        /* GALLERY PAGE */
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        .gallery-card { background: #111; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); transition: 0.3s; }
        .gallery-card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .gallery-card img { width: 100%; height: 120px; object-fit: cover; }
        .gallery-info { padding: 10px; font-size: 11px; color: #555; text-align: center; }

        /* MODAL */
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; }
        .modal-box { background: var(--card); width: 90%; max-width: 600px; padding: 25px; border-radius: 20px; }
    </style>
</head>
<body>

    <nav id="sidebar">
        <div class="brand">BAGBOT</div>
        <div class="nav-item active" onclick="tab('welcome', this)"><i class="fas fa-home"></i> BIENVENUE</div>
        <div class="nav-item" onclick="tab('gallery', this)"><i class="fas fa-images"></i> GALERIE</div>
        <div class="nav-item" onclick="tab('admin', this)"><i class="fas fa-user-shield"></i> ACCÈS PANEL</div>
    </nav>

    <main>
        <div id="welcome" class="section active">
            <div class="discord-ui">
                <div class="embed-header">
                    <div style="flex-grow:1">
                        <div id="pv-title" class="embed-title">Titre</div>
                        <div id="pv-desc" style="font-size:14px; color:#dbdee1;">Description...</div>
                    </div>
                    <div class="embed-thumb" onclick="openPicker('thumbnail')"><img id="pv-thumb-img" style="display:none"></div>
                </div>
                <div class="embed-banner" onclick="openPicker('banner')"><img id="pv-banner-img" style="display:none"></div>
            </div>

            <div class="card">
                <label>Titre & Message</label>
                <input type="text" id="w-title" oninput="sync()" placeholder="Titre">
                <textarea id="w-desc" rows="4" oninput="sync()" placeholder="Message..." style="margin-top:10px;"></textarea>
                
                <label>Rôles de déclenchement (Qui reçoit le message ?)</label>
                <div id="trigger-roles" class="roles-grid"></div>

                <label>Salon d'envoi</label>
                <select id="w-chan"></select>

                <button class="btn btn-main" onclick="saveData()">ENREGISTRER</button>
                <button class="btn" style="background:#333; color:white;" onclick="testMsg()">ENVOYER UN TEST</button>
            </div>
        </div>

        <div id="gallery" class="section">
            <h2 style="margin-bottom:20px;">Ma Galerie d'images</h2>
            <div id="main-gallery" class="gallery-grid"></div>
        </div>

        <div id="admin" class="section">
            <div class="card">
                <h2>Accès au Dashboard</h2>
                <div id="admin-roles" class="roles-grid" style="margin-top:15px;"></div>
                <button class="btn btn-main" onclick="saveData()" style="margin-top:20px;">VALIDER LES ACCÈS</button>
            </div>
        </div>
    </main>

    <div id="modal">
        <div class="modal-box">
            <h3>Choisir une image</h3>
            <div id="picker-grid" class="gallery-grid" style="margin-top:15px; max-height:400px; overflow-y:auto;"></div>
            <button class="btn" onclick="closePicker()" style="background:#222; color:white; margin-top:15px;">FERMER</button>
        </div>
    </div>

    <script>
        let server = { config: { welcome: {}, admin_roles: [] }, images: [], roles: [] };
        let currentTarget = '';

        async function init() {
            const res = await fetch('/api/get_data');
            server = await res.json();

            // Salons
            document.getElementById('w-chan').innerHTML = server.channels.map(c => `<option value="${c.id}"># ${c.name}</option>`).join('');

            // Rôles Déclenchement
            document.getElementById('trigger-roles').innerHTML = server.roles.map(r => `
                <div class="role-item"><input type="checkbox" value="${r.name}" class="t-role" ${server.config.welcome.trigger_roles?.includes(r.name)?'checked':''}> ${r.name}</div>
            `).join('');

            // Rôles Admin
            document.getElementById('admin-roles').innerHTML = server.roles.map(r => `
                <div class="role-item"><input type="checkbox" value="${r.name}" class="a-role" ${server.config.admin_roles.includes(r.name)?'checked':''}> ${r.name}</div>
            `).join('');

            // Galerie Principale
            document.getElementById('main-gallery').innerHTML = server.images.map(img => `
                <div class="gallery-card"><img src="${img}"><div class="gallery-info">${img.split('/').pop()}</div></div>
            `).join('');

            // Data Welcome
            const w = server.config.welcome;
            document.getElementById('w-title').value = w.title || "";
            document.getElementById('w-desc').value = w.desc || "";
            if(w.banner) setImg('banner', w.banner);
            if(w.thumbnail) setImg('thumbnail', w.thumbnail);

            sync();
        }

        function tab(id, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active'); el.classList.add('active');
        }

        function sync() {
            document.getElementById('pv-title').innerText = document.getElementById('w-title').value || "Titre";
            document.getElementById('pv-desc').innerText = document.getElementById('w-desc').value || "Description...";
        }

        function openPicker(type) {
            currentTarget = type;
            document.getElementById('picker-grid').innerHTML = server.images.map(img => `
                <img src="${img}" onclick="selectImg('${img}')" style="width:100%; height:80px; object-fit:cover; cursor:pointer; border-radius:8px;">
            `).join('');
            document.getElementById('modal').style.display = 'flex';
        }
        function closePicker() { document.getElementById('modal').style.display = 'none'; }
        function selectImg(url) { setImg(currentTarget, url); closePicker(); }

        function setImg(type, url) {
            const img = document.getElementById(`pv-${type}-img`);
            img.src = url; img.style.display = 'block'; img.dataset.url = url;
        }

        async function saveData() {
            const config = {
                welcome: {
                    title: document.getElementById('w-title').value,
                    desc: document.getElementById('w-desc').value,
                    channel: document.getElementById('w-chan').value,
                    banner: document.getElementById('pv-banner-img').dataset.url || "",
                    thumbnail: document.getElementById('pv-thumb-img').dataset.url || "",
                    trigger_roles: Array.from(document.querySelectorAll('.t-role:checked')).map(c => c.value)
                },
                admin_roles: Array.from(document.querySelectorAll('.a-role:checked')).map(c => c.value)
            };
            await fetch('/api/save', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(config) });
            alert("Sauvegardé !");
        }

        async function testMsg() { await fetch('/api/test_welcome', { method: 'POST' }); alert("Test envoyé !"); }

        window.onload = init;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BagBot OS | Pro Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #ed4245; --bg: #050505; --card: #111214; --embed: #2b2d31; --text-m: #949ba4; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; font-family: 'Helvetica Neue', Arial, sans-serif; overflow: hidden; display: flex; height: 100vh; }

        /* --- SIDEBAR RÉTRACTABLE --- */
        #sidebar { 
            width: 260px; background: #000; border-right: 1px solid #2b2d31; 
            position: fixed; top: 0; left: -260px; height: 100%; z-index: 1000;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #sidebar.open { left: 0; }
        .sidebar-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.7); display: none; z-index: 999; 
        }
        .sidebar-overlay.active { display: block; }
        .nav-item { padding: 18px 25px; display: flex; align-items: center; gap: 12px; color: var(--text-m); font-weight: bold; cursor: pointer; }
        .nav-item.active { background: rgba(237, 66, 69, 0.1); color: var(--accent); }

        /* --- CONTENT AREA --- */
        .viewport { flex: 1; display: flex; flex-direction: column; width: 100%; }
        header { 
            height: 65px; background: #080808; display: flex; align-items: center; 
            padding: 0 20px; border-bottom: 1px solid #2b2d31; gap: 20px;
        }
        .content { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; align-items: center; }

        /* --- DISCORD EMBED --- */
        .embed {
            background: var(--embed); border-left: 4px solid var(--accent);
            border-radius: 4px; padding: 16px; width: 100%; max-width: 500px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 30px;
        }
        .author { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; cursor: pointer; }
        .author img { width: 22px; height: 22px; border-radius: 50%; }
        .main-row { display: flex; justify-content: space-between; gap: 15px; }
        .title { font-size: 17px; font-weight: bold; margin-bottom: 8px; cursor: pointer; }
        .desc { font-size: 14px; color: #dbdee1; cursor: pointer; line-height: 1.4; }
        .thumb { width: 75px; height: 75px; background: #1e1f22; border-radius: 4px; border: 1px dashed #444; flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .thumb img { width: 100%; height: 100%; object-fit: cover; }
        .banner { width: 100%; height: 160px; background: #1e1f22; border-radius: 4px; border: 1px dashed #444; margin-top: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .banner img { width: 100%; height: 100%; object-fit: cover; }
        .footer { display: flex; align-items: center; gap: 8px; margin-top: 15px; font-size: 11px; color: var(--text-m); cursor: pointer; }
        .footer img { width: 18px; height: 18px; border-radius: 50%; }

        /* --- MODALE D'ÉDITION --- */
        .modal {
            position: fixed; bottom: -100%; left: 0; width: 100%; 
            background: var(--card); border-radius: 20px 20px 0 0;
            padding: 25px; z-index: 2000; transition: 0.4s cubic-bezier(0, 0.5, 0.5, 1);
            border-top: 1px solid var(--accent);
        }
        .modal.active { bottom: 0; }
        .modal-header { display: flex; justify-content: space-between; margin-bottom: 20px; align-items: center; }
        .modal-title { font-size: 12px; font-weight: 900; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
        
        input, textarea, select { 
            width: 100%; background: #000; border: 1px solid #2b2d31; 
            color: white; padding: 15px; border-radius: 10px; font-size: 15px; margin-bottom: 15px;
        }
        .btn-confirm { 
            width: 100%; background: var(--accent); color: white; border: none; 
            padding: 16px; border-radius: 10px; font-weight: 900; cursor: pointer;
        }

        /* --- BOUTON SAUVEGARDE GLOBAL --- */
        .save-bar { padding: 20px; max-width: 500px; width: 100%; }
    </style>
</head>
<body>

    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>
    
    <nav id="sidebar">
        <div style="padding: 40px 25px; color: var(--accent); font-weight: 900; font-size: 24px;">BAGBOT</div>
        <div class="nav-item active" onclick="toggleSidebar()"><i class="fas fa-home"></i> ACCUEIL</div>
        <div class="nav-item" onclick="toggleSidebar()"><i class="fas fa-shield-alt"></i> AUTO-MOD</div>
        <div class="nav-item" onclick="toggleSidebar()"><i class="fas fa-ticket-alt"></i> TICKETS</div>
    </nav>

    <div class="viewport">
        <header>
            <i class="fas fa-bars" onclick="toggleSidebar()" style="font-size: 20px; cursor: pointer;"></i>
            <span style="font-weight: 800; font-size: 14px;">CONFIGURATION ACCUEIL</span>
        </header>

        <div class="content">
            <div class="embed">
                <div class="author" onclick="openModal('author', 'Lien Image Auteur')">
                    <img id="p-auth-img" src="">
                    <span id="p-auth-name">BagBot</span>
                </div>
                <div class="main-row">
                    <div style="flex:1">
                        <div class="title" id="p-title" onclick="openModal('title', 'Titre de l\'Embed')">Titre de l'accueil</div>
                        <div class="desc" id="p-desc" onclick="openModal('desc', 'Description')">Cliquez ici pour modifier le texte...</div>
                    </div>
                    <div class="thumb" id="p-thumb" onclick="openModal('thumb', 'Lien Miniature (URL)')">
                        <i class="fas fa-plus"></i>
                    </div>
                </div>
                <div class="banner" id="p-banner" onclick="openModal('banner', 'Lien Bannière (URL)')">
                    <i class="fas fa-image" style="font-size: 24px; color:#222"></i>
                </div>
                <div class="footer" onclick="openModal('footer', 'Texte du Footer')">
                    <img id="p-foot-img" src="">
                    <span id="p-foot-text">ID: {user_id} • BagBot System</span>
                </div>
            </div>

            <div class="save-bar">
                <label style="font-size: 10px; color: var(--text-m); font-weight: bold; margin-bottom: 8px; display: block;">SALON DE DESTINATION</label>
                <select id="chan-list"></select>
                <button class="btn-confirm" onclick="finalSave()" style="margin-top: 10px;">SAUVEGARDER TOUT</button>
            </div>
        </div>
    </div>

    <div class="modal" id="editModal">
        <div class="modal-header">
            <span class="modal-title" id="modalTitle">MODIFIER</span>
            <i class="fas fa-times" onclick="closeModal()" style="cursor:pointer"></i>
        </div>
        <div id="modalBody">
            <input type="text" id="modalInput">
            <textarea id="modalArea" rows="4" style="display:none"></textarea>
        </div>
        <button class="btn-confirm" onclick="applyChange()">APPLIQUER</button>
    </div>

    <script>
        let currentType = '';
        
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.querySelector('.sidebar-overlay').classList.toggle('active');
        }

        function openModal(type, title) {
            currentType = type;
            document.getElementById('modalTitle').innerText = title;
            const modalInput = document.getElementById('modalInput');
            const modalArea = document.getElementById('modalArea');

            modalInput.style.display = (type === 'desc') ? 'none' : 'block';
            modalArea.style.display = (type === 'desc') ? 'block' : 'none';

            // Pré-remplissage
            if(type === 'title') modalInput.value = document.getElementById('p-title').innerText;
            else if(type === 'desc') modalArea.value = document.getElementById('p-desc').innerText;
            else if(type === 'footer') modalInput.value = document.getElementById('p-foot-text').innerText;
            else modalInput.value = "";

            document.getElementById('editModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('editModal').classList.remove('active');
        }

        function applyChange() {
            const val = (currentType === 'desc') ? document.getElementById('modalArea').value : document.getElementById('modalInput').value;
            
            if(currentType === 'title') document.getElementById('p-title').innerText = val;
            if(currentType === 'desc') document.getElementById('p-desc').innerText = val;
            if(currentType === 'footer') document.getElementById('p-foot-text').innerText = val;
            if(currentType === 'banner') document.getElementById('p-banner').innerHTML = `<img src="${val}">`;
            if(currentType === 'thumb') document.getElementById('p-thumb').innerHTML = `<img src="${val}">`;
            if(currentType === 'author') document.getElementById('p-auth-img').src = val;
            
            closeModal();
        }

        async function finalSave() {
            const data = {
                category: "accueil",
                settings: {
                    title: document.getElementById('p-title').innerText,
                    description: document.getElementById('p-desc').innerText,
                    footer: document.getElementById('p-foot-text').innerText,
                    channel: document.getElementById('chan-list').value
                }
            };
            const res = await fetch('/api/save_settings', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            const r = await res.json();
            alert("✅ Configuration mise à jour !");
        }

        window.onload = async () => {
            const res = await fetch('/api/get_server_info');
            const data = await res.json();
            if(data.channels) {
                document.getElementById('chan-list').innerHTML = data.channels.map(c => `<option value="${c.id}"># ${c.name}</option>`).join('');
                document.getElementById('p-auth-img').src = data.bot.avatar;
                document.getElementById('p-foot-img').src = data.bot.avatar;
                document.getElementById('p-auth-name').innerText = data.bot.name;
            }
        }
    </script>
</body>
</html>

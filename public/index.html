<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BagBot Designer Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #d37f6a; --bg: #2b2d31; --sidebar: #1e1f22; --dark: #111214; --text: #dbdee1; --border: #3f4147; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        /* SIDEBAR COMPLÈTE RÉTRACTABLE */
        .sidebar { width: 260px; background: var(--sidebar); display: flex; flex-direction: column; transition: transform 0.3s ease, width 0.3s ease; border-right: 1px solid var(--dark); z-index: 1000; }
        .sidebar.collapsed { width: 0; transform: translateX(-100%); }
        .nav-header { padding: 20px; display: flex; align-items: center; justify-content: space-between; background: var(--dark); }
        .nav-item { padding: 15px 20px; display: flex; align-items: center; gap: 15px; cursor: pointer; color: #888; border-left: 3px solid transparent; }
        .nav-item.active { background: rgba(211, 127, 106, 0.1); color: white; border-left-color: var(--accent); }

        /* MAIN CONTENT */
        .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        .top-nav { height: 60px; background: var(--sidebar); display: flex; align-items: center; padding: 0 20px; gap: 20px; border-bottom: 1px solid var(--dark); }
        .hamburger { font-size: 20px; color: var(--accent); cursor: pointer; }
        
        .content { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; align-items: center; }

        /* EMBED BUILDER (STYLE DRAFTBOT) */
        .preview-card { background: #313338; border-radius: 8px; padding: 15px; width: 100%; max-width: 480px; position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .embed-stripe { position: absolute; left: 15px; top: 15px; bottom: 15px; width: 4px; background: var(--accent); border-radius: 4px; }
        .embed-inner { margin-left: 15px; position: relative; }
        
        .slot { border: 2px dashed #4e5058; border-radius: 4px; background: rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; position: relative; }
        .slot:hover { border-color: var(--accent); }
        .slot img { width: 100%; height: 100%; object-fit: cover; }
        
        .auth-zone { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
        .auth-img { width: 22px; height: 22px; border-radius: 50%; min-height: auto; }
        .thumb-zone { position: absolute; top: 0; right: 0; width: 65px; height: 65px; z-index: 5; }
        .title-input { font-size: 16px; font-weight: 700; color: white; margin-bottom: 5px; border: none; background: none; width: 100%; outline: none; }
        .desc-input { font-size: 14px; color: var(--text); min-height: 40px; outline: none; white-space: pre-wrap; }
        .banner-zone { width: 100%; height: 140px; margin-top: 10px; }

        /* MODAL MEDIA (UPLOAD + LIEN) */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--bg); padding: 25px; border-radius: 12px; width: 100%; max-width: 350px; border: 1px solid var(--border); }
        .btn { width: 100%; padding: 12px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-upload { background: var(--accent); color: white; }
        .btn-link { background: #4e5058; color: white; }
        input[type="text"] { width: 100%; padding: 12px; background: var(--dark); border: 1px solid var(--border); color: white; border-radius: 6px; margin-bottom: 15px; }

        /* EMOJI PICKER (STYLE DISCORD AVEC SIDE MENU) */
        #emojiPicker { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 3000; display: none; align-items: flex-end; }
        .picker-container { background: var(--bg); height: 75vh; width: 100%; border-radius: 20px 20px 0 0; display: flex; overflow: hidden; }
        .picker-sidebar { width: 50px; background: var(--dark); display: flex; flex-direction: column; align-items: center; padding: 15px 0; gap: 20px; border-right: 1px solid var(--border); }
        .picker-main { flex: 1; display: flex; flex-direction: column; }
        .picker-grid { flex: 1; overflow-y: auto; display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 15px; align-content: start; }
        .emoji-item { font-size: 30px; text-align: center; cursor: pointer; transition: 0.2s; padding: 5px; border-radius: 8px; }
        .emoji-item img { width: 35px; height: 35px; }

        /* REACTION LIST */
        .reac-row { background: var(--dark); border-radius: 8px; padding: 10px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; }
        .emoji-trigger { width: 45px; height: 45px; background: var(--bg); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; border: 1px solid var(--border); }
        select { flex: 1; background: var(--bg); color: white; border: 1px solid var(--border); padding: 10px; border-radius: 6px; }

        .deploy-footer { margin-top: 20px; width: 100%; max-width: 480px; }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div class="nav-header">
            <span style="font-weight: 900; color: var(--accent);">BAGBOT PRO</span>
            <i class="fas fa-times" onclick="toggleSidebar()" style="cursor:pointer; md:hidden"></i>
        </div>
        <div class="nav-item active"><i class="fas fa-magic"></i> Builder</div>
        <div class="nav-item"><i class="fas fa-history"></i> Historique</div>
        <div class="nav-item"><i class="fas fa-cog"></i> Paramètres</div>
    </div>

    <div class="main">
        <div class="top-nav">
            <i class="fas fa-bars hamburger" onclick="toggleSidebar()"></i>
            <span id="nav-title" style="font-weight: bold;">Nouveau Message</span>
        </div>

        <div class="content">
            <div class="preview-card">
                <div class="embed-stripe"></div>
                <div class="embed-inner">
                    <div class="thumb-zone slot" onclick="openMedia('thumb')">
                        <i class="fas fa-plus" id="ic-thumb"></i>
                        <img id="v-thumb" style="display:none">
                    </div>
                    <div class="auth-zone">
                        <div class="auth-img slot" onclick="openMedia('auth')">
                            <img id="v-auth" style="display:none">
                        </div>
                        <span contenteditable="true" id="txt-auth" style="font-weight:600; font-size:13px;">Auteur</span>
                    </div>
                    <div contenteditable="true" class="title-input" id="txt-title">Titre de l'embed</div>
                    <div contenteditable="true" class="desc-input" id="txt-desc">Cliquez pour modifier la description...</div>
                    <div class="banner-zone slot" onclick="openMedia('banner')">
                        <i class="fas fa-image" id="ic-banner" style="font-size:30px; color:#4e5058"></i>
                        <img id="v-banner" style="display:none">
                    </div>
                </div>
            </div>

            <div class="deploy-footer">
                <label style="font-size: 11px; font-weight: 800; color: #8e9297; margin-bottom: 5px; display: block;">SALON DISCORD</label>
                <select id="sel-chans" style="width: 100%; margin-bottom: 20px;"></select>

                <div id="reacs-list"></div>
                <button class="btn btn-link" onclick="addReac()" style="margin-top:10px;">+ AJOUTER UN RÔLE</button>
                <button class="btn btn-upload" onclick="deploy()" style="margin-top: 15px; padding: 18px; font-size: 16px;">🚀 DÉPLOYER MAINTENANT</button>
            </div>
        </div>
    </div>

    <div id="mediaModal" class="modal">
        <div class="modal-content">
            <h3 style="margin-top:0">Source de l'image</h3>
            <button class="btn btn-upload" onclick="document.getElementById('f-in').click()">
                <i class="fas fa-upload"></i> Téléverser depuis l'appareil
            </button>
            <div style="margin: 15px 0; display:flex; align-items:center; gap:10px; color:#555;">
                <hr style="flex:1; border:0; border-top:1px solid #333"> OU <hr style="flex:1; border:0; border-top:1px solid #333">
            </div>
            <input type="text" id="url-input" placeholder="Lien direct (https://...)">
            <button class="btn btn-link" onclick="setLink()">Utiliser ce lien</button>
            <button onclick="closeModal('mediaModal')" style="background:none; border:none; color:#888; width:100%; cursor:pointer;">Annuler</button>
        </div>
    </div>

    <div id="emojiPicker">
        <div class="picker-container">
            <div class="picker-sidebar">
                <i class="fas fa-clock" title="Récents"></i>
                <i class="fas fa-smile" title="Standards"></i>
                <i class="fas fa-users" title="Serveur"></i>
            </div>
            <div class="picker-main">
                <div style="padding:15px; background:var(--dark);">
                    <input type="text" placeholder="Rechercher..." oninput="filterEmojis(this.value)" style="margin:0; padding:10px;">
                </div>
                <div class="picker-grid" id="emoji-grid"></div>
                <button onclick="closeModal('emojiPicker')" style="padding:15px; background:var(--dark); border:none; color:white; font-weight:bold;">Fermer</button>
            </div>
        </div>
    </div>

    <input type="file" id="f-in" style="display:none" onchange="handleFile(this)">

<script>
    const API = "http://192.168.1.133:49501";
    let activeZone = null, activeBtn = null, allEmojis = [], roles = [];

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('collapsed'); }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function openMedia(z) { activeZone = z; document.getElementById('mediaModal').style.display = 'flex'; }
    
    async function init() {
        const chans = await fetch(`${API}/api/channels`).then(r => r.json());
        document.getElementById('sel-chans').innerHTML = chans.map(c => `<option value="${c.id}"># ${c.name}</option>`).join('');
        
        roles = await fetch(`${API}/api/roles`).then(r => r.json());
        
        const srvEmos = await fetch(`${API}/api/emojis`).then(r => r.json());
        const stds = ["😀","😃","😄","😁","😆","😅","😂","🤣","😊","😇","🙂","🙃","😉","😌","😍","🥰","😘","😋","😛","😜","🤪","🤨","😎","🤩","🥳","😏","😒","😞","😔","😟","😕","🙁","😣","😖","😫","😩","🥺","😢","😭","😤","😠","😡","🤬","🤯","😳","🥵","🥶","😱","😨","😰","😥","😓","🤗","🤔","🤭","🤫","🤥","😶","😐","😑","😬","🙄","😯","😦","😧","😮","😲","🥱","😴","🤤","😪","😵","🤐","🥴","🤢","🤮","🤧","😷","🤒","🤕","🔥","✅","❌","🔞","⭐","✨","⚡","🎁","🏆","💎","🌈","🌍","🌙","☀️","⚽","🎮","🎧","📸","🚗","🚀","💡","🔑","❤️","💔","✔️","⚠️"];
        
        allEmojis = [
            ...srvEmos.map(e => ({id: e.id, url: e.url, name: e.name, isCust: true})),
            ...stds.map(s => ({id: s, name: s, isCust: false}))
        ];
        renderEmojis(allEmojis);
    }

    function renderEmojis(list) {
        document.getElementById('emoji-grid').innerHTML = list.map(e => `
            <div class="emoji-item" onclick="pickEmoji('${e.id}', ${e.isCust}, '${e.url||''}')">
                ${e.isCust ? `<img src="${e.url}">` : e.id}
            </div>
        `).join('');
    }

    function filterEmojis(q) { renderEmojis(allEmojis.filter(e => e.name.toLowerCase().includes(q.toLowerCase()))); }

    async function handleFile(input) {
        if(!input.files[0]) return;
        const fd = new FormData(); fd.append('file', input.files[0]);
        const res = await fetch(`${API}/api/upload`, { method: 'POST', body: fd }).then(r => r.json());
        if(res.url) updatePreview(res.url);
        closeModal('mediaModal');
    }

    function setLink() {
        const url = document.getElementById('url-input').value;
        if(url) updatePreview(url);
        closeModal('mediaModal');
    }

    function updatePreview(url) {
        const img = document.getElementById(`v-${activeZone}`);
        const ic = document.getElementById(`ic-${activeZone}`);
        img.src = url; img.style.display = 'block';
        if(ic) ic.style.display = 'none';
    }

    function addReac() {
        const div = document.createElement('div');
        div.className = 'reac-row';
        div.innerHTML = `
            <div class="emoji-trigger" onclick="openEmoji(this)">😀</div>
            <select>${roles.map(r => `<option value="${r.id}">${r.name}</option>`).join('')}</select>
            <i class="fas fa-trash" style="color:#555" onclick="this.parentElement.remove()"></i>
        `;
        document.getElementById('reacs-list').appendChild(div);
    }

    function openEmoji(btn) { activeBtn = btn; document.getElementById('emojiPicker').style.display = 'flex'; }
    function pickEmoji(id, isCust, url) {
        activeBtn.innerHTML = isCust ? `<img src="${url}" data-id="${id}">` : id;
        closeModal('emojiPicker');
    }

    async function deploy() {
        const reacs = Array.from(document.querySelectorAll('.reac-row')).map(row => ({
            emoji: row.querySelector('.emoji-trigger img')?.dataset.id || row.querySelector('.emoji-trigger').innerText,
            roleId: row.querySelector('select').value
        }));
        await fetch(`${API}/api/deploy`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                channelId: document.getElementById('sel-chans').value,
                title: document.getElementById('txt-title').innerText,
                description: document.getElementById('txt-desc').innerText,
                author: document.getElementById('txt-auth').innerText,
                author_img: document.getElementById('v-auth').style.display==='block' ? document.getElementById('v-auth').src : null,
                thumbnail: document.getElementById('v-thumb').style.display==='block' ? document.getElementById('v-thumb').src : null,
                banner: document.getElementById('v-banner').style.display==='block' ? document.getElementById('v-banner').src : null,
                reactions: reacs
            })
        });
        alert("🚀 Message envoyé !");
    }

    window.onload = init;
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BAGBOT ELITE V9</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #0a0a0a; --card: #141414; --accent: #ed4245; --border: #252525; --d-bg: #2b2d31; --success: #43b581; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { margin: 0; background: var(--bg); color: #fff; height: 100vh; overflow: hidden; }

        /* Header & Navigation */
        .header { position: fixed; top: 0; left: 0; right: 0; height: 65px; background: #000; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; z-index: 2500; }
        .burger { font-size: 22px; color: var(--accent); cursor: pointer; margin-right: 20px; }
        .logo { font-weight: 900; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; }

        #sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100vh; background: #000; z-index: 3000; transition: 0.3s; border-right: 1px solid var(--border); }
        #sidebar.open { left: 0; }
        .nav-item { padding: 20px; border-bottom: 1px solid #111; cursor: pointer; display: flex; align-items: center; justify-content: space-between; color: #888; font-weight: bold; }
        .nav-item.active { color: var(--accent); background: #ed424510; }
        
        .submenu { display: none; background: #050505; }
        .submenu.show { display: block; }
        .sub-item { padding: 15px 15px 15px 55px; cursor: pointer; color: #666; font-size: 14px; border-bottom: 1px solid #0a0a0a; transition: 0.2s; }
        .sub-item:hover { color: #fff; }
        .sub-item.active { color: var(--accent); background: #ed424505; font-weight: bold; }

        /* Main Content */
        main { height: 100vh; overflow-y: auto; padding: 85px 15px 180px; -webkit-overflow-scrolling: touch; }
        .section { display: none; max-width: 600px; margin: 0 auto; }
        .section.active { display: block; }

        /* Discord Preview */
        .preview { background: var(--d-bg); border-left: 4px solid var(--accent); border-radius: 4px; padding: 15px; margin-bottom: 25px; }
        .pv-top { display: flex; justify-content: space-between; gap: 10px; }
        .pv-thumb { width: 65px; height: 65px; border-radius: 4px; background: #222; overflow: hidden; border: 1px dashed #444; cursor: pointer; }
        .pv-banner { width: 100%; height: 140px; border-radius: 8px; background: #222; margin-top: 10px; overflow: hidden; border: 1px dashed #444; cursor: pointer; }
        .pv-f-icon { width: 20px; height: 20px; border-radius: 50%; background: #222; overflow: hidden; border: 1px dashed #444; cursor: pointer; }
        img { width: 100%; height: 100%; object-fit: cover; }

        /* Cards & Forms */
        .card { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid var(--border); margin-bottom: 20px; }
        h2 { margin-top: 0; font-size: 18px; color: #fff; }
        label { display: block; font-size: 11px; font-weight: 800; color: #555; text-transform: uppercase; margin: 15px 0 8px; }
        input, textarea, select { width: 100%; background: #000; border: 1px solid var(--border); color: #fff; padding: 14px; border-radius: 10px; font-size: 14px; outline: none; }
        input[type="color"] { height: 45px; padding: 5px; cursor: pointer; }
        
        .btn { border: none; padding: 16px; border-radius: 12px; font-weight: 800; width: 100%; cursor: pointer; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s; }
        .btn-save { background: var(--accent); color: #fff; }
        .btn-test { background: #5865f2; color: #fff; }

        /* Checklist Roles */
        .role-list { background: #000; border: 1px solid var(--border); border-radius: 10px; max-height: 250px; overflow-y: auto; margin-top: 10px; }
        .role-item { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid #111; cursor: pointer; }
        .role-item input { width: 18px; height: 18px; margin-right: 15px; }

        /* Gallery */
        .gallery-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 15px; }
        .img-card { height: 100px; border-radius: 10px; border: 1px solid var(--border); overflow: hidden; position: relative; background: #000; }
        .del-img { position: absolute; top: 5px; right: 5px; background: var(--accent); color: white; border: none; border-radius: 4px; padding: 5px; z-index: 5; font-size: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <i class="fas fa-bars burger" onclick="toggleSidebar(event)"></i>
        <div class="logo">BagBot Elite</div>
    </div>

    <div id="sidebar">
        <div style="padding: 30px; text-align: center; color: var(--accent); font-weight: 900; letter-spacing: 3px;">DASHBOARD</div>
        
        <div class="nav-item active" onclick="toggleSubmenu('sub-config', event)">
            <span>CONFIGURATION</span>
            <i class="fas fa-chevron-down"></i>
        </div>
        <div id="sub-config" class="submenu show">
            <div id="mi-welcome" class="sub-item active" onclick="showTab('welcome', this)">Bienvenue</div>
            <div id="mi-leave" class="sub-item" onclick="showTab('leave', this)">Départ</div>
        </div>

        <div class="nav-item" onclick="showTab('admin', this)">PERMISSIONS</div>
        <div class="nav-item" onclick="showTab('gallery', this)">GALERIE</div>
    </div>

    <main onclick="closeSidebar()">
        <div id="welcome" class="section active">
            <div class="preview" id="pv-box-welcome">
                <div class="pv-top">
                    <div style="flex-grow:1">
                        <div id="pv-w-title" style="color:#00a8fc; font-weight:bold;">Bienvenue</div>
                        <div id="pv-w-desc" style="font-size:14px; margin-top:5px; white-space:pre-wrap;">Message...</div>
                    </div>
                    <div class="pv-thumb" onclick="openPicker('welcome', 'thumbnail')"><img id="w-img-thumb"></div>
                </div>
                <div class="pv-banner" onclick="openPicker('welcome', 'banner')"><img id="w-img-banner"></div>
                <div style="display:flex; align-items:center; gap:8px; margin-top:10px; font-size:11px; color:#b5bac1;">
                    <div class="pv-f-icon" onclick="openPicker('welcome', 'footer_icon')"><img id="w-img-footer"></div>
                    <span id="pv-w-footer">Footer</span>
                </div>
            </div>

            <div class="card">
                <h2>Configuration Bienvenue</h2>
                <label>Couleur Embed</label>
                <input type="color" id="w-color" oninput="sync('welcome')">
                <label>Titre</label>
                <input type="text" id="w-title" oninput="sync('welcome')">
                <label>Message</label>
                <textarea id="w-desc" rows="4" oninput="sync('welcome')"></textarea>
                <label>Texte Footer</label>
                <input type="text" id="w-footer" oninput="sync('welcome')">
                <label>Salon de réception</label>
                <select id="w-channel"></select>
                <label>Rôles à donner au join</label>
                <div id="w-roles-list" class="role-list"></div>
                <button class="btn btn-save" onclick="save()"><i class="fas fa-save"></i> SAUVEGARDER</button>
                <button class="btn btn-test" onclick="test('welcome')"><i class="fab fa-discord"></i> TESTER LE RENDU</button>
            </div>
        </div>

        <div id="leave" class="section">
            <div class="preview" id="pv-box-leave">
                <div class="pv-top">
                    <div style="flex-grow:1">
                        <div id="pv-l-title" style="color:#00a8fc; font-weight:bold;">Au revoir</div>
                        <div id="pv-l-desc" style="font-size:14px; margin-top:5px; white-space:pre-wrap;">Message...</div>
                    </div>
                    <div class="pv-thumb" onclick="openPicker('leave', 'thumbnail')"><img id="l-img-thumb"></div>
                </div>
                <div class="pv-banner" onclick="openPicker('leave', 'banner')"><img id="l-img-banner"></div>
                <div style="display:flex; align-items:center; gap:8px; margin-top:10px; font-size:11px; color:#b5bac1;">
                    <div class="pv-f-icon" onclick="openPicker('leave', 'footer_icon')"><img id="l-img-footer"></div>
                    <span id="pv-l-footer">Footer</span>
                </div>
            </div>

            <div class="card">
                <h2>Configuration Départ</h2>
                <label>Couleur Embed</label>
                <input type="color" id="l-color" oninput="sync('leave')">
                <label>Titre</label>
                <input type="text" id="l-title" oninput="sync('leave')">
                <label>Message</label>
                <textarea id="l-desc" rows="4" oninput="sync('leave')"></textarea>
                <label>Texte Footer</label>
                <input type="text" id="l-footer" oninput="sync('leave')">
                <label>Salon de réception</label>
                <select id="l-channel"></select>
                <button class="btn btn-save" onclick="save()"><i class="fas fa-save"></i> SAUVEGARDER</button>
                <button class="btn btn-test" onclick="test('leave')"><i class="fab fa-discord"></i> TESTER LE RENDU</button>
            </div>
        </div>

        <div id="admin" class="section">
            <div class="card">
                <h2>Accès au Dashboard</h2>
                <p style="font-size:12px; color:#666;">Sélectionnez les rôles autorisés à utiliser ce bot sur Discord.</p>
                <div id="admin-roles-list" class="role-list"></div>
                <button class="btn btn-save" onclick="save()"><i class="fas fa-check"></i> APPLIQUER</button>
            </div>
        </div>

        <div id="gallery" class="section">
            <div class="card">
                <h2>Galerie Médias</h2>
                <input type="file" id="file-input" onchange="uploadFile()">
                <div id="gallery-list" class="gallery-grid"></div>
                <button class="btn btn-save" onclick="showTab(lastTab)"><i class="fas fa-arrow-left"></i> RETOUR</button>
            </div>
        </div>
    </main>

    <script>
        let db = { channels: [], roles: [], config: {}, images: [] };
        let activeMode = ''; let activeType = ''; let lastTab = 'welcome';

        async function init() {
            try {
                const res = await fetch('/api/get_data');
                db = await res.json();
                
                // Salons
                const chanHtml = db.channels.map(c => `<option value="${c.id}"># ${c.name}</option>`).join('');
                document.getElementById('w-channel').innerHTML = chanHtml;
                document.getElementById('l-channel').innerHTML = chanHtml;

                // Rôles
                const renderRoles = (containerId, selected) => {
                    document.getElementById(containerId).innerHTML = db.roles.map(r => `
                        <div class="role-item" onclick="this.querySelector('input').click()">
                            <input type="checkbox" value="${r}" ${selected.includes(r)?'checked':''} onclick="event.stopPropagation()">
                            <span>${r}</span>
                        </div>`).join('');
                };
                renderRoles('w-roles-list', db.config.welcome.trigger_roles || []);
                renderRoles('admin-roles-list', db.config.admin_roles || []);

                // Données Bienvenue
                const w = db.config.welcome;
                document.getElementById('w-title').value = w.title || "";
                document.getElementById('w-desc').value = w.desc || "";
                document.getElementById('w-footer').value = w.footer || "";
                document.getElementById('w-color').value = w.color || "#ed4245";
                document.getElementById('w-channel').value = w.channel || "";
                setImg('welcome', 'thumbnail', w.thumbnail);
                setImg('welcome', 'banner', w.banner);
                setImg('welcome', 'footer_icon', w.footer_icon);

                // Données Départ
                const l = db.config.leave;
                document.getElementById('l-title').value = l.title || "";
                document.getElementById('l-desc').value = l.desc || "";
                document.getElementById('l-footer').value = l.footer || "";
                document.getElementById('l-color').value = l.color || "#ed4245";
                document.getElementById('l-channel').value = l.channel || "";
                setImg('leave', 'thumbnail', l.thumbnail);
                setImg('leave', 'banner', l.banner);
                setImg('leave', 'footer_icon', l.footer_icon);

                renderGallery();
                sync('welcome'); sync('leave');
            } catch(e) { console.error(e); }
        }

        function sync(mode) {
            const p = mode[0];
            const col = document.getElementById(`${p}-color`).value;
            document.getElementById(`pv-box-${mode}`).style.borderLeftColor = col;
            document.getElementById(`pv-${p}-title`).innerText = document.getElementById(`${p}-title`).value || (mode==='welcome'?'Bienvenue':'Au revoir');
            document.getElementById(`pv-${p}-desc`).innerText = document.getElementById(`${p}-desc`).value || "Message...";
            document.getElementById(`pv-${p}-footer`).innerText = document.getElementById(`${p}-footer`).value || "Footer Text";
        }

        function setImg(m, t, u) {
            const p = m[0];
            const id = (t==='footer_icon') ? `${p}-img-footer` : `${p}-img-${t}`;
            const el = document.getElementById(id);
            if(!el) return;
            if(u) { el.src = u; el.style.display='block'; el.dataset.url=u; } 
            else { el.style.display='none'; el.dataset.url=""; }
        }

        function openPicker(m, t) { activeMode = m; activeType = t; lastTab = m; showTab('gallery'); }
        function selectImage(u) { setImg(activeMode, activeType, u); showTab(activeMode); sync(activeMode); }

        async function uploadFile() {
            const file = document.getElementById('file-input').files[0];
            if(!file) return;
            const fd = new FormData(); fd.append('file', file);
            const res = await fetch('/api/upload', {method:'POST', body:fd});
            const r = await res.json();
            db.images.push(r.path); renderGallery(); selectImage(r.path);
        }

        function renderGallery() {
            document.getElementById('gallery-list').innerHTML = db.images.map(img => `
                <div class="img-card"><img src="${img}" onclick="selectImage('${img}')"></div>
            `).join('');
        }

        async function save() {
            const config = {
                welcome: {
                    title: document.getElementById('w-title').value, desc: document.getElementById('w-desc').value,
                    footer: document.getElementById('w-footer').value, color: document.getElementById('w-color').value,
                    channel: document.getElementById('w-channel').value,
                    thumbnail: document.getElementById('w-img-thumb').dataset.url || "",
                    banner: document.getElementById('w-img-banner').dataset.url || "",
                    footer_icon: document.getElementById('w-img-footer').dataset.url || "",
                    trigger_roles: Array.from(document.querySelectorAll('#w-roles-list input:checked')).map(i => i.value)
                },
                leave: {
                    title: document.getElementById('l-title').value, desc: document.getElementById('l-desc').value,
                    footer: document.getElementById('l-footer').value, color: document.getElementById('l-color').value,
                    channel: document.getElementById('l-channel').value,
                    thumbnail: document.getElementById('l-img-thumb').dataset.url || "",
                    banner: document.getElementById('l-img-banner').dataset.url || "",
                    footer_icon: document.getElementById('l-img-footer').dataset.url || ""
                },
                admin_roles: Array.from(document.querySelectorAll('#admin-roles-list input:checked')).map(i => i.value)
            };
            await fetch('/api/save', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(config)});
            alert("Configuration sauvegardée !");
        }

        async function test(mode) {
            const p = mode[0];
            const conf = {
                channel: document.getElementById(`${p}-channel`).value,
                title: document.getElementById(`${p}-title`).value,
                desc: document.getElementById(`${p}-desc`).value,
                color: document.getElementById(`${p}-color`).value,
                footer: document.getElementById(`${p}-footer`).value,
                thumbnail: document.getElementById(`${p}-img-thumb`).dataset.url || "",
                banner: document.getElementById(`${p}-img-banner`).dataset.url || "",
                footer_icon: document.getElementById(`${p}-img-footer`).dataset.url || ""
            };
            await fetch('/api/test_message', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({mode, config:conf})});
        }

        function toggleSidebar(e) { e.stopPropagation(); document.getElementById('sidebar').classList.toggle('open'); }
        function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); }
        function toggleSubmenu(id, e) { e.stopPropagation(); document.getElementById(id).classList.toggle('show'); }
        
        function showTab(id, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item, .sub-item').forEach(n => n.classList.remove('active'));
            if(el) el.classList.add('active');
            closeSidebar();
        }

        window.onload = init;
    </script>
</body>
</html>

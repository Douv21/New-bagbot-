<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BagBot Designer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #d37f6a; --bg: #2b2d31; --sidebar: #1e1f22; --text: #dbdee1; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); color: var(--text); overflow: hidden; display: flex; }

        /* SIDEBAR COMPORTEMENT CAPTURE 10128 */
        .sidebar { width: 0; background: var(--sidebar); transition: 0.3s; overflow: hidden; display: flex; flex-direction: column; border-right: 1px solid #111; position: absolute; height: 100%; z-index: 1000; }
        .sidebar.active { width: 260px; }
        .nav-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; background: #111; }
        .nav-item { padding: 15px 25px; color: #888; display: flex; align-items: center; gap: 15px; cursor: pointer; }
        .nav-item.active { color: white; background: rgba(211, 127, 106, 0.1); border-left: 3px solid var(--accent); }

        /* CONTENU PRINCIPAL */
        .main { flex: 1; display: flex; flex-direction: column; width: 100vw; }
        .header { height: 60px; background: var(--sidebar); display: flex; align-items: center; padding: 0 20px; gap: 15px; border-bottom: 1px solid #111; }
        
        .builder-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; align-items: center; }

        /* DESIGN EMBED CAPTURE 10128 */
        .embed-card { background: #313338; border-radius: 8px; padding: 15px; width: 100%; max-width: 450px; border-left: 4px solid var(--accent); position: relative; }
        .slot { border: 2px dashed #4e5058; border-radius: 8px; background: rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; overflow: hidden; }
        .slot img { width: 100%; height: 100%; object-fit: cover; }
        
        .thumb-slot { position: absolute; top: 15px; right: 15px; width: 65px; height: 65px; }
        .banner-slot { width: 100%; height: 150px; margin-top: 15px; }

        .title { font-size: 18px; font-weight: bold; color: white; margin-bottom: 5px; border: none; background: transparent; width: 80%; }
        .desc { font-size: 14px; color: var(--text); min-height: 40px; margin-bottom: 15px; }

        /* BOUTONS ET INPUTS */
        .controls { width: 100%; max-width: 450px; margin-top: 20px; }
        input { width: 100%; padding: 12px; background: #1e1f22; border: 1px solid #333; color: white; border-radius: 8px; margin-bottom: 15px; box-sizing: border-box; }
        .btn-add { background: #4e5058; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; margin-bottom: 10px; font-weight: bold; }
        .btn-deploy { background: var(--accent); color: white; border: none; padding: 18px; width: 100%; border-radius: 8px; font-weight: bold; font-size: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        [contenteditable]:empty:before { content: attr(placeholder); color: #555; }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div class="nav-header">
            <span style="color:var(--accent); font-weight:900;">BAGBOT DASHBOARD</span>
            <i class="fas fa-times" onclick="toggleSidebar()"></i>
        </div>
        <div class="nav-item active"><i class="fas fa-edit"></i> Builder</div>
        <div class="nav-item"><i class="fas fa-history"></i> Historique</div>
    </div>

    <div class="main">
        <div class="header">
            <i class="fas fa-bars" onclick="toggleSidebar()" style="color:var(--accent); font-size: 22px;"></i>
            <span style="font-weight: bold;">Nouveau Message</span>
        </div>

        <div class="builder-container">
            <div class="embed-card">
                <div class="thumb-slot slot" onclick="openUpload('thumb')">
                    <i class="fas fa-plus" id="i-thumb"></i>
                    <img id="v-thumb" style="display:none">
                </div>
                
                <div id="v-title" contenteditable="true" class="title" placeholder="Titre du message">Titre de l'embed</div>
                <div id="v-desc" contenteditable="true" class="desc" placeholder="Écrivez votre description ici...">Description ici...</div>

                <div class="banner-slot slot" onclick="openUpload('banner')">
                    <i class="fas fa-image" id="i-banner" style="font-size: 32px; color: #4e5058;"></i>
                    <img id="v-banner" style="display:none">
                </div>
            </div>

            <div class="controls">
                <label style="font-size: 11px; color: #888; font-weight: bold;">SALON DISCORD (ID)</label>
                <input type="text" id="chan-id" placeholder="Ex: 1349448439402561637">
                
                <div id="reacs"></div>
                <button class="btn-add" onclick="addEmoji()">+ AJOUTER UN RÔLE RÉACTION</button>
                
                <button class="btn-deploy" onclick="deploy()">🚀 DÉPLOYER SUR DISCORD</button>
            </div>
        </div>
    </div>

    <input type="file" id="f-input" style="display:none" onchange="handleFile(this)">

<script>
    let activeZone = null;
    const API = "http://192.168.1.133:49501";

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
    
    function openUpload(zone) {
        activeZone = zone;
        document.getElementById('f-input').click();
    }

    function handleFile(input) {
        if(!input.files[0]) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            // Affichage local immédiat pour l'aperçu
            const img = document.getElementById(`v-${activeZone}`);
            img.src = e.target.result;
            img.style.display = 'block';
            document.getElementById(`i-${activeZone}`).style.display = 'none';
        };
        reader.readAsDataURL(input.files[0]);
    }

    function addEmoji() {
        const emo = prompt("Entrez l'émoji :");
        if(!emo) return;
        const div = document.createElement('div');
        div.style = "background:#111; padding:10px; border-radius:8px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;";
        div.innerHTML = `<span>${emo}</span><i class="fas fa-trash" onclick="this.parentElement.remove()" style="color:#555"></i>`;
        div.dataset.emo = emo;
        document.getElementById('reacs').appendChild(div);
    }

    async function deploy() {
        const reacs = Array.from(document.querySelectorAll('#reacs > div')).map(d => ({ emoji: d.dataset.emo }));
        const payload = {
            channelId: document.getElementById('chan-id').value,
            title: document.getElementById('v-title').innerText,
            description: document.getElementById('v-desc').innerText,
            thumbnail: document.getElementById('v-thumb').style.display === 'block' ? document.getElementById('v-thumb').src : null,
            banner: document.getElementById('v-banner').style.display === 'block' ? document.getElementById('v-banner').src : null,
            reactions: reacs
        };

        await fetch(`${API}/api/deploy`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });
        alert("✅ Message envoyé !");
    }
</script>
</body>
</html>

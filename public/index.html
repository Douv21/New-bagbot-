<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BAGBOT ELITE V9</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #0a0a0a; --card: #141414; --accent: #ed4245; --border: #252525; --d-bg: #2b2d31; --success: #43b581; --input-bg: #000; }
        * { box-sizing: border-box; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; }

        .header { position: fixed; top: 0; left: 0; right: 0; height: 65px; background: #000; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; z-index: 2500; }
        .burger { font-size: 22px; color: var(--accent); cursor: pointer; margin-right: 20px; }
        .logo { font-weight: 900; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; }

        #sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100vh; background: #000; z-index: 3000; transition: 0.3s; border-right: 1px solid var(--border); }
        #sidebar.open { left: 0; }
        .nav-item { padding: 20px; border-bottom: 1px solid #111; cursor: pointer; display: flex; align-items: center; gap: 15px; color: #888; font-weight: bold; }
        .nav-item.active { color: var(--accent); background: #ed424510; border-right: 4px solid var(--accent); }

        main { height: 100vh; overflow-y: auto; padding: 85px 15px 180px; -webkit-overflow-scrolling: touch; }
        .section { display: none; max-width: 600px; margin: 0 auto; }
        .section.active { display: block; }

        /* Style Embed Discord (Image 11) */
        .preview { background: var(--d-bg); border-left: 4px solid var(--accent); border-radius: 4px; padding: 15px; margin-bottom: 25px; min-height: 100px; }
        .pv-top { display: flex; justify-content: space-between; gap: 10px; }
        .pv-thumb { width: 60px; height: 60px; border-radius: 4px; background: #222; border: 1px dashed #444; overflow: hidden; flex-shrink: 0; cursor: pointer; }
        .pv-banner { width: 100%; height: 140px; border-radius: 8px; background: #222; border: 1px dashed #444; margin-top: 10px; overflow: hidden; cursor: pointer; }
        .pv-f-icon { width: 20px; height: 20px; border-radius: 50%; background: #222; border: 1px dashed #444; overflow: hidden; cursor: pointer; }
        img { width: 100%; height: 100%; object-fit: cover; }

        .card { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid var(--border); margin-bottom: 20px; }
        label { display: block; font-size: 11px; font-weight: 800; color: #555; text-transform: uppercase; margin: 15px 0 8px; }
        
        /* Correction Sélecteur Rôles (Image 10) */
        .drop-menu { display: none; background: #050505; border: 1px solid var(--border); border-radius: 10px; max-height: 250px; overflow-y: auto; margin-top: 5px; }
        .drop-menu.show { display: block; }
        .role-item { display: flex; align-items: center; padding: 12px 15px; border-bottom: 1px solid #111; cursor: pointer; }
        .role-item input[type="checkbox"] { 
            appearance: none; -webkit-appearance: none;
            width: 18px; height: 18px; border: 2px solid #444; border-radius: 4px;
            margin-right: 15px; position: relative; cursor: pointer; flex-shrink: 0;
        }
        .role-item input:checked { background: var(--accent); border-color: var(--accent); }
        .role-item input:checked::after { content: '✔'; position: absolute; color: white; font-size: 12px; left: 2px; top: -2px; }
        .role-item span { font-size: 14px; color: #ccc; }

        .var-box { background: #000; padding: 12px; border-radius: 10px; margin-top: 8px; border: 1px solid #222; font-size: 12px; color: #777; line-height: 1.6; }
        .var-box b { color: var(--accent); }

        input, textarea, select { width: 100%; background: var(--input-bg); border: 1px solid var(--border); color: #fff; padding: 14px; border-radius: 10px; font-size: 14px; outline: none; }
        
        .btn { border: none; padding: 16px; border-radius: 12px; font-weight: 800; width: 100%; cursor: pointer; margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s; }
        .btn-save { background: var(--accent); color: #fff; }
        .btn-test { background: #5865f2; color: #fff; }
        .btn-test.success { background: var(--success) !important; }

        .gallery-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 15px; }
        .img-card { height: 100px; border-radius: 10px; border: 1px solid var(--border); overflow: hidden; position: relative; }
    </style>
</head>
<body>

    <div class="header">
        <i class="fas fa-bars burger" onclick="toggleSidebar(event)"></i>
        <div class="logo">BAGBOT ELITE</div>
    </div>

    <div id="sidebar">
        <div style="padding: 30px; text-align: center; color: var(--accent); font-weight: 900; letter-spacing: 2px;">PANEL ELITE</div>
        <div class="nav-item active" onclick="showTab('welcome', this)"><i class="fas fa-door-open"></i> BIENVENUE</div>
        <div class="nav-item" onclick="showTab('leave', this)"><i class="fas fa-door-closed"></i> DÉPARTS</div>
        <div class="nav-item" onclick="showTab('admin', this)"><i class="fas fa-shield-alt"></i> PERMISSIONS</div>
        <div class="nav-item" onclick="showTab('gallery', this)"><i class="fas fa-photo-video"></i> GALERIE</div>
    </div>

    <main id="main-scroll" onclick="closeSidebar()">
        <div id="welcome" class="section active">
            <div class="preview" id="pv-welcome">
                <div class="pv-top">
                    <div style="flex-grow:1">
                        <div class="pv-t-text" style="color:#00a8fc; font-weight:bold; font-size:16px;">Titre</div>
                        <div class="pv-d-text" style="font-size:14px; margin-top:5px; white-space:pre-wrap;">Description</div>
                    </div>
                    <div class="pv-thumb" onclick="openPicker('welcome', 'thumbnail')"><img id="w-img-thumb"></div>
                </div>
                <div class="pv-banner" onclick="openPicker('welcome', 'banner')"><img id="w-img-banner"></div>
                <div style="display:flex; align-items:center; gap:8px; margin-top:10px; font-size:12px; color:#b5bac1;">
                    <div class="pv-f-icon" onclick="openPicker('welcome', 'footer_icon')"><img id="w-img-footer"></div>
                    <span class="pv-f-text">Footer</span>
                </div>
            </div>

            <div class="card">
                <label>Couleur Embed</label>
                <input type="color" id="w-color" oninput="sync('welcome')">
                <label>Titre</label>
                <input type="text" id="w-title" placeholder="Bienvenue {user}" oninput="sync('welcome')">
                <label>Message</label>
                <textarea id="w-desc" rows="4" oninput="sync('welcome')"></textarea>
                <div class="var-box"><b>{user}</b>: Mention | <b>{server}</b>: Serveur | <b>{count}</b>: Membres</div>
                <label>Texte Footer</label>
                <input type="text" id="w-footer" oninput="sync('welcome')">
                
                <label>Rôles Déclencheurs</label>
                <div class="drop-btn" style="background:var(--input-bg); padding:14px; border-radius:10px; border:1px solid var(--border); cursor:pointer; display:flex; justify-content:space-between;" onclick="toggleDrop(event, 'w-role-menu')">
                    <span id="w-role-label">0 rôle(s) sélectionné(s)</span> <i class="fas fa-chevron-down"></i>
                </div>
                <div id="w-role-menu" class="drop-menu"></div>

                <label>Salon Cible</label>
                <select id="w-channel" class="chan-select"></select>

                <button class="btn btn-save" onclick="save()"><i class="fas fa-save"></i> SAUVEGARDER</button>
                <button class="btn btn-test" onclick="test('welcome', this)"><i class="fab fa-discord"></i> TESTER LE RENDU</button>
            </div>
        </div>

        <div id="leave" class="section">
            <div class="preview" id="pv-leave">
                <div class="pv-top">
                    <div style="flex-grow:1">
                        <div class="pv-t-text" style="color:#00a8fc; font-weight:bold; font-size:16px;">Au revoir</div>
                        <div class="pv-d-text" style="font-size:14px; margin-top:5px; white-space:pre-wrap;">Description</div>
                    </div>
                    <div class="pv-thumb" onclick="openPicker('leave', 'thumbnail')"><img id="l-img-thumb"></div>
                </div>
                <div class="pv-banner" onclick="openPicker('leave', 'banner')"><img id="l-img-banner"></div>
                <div style="display:flex; align-items:center; gap:8px; margin-top:10px; font-size:12px; color:#b5bac1;">
                    <div class="pv-f-icon" onclick="openPicker('leave', 'footer_icon')"><img id="l-img-footer"></div>
                    <span class="pv-f-text">Footer</span>
                </div>
            </div>

            <div class="card">
                <h2>Configuration Départ</h2>
                <label>Couleur Embed</label>
                <input type="color" id="l-color" oninput="sync('leave')">
                <label>Titre</label>
                <input type="text" id="l-title" oninput="sync('leave')">
                <label>Message</label>
                <textarea id="l-desc" rows="4" oninput="sync('leave')"></textarea>
                <div class="var-box"><b>{user}</b>: Nom | <b>{server}</b>: Serveur | <b>{count}</b>: Restants</div>
                <label>Texte Footer</label>
                <input type="text" id="l-footer" oninput="sync('leave')">
                
                <label>Salon Cible</label>
                <select id="l-channel" class="chan-select"></select>

                <button class="btn btn-save" onclick="save()"><i class="fas fa-save"></i> SAUVEGARDER</button>
                <button class="btn btn-test" onclick="test('leave', this)"><i class="fab fa-discord"></i> TESTER LE RENDU</button>
            </div>
        </div>

        <div id="gallery" class="section">
            <div class="card">
                <h2>Galerie Médias</h2>
                <input type="file" id="file-input" onchange="uploadFile()">
                <div id="gallery-list" class="gallery-grid"></div>
                <button class="btn btn-save" onclick="showTab(lastTab)">RETOUR</button>
            </div>
        </div>
    </main>

    <script>
        let db = {}; let lastTab = 'welcome'; let activeMode = ''; let activeType = '';

        async function init() {
            const res = await fetch('/api/get_data');
            db = await res.json();
            
            const w = db.config.welcome;
            const l = db.config.leave || w;

            // Fill Welcome
            document.getElementById('w-title').value = w.title;
            document.getElementById('w-desc').value = w.desc;
            document.getElementById('w-footer').value = w.footer;
            document.getElementById('w-color').value = w.color;
            setImg('welcome', 'thumbnail', w.thumbnail);
            setImg('welcome', 'banner', w.banner);
            setImg('welcome', 'footer_icon', w.footer_icon);
            
            // Fill Leave
            document.getElementById('l-title').value = l.title;
            document.getElementById('l-desc').value = l.desc;
            document.getElementById('l-footer').value = l.footer;
            document.getElementById('l-color').value = l.color;
            setImg('leave', 'thumbnail', l.thumbnail);
            setImg('leave', 'banner', l.banner);
            setImg('leave', 'footer_icon', l.footer_icon);

            const chanHTML = db.channels.map(ch => `<option value="${ch.id}"># ${ch.name}</option>`).join('');
            document.querySelectorAll('.chan-select').forEach(s => {
                s.innerHTML = chanHTML;
                s.value = (s.id === 'w-channel') ? w.channel : l.channel;
            });

            renderRoles();
            renderGallery();
            sync('welcome'); sync('leave');
        }

        function renderRoles() {
            const selected = db.config.welcome.trigger_roles || [];
            document.getElementById('w-role-menu').innerHTML = db.roles.map(r => `
                <div class="role-item" onclick="toggleRole(this)">
                    <input type="checkbox" value="${r}" ${selected.includes(r)?'checked':''}>
                    <span>${r}</span>
                </div>
            `).join('');
            updateRoleCount();
        }

        function toggleRole(el) {
            const cb = el.querySelector('input');
            cb.checked = !cb.checked;
            updateRoleCount();
        }

        function updateRoleCount() {
            const n = document.querySelectorAll('#w-role-menu input:checked').length;
            document.getElementById('w-role-label').innerText = n + " rôle(s) sélectionné(s)";
        }

        function sync(mode) {
            const p = (mode === 'welcome') ? 'w' : 'l';
            const box = document.getElementById(`pv-${mode}`);
            box.style.borderLeftColor = document.getElementById(`${p}-color`).value;
            box.querySelector('.pv-t-text').innerText = document.getElementById(`${p}-title`).value || "Titre";
            box.querySelector('.pv-d-text').innerText = document.getElementById(`${p}-desc`).value || "Description";
            box.querySelector('.pv-f-text').innerText = document.getElementById(`${p}-footer`).value || "Footer";
        }

        function openPicker(m, t) { activeMode = m; activeType = t; lastTab = m; showTab('gallery'); }
        function setImg(m, t, u) {
            const p = (m === 'welcome') ? 'w' : 'l';
            const el = document.getElementById(`${p}-img-${t}`);
            if(u) { el.src = u; el.style.display = 'block'; el.dataset.url = u; }
            else { el.style.display = 'none'; el.dataset.url = ""; }
        }

        function selectImage(u) { if(activeMode) { setImg(activeMode, activeType, u); showTab(activeMode); sync(activeMode); } }

        async function save() {
            const config = {
                welcome: {
                    title: document.getElementById('w-title').value, desc: document.getElementById('w-desc').value,
                    footer: document.getElementById('w-footer').value, color: document.getElementById('w-color').value,
                    channel: document.getElementById('w-channel').value,
                    thumbnail: document.getElementById('w-img-thumb').dataset.url,
                    banner: document.getElementById('w-img-banner').dataset.url,
                    footer_icon: document.getElementById('w-img-footer').dataset.url,
                    trigger_roles: Array.from(document.querySelectorAll('#w-role-menu input:checked')).map(i => i.value)
                },
                leave: {
                    title: document.getElementById('l-title').value, desc: document.getElementById('l-desc').value,
                    footer: document.getElementById('l-footer').value, color: document.getElementById('l-color').value,
                    channel: document.getElementById('l-channel').value,
                    thumbnail: document.getElementById('l-img-thumb').dataset.url,
                    banner: document.getElementById('l-img-banner').dataset.url,
                    footer_icon: document.getElementById('l-img-footer').dataset.url
                },
                admin_roles: []
            };
            await fetch('/api/save', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(config) });
            alert("Configuration sauvegardée !");
        }

        async function test(mode, btn) {
            const p = (mode === 'welcome') ? 'w' : 'l';
            const conf = {
                channel: document.getElementById(`${p}-channel`).value,
                title: document.getElementById(`${p}-title`).value,
                desc: document.getElementById(`${p}-desc`).value,
                color: document.getElementById(`${p}-color`).value,
                footer: document.getElementById(`${p}-footer`).value,
                thumbnail: document.getElementById(`${p}-img-thumb').dataset.url,
                banner: document.getElementById(`${p}-img-banner').dataset.url,
                footer_icon: document.getElementById(`${p}-img-footer').dataset.url
            };
            const res = await fetch('/api/test_message', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({mode, config:conf}) });
            if(res.ok) {
                const old = btn.innerHTML; btn.classList.add('success'); btn.innerHTML = "✔ ENVOYÉ !";
                setTimeout(() => { btn.classList.remove('success'); btn.innerHTML = old; }, 2000);
            }
        }

        function toggleSidebar(e) { e.stopPropagation(); document.getElementById('sidebar').classList.toggle('open'); }
        function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); }
        function toggleDrop(e, id) { e.stopPropagation(); document.getElementById(id).classList.toggle('show'); }
        function showTab(id, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(el) { document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); el.classList.add('active'); }
            closeSidebar();
        }
        function renderGallery() { document.getElementById('gallery-list').innerHTML = db.images.map(img => `<div class="img-card"><img src="${img}" onclick="selectImage('${img}')"></div>`).join(''); }
        window.onclick = () => document.querySelectorAll('.drop-menu').forEach(m => m.classList.remove('show'));
        window.onload = init;
    </script>
</body>
</html>

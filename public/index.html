<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BagBot Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #ff4d4d; --bg: #111214; --card: #2b2d31; --text: #dbdee1; --draft-coral: #d37f6a; --sidebar-emoji: #0b0b0b; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 10px; padding-bottom: 30px; }

        /* EMBED COMPLET */
        .discord-msg { background: #313338; border-radius: 8px; padding: 15px; display: flex; gap: 12px; margin-bottom: 20px; position: relative; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: #ff4d4d; flex-shrink: 0; }
        .embed { background: #1e1f22; border-left: 4px solid var(--accent); border-radius: 4px; padding: 12px; position: relative; width: 100%; max-width: 450px; }
        
        /* Boutons de téléversement (les petits carrés +) */
        .upload-slot { border: 1px dashed #4e5058; border-radius: 4px; display: flex; align-items: center; justify-content: center; cursor: pointer; background: rgba(0,0,0,0.1); overflow: hidden; }
        .upload-slot:hover { border-color: var(--text); }
        .thumb-slot { position: absolute; top: 12px; right: 12px; width: 60px; height: 60px; }
        .banner-slot { width: 100%; min-height: 100px; margin: 10px 0; }
        .upload-slot img { width: 100%; height: 100%; object-fit: cover; }

        .embed-author { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600; color: white; margin-bottom: 8px; cursor: pointer; }
        .author-icon-slot { width: 20px; height: 20px; border-radius: 50%; border: 1px dashed #444; }
        .embed-title { font-size: 16px; font-weight: 700; color: white; margin-bottom: 4px; outline: none; }
        .embed-desc { font-size: 14px; color: #dbdee1; margin-bottom: 10px; outline: none; white-space: pre-wrap; }
        .embed-footer { font-size: 12px; color: #949ba4; display: flex; align-items: center; gap: 5px; margin-top: 8px; cursor: pointer; }

        /* CONFIGURATION */
        .card { background: var(--card); border-radius: 12px; padding: 20px; border: 1px solid #1a1a1a; margin-top: 10px; }
        .label-style { font-size: 11px; color: #b5bac1; text-transform: uppercase; font-weight: 800; margin-bottom: 8px; display: block; }
        
        select { width: 100%; background: #1e1f22; border: 1px solid #111; color: white; padding: 15px; border-radius: 8px; font-size: 14px; appearance: none; margin-bottom: 15px; }

        /* SÉLECTEUR EMOJI AVANCÉ */
        #emojiPicker { position: fixed; bottom: 0; left: 0; width: 100%; height: 75vh; background: #111214; border-top-left-radius: 15px; border-top-right-radius: 15px; display: none; flex-direction: column; z-index: 10000; }
        .picker-header { padding: 15px; background: #111214; }
        .search-bar { width: 100%; background: #1e1f22; border: none; padding: 12px; border-radius: 6px; color: white; font-size: 14px; outline: none; }
        
        .emoji-body { display: flex; flex: 1; overflow: hidden; }
        .emoji-sidebar { width: 50px; background: var(--sidebar-emoji); display: flex; flex-direction: column; align-items: center; padding-top: 15px; gap: 25px; }
        .emoji-sidebar i { font-size: 18px; color: #888; cursor: pointer; }
        .emoji-sidebar i.active { color: white; }
        .emoji-sidebar .srv-icon { width: 30px; height: 30px; border-radius: 8px; background: url('https://draftbot.fr/assets/img/logo.png') center/cover; }

        .emoji-scroll { flex: 1; overflow-y: auto; padding: 15px; }
        .emoji-section-title { font-size: 12px; font-weight: 800; color: #949ba4; text-transform: uppercase; margin: 15px 0 10px; }
        .emoji-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; }
        .emoji-item { font-size: 32px; text-align: center; cursor: pointer; transition: transform 0.1s; }
        .emoji-item:active { transform: scale(1.3); }

        .btn-add { background: var(--draft-coral); color: white; border: none; padding: 14px; width: 100%; border-radius: 8px; font-weight: 700; cursor: pointer; margin-top: 20px; text-transform: uppercase; }
        .btn-deploy { background: var(--accent); color: white; border: none; padding: 16px; width: 100%; border-radius: 8px; font-weight: 700; cursor: pointer; margin-top: 10px; text-transform: uppercase; }
        
        /* Hidden Input pour images */
        #imgUploader { display: none; }
    </style>
</head>
<body>

    <h3 style="text-align:center; font-weight:500;">Configuration du message</h3>

    <div class="discord-msg">
        <div class="avatar"></div>
        <div class="embed">
            <div class="upload-slot thumb-slot" onclick="triggerUpload('thumb')">
                <i class="fas fa-image" id="icon-thumb"></i>
                <img id="preview-thumb" style="display:none">
            </div>

            <div class="embed-author" onclick="triggerUpload('author')">
                <div class="author-icon-slot" id="icon-author-div">
                    <img id="preview-author" style="display:none; border-radius: 50%;">
                </div>
                <span contenteditable="true">Nom de l'auteur</span>
            </div>

            <div class="embed-title" contenteditable="true">Role accès</div>
            <div class="embed-desc" contenteditable="true">Débloque l'accès aux contenus réservés :</div>

            <div class="upload-slot banner-slot" onclick="triggerUpload('banner')">
                <i class="fas fa-image" id="icon-banner" style="font-size:24px;"></i>
                <img id="preview-banner" style="display:none">
            </div>

            <div class="embed-footer" onclick="triggerUpload('footer')">
                <div class="author-icon-slot" style="width:16px; height:16px;" id="icon-footer-div">
                    <img id="preview-footer" style="display:none">
                </div>
                <span contenteditable="true">Footer • Aujourd'hui à 16:26</span>
            </div>
        </div>
    </div>

    <div class="card">
        <span class="label-style">Salon de réception</span>
        <select id="channelList"><option>Chargement des salons...</option></select>

        <div id="rolesContainer"></div>

        <button class="btn-add" onclick="addRoleRow()">AJOUTER UN RÔLE RÉACTION</button>
        <button class="btn-deploy" onclick="deploy()">DÉPLOYER SUR DISCORD</button>
    </div>

    <div id="emojiPicker">
        <div class="picker-header">
            <input type="text" class="search-bar" placeholder="Rechercher un émoji...">
        </div>
        <div class="emoji-body">
            <div class="emoji-sidebar">
                <div class="srv-icon" onclick="showSection('server')"></div> <i class="fas fa-clock active" onclick="showSection('recent')"></i>
                <i class="fas fa-smile" onclick="showSection('smileys')"></i>
                <i class="fas fa-leaf"></i>
                <i class="fas fa-utensils"></i>
            </div>
            <div class="emoji-scroll">
                <div id="section-server">
                    <div class="emoji-section-title">Émojis du serveur</div>
                    <div class="emoji-grid" id="grid-server">
                        <span class="emoji-item" onclick="selectEmoji('🔥')">🔥</span>
                        <span class="emoji-item" onclick="selectEmoji('🔞')">🔞</span>
                    </div>
                </div>
                <div id="section-standard">
                    <div class="emoji-section-title">Smileys & Personnes</div>
                    <div class="emoji-grid" id="grid-standard">
                        </div>
                </div>
            </div>
        </div>
        <div style="padding:15px; text-align:center; color:#5865f2; font-weight:700;" onclick="closePicker()">Fermer</div>
    </div>

    <input type="file" id="imgUploader" accept="image/*" onchange="handleImage(this)">

<script>
    let activeBtn = null;
    let currentUploadZone = null;
    const API_URL = "http://192.168.1.133:49500";

    // 1. Initialisation
    async function init() {
        loadStandardEmojis();
        try {
            const [cRes, rRes, eRes] = await Promise.all([
                fetch(`${API_URL}/api/channels`),
                fetch(`${API_URL}/api/roles`),
                fetch(`${API_URL}/api/emojis`) // Emojis du serveur
            ]);
            
            const channels = await cRes.json();
            window.allRoles = await rRes.json();
            const serverEmojis = await eRes.json();

            document.getElementById('channelList').innerHTML = channels.map(c => 
                `<option value="${c.id}"># ${c.name}</option>`).join('');
            
            // Injection emojis serveur
            if(serverEmojis.length) {
                document.getElementById('grid-server').innerHTML = serverEmojis.map(e => 
                    `<span class="emoji-item" onclick="selectEmoji('${e.id}')"><img src="${e.url}" width="32"></span>`).join('');
            }
        } catch(e) { console.error("Erreur de connexion API"); }
    }

    // 2. Gestion des Images (Téléversement)
    function triggerUpload(zone) {
        currentUploadZone = zone;
        document.getElementById('imgUploader').click();
    }

    function handleImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = document.getElementById(`preview-${currentUploadZone}`);
                const icon = document.getElementById(`icon-${currentUploadZone}`);
                if(icon) icon.style.display = 'none';
                img.src = e.target.result;
                img.style.display = 'block';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    // 3. Emojis
    function loadStandardEmojis() {
        const list = ['😀','😃','😄','😁','😆','😅','😂','🤣','😊','😇','🙂','🙃','😉','😌','😍','🥰','😘','😗','😙','😚','😋','😛','😝','😜','🤪','🤨','🧐','🤓','😎','🤩','🥳','😏','😒','😞','😔','😟','😕','🙁','☹️','😣','😖','😫','😩','🥺','😢','😭','😤','😠','😡','🤬','🤯','😳','🥵','🥶','😱','😨','😰','😥','😓','🤗','🤔','🤭','🤫','🤥','😶','😐','😑','😬','🙄','😯','😦','😧','😮','😲','🥱','😴','🤤','😪','😵','🤐','🥴','🤢','🤮','🤧','😷','🤒','🤕'];
        document.getElementById('grid-standard').innerHTML = list.map(e => 
            `<span class="emoji-item" onclick="selectEmoji('${e}')">${e}</span>`).join('');
    }

    function addRoleRow() {
        const div = document.createElement('div');
        div.className = 'card';
        div.style.padding = '10px';
        div.innerHTML = `
            <div style="display:flex; align-items:center; gap:10px;">
                <div class="emoji-item" style="background:#1e1f22; border-radius:6px; padding:5px; width:40px;" onclick="openPicker(this)">😀</div>
                <select style="margin:0; flex:1;">
                    <option value="">Lier un rôle...</option>
                    ${window.allRoles ? window.allRoles.map(r => `<option value="${r.id}">${r.name}</option>`).join('') : ''}
                </select>
                <i class="fas fa-trash" style="color:#444;" onclick="this.parentElement.parentElement.remove()"></i>
            </div>
        `;
        document.getElementById('rolesContainer').appendChild(div);
    }

    function openPicker(btn) { activeBtn = btn; document.getElementById('emojiPicker').style.display = 'flex'; }
    function closePicker() { document.getElementById('emojiPicker').style.display = 'none'; }
    function selectEmoji(emoji) { if(activeBtn) activeBtn.innerHTML = emoji; closePicker(); }

    window.onload = init;
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BagBot Designer Pro - Version Serveur</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* --- DESIGN SYSTÈME (Basé sur 10128.jpg) --- */
        :root {
            --accent: #d37f6a;
            --bg-main: #2b2d31;
            --bg-sidebar: #1e1f22;
            --bg-dark: #111214;
            --text-primary: #dbdee1;
            --text-muted: #949ba4;
            --border: #3f4147;
            --input-bg: #1e1f22;
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-primary);
            display: flex; height: 100vh; width: 100vw; overflow: hidden;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 260px; background-color: var(--bg-sidebar);
            display: flex; flex-direction: column;
            transition: transform 0.3s ease;
            z-index: 2000; border-right: 1px solid var(--bg-dark);
            flex-shrink: 0;
        }

        @media (max-width: 768px) {
            .sidebar { position: absolute; height: 100%; transform: translateX(-100%); }
            .sidebar.active { transform: translateX(0); }
        }

        .sidebar-header {
            padding: 24px 20px; display: flex; align-items: center; justify-content: space-between;
            background-color: var(--bg-dark);
        }

        .sidebar-brand { font-weight: 800; color: var(--accent); font-size: 18px; text-transform: uppercase; }

        .nav-link {
            display: flex; align-items: center; gap: 12px; padding: 12px 16px;
            border-radius: 5px; cursor: pointer; color: var(--text-muted); margin: 5px 10px; transition: 0.2s;
        }

        .nav-link.active { background-color: rgba(211, 127, 106, 0.15); color: white; border-left: 3px solid var(--accent); }

        /* --- CONTENU PRINCIPAL --- */
        .main-content { flex-grow: 1; display: flex; flex-direction: column; min-width: 0; }

        .top-navbar {
            height: 60px; background-color: var(--bg-main);
            display: flex; align-items: center; padding: 0 20px;
            border-bottom: 1px solid var(--bg-dark); gap: 20px;
        }

        .hamburger { font-size: 22px; color: var(--accent); cursor: pointer; }

        /* --- BUILDER (APERÇU) --- */
        .builder-view {
            flex-grow: 1; overflow-y: auto; padding: 30px 15px;
            display: flex; flex-direction: column; align-items: center;
        }

        .discord-embed {
            width: 100%; max-width: 500px; background-color: #313338;
            border-radius: 4px; border-left: 4px solid var(--accent);
            padding: 16px; position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .slot {
            border: 2px dashed #4e5058; border-radius: 4px; display: flex;
            align-items: center; justify-content: center; cursor: pointer;
            position: relative; overflow: hidden; background: rgba(0,0,0,0.1);
        }

        .slot img { width: 100%; height: 100%; object-fit: cover; position: absolute; }

        .thumb-slot { position: absolute; top: 16px; right: 16px; width: 80px; height: 80px; }
        .author-icon { width: 24px; height: 24px; border-radius: 50%; }
        .banner-slot { width: 100%; height: 180px; margin-top: 15px; }

        .input-text { border: none; background: transparent; color: white; outline: none; width: 100%; }
        .input-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
        .input-desc { font-size: 14px; color: var(--text-primary); line-height: 1.5; min-height: 40px; }

        /* --- RÉGLAGES --- */
        .settings-container { width: 100%; max-width: 500px; margin-top: 25px; padding-bottom: 50px; }

        .label { display: block; font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; }

        .select-input {
            width: 100%; background: var(--bg-dark); border: 1px solid #000;
            color: white; padding: 14px; border-radius: 4px; font-size: 15px;
            margin-bottom: 20px; outline: none; appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat; background-position: right 15px center; background-size: 15px;
        }

        /* --- RÉACTIONS & EMOJI PICKER --- */
        .reaction-row {
            display: flex; align-items: center; gap: 10px; background: var(--bg-sidebar);
            padding: 10px; border-radius: 6px; margin-bottom: 10px; border: 1px solid var(--border);
        }

        .emoji-btn {
            font-size: 22px; width: 45px; height: 45px; background: rgba(0,0,0,0.3);
            border-radius: 4px; display: flex; align-items: center; justify-content: center; cursor: pointer;
        }

        /* MODAL PICKER STYLISE */
        #picker-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            display: none; align-items: center; justify-content: center; z-index: 9999;
        }

        .picker-window {
            background: #2f3136; width: 95%; max-width: 400px; border-radius: 8px;
            display: flex; flex-direction: column; height: 450px;
        }

        .picker-search { padding: 15px; background: #202225; }
        .picker-search input { width: 100%; padding: 10px; background: #1e1f22; border: none; color: white; border-radius: 4px; }

        .emoji-list {
            display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px;
            padding: 15px; overflow-y: auto; flex-grow: 1;
        }

        .emoji-item { font-size: 24px; padding: 5px; cursor: pointer; text-align: center; border-radius: 4px; }
        .emoji-item:hover { background: rgba(255,255,255,0.1); }

        .btn { border: none; border-radius: 4px; padding: 15px; font-weight: 700; cursor: pointer; width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-add { background: #4e5058; color: white; margin-bottom: 10px; }
        .btn-send { background: var(--accent); color: white; box-shadow: 0 4px 15px rgba(211, 127, 106, 0.3); }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span class="sidebar-brand">BAGBOT PRO</span>
            <i class="fas fa-times" onclick="toggleSidebar()" style="cursor:pointer;"></i>
        </div>
        <div class="sidebar-nav">
            <div class="nav-link active"><i class="fas fa-edit"></i> Builder</div>
            <div class="nav-link"><i class="fas fa-history"></i> Historique</div>
            <div class="nav-link"><i class="fas fa-cog"></i> Réglages</div>
        </div>
    </div>

    <div class="main-content">
        <div class="top-navbar">
            <i class="fas fa-bars hamburger" onclick="toggleSidebar()"></i>
            <div style="font-weight: 800; font-size: 14px;">DESIGNER D'EMBED</div>
        </div>

        <div class="builder-view">
            <div class="discord-embed">
                <div class="thumb-slot slot" onclick="openFile('thumb')">
                    <i class="fas fa-plus" id="ic-thumb"></i>
                    <img id="img-thumb" style="display:none">
                </div>
                <div style="display:flex; align-items:center; gap:8px; margin-bottom:12px;">
                    <div class="author-icon slot" onclick="openFile('auth')" style="width:24px; height:24px;">
                        <img id="img-auth" style="display:none">
                    </div>
                    <div contenteditable="true" class="input-text" style="font-size:13px; font-weight:600;">Nom de l'auteur</div>
                </div>
                <div contenteditable="true" class="input-text input-title">Titre de l'embed</div>
                <div contenteditable="true" class="input-text input-desc">Votre message ici...</div>
                <div class="banner-slot slot" onclick="openFile('banner')">
                    <i class="fas fa-image" id="ic-banner" style="font-size:30px; color:#4e5058"></i>
                    <img id="img-banner" style="display:none">
                </div>
            </div>

            <div class="settings-container">
                <span class="label">Salon de destination</span>
                <select class="select-input" id="select-channels">
                    <option value="">Chargement des salons...</option>
                </select>

                <span class="label">Rôles et Réactions</span>
                <div id="reactions-list"></div>

                <button class="btn btn-add" onclick="addRow()">
                    <i class="fas fa-plus-circle"></i> Ajouter une réaction
                </button>

                <button class="btn btn-send" onclick="sendToDiscord()">
                    <i class="fas fa-paper-plane"></i> ENVOYER SUR DISCORD
                </button>
            </div>
        </div>
    </div>

    <div id="picker-modal">
        <div class="picker-window">
            <div class="picker-search">
                <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                    <span style="font-weight:bold">Emojis Standards</span>
                    <i class="fas fa-times" onclick="closePicker()" style="cursor:pointer"></i>
                </div>
                <input type="text" placeholder="Rechercher..." onkeyup="filterEmojis(this.value)">
            </div>
            <div class="emoji-list" id="emoji-grid"></div>
        </div>
    </div>

    <input type="file" id="file-input" style="display:none" onchange="preview(this)">

<script>
    const API_URL = "http://192.168.1.133:49501"; // Ton IP Termux
    let activeTarget = null;
    let activeEmojiBtn = null;
    let rolesData = [];

    // --- 1. RECUPÉRATION DES DONNÉES DU SERVEUR ---
    async function fetchServerData() {
        try {
            const res = await fetch(`${API_URL}/api/server-info`);
            const data = await res.json();
            
            // Remplir les salons
            const chanSelect = document.getElementById('select-channels');
            chanSelect.innerHTML = data.channels.map(c => 
                `<option value="${c.id}"># ${c.name}</option>`
            ).join('');

            // Stocker les rôles pour les futures lignes de réaction
            rolesData = data.roles;
        } catch (e) {
            console.error("Erreur de connexion au bot Python");
        }
    }

    // --- 2. GESTION DES EMOJIS (LISTE COMPLÈTE) ---
    const emojis = ["😀","😃","😄","😁","😆","😅","😂","🤣","😊","😇","🙂","🙃","😉","😌","😍","🥰","😘","😗","😙","😚","😋","😛","😝","😜","🤪","🤨","🧐","🤓","😎","🤩","🥳","😏","😒","😞","😔","😟","😕","🙁","☹️","😣","😖","😫","😩","🥺","😢","😭","😤","😠","😡","🤬","🤯","😳","🥵","🥶","😱","😨","😰","😥","😓","🤗","🤔","🤭","🤫","🤥","😶","😐","😑","😬","🙄","😯","😦","😧","😮","😲","🥱","😴","🤤","😪","😵","🤐","🥴","🤢","🤮","🤧","😷","🤒","🤕","🤑","🤠","😈","👿","👹","👺","🤡","💩","👻","💀","☠️","👽","👾","🤖","🎃","😺","😸","😹","😻","😼","😽","🙀","😿","😾","👋","🤚","🖐️","✋","🖖","👌","🤏","✌️","🤞","🤟","🤘","🤙","👈","👉","👆","🖕","👇","☝️","👍","👎","✊","👊","🤛","🤜","👏","🙌","👐","🤲","🤝","🙏","✍️","💅","🤳","💪","🦾","🦵","🦿","🦶","👂","🦻","👃","🧠","🦷","🦴","👀","👁️","👅","👄","💋","🩸","❤️","🧡","💛","💚","💙","💜","🖤","🤍","🤎","💔","❣️","💕","💞","💓","💗","💖","💘","💝","💟"];

    function openPicker(btn) {
        activeEmojiBtn = btn;
        const grid = document.getElementById('emoji-grid');
        grid.innerHTML = emojis.map(e => `<div class="emoji-item" onclick="selectEmoji('${e}')">${e}</div>`).join('');
        document.getElementById('picker-modal').style.display = 'flex';
    }

    function selectEmoji(e) {
        activeEmojiBtn.innerText = e;
        closePicker();
    }

    function filterEmojis(val) {
        const items = document.querySelectorAll('.emoji-item');
        items.forEach(it => {
            it.style.display = it.innerText.includes(val) ? 'block' : 'none';
        });
    }

    function closePicker() { document.getElementById('picker-modal').style.display = 'none'; }

    // --- 3. GESTION DU BUILDER ---
    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }

    function addRow() {
        const list = document.getElementById('reactions-list');
        const div = document.createElement('div');
        div.className = 'reaction-row';
        div.innerHTML = `
            <div class="emoji-btn" onclick="openPicker(this)">😀</div>
            <select class="select-input" style="margin-bottom:0; flex-grow:1;">
                <option value="">Attribuer un rôle...</option>
                ${rolesData.map(r => `<option value="${r.id}">${r.name}</option>`).join('')}
            </select>
            <i class="fas fa-trash" onclick="this.parentElement.remove()" style="color:#ed4245; cursor:pointer; padding:10px;"></i>
        `;
        list.appendChild(div);
    }

    function openFile(t) { activeTarget = t; document.getElementById('file-input').click(); }

    function preview(input) {
        if(input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => {
                const img = document.getElementById(`img-${activeTarget}`);
                img.src = e.target.result;
                img.style.display = 'block';
                document.getElementById(`ic-${activeTarget}`).style.display = 'none';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    // --- 4. ENVOI ---
    async function sendToDiscord() {
        // Logique Fetch vers /api/deploy
        alert("Envoi en cours...");
    }

    // Charger les données au démarrage
    window.onload = fetchServerData;
</script>
</body>
</html>

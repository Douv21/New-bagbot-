<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BagBot | Advanced Designer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #ed4245; --bg: #0b0b0b; --sidebar: #000; --card: #1e1f22; --input: #111214; --border: #2b2d31; --text-muted: #949ba4; }
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body { background: var(--bg); color: white; font-family: 'Whitney', 'Helvetica Neue', Helvetica, Arial, sans-serif; display: flex; height: 100vh; overflow: hidden; }

        /* --- SIDEBAR --- */
        #sidebar { width: 260px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; transition: 0.3s; z-index: 100; }
        .nav-header { padding: 30px 20px; font-size: 24px; font-weight: 900; color: var(--accent); letter-spacing: 1.5px; }
        .nav-list { flex: 1; padding: 10px; }
        .nav-item { padding: 12px 15px; border-radius: 5px; display: flex; align-items: center; gap: 12px; color: var(--text-muted); cursor: pointer; transition: 0.2s; margin-bottom: 5px; }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: white; }
        .nav-item.active { background: rgba(237, 66, 69, 0.1); color: white; font-weight: bold; }
        .nav-item i { width: 20px; text-align: center; font-size: 18px; }

        /* --- MAIN CONTENT --- */
        .main-wrapper { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        header { height: 60px; background: #050505; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; justify-content: space-between; }
        .status-badge { font-size: 12px; background: #23a559; padding: 4px 10px; border-radius: 12px; font-weight: bold; }

        .content-container { flex: 1; overflow-y: auto; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }

        /* --- EMBED DESIGNER --- */
        .designer-card { width: 100%; max-width: 520px; background: var(--card); border-radius: 8px; border-left: 4px solid var(--accent); padding: 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); position: relative; }
        
        .embed-top { display: flex; gap: 15px; }
        .embed-fields { flex: 1; }
        .title-field { background: transparent; border: none; color: white; font-size: 18px; font-weight: 700; width: 100%; margin-bottom: 10px; }
        .desc-field { background: transparent; border: none; color: #dbdee1; font-size: 14px; width: 100%; resize: none; min-height: 100px; line-height: 1.4; }

        .thumbnail-picker { width: 80px; height: 80px; background: rgba(0,0,0,0.2); border: 2px dashed #444; border-radius: 4px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; color: var(--text-muted); }
        .thumbnail-picker:hover { border-color: var(--accent); color: white; }
        .thumbnail-picker span { font-size: 10px; margin-top: 5px; font-weight: bold; }

        .image-banner { width: 100%; height: 220px; background: #2b2d31; border-radius: 4px; margin-top: 20px; display: flex; align-items: center; justify-content: center; border: 1px dashed #444; cursor: pointer; position: relative; overflow: hidden; }
        .image-banner img { width: 100%; height: 100%; object-fit: cover; }
        .image-banner:hover { border-color: var(--accent); }

        /* --- CONTROLS --- */
        .controls-box { width: 100%; max-width: 520px; margin-top: 30px; }
        .control-group { margin-bottom: 20px; }
        .control-label { display: block; font-size: 12px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; }
        
        .custom-select { width: 100%; background: var(--input); border: 1px solid var(--border); color: white; padding: 12px 15px; border-radius: 4px; appearance: none; cursor: pointer; }
        
        .action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .btn-secondary { background: #4e5058; color: white; border: none; padding: 12px; border-radius: 4px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; }
        .btn-secondary:hover { background: #6d6f78; }

        .btn-primary { width: 100%; background: var(--accent); color: white; border: none; padding: 18px; border-radius: 4px; font-weight: 800; font-size: 16px; text-transform: uppercase; cursor: pointer; margin-top: 30px; box-shadow: 0 4px 15px rgba(237, 66, 69, 0.3); transition: 0.3s; }
        .btn-primary:hover { background: #c03537; transform: translateY(-2px); }

        /* --- MOBILE --- */
        @media (max-width: 768px) {
            #sidebar { position: absolute; left: -260px; height: 100%; }
            #sidebar.open { left: 0; }
        }
    </style>
</head>
<body>

    <aside id="sidebar">
        <div class="nav-header">BAGBOT</div>
        <div class="nav-list">
            <div class="nav-item active"><i class="fas fa-magic"></i> Designer</div>
            <div class="nav-item"><i class="fas fa-layer-group"></i> Templates</div>
            <div class="nav-item"><i class="fas fa-history"></i> Historique</div>
            <div class="nav-item"><i class="fas fa-cog"></i> Configuration</div>
        </div>
        <div style="padding: 20px; font-size: 10px; color: #444; text-align: center;">v2.4.0-PRO</div>
    </aside>

    <div class="main-wrapper">
        <header>
            <div style="display: flex; align-items: center; gap: 15px;">
                <i class="fas fa-bars" id="menu-btn" style="cursor: pointer; color: var(--accent);"></i>
                <span style="font-weight: bold; letter-spacing: 1px;">DASHBOARD</span>
            </div>
            <div class="status-badge">BOT ONLINE</div>
        </header>

        <div class="content-container">
            <div class="designer-card">
                <div class="embed-top">
                    <div class="embed-fields">
                        <input type="text" class="title-field" id="e-title" placeholder="Titre de l'Embed..." value="Nouveau Message">
                        <textarea class="desc-field" id="e-desc" placeholder="Décrivez votre annonce ici..."></textarea>
                    </div>
                    <div class="thumbnail-picker" onclick="alert('Upload image...')">
                        <i class="fas fa-image"></i>
                        <span>THUMBNAIL</span>
                    </div>
                </div>
                
                <div class="image-banner" id="banner-zone">
                    <div style="text-align: center; color: #444;">
                        <i class="fas fa-cloud-upload-alt" style="font-size: 40px;"></i>
                        <p style="font-size: 12px; margin-top: 10px;">BANNIÈRE PRINCIPALE (Optionnelle)</p>
                    </div>
                </div>
            </div>

            <div class="controls-box">
                <div class="control-group">
                    <label class="control-label">Salon de destination</label>
                    <div style="position: relative;">
                        <select class="custom-select" id="chan-list">
                            <option>Chargement des salons...</option>
                        </select>
                        <i class="fas fa-chevron-down" style="position: absolute; right: 15px; top: 15px; color: var(--text-muted); pointer-events: none;"></i>
                    </div>
                </div>

                <div class="action-btns">
                    <button class="btn-secondary"><i class="fas fa-smile"></i> Réaction</button>
                    <button class="btn-secondary"><i class="fas fa-thumbtack"></i> Épingler</button>
                </div>

                <button class="btn-primary" id="send-btn">
                    <i class="fas fa-paper-plane" style="margin-right: 10px;"></i> Déployer le message
                </button>
            </div>
        </div>
    </div>

    <script>
        // Toggle Menu Mobile
        document.getElementById('menu-btn').addEventListener('click', () => {
            document.getElementById('sidebar').classList.toggle('open');
        });

        // Fetch Data from Bot
        async function loadServerData() {
            try {
                const res = await fetch('/api/get_server_info');
                const data = await res.json();
                if (data.channels) {
                    const select = document.getElementById('chan-list');
                    select.innerHTML = data.channels.map(c => 
                        `<option value="${c.id}"># ${c.name}</option>`
                    ).join('');
                }
            } catch (err) {
                document.getElementById('chan-list').innerHTML = "<option>Erreur API : Vérifiez le Bot</option>";
            }
        }

        // Action de déploiement (Logique à relier au main.py via POST)
        document.getElementById('send-btn').onclick = () => {
            alert("Préparation du déploiement vers : " + document.getElementById('chan-list').value);
        };

        window.onload = loadServerData;
    </script>
</body>
</html>

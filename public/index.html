<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BagBot | Dashboard Final</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #ff4d4d; --bg: #111214; --card: #2b2d31; --text: #dbdee1; --draft-coral: #d37f6a; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 10px; }

        /* EMBED DISCORD */
        .discord-msg { background: #313338; border-radius: 8px; padding: 15px; display: flex; gap: 12px; margin-bottom: 20px; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
        .embed { background: #1e1f22; border-left: 4px solid var(--accent); border-radius: 4px; padding: 12px; position: relative; width: 100%; max-width: 450px; }
        
        /* Slots d'images */
        .upload-slot { border: 1px dashed #4e5058; border-radius: 4px; display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; position: relative; }
        .thumb-slot { position: absolute; top: 12px; right: 12px; width: 60px; height: 60px; }
        .banner-slot { width: 100%; min-height: 100px; margin: 10px 0; }
        .upload-slot img { width: 100%; height: 100%; object-fit: cover; position: absolute; top:0; left:0; }

        .embed-title { font-size: 16px; font-weight: 700; color: white; margin-bottom: 4px; outline: none; }
        .embed-desc { font-size: 14px; color: #dbdee1; outline: none; min-height: 20px; }

        /* CONFIGURATION */
        .card { background: var(--card); border-radius: 12px; padding: 20px; border: 1px solid #1a1a1a; margin-bottom: 15px; }
        .label-style { font-size: 11px; color: #b5bac1; text-transform: uppercase; font-weight: 800; margin-bottom: 8px; display: block; }
        select { width: 100%; background: #1e1f22; border: 1px solid #111; color: white; padding: 12px; border-radius: 8px; margin-bottom: 15px; outline: none; }

        /* SÉLECTEUR EMOJI DRAFTBOT */
        #emojiPicker { position: fixed; bottom: 0; left: 0; width: 100%; height: 70vh; background: #111214; border-top: 2px solid #333; display: none; flex-direction: column; z-index: 10000; border-radius: 15px 15px 0 0; }
        .picker-header { padding: 15px; border-bottom: 1px solid #222; }
        .search-bar { width: 100%; background: #1e1f22; border: none; padding: 10px; border-radius: 5px; color: white; }
        
        .emoji-body { display: flex; flex: 1; overflow: hidden; }
        .emoji-sidebar { width: 50px; background: #0b0b0b; display: flex; flex-direction: column; align-items: center; padding-top: 15px; gap: 20px; }
        .emoji-sidebar i { font-size: 20px; color: #888; cursor: pointer; }
        .emoji-sidebar i.active { color: var(--accent); }

        .emoji-scroll { flex: 1; overflow-y: auto; padding: 15px; scroll-behavior: smooth; }
        .emoji-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; margin-bottom: 30px; }
        .emoji-item { font-size: 30px; text-align: center; cursor: pointer; }
        .emoji-item img { width: 32px; height: 32px; }

        .btn-add { background: var(--draft-coral); color: white; border: none; padding: 14px; width: 100%; border-radius: 8px; font-weight: 700; cursor: pointer; margin-top: 10px; }
        .btn-deploy { background: var(--accent); color: white; border: none; padding: 16px; width: 100%; border-radius: 8px; font-weight: 700; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <h3 style="text-align:center;">Éditeur de Message</h3>

    <div class="discord-msg">
        <div class="avatar"></div>
        <div class="embed">
            <div class="upload-slot thumb-slot" onclick="openUploader('thumb')">
                <i class="fas fa-plus"></i>
                <img id="view-thumb" style="display:none">
            </div>
            <div class="embed-title" contenteditable="true">Titre du message</div>
            <div class="embed-desc" contenteditable="true">Description...</div>
            <div class="upload-slot banner-slot" onclick="openUploader('banner')">
                <i class="fas fa-image"></i>
                <img id="view-banner" style="display:none">
            </div>
        </div>
    </div>

    <div class="card">
        <span class="label-style">Salon de réception</span>
        <select id="select-channels"><option value="">Chargement des salons...</option></select>
        
        <div id="reactions-list"></div>

        <button class="btn-add" onclick="createReactionRow()">AJOUTER UNE RÉACTION</button>
        <button class="btn-deploy" onclick="finalDeploy()">DÉPLOYER SUR DISCORD</button>
    </div>

    <div id="emojiPicker">
        <div class="picker-header"><input type="text" class="search-bar" placeholder="Rechercher..."></div>
        <div class="emoji-body">
            <div class="emoji-sidebar">
                <i class="fas fa-hashtag active" onclick="scrollToSec('sec-server')"></i>
                <i class="fas fa-smile" onclick="scrollToSec('sec-std')"></i>
                <i class="fas fa-utensils" onclick="scrollToSec('sec-food')"></i>
            </div>
            <div class="emoji-scroll" id="scroll-box">
                <div id="sec-server">
                    <p style="font-size:12px; color:#888;">ÉMOJIS DU SERVEUR</p>
                    <div class="emoji-grid" id="grid-server"></div>
                </div>
                <div id="sec-std">
                    <p style="font-size:12px; color:#888;">SMILEYS</p>
                    <div class="emoji-grid" id="grid-std"></div>
                </div>
            </div>
        </div>
        <button onclick="closeEmoji()" style="padding:15px; background:none; border:none; color:var(--accent); font-weight:700;">FERMER</button>
    </div>

    <input type="file" id="file-input" style="display:none" onchange="previewImage(this)">

<script>
    const API_BASE = "http://192.168.1.133:49500";
    let activeEmojiBtn = null;
    let currentZone = null;
    let rolesData = [];

    // 1. Chargement initial
    async function loadData() {
        try {
            const [cRes, rRes, eRes] = await Promise.all([
                fetch(`${API_BASE}/api/channels`),
                fetch(`${API_BASE}/api/roles`),
                fetch(`${API_BASE}/api/emojis`)
            ]);
            
            const channels = await cRes.json();
            rolesData = await rRes.json();
            const serverEmojis = await eRes.json();

            // Remplir salons
            const cSelect = document.getElementById('select-channels');
            cSelect.innerHTML = channels.map(c => `<option value="${c.id}"># ${c.name}</option>`).join('');

            // Remplir émojis serveur
            const sGrid = document.getElementById('grid-server');
            sGrid.innerHTML = serverEmojis.map(e => 
                `<span class="emoji-item" onclick="setEmoji('${e.id}', true, '${e.url}')"><img src="${e.url}"></span>`).join('');

            // Remplir émojis standards
            const stdGrid = document.getElementById('grid-std');
            const stdList = ['😀','😃','😄','😁','😆','😅','😂','🤣','😊','😇','🙂','🙃','😉','😌','😍','🥰','😘','😗','😙','😚','😋','😛','😝','😜','🤪','🤨','🧐','🤓','😎','🤩','🥳','😏','😒','😞','😔','😟','😕','🙁','☹️','😣','😖','😫','😩','🥺','😢','😭','😤','😠','😡','🤬','🤯','😳','🥵','🥶','😱','😨','😰','😥','😓','🤗','🤔','🤭','🤫','🤥','😶','😐','😑','😬','🙄','😯','😦','😧','😮','😲','🥱','😴','🤤','😪','😵','🤐','🥴','🤢','🤮','🤧','😷','🤒','🤕'];
            stdGrid.innerHTML = stdList.map(e => `<span class="emoji-item" onclick="setEmoji('${e}', false)">${e}</span>`).join('');

        } catch(e) { console.error("Erreur de chargement", e); }
    }

    // 2. Fonctions Images
    function openUploader(zone) { currentZone = zone; document.getElementById('file-input').click(); }
    function previewImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => {
                const img = document.getElementById(`view-${currentZone}`);
                img.src = e.target.result;
                img.style.display = 'block';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    // 3. Gestion Réactions
    function createReactionRow() {
        const container = document.getElementById('reactions-list');
        const div = document.createElement('div');
        div.className = 'reaction-row';
        div.style = "display:flex; align-items:center; gap:10px; background:#1e1f22; padding:10px; border-radius:8px; margin-bottom:10px; border:1px solid #111;";
        div.innerHTML = `
            <div class="emoji-trigger" style="font-size:24px; cursor:pointer; width:40px;" onclick="openEmoji(this)">😀</div>
            <select style="margin:0; flex:1;">
                <option value="">Lier un rôle...</option>
                ${rolesData.map(r => `<option value="${r.id}">${r.name}</option>`).join('')}
            </select>
            <i class="fas fa-trash" style="color:#444;" onclick="this.parentElement.remove()"></i>
        `;
        container.appendChild(div);
    }

    // 4. Sélecteur Émoji
    function openEmoji(btn) { activeEmojiBtn = btn; document.getElementById('emojiPicker').style.display = 'flex'; }
    function closeEmoji() { document.getElementById('emojiPicker').style.display = 'none'; }
    function setEmoji(val, isCustom, url) {
        if(isCustom) activeEmojiBtn.innerHTML = `<img src="${url}" width="24">`;
        else activeEmojiBtn.innerText = val;
        closeEmoji();
    }
    function scrollToSec(id) { document.getElementById(id).scrollIntoView({behavior: "smooth"}); }

    async function finalDeploy() {
        alert("Envoi vers Discord...");
        // Logique de fetch POST vers /api/deploy ici
    }

    window.onload = loadData;
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BagBot Dashboard</title>
    <style>
        :root { --bg: #0f1012; --card: #18191c; --accent: #ff4d4d; --sidebar: #0b0c0e; --text: #f2f3f5; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); color: var(--text); display: flex; overflow-x: hidden; }
        
        /* Sidebar avec Overlay pour fermeture */
        .sidebar { width: 260px; background: var(--sidebar); height: 100vh; position: fixed; left: -260px; transition: 0.3s; z-index: 1001; border-right: 1px solid #282a2e; }
        .sidebar.open { left: 0; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; }
        .overlay.active { display: block; }

        .main { flex: 1; padding: 15px; width: 100%; box-sizing: border-box; }
        .header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .menu-btn { background: #2f3136; border: none; color: white; padding: 10px; border-radius: 6px; cursor: pointer; }

        .panel { background: var(--card); border-radius: 12px; padding: 20px; border: 1px solid #282a2e; max-width: 600px; margin: auto; }
        .tabs { display: flex; background: #2f3136; border-radius: 8px; margin-bottom: 20px; }
        .tab { flex: 1; text-align: center; padding: 12px; cursor: pointer; color: #b9bbbe; }
        .tab.active { background: var(--accent); border-radius: 8px; color: white; font-weight: bold; }

        label { display: block; margin: 15px 0 5px; font-size: 11px; color: #8e9297; text-transform: uppercase; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 12px; background: #202225; border: 1px solid #111; color: white; border-radius: 6px; box-sizing: border-box; }
        
        .preview-area { margin-top: 25px; padding: 15px; background: #2f3136; border-radius: 8px; border-left: 4px solid var(--accent); min-height: 50px; }
        #pre-img { width: 100%; border-radius: 4px; margin-top: 10px; display: none; }
        
        .btn-send { background: var(--accent); color: white; border: none; padding: 18px; width: 100%; border-radius: 8px; font-weight: bold; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>
<div class="sidebar" id="sidebar">
    <div style="padding: 25px; font-weight: bold; color: var(--accent); font-size: 20px; border-bottom: 1px solid #282a2e;">BAG BOT V2</div>
    <div style="padding: 15px 25px; background: #1a1a1a; border-left: 4px solid var(--accent); margin-top: 10px;">🎭 Rôles-Réactions</div>
</div>

<div class="main">
    <div class="header">
        <button class="menu-btn" onclick="toggleMenu()">☰ Menu</button>
        <h3 style="margin:0;">Configuration</h3>
    </div>

    <div class="panel">
        <div class="tabs">
            <div class="tab active" id="t-simple" onclick="setMode('simple')">Simple</div>
            <div class="tab" id="t-embed" onclick="setMode('embed')">Embed</div>
        </div>

        <label>Modifier un message existant (ID)</label>
        <input type="text" id="messageId" placeholder="Collez l'ID ici ou laissez vide">

        <label>Salon Discord</label>
        <select id="channelId"><option value="">Chargement des salons...</option></select>

        <label>Rôle à attribuer</label>
        <select id="roleId"><option value="">Chargement des rôles...</option></select>

        <label>Mode de fonctionnement</label>
        <select id="roleMode">
            <option value="normal">Normal (Ajout/Retrait)</option>
            <option value="inverse">Inversé</option>
            <option value="definitif">Définitif (Ajout uniquement)</option>
        </select>

        <label>Type de composant</label>
        <select id="displayType">
            <option value="button">Bouton</option>
            <option value="select">Menu Déroulant</option>
        </select>

        <div id="simple-fields">
            <label>Contenu du message</label>
            <textarea id="simpleContent" rows="3" oninput="updatePreview()"></textarea>
        </div>

        <div id="embed-fields" style="display:none;">
            <label>Titre de l'Embed</label>
            <input type="text" id="title" oninput="updatePreview()">
            <label>Description</label>
            <textarea id="description" rows="3" oninput="updatePreview()"></textarea>
            <label>Image</label>
            <input type="file" id="imageFile" accept="image/*" onchange="previewFile(this)" style="margin-bottom:10px;">
            <input type="text" id="imageUrl" placeholder="Ou lien URL direct..." oninput="updatePreview()">
        </div>

        <div class="preview-area">
            <div id="pre-title" style="font-weight:bold;">Aperçu</div>
            <div id="pre-desc">...</div>
            <img id="pre-img">
        </div>

        <button class="btn-send" id="btn-deploy" onclick="deploy()">DÉPLOYER SUR DISCORD</button>
    </div>
</div>

<script>
    let mode = 'simple';

    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('active');
    }

    function setMode(m) {
        mode = m;
        document.getElementById('t-simple').classList.toggle('active', m === 'simple');
        document.getElementById('t-embed').classList.toggle('active', m === 'embed');
        document.getElementById('simple-fields').style.display = m === 'simple' ? 'block' : 'none';
        document.getElementById('embed-fields').style.display = m === 'embed' ? 'block' : 'none';
        updatePreview();
    }

    function previewFile(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => {
                const img = document.getElementById('pre-img');
                img.src = e.target.result;
                img.style.display = 'block';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function updatePreview() {
        if(mode === 'simple') {
            document.getElementById('pre-title').innerText = "Message Simple";
            document.getElementById('pre-desc').innerText = document.getElementById('simpleContent').value || "Texte du message...";
            document.getElementById('pre-img').style.display = 'none';
        } else {
            document.getElementById('pre-title').innerText = document.getElementById('title').value || "Titre de l'Embed";
            document.getElementById('pre-desc').innerText = document.getElementById('description').value || "Description...";
        }
    }

    async function load() {
        try {
            const [c, r] = await Promise.all([fetch('/api/channels'), fetch('/api/roles')]);
            const channels = await c.json();
            const roles = await r.json();
            
            if(channels.length > 0) {
                document.getElementById('channelId').innerHTML = channels.map(x => `<option value="${x.id}"># ${x.name}</option>`).join('');
            }
            if(roles.length > 0) {
                document.getElementById('roleId').innerHTML = roles.map(x => `<option value="${x.id}">${x.name}</option>`).join('');
            }
        } catch(e) { console.error("Erreur de chargement"); }
    }

    async function deploy() {
        const cId = document.getElementById('channelId').value;
        const rId = document.getElementById('roleId').value;

        if (!cId || cId === "" || cId.includes("Chargement")) {
            return alert("❌ Erreur : Veuillez sélectionner un salon valide.");
        }

        const btn = document.getElementById('btn-deploy');
        btn.innerText = "ENVOI EN COURS...";
        btn.disabled = true;

        const fd = new FormData();
        fd.append('mode', mode);
        fd.append('channelId', cId);
        fd.append('roleId', rId);
        fd.append('roleMode', document.getElementById('roleMode').value);
        fd.append('displayType', document.getElementById('displayType').value);
        fd.append('messageId', document.getElementById('messageId').value);
        fd.append('content', document.getElementById('simpleContent').value);
        fd.append('title', document.getElementById('title').value);
        fd.append('description', document.getElementById('description').value);
        fd.append('imageUrl', document.getElementById('imageUrl').value);
        
        const file = document.getElementById('imageFile').files[0];
        if (file) fd.append('imageFile', file);

        try {
            const res = await fetch('/update-bot', { method: 'POST', body: fd });
            const data = await res.json();
            if(data.success) alert("✅ Déployé avec succès !");
            else alert("❌ Erreur : " + data.message);
        } catch(e) {
            alert("❌ Erreur de connexion au serveur.");
        } finally {
            btn.innerText = "DÉPLOYER SUR DISCORD";
            btn.disabled = false;
        }
    }
    load();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BagBot Admin V2</title>
    <style>
        :root { --accent: #ff4d4d; --bg: #0f1012; --card: #18191c; }
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: white; display: flex; }
        
        /* Sidebar */
        .sidebar { width: 260px; background: #0b0c0e; height: 100vh; position: fixed; left: -260px; transition: 0.3s; z-index: 1000; border-right: 1px solid #222; }
        .sidebar.open { left: 0; }
        .sidebar-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
        .close-btn { background: none; border: none; color: var(--accent); font-size: 30px; cursor: pointer; }

        /* Main Content */
        .main { flex: 1; padding: 20px; width: 100%; box-sizing: border-box; }
        .menu-toggle { background: #2f3136; color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; margin-bottom: 15px; }
        
        .panel { background: var(--card); border-radius: 12px; padding: 20px; max-width: 500px; margin: auto; border: 1px solid #282a2e; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .tabs { display: flex; background: #2f3136; border-radius: 8px; margin-bottom: 20px; padding: 4px; }
        .tab { flex: 1; text-align: center; padding: 10px; cursor: pointer; border-radius: 6px; color: #888; transition: 0.2s; }
        .tab.active { background: var(--accent); color: white; font-weight: bold; }

        label { display: block; margin: 15px 0 5px; font-size: 11px; color: #8e9297; text-transform: uppercase; font-weight: bold; letter-spacing: 0.5px; }
        select, input, textarea { width: 100%; padding: 12px; background: #202225; border: 1px solid #111; color: white; border-radius: 6px; box-sizing: border-box; outline: none; }
        select:focus, input:focus { border-color: var(--accent); }
        
        .btn-deploy { background: var(--accent); color: white; border: none; padding: 16px; width: 100%; border-radius: 8px; font-weight: bold; margin-top: 25px; cursor: pointer; font-size: 14px; }
        .btn-deploy:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <b style="color: var(--accent)">BAG BOT V2</b>
        <button class="close-btn" onclick="toggleMenu()">×</button>
    </div>
    <div style="padding: 20px; color: #aaa; font-size: 14px;">
        <div style="padding: 10px; background: #1a1a1a; border-left: 4px solid var(--accent);">🎭 Rôles Automatiques</div>
    </div>
</div>

<div class="main">
    <button class="menu-toggle" onclick="toggleMenu()">☰ Menu</button>
    
    <div class="panel">
        <div class="tabs">
            <div class="tab active" id="tab-simple" onclick="setMode('simple')">Simple</div>
            <div class="tab" id="tab-embed" onclick="setMode('embed')">Embed</div>
        </div>

        <label>Salon Discord</label>
        <select id="channelId"><option value="">Chargement des salons...</option></select>

        <label>Rôle à attribuer</label>
        <select id="roleId"><option value="">Chargement des rôles...</option></select>

        <div id="form-simple">
            <label>Texte du message</label>
            <textarea id="textContent" rows="3">Cliquez sur le bouton pour recevoir votre rôle !</textarea>
        </div>

        <div id="form-embed" style="display:none;">
            <label>Titre de l'Embed</label>
            <input type="text" id="embedTitle" placeholder="Ex: Rôles Couleurs">
            <label>Description</label>
            <textarea id="embedDesc" rows="3" placeholder="Ex: Choisissez votre couleur préférée..."></textarea>
            <label>Bannière (Image)</label>
            <input type="file" id="embedImage" accept="image/*">
        </div>

        <label>ID Message (Pour modifier un message existant)</label>
        <input type="text" id="messageId" placeholder="Laisser vide pour un nouveau message">

        <label>Type d'affichage</label>
        <select id="displayType">
            <option value="button">Bouton Rouge</option>
            <option value="select">Menu Déroulant</option>
        </select>

        <button class="btn-deploy" id="btnDeploy" onclick="executeDeploy()">DÉPLOYER SUR DISCORD</button>
    </div>
</div>

<script>
    let currentMode = 'simple';

    function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); }

    function setMode(m) {
        currentMode = m;
        document.getElementById('tab-simple').classList.toggle('active', m === 'simple');
        document.getElementById('tab-embed').classList.toggle('active', m === 'embed');
        document.getElementById('form-simple').style.display = m === 'simple' ? 'block' : 'none';
        document.getElementById('form-embed').style.display = m === 'embed' ? 'block' : 'none';
    }

    // Chargement initial des données
    async function loadDiscordData() {
        try {
            const [chansRes, rolesRes] = await Promise.all([
                fetch('/api/get-channels'),
                fetch('/api/get-roles')
            ]);
            
            const chans = await chansRes.json();
            const roles = await rolesRes.json();

            document.getElementById('channelId').innerHTML = chans.map(c => `<option value="${c.id}"># ${c.name}</option>`).join('');
            document.getElementById('roleId').innerHTML = roles.map(r => `<option value="${r.id}">${r.name}</option>`).join('');
        } catch (err) {
            console.error("Erreur de chargement:", err);
            alert("Erreur de connexion au bot. Vérifiez que PM2 est lancé.");
        }
    }

    async function executeDeploy() {
        const btn = document.getElementById('btnDeploy');
        const cId = document.getElementById('channelId').value;
        const rId = document.getElementById('roleId').value;

        if (!cId || !rId) return alert("Sélectionnez un salon et un rôle !");

        btn.disabled = true;
        btn.innerText = "ENVOI EN COURS...";

        const formData = new FormData();
        formData.append('channelId', cId);
        formData.append('roleId', rId);
        formData.append('mode', currentMode);
        formData.append('displayType', document.getElementById('displayType').value);
        formData.append('messageId', document.getElementById('messageId').value.trim());
        formData.append('content', document.getElementById('textContent').value);
        formData.append('title', document.getElementById('embedTitle').value);
        formData.append('description', document.getElementById('embedDesc').value);
        
        const fileInput = document.getElementById('embedImage');
        if (fileInput.files[0]) formData.append('imageFile', fileInput.files[0]);

        try {
            const response = await fetch('/api/deploy-action', {
                method: 'POST',
                body: formData
            });
            const result = await response.json();
            
            if (result.success) {
                alert("✅ Message déployé avec succès !");
            } else {
                alert("❌ Erreur : " + result.message);
            }
        } catch (err) {
            alert("❌ Erreur de connexion au serveur.");
        } finally {
            btn.disabled = false;
            btn.innerText = "DÉPLOYER SUR DISCORD";
        }
    }

    // Lancement au démarrage
    loadDiscordData();
</script>

</body>
</html>

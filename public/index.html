<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BagBot Premium Dashboard</title>
    <style>
        :root { --accent: #ff4d4d; --bg: #111214; --card: #1e1f22; --text: #dbdee1; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        /* PREVIEW STYLE DISCORD */
        .preview-box { background: #1e1f22; border-left: 4px solid var(--accent); padding: 15px; border-radius: 4px; width: 100%; max-width: 450px; margin-bottom: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .p-author { font-size: 13px; font-weight: bold; margin-bottom: 5px; color: #fff; }
        .p-title { font-size: 16px; font-weight: bold; color: #fff; margin-bottom: 8px; }
        .p-desc { font-size: 14px; color: #dbdee1; line-height: 1.4; white-space: pre-wrap; }
        .p-img { width: 100%; border-radius: 4px; margin-top: 10px; display: none; }

        /* INPUTS */
        .editor { background: #2b2d31; padding: 20px; border-radius: 12px; width: 100%; max-width: 450px; }
        label { font-size: 12px; font-weight: bold; color: #949ba4; text-transform: uppercase; display: block; margin-top: 15px; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; background: #111; border: 1px solid #000; color: white; border-radius: 6px; box-sizing: border-box; }
        
        .btn-add { background: #333; color: white; border: 1px dashed var(--accent); padding: 10px; margin-top: 10px; cursor: pointer; width: 100%; border-radius: 6px; }
        .btn-deploy { background: var(--accent); color: white; border: none; padding: 15px; font-weight: bold; font-size: 16px; margin-top: 25px; cursor: pointer; width: 100%; border-radius: 6px; box-shadow: 0 4px 10px rgba(255, 77, 77, 0.3); }
        
        .reac-row { display: flex; gap: 8px; margin-top: 8px; }
        input[type="file"] { background: transparent; border: none; color: var(--accent); }
    </style>
</head>
<body>

    <h2 style="color: var(--accent); letter-spacing: 2px;">BAGBOT DASHBOARD</h2>

    <div class="preview-box">
        <div id="v-author" class="p-author">Auteur</div>
        <div id="v-title" class="p-title">Titre du message</div>
        <div id="v-desc" class="p-desc">Description de l'embed...</div>
        <img id="v-banner" class="p-img">
    </div>

    <div class="editor">
        <label>Auteur</label>
        <input type="text" id="in-author" placeholder="Nom de l'auteur..." oninput="sync()">
        
        <label>Titre</label>
        <input type="text" id="in-title" placeholder="Titre..." oninput="sync()">
        
        <label>Description</label>
        <textarea id="in-desc" placeholder="Texte du message..." rows="4" oninput="sync()"></textarea>

        <label>Image (Bannière)</label>
        <input type="file" onchange="uploadFile(this)">

        <label>Salon Discord</label>
        <select id="sel-chans"></select>

        <label>Mode de Rôle</label>
        <select id="sel-mode">
            <option value="multiple">Multiple (Ajout/Retrait)</option>
            <option value="unique">Unique (Un seul)</option>
            <option value="definitif">Définitif (Permanent)</option>
        </select>

        <div id="reac-list"></div>
        <button class="btn-add" onclick="addReacRow()">+ AJOUTER UN RÔLE RÉACTION</button>

        <button class="btn-deploy" onclick="send()">🚀 DÉPLOYER SUR DISCORD</button>
    </div>

    <script>
        const API = "http://192.168.1.133:49501";
        let banner = "";

        function sync() {
            document.getElementById('v-author').innerText = document.getElementById('in-author').value || "Auteur";
            document.getElementById('v-title').innerText = document.getElementById('in-title').value || "Titre";
            document.getElementById('v-desc').innerText = document.getElementById('in-desc').value || "Description...";
        }

        async function uploadFile(input) {
            let fd = new FormData(); fd.append('file', input.files[0]);
            let res = await fetch(`${API}/api/upload`, {method:'POST', body:fd});
            let data = await res.json();
            banner = data.url;
            let img = document.getElementById('v-banner');
            img.src = data.url; img.style.display = 'block';
        }

        async function load() {
            const r = await fetch(`${API}/api/channels`);
            const d = await r.json();
            document.getElementById('sel-chans').innerHTML = d.map(c => `<option value="${c.id}"># ${c.name}</option>`).join('');
            const rr = await fetch(`${API}/api/roles`);
            window.rolesData = await rr.json();
        }

        function addReacRow() {
            const div = document.createElement('div'); div.className = 'reac-row';
            div.innerHTML = `<input type="text" placeholder="Emoji" class="r-e" style="width:70px"> 
                             <select class="r-r">${window.rolesData.map(r=>`<option value="${r.id}">${r.name}</option>`)}</select>`;
            document.getElementById('reac-list').appendChild(div);
        }

        async function send() {
            const reactions = Array.from(document.querySelectorAll('.reac-row')).map(r => ({
                emoji: r.querySelector('.r-e').value,
                roleId: r.querySelector('.r-r').value
            }));
            const res = await fetch(`${API}/api/deploy`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    channelId: document.getElementById('sel-chans').value,
                    title: document.getElementById('in-title').value,
                    description: document.getElementById('in-desc').value,
                    author: document.getElementById('in-author').value,
                    banner: banner,
                    mode: document.getElementById('sel-mode').value,
                    reactions: reactions
                })
            });
            if(res.ok) alert("✅ Envoyé avec succès !");
        }
        window.onload = load;
    </script>
</body>
</html>

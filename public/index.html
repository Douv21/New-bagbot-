<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BagBot | Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #050505; 
            --bg-panel: #0f0f0f; 
            --sidebar-bg: #000000;
            --accent: #ed4245; 
            --embed-bg: #2b2d31; 
            --text-muted: #949ba4; 
            --border: #1e1e1e;
            --discord-blue: #5865F2;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-dark); color: white; display: flex; height: 100vh; overflow: hidden; }

        /* --- SIDEBAR --- */
        #sidebar { 
            width: 260px; background: var(--sidebar-bg); border-right: 1px solid var(--border); 
            position: fixed; height: 100%; transition: 0.3s ease; z-index: 1000; 
        }
        .sidebar-header { padding: 30px 20px; font-weight: 900; font-size: 24px; color: var(--accent); letter-spacing: 1px; }
        .nav-item { padding: 15px 25px; display: flex; align-items: center; gap: 15px; color: var(--text-muted); font-weight: 700; cursor: pointer; transition: 0.2s; }
        .nav-item:hover { color: white; background: rgba(255,255,255,0.02); }
        .nav-item.active { color: var(--accent); background: rgba(237, 66, 69, 0.05); border-right: 3px solid var(--accent); }

        /* --- MAIN CONTENT --- */
        main { flex: 1; margin-left: 260px; display: flex; flex-direction: column; transition: 0.3s; width: 100%; }
        header { height: 70px; background: var(--bg-panel); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 25px; justify-content: space-between; flex-shrink: 0; }
        .menu-toggle { display: none; font-size: 20px; cursor: pointer; color: var(--accent); }

        .content-section { display: none; flex-direction: column; align-items: center; padding: 20px; overflow-y: auto; flex: 1; }
        .content-section.active { display: flex; }

        /* --- DISCORD EMBED --- */
        .discord-embed { width: 100%; max-width: 520px; background: var(--embed-bg); border-left: 4px solid var(--accent); border-radius: 4px; padding: 16px; margin-bottom: 25px; flex-shrink: 0; }
        .embed-author { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-size: 13px; font-weight: 600; }
        .embed-author img { width: 24px; height: 24px; border-radius: 50%; background: #000; }
        .embed-main { display: flex; justify-content: space-between; gap: 10px; }
        .embed-title { font-size: 16px; font-weight: 700; color: #fff; margin-bottom: 5px; }
        .embed-description { font-size: 14px; color: #dbdee1; line-height: 1.4; white-space: pre-wrap; }
        
        .img-zone { border: 1px dashed #444; border-radius: 4px; cursor: pointer; overflow: hidden; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.2); transition: 0.2s; }
        .img-zone:hover { border-color: var(--accent); }
        .thumb-box { width: 80px; height: 80px; flex-shrink: 0; }
        .banner-box { width: 100%; height: 160px; margin-top: 15px; }
        .img-zone img { width: 100%; height: 100%; object-fit: cover; }
        .img-zone i { color: #444; font-size: 20px; }

        /* --- FORM CARDS --- */
        .config-card { width: 100%; max-width: 520px; background: var(--bg-panel); border-radius: 12px; border: 1px solid var(--border); padding: 20px; margin-bottom: 30px; }
        label { display: block; font-size: 11px; font-weight: 800; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; }
        input, textarea, select { width: 100%; background: #000; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 8px; margin-bottom: 15px; font-size: 14px; }
        input:focus, textarea:focus { border-color: var(--accent); outline: none; }

        .variables-help { background: #000; border: 1px solid #222; border-radius: 8px; padding: 12px; margin-bottom: 15px; }
        .var-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .var-item { font-size: 11px; color: var(--text-muted); cursor: pointer; padding: 8px; background: #0a0a0a; border-radius: 5px; }
        .var-tag { color: var(--accent); font-weight: bold; font-family: monospace; display: block; }

        .btn-save { background: var(--accent); color: white; border: none; padding: 15px; border-radius: 8px; font-weight: 800; cursor: pointer; width: 100%; transition: 0.2s; }
        .btn-test { background: var(--discord-blue); margin-top: 10px; }
        .btn-save:active { transform: scale(0.98); }

        /* --- GALLERY --- */
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; width: 100%; }
        .gallery-card { background: var(--bg-panel); border-radius: 10px; overflow: hidden; border: 1px solid var(--border); position: relative; aspect-ratio: 1; }
        .gallery-card img { width: 100%; height: 100%; object-fit: cover; }
        .delete-btn { position: absolute; top: 5px; right: 5px; background: rgba(237, 66, 69, 0.9); border: none; color: white; width: 28px; height: 28px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* --- MODALE --- */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; display: none; padding: 20px; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: var(--bg-panel); border-radius: 15px; padding: 25px; width: 100%; max-width: 400px; border: 1px solid var(--border); }

        @media (max-width: 900px) {
            main { margin-left: 0; }
            #sidebar { transform: translateX(-100%); }
            #sidebar.open { transform: translateX(0); }
            .menu-toggle { display: block; }
        }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; z-index: 999; }
        .overlay.active { display: block; }
    </style>
</head>
<body>

    <div class="overlay" onclick="toggleMenu()"></div>

    <nav id="sidebar">
        <div class="sidebar-header">BAGBOT</div>
        <div class="nav-item active" onclick="showSection('accueil', this)"><i class="fas fa-home"></i> Accueil</div>
        <div class="nav-item" onclick="showSection('images', this)"><i class="fas fa-images"></i> Images</div>
    </nav>

    <main>
        <header>
            <i class="fas fa-bars menu-toggle" onclick="toggleMenu()"></i>
            <div style="display: flex; align-items: center; gap: 12px;">
                <span id="bot-name" style="font-weight: 700; color: var(--text-muted);">Chargement...</span>
                <img id="bot-avatar" src="" style="width: 35px; height: 35px; border-radius: 50%; border: 2px solid var(--accent); background: #000;">
            </div>
        </header>

        <section id="accueil" class="content-section active">
            <div class="discord-embed">
                <div class="embed-author">
                    <img id="prev-auth" src=""> <span id="bot-name-prev">Bot</span>
                </div>
                <div class="embed-main">
                    <div style="flex:1">
                        <div class="embed-title" id="p-title">Titre</div>
                        <div class="embed-description" id="p-desc">Bienvenue {user} !</div>
                    </div>
                    <div class="img-zone thumb-box" onclick="openImgModal('thumb')">
                        <div id="box-thumb"><i class="fas fa-plus"></i></div>
                    </div>
                </div>
                <div class="img-zone banner-box" onclick="openImgModal('banner')">
                    <div id="box-banner"><i class="fas fa-image"></i></div>
                </div>
            </div>

            <div class="config-card">
                <label>Titre de l'embed</label>
                <input type="text" id="in-title" placeholder="Titre..." oninput="sync()">
                
                <label>Message de bienvenue</label>
                <textarea id="in-desc" rows="4" oninput="sync()" placeholder="Message..."></textarea>
                
                <div class="variables-help">
                    <div class="var-grid">
                        <div class="var-item" onclick="addVar('{user}')"><span class="var-tag">{user}</span>Mention</div>
                        <div class="var-item" onclick="addVar('{server}')"><span class="var-tag">{server}</span>Serveur</div>
                    </div>
                </div>

                <label>Salon d'envoi</label>
                <select id="chan-list"></select>

                <button class="btn-save" onclick="saveData()">ENREGISTRER LA CONFIG</button>
                <button class="btn-save btn-test" onclick="testConfig()"><i class="fas fa-paper-plane"></i> TESTER SUR DISCORD</button>
            </div>
        </section>

        <section id="images" class="content-section">
            <div style="width: 100%; max-width: 800px;">
                <h2 style="margin-bottom: 20px;">Ma Galerie d'Images</h2>
                <div class="gallery-grid" id="main-gallery"></div>
            </div>
        </section>
    </main>

    <div id="imgModal" class="modal">
        <div class="modal-content">
            <h3 style="margin-bottom: 15px; color: var(--accent);">Source de l'image</h3>
            <input type="text" id="url-input" placeholder="URL de l'image (http...)">
            <input type="file" id="file-input" style="display:none" onchange="uploadFile()">
            <button class="btn-save" style="background:#222; margin-bottom:10px" onclick="document.getElementById('file-input').click()">TÉLÉVERSER DEPUIS MOBILE</button>
            <button class="btn-save" onclick="applyImg()">APPLIQUER</button>
            <button class="btn-save" style="background:transparent; color:#666" onclick="closeModal()">ANNULER</button>
        </div>
    </div>

    <script>
        let currentTarget = '';

        function toggleMenu() { 
            document.getElementById('sidebar').classList.toggle('open'); 
            document.querySelector('.overlay').classList.toggle('active'); 
        }

        function showSection(id, el) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            if(id === 'images') loadMainGallery();
            if(window.innerWidth <= 900) toggleMenu();
        }

        // --- SYNCHRONISATION APERÇU ---
        function sync() {
            let title = document.getElementById('in-title').value || "Titre";
            let desc = document.getElementById('in-desc').value || "Description...";

            // Remplacement visuel pour la simulation
            let previewDesc = desc
                .replace(/{user}/g, '<span style="color: #5865F2; font-weight: 500;">@Membre</span>')
                .replace(/{server}/g, '<b>Nom du Serveur</b>')
                .replace(/{count}/g, '<b>123</b>');

            document.getElementById('p-title').innerText = title;
            document.getElementById('p-desc').innerHTML = previewDesc;
        }

        function addVar(v) { document.getElementById('in-desc').value += v; sync(); }

        // --- GESTION IMAGES ---
        function openImgModal(target) {
            currentTarget = target;
            document.getElementById('url-input').value = "";
            document.getElementById('imgModal').classList.add('active');
        }

        function closeModal() { document.getElementById('imgModal').classList.remove('active'); }

        async function uploadFile() {
            const fd = new FormData();
            const file = document.getElementById('file-input').files[0];
            if(!file) return;
            fd.append('file', file);
            
            const res = await fetch(`${window.location.origin}/api/upload`, { method: 'POST', body: fd });
            const data = await res.json();
            document.getElementById('url-input').value = data.url;
            alert("Image téléversée ! Cliquez sur APPLIQUER.");
        }

        function applyImg() {
            const val = document.getElementById('url-input').value;
            if(val) {
                const finalUrl = val.startsWith('http') ? val : window.location.origin + val;
                document.getElementById('box-' + currentTarget).innerHTML = `<img src="${finalUrl}">`;
            }
            closeModal();
        }

        // --- ACTIONS API ---
        async function saveData() {
            const payload = {
                channel: document.getElementById('chan-list').value,
                title: document.getElementById('in-title').value,
                desc: document.getElementById('in-desc').value,
                thumb: document.querySelector('#box-thumb img')?.getAttribute('src') || null,
                banner: document.querySelector('#box-banner img')?.getAttribute('src') || null
            };
            const res = await fetch(`${window.location.origin}/api/save_config`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            if(res.ok) alert("✅ Configuration enregistrée !");
        }

        async function testConfig() {
            const channelId = document.getElementById('chan-list').value;
            if(!channelId || channelId === "Chargement...") return alert("❌ Sélectionnez un salon !");

            const payload = {
                channel: channelId,
                title: document.getElementById('in-title').value,
                desc: document.getElementById('in-desc').value,
                thumb: document.querySelector('#box-thumb img')?.getAttribute('src') || null,
                banner: document.querySelector('#box-banner img')?.getAttribute('src') || null
            };

            try {
                const res = await fetch(`${window.location.origin}/api/test_message`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                if(res.ok) alert("🧪 Test envoyé ! Vérifiez Discord.");
                else alert("❌ Erreur d'envoi.");
            } catch(e) {
                alert("❌ Erreur de connexion au serveur.");
            }
        }

        async function loadMainGallery() {
            const res = await fetch(`${window.location.origin}/api/images`);
            const data = await res.json();
            document.getElementById('main-gallery').innerHTML = data.images.map(u => `
                <div class="gallery-card">
                    <img src="${u}">
                    <button class="delete-btn" onclick="deleteImage('${u}')"><i class="fas fa-trash"></i></button>
                </div>
            `).join('') || "<p style='color: #444;'>Aucune image.</p>";
        }

        async function deleteImage(url) {
            if(!confirm("Supprimer l'image ?")) return;
            const res = await fetch(`${window.location.origin}/api/images/delete`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ url: url })
            });
            if(res.ok) loadMainGallery();
        }

        // --- INITIALISATION ---
        async function init() {
            try {
                const res = await fetch(`${window.location.origin}/api/get_server_info`);
                const data = await res.json();
                
                document.getElementById('bot-name').innerText = data.bot.name;
                document.getElementById('bot-avatar').src = data.bot.avatar;
                document.getElementById('prev-auth').src = data.bot.avatar;
                document.getElementById('bot-name-prev').innerText = data.bot.name;
                
                if(data.channels.length > 0) {
                    document.getElementById('chan-list').innerHTML = data.channels.map(c => `<option value="${c.id}"># ${c.name}</option>`).join('');
                }

                if(data.config) {
                    document.getElementById('in-title').value = data.config.title || "";
                    document.getElementById('in-desc').value = data.config.desc || "";
                    if(data.config.channel) document.getElementById('chan-list').value = data.config.channel;
                    if(data.config.thumb) document.getElementById('box-thumb').innerHTML = `<img src="${data.config.thumb}">`;
                    if(data.config.banner) document.getElementById('box-banner').innerHTML = `<img src="${data.config.banner}">`;
                    sync();
                }
            } catch(e) {
                console.error("Erreur Init:", e);
            }
        }

        window.onload = init;
    </script>
</body>
</html>

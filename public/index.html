<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BAGBOT ELITE V9</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #0a0a0a; --card: #141414; --accent: #ed4245; --border: #252525; --d-bg: #2b2d31; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; }

        /* UI Structure */
        .header { position: fixed; top: 0; left: 0; right: 0; height: 65px; background: #000; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; z-index: 2500; }
        .burger { font-size: 22px; color: var(--accent); cursor: pointer; }
        
        #sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100vh; background: #000; z-index: 3000; transition: 0.3s; border-right: 1px solid var(--border); }
        #sidebar.open { left: 0; }
        .nav-item { padding: 20px; border-bottom: 1px solid #111; cursor: pointer; display: flex; align-items: center; justify-content: space-between; color: #888; font-weight: bold; }
        .nav-item.active { color: var(--accent); background: #ed424510; }
        
        .submenu { display: none; background: #050505; }
        .submenu.show { display: block; }
        .sub-item { padding: 15px 15px 15px 55px; cursor: pointer; color: #666; font-size: 14px; border-bottom: 1px solid #0a0a0a; }
        .sub-item.active { color: var(--accent); background: #ed424505; }

        main { height: 100vh; overflow-y: auto; padding: 85px 15px 150px; }
        .section { display: none; max-width: 600px; margin: 0 auto; }
        .section.active { display: block; }

        /* Preview Box (Discord Style) */
        .preview { background: var(--d-bg); border-left: 4px solid var(--accent); border-radius: 4px; padding: 15px; margin-bottom: 25px; }
        .pv-top { display: flex; justify-content: space-between; gap: 10px; }
        .pv-thumb { width: 65px; height: 65px; border-radius: 4px; background: #222; overflow: hidden; cursor: pointer; border: 1px dashed #444; }
        .pv-banner { width: 100%; height: 140px; border-radius: 8px; background: #222; margin-top: 10px; overflow: hidden; cursor: pointer; border: 1px dashed #444; }
        .pv-f-icon { width: 20px; height: 20px; border-radius: 50%; background: #222; overflow: hidden; cursor: pointer; }
        img { width: 100%; height: 100%; object-fit: cover; }

        /* Form elements */
        .card { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid var(--border); margin-bottom: 20px; }
        label { display: block; font-size: 11px; font-weight: 800; color: #555; text-transform: uppercase; margin: 15px 0 8px; }
        input, textarea, select { width: 100%; background: #000; border: 1px solid var(--border); color: #fff; padding: 14px; border-radius: 10px; outline: none; }
        .btn { border: none; padding: 16px; border-radius: 12px; font-weight: 800; width: 100%; cursor: pointer; margin-top: 10px; }
        .btn-save { background: var(--accent); color: #fff; }
        
        .gallery-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .img-card { height: 100px; border-radius: 10px; border: 1px solid var(--border); overflow: hidden; position: relative; }
        .del-img { position: absolute; top: 5px; right: 5px; background: red; color: white; border: none; border-radius: 4px; padding: 4px; }
    </style>
</head>
<body>

    <div class="header">
        <i class="fas fa-bars burger" onclick="toggleSidebar(event)"></i>
        <div style="margin-left: 20px; font-weight: 900; color: var(--accent);">BAGBOT ELITE</div>
    </div>

    <div id="sidebar">
        <div style="padding: 30px; text-align: center; color: var(--accent); font-weight: 900;">MENU</div>
        <div class="nav-item" id="nav-config" onclick="toggleSubmenu('sub-config', event)">
            <span><i class="fas fa-cog"></i> CONFIGURATION</span>
            <i class="fas fa-chevron-down"></i>
        </div>
        <div id="sub-config" class="submenu show">
            <div class="sub-item active" onclick="showTab('welcome', this)">Bienvenue</div>
            <div class="sub-item" onclick="showTab('leave', this)">Départ</div>
        </div>
        <div class="nav-item" onclick="showTab('admin', this)"><span><i class="fas fa-user-shield"></i> PERMISSIONS</span></div>
        <div class="nav-item" onclick="showTab('gallery', this)"><span><i class="fas fa-images"></i> GALERIE</span></div>
    </div>

    <main onclick="closeSidebar()">
        <div id="welcome" class="section active">
            <div class="preview" id="preview-welcome">
                <div class="pv-top">
                    <div style="flex-grow:1">
                        <div id="pv-w-title" style="color:#00a8fc; font-weight:bold;">Titre</div>
                        <div id="pv-w-desc" style="font-size:14px; margin-top:5px; white-space:pre-wrap;">Description</div>
                    </div>
                    <div class="pv-thumb" onclick="openPicker('welcome', 'thumbnail')"><img id="w-img-thumb"></div>
                </div>
                <div class="pv-banner" onclick="openPicker('welcome', 'banner')"><img id="w-img-banner"></div>
                <div style="display:flex; align-items:center; gap:8px; margin-top:10px; font-size:12px; color:#b5bac1;">
                    <div class="pv-f-icon" onclick="openPicker('welcome', 'footer_icon')"><img id="w-img-footer"></div>
                    <span id="pv-w-footer">Footer</span>
                </div>
            </div>

            <div class="card">
                <h2>Bienvenue</h2>
                <label>Couleur Embed</label>
                <input type="color" id="w-color" oninput="sync('welcome')">
                <label>Titre</label>
                <input type="text" id="w-title" oninput="sync('welcome')">
                <label>Message</label>
                <textarea id="w-desc" rows="4" oninput="sync('welcome')"></textarea>
                <label>Texte Footer</label>
                <input type="text" id="w-footer" oninput="sync('welcome')">
                <label>Salon</label>
                <select id="w-channel"></select>
                <button class="btn btn-save" onclick="save()">SAUVEGARDER</button>
                <button class="btn" style="background:#5865f2; color:white;" onclick="test('welcome')">TESTER RENDU</button>
            </div>
        </div>

        <div id="leave" class="section">
             <div class="preview" id="preview-leave">
                <div class="pv-top">
                    <div style="flex-grow:1">
                        <div id="pv-l-title" style="color:#00a8fc; font-weight:bold;">Départ</div>
                        <div id="pv-l-desc" style="font-size:14px; margin-top:5px; white-space:pre-wrap;">Description</div>
                    </div>
                    <div class="pv-thumb" onclick="openPicker('leave', 'thumbnail')"><img id="l-img-thumb"></div>
                </div>
                <div class="pv-banner" onclick="openPicker('leave', 'banner')"><img id="l-img-banner"></div>
                <div style="display:flex; align-items:center; gap:8px; margin-top:10px; font-size:12px; color:#b5bac1;">
                    <div class="pv-f-icon" onclick="openPicker('leave', 'footer_icon')"><img id="l-img-footer"></div>
                    <span id="pv-l-footer">Footer</span>
                </div>
            </div>
            <div class="card">
                <h2>Départ</h2>
                <label>Couleur</label>
                <input type="color" id="l-color" oninput="sync('leave')">
                <label>Titre</label>
                <input type="text" id="l-title" oninput="sync('leave')">
                <label>Message</label>
                <textarea id="l-desc" rows="4" oninput="sync('leave')"></textarea>
                <label>Salon</label>
                <select id="l-channel"></select>
                <button class="btn btn-save" onclick="save()">SAUVEGARDER</button>
            </div>
        </div>

        <div id="admin" class="section">
            <div class="card">
                <h2>Permissions Admin</h2>
                <div id="admin-roles-list"></div>
                <button class="btn btn-save" onclick="save()">APPLIQUER</button>
            </div>
        </div>

        <div id="gallery" class="section">
            <div class="card">
                <h2>Galerie Médias</h2>
                <input type="file" id="file-up" onchange="upload()">
                <div id="gallery-list" class="gallery-grid" style="margin-top:20px;"></div>
                <button class="btn btn-save" onclick="showTab(lastTab)">RETOUR</button>
            </div>
        </div>
    </main>

    <script>
        let db = {}; let activeMode = ''; let activeType = ''; let lastTab = 'welcome';

        async function init() {
            const res = await fetch('/api/get_data');
            db = await res.json();
            
            // Injection Salons
            const chanHtml = db.channels.map(c => `<option value="${c.id}"># ${c.name}</option>`).join('');
            document.getElementById('w-channel').innerHTML = chanHtml;
            document.getElementById('l-channel').innerHTML = chanHtml;

            // Chargement Config
            const w = db.config.welcome;
            document.getElementById('w-title').value = w.title;
            document.getElementById('w-desc').value = w.desc;
            document.getElementById('w-footer').value = w.footer || "";
            document.getElementById('w-color').value = w.color;
            document.getElementById('w-channel').value = w.channel;
            setImg('welcome', 'thumbnail', w.thumbnail);
            setImg('welcome', 'banner', w.banner);
            setImg('welcome', 'footer_icon', w.footer_icon);

            renderGallery();
            sync('welcome'); sync('leave');
        }

        function sync(mode) {
            const p = mode === 'welcome' ? 'w' : 'l';
            const col = document.getElementById(`${p}-color`).value;
            document.getElementById(`preview-${mode}`).style.borderLeftColor = col;
            document.getElementById(`pv-${p}-title`).innerText = document.getElementById(`${p}-title`).value || "Titre";
            document.getElementById(`pv-${p}-desc`).innerText = document.getElementById(`${p}-desc`).value || "Message...";
            if(document.getElementById(`pv-${p}-footer`)) 
                document.getElementById(`pv-${p}-footer`).innerText = document.getElementById(`${p}-footer`).value || "Footer";
        }

        function setImg(m, t, u) {
            const p = m === 'welcome' ? 'w' : 'l';
            const idMap = {'thumbnail':`${p}-img-thumb`,'banner':`${p}-img-banner`,'footer_icon':`${p}-img-footer`};
            const el = document.getElementById(idMap[t]);
            if(!el) return;
            if(u) { el.src = u; el.style.display = 'block'; el.dataset.url = u; }
            else { el.style.display = 'none'; el.dataset.url = ""; }
        }

        function openPicker(m, t) { activeMode = m; activeType = t; lastTab = m; showTab('gallery'); }
        function selectImg(u) { setImg(activeMode, activeType, u); showTab(activeMode); }

        async function upload() {
            const fd = new FormData(); fd.append('file', document.getElementById('file-up').files[0]);
            const res = await fetch('/api/upload', {method:'POST', body:fd});
            const r = await res.json();
            db.images.push(r.path); renderGallery(); selectImg(r.path);
        }

        function renderGallery() {
            document.getElementById('gallery-list').innerHTML = db.images.map(img => `
                <div class="img-card"><img src="${img}" onclick="selectImg('${img}')"></div>
            `).join('');
        }

        async function save() {
            const config = {
                welcome: {
                    title: document.getElementById('w-title').value,
                    desc: document.getElementById('w-desc').value,
                    footer: document.getElementById('w-footer').value,
                    color: document.getElementById('w-color').value,
                    channel: document.getElementById('w-channel').value,
                    thumbnail: document.getElementById('w-img-thumb').dataset.url || "",
                    banner: document.getElementById('w-img-banner').dataset.url || "",
                    footer_icon: document.getElementById('w-img-footer').dataset.url || ""
                },
                leave: { /* ... similaire à welcome ... */ },
                admin_roles: []
            };
            await fetch('/api/save', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(config)});
            alert("Sauvegardé !");
        }

        async function test(mode) {
            const p = mode === 'welcome' ? 'w' : 'l';
            const conf = {
                channel: document.getElementById(`${p}-channel`).value,
                title: document.getElementById(`${p}-title`).value,
                desc: document.getElementById(`${p}-desc`).value,
                color: document.getElementById(`${p}-color`).value,
                thumbnail: document.getElementById(`${p}-img-thumb`).dataset.url || "",
                banner: document.getElementById(`${p}-img-banner`).dataset.url || ""
            };
            await fetch('/api/test_message', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({mode, config:conf})});
        }

        function toggleSidebar(e) { e.stopPropagation(); document.getElementById('sidebar').classList.toggle('open'); }
        function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); }
        function toggleSubmenu(id, e) { e.stopPropagation(); document.getElementById(id).classList.toggle('show'); }
        
        function showTab(id, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item, .sub-item').forEach(n => n.classList.remove('active'));
            if(el) el.classList.add('active');
            closeSidebar();
        }

        window.onload = init;
    </script>
</body>
</html>

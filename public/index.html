<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BAGBOT ELITE V9</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #0a0a0a; --card: #141414; --accent: #ed4245; --border: #252525; --d-bg: #2b2d31; --success: #43b581; }
        * { box-sizing: border-box; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; }

        .header { position: fixed; top: 0; left: 0; right: 0; height: 65px; background: #000; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; z-index: 2500; }
        .burger { font-size: 22px; color: var(--accent); cursor: pointer; margin-right: 20px; }
        .logo { font-weight: 900; letter-spacing: 2px; color: var(--accent); }

        #sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100vh; background: #000; z-index: 3000; transition: 0.3s; border-right: 1px solid var(--border); }
        #sidebar.open { left: 0; }
        .nav-item { padding: 20px; border-bottom: 1px solid #111; cursor: pointer; display: flex; align-items: center; gap: 15px; color: #888; font-weight: bold; }
        .nav-item.active { color: var(--accent); background: #ed424510; border-right: 4px solid var(--accent); }
        
        .sub-menu { display: none; background: #080808; }
        .nav-sub-item { padding: 15px 20px 15px 45px; border-bottom: 1px solid #111; cursor: pointer; display: flex; align-items: center; gap: 15px; color: #666; font-weight: bold; font-size: 13px; }
        .nav-sub-item.active { color: var(--accent); background: #ed424505; border-right: 4px solid var(--accent); }

        main { height: 100vh; overflow-y: auto; padding: 85px 15px 180px; -webkit-overflow-scrolling: touch; }
        .section { display: none; max-width: 600px; margin: 0 auto; }
        .section.active { display: block; }

        .preview { background: var(--d-bg); border-left: 4px solid var(--accent); border-radius: 4px; padding: 15px; margin-bottom: 25px; min-height: 100px; }
        .pv-top { display: flex; justify-content: space-between; gap: 10px; }
        .pv-thumb { width: 65px; height: 65px; border-radius: 4px; background: #222; border: 1px dashed #444; overflow: hidden; }
        .pv-banner { width: 100%; height: 140px; border-radius: 8px; background: #222; border: 1px dashed #444; margin-top: 10px; overflow: hidden; }
        .pv-f-icon { width: 20px; height: 20px; border-radius: 50%; background: #222; border: 1px dashed #444; overflow: hidden; }
        img { width: 100%; height: 100%; object-fit: cover; }

        .card { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid var(--border); margin-bottom: 20px; }
        label { display: block; font-size: 11px; font-weight: 800; color: #555; text-transform: uppercase; margin: 15px 0 8px; }
        .var-box { background: #000; padding: 12px; border-radius: 10px; margin-top: 8px; border: 1px solid #222; font-size: 11px; }

        input, textarea, select { width: 100%; background: #000; border: 1px solid var(--border); color: #fff; padding: 14px; border-radius: 10px; outline: none; }
        .drop-btn { background: #000; border: 1px solid var(--border); padding: 14px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; }
        .drop-menu { display: none; background: #050505; border: 1px solid var(--border); border-radius: 10px; max-height: 200px; overflow-y: auto; margin-top: 5px; }
        .drop-menu.show { display: block; }
        .role-item { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid #111; }
        
        .btn { border: none; padding: 16px; border-radius: 12px; font-weight: 800; width: 100%; cursor: pointer; margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-save { background: var(--accent); color: #fff; }
        .btn-test { background: #5865f2; color: #fff; }
    </style>
</head>
<body>

    <div class="header">
        <i class="fas fa-bars burger" onclick="toggleSidebar(event)"></i>
        <div class="logo">BAGBOT ELITE</div>
    </div>

    <div id="sidebar">
        <div style="padding: 30px; text-align: center; color: var(--accent); font-weight: 900;">BAGBOT</div>
        <div class="nav-item" onclick="toggleSubMenu(event)">
            <i class="fas fa-exchange-alt"></i> MSG AUTO <i class="fas fa-chevron-down" id="chev-msg" style="margin-left: auto;"></i>
        </div>
        <div id="sub-messages" class="sub-menu">
            <div class="nav-sub-item active" onclick="showTab('welcome', this)">BIENVENUE</div>
            <div class="nav-sub-item" onclick="showTab('leave', this)">DÉPART</div>
        </div>
        <div class="nav-item" onclick="showTab('admin', this)"><i class="fas fa-user-shield"></i> PERMISSIONS</div>
        <div class="nav-item" onclick="showTab('gallery', this)"><i class="fas fa-images"></i> GALERIE</div>
    </div>

    <main id="main-scroll" onclick="closeSidebar()">
        <div id="welcome" class="section active">
            <div id="pv-box-welcome" class="preview">
                <div class="pv-top">
                    <div style="flex-grow:1">
                        <div id="pv-title-welcome" style="color:#00a8fc; font-weight:bold;">Chargement...</div>
                        <div id="pv-desc-welcome" style="font-size:14px; margin-top:5px; white-space:pre-wrap;"></div>
                    </div>
                    <div class="pv-thumb"><img id="w-img-thumb"></div>
                </div>
                <div class="pv-banner"><img id="w-img-banner"></div>
            </div>

            <div class="card">
                <h2>Configuration Bienvenue</h2>
                <label>Couleur Embed</label><input type="color" id="w-color" oninput="sync('welcome')">
                <label>Titre</label><input type="text" id="w-title" oninput="sync('welcome')">
                <label>Message</label><textarea id="w-desc" rows="5" oninput="sync('welcome')"></textarea>
                <div class="var-box"><b>{user}</b> | <b>{server}</b> | <b>{count}</b></div>
                <label>Rôles Déclencheurs</label>
                <div class="drop-btn" onclick="toggleDrop(event, 'w-role-menu')"><span id="w-role-label">0 rôles</span> <i class="fas fa-chevron-down"></i></div>
                <div id="w-role-menu" class="drop-menu"></div>
                <label>Salon Cible</label><select id="w-channel"></select>
                <button class="btn btn-save" onclick="save()">SAUVEGARDER</button>
                <button class="btn btn-test" id="w-btn-test" onclick="test('welcome')">TESTER LE RENDU</button>
            </div>
        </div>

        <div id="leave" class="section">
             <div class="card"><h2>Configuration Départ</h2><label>Message</label><textarea id="l-desc" rows="5"></textarea></div>
        </div>
        
        <div id="admin" class="section"><div class="card"><h2>Permissions</h2><div id="admin-menu" class="drop-menu"></div></div></div>
        <div id="gallery" class="section"><div class="card"><h2>Galerie</h2><div id="gallery-list"></div></div></div>
    </main>

    <script>
        let db = { config: { welcome: {}, leave: {} }, channels: [], roles: [], server_info: {} };

        async function init() {
            try {
                const res = await fetch('/api/get_data');
                db = await res.json();
                
                // Remplissage des salons
                const chanSelect = document.getElementById('w-channel');
                chanSelect.innerHTML = db.channels.map(ch => `<option value="${ch.id}"># ${ch.name}</option>`).join('');

                // Remplissage Welcome
                const w = db.config.welcome;
                document.getElementById('w-title').value = w.title || "";
                document.getElementById('w-desc').value = w.desc || "";
                document.getElementById('w-color').value = w.color || "#ed4245";
                document.getElementById('w-channel').value = w.channel || "";
                
                // Remplissage Rôles
                renderChecklist('w-role-menu', db.config.welcome.trigger_roles || [], 'w-role-label');
                
                sync('welcome');
            } catch (e) { console.error("Erreur de chargement des données", e); }
        }

        function sync(mode) {
            const p = (mode === 'welcome') ? 'w' : 'l';
            const title = document.getElementById(`${p}-title`).value;
            const desc = document.getElementById(`${p}-desc`).value;
            const sName = db.server_info.name || "Serveur";
            
            document.getElementById(`pv-title-${mode}`).innerText = title.replace(/{server}/g, sName);
            document.getElementById(`pv-desc-${mode}`).innerText = desc.replace(/{server}/g, sName);
        }

        function renderChecklist(id, sel, lblId) {
            document.getElementById(id).innerHTML = db.roles.map(r => `
                <div class="role-item" onclick="toggleCheck(this, '${lblId}')">
                    <input type="checkbox" value="${r}" ${sel.includes(r)?'checked':''}> <span>${r}</span>
                </div>`).join('');
        }

        function toggleCheck(el, lblId) {
            const cb = el.querySelector('input');
            cb.checked = !cb.checked;
            const n = el.parentElement.querySelectorAll('input:checked').length;
            document.getElementById(lblId).innerText = n + " rôle(s)";
        }

        // NAVIGATION
        function toggleSidebar(e) { e.stopPropagation(); document.getElementById('sidebar').classList.toggle('open'); }
        function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); }
        function toggleSubMenu(e) { 
            e.stopPropagation(); 
            const sub = document.getElementById('sub-messages');
            sub.style.display = (sub.style.display === 'block') ? 'none' : 'block';
        }
        function toggleDrop(e, id) { e.stopPropagation(); document.getElementById(id).classList.toggle('show'); }
        
        function showTab(id, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(el && !el.classList.contains('nav-sub-item')) closeSidebar();
        }

        window.onload = init;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BagBot | Dashboard Ultimate</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #ff4d4d; --bg: #111214; --card: #2b2d31; --text: #dbdee1; --sidebar: #0b0b0b; --draft-coral: #d37f6a; --delete: #ed4245; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 15px; display: flex; flex-direction: column; align-items: center; }

        /* --- APERÇU DISCORD --- */
        .discord-msg { background: #313338; border-radius: 8px; padding: 15px; display: flex; gap: 12px; width: 100%; max-width: 500px; margin-bottom: 20px; box-sizing: border-box; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
        .embed { background: #1e1f22; border-left: 4px solid var(--accent); border-radius: 4px; padding: 15px; position: relative; width: 100%; }
        
        .upload-zone { border: 1px dashed #4e5058; border-radius: 4px; display: flex; align-items: center; justify-content: center; cursor: pointer; background: rgba(0,0,0,0.2); overflow: hidden; position: relative; }
        .upload-zone img { width: 100%; height: 100%; object-fit: cover; position: absolute; }
        .thumb-slot { position: absolute; top: 15px; right: 15px; width: 60px; height: 60px; }
        .banner-slot { width: 100%; min-height: 100px; margin: 10px 0; }
        
        .embed-title { font-size: 16px; font-weight: 700; color: white; margin-bottom: 5px; outline: none; }
        .embed-desc { font-size: 14px; color: #dbdee1; outline: none; min-height: 20px; white-space: pre-wrap; }

        /* --- CONFIGURATION --- */
        .card { background: var(--card); border-radius: 12px; padding: 20px; border: 1px solid #1a1a1a; width: 100%; max-width: 500px; box-sizing: border-box; margin-bottom: 20px; }
        .label-style { font-size: 11px; color: #b5bac1; text-transform: uppercase; font-weight: 800; margin: 15px 0 8px; display: block; }
        select { width: 100%; background: #1e1f22; border: 1px solid #111; color: white; padding: 14px; border-radius: 8px; font-size: 15px; margin-bottom: 10px; outline: none; }

        .reaction-row { background: #1e1f22; border-radius: 8px; padding: 12px; display: flex; align-items: center; gap: 12px; margin-bottom: 10px; border: 1px solid #111; }
        .emoji-trigger { width: 40px; height: 40px; background: #2b2d31; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; }

        .btn-add { background: var(--draft-coral); color: white; border: none; padding: 14px; width: 100%; border-radius: 8px; font-weight: 700; cursor: pointer; margin-top: 10px; text-transform: uppercase; }
        .btn-deploy { background: var(--accent); color: white; border: none; padding: 16px; width: 100%; border-radius: 8px; font-weight: 800; cursor: pointer; margin-top: 10px; text-transform: uppercase; }

        /* --- SECTION MESSAGES CRÉÉS --- */
        .history-title { width: 100%; max-width: 500px; font-size: 14px; font-weight: 800; color: #949ba4; text-transform: uppercase; margin: 20px 0 10px; display: flex; align-items: center; gap: 10px; }
        .history-title::after { content: ""; flex: 1; height: 1px; background: #333; }
        
        .msg-item { background: #1e1f22; border-radius: 10px; padding: 15px; margin-bottom: 10px; border: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .msg-info b { color: white; display: block; font-size: 14px; }
        .msg-info span { font-size: 12px; color: #888; }
        .msg-btns { display: flex; gap: 10px; }
        .btn-mini { padding: 8px 12px; border-radius: 5px; border: none; font-weight: 700; cursor: pointer; font-size: 12px; }
        .btn-edit { background: #4e5058; color: white; }
        .btn-del { background: rgba(237, 66, 69, 0.1); color: var(--delete); border: 1px solid var(--delete); }

        /* --- SÉLECTEUR EMOJI (DRAFTBOT) --- */
        #emojiPicker { position: fixed; bottom: 0; left: 0; width: 100%; height: 70vh; background: #111214; border-top: 1px solid #333; display: none; flex-direction: column; z-index: 10000; border-radius: 20px 20px 0 0; }
        .emoji-body { display: flex; flex: 1; overflow: hidden; }
        .emoji-sidebar { width: 55px; background: var(--sidebar); display: flex; flex-direction: column; align-items: center; padding-top: 20px; gap: 25px; }
        .emoji-scroll { flex: 1; overflow-y: auto; padding: 15px; scroll-behavior: smooth; }
        .emoji-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
        .emoji-item { font-size: 30px; text-align: center; cursor: pointer; }
    </style>
</head>
<body>

    <h3 style="margin-bottom: 25px;">BagBot Dashboard</h3>

    <div class="discord-msg">
        <div class="avatar"></div>
        <div class="embed">
            <div class="upload-zone thumb-slot" onclick="openUploader('thumb')">
                <i class="fas fa-plus" id="icon-thumb"></i>
                <img id="view-thumb" style="display:none">
            </div>
            <div class="embed-title" contenteditable="true" id="p-title">Titre du rôle</div>
            <div class="embed-desc" contenteditable="true" id="p-desc">Description du message...</div>
            <div class="upload-zone banner-slot" onclick="openUploader('banner')">
                <i class="fas fa-image" id="icon-banner"></i>
                <img id="view-banner" style="display:none">
            </div>
        </div>
    </div>

    <div class="card">
        <span class="label-style">Salon Discord</span>
        <select id="channel-list"><option>Chargement...</option></select>
        
        <div id="reactions-container"></div>

        <button class="btn-add" onclick="createReactionRow()">AJOUTER UN RÔLE RÉACTION</button>
        <button class="btn-deploy" onclick="deploy()">DÉPLOYER SUR DISCORD</button>
    </div>

    <div class="history-title">Messages déjà créés</div>
    <div id="history-container" style="width: 100%; max-width: 500px;">
        <p style="text-align:center; color:#555; font-size:12px;">Aucun message trouvé.</p>
    </div>

    <div id="emojiPicker">
        <div style="padding:15px;"><input type="text" style="width:100%; background:#1e1f22; border:none; padding:10px; color:white; border-radius:5px;" placeholder="Rechercher..."></div>
        <div class="emoji-body">
            <div class="emoji-sidebar">
                <i class="fas fa-clock" onclick="document.getElementById('sec-std').scrollIntoView()"></i>
                <i class="fas fa-smile" onclick="document.getElementById('sec-std').scrollIntoView()"></i>
            </div>
            <div class="emoji-scroll">
                <div id="sec-std">
                    <div class="emoji-grid" id="grid-std"></div>
                </div>
            </div>
        </div>
        <button onclick="closeEmoji()" style="padding:15px; background:none; border:none; color:var(--accent); font-weight:800;">FERMER</button>
    </div>

    <input type="file" id="media-input" style="display:none" onchange="handleMedia(this)">

<script>
    const API_IP = "http://192.168.1.133:49500";
    let rolesData = [];
    let activeBtn = null;
    let currentZone = null;

    async function init() {
        loadStandardEmojis();
        try {
            const [cRes, rRes, mRes] = await Promise.all([
                fetch(`${API_IP}/api/channels`),
                fetch(`${API_IP}/api/roles`),
                fetch(`${API_IP}/api/messages`) // Récupère les messages existants
            ]);
            
            const channels = await cRes.json();
            rolesData = await rRes.json();
            const savedMessages = await mRes.json();

            document.getElementById('channel-list').innerHTML = channels.map(c => `<option value="${c.id}"># ${c.name}</option>`).join('');
            
            // Affichage de l'historique
            renderHistory(savedMessages);

        } catch(e) { console.error("API Error"); }
    }

    // Gestion de l'historique (Modifier/Supprimer)
    function renderHistory(messages) {
        const container = document.getElementById('history-container');
        if(!messages.length) return;

        container.innerHTML = messages.map(m => `
            <div class="msg-item">
                <div class="msg-info">
                    <b>${m.title || "Sans titre"}</b>
                    <span>Salon: #${m.channelName}</span>
                </div>
                <div class="msg-btns">
                    <button class="btn-mini btn-edit" onclick="editMessage('${m.id}')">EDITER</button>
                    <button class="btn-mini btn-del" onclick="deleteMessage('${m.id}')">SUPPRIMER</button>
                </div>
            </div>
        `).join('');
    }

    async function deleteMessage(id) {
        if(confirm("Supprimer définitivement ce message ?")) {
            await fetch(`${API_IP}/api/messages/${id}`, { method: 'DELETE' });
            init(); // Rafraîchir
        }
    }

    function editMessage(id) {
        // Logique pour charger les données du message dans l'aperçu haut
        alert("Chargement du message " + id + "...");
    }

    // Autres fonctions (Emojis, Upload, etc.)
    function createReactionRow() {
        const div = document.createElement('div');
        div.className = 'reaction-row';
        div.innerHTML = `
            <div class="emoji-trigger" onclick="openEmoji(this)">😀</div>
            <select style="margin:0; flex:1;">
                <option value="">Rôle...</option>
                ${rolesData.map(r => `<option value="${r.id}">${r.name}</option>`).join('')}
            </select>
            <i class="fas fa-trash-alt" style="color:#444;" onclick="this.parentElement.remove()"></i>
        `;
        document.getElementById('reactions-container').appendChild(div);
    }

    function openEmoji(btn) { activeBtn = btn; document.getElementById('emojiPicker').style.display = 'flex'; }
    function closeEmoji() { document.getElementById('emojiPicker').style.display = 'none'; }
    function setEmoji(val) { activeBtn.innerText = val; closeEmoji(); }

    function loadStandardEmojis() {
        const list = ['😀','🔥','🔞','✅','❌','⭐','🌙','💎','🎁','🛡️','📜','📸','🎭'];
        document.getElementById('grid-std').innerHTML = list.map(e => `<span class="emoji-item" onclick="setEmoji('${e}')">${e}</span>`).join('');
    }

    function openUploader(z) { currentZone = z; document.getElementById('media-input').click(); }
    function handleMedia(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => {
                const img = document.getElementById(`view-${currentZone}`);
                document.getElementById(`icon-${currentUploadZone || currentZone}`).style.display = 'none';
                img.src = e.target.result;
                img.style.display = 'block';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    window.onload = init;
</script>
</body>
</html>

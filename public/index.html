<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>BagBot Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050505; --panel: #0f0f0f; --accent: #ed4245; --border: #1e1e1e; --discord-bg: #2b2d31; --discord-text: #dbdee1; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: white; display: flex; min-height: 100vh; overflow-x: hidden; }

        /* SIDEBAR - Fixé pour qu'elle s'ouvre par dessus */
        #sidebar { width: 260px; background: #000; border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 10000; transition: 0.3s; position: fixed; height: 100vh; left: -260px; }
        #sidebar.open { left: 0; }
        #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 9999; }
        #overlay.open { display: block; }
        
        .sidebar-header { padding: 30px 25px; font-size: 22px; font-weight: 900; color: var(--accent); letter-spacing: 2px; }
        .nav-item { padding: 18px 25px; cursor: pointer; color: #888; display: flex; align-items: center; gap: 12px; font-weight: bold; transition: 0.2s; }
        .nav-item:hover { color: #fff; background: rgba(255,255,255,0.05); }
        .nav-item.active { color: var(--accent); background: rgba(237,66,69,0.1); border-right: 4px solid var(--accent); }

        /* MAIN CONTENT */
        main { flex: 1; display: flex; flex-direction: column; width: 100%; min-width: 0; }
        header { height: 70px; background: var(--panel); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding-left: 75px; font-weight: 900; position: sticky; top: 0; z-index: 100; text-transform: uppercase; }
        .menu-toggle { position: fixed; left: 15px; top: 15px; font-size: 20px; color: var(--accent); cursor: pointer; z-index: 10001; background: #111; padding: 10px; border-radius: 8px; border: 1px solid var(--border); }

        .content-section { display: none; flex-direction: column; align-items: center; padding: 20px; width: 100%; }
        .content-section.active { display: flex; }

        /* EMBED PREVIEW */
        .discord-embed { width: 100%; max-width: 500px; background: var(--discord-bg); border-left: 4px solid var(--accent); padding: 16px; border-radius: 4px; margin-bottom: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .embed-main { display: flex; justify-content: space-between; gap: 10px; }
        #p-title { font-weight: 600; color: #fff; margin-bottom: 4px; font-size: 1rem; }
        #p-desc { font-size: 0.875rem; color: var(--discord-text); white-space: pre-wrap; line-height: 1.3; }
        
        .img-click { cursor: pointer; border: 2px dashed rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        .p-thumb { width: 80px; height: 80px; border-radius: 4px; flex-shrink: 0; }
        .p-banner { width: 100%; height: 140px; margin-top: 12px; border-radius: 8px; }
        .img-click img { width: 100%; height: 100%; object-fit: cover; display: none; }

        /* FORM CARDS */
        .card { width: 100%; max-width: 550px; background: var(--panel); border-radius: 12px; padding: 25px; border: 1px solid var(--border); margin-bottom: 25px; }
        h3 { font-size: 11px; color: var(--accent); text-transform: uppercase; margin-bottom: 15px; letter-spacing: 1px; }
        input, textarea, select { width: 100%; background: #000; border: 1px solid var(--border); color: white; padding: 16px; border-radius: 10px; margin-bottom: 15px; font-size: 15px; outline: none; }
        
        /* MULTISELECT DROPDOWNS */
        .multiselect { position: relative; margin-bottom: 20px; }
        .select-box { background: #000; border: 1px solid var(--border); padding: 16px; border-radius: 10px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .dropdown-content { display: none; position: absolute; width: 100%; top: 100%; left: 0; background: #0d0d0d; border: 1px solid var(--border); z-index: 2000; max-height: 250px; overflow-y: auto; border-radius: 0 0 10px 10px; }
        .dropdown-content.show { display: block; }
        .option { padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #1a1a1a; cursor: pointer; }
        .option:hover { background: #1a1a1a; }

        .btn { border: none; padding: 18px; border-radius: 10px; font-weight: 800; cursor: pointer; width: 100%; color: white; text-transform: uppercase; margin-top: 10px; transition: 0.3s; }
        .btn-save { background: var(--accent); }
        .btn-test { background: #5865f2; }

        /* GALERIE */
        .gal-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; width: 100%; }
        .gal-item { position: relative; border-radius: 10px; overflow: hidden; border: 1px solid var(--border); aspect-ratio: 16/9; }
        .gal-img { width: 100%; height: 100%; object-fit: cover; cursor: pointer; }
        .btn-del { position: absolute; top: 8px; right: 8px; background: var(--accent); color: white; border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; z-index: 10; font-size: 14px; }

        #modal-gal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 20000; padding: 20px; overflow-y: auto; }
        .modal-inner { max-width: 500px; margin: 30px auto; background: var(--panel); padding: 30px; border-radius: 20px; border: 1px solid var(--border); }
    </style>
</head>
<body>
    <div id="overlay" onclick="toggleSidebar()"></div>
    <div class="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></div>

    <nav id="sidebar">
        <div class="sidebar-header">BAGBOT</div>
        <div class="nav-item active" onclick="show('BIENVENUE', this)"><i class="fas fa-door-open"></i> BIENVENUE</div>
        <div class="nav-item" onclick="show('ADMIN', this)"><i class="fas fa-user-shield"></i> ADMIN</div>
        <div class="nav-item" onclick="show('GALERIE', this)"><i class="fas fa-images"></i> GALERIE</div>
    </nav>

    <main>
        <header id="main-title">BIENVENUE</header>

        <section id="section-BIENVENUE" class="content-section active">
            <div class="discord-embed">
                <div class="embed-main">
                    <div style="flex:1">
                        <div id="p-title">Titre du Message</div>
                        <div id="p-desc">Votre texte de bienvenue apparaîtra ici...</div>
                    </div>
                    <div class="img-click p-thumb" onclick="openGal('thumb')">
                        <i class="fas fa-camera" id="icon-thumb" style="opacity:0.3"></i>
                        <img id="img-thumb">
                    </div>
                </div>
                <div class="img-click p-banner" onclick="openGal('banner')">
                    <i class="fas fa-image" id="icon-banner" style="opacity:0.3"></i>
                    <img id="img-banner">
                </div>
            </div>

            <div class="card">
                <h3>Personnalisation</h3>
                <input type="text" id="w-title" placeholder="Titre..." oninput="sync()">
                <textarea id="w-desc" rows="4" placeholder="Description..." oninput="sync()"></textarea>
                <input type="text" id="w-footer" placeholder="Texte de bas de page..." oninput="sync()">
                
                <h3>Envoi & Rôles</h3>
                <select id="w-chan"><option>Chargement des salons...</option></select>
                <div class="multiselect">
                    <div class="select-box" onclick="toggleDrop('drop-roles')">Rôles de Bienvenue <i class="fas fa-chevron-down"></i></div>
                    <div id="drop-roles" class="dropdown-content"></div>
                </div>

                <button class="btn btn-save" onclick="save()">SAUVEGARDER CONFIG</button>
                <button class="btn btn-test" onclick="testMsg()">ENVOYER UN TEST DISCORD</button>
            </div>
        </section>

        <section id="section-ADMIN" class="content-section">
            <div class="card">
                <h3>Accès au Dashboard</h3>
                <p style="font-size:12px; color:#666; margin-bottom:15px">Sélectionnez les rôles autorisés à utiliser ce panel.</p>
                <div class="multiselect">
                    <div class="select-box" onclick="toggleDrop('drop-admin')">Rôles Admin <i class="fas fa-chevron-down"></i></div>
                    <div id="drop-admin" class="dropdown-content"></div>
                </div>
                <button class="btn btn-save" onclick="saveAdmin()">METTRE À JOUR LES ACCÈS</button>
            </div>
        </section>

        <section id="section-GALERIE" class="content-section">
            <button class="btn btn-save" onclick="document.getElementById('file-in').click()" style="max-width:300px; margin-bottom:30px">TÉLÉVERSER UNE IMAGE</button>
            <input type="file" id="file-in" onchange="up()" style="display:none">
            <div id="admin-gal" class="gal-grid"></div>
        </section>
    </main>

    <div id="modal-gal">
        <div class="modal-inner">
            <span style="float:right; cursor:pointer; font-size:24px" onclick="closeGal()">&times;</span>
            <h2 style="margin-bottom:20px">Ma Galerie</h2>
            <div id="modal-gal-list" class="gal-grid"></div>
        </div>
    </div>

    <script>
        let CONFIG = {}; let targetSlot = ''; const API = window.location.origin;

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('open');
        }
        function toggleDrop(id) { 
            document.querySelectorAll('.dropdown-content').forEach(d => { if(d.id !== id) d.classList.remove('show'); });
            document.getElementById(id).classList.toggle('show'); 
        }

        function show(name, el) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('section-' + name).classList.add('active');
            el.classList.add('active');
            document.getElementById('main-title').innerText = name;
            if(window.innerWidth < 900) toggleSidebar();
            if(name === 'GALERIE') loadAdminGal();
        }

        // INITIALISATION AVEC RE-TENTATIVE SI BOT PAS PRÊT
        async function init() {
            const res = await fetch(`${API}/api/get_server_info`);
            const data = await res.json();
            
            if(data.status === "waiting") {
                console.log("En attente du bot...");
                setTimeout(init, 2000); // On réessaye dans 2 secondes
                return;
            }

            CONFIG = data.config || {};

            // Salons
            const chanSel = document.getElementById('w-chan');
            if(data.channels.length > 0) {
                chanSel.innerHTML = data.channels.map(c => `<option value="${c.id}"># ${c.name}</option>`).join('');
            } else {
                chanSel.innerHTML = "<option>Aucun salon trouvé</option>";
            }
            
            // Rôles
            const makeRoles = (id, selected) => {
                const container = document.getElementById(id);
                if(data.all_roles.length > 0) {
                    container.innerHTML = data.all_roles.map(r => `
                        <div class="option" onclick="const ck=this.querySelector('input'); ck.checked=!ck.checked; event.stopPropagation();">
                            <span>${r}</span> <input type="checkbox" value="${r}" ${(selected || []).includes(r)?'checked':''}>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = "<div class='option'>Aucun rôle trouvé</div>";
                }
            };
            makeRoles('drop-roles', CONFIG.welcome?.trigger_roles);
            makeRoles('drop-admin', CONFIG.admin_roles);

            // Appliquer Config
            if(CONFIG.welcome) {
                document.getElementById('w-title').value = CONFIG.welcome.title || "";
                document.getElementById('w-desc').value = CONFIG.welcome.desc || "";
                document.getElementById('w-footer').value = CONFIG.welcome.footer || "";
                document.getElementById('w-chan').value = CONFIG.welcome.channel || "";
                if(CONFIG.welcome.thumb) setImg('thumb', CONFIG.welcome.thumb);
                if(CONFIG.welcome.banner) setImg('banner', CONFIG.welcome.banner);
            }
            sync();
        }

        function sync() {
            document.getElementById('p-title').innerText = document.getElementById('w-title').value || "Titre du Message";
            document.getElementById('p-desc').innerText = document.getElementById('w-desc').value || "Votre texte de bienvenue apparaîtra ici...";
        }

        function openGal(slot) {
            targetSlot = slot;
            fetch(`${API}/api/images`).then(r => r.json()).then(d => {
                document.getElementById('modal-gal-list').innerHTML = d.images.map(img => `
                    <div class="gal-item"><img src="${API+img}" class="gal-img" onclick="setImg('${targetSlot}', '${img}'); closeGal()"></div>
                `).join('');
                document.getElementById('modal-gal').style.display = 'block';
            });
        }
        function closeGal() { document.getElementById('modal-gal').style.display = 'none'; }

        function setImg(slot, path) {
            const imgEl = document.getElementById(`img-${slot}`);
            const iconEl = document.getElementById(`icon-${slot}`);
            imgEl.src = API + path; imgEl.style.display = 'block'; imgEl.dataset.path = path;
            if(iconEl) iconEl.style.display = 'none';
        }

        async function save() {
            CONFIG.welcome = {
                title: document.getElementById('w-title').value,
                desc: document.getElementById('w-desc').value,
                footer: document.getElementById('w-footer').value,
                channel: document.getElementById('w-chan').value,
                thumb: document.getElementById('img-thumb').dataset.path || "",
                banner: document.getElementById('img-banner').dataset.path || "",
                trigger_roles: Array.from(document.querySelectorAll('#drop-roles input:checked')).map(i => i.value)
            };
            const r = await fetch(`${API}/api/save_config`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(CONFIG) });
            if(r.ok) alert("✅ Configuration sauvegardée !");
        }

        async function saveAdmin() {
            CONFIG.admin_roles = Array.from(document.querySelectorAll('#drop-admin input:checked')).map(i => i.value);
            const r = await fetch(`${API}/api/save_config`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(CONFIG) });
            if(r.ok) alert("✅ Accès admin mis à jour !");
        }

        async function testMsg() {
            const res = await fetch(`${API}/api/test_welcome`, { method: 'POST' });
            if(res.ok) alert("🚀 Message de test envoyé sur Discord !"); 
            else { const err = await res.json(); alert("❌ Erreur: " + err.message); }
        }

        async function up() {
            const fd = new FormData(); fd.append('file', document.getElementById('file-in').files[0]);
            await fetch(`${API}/api/upload`, { method: 'POST', body: fd });
            loadAdminGal();
        }

        async function delImg(path) {
            if(!confirm("Supprimer définitivement cette image ?")) return;
            await fetch(`${API}/api/delete_image`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({image: path}) });
            loadAdminGal();
        }

        async function loadAdminGal() {
            const res = await fetch(`${API}/api/images`);
            const d = await res.json();
            document.getElementById('admin-gal').innerHTML = d.images.map(img => `
                <div class="gal-item">
                    <img src="${API+img}" class="gal-img">
                    <button class="btn-del" onclick="delImg('${img}')"><i class="fas fa-trash"></i></button>
                </div>
            `).join('');
        }

        window.onload = init;
        // Fermer les dropdowns si on clique dehors
        window.onclick = function(e) { if (!e.target.closest('.multiselect')) { document.querySelectorAll('.dropdown-content').forEach(d => d.classList.remove('show')); } }
    </script>
</body>
</html>

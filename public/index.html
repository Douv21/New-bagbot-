<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BagBot Admin</title>
    <style>
        :root { --accent: #ff4d4d; --bg: #0f1012; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); color: white; display: flex; }
        .sidebar { width: 260px; background: #0b0c0e; height: 100vh; position: fixed; left: -260px; transition: 0.3s; z-index: 1000; border-right: 1px solid #222; }
        .sidebar.open { left: 0; }
        .main { flex: 1; padding: 20px; width: 100%; box-sizing: border-box; }
        .panel { background: #18191c; border-radius: 12px; padding: 20px; max-width: 500px; margin: auto; border: 1px solid #282a2e; }
        .tabs { display: flex; background: #2f3136; border-radius: 8px; margin-bottom: 20px; padding: 4px; }
        .tab { flex: 1; text-align: center; padding: 10px; cursor: pointer; border-radius: 6px; color: #888; }
        .tab.active { background: var(--accent); color: white; font-weight: bold; }
        label { display: block; margin: 12px 0 4px; font-size: 11px; color: #8e9297; text-transform: uppercase; font-weight: bold; }
        select, input, textarea { width: 100%; padding: 12px; background: #202225; border: 1px solid #111; color: white; border-radius: 6px; box-sizing: border-box; }
        .btn { background: var(--accent); color: white; border: none; padding: 16px; width: 100%; border-radius: 8px; font-weight: bold; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>
<div class="sidebar" id="sidebar"><div style="padding:20px;"><b>BAG BOT V2</b></div></div>
<div class="main">
    <button onclick="document.getElementById('sidebar').classList.toggle('open')" style="background:#2f3136; color:white; border:none; padding:10px; border-radius:6px; margin-bottom:15px;">☰ Menu</button>
    <div class="panel">
        <div class="tabs">
            <div class="tab active" id="ts" onclick="setMode('simple')">Simple</div>
            <div class="tab" id="te" onclick="setMode('embed')">Embed</div>
        </div>
        <label>Salon</label><select id="channelId"></select>
        <label>Rôle</label><select id="roleId"></select>
        <div id="fs"><label>Message</label><textarea id="txt">Cliquez ici</textarea></div>
        <div id="fe" style="display:none;">
            <label>Titre</label><input type="text" id="tit">
            <label>Description</label><textarea id="des"></textarea>
            <label>Image</label><input type="file" id="img">
        </div>
        <label>Affichage</label><select id="disp"><option value="button">Bouton</option><option value="select">Menu</option></select>
        <button class="btn" id="btn" onclick="deploy()">DÉPLOYER SUR DISCORD</button>
    </div>
</div>
<script>
    let mode = 'simple';
    function setMode(m) {
        mode = m;
        document.getElementById('ts').className = m === 'simple' ? 'tab active' : 'tab';
        document.getElementById('te').className = m === 'embed' ? 'tab active' : 'tab';
        document.getElementById('fs').style.display = m === 'simple' ? 'block' : 'none';
        document.getElementById('fe').style.display = m === 'embed' ? 'block' : 'none';
    }
    async function load() {
        try {
            const [cR, rR] = await Promise.all([fetch('/api/channels'), fetch('/api/roles')]);
            const c = await cR.json(); const r = await rR.json();
            document.getElementById('channelId').innerHTML = c.map(x => `<option value="${x.id}"># ${x.name}</option>`).join('');
            document.getElementById('roleId').innerHTML = r.map(x => `<option value="${x.id}">${x.name}</option>`).join('');
        } catch(e) { console.error(e); }
    }
    async function deploy() {
        const fd = new FormData();
        fd.append('channelId', document.getElementById('channelId').value);
        fd.append('roleId', document.getElementById('roleId').value);
        fd.append('mode', mode);
        fd.append('displayType', document.getElementById('disp').value);
        fd.append('content', document.getElementById('txt').value);
        fd.append('title', document.getElementById('tit').value);
        fd.append('description', document.getElementById('des').value);
        if (document.getElementById('img').files[0]) fd.append('imageFile', document.getElementById('img').files[0]);
        
        const b = document.getElementById('btn'); b.innerText = "ENVOI...";
        try {
            const res = await fetch('/api/deploy', { method: 'POST', body: fd });
            const d = await res.json();
            if(d.success) alert("✅ Envoyé !"); else alert("❌ " + d.message);
        } catch(e) { alert("❌ Erreur serveur"); }
        b.innerText = "DÉPLOYER SUR DISCORD";
    }
    load();
</script>
</body>
</html>

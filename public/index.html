<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BagBot | Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #d78266; --bg: #2f3136; --side: #202225; --card: #36393f; --input: #202225; --text: #dcddde; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; }

        /* Sidebar & Layout */
        .sidebar { width: 260px; background: var(--side); height: 100vh; position: fixed; left: -260px; transition: 0.3s; z-index: 1000; }
        .sidebar.open { left: 0; }
        .nav-item { padding: 15px 25px; display: flex; align-items: center; gap: 12px; cursor: pointer; color: #8e9297; }
        .nav-item.active { background: #34373c; color: white; border-left: 4px solid var(--accent); }
        .main { flex: 1; padding: 20px; box-sizing: border-box; }
        
        /* Navigation Style DraftBot */
        .tabs { display: flex; background: #202225; padding: 5px; border-radius: 30px; width: fit-content; margin: 0 auto 30px; }
        .tab { padding: 8px 30px; border-radius: 20px; cursor: pointer; color: #b9bbbe; font-size: 14px; font-weight: 600; transition: 0.2s; border: 1px solid transparent; }
        .tab.active { background: #4f545c; color: white; }
        #tab-embed.active { background: rgba(215, 130, 102, 0.1); color: var(--accent); border-color: var(--accent); }

        /* Card & Inputs */
        .card { background: var(--card); border-radius: 12px; padding: 25px; max-width: 800px; margin: auto; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        label { display: block; font-size: 11px; font-weight: 800; color: #8e9297; text-transform: uppercase; margin-bottom: 10px; }
        .input-box { background: var(--input); border: 1px solid #1e1f22; border-radius: 8px; }
        select, input, textarea { width: 100%; background: transparent; border: none; color: white; padding: 12px; outline: none; font-size: 14px; box-sizing: border-box; }

        /* Emoji Picker */
        .emoji-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(42px, 1fr)); gap: 8px; background: #202225; padding: 12px; border-radius: 8px; max-height: 100px; overflow-y: auto; margin-top: 5px; }
        .emoji-item { cursor: pointer; padding: 5px; border-radius: 6px; display: flex; justify-content: center; }
        .emoji-item:hover, .emoji-item.selected { background: var(--accent); }
        .emoji-item img { width: 24px; height: 24px; }

        /* Preview (Aperçu) */
        .preview-box { background: #2f3136; border: 1px dashed #4f545c; border-radius: 8px; padding: 15px; margin-top: 20px; }
        .preview-discord { background: #36393f; border-left: 4px solid var(--accent); padding: 10px 15px; border-radius: 4px; }
        .preview-title { font-weight: bold; color: white; margin-bottom: 5px; }
        .preview-btn { display: inline-flex; align-items: center; gap: 8px; background: #4f545c; padding: 6px 12px; border-radius: 3px; font-size: 13px; margin-top: 10px; }

        .btn-deploy { background: var(--accent); color: white; border: none; padding: 16px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 25px; font-size: 15px; }
    </style>
</head>
<body>

<div class="sidebar" id="sidebar">
    <div style="padding: 25px; border-bottom: 1px solid #2f3136; display: flex; justify-content: space-between;">
        <span style="font-weight: 800; color: var(--accent);">BAGBOT</span>
        <i class="fas fa-times" onclick="toggleMenu()" style="cursor:pointer;"></i>
    </div>
    <div class="nav-item active"><i class="fas fa-fingerprint"></i> Rôles Réactions</div>
    <div class="nav-item"><i class="fas fa-cog"></i> Paramètres</div>
</div>

<div class="main">
    <button style="background:none; border:none; color:white; font-size:20px; cursor:pointer;" onclick="toggleMenu()"><i class="fas fa-bars"></i></button>
    
    <h2 style="text-align: center; margin-bottom: 30px;">Configuration du rôle</h2>

    <div class="tabs">
        <div class="tab active" id="tab-simple" onclick="setMode('simple')">Contenu</div>
        <div class="tab" id="tab-embed" onclick="setMode('embed')">Embed</div>
    </div>

    <div class="card">
        <div class="form-grid">
            <div>
                <label><i class="fas fa-hashtag"></i> Salon</label>
                <div class="input-box"><select id="cId" onchange="updatePreview()"></select></div>
            </div>
            <div>
                <label><i class="fas fa-user-tag"></i> Rôle</label>
                <div class="input-box"><select id="rId" onchange="updatePreview()"></select></div>
            </div>
        </div>

        <label>Texte du bouton</label>
        <div class="input-box"><input type="text" id="btnLabel" placeholder="Ex: Accès certifié" oninput="updatePreview()"></div>

        <label style="margin-top:20px;">Émojis du serveur</label>
        <div class="emoji-grid" id="emojiPicker"></div>
        <input type="hidden" id="selectedEmoji">

        <label style="margin-top: 20px;">Mode du rôle</label>
        <div class="input-box">
            <select id="roleMode">
                <option value="normal">Ajout / Retrait</option>
                <option value="unique">Unique (DraftBot Style)</option>
                <option value="definitif">Définitif</option>
            </select>
        </div>

        <div id="sec-simple" style="margin-top: 20px;">
            <label>Message texte</label>
            <div class="input-box"><textarea id="txt" rows="3" oninput="updatePreview()">Cliquez pour obtenir le rôle !</textarea></div>
        </div>

        <div id="sec-embed" style="display:none; margin-top: 20px;">
            <label>Titre Embed</label>
            <div class="input-box" style="margin-bottom:10px;"><input type="text" id="tit" oninput="updatePreview()"></div>
            <label>Description</label>
            <div class="input-box"><textarea id="des" rows="3" oninput="updatePreview()"></textarea></div>
        </div>

        <div class="preview-box">
            <label>Aperçu du rendu</label>
            <div id="previewDiscord" class="preview-discord">
                <div class="preview-title" id="preTit">Titre</div>
                <div id="preDes">Description...</div>
                <div class="preview-btn">
                    <span id="preEmo"></span> <span id="preLab">Bouton</span>
                </div>
            </div>
        </div>

        <button class="btn-deploy" onclick="deploy()">DÉPLOYER SUR DISCORD</button>
    </div>
</div>

<script>
    let mode = 'simple';
    function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); }
    
    function setMode(m) {
        mode = m;
        document.getElementById('tab-simple').classList.toggle('active', m === 'simple');
        document.getElementById('tab-embed').classList.toggle('active', m === 'embed');
        document.getElementById('sec-simple').style.display = m === 'simple' ? 'block' : 'none';
        document.getElementById('sec-embed').style.display = m === 'embed' ? 'block' : 'none';
        updatePreview();
    }

    async function load() {
        try {
            const [cR, rR, eR] = await Promise.all([fetch('/api/channels'), fetch('/api/roles'), fetch('/api/emojis')]);
            const c = await cR.json(); const r = await rR.json(); const e = await eR.json();
            
            document.getElementById('cId').innerHTML = c.map(x => `<option value="${x.id}"># ${x.name}</option>`).join('');
            document.getElementById('rId').innerHTML = r.map(x => `<option value="${x.id}">${x.name}</option>`).join('');
            document.getElementById('emojiPicker').innerHTML = e.map(x => `
                <div class="emoji-item" onclick="selectEmoji('${x.id}', '${x.url}', this)">
                    <img src="${x.url}">
                </div>`).join('') + `<div class="emoji-item" onclick="selectEmoji('', '', this)"><i class="fas fa-ban"></i></div>`;
            updatePreview();
        } catch(err) { console.error("Erreur API : Vérifie que le bot est lancé"); }
    }

    function selectEmoji(id, url, el) {
        document.querySelectorAll('.emoji-item').forEach(i => i.classList.remove('selected'));
        el.classList.add('selected');
        document.getElementById('selectedEmoji').value = id;
        document.getElementById('preEmo').innerHTML = url ? `<img src="${url}" style="width:16px;">` : '';
    }

    function updatePreview() {
        const lab = document.getElementById('btnLabel').value || document.getElementById('rId').options[document.getElementById('rId').selectedIndex]?.text || 'Rôle';
        document.getElementById('preLab').innerText = lab;
        
        if (mode === 'simple') {
            document.getElementById('preTit').style.display = 'none';
            document.getElementById('preDes').innerText = document.getElementById('txt').value;
            document.getElementById('previewDiscord').style.borderLeft = 'none';
        } else {
            document.getElementById('preTit').style.display = 'block';
            document.getElementById('preTit').innerText = document.getElementById('tit').value || 'Titre';
            document.getElementById('preDes').innerText = document.getElementById('des').value || 'Description...';
            document.getElementById('previewDiscord').style.borderLeft = '4px solid var(--accent)';
        }
    }

    async function deploy() {
        const fd = new FormData();
        fd.append('channelId', document.getElementById('cId').value);
        fd.append('roleId', document.getElementById('rId').value);
        fd.append('mode', mode);
        fd.append('roleMode', document.getElementById('roleMode').value);
        fd.append('buttonLabel', document.getElementById('btnLabel').value);
        fd.append('emojiId', document.getElementById('selectedEmoji').value);
        fd.append('content', document.getElementById('txt').value);
        fd.append('title', document.getElementById('tit').value);
        fd.append('description', document.getElementById('des').value);

        const res = await fetch('/api/deploy', { method: 'POST', body: fd });
        const d = await res.json();
        alert(d.success ? "✅ Déployé !" : "❌ Erreur");
    }
    load();
</script>
</body>
</html>

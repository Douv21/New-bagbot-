<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BagBot Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050505; --panel: #0f0f0f; --accent: #ed4245; --border: #1e1e1e; --discord: #2b2d31; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: white; display: flex; height: 100vh; overflow: hidden; }
        
        /* SIDEBAR ANIMÉE */
        #sidebar { 
            width: 260px; background: #000; border-right: 1px solid var(--border); 
            display: flex; flex-direction: column; transition: transform 0.3s ease; z-index: 1000;
        }
        .nav-item { padding: 18px 25px; cursor: pointer; color: #888; display: flex; align-items: center; gap: 12px; font-weight: bold; }
        .nav-item.active { color: var(--accent); background: rgba(237,66,69,0.1); border-right: 4px solid var(--accent); }

        /* RESPONSIVE MOBILE SIDEBAR */
        @media (max-width: 900px) {
            #sidebar { position: fixed; height: 100%; transform: translateX(-100%); }
            #sidebar.open { transform: translateX(0); }
        }

        main { flex: 1; display: flex; flex-direction: column; overflow-y: auto; width: 100%; }
        header { 
            height: 60px; background: var(--panel); border-bottom: 1px solid var(--border); 
            display: flex; align-items: center; padding: 0 20px; font-weight: 900; gap: 15px;
        }
        .menu-btn { display: none; font-size: 20px; cursor: pointer; color: var(--accent); }
        @media (max-width: 900px) { .menu-btn { display: block; } }

        .content-section { display: none; flex-direction: column; align-items: center; padding: 20px; width: 100%; }
        .content-section.active { display: flex; }

        /* EMBED PREVIEW */
        .discord-embed { 
            width: 100%; max-width: 480px; background: var(--discord); border-left: 4px solid var(--accent); 
            padding: 16px; border-radius: 4px; position: relative; margin-bottom: 25px; 
        }
        .thumb-preview { width: 80px; height: 80px; position: absolute; right: 16px; top: 16px; background: #000; border: 1px dashed #444; }
        .banner-preview { width: 100%; height: 140px; margin-top: 10px; background: #000; border: 1px dashed #444; }
        .img-zone img { width: 100%; height: 100%; object-fit: cover; }

        /* CARDS */
        .card { width: 100%; max-width: 480px; background: var(--panel); border-radius: 12px; padding: 20px; border: 1px solid var(--border); margin-bottom: 20px; }
        h3 { font-size: 11px; color: var(--accent); text-transform: uppercase; margin-bottom: 10px; letter-spacing: 1px; }
        input, textarea, select { width: 100%; background: #000; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 8px; margin-bottom: 15px; font-size: 14px; }

        /* MULTISELECT DROPDOWN */
        .multiselect { position: relative; margin-bottom: 15px; }
        .select-box { background: #000; border: 1px solid var(--border); padding: 12px; border-radius: 8px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .dropdown-content { 
            display: none; position: absolute; top: 100%; left: 0; right: 0; background: #0a0a0a; 
            border: 1px solid var(--border); border-radius: 8px; max-height: 180px; overflow-y: auto; z-index: 100; 
        }
        .dropdown-content.show { display: block; }
        .option { display: flex; align-items: center; padding: 10px; gap: 10px; border-bottom: 1px solid #111; cursor: pointer; }
        .option input { accent-color: var(--accent); width: 18px; height: 18px; }

        .btn { border: none; padding: 15px; border-radius: 8px; font-weight: 800; cursor: pointer; width: 100%; color: white; margin-bottom: 10px; }
        .btn-save { background: var(--accent); }
        .btn-test { background: #5865F2; }

        #gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; width: 100%; max-width: 480px; }
        .gallery-card { aspect-ratio: 1; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); cursor: pointer; }
        .gallery-card img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>
    <nav id="sidebar">
        <div style="padding: 25px; font-size: 22px; font-weight: 900; color: var(--accent);">BAGBOT</div>
        <div class="nav-item active" onclick="show('accueil', this)"><i class="fas fa-home"></i> ACCUEIL</div>
        <div class="nav-item" onclick="show('admin', this)"><i class="fas fa-user-shield"></i> ADMIN</div>
        <div class="nav-item" onclick="show('images', this)"><i class="fas fa-images"></i> GALERIE</div>
    </nav>

    <main onclick="closeSidebar()">
        <header>
            <i class="fas fa-bars menu-btn" onclick="event.stopPropagation(); toggleSidebar()"></i>
            <span id="bot-name">DASHBOARD</span>
        </header>

        <section id="accueil" class="content-section active">
            <div class="discord-embed">
                <div class="thumb-preview img-zone" onclick="triggerUp('thumb')"><div id="box-thumb"></div></div>
                <div id="p-title" style="font-weight: bold; margin-bottom: 5px;">Titre</div>
                <div id="p-desc" style="font-size: 14px; white-space: pre-wrap; color: #dcddde;">Message de bienvenue...</div>
                <div class="banner-preview img-zone" onclick="triggerUp('banner')"><div id="box-banner"></div></div>
            </div>

            <div class="card">
                <h3>Contenu</h3>
                <input type="text" id="in-title" placeholder="Titre..." oninput="sync()">
                <textarea id="in-desc" rows="3" placeholder="Description ({user}...)" oninput="sync()"></textarea>
                
                <h3>Salon</h3>
                <select id="chan-list"></select>

                <h3>Déclencheur (Rôles)</h3>
                <div class="multiselect">
                    <div class="select-box" onclick="toggleDrop('drop-trigger')">Rôles sélectionnés <i class="fas fa-chevron-down"></i></div>
                    <div id="drop-trigger" class="dropdown-content"></div>
                </div>

                <button class="btn btn-save" onclick="save()">ENREGISTRER</button>
                <button class="btn btn-test" onclick="test()">TESTER</button>
            </div>
        </section>

        <section id="admin" class="content-section">
            <div class="card">
                <h3>Accès Dashboard</h3>
                <div class="multiselect">
                    <div class="select-box" onclick="toggleDrop('drop-admin')">Rôles autorisés <i class="fas fa-chevron-down"></i></div>
                    <div id="drop-admin" class="dropdown-content"></div>
                </div>
                <button class="btn btn-save" onclick="save()">APPLIQUER</button>
            </div>
        </section>

        <section id="images" class="content-section">
            <input type="file" id="file-in" onchange="up()" style="display:none">
            <button class="btn btn-save" style="max-width:480px" onclick="triggerUp('gallery')">UPLOADER</button>
            <div id="gallery" style="margin-top:20px;"></div>
        </section>
    </main>

    <script>
        const API = window.location.origin;
        let targetImg = '';

        // TOGGLE SIDEBAR MOBILE
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
        function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); }

        function show(id, el) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
            closeSidebar();
            if(id === 'images') loadG();
        }

        function toggleDrop(id) { document.getElementById(id).classList.toggle('show'); }

        function sync() {
            document.getElementById('p-title').innerText = document.getElementById('in-title').value || "Titre";
            document.getElementById('p-desc').innerText = document.getElementById('in-desc').value || "Description...";
        }

        function triggerUp(t) { targetImg = t; document.getElementById('file-in').click(); }

        async function up() {
            const fd = new FormData(); fd.append('file', document.getElementById('file-in').files[0]);
            const res = await fetch(`${API}/api/upload`, { method: 'POST', body: fd });
            const data = await res.json();
            if(targetImg !== 'gallery') {
                document.getElementById('box-'+targetImg).innerHTML = `<img src="${API+data.url}">`;
                document.getElementById('box-'+targetImg).parentElement.dataset.path = data.url;
            } else loadG();
        }

        async function loadG() {
            const res = await fetch(`${API}/api/images`);
            const d = await res.json();
            document.getElementById('gallery').innerHTML = d.images.map(img => `<div class="gallery-card" onclick="setBanner('${img}')"><img src="${API+img}"></div>`).join('');
        }

        function setBanner(path) {
            document.getElementById('box-banner').innerHTML = `<img src="${API+path}">`;
            document.getElementById('box-banner').parentElement.dataset.path = path;
            show('accueil', document.querySelector('.nav-item'));
        }

        async function save() {
            const p = {
                title: document.getElementById('in-title').value,
                desc: document.getElementById('in-desc').value,
                target_channel: document.getElementById('chan-list').value,
                trigger_roles: Array.from(document.querySelectorAll('#drop-trigger input:checked')).map(i => i.value),
                admin_roles: Array.from(document.querySelectorAll('#drop-admin input:checked')).map(i => i.value),
                thumb: document.querySelector('.thumb-preview').dataset.path || null,
                banner: document.querySelector('.banner-preview').dataset.path || null
            };
            await fetch(`${API}/api/save_config`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(p) });
            alert("Sauvegardé !");
        }

        async function test() {
            const p = {
                channel: document.getElementById('chan-list').value,
                title: document.getElementById('in-title').value,
                desc: document.getElementById('in-desc').value,
                thumb: document.querySelector('.thumb-preview').dataset.path || null,
                banner: document.querySelector('.banner-preview').dataset.path || null
            };
            const res = await fetch(`${API}/api/test_message`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(p) });
            const d = await res.json();
            alert("Réponse : " + d.status);
        }

        async function init() {
            const res = await fetch(`${API}/api/get_server_info`);
            const d = await res.json();
            document.getElementById('bot-name').innerText = d.bot.name.toUpperCase();
            document.getElementById('chan-list').innerHTML = d.channels.map(c => `<option value="${c.id}" ${d.config.target_channel == c.id ? 'selected':''}># ${c.name}</option>`).join('');
            
            const createRoles = (box, saved) => {
                document.getElementById(box).innerHTML = d.all_roles.map(r => `
                    <div class="option" onclick="this.querySelector('input').click()">
                        <input type="checkbox" value="${r}" ${saved.includes(r) ? 'checked' : ''} onclick="event.stopPropagation()">
                        <span>${r}</span>
                    </div>`).join('');
            };
            createRoles('drop-trigger', d.config.trigger_roles || []);
            createRoles('drop-admin', d.config.admin_roles || []);

            if(d.config) {
                document.getElementById('in-title').value = d.config.title || "";
                document.getElementById('in-desc').value = d.config.desc || "";
                if(d.config.thumb) { document.getElementById('box-thumb').innerHTML = `<img src="${API+d.config.thumb}">`; document.querySelector('.thumb-preview').dataset.path = d.config.thumb; }
                if(d.config.banner) { document.getElementById('box-banner').innerHTML = `<img src="${API+d.config.banner}">`; document.querySelector('.banner-preview').dataset.path = d.config.banner; }
                sync();
            }
        }
        window.onload = init;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BagBot | Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #050505; --bg-panel: #0f0f0f; --sidebar-bg: #000000;
            --accent: #ed4245; --embed-bg: #2b2d31; --text-muted: #949ba4; --border: #1e1e1e;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-dark); color: white; display: flex; height: 100vh; overflow: hidden; }

        /* SIDEBAR */
        #sidebar { width: 260px; background: var(--sidebar-bg); border-right: 1px solid var(--border); position: fixed; height: 100%; transition: 0.3s ease; z-index: 1000; }
        .sidebar-header { padding: 30px 20px; font-weight: 900; font-size: 24px; color: var(--accent); letter-spacing: 1px; }
        .nav-item { padding: 15px 25px; display: flex; align-items: center; gap: 15px; color: var(--text-muted); font-weight: 700; cursor: pointer; transition: 0.2s; }
        .nav-item.active { color: var(--accent); background: rgba(237, 66, 69, 0.05); border-right: 3px solid var(--accent); }

        main { flex: 1; margin-left: 260px; display: flex; flex-direction: column; transition: 0.3s; width: 100%; }
        header { height: 70px; background: var(--bg-panel); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 25px; justify-content: space-between; }
        .menu-toggle { display: none; font-size: 20px; cursor: pointer; }

        .content-section { display: none; flex-direction: column; align-items: center; padding: 20px; overflow-y: auto; flex: 1; }
        .content-section.active { display: flex; }

        /* EMBED & CARDS */
        .discord-embed { width: 100%; max-width: 520px; background: var(--embed-bg); border-left: 4px solid var(--accent); border-radius: 4px; padding: 16px; margin-bottom: 25px; }
        .embed-author { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-size: 13px; font-weight: 600; }
        .embed-author img { width: 24px; height: 24px; border-radius: 50%; }
        .embed-main { display: flex; justify-content: space-between; gap: 10px; }
        .embed-title { font-size: 16px; font-weight: 700; color: #fff; margin-bottom: 5px; }
        .embed-description { font-size: 14px; color: #dbdee1; line-height: 1.4; white-space: pre-wrap; }
        
        .img-zone { border: 1px dashed #444; border-radius: 4px; cursor: pointer; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .thumb-box { width: 80px; height: 80px; flex-shrink: 0; }
        .banner-box { width: 100%; height: 160px; margin-top: 15px; }
        .img-zone img { width: 100%; height: 100%; object-fit: cover; }

        .config-card { width: 100%; max-width: 520px; background: var(--bg-panel); border-radius: 12px; border: 1px solid var(--border); padding: 20px; }
        label { display: block; font-size: 11px; font-weight: 800; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; }
        input, textarea, select { width: 100%; background: #000; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 8px; margin-bottom: 15px; }
        
        /* VARIABLES */
        .variables-help { background: #000; border: 1px solid #222; border-radius: 8px; padding: 12px; margin-bottom: 15px; }
        .var-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .var-item { font-size: 11px; color: var(--text-muted); cursor: pointer; padding: 5px; }
        .var-tag { color: var(--accent); font-weight: bold; }

        /* GALLERY PAGE */
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; width: 100%; max-width: 800px; }
        .gallery-card { background: var(--bg-panel); border-radius: 10px; overflow: hidden; border: 1px solid var(--border); position: relative; }
        .gallery-card img { width: 100%; aspect-ratio: 1; object-fit: cover; }
        .delete-btn { position: absolute; top: 5px; right: 5px; background: rgba(237, 66, 69, 0.9); border: none; color: white; width: 25px; height: 25px; border-radius: 50%; cursor: pointer; font-size: 12px; }

        .btn-save { background: var(--accent); color: white; border: none; padding: 15px; border-radius: 8px; font-weight: 800; cursor: pointer; width: 100%; }

        /* MODALE */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; display: none; padding: 20px; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: var(--bg-panel); border-radius: 15px; padding: 20px; width: 100%; max-width: 400px; }

        @media (max-width: 900px) { main { margin-left: 0; } #sidebar { transform: translateX(-100%); } #sidebar.open { transform: translateX(0); } .menu-toggle { display: block; } }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; z-index: 999; }
        .overlay.active { display: block; }
    </style>
</head>
<body>

    <div class="overlay" onclick="toggleMenu()"></div>

    <nav id="sidebar">
        <div class="sidebar-header">BAGBOT</div>
        <div class="nav-item active" onclick="showSection('accueil', this)"><i class="fas fa-home"></i> Accueil</div>
        <div class="nav-item" onclick="showSection('images', this)"><i class="fas fa-images"></i> Images</div>
    </nav>

    <main>
        <header>
            <i class="fas fa-bars menu-toggle" onclick="toggleMenu()"></i>
            <div style="display: flex; align-items: center; gap: 12px;">
                <span id="bot-name" style="font-weight: 700;">Dashboard</span>
                <img id="bot-avatar" src="" style="width: 35px; height: 35px; border-radius: 50%; border: 2px solid var(--accent);">
            </div>
        </header>

        <section id="accueil" class="content-section active">
            <div class="discord-embed">
                <div class="embed-author">
                    <img id="prev-auth" src=""> <span id="bot-name-prev">Bot</span>
                </div>
                <div class="embed-main">
                    <div style="flex:1">
                        <div class="embed-title" id="p-title">Titre</div>
                        <div class="embed-description" id="p-desc">Bienvenue {user} !</div>
                    </div>
                    <div class="img-zone thumb-box" onclick="openImgModal('thumb')">
                        <div id="box-thumb"><i class="fas fa-plus"></i></div>
                    </div>
                </div>
                <div class="img-zone banner-box" onclick="openImgModal('banner')">
                    <div id="box-banner"><i class="fas fa-image"></i></div>
                </div>
            </div>

            <div class="config-card">
                <label>Titre</label>
                <input type="text" id="in-title" placeholder="Titre..." oninput="sync()">
                <label>Message</label>
                <textarea id="in-desc" rows="4" oninput="sync()" placeholder="Message..."></textarea>
                
                <div class="variables-help">
                    <div class="var-grid">
                        <div class="var-item" onclick="addVar('{user}')"><span class="var-tag">{user}</span> : Mention</div>
                        <div class="var-item" onclick="addVar('{user_name}')"><span class="var-tag">{user_name}</span> : Nom</div>
                        <div class="var-item" onclick="addVar('{server}')"><span class="var-tag">{server}</span> : Serveur</div>
                        <div class="var-item" onclick="addVar('{count}')"><span class="var-tag">{count}</span> : Membres</div>
                    </div>
                </div>

                <label>Salon Discord</label>
                <select id="chan-list">
                    <option>Chargement...</option>
                </select>
                <button class="btn-save">ENREGISTRER</button>
            </div>
        </section>

        <section id="images" class="content-section">
            <h2 style="margin-bottom: 20px;">Ma Galerie</h2>
            <div class="gallery-grid" id="main-gallery"></div>
        </section>
    </main>

    <div id="imgModal" class="modal">
        <div class="modal-content">
            <h3 style="margin-bottom: 15px; color: var(--accent);">Source de l'image</h3>
            <input type="text" id="url-input" placeholder="Lien URL...">
            <input type="file" id="file-input" style="display:none" onchange="upload()">
            <button class="btn-save" style="background:#222; margin-bottom:10px" onclick="document.getElementById('file-input').click()">TÉLÉVERSER DEPUIS MOBILE</button>
            <button class="btn-save" onclick="applyImg()">APPLIQUER</button>
            <button class="btn-save" style="background:transparent; color:#666" onclick="closeModal()">ANNULER</button>
        </div>
    </div>

    <script>
        let currentTarget = '';

        function toggleMenu() { 
            document.getElementById('sidebar').classList.toggle('open'); 
            document.querySelector('.overlay').classList.toggle('active'); 
        }

        function showSection(id, el) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            if(id === 'images') loadMainGallery();
            if(window.innerWidth <= 900) toggleMenu();
        }

        function sync() {
            document.getElementById('p-title').innerText = document.getElementById('in-title').value || "Titre";
            document.getElementById('p-desc').innerText = document.getElementById('in-desc').value || "Description...";
        }

        function openImgModal(target) {
            currentTarget = target;
            document.getElementById('imgModal').classList.add('active');
        }

        function closeModal() { document.getElementById('imgModal').classList.remove('active'); }

        async function upload() {
            const fd = new FormData(); fd.append('file', document.getElementById('file-input').files[0]);
            const res = await fetch('/api/upload', {method:'POST', body:fd});
            const data = await res.json();
            document.getElementById('url-input').value = data.url;
            alert("Image prête !");
        }

        function applyImg() {
            const val = document.getElementById('url-input').value;
            if(val) document.getElementById('box-'+currentTarget).innerHTML = `<img src="${val}">`;
            closeModal();
        }

        async function loadMainGallery() {
            const res = await fetch('/api/images');
            const data = await res.json();
            const container = document.getElementById('main-gallery');
            container.innerHTML = data.images.map(u => `
                <div class="gallery-card">
                    <img src="${u}">
                    <button class="delete-btn" onclick="deleteImage('${u}')"><i class="fas fa-trash"></i></button>
                </div>
            `).join('');
        }

        async function deleteImage(url) {
            if(!confirm("Supprimer cette image ?")) return;
            await fetch('/api/images/delete', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({url: url})
            });
            loadMainGallery();
        }

        async function init() {
            try {
                const res = await fetch('/api/get_server_info');
                const data = await res.json();
                if(data.error) return;

                document.getElementById('bot-name').innerText = data.bot.name;
                document.getElementById('bot-avatar').src = data.bot.avatar;
                document.getElementById('prev-auth').src = data.bot.avatar;
                document.getElementById('bot-name-prev').innerText = data.bot.name;

                const select = document.getElementById('chan-list');
                select.innerHTML = data.channels.map(c => `<option value="${c.id}"># ${c.name}</option>`).join('');
            } catch(e) { console.error(e); }
        }

        function addVar(v) { document.getElementById('in-desc').value += v; sync(); }

        window.onload = init;
    </script>
</body>
</html>

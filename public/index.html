<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BagBot Builder v1</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #d37f6a; --bg: #2b2d31; --sidebar: #1e1f22; --text: #dbdee1; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        /* SIDEBAR FIXE / MOBILE */
        .sidebar { width: 260px; background: var(--sidebar); display: flex; flex-direction: column; transition: 0.3s; z-index: 1000; border-right: 1px solid #111; }
        .sidebar.collapsed { margin-left: -260px; }
        .nav-header { padding: 20px; font-weight: bold; color: var(--accent); border-bottom: 1px solid #2b2d31; display: flex; justify-content: space-between; align-items: center; }
        .nav-item { padding: 15px 25px; display: flex; align-items: center; gap: 15px; cursor: pointer; color: #888; }
        .nav-item.active { background: rgba(211, 127, 106, 0.1); color: white; border-left: 3px solid var(--accent); }

        /* MAIN CONTENT */
        .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        .top-nav { height: 60px; background: var(--sidebar); display: flex; align-items: center; padding: 0 20px; gap: 15px; border-bottom: 1px solid #111; }
        .hamburger { font-size: 22px; cursor: pointer; color: var(--accent); }

        /* BUILDER */
        .container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .embed-preview { background: #313338; border-radius: 8px; padding: 15px; width: 100%; max-width: 450px; position: relative; border-left: 4px solid var(--accent); }
        
        .slot { border: 2px dashed #4e5058; border-radius: 4px; background: rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: center; cursor: pointer; min-height: 40px; position: relative; overflow: hidden; }
        .slot img { width: 100%; height: 100%; object-fit: cover; position: absolute; }
        .banner-slot { width: 100%; height: 140px; margin-top: 10px; }
        .thumb-slot { position: absolute; top: 12px; right: 12px; width: 60px; height: 60px; z-index: 5; }

        input, select { width: 100%; padding: 12px; background: #1e1f22; border: 1px solid #333; color: white; border-radius: 6px; margin-bottom: 15px; }
        .btn-deploy { background: var(--accent); color: white; border: none; padding: 16px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }

        [contenteditable] { outline: none; }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div class="nav-header">
            <span>BAGBOT PRO</span>
            <i class="fas fa-times" onclick="toggleSidebar()" style="cursor:pointer;"></i>
        </div>
        <div class="nav-item active"><i class="fas fa-edit"></i> Builder</div>
        <div class="nav-item"><i class="fas fa-history"></i> Historique</div>
    </div>

    <div class="main">
        <div class="top-nav">
            <i class="fas fa-bars hamburger" onclick="toggleSidebar()"></i>
            <span style="font-weight: bold;">Nouveau Message</span>
        </div>

        <div class="container">
            <div class="embed-preview">
                <div class="thumb-slot slot" onclick="triggerFile('thumb')">
                    <i class="fas fa-plus" id="ic-thumb"></i>
                    <img id="v-thumb" style="display:none">
                </div>
                <div style="display:flex; align-items:center; gap:8px; margin-bottom:10px;">
                    <div class="slot" onclick="triggerFile('auth')" style="width:24px; height:24px; border-radius:50%; min-height:auto;">
                        <img id="v-auth" style="display:none">
                    </div>
                    <span contenteditable="true" id="txt-auth" style="font-size:13px; font-weight:600;">Nom de l'auteur</span>
                </div>
                <div id="txt-title" contenteditable="true" style="font-weight:bold; font-size:16px; color:white;">Titre de l'embed</div>
                <div id="txt-desc" contenteditable="true" style="font-size:14px;">Cliquez pour modifier la description...</div>
                <div class="banner-slot

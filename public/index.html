<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>BAGBOT | Elite Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --bg: #050505; --side: #000; --card: #0f0f0f; --accent: #ed4245; 
            --border: #1a1a1a; --d-bg: #2b2d31; --text: #ffffff;
        }

        body { 
            background: var(--bg); color: var(--text); font-family: sans-serif; 
            margin: 0; display: flex; height: 100vh; overflow: hidden; 
        }

        /* --- SIDEBAR --- */
        #sidebar { 
            width: 280px; background: var(--side); border-right: 1px solid var(--border); 
            display: flex; flex-direction: column; transition: 0.4s; z-index: 2000;
        }

        .brand { 
            padding: 30px; font-size: 24px; font-weight: 900; color: var(--accent); 
            text-align: center; border-bottom: 1px solid var(--border); letter-spacing: 3px;
        }

        .nav-item { 
            padding: 20px 30px; display: flex; align-items: center; gap: 15px; 
            color: #666; cursor: pointer; font-weight: bold;
        }
        .nav-item.active { color: var(--accent); background: rgba(237, 66, 69, 0.1); border-right: 4px solid var(--accent); }

        /* --- MOBILE HEADER (Correction barre noire qui cache le texte) --- */
        .mobile-header { 
            display: none; position: fixed; top: 0; left: 0; right: 0; height: 70px;
            background: rgba(0,0,0,0.95); border-bottom: 1px solid var(--border); 
            z-index: 1500; align-items: center; padding: 0 20px; backdrop-filter: blur(10px);
        }

        /* --- MAIN CONTENT --- */
        main { 
            flex-grow: 1; padding: 40px; overflow-y: auto; position: relative;
            padding-top: 40px; /* Espace de base */
        }

        .section { display: none; max-width: 800px; margin: 0 auto; animation: fadeIn 0.5s; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }

        /* --- PREVIEW DISCORD --- */
        .discord-card { 
            background: var(--d-bg); border-left: 4px solid var(--accent); border-radius: 4px; 
            padding: 15px; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .embed-title { color: #00a8fc; font-weight: bold; margin-bottom: 5px; }
        .embed-desc { color: #dbdee1; font-size: 14px; white-space: pre-wrap; }
        .embed-banner { width: 100%; height: 180px; background: #1e1f22; margin-top: 10px; border-radius: 8px; overflow: hidden; border: 1px dashed #444; }
        .embed-banner img { width: 100%; height: 100%; object-fit: cover; }

        /* --- FORMULAIRE --- */
        .card { background: var(--card); border: 1px solid var(--border); padding: 25px; border-radius: 20px; margin-bottom: 20px; }
        label { display: block; margin: 20px 0 10px; color: #444; font-size: 12px; font-weight: bold; text-transform: uppercase; }
        input, textarea, select { 
            width: 100%; background: #000; border: 1px solid var(--border); color: #fff; 
            padding: 15px; border-radius: 12px;
        }

        .role-selector { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; 
            background: #000; padding: 15px; border-radius: 12px; max-height: 200px; overflow-y: auto;
        }
        .role-pill { display: flex; align-items: center; gap: 10px; font-size: 13px; }

        .btn-save { 
            background: var(--accent); color: white; border: none; padding: 20px; 
            border-radius: 15px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 20px;
        }

        /* --- RESPONSIVE MOBILE --- */
        @media (max-width: 768px) {
            .mobile-header { display: flex; }
            #sidebar { position: fixed; left: -280px; height: 100vh; }
            #sidebar.open { left: 0; }
            main { 
                padding: 90px 15px 30px; /* On augmente le padding top pour ne plus cacher de texte */
            }
            .role-selector { grid-template-columns: 1fr; }
        }

        #notif {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px);
            background: #2ecc71; padding: 15px 30px; border-radius: 50px; transition: 0.5s; z-index: 3000;
        }
    </style>
</head>
<body>

    <div class="mobile-header">
        <i class="fas fa-bars" style="font-size: 24px; color: var(--accent);" onclick="document.getElementById('sidebar').classList.toggle('open')"></i>
        <span style="font-weight: 900; letter-spacing: 2px;">BAGBOT</span>
        <span></span>
    </div>

    <nav id="sidebar">
        <div class="brand">BAGBOT</div>
        <div class="nav-item active" onclick="changeTab('welcome', this)"><i class="fas fa-home"></i> BIENVENUE</div>
        <div class="nav-item" onclick="changeTab('admin', this)"><i class="fas fa-lock"></i> ADMIN</div>
    </nav>

    <main onclick="document.getElementById('sidebar').classList.remove('open')">
        <div id="welcome" class="section active">
            <div class="discord-card">
                <div id="pv-title" class="embed-title">Chargement des données...</div>
                <div id="pv-desc" class="embed-desc">Veuillez patienter...</div>
                <div class="embed-banner"><img id="pv-banner-img" src=""></div>
            </div>

            <div class="card">
                <label>Titre</label>
                <input type="text" id="w-title" oninput="updatePreview()">
                
                <label>Description</label>
                <textarea id="w-desc" rows="5" oninput="updatePreview()"></textarea>

                <label>Rôles autorisés (Trigger)</label>
                <div id="role-list" class="role-selector"></div>

                <label>Salon d'envoi</label>
                <select id="w-channel"></select>

                <button class="btn-save" onclick="save()"><i class="fas fa-save"></i> ENREGISTRER L'ELITE</button>
            </div>
        </div>

        <div id="admin" class="section">
            <div class="card">
                <h2>Permissions Panel</h2>
                <div id="admin-role-list" class="role-selector"></div>
                <button class="btn-save" onclick="save()">VALIDER</button>
            </div>
        </div>
    </main>

    <div id="notif">Sauvegardé avec succès !</div>

    <script>
        let data = {};

        async function init() {
            try {
                const res = await fetch('/api/get_data');
                data = await res.json();

                // Remplissage salons
                document.getElementById('w-channel').innerHTML = data.channels.map(c => 
                    `<option value="${c.id}"># ${c.name}</option>`
                ).join('');

                // Remplissage rôles Welcome
                document.getElementById('role-list').innerHTML = data.roles.map(r => `
                    <div class="role-pill">
                        <input type="checkbox" value="${r}" class="w-role-check" ${data.config.welcome.trigger_roles.includes(r) ? 'checked' : ''}>
                        <span>${r}</span>
                    </div>
                `).join('');

                // Remplissage rôles Admin
                document.getElementById('admin-role-list').innerHTML = data.roles.map(r => `
                    <div class="role-pill">
                        <input type="checkbox" value="${r}" class="a-role-check" ${data.config.admin_roles.includes(r) ? 'checked' : ''}>
                        <span>${r}</span>
                    </div>
                `).join('');

                // Valeurs inputs
                document.getElementById('w-title').value = data.config.welcome.title;
                document.getElementById('w-desc').value = data.config.welcome.desc;
                if(data.config.welcome.banner) document.getElementById('pv-banner-img').src = data.config.welcome.banner;

                updatePreview();
            } catch (e) {
                document.getElementById('pv-title').innerText = "ERREUR DE CONNEXION";
                document.getElementById('pv-desc').innerText = "Vérifie tes logs Termux.";
            }
        }

        function updatePreview() {
            const t = document.getElementById('w-title').value || "Titre";
            const d = document.getElementById('w-desc').value || "Description";
            document.getElementById('pv-title').innerText = t.replace(/{user}/g, "@Utilisateur");
            document.getElementById('pv-desc').innerText = d.replace(/{guild}/g, data.guild_name || "Serveur");
        }

        function changeTab(tab, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
            el.classList.add('active');
        }

        async function save() {
            const payload = {
                welcome: {
                    title: document.getElementById('w-title').value,
                    desc: document.getElementById('w-desc').value,
                    channel: document.getElementById('w-channel').value,
                    banner: document.getElementById('pv-banner-img').src,
                    trigger_roles: Array.from(document.querySelectorAll('.w-role-check:checked')).map(i => i.value)
                },
                admin_roles: Array.from(document.querySelectorAll('.a-role-check:checked')).map(i => i.value)
            };

            const res = await fetch('/api/save', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });

            if(res.ok) {
                const n = document.getElementById('notif');
                n.style.transform = "translateX(-50%) translateY(0)";
                setTimeout(() => n.style.transform = "translateX(-50%) translateY(100px)", 3000);
            }
        }

        window.onload = init;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BAGBOT ELITE V9</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #0a0a0a; --card: #141414; --accent: #ed4245; --border: #252525; --d-bg: #2b2d31; --success: #43b581; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; }
        
        /* Header & Sidebar */
        .header { position: fixed; top: 0; left: 0; right: 0; height: 65px; background: #000; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; z-index: 2500; }
        .burger { font-size: 22px; color: var(--accent); cursor: pointer; margin-right: 20px; }
        #sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100vh; background: #000; z-index: 3000; transition: 0.3s; border-right: 1px solid var(--border); }
        #sidebar.open { left: 0; }
        .nav-item { padding: 20px; border-bottom: 1px solid #111; cursor: pointer; display: flex; align-items: center; gap: 15px; color: #888; font-weight: bold; }
        .nav-item.active { color: var(--accent); background: #ed424510; border-right: 4px solid var(--accent); }
        .sub-menu { display: none; background: #080808; }
        .nav-sub-item { padding: 15px 20px 15px 45px; border-bottom: 1px solid #111; cursor: pointer; color: #666; font-size: 13px; font-weight: bold; }

        /* Contenu */
        main { height: 100vh; overflow-y: auto; padding: 85px 15px 180px; }
        .section { display: none; max-width: 600px; margin: 0 auto; }
        .section.active { display: block; }
        .card { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid var(--border); margin-bottom: 20px; }

        /* Preview Embed */
        .preview { background: var(--d-bg); border-left: 4px solid var(--accent); border-radius: 4px; padding: 15px; margin-bottom: 25px; }
        .pv-thumb { width: 65px; height: 65px; border-radius: 4px; background: #222; border: 1px dashed #444; float: right; overflow: hidden; }
        .pv-banner { width: 100%; height: 140px; border-radius: 8px; background: #222; border: 1px dashed #444; margin-top: 10px; overflow: hidden; }
        img { width: 100%; height: 100%; object-fit: cover; }

        /* Formulaire */
        label { display: block; font-size: 11px; font-weight: 800; color: #555; text-transform: uppercase; margin: 15px 0 8px; }
        input, textarea, select { width: 100%; background: #000; border: 1px solid var(--border); color: #fff; padding: 14px; border-radius: 10px; outline: none; }
        .drop-menu { display: none; background: #050505; border: 1px solid var(--border); border-radius: 10px; max-height: 200px; overflow-y: auto; margin-top: 5px; }
        .drop-menu.show { display: block; }
        .role-item { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid #111; cursor: pointer; }

        .btn { border: none; padding: 16px; border-radius: 12px; font-weight: 800; width: 100%; cursor: pointer; margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-save { background: var(--accent); color: #fff; }
        .btn-test { background: #5865f2; color: #fff; }
    </style>
</head>
<body>

    <div class="header">
        <i class="fas fa-bars burger" onclick="toggleSidebar(event)"></i>
        <div style="color:var(--accent); font-weight:900;">BAGBOT ELITE</div>
    </div>

    <div id="sidebar">
        <div style="padding: 30px; text-align: center; color: var(--accent); font-weight: 900;">MENU</div>
        <div class="nav-item" onclick="toggleSubMenu(event)">
            <i class="fas fa-exchange-alt"></i> MSG AUTO <i class="fas fa-chevron-down" style="margin-left:auto"></i>
        </div>
        <div id="sub-messages" class="sub-menu">
            <div class="nav-sub-item active" onclick="showTab('welcome', this)">BIENVENUE</div>
            <div class="nav-sub-item" onclick="showTab('leave', this)">DÉPART</div>
        </div>
        <div class="nav-item" onclick="showTab('admin', this)"><i class="fas fa-user-shield"></i> PERMISSIONS</div>
        <div class="nav-item" onclick="showTab('gallery', this)"><i class="fas fa-images"></i> GALERIE</div>
    </div>

    <main id="main-scroll" onclick="closeSidebar()">
        <div id="welcome" class="section active">
            <div class="preview" id="pv-box-welcome">
                <div class="pv-thumb" onclick="openPicker('welcome', 'thumbnail')"><img id="w-img-thumb"></div>
                <div id="pv-title-welcome" style="color:#00a8fc; font-weight:bold;">Titre</div>
                <div id="pv-desc-welcome" style="font-size:14px; margin-top:5px; white-space:pre-wrap;">Description</div>
                <div class="pv-banner" onclick="openPicker('welcome', 'banner')"><img id="w-img-banner"></div>
            </div>

            <div class="card">
                <h2>Configuration Bienvenue</h2>
                <label>Couleur</label><input type="color" id="w-color" oninput="sync('welcome')">
                <label>Titre</label><input type="text" id="w-title" oninput="sync('welcome')">
                <label>Message</label><textarea id="w-desc" rows="5" oninput="sync('welcome')"></textarea>
                <label>Rôles Déclencheurs</label>
                <div class="btn" style="background:#000; border:1px solid var(--border)" onclick="toggleDrop(event, 'w-role-menu')">
                    <span id="w-role-label">0 rôles sélectionnés</span>
                </div>
                <div id="w-role-menu" class="drop-menu"></div>
                <label>Salon</label><select id="w-channel"></select>
                <button class="btn btn-save" onclick="save()">SAUVEGARDER</button>
                <button class="btn btn-test" onclick="test('welcome')">TESTER RENDU</button>
            </div>
        </div>

        <div id="admin" class="section">
            <div class="card">
                <h2>Rôles Admin</h2>
                <div id="admin-menu" style="display:block" class="drop-menu"></div>
                <button class="btn btn-save" onclick="save()">APPLIQUER</button>
            </div>
        </div>

        <div id="gallery" class="section">
            <div class="card">
                <h2>Galerie</h2>
                <input type="file" id="file-input" onchange="uploadFile()" style="margin-bottom:15px">
                <div id="gallery-list" style="display:grid; grid-template-columns:1fr 1fr; gap:10px"></div>
            </div>
        </div>
    </main>

    <script>
        let db = {}; let activeMode = ''; let activeType = '';

        async function init() {
            const res = await fetch('/api/get_data');
            db = await res.json();
            
            // Remplir les salons
            document.getElementById('w-channel').innerHTML = db.channels.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
            
            // Remplir les rôles
            renderChecklist('w-role-menu', db.config.welcome.trigger_roles, 'w-role-label');
            renderChecklist('admin-menu', db.config.admin_roles, '');

            // Remplir les champs
            const w = db.config.welcome;
            document.getElementById('w-title').value = w.title;
            document.getElementById('w-desc').value = w.desc;
            document.getElementById('w-color').value = w.color;
            document.getElementById('w-img-thumb').src = w.thumbnail;
            document.getElementById('w-img-banner').src = w.banner;

            renderGallery();
            sync('welcome');
        }

        function sync(mode) {
            const p = mode === 'welcome' ? 'w' : 'l';
            document.getElementById(`pv-title-${mode}`).innerText = document.getElementById(`${p}-title`).value;
            document.getElementById(`pv-desc-${mode}`).innerText = document.getElementById(`${p}-desc`).value;
            document.getElementById(`pv-box-${mode}`).style.borderLeftColor = document.getElementById(`${p}-color`).value;
        }

        function renderChecklist(id, selected, labelId) {
            const container = document.getElementById(id);
            container.innerHTML = db.roles.map(r => `
                <div class="role-item" onclick="toggleRole(this, '${labelId}')">
                    <input type="checkbox" value="${r}" ${selected.includes(r) ? 'checked' : ''}> ${r}
                </div>
            `).join('');
        }

        function toggleRole(el, labelId) {
            const cb = el.querySelector('input');
            cb.checked = !cb.checked;
            if(labelId) {
                const count = el.parentElement.querySelectorAll('input:checked').length;
                document.getElementById(labelId).innerText = count + " rôles sélectionnés";
            }
        }

        function renderGallery() {
            document.getElementById('gallery-list').innerHTML = db.images.map(img => `
                <div style="position:relative">
                    <img src="${img}" style="height:100px; border-radius:10px" onclick="selectImg('${img}')">
                    <button onclick="deleteImg('${img}')" style="position:absolute; top:0; right:0; background:red; color:white; border:none">X</button>
                </div>
            `).join('');
        }

        function selectImg(url) {
            if(activeMode) {
                const p = activeMode === 'welcome' ? 'w' : 'l';
                document.getElementById(`${p}-img-${activeType}`).src = url;
                showTab(activeMode);
            }
        }

        async function save() {
            const config = {
                welcome: {
                    title: document.getElementById('w-title').value,
                    desc: document.getElementById('w-desc').value,
                    color: document.getElementById('w-color').value,
                    channel: document.getElementById('w-channel').value,
                    thumbnail: document.getElementById('w-img-thumb').src,
                    banner: document.getElementById('w-img-banner').src,
                    trigger_roles: Array.from(document.querySelectorAll('#w-role-menu input:checked')).map(i => i.value)
                },
                admin_roles: Array.from(document.querySelectorAll('#admin-menu input:checked')).map(i => i.value)
            };
            await fetch('/api/save', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(config) });
            alert("Sauvegardé !");
        }

        function toggleSidebar(e) { e.stopPropagation(); document.getElementById('sidebar').classList.toggle('open'); }
        function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); }
        function toggleSubMenu(e) { e.stopPropagation(); const s = document.getElementById('sub-messages'); s.style.display = s.style.display === 'block' ? 'none' : 'block'; }
        function toggleDrop(e, id) { e.stopPropagation(); document.getElementById(id).classList.toggle('show'); }
        function openPicker(m, t) { activeMode = m; activeType = t; showTab('gallery'); }

        function showTab(id, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(el && !el.classList.contains('nav-sub-item')) closeSidebar();
        }

        window.onload = init;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BagBot Admin Panel</title>
    <style>
        :root { --bg: #0f1012; --card: #18191c; --accent: #ff4d4d; --sidebar: #0b0c0e; --text: #f2f3f5; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; overflow-x: hidden; }
        
        /* Sidebar & Navigation */
        .sidebar { width: 260px; background: var(--sidebar); height: 100vh; position: fixed; left: -260px; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1001; box-shadow: 4px 0 15px rgba(0,0,0,0.5); }
        .sidebar.open { left: 0; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; backdrop-filter: blur(2px); }
        .overlay.active { display: block; }

        .main { flex: 1; padding: 20px; width: 100%; box-sizing: border-box; transition: margin-left 0.3s; }
        .header { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; background: var(--card); padding: 15px; border-radius: 10px; }
        .menu-btn { background: #2f3136; border: none; color: white; padding: 12px; border-radius: 8px; cursor: pointer; font-size: 18px; }

        /* Formulaire */
        .panel { background: var(--card); border-radius: 12px; padding: 25px; border: 1px solid #282a2e; max-width: 650px; margin: auto; }
        .tabs { display: flex; background: #2f3136; border-radius: 8px; margin-bottom: 25px; overflow: hidden; padding: 4px; }
        .tab { flex: 1; text-align: center; padding: 12px; cursor: pointer; transition: 0.2s; color: #b9bbbe; font-weight: 600; }
        .tab.active { background: var(--accent); color: white; border-radius: 6px; }

        label { display: block; margin: 15px 0 6px; font-size: 12px; color: #8e9297; text-transform: uppercase; font-weight: 800; letter-spacing: 0.5px; }
        input, select, textarea { width: 100%; padding: 14px; background: #202225; border: 1px solid #111; color: white; border-radius: 8px; box-sizing: border-box; font-size: 15px; }
        input:focus { border-color: var(--accent); outline: none; }
        
        /* Aperçu et Bouton */
        .preview { margin-top: 25px; padding: 15px; background: #2f3136; border-radius: 8px; border-left: 5px solid var(--accent); }
        #pre-img { width: 100%; border-radius: 6px; margin-top: 12px; display: none; object-fit: cover; max-height: 200px; }
        .btn-send { background: var(--accent); color: white; border: none; padding: 20px; width: 100%; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 25px; transition: 0.2s; box-shadow: 0 4px 15px rgba(255, 77, 77, 0.3); }
        .btn-send:active { transform: scale(0.98); }
        .btn-send:disabled { background: #4f545c; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>
<div class="sidebar" id="sidebar">
    <div style="padding: 30px 25px; font-weight: 900; color: var(--accent); font-size: 24px; letter-spacing: -1px;">BAG BOT V2</div>
    <div style="padding: 15px 25px; background: #1a1a1a; border-left: 4px solid var(--accent); font-weight: 600;">🎭 Rôles-Réactions</div>
</div>

<div class="main">
    <div class="header">
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
        <h2 style="margin:0; font-size: 20px;">Configuration du Message</h2>
    </div>

    <div class="panel">
        <div class="tabs">
            <div class="tab active" id="t-simple" onclick="setMode('simple')">Simple</div>
            <div class="tab" id="t-embed" onclick="setMode('embed')">Embed</div>
        </div>

        <label>Modifier un message (ID)</label>
        <input type="text" id="messageId" placeholder="Laissez vide pour un nouveau message">

        <label>Salon de destination</label>
        <select id="channelId"><option value="">Chargement des salons...</option></select>

        <label>Rôle à attribuer</label>
        <select id="roleId"><option value="">Chargement des rôles...</option></select>

        <label>Mode de fonctionnement</label>
        <select id="roleMode">
            <option value="normal">Normal (Ajout/Retrait)</option>
            <option value="inverse">Inversé (Retrait/Ajout)</option>
            <option value="definitif">Définitif (Ajout uniquement)</option>
        </select>

        <label>Type d'affichage</label>
        <select id="displayType">
            <option value="button">Bouton</option>
            <option value="select">Menu Déroulant</option>
        </select>

        <div id="f-simple">
            <label>Contenu du message</label>
            <textarea id="simpleContent" rows="4" placeholder="Votre texte ici..." oninput="updatePreview()"></textarea>
        </div>

        <div id="f-embed" style="display:none;">
            <label>Titre de l'Embed</label>
            <input type="text" id="title" placeholder="Ex: Rôles de notifications" oninput="updatePreview()">
            <label>Description</label>
            <textarea id="description" rows="4" placeholder="Décrivez les rôles..." oninput="updatePreview()"></textarea>
            <label>Image (Fichier ou URL)</label>
            <input type="file" id="imageFile" accept="image/*" onchange="previewFile(this)" style="margin-bottom:10px;">
            <input type="text" id="imageUrl" placeholder="https://lien-image.png" oninput="updatePreview()">
        </div>

        <div class="preview">
            <div id="pre-title" style="font-size: 14px; margin-bottom: 5px;">Aperçu du message</div>
            <div id="pre-desc" style="color: #dcddde; font-size: 15px; white-space: pre-wrap;">...</div>
            <img id="pre-img">
        </div>

        <button class="btn-send" id="btn-deploy" onclick="deploy()">DÉPLOYER SUR DISCORD</button>
    </div>
</div>

<script>
    let currentMode = 'simple';

    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('active');
    }

    function setMode(m) {
        currentMode = m;
        document.getElementById('t-simple').classList.toggle('active', m === 'simple');
        document.getElementById('t-embed').classList.toggle('active', m === 'embed');
        document.getElementById('f-simple').style.display = m === 'simple' ? 'block' : 'none';
        document.getElementById('f-embed').style.display = m === 'embed' ? 'block' : 'none';
        updatePreview();
    }

    function previewFile(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => {
                const img = document.getElementById('pre-img');
                img.src = e.target.result;
                img.style.display = 'block';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function updatePreview() {
        const title = document.getElementById('title').value || "Titre";
        const desc = currentMode === 'simple' ? document.getElementById('simpleContent').value : document.getElementById('description').value;
        document.getElementById('pre-title').innerText = currentMode === 'simple' ? "Message Simple" : title;
        document.getElementById('pre-desc').innerText = desc || "En attente de texte...";
    }

    async function load() {
        try {
            const [cRes, rRes] = await Promise.all([fetch('/api/channels'), fetch('/api/roles')]);
            const channels = await cRes.json();
            const roles = await rRes.json();
            
            // Injection forcée des IDs dans les options
            document.getElementById('channelId').innerHTML = channels.map(c => `<option value="${c.id}"># ${c.name}</option>`).join('');
            document.getElementById('roleId').innerHTML = roles.map(r => `<option value="${r.id}">${r.name}</option>`).join('');
        } catch(e) { console.error("Erreur API"); }
    }

    async function deploy() {
        // RÉCUPÉRATION MANUELLE ET VÉRIFICATION
        const channelSelect = document.getElementById('channelId');
        const roleSelect = document.getElementById('roleId');
        
        const chanId = channelSelect.options[channelSelect.selectedIndex]?.value;
        const roleId = roleSelect.options[roleSelect.selectedIndex]?.value;

        if (!chanId || chanId === "undefined") return alert("❌ Erreur : Le salon n'est pas sélectionné correctement.");
        if (!roleId || roleId === "undefined") return alert("❌ Erreur : Le rôle n'est pas sélectionné correctement.");

        const btn = document.getElementById('btn-deploy');
        btn.innerText = "ENVOI EN COURS...";
        btn.disabled = true;

        const fd = new FormData();
        fd.append('mode', currentMode);
        fd.append('channelId', chanId);
        fd.append('roleId', roleId);
        fd.append('roleMode', document.getElementById('roleMode').value);
        fd.append('displayType', document.getElementById('displayType').value);
        fd.append('messageId', document.getElementById('messageId').value.trim());
        fd.append('content', document.getElementById('simpleContent').value);
        fd.append('title', document.getElementById('title').value);
        fd.append('description', document.getElementById('description').value);
        fd.append('imageUrl', document.getElementById('imageUrl').value);
        
        const file = document.getElementById('imageFile').files[0];
        if (file) fd.append('imageFile', file);

        try {
            const res = await fetch('/update-bot', { method: 'POST', body: fd });
            const data = await res.json();
            if (data.success) alert("✅ Message envoyé avec succès !");
            else alert("❌ Erreur : " + data.message);
        } catch(e) {
            alert("❌ Impossible de contacter le bot.");
        } finally {
            btn.innerText = "DÉPLOYER SUR DISCORD";
            btn.disabled = false;
        }
    }
    load();
</script>
</body>
</html>

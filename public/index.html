<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BagBot Dashboard</title>
    <style>
        body { font-family: sans-serif; background-color: #2c2f33; color: white; text-align: center; padding: 50px; }
        .card { background: #23272a; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); display: inline-block; }
        h1 { color: #7289da; }
        .status { color: #43b581; font-weight: bold; }
        button { background: #7289da; border: none; color: white; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-top: 20px; }
        button:hover { background: #5b6eae; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🎒 BagBot Dashboard</h1>
        <p>Statut du Bot : <span class="status">● Connecté</span></p>
        <p>Serveur : Debian (192.168.1.133)</p>
        <hr>
        <button onclick="alert('Action envoyée !')">Redémarrer le Bot</button>
    </div>
</body>
</html>

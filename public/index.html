<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BagBot Designer Pro - Full Mode</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* DESIGN SYSTÈME BASÉ SUR 10128.JPG */
        :root {
            --accent: #d37f6a;
            --bg-main: #2b2d31;
            --bg-sidebar: #1e1f22;
            --bg-dark: #111214;
            --text-primary: #dbdee1;
            --text-muted: #949ba4;
            --border: #3f4147;
            --embed-bg: #313338;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Whitney', 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* SIDEBAR RÉRACTABLE */
        #sidebar {
            width: 260px;
            background-color: var(--bg-sidebar);
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--bg-dark);
            transition: transform 0.3s ease, width 0.3s ease;
            flex-shrink: 0;
            z-index: 2000;
        }

        #sidebar.collapsed {
            width: 0;
            transform: translateX(-260px);
        }

        .sidebar-header {
            padding: 20px;
            background-color: var(--bg-dark);
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 60px;
        }

        .brand {
            color: var(--accent);
            font-weight: 800;
            letter-spacing: 1px;
        }

        .nav-item {
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-muted);
            cursor: pointer;
            transition: 0.2s;
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(211, 127, 106, 0.1);
            color: white;
            border-left: 4px solid var(--accent);
        }

        /* CONTENU PRINCIPAL */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .navbar {
            height: 60px;
            border-bottom: 1px solid var(--bg-dark);
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 15px;
        }

        .menu-toggle {
            font-size: 20px;
            color: var(--accent);
            cursor: pointer;
        }

        .view-area {
            flex-grow: 1;
            overflow-y: auto;
            padding: 30px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* APERÇU EMBED DISCORD */
        .embed-preview {
            width: 100%;
            max-width: 500px;
            background-color: var(--embed-bg);
            border-left: 4px solid var(--accent);
            border-radius: 4px;
            padding: 16px;
            position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .thumb-upload {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 80px;
            height: 80px;
            border: 2px dashed #4e5058;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            overflow: hidden;
        }

        .thumb-upload img { width: 100%; height: 100%; object-fit: cover; }

        .author-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        .author-icon {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #4e5058;
            cursor: pointer;
            overflow: hidden;
        }

        .input-text {
            background: transparent;
            border: none;
            color: white;
            outline: none;
            width: 100%;
        }

        .title-input { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
        .desc-input { font-size: 14px; min-height: 40px; color: var(--text-primary); }

        .banner-upload {
            width: 100%;
            height: 180px;
            border: 2px dashed #4e5058;
            border-radius: 4px;
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            overflow: hidden;
        }

        /* RÉGLAGES & BOUTONS */
        .settings-form {
            width: 100%;
            max-width: 500px;
            margin-top: 30px;
            padding-bottom: 60px;
        }

        .section-title {
            display: block;
            font-size: 11px;
            font-weight: 800;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .dropdown {
            width: 100%;
            background: var(--bg-dark);
            border: 1px solid #000;
            color: white;
            padding: 14px;
            border-radius: 4px;
            margin-bottom: 25px;
            outline: none;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 15px center;
            background-size: 15px;
        }

        .reaction-row {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg-sidebar);
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 10px;
            border: 1px solid var(--border);
        }

        .emoji-select-btn {
            font-size: 24px;
            width: 48px;
            height: 48px;
            background: rgba(0,0,0,0.3);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 4px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 14px;
        }

        .btn-add { background: #4e5058; color: white; margin-bottom: 12px; }
        .btn-send { background: var(--accent); color: white; }

        /* MODAL EMOJI */
        #emoji-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .modal-box {
            background: #2f3136;
            width: 90%;
            max-width: 400px;
            height: 450px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
        }

        .modal-header {
            padding: 15px;
            background: var(--bg-dark);
            display: flex;
            justify-content: space-between;
        }

        .emoji-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
            padding: 15px;
            overflow-y: auto;
        }

        .emoji-item {
            font-size: 26px;
            text-align: center;
            cursor: pointer;
            padding: 5px;
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="sidebar-header">
            <span class="brand">BAGBOT DESIGNER</span>
            <i class="fas fa-times" onclick="toggleSidebar()" style="cursor:pointer; color:#888;"></i>
        </div>
        <div class="nav-content">
            <div class="nav-item active"><i class="fas fa-magic"></i> Builder</div>
            <div class="nav-item"><i class="fas fa-cog"></i> Réglages</div>
        </div>
    </div>

    <div class="main-content">
        <div class="navbar">
            <i class="fas fa-bars menu-toggle" onclick="toggleSidebar()"></i>
            <span style="font-weight: 800; font-size: 12px; text-transform: uppercase;">Éditeur de Message</span>
        </div>

        <div class="view-area">
            
            <div class="embed-preview">
                <div class="thumb-upload" onclick="triggerFile('thumb')">
                    <i class="fas fa-plus" id="icon-thumb"></i>
                    <img id="img-thumb" style="display:none">
                </div>
                <div class="author-row">
                    <div class="author-icon" onclick="triggerFile('author')">
                        <img id="img-author" style="display:none">
                    </div>
                    <input type="text" class="input-text" value="Auteur du message" style="font-weight:600; font-size:13px;">
                </div>
                <input type="text" class="input-text title-input" value="Titre de l'embed">
                <textarea class="input-text desc-input" placeholder="Rédigez votre message..."></textarea>
                <div class="banner-upload" onclick="triggerFile('banner')">
                    <i class="fas fa-image" id="icon-banner" style="font-size:32px; color:#4e5058;"></i>
                    <img id="img-banner" style="display:none">
                </div>
            </div>

            <div class="settings-form">
                <label class="section-title">Salon de destination</label>
                <select class="dropdown" id="server-channels">
                    <option value="">Chargement des salons...</option>
                </select>

                <label class="section-title">Rôles-Réactions</label>
                <div id="reactions-box"></div>

                <button class="btn btn-add" onclick="addRow()">
                    <i class="fas fa-plus"></i> Ajouter une réaction
                </button>

                <button class="btn btn-send" onclick="submit()">
                    <i class="fas fa-paper-plane"></i> ENVOYER SUR DISCORD
                </button>
            </div>
        </div>
    </div>

    <div id="emoji-modal">
        <div class="modal-box">
            <div class="modal-header">
                <span style="font-weight:bold; color:white;">Emojis Standards</span>
                <i class="fas fa-times" onclick="closeEmojiModal()" style="cursor:pointer;"></i>
            </div>
            <div class="emoji-grid" id="emoji-grid-target"></div>
        </div>
    </div>

    <input type="file" id="file-picker" style="display:none" onchange="preview(this)">

<script>
    let currentFileTarget = "";
    let currentEmojiBtn = null;
    let rolesData = [];

    const standardEmojis = ["😀","😃","😄","😁","😆","😅","😂","🤣","😊","😇","🙂","🙃","😉","😌","😍","🥰","😘","😗","😙","😚","😋","😛","😝","😜","🤪","🤨","🧐","🤓","😎","🤩","🥳","😏","😒","😞","😔","😟","😕","🙁","☹️","😣","😖","😫","😩","🥺","😢","😭","😤","😠","😡","🤬","🤯","😳","🥵","🥶","😱","😨","😰","😥","😓","🤗","🤔","🤭","🤫","🤥","😶","😐","😑","😬","🙄","😯","😦","😧","😮","😲","🥱","😴","🤤","😪","😵","🤐","🥴","🤢","🤮","🤧","😷","🤒","🤕","🤑","🤠","😈","👿","👹","👺","🤡","💩","👻","💀","☠️","👽","👾","🤖","🎃"];

    // RÉCUPÉRATION DES DONNÉES DU BOT
    async function loadServerData() {
        try {
            const res = await fetch('/api/get_server_info');
            const data = await res.json();
            
            // Salons
            const chanSelect = document.getElementById('server-channels');
            chanSelect.innerHTML = data.channels.map(c => 
                `<option value="${c.id}"># ${c.name}</option>`
            ).join('');

            // Rôles
            rolesData = data.roles;
        } catch (e) {
            console.error("Erreur de connexion au bot.");
        }
    }

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('collapsed');
    }

    function addRow() {
        const box = document.getElementById('reactions-box');
        const row = document.createElement('div');
        row.className = 'reaction-row';
        
        const roleOptions = rolesData.map(r => `<option value="${r.id}">${r.name}</option>`).join('');
        
        row.innerHTML = `
            <div class="emoji-select-btn" onclick="openEmojiModal(this)">😀</div>
            <select class="dropdown" style="margin-bottom:0; flex-grow:1;">
                <option value="">Attribuer un rôle...</option>
                ${roleOptions}
            </select>
            <i class="fas fa-trash" onclick="this.parentElement.remove()" style="color:var(--accent); cursor:pointer; padding:10px;"></i>
        `;
        box.appendChild(row);
    }

    function openEmojiModal(btn) {
        currentEmojiBtn = btn;
        const grid = document.getElementById('emoji-grid-target');
        grid.innerHTML = standardEmojis.map(e => `<div class="emoji-item" onclick="selectEmoji('${e}')">${e}</div>`).join('');
        document.getElementById('emoji-modal').style.display = 'flex';
    }

    function selectEmoji(e) {
        if(currentEmojiBtn) currentEmojiBtn.innerText = e;
        closeEmojiModal();
    }

    function closeEmojiModal() { document.getElementById('emoji-modal').style.display = 'none'; }

    function triggerFile(t) { currentFileTarget = t; document.getElementById('file-picker').click(); }

    function preview(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => {
                const img = document.getElementById('img-' + currentFileTarget);
                const icon = document.getElementById('icon-' + currentFileTarget);
                img.src = e.target.result;
                img.style.display = 'block';
                if(icon) icon.style.display = 'none';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    window.onload = loadServerData;
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BagBot | Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --accent: #d78266; --bg: #2f3136; --sidebar: #202225; --card: #36393f; --input: #202225; --text: #dcddde; }
        body { margin: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); display: flex; }

        /* Sidebar Style DraftBot */
        .sidebar { width: 280px; background: var(--sidebar); height: 100vh; position: fixed; left: -280px; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000; box-shadow: 10px 0 15px rgba(0,0,0,0.3); }
        .sidebar.open { left: 0; }
        .sidebar-header { padding: 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2f3136; }
        .logo { width: 40px; height: 40px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
        .nav-item { padding: 15px 25px; display: flex; align-items: center; gap: 15px; cursor: pointer; color: #8e9297; transition: 0.2s; }
        .nav-item:hover, .nav-item.active { background: #34373c; color: white; }
        .nav-item.active { border-left: 4px solid var(--accent); }

        /* Main Content */
        .main { flex: 1; padding: 30px; margin-left: 0; transition: 0.4s; }
        .top-bar { display: flex; align-items: center; gap: 20px; margin-bottom: 40px; }
        .btn-menu { background: var(--card); border: none; color: white; padding: 12px; border-radius: 8px; cursor: pointer; font-size: 20px; }

        /* Tabs Style Pilule */
        .tabs-container { display: flex; background: #202225; padding: 5px; border-radius: 30px; width: fit-content; margin: 0 auto 30px auto; }
        .tab { padding: 10px 30px; border-radius: 25px; cursor: pointer; color: #b9bbbe; transition: 0.3s; font-weight: 600; font-size: 14px; }
        .tab.active { background: #4f545c; color: white; }
        .tab-embed.active { background: rgba(215, 130, 102, 0.2); color: var(--accent); border: 1px solid var(--accent); }

        /* Form Card */
        .card { background: var(--card); border-radius: 12px; padding: 30px; max-width: 800px; margin: auto; box-shadow: 0 8px 24px rgba(0,0,0,0.2); }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        
        label { display: block; font-size: 11px; font-weight: 800; color: #8e9297; text-transform: uppercase; margin-bottom: 10px; letter-spacing: 0.5px; }
        .input-group { background: var(--input); border: 1px solid #1e1f22; border-radius: 8px; padding: 2px; }
        select, input, textarea { width: 100%; background: transparent; border: none; color: white; padding: 12px; box-sizing: border-box; font-size: 14px; outline: none; }
        
        /* Emoji Picker DraftBot */
        .emoji-section { background: #2f3136; border-radius: 8px; padding: 15px; margin-top: 10px; }
        .emoji-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(45px, 1fr)); gap: 10px; max-height: 150px; overflow-y: auto; }
        .emoji-item { cursor: pointer; padding: 8px; border-radius: 6px; transition: 0.2s; display: flex; justify-content: center; }
        .emoji-item:hover, .emoji-item.selected { background: var(--accent); }
        .emoji-item img { width: 28px; height: 28px; }

        /* Bouton Action Orange */
        .btn-deploy { background: var(--accent); color: white; border: none; padding: 18px; width: 100%; border-radius: 8px; font-weight: 700; cursor: pointer; margin-top: 30px; font-size: 16px; box-shadow: 0 4px 10px rgba(215, 130, 102, 0.3); transition: 0.2s; }
        .btn-deploy:hover { transform: translateY(-2px); filter: brightness(1.1); }
    </style>
</head>
<body>

<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <div style="display: flex; align-items: center; gap: 12px;">
            <div class="logo">B</div>
            <span style="font-weight: 800; letter-spacing: 1px;">BAGBOT</span>
        </div>
        <i class="fas fa-times" onclick="toggleMenu()" style="cursor:pointer; font-size: 20px; color: #8e9297;"></i>
    </div>
    <div style="margin-top: 20px;">
        <div class="nav-item"><i class="fas fa-home"></i> Dashboard</div>
        <div class="nav-item active"><i class="fas fa-fingerprint"></i> Rôles Réactions</div>
        <div class="nav-item"><i class="fas fa-tools"></i> Configuration</div>
    </div>
</div>

<div class="main">
    <div class="top-bar">
        <button class="btn-menu" onclick="toggleMenu()"><i class="fas fa-bars"></i></button>
        <h2 style="margin: 0; font-size: 20px;">Ajouter un rôle réaction</h2>
    </div>

    <div class="tabs-container">
        <div class="tab active" id="tab-simple" onclick="setMode('simple')">Contenu</div>
        <div class="tab" id="tab-image">Image</div>
        <div class="tab" id="tab-embed" onclick="setMode('embed')">Embed</div>
    </div>

    <div class="card">
        <div class="form-grid">
            <div class="input-block">
                <label><i class="fas fa-hashtag"></i> Salon Discord</label>
                <div class="input-group"><select id="cId"><option>Chargement...</option></select></div>
            </div>
            <div class="input-block">
                <label><i class="fas fa-user-tag"></i> Rôle à donner</label>
                <div class="input-group"><select id="rId"><option>Chargement...</option></select></div>
            </div>
        </div>

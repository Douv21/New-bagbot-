<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BAGBOT DASHBOARD ELITE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #0a0a0a; --card: #141414; --accent: #ed4245; --border: #252525; --d-bg: #2b2d31; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { margin: 0; background: var(--bg); color: #fff; height: 100vh; overflow: hidden; }
        .header { position: fixed; top: 0; left: 0; right: 0; height: 60px; background: #000; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; z-index: 2500; }
        .burger { font-size: 22px; color: var(--accent); cursor: pointer; }
        #sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100vh; background: #000; z-index: 3000; transition: 0.3s; border-right: 1px solid var(--border); }
        #sidebar.open { left: 0; }
        .nav-item { padding: 20px; border-bottom: 1px solid #111; cursor: pointer; display: flex; align-items: center; justify-content: space-between; color: #888; font-weight: bold; }
        .nav-item.active { color: var(--accent); background: #ed424510; }
        main { height: 100vh; overflow-y: auto; padding: 80px 15px 150px; }
        .section { display: none; max-width: 600px; margin: 0 auto; }
        .section.active { display: block; }
        .card { background: var(--card); border-radius: 20px; padding: 25px; border: 1px solid var(--border); margin-bottom: 20px; }
        input, textarea, select { width: 100%; background: #000; border: 1px solid var(--border); color: #fff; padding: 14px; border-radius: 10px; margin-bottom: 10px; }
        .btn { border: none; padding: 16px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; background: var(--accent); color: white; }
        .shop-item { background: #000; padding: 15px; border-radius: 10px; border: 1px solid var(--border); margin-bottom: 10px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

    <div class="header">
        <i class="fas fa-bars burger" onclick="toggleSidebar(event)"></i>
        <div style="margin-left: 20px; font-weight: 900; color: var(--accent);">BAGBOT ELITE V9</div>
    </div>

    <div id="sidebar">
        <div style="padding: 40px 20px; text-align: center; color: var(--accent); font-weight: 900;">MENU</div>
        <div class="nav-item" onclick="showTab('welcome')"><span>BIENVENUE</span><i class="fas fa-door-open"></i></div>
        <div class="nav-item" onclick="showTab('boutique')"><span>BOUTIQUE</span><i class="fas fa-shopping-cart"></i></div>
        <div class="nav-item" onclick="showTab('gallery')"><span>GALERIE</span><i class="fas fa-image"></i></div>
    </div>

    <main onclick="closeSidebar()">
        <div id="welcome" class="section active">
            <div class="card">
                <h2>Bienvenue</h2>
                <label>Titre</label><input type="text" id="w-title">
                <label>Description</label><textarea id="w-desc" rows="4"></textarea>
                <button class="btn" onclick="save()">SAUVEGARDER</button>
            </div>
        </div>

        <div id="boutique" class="section">
            <div class="card">
                <h2>📦 Ajouter un article</h2>
                <input type="text" id="shop-name" placeholder="Nom">
                <input type="number" id="shop-price" placeholder="Prix">
                <input type="text" id="shop-roleid" placeholder="ID Rôle">
                <button class="btn" onclick="addShopItem()">AJOUTER</button>
            </div>
            <div class="card">
                <h2>🛒 En vente</h2>
                <div id="shop-list"></div>
            </div>
        </div>

        <div id="gallery" class="section">
            <div class="card"><h2>Galerie</h2><div id="g-list"></div></div>
        </div>
    </main>

    <script>
        let db = { config: {}, shop_config: { items: [] }, roles: [], channels: [], images: [] };

        async function init() {
            try {
                const res = await fetch('/api/get_data');
                db = await res.json();
                
                // Charger Welcome
                document.getElementById('w-title').value = db.config.welcome?.title || "";
                document.getElementById('w-desc').value = db.config.welcome?.desc || "";

                // Charger Boutique
                renderShop();
                
                showTab(localStorage.getItem('currentPage') || 'welcome');
            } catch(e) { console.error("Erreur init:", e); }
        }

        function renderShop() {
            const cont = document.getElementById('shop-list');
            const items = db.shop_config.items || [];
            cont.innerHTML = items.map((it, idx) => `
                <div class="shop-item">
                    <div><b>${it.name}</b><br><small>${it.price} coins</small></div>
                    <i class="fas fa-trash" onclick="deleteShopItem(${idx})"></i>
                </div>
            `).join('');
        }

        async function addShopItem() {
            const name = document.getElementById('shop-name').value;
            const price = document.getElementById('shop-price').value;
            if(!name || !price) return alert("Champs vides");
            db.shop_config.items.push({ name, price, role_id: document.getElementById('shop-roleid').value });
            await fetch('/api/save_shop', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(db.shop_config) });
            renderShop();
        }

        async function save() {
            db.config.welcome.title = document.getElementById('w-title').value;
            db.config.welcome.desc = document.getElementById('w-desc').value;
            await fetch('/api/save', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(db.config) });
            alert("OK");
        }

        function showTab(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            localStorage.setItem('currentPage', id);
            closeSidebar();
        }

        function toggleSidebar(e) { e.stopPropagation(); document.getElementById('sidebar').classList.toggle('open'); }
        function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); }

        window.onload = init;
    </script>
</body>
</html>

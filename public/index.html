<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BagBot Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #ed4245; --bg: #0f1012; --sidebar-bg: #000000; --card: #1e1f22; }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: white; display: flex; height: 100vh; overflow: hidden; }

        /* --- SIDEBAR --- */
        #sidebar {
            width: 260px; background: var(--sidebar-bg); border-right: 1px solid #2b2d31;
            display: flex; flex-direction: column; transition: transform 0.3s ease;
            z-index: 1000;
        }
        .nav-item { padding: 15px 25px; display: flex; align-items: center; gap: 12px; color: #949ba4; cursor: pointer; text-decoration: none; font-weight: 600; }
        .nav-item:hover, .nav-item.active { color: white; background: rgba(255,255,255,0.05); }
        .nav-item.active { border-left: 4px solid var(--accent); color: var(--accent); }

        /* --- MAIN CONTENT --- */
        .main-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        header { 
            height: 60px; background: #111214; display: flex; align-items: center; 
            padding: 0 20px; border-bottom: 1px solid #2b2d31; justify-content: space-between;
        }
        .menu-toggle { display: none; font-size: 20px; cursor: pointer; }

        .content { flex: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }

        /* --- EMBED PREVIEW --- */
        .discord-card {
            width: 100%; max-width: 550px; background: #2b2d31; border-radius: 4px;
            border-left: 4px solid var(--accent); padding: 15px; margin-bottom: 25px;
        }
        .form-container {
            width: 100%; max-width: 550px; background: #111214; padding: 20px; border-radius: 8px;
        }
        
        input, textarea, select {
            width: 100%; background: #000; border: 1px solid #2b2d31; color: white;
            padding: 12px; border-radius: 5px; margin: 10px 0; font-size: 14px;
        }
        .btn-save {
            width: 100%; background: var(--accent); color: white; border: none;
            padding: 15px; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 10px;
        }

        /* --- RESPONSIVE LOGIC --- */
        @media (max-width: 768px) {
            #sidebar { position: fixed; height: 100%; transform: translateX(-100%); }
            #sidebar.open { transform: translateX(0); }
            .menu-toggle { display: block; }
            .content { padding: 15px; }
        }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: none; z-index: 999;
        }
        .overlay.active { display: block; }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <nav id="sidebar">
        <div style="padding: 30px 25px; font-size: 22px; font-weight: 900; color: var(--accent);">BAGBOT</div>
        <a class="nav-item active"><i class="fas fa-home"></i> Accueil</a>
        <a class="nav-item"><i class="fas fa-hammer"></i> Modération</a>
        <a class="nav-item"><i class="fas fa-cog"></i> Paramètres</a>
    </nav>

    <div class="main-container">
        <header>
            <i class="fas fa-bars menu-toggle" onclick="toggleMenu()"></i>
            <span id="bot-name" style="font-weight: bold; font-size: 14px;">Dashboard</span>
            <img id="bot-avatar" src="" style="width: 32px; height: 32px; border-radius: 50%;">
        </header>

        <div class="content">
            <div class="discord-card">
                <div id="preview-title" style="font-weight: bold; font-size: 16px; margin-bottom: 8px;">Titre de l'embed</div>
                <div id="preview-desc" style="color: #dbdee1; font-size: 14px; white-space: pre-wrap;">Contenu du message...</div>
            </div>

            <div class="form-container">
                <label style="font-size: 12px; color: #949ba4;">TITRE</label>
                <input type="text" id="title-input" placeholder="Bienvenue !" oninput="updatePreview()">

                <label style="font-size: 12px; color: #949ba4;">DESCRIPTION</label>
                <textarea id="desc-input" rows="4" placeholder="Texte de bienvenue..." oninput="updatePreview()"></textarea>

                <label style="font-size: 12px; color: #949ba4;">SALON DISCORD</label>
                <select id="channel-select"></select>

                <button class="btn-save">ENREGISTRER LA CONFIGURATION</button>
            </div>
        </div>
    </div>

    <script>
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('active');
        }

        function updatePreview() {
            document.getElementById('preview-title').innerText = document.getElementById('title-input').value || "Titre de l'embed";
            document.getElementById('preview-desc').innerText = document.getElementById('desc-input').value || "Contenu du message...";
        }

        async function loadData() {
            try {
                const res = await fetch('/api/get_server_info');
                const data = await res.json();
                
                document.getElementById('bot-name').innerText = data.bot.name;
                document.getElementById('bot-avatar').src = data.bot.avatar;
                
                const select = document.getElementById('channel-select');
                select.innerHTML = data.channels.map(c => `<option value="${c.id}"># ${c.name}</option>`).join('');
            } catch (e) {
                console.error("Erreur de chargement", e);
            }
        }

        window.onload = loadData;
    </script>
</body>
</html>

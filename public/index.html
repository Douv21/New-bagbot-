</select>

async function deploy() {
    const btn = document.querySelector('.btn-send');

        formData.append('roleId', document.getElementById('roleId').value);
        formData.append('roleMode', document.getElementById('roleMode').value);
        formData.append('messageId', document.getElementById('messageId').value);

        alert("❌ Crash du navigateur : " + e.message);
    } finally {
        btn.innerText = "DÉPLOYER SUR DISCORD";

</script>

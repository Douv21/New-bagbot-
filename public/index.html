<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BagBot Admin</title>
    <style>
        :root { --bg: #0f1012; --card: #18191c; --accent: #ff4d4d; --sidebar: #0b0c0e; --text: #f2f3f5; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); color: var(--text); display: flex; }
        
        /* Sidebar avec bouton de fermeture */
        .sidebar { width: 280px; background: var(--sidebar); height: 100vh; position: fixed; left: -280px; transition: 0.3s; z-index: 1001; }
        .sidebar.open { left: 0; }
        .sidebar-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
        .close-sidebar { background: none; border: none; color: white; font-size: 24px; cursor: pointer; }

        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; }
        .overlay.active { display: block; }

        .main { flex: 1; padding: 15px; width: 100%; box-sizing: border-box; }
        .header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; background: var(--card); padding: 10px; border-radius: 8px; }
        .menu-btn { background: #2f3136; border: none; color: white; padding: 10px 15px; border-radius: 6px; cursor: pointer; }

        .panel { background: var(--card); border-radius: 12px; padding: 20px; border: 1px solid #282a2e; max-width: 500px; margin: auto; }
        .tabs { display: flex; background: #2f3136; border-radius: 8px; margin-bottom: 20px; overflow: hidden; }
        .tab { flex: 1; text-align: center; padding: 12px; cursor: pointer; color: #888; }
        .tab.active { background: var(--accent); color: white; font-weight: bold; }

        label { display: block; margin: 15px 0 5px; font-size: 11px; color: #8e9297; text-transform: uppercase; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 12px; background: #202225; border: 1px solid #111; color: white; border-radius: 6px; box-sizing: border-box; }
        
        .btn-send { background: var(--accent); color: white; border: none; padding: 18px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .preview { margin-top: 20px; padding: 15px; background: #2f3136; border-radius: 8px; border-left: 4px solid var(--accent); }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <span style="color: var(--accent); font-weight: bold; font-size: 20px;">BAG BOT V2</span>
        <button class="close-sidebar" onclick="toggleMenu()">×</button>
    </div>
    <div style="padding: 15px 20px; background: #1a1a1a; border-left: 4px solid var(--accent);">🎭 Rôles-Réactions</div>
</div>

<div class="main">
    <div class="header">
        <button class="menu-btn" onclick="toggleMenu()">☰ Menu</button>
        <h4 style="margin:0;">Configuration Rôles</h4>
    </div>

    <div class="panel">
        <div class="tabs">
            <div class="tab active" id="t-simple" onclick="setMode('simple')">Simple</div>
            <div class="tab" id="t-embed" onclick="setMode('embed')">Embed</div>
        </div>

        <label>ID Message (Modifier)</label>
        <input type="text" id="messageId" placeholder="Laisser vide pour un nouveau">

        <label>Salon Discord</label>
        <select id="channelId"><option value="">Chargement...</option></select>

        <label>Rôle</label>
        <select id="roleId"><option value="">Chargement...</option></select>

        <label>Mode</label>
        <select id="roleMode">
            <option value="normal">Normal (Ajout/Retrait)</option>
            <option value="inverse">Inversé</option>
            <option value="definitif">Définitif</option>
        </select>

        <label>Composant</label>
        <select id="displayType">
            <option value="button">Bouton</option>
            <option value="select">Menu Déroulant</option>
        </select>

        <div id="f-simple">
            <label>Contenu texte</label>
            <textarea id="simpleContent" rows="3"></textarea>
        </div>

        <div id="f-embed" style="display:none;">
            <label>Titre</label>
            <input type="text" id="title">
            <label>Description</label>
            <textarea id="description" rows="3"></textarea>
            <label>Image</label>
            <input type="file" id="imageFile" accept="image/*">
            <input type="text" id="imageUrl" placeholder="Ou lien URL...">
        </div>

        <button class="btn-send" id="btn-deploy" onclick="deploy()">DÉPLOYER SUR DISCORD</button>
    </div>
</div>

<script>
    let currentMode = 'simple';

    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('active');
    }

    function setMode(m) {
        currentMode = m;
        document.getElementById('t-simple').classList.toggle('active', m === 'simple');
        document.getElementById('t-embed').classList.toggle('active', m === 'embed');
        document.getElementById('f-simple').style.display = m === 'simple' ? 'block' : 'none';
        document.getElementById('f-embed').style.display = m === 'embed' ? 'block' : 'none';
    }

    async function load() {
        try {
            const [cRes, rRes] = await Promise.all([fetch('/api/channels'), fetch('/api/roles')]);
            const channels = await cRes.json();
            const roles = await rRes.json();
            
            // On force les IDs en string pour éviter les erreurs de type
            document.getElementById('channelId').innerHTML = channels.map(c => `<option value="${String(c.id)}"># ${c.name}</option>`).join('');
            document.getElementById('roleId').innerHTML = roles.map(r => `<option value="${String(r.id)}">${r.name}</option>`).join('');
        } catch(e) { alert("Erreur de chargement des données."); }
    }

    async function deploy() {
        const cEl = document.getElementById('channelId');
        const rEl = document.getElementById('roleId');
        
        // RECUPERATION CRITIQUE
        const selChan = cEl.value;
        const selRole = rEl.value;

        if (!selChan || selChan === "undefined" || selChan.length < 15) {
            return alert("❌ Erreur : Le salon n'est pas chargé. Attendez 2 secondes.");
        }

        const btn = document.getElementById('btn-deploy');
        btn.innerText = "ENVOI...";
        btn.disabled = true;

        const fd = new FormData();
        fd.append('mode', currentMode);
        fd.append('channelId', selChan);
        fd.append('roleId', selRole);
        fd.append('roleMode', document.getElementById('roleMode').value);
        fd.append('displayType', document.getElementById('displayType').value);
        fd.append('messageId', document.getElementById('messageId').value.trim());
        fd.append('content', document.getElementById('simpleContent').value);
        fd.append('title', document.getElementById('title').value);
        fd.append('description', document.getElementById('description').value);
        fd.append('imageUrl', document.getElementById('imageUrl').value);
        
        if (document.getElementById('imageFile').files[0]) {
            fd.append('imageFile', document.getElementById('imageFile').files[0]);
        }

        try {
            const res = await fetch('/update-bot', { method: 'POST', body: fd });
            const data = await res.json();
            if (data.success) alert("✅ Déployé avec succès !");
            else alert("❌ Erreur : " + data.message);
        } catch(e) { alert("Erreur serveur."); }
        
        btn.innerText = "DÉPLOYER SUR DISCORD";
        btn.disabled = false;
    }
    load();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BagBot | Dashboard</title>
    <style>
        :root { --accent: #d78266; --bg: #2c2f33; --panel: #23272a; --dark: #1e2124; --text: #dcddde; }
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); display: flex; overflow-x: hidden; }
        
        /* Sidebar DraftBot Style */
        .sidebar { width: 260px; background: var(--dark); height: 100vh; position: fixed; left: -260px; transition: 0.3s; z-index: 1000; border-right: 1px solid #111; }
        .sidebar.open { left: 0; }
        .sidebar-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        .sidebar-item { padding: 12px 20px; cursor: pointer; display: flex; align-items: center; gap: 10px; color: #8e9297; }
        .sidebar-item.active { background: #36393f; color: white; border-left: 4px solid var(--accent); }

        .main { flex: 1; padding: 20px; width: 100%; box-sizing: border-box; }
        .hamburger { background: var(--panel); color: white; border: 1px solid #333; padding: 10px 15px; border-radius: 5px; cursor: pointer; margin-bottom: 20px; }

        .card { background: var(--panel); border-radius: 8px; padding: 25px; max-width: 650px; margin: auto; border: 1px solid #333; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        
        /* Onglets Contenu/Image/Embed */
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 25px; justify-content: center; }
        .nav-tab { padding: 8px 20px; border-radius: 20px; background: #36393f; cursor: pointer; font-size: 14px; transition: 0.2s; border: 1px solid transparent; }
        .nav-tab.active { background: rgba(215, 130, 102, 0.2); border-color: var(--accent); color: var(--accent); }

        label { display: block; font-size: 11px; font-weight: 800; color: #8e9297; text-transform: uppercase; margin-bottom: 8px; margin-top: 15px; }
        select, input, textarea { width: 100%; padding: 12px; background: #1e2124; border: 1px solid #111; color: white; border-radius: 5px; box-sizing: border-box; font-size: 14px; }
        
        /* Emoji Picker */
        .emoji-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(40px, 1fr)); gap: 8px; background: #18191c; padding: 10px; border-radius: 5px; max-height: 120px; overflow-y: auto; margin-top: 5px; border: 1px solid #111; }
        .emoji-btn { cursor: pointer; padding: 5px; border-radius: 4px; display: flex; justify-content: center; transition: 0.2s; }
        .emoji-btn:hover, .emoji-btn.selected { background: var(--accent); }
        .emoji-btn img { width: 24px; height: 24px; }

        .btn-deploy { background: var(--accent); color: white; border: none; padding: 16px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 30px; font-size: 15px; transition: 0.2s; }
        .btn-deploy:hover { filter: brightness(1.1); }
    </style>
</head>
<body>

<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <h3 style="color:var(--accent); margin:0;">BAGBOT</h3>
        <button onclick="toggleMenu()" style="background:none; border:none; color:#888; font-size:24px; cursor:pointer;">×</button>
    </div>
    <div class="sidebar-content">
        <div class="sidebar-item">🏠 Dashboard</div>
        <div class="sidebar-item active">🎭 Rôles Réactions</div>
        <div class="sidebar-item">⚙️ Configuration</div>
    </div>
</div>

<div class="main">
    <button class="hamburger" onclick="toggleMenu()">☰ Menu</button>
    
    <div class="card">
        <div class="nav-tabs">
            <div class="nav-tab active" id="tab-simple" onclick="setMode('simple')">Contenu</div>
            <div class="nav-tab" id="tab-embed" onclick="setMode('embed')">Embed</div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div><label>Salon Discord</label><select id="cId"></select></div>
            <div><label>Rôle à donner</label><select id="rId"></select></div>
        </div>

        <label>Texte personnalisé (Bouton/Menu)</label>
        <input type="text" id="btnLabel" placeholder="Ex: Accès VIP">

        <label>Émojis du serveur</label>
        <div class="emoji-grid" id="emojiPicker"></div>
        <input type="hidden" id="selectedEmoji">

        <label>Mode de fonctionnement</label>
        <select id="roleMode">
            <option value="normal">Ajout / Retrait (Normal)</option>
            <option value="unique">Unique (Un seul par salon)</option>
            <option value="definitif">Définitif (Donne mais ne retire pas)</option>
            <option value="retrait">Retrait Uniquement</option>
        </select>

        <div id="sec-simple">
            <label>Message texte</label>
            <textarea id="txt" rows="3">Cliquez sur le bouton ci-dessous !</textarea>
        </div>

        <div id="sec-embed" style="display:none;">
            <label>Titre de l'Embed</label><input type="text" id="tit">
            <label>Description</label><textarea id="des" rows="3"></textarea>
            <label>Bannière Image</label><input type="file" id="img">
        </div>

        <label>Type d'affichage</label>
        <select id="disp">
            <option value="button">Bouton Classique</option>
            <option value="select">Menu Déroulant</option>
        </select>

        <button class="btn-deploy" onclick="deploy()">DÉPLOYER SUR DISCORD</button>
    </div>
</div>

<script>
    let currentMode = 'simple';
    function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); }
    
    function setMode(m) {
        currentMode = m;
        document.getElementById('tab-simple').classList.toggle('active', m === 'simple');
        document.getElementById('tab-embed').classList.toggle('active', m === 'embed');
        document.getElementById('sec-simple').style.display = m === 'simple' ? 'block' : 'none';
        document.getElementById('sec-embed').style.display = m === 'embed' ? 'block' : 'none';
    }

    async function loadData() {
        try {
            const [cR, rR, eR] = await Promise.all([fetch('/api/channels'), fetch('/api/roles'), fetch('/api/emojis')]);
            const c = await cR.json(); const r = await rR.json(); const emojis = await eR.json();
            
            document.getElementById('cId').innerHTML = c.map(x => `<option value="${x.id}"># ${x.name}</option>`).join('');
            document.getElementById('rId').innerHTML = r.map(x => `<option value="${x.id}">${x.name}</option>`).join('');
            
            // Picker d'émojis
            document.getElementById('emojiPicker').innerHTML = emojis.map(e => `
                <div class="emoji-btn" onclick="selectEmoji('${e.id}', this)" title="${e.name}">
                    <img src="${e.url}">
                </div>`).join('') + `<div class="emoji-btn" onclick="selectEmoji('', this)">❌</div>`;
        } catch(e) { console.error("Erreur chargement données"); }
    }

    function selectEmoji(id, el) {
        document.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('selected'));
        el.classList.add('selected');
        document.getElementById('selectedEmoji').value = id;
    }

    async function deploy() {
        const btn = document.querySelector('.btn-deploy');
        btn.innerText = "DÉPLOIEMENT EN COURS...";
        
        const fd = new FormData();
        fd.append('channelId', document.getElementById('cId').value);
        fd.append('roleId', document.getElementById('rId').value);
        fd.append('mode', currentMode);
        fd.append('roleMode', document.getElementById('roleMode').value);
        fd.append('displayType', document.getElementById('disp').value);
        fd.append('buttonLabel', document.getElementById('btnLabel').value);
        fd.append('emojiId', document.getElementById('selectedEmoji').value);
        fd.append('content', document.getElementById('txt').value);
        fd.append('title', document.getElementById('tit').value);
        fd.append('description', document.getElementById('des').value);
        if(document.getElementById('img').files[0]) fd.append('imageFile', document.getElementById('img').files[0]);

        try {
            const res = await fetch('/api/deploy', { method: 'POST', body: fd });
            const data = await res.json();
            if(data.success) alert("✅ Envoyé avec succès !");
            else alert("❌ Erreur : " + data.message);
        } catch(e) { alert("❌ Serveur injoignable."); }
        btn.innerText = "DÉPLOYER SUR DISCORD";
    }
    loadData();
</script>
</body>
</html>

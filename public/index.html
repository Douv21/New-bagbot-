<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAGBOT ELITE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #0a0a0a; --card: #141414; --accent: #ed4245; --border: #252525; --d-bg: #2b2d31; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: sans-serif; height: 100vh; overflow: hidden; }
        
        .header { position: fixed; top: 0; left: 0; right: 0; height: 60px; background: #000; display: flex; align-items: center; padding: 0 20px; z-index: 2000; border-bottom: 1px solid var(--border); }
        .burger { font-size: 24px; color: var(--accent); cursor: pointer; }
        
        #sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100vh; background: #000; z-index: 3000; transition: 0.3s; border-right: 1px solid var(--border); }
        #sidebar.open { left: 0; }
        
        .nav-item { padding: 18px 20px; cursor: pointer; color: #888; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #111; font-weight: bold; }
        .nav-item.active { color: var(--accent); background: #ed424510; }
        
        .submenu { display: none; background: #050505; }
        .submenu.show { display: block; }
        .sub-item { padding: 15px 50px; color: #666; cursor: pointer; border-bottom: 1px solid #0a0a0a; }
        .sub-item.active { color: #fff; background: #111; }

        main { height: 100vh; overflow-y: auto; padding: 80px 15px; }
        .section { display: none; max-width: 600px; margin: 0 auto; }
        .section.active { display: block; }

        .card { background: var(--card); border-radius: 15px; padding: 20px; border: 1px solid var(--border); margin-bottom: 20px; }
        input, textarea, select { width: 100%; background: #000; border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 8px; margin-top: 10px; }
        
        .preview { background: var(--d-bg); border-left: 4px solid var(--accent); padding: 15px; border-radius: 4px; margin-bottom: 20px; }
        .btn { width: 100%; padding: 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-save { background: var(--accent); color: white; }

        /* Dropdown Roles */
        .drop-menu { display: none; background: #000; border: 1px solid var(--border); max-height: 200px; overflow-y: auto; }
        .drop-menu.show { display: block; }
        .role-item { padding: 10px; display: flex; align-items: center; gap: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <i class="fas fa-bars burger" onclick="toggleSidebar(event)"></i>
        <div style="margin-left: 20px; font-weight: 900; color: var(--accent);">BAGBOT ELITE</div>
    </div>

    <div id="sidebar">
        <div style="padding: 40px 20px; font-weight: 900; color: var(--accent); font-size: 20px;">MENU</div>
        
        <div class="nav-item active" onclick="toggleSubmenu('sub-conf', event)">
            <span><i class="fas fa-cog"></i> CONFIGURATION</span>
            <i class="fas fa-chevron-down"></i>
        </div>
        <div id="sub-conf" class="submenu show">
            <div class="sub-item active" onclick="showTab('welcome', this)">Bienvenue</div>
            <div class="sub-item" onclick="showTab('leave', this)">Départ</div>
        </div>

        <div class="nav-item" onclick="showTab('admin', this)">
            <span><i class="fas fa-user-shield"></i> PERMISSIONS</span>
        </div>
        <div class="nav-item" onclick="showTab('gallery', this)">
            <span><i class="fas fa-images"></i> GALERIE</span>
        </div>
    </div>

    <main id="content" onclick="closeSidebar()">
        <div id="welcome" class="section active">
            <div class="preview" id="pv-welcome">
                <div id="pv-w-title" style="font-weight: bold;">Titre de Bienvenue</div>
                <div id="pv-w-desc" style="font-size: 14px; opacity: 0.8;">Message ici...</div>
            </div>
            <div class="card">
                <h2>Bienvenue</h2>
                <label>Salon</label>
                <select id="w-channel"><option value="">Chargement...</option></select>
                <label>Titre</label>
                <input type="text" id="w-title" oninput="sync('welcome')">
                <label>Message</label>
                <textarea id="w-desc" rows="4" oninput="sync('welcome')"></textarea>
                <button class="btn btn-save" onclick="save()">SAUVEGARDER</button>
            </div>
        </div>

        <div id="leave" class="section">
            <div class="card"><h2>Départ</h2><p>Configuration de départ...</p></div>
        </div>

        <div id="admin" class="section">
            <div class="card">
                <h2>Rôles Autorisés</h2>
                <div id="admin-list" class="drop-menu show" style="position:static; border:none;"></div>
                <button class="btn btn-save" onclick="save()">SAUVEGARDER</button>
            </div>
        </div>

        <div id="gallery" class="section">
            <div class="card"><h2>Galerie</h2><div id="g-list"></div></div>
        </div>
    </main>

    <script>
        let db = { roles: [], channels: [], config: {} };

        async function load() {
            try {
                const r = await fetch('/api/get_data');
                db = await r.json();
                
                // Remplir les salons
                const sel = document.getElementById('w-channel');
                sel.innerHTML = db.channels.map(c => `<option value="${c.id}"># ${c.name}</option>`).join('') || '<option>Aucun salon</option>';
                
                // Remplir les rôles admin
                const adminList = document.getElementById('admin-list');
                adminList.innerHTML = db.roles.map(role => `
                    <div class="role-item">
                        <input type="checkbox" value="${role}" ${db.config.admin_roles.includes(role)?'checked':''}>
                        ${role}
                    </div>
                `).join('');

                // Charger config
                document.getElementById('w-title').value = db.config.welcome.title || "";
                document.getElementById('w-desc').value = db.config.welcome.desc || "";
                sync('welcome');
            } catch (e) { alert("Erreur de connexion au bot"); }
        }

        function sync(mode) {
            if(mode === 'welcome') {
                document.getElementById('pv-w-title').innerText = document.getElementById('w-title').value || "Titre";
                document.getElementById('pv-w-desc').innerText = document.getElementById('w-desc').value || "Message";
            }
        }

        function toggleSidebar(e) { 
            e.stopPropagation();
            document.getElementById('sidebar').classList.toggle('open'); 
        }

        function closeSidebar() { 
            document.getElementById('sidebar').classList.remove('open'); 
        }

        function toggleSubmenu(id, e) {
            e.stopPropagation();
            document.getElementById(id).classList.toggle('show');
        }

        function showTab(id, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            
            document.querySelectorAll('.nav-item, .sub-item').forEach(i => i.classList.remove('active'));
            if(el) el.classList.add('active');
            
            closeSidebar();
        }

        async function save() {
            const config = {
                welcome: {
                    title: document.getElementById('w-title').value,
                    desc: document.getElementById('w-desc').value,
                    channel: document.getElementById('w-channel').value
                },
                admin_roles: Array.from(document.querySelectorAll('#admin-list input:checked')).map(i => i.value)
            };
            await fetch('/api/save', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(config) });
            alert("Enregistré !");
        }

        window.onload = load;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BagBot Pro - Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --accent: #ed4245; 
            --bg-dark: #000000;
            --bg-sidebar: #0a0a0a;
            --bg-card: #1e1f22;
            --border: #2b2d31;
            --text-muted: #949ba4;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg-dark); color: white; display: flex; height: 100vh; overflow: hidden; }

        /* --- SIDEBAR RÉTRACTABLE --- */
        #sidebar {
            width: 260px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease, width 0.3s ease;
            z-index: 1000;
        }

        #sidebar.collapsed { width: 0; transform: translateX(-100%); }

        .sidebar-header { padding: 25px 20px; font-weight: 900; color: var(--accent); font-size: 22px; letter-spacing: 1px; }
        
        .nav-item {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-muted);
            cursor: pointer;
            transition: 0.2s;
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(237, 66, 69, 0.1);
            color: white;
            border-left: 4px solid var(--accent);
        }

        /* --- CONTENU PRINCIPAL --- */
        .main-content { flex-grow: 1; display: flex; flex-direction: column; min-width: 0; }
        
        .top-nav {
            height: 60px;
            background: #050505;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 20px;
        }

        .toggle-btn { cursor: pointer; color: var(--accent); font-size: 20px; z-index: 1100; }

        .scroll-area { flex-grow: 1; overflow-y: auto; padding: 30px 15px; display: flex; flex-direction: column; align-items: center; }

        /* --- DESIGN EMBED --- */
        .embed-container {
            width: 100%;
            max-width: 500px;
            background: var(--bg-card);
            border-left: 4px solid var(--accent);
            border-radius: 4px;
            padding: 16px;
            position: relative;
            margin-bottom: 25px;
        }

        .click-zone { border: 2px dashed var(--border); background: rgba(0,0,0,0.2); display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; overflow: hidden; z-index: 10; }
        .click-zone img { width: 100%; height: 100%; object-fit: cover; position: absolute; }

        .thumb-box { position: absolute; top: 16px; right: 16px; width: 80px; height: 80px; }
        .banner-box { width: 100%; height: 160px; margin-top: 15px; }

        .input-ghost { background: transparent; border: none; color: white; outline: none; width: 100%; margin-bottom: 5px; }
        .title-ghost { font-size: 18px; font-weight: bold; }
        .desc-ghost { font-size: 14px; min-height: 80px; resize: none; }

        /* --- BOUTONS --- */
        .form-panel { width: 100%; max-width: 500px; padding-bottom: 100px; }
        .label-style { font-size: 11px; font-weight: bold; color: var(--text-muted); text-transform: uppercase; margin: 15px 0 8px; display: block; }

        .select-dark { width: 100%; background: #111214; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 4px; outline: none; }

        .btn { width: 100%; padding: 15px; border-radius: 4px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        .btn-add { background: #2b2d31; color: white; }
        .btn-send { background: var(--accent); color: white; margin-top: 25px; font-size: 16px; }

        .row-reac { display: flex; align-items: center; gap: 10px; background: #080808; padding: 10px; border-radius: 6px; margin-top: 10px; border: 1px solid var(--border); }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="sidebar-header">BAGBOT</div>
        <div class="nav-item active">
            <i class="fas fa-envelope-open-text"></i>
            <span>Embeds/Message</span>
        </div>
        <div class="nav-item">
            <i class="fas fa-cog"></i>
            <span>Paramètres</span>
        </div>
    </div>

    <div class="main-content">
        <div class="top-nav">
            <i class="fas fa-bars toggle-btn" onclick="toggleMenu()"></i>
            <span style="font-weight: bold; font-size: 14px; letter-spacing: 1px;">DASHBOARD</span>
        </div>

        <div class="scroll-area">
            <div class="embed-container">
                <div class="click-zone thumb-box" onclick="triggerFile('thumb')">
                    <i class="fas fa-plus" id="icon-thumb"></i>
                    <img id="view-thumb" style="display:none">
                </div>
                
                <input type="text" class="input-ghost title-ghost" value="Titre de l'Embed">
                <textarea class="input-ghost desc-ghost" placeholder="Votre message ici..."></textarea>

                <div class="click-zone banner-box" onclick="triggerFile('banner')">
                    <i class="fas fa-image" id="icon-banner" style="font-size: 24px;"></i>
                    <img id="view-banner" style="display:none">
                </div>
            </div>

            <div class="form-panel">
                <label class="label-style">Salon de destination</label>
                <select id="chan-list" class="select-dark">
                    <option>Chargement...</option>
                </select>

                <div id="reac-container"></div>
                
                <button class="btn btn-add" onclick="addNewRow()">
                    <i class="fas fa-plus-circle"></i> Ajouter une réaction
                </button>

                <button class="btn btn-send">
                    <i class="fas fa-paper-plane"></i> DÉPLOYER LE MESSAGE
                </button>
            </div>
        </div>
    </div>

    <input type="file" id="file-input" style="display:none" onchange="previewFile(this)">

<script>
    let roleCache = [];
    let uploadTarget = "";

    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('collapsed');
    }

    async function loadData() {
        try {
            const res = await fetch('/api/get_server_info');
            const data = await res.json();
            roleCache = data.roles || [];
            document.getElementById('chan-list').innerHTML = data.channels.map(c => 
                `<option value="${c.id}"># ${c.name}</option>`
            ).join('');
        } catch(e) { console.error("Erreur bot"); }
    }

    function triggerFile(type) {
        uploadTarget = type;
        document.getElementById('file-input').click();
    }

    function previewFile(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = document.getElementById('view-' + uploadTarget);
                img.src = e.target.result;
                img.style.display = 'block';
                document.getElementById('icon-' + uploadTarget).style.display = 'none';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function addNewRow() {
        const container = document.getElementById('reac-container');
        const div = document.createElement('div');
        div.className = 'row-reac';
        div.innerHTML = `
            <div style="font-size: 20px; cursor: pointer;">😀</div>
            <select class="select-dark" style="border:none; background:transparent;">
                ${roleCache.map(r => `<option value="${r.id}">${r.name}</option>`).join('')}
            </select>
            <i class="fas fa-trash" onclick="this.parentElement.remove()" style="color:var(--accent); cursor:pointer;"></i>
        `;
        container.appendChild(div);
    }

    window.onload = loadData;
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>BagBot Designer Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #d37f6a; --bg: #2b2d31; --sidebar: #1e1f22; --text: #dbdee1; --dark: #111214; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; }

        /* SIDEBAR RÉTRACTABLE */
        .sidebar { width: 260px; background: var(--sidebar); display: flex; flex-direction: column; transition: 0.3s; border-right: 1px solid #1a1a1a; }
        .sidebar.collapsed { width: 0; overflow: hidden; border: none; }
        .nav-header { padding: 20px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #2b2d31; }
        .nav-item { padding: 15px 25px; display: flex; align-items: center; gap: 15px; cursor: pointer; color: #888; }
        .nav-item.active { color: var(--accent); background: rgba(211, 127, 106, 0.1); border-right: 3px solid var(--accent); }

        /* TOPBAR & HAMBURGER */
        .main { flex: 1; display: flex; flex-direction: column; }
        .topbar { background: var(--sidebar); padding: 10px 20px; display: flex; align-items: center; gap: 20px; }
        .hamburger { font-size: 22px; cursor: pointer; color: var(--accent); }

        /* BUILDER (STYLE DRAFTBOT) */
        .builder-container { padding: 20px; flex: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }
        .embed-preview { background: #313338; border-radius: 8px; padding: 15px; width: 100%; max-width: 500px; position: relative; }
        .embed-stripe { position: absolute; left: 15px; top: 15px; bottom: 15px; width: 4px; background: var(--accent); border-radius: 4px; }
        .embed-content { margin-left: 15px; }
        
        .slot { border: 1px dashed #4e5058; border-radius: 4px; display: flex; align-items: center; justify-content: center; cursor: pointer; background: rgba(0,0,0,0.1); position: relative; min-height: 40px; }
        .slot img { width: 100%; height: 100%; object-fit: cover; position: absolute; border-radius: 4px; }
        .banner-slot { width: 100%; height: 150px; margin-top: 10px; }
        .thumb-slot { position: absolute; top: 0; right: 0; width: 60px; height: 60px; }

        /* PICKER EMOJI STYLE DRAFTBOT */
        #emojiPicker { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 9999; display: none; align-items: center; justify-content: center; }
        .picker-window { background: var(--bg); width: 90%; max-width: 400px; height: 500px; border-radius: 12px; display: flex; overflow: hidden; }
        .picker-side { width: 50px; background: var(--dark); display: flex; flex-direction: column; align-items: center; padding: 10px 0; gap: 15px; }
        .picker-main { flex: 1; display: flex; flex-direction: column; background: #232428; }
        .picker-grid { flex: 1; overflow-y: auto; padding: 10px; display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
        .emoji-item { font-size: 24px; cursor: pointer; text-align: center; padding: 5px; border-radius: 5px; }
        .emoji-item:hover { background: #35373c; }
        .emoji-item img { width: 30px; height: 30px; }

        .btn-deploy { background: var(--accent); color: white; border: none; padding: 15px; width: 100%; max-width: 500px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div class="nav-header">
            <img src="https://draftbot.fr/assets/img/logo.png" width="30">
            <span style="font-weight: bold;">BAGBOT</span>
        </div>
        <div class="nav-item active"><i class="fas fa-edit"></i> Builder</div>
        <div class="nav-item"><i class="fas fa-images"></i> Galerie</div>
        <div class="nav-item"><i class="fas fa-cog"></i> Config</div>
    </div>

    <div class="main">
        <div class="topbar">
            <i class="fas fa-bars hamburger" onclick="toggleSidebar()"></i>
            <span style="font-weight: bold;">Dashboard v2</span>
        </div>

        <div class="builder-container">
            <div class="embed-preview">
                <div class="embed-stripe"></div>
                <div class="embed-content">
                    <div style="display:flex; align-items:center; gap:8px; margin-bottom:10px;">
                        <div class="slot" onclick="openMedia('auth')" style="width:24px; height:24px; border-radius:50%; min-height:auto;">
                            <img id="img-auth" style="display:none">
                        </div>
                        <span contenteditable="true" id="txt-auth" style="font-size:13px; font-weight:600; color:white;">Nom de l'auteur</span>
                    </div>
                    <div class="thumb-slot slot" onclick="openMedia('thumb')">
                        <i class="fas fa-plus" id="ic-thumb"></i>
                        <img id="img-thumb" style="display:none">
                    </div>
                    <div id="txt-title" contenteditable="true" style="font-weight:bold; font-size:16px; margin-bottom:5px; color:white;">Titre du message</div>
                    <div id="txt-desc" contenteditable="true" style="font-size:14px; min-height:20px;">Cliquez pour modifier la description...</div>
                    <div class="banner-slot slot" onclick="openMedia('banner')">
                        <i class="fas fa-image" id="ic-banner" style="font-size: 30px;"></i>
                        <img id="img-banner" style="display:none">
                    </div>
                </div>
            </div>

            <div style="width: 100%; max-width: 500px; margin-top: 20px;">
                <label style="font-size:12px; color:#888;">SALON</label>
                <select id="sel-chans" style="width:100%; padding:10px; background:#1e1f22; border:none; color:white; border-radius:5px; margin-bottom:15px;"></select>
                
                <div id="reacs-box"></div>
                <button onclick="addReacRow()" style="width:100%; padding:10px; background:#383a40; border:none; color:white; border-radius:5px; cursor:pointer;">+ AJOUTER UN RÔLE RÉACTION</button>
                <button class="btn-deploy" onclick="deploy()">🚀 DÉPLOYER SUR DISCORD</button>
            </div>
        </div>
    </div>

    <div id="emojiPicker">
        <div class="picker-window">
            <div class="picker-side">
                <i class="fas fa-clock" style="color:var(--accent)"></i>
                <i class="fas fa-smile"></i>
                <i class="fas fa-cat"></i>
                <i class="fas fa-fist-raised"></i>
            </div>
            <div class="picker-main">
                <div style="padding:10px; border-bottom:1px solid #1a1a1a;">
                    <input type="text" placeholder="Choisissez un émoji" style="width:100%; padding:8px; background:#1e1f22; border:none; color:white; border-radius:4px;">
                </div>
                <div class="picker-grid" id="emoji-list"></div>
                <button onclick="closePicker()" style="padding:10px; background:var(--dark); border:none; color:white;">Fermer</button>
            </div>
        </div>
    </div>

    <input type="file" id="f-upload" style="display:none" onchange="handleUpload(this)">

<script>
    const API = "http://192.168.1.133:49501";
    let activeZone = null;
    let activeBtn = null;

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('collapsed'); }
    function closePicker() { document.getElementById('emojiPicker').style.display = 'none'; }
    function openMedia(z) { activeZone = z; document.getElementById('f-upload').click(); }

    async function init() {
        const chans = await fetch(`${API}/api/channels`).then(r => r.json());
        document.getElementById('sel-chans').innerHTML = chans.map(c => `<option value="${c.id}"># ${c.name}</option>`).join('');
        
        const emos = await fetch(`${API}/api/emojis`).then(r => r.json());
        const stds = ["😀","🔥","✅","❌","🔞","⭐","✨","⚡","🎁","🏆"];
        
        let html = emos.map(e => `<div class="emoji-item" onclick="pickEmoji('${e.id}', true, '${e.url}')"><img src="${e.url}"></div>`).join('');
        html += stds.map(s => `<div class="emoji-item" onclick="pickEmoji('${s}', false)">${s}</div>`).join('');
        document.getElementById('emoji-list').innerHTML = html;
    }

    async function handleUpload(input) {
        if(!input.files[0]) return;
        const fd = new FormData(); fd.append('file', input.files[0]);
        const res = await fetch(`${API}/api/upload`, {method:'POST', body:fd}).then(r => r.json());
        
        const img = document.getElementById(`img-${activeZone}`);
        const ic = document.getElementById(`ic-${activeZone}`);
        img.src = res.url; img.style.display = 'block';
        if(ic) ic.style.display = 'none';
    }

    function addReacRow() {
        const div = document.createElement('div');
        div.style = "background:#1e1f22; padding:10px; border-radius:5px; margin-bottom:10px; display:flex; align-items:center; gap:10px;";
        div.innerHTML = `
            <div class="emoji-trigger" onclick="openPicker(this)" style="font-size:24px; cursor:pointer;">😀</div>
            <select class="role-sel" style="flex:1; padding:5px; background:#2b2d31; border:none; color:white;"></select>
        `;
        document.getElementById('reacs-box').appendChild(div);
        loadRoles(div.querySelector('.role-sel'));
    }

    async function loadRoles(sel) {
        const roles = await fetch(`${API}/api/roles`).then(r => r.json());
        sel.innerHTML = roles.map(r => `<option value="${r.id}">${r.name}</option>`).join('');
    }

    function openPicker(btn) { activeBtn = btn; document.getElementById('emojiPicker').style.display = 'flex'; }
    function pickEmoji(val, isCust, url) {
        activeBtn.innerHTML = isCust ? `<img src="${url}" data-id="${val}" style="width:24px">` : val;
        if(!isCust) activeBtn.removeAttribute('data-id');
        closePicker();
    }

    async function deploy() {
        const reacs = Array.from(document.querySelectorAll('#reacs-box > div')).map(row => ({
            emoji: row.querySelector('.emoji-trigger img')?.dataset.id || row.querySelector('.emoji-trigger').innerText,
            roleId: row.querySelector('.role-sel').value
        }));

        await fetch(`${API}/api/deploy`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                channelId: document.getElementById('sel-chans').value,
                title: document.getElementById('txt-title').innerText,
                description: document.getElementById('txt-desc').innerText,
                author: document.getElementById('txt-auth').innerText,
                author_img: document.getElementById('img-auth').src,
                thumbnail: document.getElementById('img-thumb').src,
                banner: document.getElementById('img-banner').src,
                reactions: reacs
            })
        });
        alert("Déploiement envoyé !");
    }

    window.onload = init;
</script>
</body>
</html>

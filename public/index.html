<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BagBot Designer Pro - Full Source Code</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* =========================================
           1. STYLES DE BASE & VARIABLES (10128.jpg)
           ========================================= */
        :root {
            --accent: #d37f6a;
            --bg-main: #2b2d31;
            --bg-sidebar: #1e1f22;
            --bg-darker: #111214;
            --text-white: #ffffff;
            --text-normal: #dbdee1;
            --text-muted: #949ba4;
            --border-discord: #3f4147;
            --danger: #ed4245;
        }

        * {
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-normal);
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* =========================================
           2. SIDEBAR STRUCTURE
           ========================================= */
        .sidebar {
            width: 260px;
            background-color: var(--bg-sidebar);
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
            z-index: 1000;
            border-right: 1px solid var(--bg-darker);
            flex-shrink: 0;
        }

        .sidebar.collapsed {
            margin-left: -260px;
        }

        .sidebar-header {
            padding: 24px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: var(--bg-darker);
        }

        .sidebar-logo {
            font-weight: 900;
            color: var(--accent);
            font-size: 20px;
            letter-spacing: 1px;
        }

        .sidebar-menu {
            padding: 20px 10px;
            flex-grow: 1;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 4px;
            cursor: pointer;
            color: var(--text-muted);
            margin-bottom: 5px;
            font-weight: 500;
            transition: 0.2s;
        }

        .menu-item:hover {
            background-color: rgba(78, 80, 88, 0.3);
            color: var(--text-white);
        }

        .menu-item.active {
            background-color: rgba(211, 127, 106, 0.1);
            color: var(--text-white);
            border-left: 4px solid var(--accent);
        }

        /* =========================================
           3. CONTENU PRINCIPAL & NAVBAR
           ========================================= */
        .main-view {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            position: relative;
        }

        .navbar {
            height: 60px;
            background-color: var(--bg-main);
            display: flex;
            align-items: center;
            padding: 0 20px;
            border-bottom: 1px solid var(--bg-darker);
            gap: 15px;
        }

        .nav-icon {
            font-size: 22px;
            color: var(--accent);
            cursor: pointer;
        }

        .nav-title {
            font-weight: 700;
            font-size: 15px;
            color: var(--text-white);
            text-transform: uppercase;
        }

        /* =========================================
           4. ZONE DE CONSTRUCTION (BUILDER)
           ========================================= */
        .scroll-container {
            flex-grow: 1;
            overflow-y: auto;
            padding: 30px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* L'Embed Discord Ultra-Fidèle */
        .discord-embed-card {
            width: 100%;
            max-width: 500px;
            background-color: #313338;
            border-radius: 4px;
            border-left: 4px solid var(--accent);
            padding: 16px;
            position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .image-slot {
            border: 2px dashed #4e5058;
            border-radius: 4px;
            background-color: rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .image-slot img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
        }

        .thumbnail-box {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 80px;
            height: 80px;
            z-index: 5;
        }

        .author-line {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        .author-avatar-box {
            width: 24px;
            height: 24px;
            border-radius: 50%;
        }

        .editable-text {
            border: none;
            background: transparent;
            color: var(--text-white);
            outline: none;
            width: 100%;
        }

        .title-input {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .desc-input {
            font-size: 14px;
            color: var(--text-normal);
            line-height: 1.4;
            min-height: 40px;
        }

        .banner-box {
            width: 100%;
            height: 180px;
            margin-top: 15px;
        }

        /* =========================================
           5. RÉGLAGES, SALONS ET RÔLES
           ========================================= */
        .settings-area {
            width: 100%;
            max-width: 500px;
            margin-top: 25px;
            padding-bottom: 60px;
        }

        .label-head {
            display: block;
            font-size: 11px;
            font-weight: 800;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .discord-dropdown {
            width: 100%;
            background-color: var(--bg-darker);
            border: 1px solid #000;
            color: var(--text-white);
            padding: 14px;
            border-radius: 4px;
            font-size: 15px;
            margin-bottom: 25px;
            outline: none;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 15px center;
            background-size: 16px;
        }

        .reaction-row {
            display: flex;
            align-items: center;
            gap: 10px;
            background-color: var(--bg-sidebar);
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 10px;
            border: 1px solid var(--border-discord);
        }

        .emoji-selector-btn {
            font-size: 22px;
            width: 46px;
            height: 46px;
            background: rgba(0,0,0,0.3);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .emoji-selector-btn:hover {
            background-color: var(--accent);
        }

        .btn-base {
            border: none;
            border-radius: 4px;
            padding: 16px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: 15px;
        }

        .btn-add-action {
            background-color: #4e5058;
            color: white;
            margin-bottom: 12px;
        }

        .btn-deploy-final {
            background-color: var(--accent);
            color: white;
            box-shadow: 0 4px 15px rgba(211, 127, 106, 0.4);
        }

        /* =========================================
           6. EMOJI PICKER MODAL
           ========================================= */
        #emoji-modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .picker-container {
            background-color: #2f3136;
            width: 90%;
            max-width: 400px;
            height: 500px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .picker-header {
            padding: 15px;
            background-color: var(--bg-darker);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .emoji-search {
            padding: 10px 15px;
            background-color: #202225;
        }

        .emoji-search input {
            width: 100%;
            padding: 10px;
            border-radius: 4px;
            border: none;
            background: var(--bg-darker);
            color: white;
            outline: none;
        }

        .emoji-grid {
            flex-grow: 1;
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
            padding: 15px;
            overflow-y: auto;
        }

        .emoji-item {
            font-size: 26px;
            text-align: center;
            cursor: pointer;
            padding: 5px;
            border-radius: 5px;
            transition: 0.1s;
        }

        .emoji-item:hover {
            background-color: rgba(255,255,255,0.1);
            transform: scale(1.1);
        }

        /* RESPONSIVE MOBILE */
        @media (max-width: 768px) {
            .sidebar { position: absolute; height: 100%; }
            .sidebar.collapsed { margin-left: -260px; }
        }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span class="sidebar-logo">BAGBOT PRO</span>
            <i class="fas fa-angle-left" onclick="toggleSidebar()" style="cursor:pointer; color: #888;"></i>
        </div>
        <div class="sidebar-menu">
            <div class="menu-item active"><i class="fas fa-magic"></i> Builder d'Embed</div>
            <div class="menu-item"><i class="fas fa-layer-group"></i> Modèles</div>
            <div class="menu-item"><i class="fas fa-terminal"></i> Logs Console</div>
            <div class="menu-item"><i class="fas fa-cog"></i> Paramètres</div>
        </div>
    </div>

    <div class="main-view">
        <div class="navbar">
            <i class="fas fa-bars nav-icon" onclick="toggleSidebar()"></i>
            <span class="nav-title">Nouveau Message Discord</span>
        </div>

        <div class="scroll-container">
            
            <div class="discord-embed-card">
                <div class="thumbnail-box image-slot" onclick="triggerUpload('thumb')">
                    <i class="fas fa-plus" id="ic-thumb"></i>
                    <img id="view-thumb" style="display:none">
                </div>

                <div class="author-line">
                    <div class="author-avatar-box image-slot" onclick="triggerUpload('auth')" style="width:24px; height:24px;">
                        <img id="view-auth" style="display:none">
                    </div>
                    <div contenteditable="true" class="editable-text" style="font-size:14px; font-weight:600;">Nom de l'auteur</div>
                </div>

                <div contenteditable="true" class="editable-text title-input" id="title-val">Titre de l'embed</div>

                <div contenteditable="true" class="editable-text desc-input" id="desc-val">Cliquez ici pour rédiger votre message...</div>

                <div class="banner-box image-slot" onclick="triggerUpload('banner')">
                    <i class="fas fa-image" id="ic-banner" style="font-size:32px; color:#4e5058"></i>
                    <img id="view-banner" style="display:none">
                </div>
            </div>

            <div class="settings-area">
                <span class="label-head">Salon Discord de destination</span>
                <select class="discord-dropdown" id="channel-selector">
                    <option value="">Chargement des salons...</option>
                </select>

                <span class="label-head">Système de Rôles-Réactions</span>
                <div id="reactions-wrapper"></div>

                <button class="btn-base btn-add-action" onclick="addReactionRow()">
                    <i class="fas fa-plus-circle"></i> Ajouter une réaction
                </button>

                <button class="btn-base btn-deploy-final" onclick="deployEmbed()">
                    <i class="fas fa-paper-plane"></i> ENVOYER L'EMBED
                </button>
            </div>

        </div>
    </div>

    <div id="emoji-modal">
        <div class="picker-container">
            <div class="picker-header">
                <span style="font-weight:800; color:white;">Choisir un émoji</span>
                <i class="fas fa-times" onclick="closeEmojiPicker()" style="cursor:pointer; color:var(--text-muted);"></i>
            </div>
            <div class="emoji-search">
                <input type="text" id="emoji-search-input" placeholder="Rechercher un émoji..." onkeyup="filterEmojis()">
            </div>
            <div class="emoji-grid" id="emoji-grid-box">
                </div>
        </div>
    </div>

    <input type="file" id="file-uploader" style="display:none" accept="image/*" onchange="handleImage(this)">

<script>

    // 7. VARIABLES GLOBALES ET DONNÉES
    // =========================================
    let currentUploadTarget = null;

    const fallbackRoles = [

    const allEmojis = [

    ];

    // =========================================
    // 8. LOGIQUE D'INITIALISATION
    // =========================================
    window.onload = function() {
        loadChannels();
        loadEmojiGrid();
        if(window.innerWidth < 768) toggleSidebar();
    };

    function loadChannels() {
        const select = document.getElementById('channel-selector');
        // Tente de récupérer les vrais channels via Python plus tard
        // Pour l'instant on utilise les Fallbacks
        select.innerHTML = fallbackChannels.map(c => 
            `<option value="${c.id}"># ${c.name}</option>`
        ).join('');
    }

    // =========================================
    // 9. GESTION DES RÉACTIONS ET RÔLES
    // =========================================
    function addReactionRow() {
        const container = document.getElementById('reactions-wrapper');
        const row = document.createElement('div');
        row.className = 'reaction-row';
        
        const roleOptions = fallbackRoles.map(r => `<option value="${r.id}">${r.name}</option>`).join('');
        
        row.innerHTML = `
            <div class="emoji-selector-btn" onclick="openEmojiPicker(this)">😀</div>
            <select class="discord-dropdown" style="margin-bottom:0; flex-grow:1;">
                <option value="">Sélectionner un rôle...</option>
                ${roleOptions}
            </select>
            <i class="fas fa-trash-alt" onclick="this.parentElement.remove()" style="color:var(--danger); cursor:pointer; padding:10px;"></i>
        `;
        container.appendChild(row);
    }

    // =========================================
    // 10. GESTION DU PICKER D'EMOJIS
    // =========================================
    function loadEmojiGrid() {
        const grid = document.getElementById('emoji-grid-box');
        grid.innerHTML = allEmojis.map(e => `
            <div class="emoji-item" onclick="selectThisEmoji('${e}')">${e}</div>
        `).join('');
    }

    function openEmojiPicker(btn) {
        currentEmojiButton = btn;
        document.getElementById('emoji-modal').style.display = 'flex';
    }

    function closeEmojiPicker() {
        document.getElementById('emoji-modal').style.display = 'none';
    }

    function selectThisEmoji(emoji) {
        if(currentEmojiButton) {
            currentEmojiButton.innerText = emoji;
        }
        closeEmojiPicker();
    }

    function filterEmojis() {
        const val = document.getElementById('emoji-search-input').value.toLowerCase();
        const items = document.querySelectorAll('.emoji-item');
        items.forEach(item => {

            // pour l'instant on laisse tout car ce sont des Unicodes.

    }

    // =========================================
    // 11. GESTION DES IMAGES ET SIDEBAR
    // =========================================
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('collapsed');
    }

    function triggerUpload(target) {
        currentUploadTarget = target;
        document.getElementById('file-uploader').click();
    }

    function handleImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = document.getElementById(`view-${currentUploadTarget}`);
                const icon = document.getElementById(`ic-${currentUploadTarget}`);
                img.src = e.target.result;
                img.style.display = 'block';

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BagBot Designer Pro - Version Source Complète</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* =========================================
           1. VARIABLES DE COULEURS DISCORD
           ========================================= */
        :root {
            --accent-color: #d37f6a;
            --bg-main: #2b2d31;
            --bg-sidebar: #1e1f22;
            --bg-darkest: #111214;
            --text-primary: #dbdee1;
            --text-muted: #949ba4;
            --embed-inner: #313338;
            --border-ui: #3f4147;
            --red-discord: #ed4245;
        }

        /* =========================================
           2. STRUCTURE GLOBALE
           ========================================= */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* =========================================
           3. SIDEBAR (RÉRACTABLE)
           ========================================= */
        #sidebar {
            width: 260px;
            background-color: var(--bg-sidebar);
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--bg-darkest);
            transition: width 0.3s ease, transform 0.3s ease;
            flex-shrink: 0;
            z-index: 999;
        }

        /* Classe pour rétracter la sidebar */
        #sidebar.collapsed {
            width: 0px;
            overflow: hidden;
            border-right: none;
        }

        .sidebar-header {
            padding: 20px;
            background-color: var(--bg-darkest);
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 60px;
        }

        .sidebar-logo {
            color: var(--accent-color);
            font-weight: 800;
            font-size: 18px;
            white-space: nowrap;
        }

        .sidebar-content {
            padding: 15px 10px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 4px;
            margin-bottom: 5px;
            transition: 0.2s;
            white-space: nowrap;
        }

        .nav-item:hover, .nav-item.active {
            background-color: rgba(211, 127, 106, 0.1);
            color: white;
        }

        /* =========================================
           4. ZONE DE TRAVAIL PRINCIPALE
           ========================================= */
        .main-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .top-nav {
            height: 60px;
            padding: 0 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            border-bottom: 1px solid var(--bg-darkest);
        }

        .toggle-btn {
            font-size: 20px;
            color: var(--accent-color);
            cursor: pointer;
        }

        .page-title {
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
        }

        .scroll-view {
            flex-grow: 1;
            overflow-y: auto;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* =========================================
           5. APERÇU DE L'EMBED (Fidèle à 10128.jpg)
           ========================================= */
        .discord-embed-preview {
            width: 100%;
            max-width: 500px;
            background-color: var(--embed-inner);
            border-left: 4px solid var(--accent-color);
            border-radius: 4px;
            padding: 16px;
            position: relative;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }

        /* Thumbnail (En haut à droite) */
        .embed-thumb-zone {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 80px;
            height: 80px;
            border: 2px dashed #4e5058;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            overflow: hidden;
        }

        .embed-thumb-zone img { width: 100%; height: 100%; object-fit: cover; }

        .embed-author-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .author-icon-circle {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #4e5058;
            cursor: pointer;
            overflow: hidden;
        }

        .input-field {
            background: transparent;
            border: none;
            color: white;
            outline: none;
            width: 100%;
            font-family: inherit;
        }

        .embed-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
        .embed-desc { font-size: 14px; color: var(--text-primary); line-height: 1.4; min-height: 30px; }

        .embed-banner-zone {
            width: 100%;
            height: 180px;
            border: 2px dashed #4e5058;
            margin-top: 12px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            overflow: hidden;
        }

        /* =========================================
           6. SÉLECTEURS ET BOUTONS
           ========================================= */
        .form-section {
            width: 100%;
            max-width: 500px;
            margin-top: 30px;
            padding-bottom: 80px;
        }

        .label-text {
            display: block;
            font-size: 11px;
            font-weight: 800;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .custom-select {
            width: 100%;
            background-color: var(--bg-darkest);
            border: 1px solid #000;
            color: white;
            padding: 14px;
            border-radius: 4px;
            font-size: 15px;
            margin-bottom: 20px;
            outline: none;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 15px center;
            background-size: 16px;
        }

        .reaction-row {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg-sidebar);
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 10px;
            border: 1px solid var(--border-ui);
        }

        .emoji-trigger {
            font-size: 24px;
            width: 48px;
            height: 48px;
            background: rgba(0,0,0,0.3);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 4px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 14px;
        }

        .btn-grey { background-color: #4e5058; color: white; margin-bottom: 10px; }
        .btn-accent { background-color: var(--accent-color); color: white; }

        /* =========================================
           7. EMOJI MODAL
           ========================================= */
        #modal-emoji {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }

        .modal-box {
            background: #2f3136;
            width: 90%;
            max-width: 400px;
            height: 450px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
        }

        .modal-header {
            padding: 15px;
            background: var(--bg-darkest);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .emoji-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
            padding: 15px;
            overflow-y: auto;
        }

        .emoji-cell {
            font-size: 26px;
            text-align: center;
            cursor: pointer;
            padding: 5px;
            border-radius: 4px;
        }

        .emoji-cell:hover { background: rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="sidebar-header">
            <span class="sidebar-logo">BAGBOT PRO</span>
            <i class="fas fa-times" onclick="toggleSidebarMenu()" style="cursor:pointer; color: #555;"></i>
        </div>
        <div class="sidebar-content">
            <div class="nav-item active"><i class="fas fa-plus-circle"></i> Builder d'Embed</div>
            <div class="nav-item"><i class="fas fa-server"></i> Serveur Info</div>
            <div class="nav-item"><i class="fas fa-cog"></i> Paramètres</div>
        </div>
    </div>

    <div class="main-container">
        <div class="top-nav">
            <i class="fas fa-bars toggle-btn" onclick="toggleSidebarMenu()"></i>
            <span class="page-title">Éditeur de message</span>
        </div>

        <div class="scroll-view">
            
            <div class="discord-embed-preview">
                <div class="embed-thumb-zone" onclick="openFile('thumb')">
                    <i class="fas fa-plus" id="icon-thumb"></i>
                    <img id="img-thumb" style="display:none">
                </div>

                <div class="embed-author-row">
                    <div class="author-icon-circle" onclick="openFile('author')">
                        <img id="img-author" style="display:none">
                    </div>
                    <input type="text" class="input-field" value="Nom de l'auteur" style="font-size:13px; font-weight:600;">
                </div>

                <input type="text" class="input-field embed-title" value="Titre de l'embed">
                <textarea class="input-field embed-desc" placeholder="Votre message ici..."></textarea>

                <div class="embed-banner-zone" onclick="openFile('banner')">
                    <i class="fas fa-image" id="icon-banner" style="font-size:32px; color:#4e5058"></i>
                    <img id="img-banner" style="display:none">
                </div>
            </div>

            <div class="form-section">
                <label class="label-text">Salon de destination</label>
                <select class="custom-select" id="channel-list">
                    <option value="1349448439402561637"># 📂-storage</option>
                    <option value="123456789"># 💬-général</option>
                    <option value="987654321"># 📢-annonces</option>
                    <option value="555666777"># 🛠-staff</option>
                </select>

                <label class="label-text">Configuration Rôles-Réactions</label>
                <div id="reactions-container">
                    </div>

                <button class="btn btn-grey" id="add-reaction-btn" onclick="addReactionRow()">
                    <i class="fas fa-plus"></i> Ajouter une réaction
                </button>

                <button class="btn btn-accent" onclick="deployEmbed()">
                    <i class="fas fa-rocket"></i> ENVOYER LE MESSAGE
                </button>
            </div>
        </div>
    </div>

    <div id="modal-emoji">
        <div class="modal-box">
            <div class="modal-header">
                <span style="font-weight:800; color:white">Emojis Standards</span>
                <i class="fas fa-times" onclick="closeEmojiModal()" style="cursor:pointer; color:var(--text-muted)"></i>
            </div>
            <div class="emoji-grid" id="emoji-grid-content"></div>
        </div>
    </div>

    <input type="file" id="hidden-file" style="display:none" accept="image/*" onchange="previewImg(this)">

<script>
    // --- VARIABLES ---
    let uploadTarget = "";
    let lastEmojiBtn = null;

    // Liste des rôles (Simulée pour le test)
    const serverRoles = [
        {id: "101", name: "Membre"},
        {id: "102", name: "VIP"},
        {id: "103", name: "Staff"},
        {id: "104", name: "Modérateur"}
    ];

    // Liste massive d'émojis
    const emojiList = ["✅","❌","🔥","⭐","🚀","📢","🛠️","🎁","🎉","🤖","🔞","👋","💡","🛡️","💎","👑","🌈","🎯","🎧","🎮"];

    // --- 1. GESTION SIDEBAR (RÉPARÉ) ---
    function toggleSidebarMenu() {
        const sb = document.getElementById('sidebar');
        sb.classList.toggle('collapsed');
    }

    // --- 2. GESTION DES RÉACTIONS (RÉPARÉ) ---
    function addReactionRow() {
        const container = document.getElementById('reactions-container');
        const row = document.createElement('div');
        row.className = 'reaction-row';
        
        // On génère les options des rôles
        const options = serverRoles.map(r => `<option value="${r.id}">${r.name}</option>`).join('');
        
        row.innerHTML = `
            <div class="emoji-trigger" onclick="openEmojiModal(this)">😀</div>
            <select class="custom-select" style="margin-bottom:0; flex-grow:1;">
                <option value="">Attribuer un rôle...</option>
                ${options}
            </select>
            <i class="fas fa-trash-alt" onclick="this.parentElement.remove()" style="color:var(--red-discord); cursor:pointer; padding:10px;"></i>
        `;
        container.appendChild(row);
    }

    // --- 3. GESTION EMOJI PICKER ---
    function openEmojiModal(btn) {
        lastEmojiBtn = btn;
        const grid = document.getElementById('emoji-grid-content');
        grid.innerHTML = emojiList.map(e => `<div class="emoji-cell" onclick="selectEmoji('${e}')">${e}</div>`).join('');
        document.getElementById('modal-emoji').style.display = 'flex';
    }

    function closeEmojiModal() {
        document.getElementById('modal-emoji').style.display = 'none';
    }

    function selectEmoji(e) {
        if(lastEmojiBtn) lastEmojiBtn.innerText = e;
        closeEmojiModal();
    }

    // --- 4. GESTION IMAGES ---
    function openFile(target) {
        uploadTarget = target;
        document.getElementById('hidden-file').click();
    }

    function previewImg(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = document.getElementById('img-' + uploadTarget);
                const icon = document.getElementById('icon-' + uploadTarget);
                img.src = e.target.result;
                img.style.display = 'block';
                if(icon) icon.style.display = 'none';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    // --- INITIALISATION MOBILE ---
    if(window.innerWidth < 768) {
        document.getElementById('sidebar').classList.add('collapsed');
    }

    function deployEmbed() {
        const chan = document.getElementById('channel-list').value;
        alert("Envoi en cours vers le salon ID: " + chan);
    }
</script>
</body>
</html>

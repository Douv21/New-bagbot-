<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BagBot Dashboard - Red & Black</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --accent: #ed4245; /* Rouge Discord */
            --bg-main: #000000; /* Noir Pur */
            --bg-card: #111214; /* Gris très sombre */
            --text: #ffffff;
            --text-muted: #949ba4;
            --border: #2b2d31;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
        }

        /* SIDEBAR */
        #sidebar {
            width: 260px;
            background: #050505;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: 0.3s;
        }

        #sidebar.collapsed { width: 0; overflow: hidden; }

        .nav-item {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            color: var(--text-muted);
        }

        .nav-item.active {
            color: var(--accent);
            background: rgba(237, 66, 69, 0.1);
            border-left: 4px solid var(--accent);
        }

        /* MAIN CONTENT */
        .main { flex-grow: 1; display: flex; flex-direction: column; }
        
        .header {
            height: 60px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 20px;
            background: #0a0a0a;
        }

        .workspace {
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* EMBED PREVIEW */
        .embed {
            width: 100%;
            max-width: 500px;
            background: var(--bg-card);
            border-left: 4px solid var(--accent);
            padding: 15px;
            border-radius: 4px;
        }

        /* SELECTORS */
        .controls {
            width: 100%;
            max-width: 500px;
            margin-top: 20px;
        }

        select, input, textarea {
            width: 100%;
            background: #1e1f22;
            border: 1px solid #000;
            color: white;
            padding: 12px;
            margin-top: 10px;
            border-radius: 4px;
            outline: none;
        }

        .btn-add {
            background: #313338;
            color: white;
            border: none;
            padding: 10px;
            margin: 10px 0;
            width: 100%;
            cursor: pointer;
        }

        .btn-send {
            background: var(--accent);
            color: white;
            border: none;
            padding: 15px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
        }

        .reaction-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <div style="padding: 20px; font-weight: bold; color: var(--accent);">BAGBOT DASHBOARD</div>
        <div class="nav-item active"><i class="fas fa-plus"></i> Nouveau Message</div>
        <div class="nav-item"><i class="fas fa-cog"></i> Paramètres</div>
    </div>

    <div class="main">
        <div class="header">
            <i class="fas fa-bars" onclick="document.getElementById('sidebar').classList.toggle('collapsed')" style="cursor:pointer; margin-right: 15px;"></i>
            <span>Constructeur d'Embed</span>
        </div>

        <div class="workspace">
            <div class="embed">
                <input type="text" placeholder="Titre de l'embed" style="background:transparent; border:none; font-size: 18px; font-weight: bold;">
                <textarea placeholder="Description..." style="background:transparent; border:none; resize: none;"></textarea>
            </div>

            <div class="controls">
                <label style="font-size: 12px; color: var(--text-muted);">SALON DISCORD</label>
                <select id="channel-select">
                    <option>Chargement des salons...</option>
                </select>

                <div id="reactions-container" style="margin-top: 20px;">
                    <label style="font-size: 12px; color: var(--text-muted);">RÔLES-RÉACTIONS</label>
                </div>

                <button class="btn-add" onclick="addReactionRow()">+ Ajouter une réaction</button>
                <button class="btn-send">DÉPLOYER L'EMBED</button>
            </div>
        </div>
    </div>

<script>
    let rolesData = [];

    async function loadData() {
        try {
            const response = await fetch('/api/get_server_info');
            const data = await response.json();
            
            // Remplissage des salons
            const select = document.getElementById('channel-select');
            select.innerHTML = data.channels.map(c => `<option value="${c.id}"># ${c.name}</option>`).join('');
            
            // Stockage des rôles
            rolesData = data.roles;
        } catch (e) {
            console.error("Erreur de chargement", e);
        }
    }

    function addReactionRow() {
        const container = document.getElementById('reactions-container');
        const row = document.createElement('div');
        row.className = 'reaction-row';
        
        const roleOptions = rolesData.map(r => `<option value="${r.id}">${r.name}</option>`).join('');
        
        row.innerHTML = `
            <div style="background:#2b2d31; padding:10px; border-radius:4px; cursor:pointer;">😀</div>
            <select style="margin-top:0;">${roleOptions}</select>
            <i class="fas fa-trash" onclick="this.parentElement.remove()" style="color:var(--accent); cursor:pointer;"></i>
        `;
        container.appendChild(row);
    }

    window.onload = loadData;
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BagBot Designer Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #ed4245; --bg: #000000; --sidebar-w: 240px; --border: #2b2d31; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; }

        /* SIDEBAR VERROUILLÉE */
        #sidebar { width: var(--sidebar-w); background: #080808; border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; transition: width 0.3s; z-index: 1000; }
        #sidebar.collapsed { width: 0; overflow: hidden; border: none; }
        .nav-item { padding: 15px 20px; color: #949ba4; display: flex; align-items: center; gap: 10px; cursor: pointer; border-left: 4px solid transparent; }
        .nav-item.active { background: rgba(237,66,69,0.1); color: white; border-left-color: var(--accent); }

        /* CONTENU PRINCIPAL */
        .main { flex-grow: 1; display: flex; flex-direction: column; min-width: 0; position: relative; }
        .top-bar { height: 60px; background: #050505; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; gap: 15px; }
        .view-area { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; align-items: center; }

        /* EMBED STRUCTURELLE (FIXE) */
        .embed-card { width: 100%; max-width: 500px; background: #1e1f22; border-left: 4px solid var(--accent); border-radius: 4px; padding: 16px; margin-bottom: 25px; position: relative; }
        
        /* Thumbnail à droite du titre sans chevauchement */
        .header-row { display: flex; justify-content: space-between; gap: 15px; margin-bottom: 10px; }
        .text-fields { flex: 1; }
        .thumb-box { width: 80px; height: 80px; background: rgba(0,0,0,0.3); border: 2px dashed var(--border); border-radius: 4px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; }
        
        .inp { background: transparent; border: none; color: white; outline: none; width: 100%; }
        .title-inp { font-size: 18px; font-weight: bold; margin-bottom: 8px; }
        .desc-inp { font-size: 14px; min-height: 60px; resize: none; color: #dbdee1; }
        
        .banner-box { width: 100%; height: 160px; background: rgba(0,0,0,0.3); border: 2px dashed var(--border); margin-top: 15px; border-radius: 4px; display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; }
        .img-prev { width: 100%; height: 100%; object-fit: cover; }

        /* FORMULAIRE */
        .controls { width: 100%; max-width: 500px; padding-bottom: 100px; }
        .label { font-size: 11px; font-weight: 800; color: #949ba4; text-transform: uppercase; margin: 20px 0 8px; display: block; }
        .select-box { width: 100%; background: #111214; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 4px; outline: none; }

        .btn { width: 100%; padding: 15px; border-radius: 4px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-add { background: #2b2d31; color: white; margin-top: 10px; }
        .btn-send { background: var(--accent); color: white; margin-top: 30px; font-size: 16px; }

        .reac-item { display: flex; align-items: center; gap: 10px; background: #080808; padding: 10px; border-radius: 6px; margin-top: 10px; border: 1px solid var(--border); }
    </style>
</head>
<body>

    <div id="sidebar">
        <div style="padding: 25px 20px; font-weight: 900; color: var(--accent); font-size: 22px;">BAGBOT</div>
        <div class="nav-item active"><i class="fas fa-envelope"></i> Embeds/Message</div>
        <div class="nav-item"><i class="fas fa-cog"></i> Paramètres</div>
    </div>

    <div class="main">
        <div class="top-bar">
            <i class="fas fa-bars" onclick="toggleSide()" style="color:var(--accent); cursor:pointer;"></i>
            <span style="font-weight: bold; font-size: 14px;">DASHBOARD</span>
        </div>

        <div class="view-area">
            <div class="embed-card">
                <div class="header-row">
                    <div class="text-fields">
                        <input type="text" class="inp title-inp" value="Titre de l'Embed">
                        <textarea class="inp desc-inp" placeholder="Votre message ici..."></textarea>
                    </div>
                    <div class="thumb-box" onclick="pick('thumb')">
                        <i class="fas fa-plus" id="icon-thumb"></i>
                        <img id="img-thumb" class="img-prev" style="display:none">
                    </div>
                </div>
                <div class="banner-box" onclick="pick('banner')">
                    <i class="fas fa-image" id="icon-banner" style="font-size: 24px;"></i>
                    <img id="img-banner" class="img-prev" style="display:none">
                </div>
            </div>

            <div class="controls">
                <label class="label">Salon de destination</label>
                <select id="select-chan" class="select-box">
                    <option>Chargement en cours...</option>
                </select>

                <div id="reac-list"></div>
                <button class="btn btn-add" onclick="addRow()"><i class="fas fa-plus"></i> Ajouter une réaction</button>
                <button class="btn btn-send">DÉPLOYER</button>
            </div>
        </div>
    </div>

    <input type="file" id="hidden-file" style="display:none" onchange="preview(this)">

<script>
    let roleStore = [];
    let currentMode = "";

    function toggleSide() { document.getElementById('sidebar').classList.toggle('collapsed'); }

    // FORCE LA CONNEXION AU PORT 49501
    async function loadData() {
        try {
            const response = await fetch('/api/get_server_info'); 
            const data = await response.json();
            
            if(data.error) throw new Error(data.error);

            roleStore = data.roles || [];
            document.getElementById('select-chan').innerHTML = data.channels.map(c => 
                `<option value="${c.id}"># ${c.name}</option>`
            ).join('');
        } catch(e) {
            document.getElementById('select-chan').innerHTML = "<option>Bot hors ligne (Vérifiez Termux)</option>";
        }
    }

    function pick(m) { currentMode = m; document.getElementById('hidden-file').click(); }

    function preview(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('img-' + currentMode).src = e.target.result;
                document.getElementById('img-' + currentMode).style.display = 'block';
                document.getElementById('icon-' + currentMode).style.display = 'none';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function addRow() {
        const div = document.createElement('div');
        div.className = 'reac-item';
        div.innerHTML = `
            <span>😀</span>
            <select class="select-box" style="border:none;">
                ${roleStore.map(r => `<option value="${r.id}">${r.name}</option>`).join('')}
            </select>
            <i class="fas fa-trash" onclick="this.parentElement.remove()" style="color:var(--accent); cursor:pointer;"></i>
        `;
        document.getElementById('reac-list').appendChild(div);
    }

    window.onload = loadData;
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BagBot OS | Master</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #ed4245; --bg: #050505; --card: #111214; --embed: #2b2d31; --text-m: #949ba4; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; display: flex; height: 100vh; }

        /* SIDEBAR RÉTRACTABLE */
        #sidebar { 
            width: 260px; background: #000; border-right: 1px solid #2b2d31; 
            position: fixed; left: -260px; height: 100%; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 2000;
        }
        #sidebar.open { left: 0; }
        .sidebar-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; z-index: 1999; }
        .sidebar-overlay.active { display: block; }
        .nav-item { padding: 18px 25px; display: flex; align-items: center; gap: 12px; color: var(--text-m); font-weight: bold; }
        .nav-item.active { background: rgba(237,66,69,0.1); color: var(--accent); }

        /* VIEWPORT */
        .viewport { flex: 1; display: flex; flex-direction: column; width: 100%; }
        header { height: 60px; background: #080808; display: flex; align-items: center; padding: 0 15px; border-bottom: 1px solid #2b2d31; gap: 15px; flex-shrink: 0; }
        .content { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; align-items: center; padding-bottom: 50px; }

        /* EMBED DISCORD COMPLET */
        .embed { background: var(--embed); border-left: 4px solid var(--accent); border-radius: 4px; padding: 12px; width: 100%; max-width: 500px; position: relative; }
        .author { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-size: 13px; font-weight: bold; }
        .author img { width: 22px; height: 22px; border-radius: 50%; }
        .title { font-size: 16px; font-weight: bold; margin-bottom: 5px; }
        .desc { font-size: 14px; color: #dbdee1; line-height: 1.4; }
        .thumb { width: 70px; height: 70px; background: #1e1f22; border-radius: 4px; float: right; border: 1px dashed #444; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .banner { width: 100%; height: 150px; background: #1e1f22; border-radius: 4px; border: 1px dashed #444; margin-top: 12px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .footer { display: flex; align-items: center; gap: 8px; margin-top: 12px; font-size: 11px; color: var(--text-m); }
        .footer img { width: 18px; height: 18px; border-radius: 50%; }
        .clickable { cursor: pointer; border: 1px solid transparent; }
        .clickable:active { border-color: var(--accent); background: rgba(255,255,255,0.05); }

        /* MODALES */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 3000; display: none; padding: 20px; }
        .modal.active { display: flex; }
        .modal-content { background: var(--card); border-radius: 15px; padding: 20px; max-width: 500px; width: 100%; margin: auto; max-height: 85vh; overflow-y: auto; }
        
        input, textarea, select { width: 100%; background: #000; border: 1px solid #2b2d31; color: white; padding: 14px; border-radius: 8px; margin-bottom: 12px; }
        .btn { width: 100%; background: var(--accent); color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .btn-outline { background: transparent; border: 1px solid #444; margin-bottom: 10px; }

        /* GALERIE */
        .gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; }
        .gallery-item { aspect-ratio: 1; background: #000; border-radius: 5px; overflow: hidden; position: relative; border: 2px solid transparent; }
        .gallery-item.selected { border-color: var(--accent); }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }
        .del-img { position: absolute; top: 0; right: 0; background: red; color: white; border: none; font-size: 10px; padding: 2px 5px; border-bottom-left-radius: 5px; }
    </style>
</head>
<body>

    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>
    <nav id="sidebar">
        <div style="padding: 35px 25px; color: var(--accent); font-weight: 900; font-size: 22px;">BAGBOT</div>
        <div class="nav-item active"><i class="fas fa-home"></i> ACCUEIL</div>
        <div class="nav-item"><i class="fas fa-shield-alt"></i> AUTO-MOD</div>
    </nav>

    <div class="viewport">
        <header>
            <i class="fas fa-bars" onclick="toggleSidebar()" style="font-size: 20px;"></i>
            <span style="font-weight: 800;">CONFIGURATION ACCUEIL</span>
        </header>

        <div class="content">
            <div class="embed">
                <div class="author clickable" onclick="openImageEdit('author')">
                    <img id="p-auth-img" src=""> <span id="p-auth-name">Bot</span>
                </div>
                <div style="display: flex; justify-content: space-between;">
                    <div style="flex:1">
                        <div class="title clickable" id="p-title" onclick="openTextEdit('title')">Titre</div>
                        <div class="desc clickable" id="p-desc" onclick="openTextEdit('desc')">Description...</div>
                    </div>
                    <div class="thumb clickable" id="p-thumb-box" onclick="openImageEdit('thumb')"><i class="fas fa-plus"></i></div>
                </div>
                <div class="banner clickable" id="p-banner-box" onclick="openImageEdit('banner')"><i class="fas fa-image"></i></div>
                <div class="footer clickable" onclick="openTextEdit('footer')">
                    <img id="p-foot-img" src=""> <span id="p-foot-text">ID: {user_id} • BagBot</span>
                </div>
            </div>

            <div style="width: 100%; max-width: 500px; margin-top: 20px;">
                <label style="font-size: 11px; color: var(--text-m); font-weight: bold;">SALON CIBLE</label>
                <select id="chan-list"></select>
                <button class="btn" onclick="saveAll()">DÉPLOYER SUR DISCORD</button>
            </div>
        </div>
    </div>

    <div id="textModal" class="modal"><div class="modal-content">
        <h4 id="tModalTitle" style="margin-bottom: 15px;">ÉDITER</h4>
        <textarea id="tInput" rows="5"></textarea>
        <button class="btn" onclick="applyText()">APPLIQUER</button>
        <button class="btn btn-outline" onclick="closeM()">ANNULER</button>
    </div></div>

    <div id="imgModal" class="modal"><div class="modal-content">
        <h4 style="margin-bottom: 15px;">SÉLECTION IMAGE</h4>
        <input type="text" id="imgUrl" placeholder="Lien URL (Optionnel)">
        <input type="file" id="fileIn" style="display:none" onchange="upload(event)">
        <button class="btn btn-outline" onclick="document.getElementById('fileIn').click()">TÉLÉVERSER IMAGE</button>
        <div class="gallery" id="gal"></div>
        <button class="btn" onclick="applyImg()" style="margin-top:15px;">VALIDER</button>
        <button class="btn btn-outline" onclick="closeM()">FERMER</button>
    </div></div>

    <script>
        let current = '', selImg = '';
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); document.querySelector('.sidebar-overlay').classList.toggle('active'); }
        function closeM() { document.querySelectorAll('.modal').forEach(m => m.classList.remove('active')); }
        
        function openTextEdit(type) {
            current = type;
            document.getElementById('tInput').value = (type === 'title') ? document.getElementById('p-title').innerText : (type === 'footer' ? document.getElementById('p-foot-text').innerText : document.getElementById('p-desc').innerText);
            document.getElementById('textModal').classList.add('active');
        }

        function openImageEdit(type) { current = type; loadGal(); document.getElementById('imgModal').classList.add('active'); }

        function applyText() {
            const v = document.getElementById('tInput').value;
            if(current==='title') document.getElementById('p-title').innerText=v;
            if(current==='desc') document.getElementById('p-desc').innerText=v;
            if(current==='footer') document.getElementById('p-foot-text').innerText=v;
            closeM();
        }

        async function upload(e) {
            const fd = new FormData(); fd.append('file', e.target.files[0]);
            await fetch('/api/upload', {method:'POST', body:fd}); loadGal();
        }

        async function loadGal() {
            const res = await fetch('/api/images'); const data = await res.json();
            document.getElementById('gal').innerHTML = data.images.map(u => `
                <div class="gallery-item ${selImg===u?'selected':''}" onclick="selImg='${u}';loadGal()">
                    <img src="${u}"><button class="del-img" onclick="delImg(event,'${u}')">X</button>
                </div>`).join('');
        }

        async function delImg(e,u) { e.stopPropagation(); await fetch('/api/images/delete',{method:'POST',headers:{'Content-Type':'application/json'},body:json.stringify({url:u})}); loadGal(); }

        function applyImg() {
            const u = document.getElementById('imgUrl').value || selImg;
            if(current==='author') document.getElementById('p-auth-img').src=u;
            if(current==='thumb') document.getElementById('p-thumb-box').innerHTML=`<img src="${u}" style="width:100%;height:100%;object-fit:cover">`;
            if(current==='banner') document.getElementById('p-banner-box').innerHTML=`<img src="${u}" style="width:100%;height:100%;object-fit:cover">`;
            closeM();
        }

        async function saveAll() {
            const payload = {
                title: document.getElementById('p-title').innerText,
                desc: document.getElementById('p-desc').innerText,
                channel: document.getElementById('chan-list').value,
                banner: document.querySelector('#p-banner-box img')?.src || ""
            };
            await fetch('/api/save_settings', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
            alert("✅ Enregistré !");
        }

        window.onload = async () => {
            const res = await fetch('/api/get_server_info'); const data = await res.json();
            document.getElementById('chan-list').innerHTML = data.channels.map(c => `<option value="${c.id}"># ${c.name}</option>`).join('');
            document.getElementById('p-auth-img').src = data.bot.avatar; document.getElementById('p-foot-img').src = data.bot.avatar;
            document.getElementById('p-auth-name').innerText = data.bot.name;
        };
    </script>
</body>
</html>

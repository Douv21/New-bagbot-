<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>BagBot Designer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #ff4d4d; --bg: #111214; --card: #2b2d31; --text: #dbdee1; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .discord-msg { background: #313338; border-radius: 8px; padding: 15px; width: 100%; max-width: 500px; margin-bottom: 20px; box-sizing: border-box; }
        .embed { background: #1e1f22; border-left: 4px solid var(--accent); border-radius: 4px; padding: 12px; position: relative; }
        .up-slot { border: 1px dashed #4e5058; border-radius: 4px; display: flex; align-items: center; justify-content: center; cursor: pointer; background: rgba(0,0,0,0.2); position: relative; overflow: hidden; }
        .up-slot img { width: 100%; height: 100%; object-fit: cover; position: absolute; top:0; left:0; }
        .thumb-slot { position: absolute; top: 12px; right: 12px; width: 60px; height: 60px; }
        .banner-slot { width: 100%; min-height: 100px; margin: 10px 0; }
        .embed-title { font-size: 16px; font-weight: 700; color: white; margin: 10px 0 5px; outline: none; }
        .embed-desc { font-size: 14px; color: #dbdee1; min-height: 40px; outline: none; white-space: pre-wrap; }
        
        .card { background: var(--card); border-radius: 12px; padding: 15px; width: 100%; max-width: 500px; box-sizing: border-box; }
        .reaction-row { background: #1e1f22; border-radius: 8px; padding: 10px; display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .emoji-trigger { width: 40px; height: 40px; background: #2b2d31; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .emoji-trigger img { width: 28px; height: 28px; }
        
        #imgModal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; display: none; align-items: center; justify-content: center; }
        .modal-box { background: var(--card); padding: 20px; border-radius: 12px; width: 80%; max-width: 300px; }
        #emojiPicker { position: fixed; bottom: 0; left: 0; width: 100%; height: 60vh; background: #111214; display: none; flex-direction: column; z-index: 1000; border-radius: 20px 20px 0 0; border-top: 2px solid var(--accent); }
        .emoji-scroll { flex: 1; overflow-y: auto; padding: 15px; display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
        .btn-deploy { background: var(--accent); color: white; border: none; padding: 16px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>

    <h3 style="margin-bottom: 20px;">BagBot Dashboard</h3>

    <div class="discord-msg">
        <div class="embed">
            <div class="up-slot thumb-slot" onclick="openImgChoice('thumb')">
                <i class="fas fa-plus" id="ic-thumb"></i>
                <img id="v-thumb" style="display:none">
            </div>
            <div style="display:flex; align-items:center; gap:8px;">
                <div class="up-slot" onclick="openImgChoice('auth')" style="width:20px; height:20px; border-radius:50%">
                    <img id="v-auth" style="display:none">
                </div>
                <span contenteditable="true" id="txt-auth" style="font-size:13px; font-weight:600; color:white;">Auteur</span>
            </div>
            <div class="embed-title" contenteditable="true" id="txt-title">Titre du message</div>
            <div class="embed-desc" contenteditable="true" id="txt-desc">Cliquez pour modifier la description...</div>
            <div class="up-slot banner-slot" onclick="openImgChoice('banner')">
                <i class="fas fa-image" id="ic-banner" style="font-size: 24px;"></i>
                <img id="v-banner" style="display:none">
            </div>
        </div>
    </div>

    <div class="card">
        <select id="sel-chans"></select>
        <select id="sel-mode">
            <option value="multiple">Mode Multiple (Libre)</option>
            <option value="unique">Mode Unique (1 seul rôle)</option>
            <option value="definitif">Mode Définitif (Permanent)</option>
        </select>
        <div id="reacs-box"></div>
        <button onclick="addReacRow()" style="width:100%; padding:10px; background:#3a3c41; color:white; border:none; border-radius:5px; cursor:pointer;">+ AJOUTER UN RÔLE</button>
        <button class="btn-deploy" onclick="deploy()">🚀 DÉPLOYER SUR DISCORD</button>
    </div>

    <div id="imgModal">
        <div class="modal-box">
            <button onclick="document.getElementById('f-in').click()" style="width:100%; padding:10px; background:#d37f6a; border:none; color:white; border-radius:5px; margin-bottom:10px;">Téléverser fichier</button>
            <button onclick="promptUrl()" style="width:100%; padding:10px; background:#444; border:none; color:white; border-radius:5px;">Lien URL</button>
            <button onclick="closeImgChoice()" style="background:none; border:none; color:white; width:100%; margin-top:15px;">Fermer</button>
        </div>
    </div>

    <div id="emojiPicker">
        <div class="emoji-scroll" id="grid-emoji"></div>
        <button onclick="document.getElementById('emojiPicker').style.display='none'" style="padding:15px; background:#000; color:var(--accent); border:none; font-weight:bold;">FERMER</button>
    </div>

    <input type="file" id="f-in" style="display:none" onchange="handleFile(this)">

<script>
    const API = "http://192.168.1.133:49501";
    let roles = [], activeBtn = null, curZone = null;

    async function init() {
        const rc = await fetch(`${API}/api/channels`).then(r => r.json());
        document.getElementById('sel-chans').innerHTML = rc.map(c => `<option value="${c.id}"># ${c.name}</option>`).join('');
        
        const rr = await fetch(`${API}/api/roles`).then(r => r.json());
        roles = rr;

        const re = await fetch(`${API}/api/emojis`).then(r => r.json());
        const grid = document.getElementById('grid-emoji');
        // Emojis du serveur
        grid.innerHTML = re.map(e => `<div style="cursor:pointer" onclick="pickEmoji('${e.id}', true, '${e.url}')"><img src="${e.url}" style="width:32px"></div>`).join('');
        // Standards
        const stds = ['😀','✅','❌','🔥','⭐','✨','⚡','🔞','🎁','🏆'];
        grid.innerHTML += stds.map(s => `<div style="font-size:28px; cursor:pointer" onclick="pickEmoji('${s}', false)">${s}</div>`).join('');
    }

    function openImgChoice(z) { curZone = z; document.getElementById('imgModal').style.display = 'flex'; }
    function closeImgChoice() { document.getElementById('imgModal').style.display = 'none'; }
    function promptUrl() {
        const url = prompt("Lien HTTP de l'image :");
        if(url) updateImg(url);
        closeImgChoice();
    }

    async function handleFile(input) {
        if(!input.files[0]) return;
        let fd = new FormData(); fd.append('file', input.files[0]);
        let res = await fetch(`${API}/api/upload`, {method:'POST', body:fd});
        let data = await res.json();
        updateImg(data.url);
        closeImgChoice();
    }

    function updateImg(url) {
        const v = document.getElementById(`v-${curZone}`);
        v.src = url; v.style.display = 'block';
        if(document.getElementById(`ic-${curZone}`)) document.getElementById(`ic-${curZone}`).style.display = 'none';
    }

    function addReacRow() {
        const div = document.createElement('div');
        div.className = 'reaction-row';
        div.innerHTML = `<div class="emoji-trigger" onclick="openPicker(this)">😀</div>
            <select style="flex:1; background:#111; color:white; border:none; padding:10px; border-radius:5px;">${roles.map(r => `<option value="${r.id}">${r.name}</option>`).join('')}</select>
            <i class="fas fa-trash" onclick="this.parentElement.remove()"></i>`;
        document.getElementById('reacs-box').appendChild(div);
    }

    function openPicker(b) { activeBtn = b; document.getElementById('emojiPicker').style.display = 'flex'; }
    function pickEmoji(val, isCust, url) {
        activeBtn.innerHTML = isCust ? `<img src="${url}" data-id="${val}">` : val;
        if(!isCust) activeBtn.removeAttribute('data-id');
        document.getElementById('emojiPicker').style.display = 'none';
    }

    async function deploy() {
        const reactions = Array.from(document.querySelectorAll('.reaction-row')).map(row => ({
            emoji: row.querySelector('.emoji-trigger img')?.getAttribute('data-id') || row.querySelector('.emoji-trigger').innerText,
            roleId: row.querySelector('select').value
        }));

        await fetch(`${API}/api/deploy`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                channelId: document.getElementById('sel-chans').value,
                mode: document.getElementById('sel-mode').value,
                title: document.getElementById('txt-title').innerText,
                description: document.getElementById('txt-desc').innerText,
                author: document.getElementById('txt-auth').innerText,
                author_img: document.getElementById('v-auth').style.display === 'block' ? document.getElementById('v-auth').src : null,
                thumbnail: document.getElementById('v-thumb').style.display === 'block' ? document.getElementById('v-thumb').src : null,
                banner: document.getElementById('v-banner').style.display === 'block' ? document.getElementById('v-banner').src : null,
                reactions: reactions
            })
        });
        alert("Déploiement envoyé !");
    }
    window.onload = init;
</script>
</body>
</html>

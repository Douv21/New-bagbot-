<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BAGBOT DASHBOARD ELITE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #0a0a0a; --card: #141414; --accent: #ed4245; --border: #252525; --d-bg: #2b2d31; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { margin: 0; background: var(--bg); color: #fff; height: 100vh; overflow: hidden; }

        .header { position: fixed; top: 0; left: 0; right: 0; height: 60px; background: #000; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; z-index: 2500; }
        .burger { font-size: 22px; color: var(--accent); cursor: pointer; }
        
        #sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100vh; background: #000; z-index: 3000; transition: 0.3s; border-right: 1px solid var(--border); }
        #sidebar.open { left: 0; }
        .nav-item { padding: 20px; border-bottom: 1px solid #111; cursor: pointer; display: flex; align-items: center; justify-content: space-between; color: #888; font-weight: bold; }
        .nav-item.active { color: var(--accent); background: #ed424510; }
        .submenu { display: none; background: #050505; }
        .submenu.show { display: block; }
        .sub-item { padding: 15px 55px; cursor: pointer; color: #666; font-size: 14px; border-bottom: 1px solid #0a0a0a; }
        .sub-item.active { color: var(--accent); background: #111; }

        main { height: 100vh; overflow-y: auto; padding: 80px 15px 150px; position: relative; z-index: 1000; }
        .section { display: none; max-width: 600px; margin: 0 auto; }
        .section.active { display: block; }

        .preview { background: var(--d-bg); border-left: 4px solid var(--accent); border-radius: 4px; padding: 15px; margin-bottom: 25px; }
        .pv-top { display: flex; justify-content: space-between; gap: 10px; }
        .pv-container { position: relative; }
        .pv-thumb { width: 65px; height: 65px; background: #222; border-radius: 4px; border: 1px dashed #444; overflow: hidden; cursor: pointer; }
        .pv-banner { width: 100%; height: 140px; background: #222; border-radius: 8px; margin-top: 10px; border: 1px dashed #444; overflow: hidden; cursor: pointer; }
        .pv-f-icon { width: 20px; height: 20px; border-radius: 50%; background: #222; overflow: hidden; border: 1px dashed #444; cursor: pointer; }
        .remove-img { position: absolute; top: -5px; right: -5px; background: var(--accent); color: white; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; cursor: pointer; border: 2px solid var(--d-bg); z-index: 10; font-weight: bold; }
        img { width: 100%; height: 100%; object-fit: cover; display: none; }

        .card { background: var(--card); border-radius: 20px; padding: 25px; border: 1px solid var(--border); margin-bottom: 20px; }
        h2 { font-size: 18px; margin: 0 0 20px; color: #fff; }
        label { display: block; font-size: 11px; color: #555; text-transform: uppercase; margin: 15px 0 5px; font-weight: bold; }
        
        input[type="color"] { -webkit-appearance: none; border: none; width: 100%; height: 15px; background: #1a1a1a; border-radius: 10px; cursor: pointer; padding: 0; margin-bottom: 10px; }
        input[type="text"], textarea, select { width: 100%; background: #000; border: 1px solid var(--border); color: #fff; padding: 14px; border-radius: 10px; outline: none; margin-bottom: 5px; font-size: 14px; }
        
        .dropdown-select { background: #000; border: 1px solid var(--border); padding: 14px; border-radius: 10px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .dropdown-content { display: none; background: #050505; border: 1px solid var(--border); border-radius: 10px; max-height: 200px; overflow-y: auto; margin-top: 5px; }
        .dropdown-content.show { display: block; }
        .role-opt { padding: 12px 15px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #111; cursor: pointer; }

        .btn-group { display: flex; gap: 10px; margin-top: 25px; }
        .btn { border: none; padding: 16px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s; }
        .btn-save { background: var(--accent); color: white; }
        .btn-test { background: #5865F2; color: white; }

        .gallery-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 15px; }
        .img-card { height: 110px; border-radius: 10px; border: 1px solid var(--border); position: relative; overflow: hidden; background: #000; }
        .del-img-btn { position: absolute; top: 5px; right: 5px; background: var(--accent); color: white; border: none; border-radius: 5px; padding: 5px 8px; cursor: pointer; z-index: 20; }
    </style>
</head>
<body>

    <div class="header">
        <i class="fas fa-bars burger" onclick="toggleSidebar(event)"></i>
        <div style="margin-left: 20px; font-weight: 900; color: var(--accent); letter-spacing: 1px;">BAGBOT DASHBOARD</div>
    </div>

    <div id="sidebar">
        <div style="padding: 40px 20px; text-align: center; color: var(--accent); font-weight: 900; font-size: 18px;">V9 ELITE</div>
        <div class="nav-item" onclick="toggleSubmenu('sub-cd', event)">
            <span>CONFIGURATION</span><i class="fas fa-chevron-down"></i>
        </div>
        <div id="sub-cd" class="submenu show">
            <div id="mi-welcome" class="sub-item" onclick="showTab('welcome', this)">Bienvenue</div>
            <div id="mi-leave" class="sub-item" onclick="showTab('leave', this)">Départ</div>
        </div>
        <div id="mi-admin" class="nav-item" onclick="showTab('admin', this)">PERMISSIONS</div>
        <div id="mi-gallery" class="nav-item" onclick="showTab('gallery', this)">GALERIE MÉDIAS</div>
    </div>

    <main onclick="closeSidebar()">
        <div id="welcome" class="section">
            <div class="preview" id="pv-box-welcome">
                <div class="pv-top">
                    <div style="flex-grow:1">
                        <div id="pv-w-title" style="color:#00a8fc; font-weight:bold;">Titre</div>
                        <div id="pv-w-desc" style="font-size:14px; margin-top:5px; white-space:pre-wrap;">Message...</div>
                    </div>
                    <div class="pv-container">
                        <div class="remove-img" onclick="detachImg(event, 'welcome', 'thumbnail')">×</div>
                        <div class="pv-thumb" onclick="openPicker('welcome', 'thumbnail')"><img id="w-img-thumb"></div>
                    </div>
                </div>
                <div class="pv-container">
                    <div class="remove-img" onclick="detachImg(event, 'welcome', 'banner')">×</div>
                    <div class="pv-banner" onclick="openPicker('welcome', 'banner')"><img id="w-img-banner"></div>
                </div>
                <div style="display:flex; align-items:center; gap:8px; margin-top:10px; font-size:11px; color:#b5bac1;">
                    <div class="pv-container">
                        <div class="remove-img" onclick="detachImg(event, 'welcome', 'footer_icon')" style="top:-3px; right:-3px;">×</div>
                        <div class="pv-f-icon" onclick="openPicker('welcome', 'footer_icon')"><img id="w-img-footer"></div>
                    </div>
                    <span id="pv-w-footer">Footer</span>
                </div>
            </div>
            <div class="card">
                <h2>Message de Bienvenue</h2>
                <label>Couleur</label><input type="color" id="w-color" oninput="sync('welcome')">
                <label>Titre</label><input type="text" id="w-title" oninput="sync('welcome')">
                <label>Description</label><textarea id="w-desc" rows="4" oninput="sync('welcome')"></textarea>
                <label>Texte Footer</label><input type="text" id="w-footer" oninput="sync('welcome')">
                <label>Salon</label><select id="w-channel"></select>
                <label>Rôles Automatiques</label>
                <div class="dropdown-select" onclick="toggleDropdown('w-roles-drop', event)"><span id="w-roles-label">0 sélectionnés</span><i class="fas fa-chevron-down"></i></div>
                <div id="w-roles-drop" class="dropdown-content"></div>
                <div class="btn-group">
                    <button class="btn btn-save" onclick="save()"><i class="fas fa-save"></i> SAUVEGARDER</button>
                    <button class="btn btn-test" onclick="sendTest('welcome')"><i class="fas fa-syringe"></i> TEST</button>
                </div>
            </div>
        </div>

        <div id="leave" class="section">
            <div class="preview" id="pv-box-leave">
                <div class="pv-top">
                    <div style="flex-grow:1">
                        <div id="pv-l-title" style="color:#00a8fc; font-weight:bold;">Titre</div>
                        <div id="pv-l-desc" style="font-size:14px; margin-top:5px; white-space:pre-wrap;">Message...</div>
                    </div>
                    <div class="pv-container">
                        <div class="remove-img" onclick="detachImg(event, 'leave', 'thumbnail')">×</div>
                        <div class="pv-thumb" onclick="openPicker('leave', 'thumbnail')"><img id="l-img-thumb"></div>
                    </div>
                </div>
                <div class="pv-container">
                    <div class="remove-img" onclick="detachImg(event, 'leave', 'banner')">×</div>
                    <div class="pv-banner" onclick="openPicker('leave', 'banner')"><img id="l-img-banner"></div>
                </div>
                <div style="display:flex; align-items:center; gap:8px; margin-top:10px; font-size:11px; color:#b5bac1;">
                    <div class="pv-container">
                        <div class="remove-img" onclick="detachImg(event, 'leave', 'footer_icon')" style="top:-3px; right:-3px;">×</div>
                        <div class="pv-f-icon" onclick="openPicker('leave', 'footer_icon')"><img id="l-img-footer"></div>
                    </div>
                    <span id="pv-l-footer">Footer</span>
                </div>
            </div>
            <div class="card">
                <h2>Message de Départ</h2>
                <label>Couleur</label><input type="color" id="l-color" oninput="sync('leave')">
                <label>Titre</label><input type="text" id="l-title" oninput="sync('leave')">
                <label>Description</label><textarea id="l-desc" rows="4" oninput="sync('leave')"></textarea>
                <label>Texte Footer</label><input type="text" id="l-footer" oninput="sync('leave')">
                <label>Salon</label><select id="l-channel"></select>
                <div class="btn-group">
                    <button class="btn btn-save" onclick="save()"><i class="fas fa-save"></i> SAUVEGARDER</button>
                    <button class="btn btn-test" onclick="sendTest('leave')"><i class="fas fa-syringe"></i> TEST</button>
                </div>
            </div>
        </div>

        <div id="admin" class="section">
            <div class="card">
                <h2>Permissions Dashboard</h2>
                <label>Rôles autorisés</label>
                <div class="dropdown-select" onclick="toggleDropdown('admin-roles-drop', event)"><span id="admin-roles-label">Choisir les rôles</span><i class="fas fa-chevron-down"></i></div>
                <div id="admin-roles-drop" class="dropdown-content"></div>
                <button class="btn btn-save" onclick="save()" style="margin-top:20px;">APPLIQUER</button>
            </div>
        </div>

        <div id="gallery" class="section">
            <div class="card">
                <h2>Galerie Médias</h2>
                <input type="file" id="f-in" onchange="uploadFile()" style="margin-bottom:20px;">
                <div id="g-list" class="gallery-grid"></div>
                <button class="btn btn-save" onclick="showTab(localStorage.getItem('lastTab') || 'welcome')" style="margin-top:20px;">RETOUR</button>
            </div>
        </div>
    </main>

    <script>
        let db = { channels: [], roles: [], config: {}, images: [] };
        let activeMode = ''; let activeType = '';

        async function init() {
            try {
                const res = await fetch('/api/get_data');
                if(!res.ok) throw new Error("API Offline");
                db = await res.json();
                
                // Remplissage salons
                const chans = db.channels.map(c => `<option value="${c.id}"># ${c.name}</option>`).join('');
                document.getElementById('w-channel').innerHTML = chans;
                document.getElementById('l-channel').innerHTML = chans;

                // Remplissage Rôles
                const renderDrop = (listId, labelId, selected) => {
                    const cont = document.getElementById(listId);
                    if(!cont) return;
                    cont.innerHTML = db.roles.map(r => `
                        <div class="role-opt" onclick="toggleRoleCheck(this, '${labelId}')">
                            <input type="checkbox" value="${r}" ${selected.includes(r)?'checked':''} onclick="event.stopPropagation()">
                            <span style="font-size:14px;color:#ddd;">${r}</span>
                        </div>`).join('');
                    updateLabel(listId, labelId);
                };
                renderDrop('w-roles-drop', 'w-roles-label', db.config.welcome.trigger_roles || []);
                renderDrop('admin-roles-drop', 'admin-roles-label', db.config.admin_roles || []);

                // Remplissage Formulaires
                ['welcome', 'leave'].forEach(m => {
                    const p = m[0], c = db.config[m];
                    document.getElementById(`${p}-title`).value = c.title || "";
                    document.getElementById(`${p}-desc`).value = c.desc || "";
                    document.getElementById(`${p}-footer`).value = c.footer || "";
                    document.getElementById(`${p}-color`).value = c.color.startsWith('#') ? c.color : '#' + c.color;
                    document.getElementById(`${p}-channel`).value = c.channel || "";
                    setImg(m, 'thumbnail', c.thumbnail); 
                    setImg(m, 'banner', c.banner); 
                    setImg(m, 'footer_icon', c.footer_icon);
                });

                renderGallery(); 
                sync('welcome'); 
                sync('leave');
                
                // Navigation forcée après chargement réussi
                showTab(localStorage.getItem('currentPage') || 'welcome');
                
            } catch(e) { 
                console.error("ERREUR INIT:", e);
                // Si ça plante, on essaie d'afficher au moins la section bienvenue
                document.getElementById('welcome').classList.add('active');
            }
        }

        function showTab(id, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            const target = document.getElementById(id);
            if(target) {
                target.classList.add('active');
                localStorage.setItem('currentPage', id);
                if(id !== 'gallery') localStorage.setItem('lastTab', id);
            }
            document.querySelectorAll('.nav-item, .sub-item').forEach(n => n.classList.remove('active'));
            const menuEl = el || document.getElementById('mi-' + id);
            if(menuEl) menuEl.classList.add('active');
            closeSidebar();
        }

        function sync(mode) {
            const p = mode[0];
            const color = document.getElementById(`${p}-color`).value;
            document.getElementById(`pv-box-${mode}`).style.borderLeftColor = color;
            document.getElementById(`pv-${p}-title`).innerText = document.getElementById(`${p}-title`).value || "Titre";
            document.getElementById(`pv-${p}-desc`).innerText = document.getElementById(`${p}-desc`).value || "Message...";
            document.getElementById(`pv-${p}-footer`).innerText = document.getElementById(`${p}-footer`).value || "Footer";
        }

        async function save() {
            const getConf = (m) => {
                const p = m[0];
                return {
                    title: document.getElementById(`${p}-title`).value,
                    desc: document.getElementById(`${p}-desc`).value,
                    footer: document.getElementById(`${p}-footer`).value,
                    color: document.getElementById(`${p}-color`).value,
                    channel: document.getElementById(`${p}-channel`).value,
                    thumbnail: document.getElementById(`${p}-img-thumb`).dataset.url || "",
                    banner: document.getElementById(`${p}-img-banner`).dataset.url || "",
                    footer_icon: document.getElementById(`${p}-img-footer`).dataset.url || "",
                    trigger_roles: m === 'welcome' ? Array.from(document.querySelectorAll('#w-roles-drop input:checked')).map(i => i.value) : []
                };
            };
            const config = { 
                welcome: getConf('welcome'), 
                leave: getConf('leave'), 
                admin_roles: Array.from(document.querySelectorAll('#admin-roles-drop input:checked')).map(i => i.value) 
            };
            await fetch('/api/save', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(config)});
            alert("Sauvegardé !");
        }

        async function sendTest(mode) {
            await save();
            await fetch('/api/test_embed', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ mode })});
            alert("Test envoyé !");
        }

        function setImg(mode, type, url) {
            const p = mode[0];
            const idMap = { 'thumbnail': `${p}-img-thumb`, 'banner': `${p}-img-banner`, 'footer_icon': `${p}-img-footer` };
            const el = document.getElementById(idMap[type]); 
            if(!el) return;
            if(url && url !== "") { 
                el.src = url; 
                el.style.display = 'block'; 
                el.dataset.url = url; 
            } else { 
                el.style.display = 'none'; 
                el.dataset.url = ""; 
            }
        }

        function detachImg(e, mode, type) { e.stopPropagation(); setImg(mode, type, ""); sync(mode); }
        function openPicker(m, t) { activeMode = m; activeType = t; showTab('gallery'); }
        async function uploadFile() {
            const fileInput = document.getElementById('f-in');
            if(!fileInput.files[0]) return;
            const fd = new FormData(); 
            fd.append('file', fileInput.files[0]);
            const r = await (await fetch('/api/upload', {method:'POST', body:fd})).json();
            db.images.push(r.path); renderGallery(); selectImage(r.path);
        }
        async function deleteImg(path, e) {
            e.stopPropagation(); if(!confirm("Supprimer l'image du serveur ?")) return;
            await fetch('/api/delete_image', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({path})});
            db.images = db.images.filter(i => i !== path); renderGallery();
        }
        function renderGallery() {
            document.getElementById('g-list').innerHTML = db.images.map(i => `<div class="img-card"><button class="del-img-btn" onclick="deleteImg('${i}', eve

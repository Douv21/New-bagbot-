<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BagBot Designer Pro - Version Complète</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* BASE & THEME (Fidèle à 10128.jpg) */
        :root {
            --accent: #d37f6a;
            --bg: #2b2d31;
            --sidebar-bg: #1e1f22;
            --dark-bg: #111214;
            --text-main: #dbdee1;
            --text-muted: #949ba4;
            --border-color: #3f4147;
        }

        * {
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Whitney', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* SIDEBAR STRUCTURE */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
            border-right: 1px solid var(--dark-bg);
            flex-shrink: 0;
        }

        .sidebar.hidden {
            margin-left: -260px;
        }

        .sidebar-header {
            padding: 24px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: var(--dark-bg);
        }

        .sidebar-logo {
            font-weight: 800;
            color: var(--accent);
            font-size: 18px;
            letter-spacing: 1px;
        }

        .nav-group {
            padding: 12px 8px;
            flex-grow: 1;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 4px;
            cursor: pointer;
            color: var(--text-muted);
            font-weight: 500;
            margin-bottom: 4px;
            transition: 0.2s;
        }

        .nav-item:hover {
            background-color: rgba(78, 80, 88, 0.3);
            color: var(--text-main);
        }

        .nav-item.active {
            background-color: rgba(211, 127, 106, 0.1);
            color: white;
        }

        /* MAIN SECTION */
        .main-wrapper {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            position: relative;
        }

        .top-navbar {
            height: 60px;
            background-color: var(--bg);
            display: flex;
            align-items: center;
            padding: 0 20px;
            border-bottom: 1px solid var(--dark-bg);
            gap: 15px;
        }

        .menu-toggle {
            font-size: 22px;
            color: var(--accent);
            cursor: pointer;
            display: flex;
            align-items: center;
        }

        .page-title {
            font-weight: 700;
            font-size: 15px;
            color: white;
        }

        /* CONTENT AREA */
        .content-scroll {
            flex-grow: 1;
            overflow-y: auto;
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* EMBED BUILDER DESIGN */
        .embed-container {
            width: 100%;
            max-width: 520px;
            background-color: #313338;
            border-radius: 4px;
            border-left: 4px solid var(--accent);
            padding: 16px;
            position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .slot {
            border: 2px dashed #4e5058;
            border-radius: 4px;
            background-color: rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: 0.2s;
        }

        .slot:hover {
            border-color: var(--accent);
            background-color: rgba(211, 127, 106, 0.05);
        }

        .slot img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
        }

        .thumbnail-slot {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 80px;
            height: 80px;
            z-index: 2;
        }

        .author-area {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        .author-icon-slot {
            width: 24px;
            height: 24px;
            border-radius: 50%;
        }

        .author-name {
            font-size: 14px;
            font-weight: 600;
            color: white;
            border: none;
            background: transparent;
            outline: none;
        }

        .embed-title {
            font-size: 18px;
            font-weight: 700;
            color: white;
            margin-bottom: 8px;
            outline: none;
            width: 80%;
        }

        .embed-description {
            font-size: 14px;
            color: var(--text-main);
            line-height: 1.4;
            min-height: 20px;
            outline: none;
            margin-bottom: 12px;
        }

        .banner-slot {
            width: 100%;
            height: 180px;
            margin-top: 12px;
        }

        /* FORM CONTROLS */
        .builder-controls {
            width: 100%;
            max-width: 520px;
            margin-top: 24px;
            padding-bottom: 50px;
        }

        .section-label {
            display: block;
            font-size: 12px;
            font-weight: 800;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .custom-input {
            width: 100%;
            background-color: var(--dark-bg);
            border: 1px solid rgba(0,0,0,0.3);
            color: white;
            padding: 12px;
            border-radius: 4px;
            font-size: 14px;
            margin-bottom: 20px;
            outline: none;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            border: none;
            border-radius: 4px;
            padding: 14px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.2s;
        }

        .btn-secondary {
            background-color: #4e5058;
            color: white;
        }

        .btn-primary {
            background-color: var(--accent);
            color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .btn:active {
            transform: scale(0.98);
        }

        /* RESPONSIVE FIXES */
        @media (max-width: 768px) {
            .sidebar {
                position: absolute;
                height: 100%;
            }
            .sidebar.active {
                margin-left: 0;
            }
            .sidebar.hidden {
                margin-left: -260px;
            }
        }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span class="sidebar-logo">BAGBOT</span>
            <i class="fas fa-angle-left" onclick="toggleSidebar()" style="cursor:pointer; color: #888;"></i>
        </div>
        <div class="nav-group">
            <div class="nav-item active"><i class="fas fa-pencil-alt"></i> Builder</div>
            <div class="nav-item"><i class="fas fa-layer-group"></i> Mes Embeds</div>
            <div class="nav-item"><i class="fas fa-images"></i> Galerie</div>
            <div class="nav-item"><i class="fas fa-cog"></i> Paramètres</div>
        </div>
    </div>

    <div class="main-wrapper">
        <div class="top-navbar">
            <div class="menu-toggle" onclick="toggleSidebar()">
                <i class="fas fa-bars"></i>
            </div>
            <div class="page-title">DESIGNER D'EMBED</div>
        </div>

        <div class="content-scroll">
            
            <div class="embed-container">
                <div class="thumbnail-slot slot" onclick="triggerFileUpload('thumb')">
                    <i class="fas fa-plus" id="plus-thumb"></i>
                    <img id="preview-thumb" style="display:none">
                </div>

                <div class="author-area">
                    <div class="author-icon-slot slot" onclick="triggerFileUpload('author')">
                        <img id="preview-author" style="display:none">
                    </div>
                    <div class="author-name" contenteditable="true" placeholder="Nom de l'auteur">Auteur</div>
                </div>

                <div class="embed-title" contenteditable="true" placeholder="Titre du message">Titre de l'embed</div>

                <div class="embed-description" contenteditable="true" placeholder="Écrivez votre texte ici...">Cliquez ici pour rédiger le contenu de votre message Discord...</div>

                <div class="banner-slot slot" onclick="triggerFileUpload('banner')">
                    <i class="fas fa-image" id="plus-banner" style="font-size: 30px; color: #4e5058;"></i>
                    <img id="preview-banner" style="display:none">
                </div>
            </div>

            <div class="builder-controls">
                <span class="section-label">Configuration de l'envoi</span>
                
                <input type="text" class="custom-input" id="channel-id" placeholder="ID du salon Discord (ex: 1349448439402561637)">
                
                <span class="section-label">Options supplémentaires</span>
                
                <div class="btn-group">
                    <button class="btn btn-secondary" onclick="addReactionPrompt()">
                        <i class="fas fa-smile"></i> Ajouter une réaction
                    </button>
                    
                    <button class="btn btn-primary" onclick="handleDeploy()">
                        <i class="fas fa-paper-plane"></i> DÉPLOYER SUR LE SERVEUR
                    </button>
                </div>

                <div id="reactions-list" style="margin-top: 15px; display: flex; gap: 8px; flex-wrap: wrap;"></div>
            </div>

        </div>
    </div>

    <input type="file" id="global-file-input" style="display:none" accept="image/*" onchange="processImage(this)">

    <script>
        let currentUploadTarget = null;
        const sidebar = document.getElementById('sidebar');

        // Toggle Sidebar
        function toggleSidebar() {
            sidebar.classList.toggle('hidden');
        }

        // Gestion des Images
        function triggerFileUpload(target) {
            currentUploadTarget = target;
            document.getElementById('global-file-input').click();
        }

        function processImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const imgElement = document.getElementById(`preview-${currentUploadTarget}`);
                    const iconElement = document.getElementById(`plus-${currentUploadTarget}`);
                    
                    imgElement.src = e.target.result;
                    imgElement.style.display = 'block';
                    if(iconElement) iconElement.style.display = 'none';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        // Ajout de réactions
        function addReactionPrompt() {
            const emoji = prompt("Collez l'émoji souhaité :");
            if (emoji) {
                const badge = document.createElement('div');
                badge.style = "background: #1e1f22; padding: 5px 10px; border-radius: 4px; display: flex; align-items: center; gap: 5px; border: 1px solid #333;";
                badge.innerHTML = `<span>${emoji}</span> <i class="fas fa-times" onclick="this.parentElement.remove()" style="cursor:pointer; font-size:10px; color:#ed4245;"></i>`;
                document.getElementById('reactions-list').appendChild(badge);
            }
        }

        // Simulation Déploiement
        function handleDeploy() {
            const chanId = document.getElementById('channel-id').value;
            if(!chanId) {
                alert("Veuillez entrer un ID de salon valide.");
                return;
            }
            alert("✅ Données prêtes pour l'envoi ! (ID: " + chanId + ")");
        }

        // Auto-hide sidebar on mobile
        if (window.innerWidth < 768) {
            sidebar.classList.add('hidden');
        }
    </script>
</body>
</html>

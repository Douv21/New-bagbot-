<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BagBot | Dashboard Elite</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050505; --side: #000; --card: #0f0f0f; --accent: #ed4245; --border: #1e1e1e; --discord: #2b2d31; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* SIDEBAR */
        #sidebar { width: 280px; background: var(--side); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
        .brand { padding: 30px; font-size: 24px; font-weight: 900; color: var(--accent); text-align: center; border-bottom: 1px solid var(--border); letter-spacing: 2px; }
        .nav-item { padding: 18px 30px; display: flex; align-items: center; gap: 15px; color: #888; cursor: pointer; transition: 0.3s; font-weight: 600; }
        .nav-item:hover { color: #eee; }
        .nav-item.active { color: var(--accent); background: rgba(237, 66, 69, 0.1); border-right: 4px solid var(--accent); }

        /* MAIN CONTENT */
        main { flex-grow: 1; padding: 40px; overflow-y: auto; }
        .section { display: none; max-width: 900px; margin: 0 auto; animation: fadeIn 0.4s; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* DISCORD MOCKUP */
        .discord-mockup { background: var(--discord); border-left: 4px solid var(--accent); border-radius: 4px; padding: 15px; margin-bottom: 25px; max-width: 550px; }
        .embed-main { display: flex; justify-content: space-between; gap: 10px; }
        .embed-title { color: #00a8fc; font-weight: bold; font-size: 16px; margin-bottom: 5px; }
        .embed-desc { font-size: 14px; color: #dbdee1; white-space: pre-wrap; line-height: 1.4; }
        .embed-thumb { width: 80px; height: 80px; border-radius: 8px; background: #1e1f22; border: 1px dashed #444; flex-shrink: 0; cursor: pointer; overflow: hidden; }
        .embed-thumb img, .embed-banner img { width: 100%; height: 100%; object-fit: cover; }
        .embed-banner { width: 100%; height: 200px; background: #1e1f22; border: 2px dashed #444; border-radius: 8px; margin-top: 15px; cursor: pointer; overflow: hidden; }
        .embed-footer { margin-top: 10px; font-size: 12px; color: #b9bbbe; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 8px; }

        /* CARDS & INPUTS */
        .card { background: var(--card); border: 1px solid var(--border); padding: 30px; border-radius: 15px; margin-bottom: 25px; }
        h2 { margin-top: 0; font-size: 20px; display: flex; align-items: center; gap: 10px; }
        label { display: block; margin: 20px 0 8px; color: #888; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        input, textarea, select { width: 100%; background: #000; border: 1px solid var(--border); color: white; padding: 14px; border-radius: 8px; font-size: 14px; box-sizing: border-box; }
        input:focus, textarea:focus { border-color: var(--accent); outline: none; }
        .btn { width: 100%; padding: 16px; background: var(--accent); border: none; color: white; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 20px; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-test { background: #4e5058; }

        /* ROLES LIST */
        .role-item { display: flex; align-items: center; justify-content: space-between; padding: 15px; border-bottom: 1px solid #1a1a1a; transition: 0.2s; }
        .role-item:hover { background: rgba(255,255,255,0.02); }
        .role-item input[type="checkbox"] { width: 20px; height: 20px; accent-color: var(--accent); cursor: pointer; }

        /* MODAL GALERIE */
        #gallery-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: var(--card); width: 90%; max-width: 600px; padding: 30px; border-radius: 20px; border: 1px solid var(--border); }
        .img-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; max-height: 400px; overflow-y: auto; margin-top: 20px; }
        .img-grid img { width: 100%; height: 90px; object-fit: cover; border-radius: 10px; cursor: pointer; transition: 0.2s; border: 2px solid transparent; }
        .img-grid img:hover { border-color: var(--accent); scale: 1.05; }
    </style>
</head>
<body>

    <nav id="sidebar">
        <div class="brand">BAGBOT</div>
        <div class="nav-item active" onclick="showSection('welcome', this)"><i class="fas fa-home"></i> BIENVENUE</div>
        <div class="nav-item" onclick="showSection('admin', this)"><i class="fas fa-user-shield"></i> ACCÈS PANEL</div>
        <div class="nav-item" style="margin-top:auto" onclick="location.href='/api/login'"><i class="fas fa-sign-out-alt"></i> DÉCONNEXION</div>
    </nav>

    <main>
        <div id="welcome" class="section active">
            <div class="discord-mockup">
                <div class="embed-main">
                    <div style="flex-grow:1">
                        <div id="pv-title" class="embed-title">Titre de bienvenue</div>
                        <div id="pv-desc" class="embed-desc">Description de l'accueil...</div>
                    </div>
                    <div class="embed-thumb" onclick="openGallery('thumb')">
                        <img id="pv-thumb-img" style="display:none">
                    </div>
                </div>
                <div class="embed-banner" onclick="openGallery('banner')">
                    <img id="pv-banner-img" style="display:none">
                </div>
                <div class="embed-footer">
                    <i class="fas fa-info-circle"></i> <span id="pv-footer-txt">Bas de page de l'embed</span>
                </div>
            </div>

            <div class="card">
                <h2><i class="fas fa-cog"></i> Configuration de l'Embed</h2>
                <label>Titre</label>
                <input type="text" id="w-title" oninput="sync()" placeholder="Ex: Bienvenue {user} !">
                
                <label>Description</label>
                <textarea id="w-desc" rows="5" oninput="sync()" placeholder="Ex: Bienvenue sur {guild}..."></textarea>
                
                <label>Footer (Bas de page)</label>
                <input type="text" id="w-footer" oninput="sync()">

                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
                    <div>
                        <label>Salon d'envoi</label>
                        <select id="w-chan"></select>
                    </div>
                    <div>
                        <label>Rôle à donner</label>
                        <select id="w-trigger">
                            <option value="">Aucun (Défaut)</option>
                        </select>
                    </div>
                </div>

                <button class="btn" onclick="saveConfig()"><i class="fas fa-save"></i> ENREGISTRER LA CONFIG</button>
                <button class="btn btn-test" onclick="testWelcome()"><i class="fas fa-paper-plane"></i> ENVOYER UN TEST DISCORD</button>
            </div>
        </div>

        <div id="admin" class="section">
            <div class="card">
                <h2><i class="fas fa-lock"></i> Rôles autorisés au Dashboard</h2>
                <p style="color:#666; font-size:13px; margin-bottom:20px;">Sélectionnez les rôles qui peuvent modifier ces paramètres.</p>
                <div id="admin-roles-list"></div>
                <button class="btn" onclick="saveConfig()"><i class="fas fa-check"></i> VALIDER LES DROITS</button>
            </div>
        </div>
    </main>

    <div id="gallery-modal">
        <div class="modal-content">
            <div style="display:flex; justify-content:space-between; align-items:center">
                <h3 style="margin:0">Galerie BagBot</h3>
                <i class="fas fa-times" onclick="closeGallery()" style="cursor:pointer; font-size:20px"></i>
            </div>
            <div id="gallery-grid" class="img-grid"></div>
            <button class="btn" style="background:#333" onclick="closeGallery()">ANNULER</button>
        </div>
    </div>

    <script>
        let serverData = { config: { welcome: {}, admin_roles: [] }, images: [], user_name: "Utilisateur" };
        let activeTarget = '';

        async function init() {
            try {
                const res = await fetch('/api/get_data');
                if(!res.ok) { location.href='/api/login'; return; }
                serverData = await res.json();

                // Remplissage salons
                document.getElementById('w-chan').innerHTML = serverData.channels.map(c => `<option value="${c.id}"># ${c.name}</option>`).join('');
                
                // Remplissage rôles (pour trigger et admin)
                const rolesHtml = serverData.roles.map(r => `<option value="${r}">${r}</option>`).join('');
                document.getElementById('w-trigger').innerHTML += rolesHtml;

                document.getElementById('admin-roles-list').innerHTML = serverData.roles.map(r => `
                    <div class="role-item">
                        <span>${r}</span>
                        <input type="checkbox" value="${r}" class="adm-ck" ${serverData.config.admin_roles.includes(r)?'checked':''}>
                    </div>`).join('');

                // Chargement config
                const w = serverData.config.welcome || {};
                document.getElementById('w-title').value = w.title || "";
                document.getElementById('w-desc').value = w.desc || "";
                document.getElementById('w-footer').value = w.footer || "";
                document.getElementById('w-chan').value = w.channel || "";
                
                if(w.banner) setImg('banner', w.banner);
                if(w.thumbnail) setImg('thumb', w.thumbnail);

                sync();
                renderGallery();
            } catch(e) { console.error("Erreur Init:", e); }
        }

        function showSection(id, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        function sync() {
            const u = serverData.user_name;
            const rep = (t) => t.replace(/{user}/g, u).replace(/{guild}/g, "Serveur").replace(/{count}/g, "150");
            
            document.getElementById('pv-title').innerText = rep(document.getElementById('w-title').value) || "Titre";
            document.getElementById('pv-desc').innerText = rep(document.getElementById('w-desc').value) || "Description...";
            document.getElementById('pv-footer-txt').innerText = rep(document.getElementById('w-footer').value) || "Bas de page";
        }

        function openGallery(t) { activeTarget = t; document.getElementById('gallery-modal').style.display='flex'; }
        function closeGallery() { document.getElementById('gallery-modal').style.display='none'; }
        function renderGallery() { 
            document.getElementById('gallery-grid').innerHTML = serverData.images.map(img => `<img src="${img}" onclick="selectImg('${img}')">`).join(''); 
        }

        function selectImg(url) {
            setImg(activeTarget, url);
            closeGallery();
        }

        function setImg(target, url) {
            const img = document.getElementById('pv-' + target + '-img');
            img.src = url;
            img.style.display = 'block';
            img.dataset.path = url;
        }

        async function saveConfig() {
            const data = {
                welcome: {
                    title: document.getElementById('w-title').value,
                    desc: document.getElementById('w-desc').value,
                    footer: document.getElementById('w-footer').value,
                    channel: document.getElementById('w-chan').value,
                    banner: document.getElementById('pv-banner-img').dataset.path || "",
                    thumbnail: document.getElementById('pv-thumb-img').dataset.path || ""
                },
                admin_roles: Array.from(document.querySelectorAll('.adm-ck:checked')).map(i => i.value)
            };
            const res = await fetch('/api/save', {
                method:'POST', 
                headers:{'Content-Type':'application/json'}, 
                body:JSON.stringify(data)
            });
            if(res.ok) alert("✅ Configuration sauvegardée avec succès !");
        }

        async function testWelcome() {
            const res = await fetch('/api/test_welcome', {method:'POST'});
            if(res.ok) alert("🚀 Message de test envoyé sur Discord !");
            else alert("❌ Erreur lors de l'envoi.");
        }

        window.onload = init;
    </script>
</body>
</html>

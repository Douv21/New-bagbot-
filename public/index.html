<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BagBot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050505; --panel: #0f0f0f; --accent: #ed4245; --border: #1e1e1e; --embed: #2b2d31; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: white; display: flex; height: 100vh; overflow: hidden; }

        #sidebar { 
            width: 260px; background: #000; border-right: 1px solid var(--border); 
            position: fixed; height: 100%; z-index: 2000; transition: 0.3s;
        }
        #sidebar.closed { transform: translateX(-100%); }
        
        main { flex: 1; margin-left: 260px; display: flex; flex-direction: column; transition: 0.3s; }
        header { height: 60px; background: var(--panel); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; flex-shrink: 0; }
        
        .content { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        .discord-embed { 
            width: 100%; max-width: 450px; background: var(--embed); border-left: 4px solid var(--accent); 
            border-radius: 4px; padding: 16px; position: relative; margin-bottom: 20px;
        }
        .thumb { width: 80px; height: 80px; position: absolute; right: 16px; top: 16px; border-radius: 4px; border: 1px dashed #444; overflow: hidden; }
        .banner { width: 100%; height: 140px; margin-top: 10px; border-radius: 4px; border: 1px dashed #444; overflow: hidden; }
        img { width: 100%; height: 100%; object-fit: cover; }

        .config-card { width: 100%; max-width: 450px; background: var(--panel); border-radius: 12px; padding: 20px; border: 1px solid var(--border); }
        input, textarea, select { width: 100%; background: #000; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 8px; margin-bottom: 10px; font-size: 14px; }
        
        .var-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-bottom: 15px; }
        .var-btn { font-size: 10px; background: #0a0a0a; border: 1px solid #222; padding: 8px; text-align: center; cursor: pointer; color: var(--accent); font-weight: bold; border-radius: 4px; }

        .btn { border: none; padding: 15px; border-radius: 8px; font-weight: 800; cursor: pointer; width: 100%; color: white; margin-top: 10px; }
        
        /* ESPACE POUR LE FOOTER MOBILE */
        .spacer { height: 100px; width: 100%; flex-shrink: 0; }

        @media (max-width: 900px) {
            main { margin-left: 0; }
            #sidebar { transform: translateX(-100%); }
            #sidebar.open { transform: translateX(0); }
        }
    </style>
</head>
<body>
    <nav id="sidebar">
        <div style="padding: 25px; color: var(--accent); font-weight: 900; font-size: 20px; display: flex; justify-content: space-between;">
            BAGBOT <i class="fas fa-times" onclick="menu()"></i>
        </div>
        <div style="padding: 15px 25px; color: white; font-weight: bold; cursor: pointer;" onclick="location.reload()"><i class="fas fa-home"></i> Accueil</div>
    </nav>

    <main>
        <header><i class="fas fa-bars" onclick="menu()" style="color:var(--accent); font-size: 20px; cursor: pointer;"></i></header>
        <div class="content">
            <div class="discord-embed">
                <div class="thumb" onclick="pick('thumb')" id="box-thumb"></div>
                <div id="p-title" style="font-weight: bold; margin-bottom: 5px;">Bienvenue</div>
                <div id="p-desc" style="font-size: 13px; color: #ccc;">...</div>
                <div class="banner" onclick="pick('banner')" id="box-banner"></div>
            </div>

            <div class="config-card">
                <input id="in-title" placeholder="Titre..." oninput="sync()">
                <textarea id="in-desc" rows="4" placeholder="Message..." oninput="sync()"></textarea>
                <div class="var-grid">
                    <div class="var-btn" onclick="add('{user}')">{user}</div>
                    <div class="var-btn" onclick="add('{server}')">{server}</div>
                    <div class="var-btn" onclick="add('{count}')">{count}</div>
                </div>
                <select id="chan-list"></select>
                <button class="btn" style="background:var(--accent)" onclick="save()">ENREGISTRER</button>
                <button class="btn" style="background:#5865F2" onclick="test()">TESTER</button>
            </div>
            <div class="spacer"></div>
        </div>
    </main>

    <div id="modal" style="position:fixed; inset:0; background:rgba(0,0,0,0.9); display:none; align-items:center; justify-content:center; z-index:3000; padding:20px;">
        <div style="background:var(--panel); padding:20px; border-radius:12px; width:100%; max-width:350px;">
            <input type="file" id="file-in" style="display:none" onchange="up()">
            <button class="btn" style="background:#222" onclick="document.getElementById('file-in').click()">TÉLÉVERSER</button>
            <button class="btn" style="background:transparent" onclick="document.getElementById('modal').style.display='none'">FERMER</button>
        </div>
    </div>

    <script>
        let target = '';
        const API = window.location.origin;
        function menu() { document.getElementById('sidebar').classList.toggle('open'); }
        function add(v) { document.getElementById('in-desc').value += v; sync(); }
        function pick(t) { target = t; document.getElementById('modal').style.display = 'flex'; }
        
        function sync() {
            document.getElementById('p-title').innerText = document.getElementById('in-title').value || "Titre";
            document.getElementById('p-desc').innerText = document.getElementById('in-desc').value || "Message...";
        }

        async function up() {
            const fd = new FormData(); fd.append('file', document.getElementById('file-in').files[0]);
            const res = await fetch(`${API}/api/upload`, { method: 'POST', body: fd });
            const data = await res.json();
            document.getElementById('box-'+target).innerHTML = `<img src="${API+data.url}">`;
            document.getElementById('box-'+target).dataset.path = data.url;
            document.getElementById('modal').style.display = 'none';
        }

        async function test() {
            const payload = {
                channel: document.getElementById('chan-list').value,
                title: document.getElementById('in-title').value,
                desc: document.getElementById('in-desc').value,
                thumb: document.getElementById('box-thumb').dataset.path || null,
                banner: document.getElementById('box-banner').dataset.path || null
            };
            await fetch(`${API}/api/test_message`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
            alert("Test envoyé !");
        }

        async function init() {
            const res = await fetch(`${API}/api/get_server_info`);
            const data = await res.json();
            document.getElementById('chan-list').innerHTML = data.channels.map(c => `<option value="${c.id}"># ${c.name}</option>`).join('');
        }
        window.onload = init;
    </script>
</body>
</html>

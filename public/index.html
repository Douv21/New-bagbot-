<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BagBot Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #d3846d; --bg: #2b2d31; --side: #1e1f22; --card: #313338; --text: #dbdee1; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; }

        /* Barre latérale flottante type Draft */
        .sidebar { width: 70px; background: var(--side); height: 100vh; display: flex; flex-direction: column; align-items: center; padding-top: 15px; border-right: 1px solid #1a1a1a; }
        .side-btn { width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; color: #80848e; cursor: pointer; border-radius: 50%; margin-bottom: 12px; transition: 0.2s; }
        .side-btn:hover, .side-btn.active { background: var(--accent); color: white; border-radius: 15px; }

        .main { flex: 1; padding: 20px; overflow-y: auto; }
        
        /* Navigation supérieure */
        .top-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logo-box { width: 40px; height: 40px; background: url('https://draftbot.fr/assets/img/logo.png') center/contain no-repeat; }

        /* Onglets */
        .tabs { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
        .tab { padding: 8px 25px; border-radius: 20px; border: 1px solid #4e5058; color: #b5bac1; cursor: pointer; font-size: 14px; }
        .tab.active { background: #4e5058; color: white; }

        /* APERÇU DISCORD (Cœur du design) */
        .discord-preview { background: #2b2d31; border-radius: 8px; padding: 15px; max-width: 550px; margin: 0 auto 30px; display: flex; gap: 15px; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: #5865f2; }
        .embed { background: #1e1f22; border-left: 4px solid var(--accent); border-radius: 4px; padding: 12px; margin-top: 5px; position: relative; }
        .embed-author { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600; color: #949ba4; margin-bottom: 8px; }
        .embed-title { color: white; font-size: 16px; font-weight: 700; margin-bottom: 8px; }
        .embed-desc { font-size: 14px; line-height: 1.4; white-space: pre-wrap; margin-bottom: 12px; }
        
        /* Images dans l'embed */
        .embed-thumb { position: absolute; top: 12px; right: 12px; width: 80px; height: 80px; border-radius: 8px; border: 1px dashed #4e5058; display: flex; align-items: center; justify-content: center; }
        .embed-banner { width: 100%; border-radius: 8px; margin: 10px 0; border: 1px dashed #4e5058; min-height: 100px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .embed-banner img { width: 100%; height: auto; }
        
        .embed-footer { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #949ba4; margin-top: 10px; }

        /* CONFIGURATION */
        .config-card { background: var(--card); border-radius: 8px; padding: 25px; max-width: 550px; margin: 0 auto; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        label { display: block; font-size: 12px; font-weight: 700; color: #b5bac1; text-transform: uppercase; margin: 15px 0 8px; }
        .input-group { background: #1e1f22; border-radius: 4px; border: 1px solid #1a1a1a; padding: 10px; }
        input, textarea, select { width: 100%; background: transparent; border: none; color: white; outline: none; font-size: 14px; }
        
        .btn-add { background: var(--accent); color: white; border: none; padding: 12px; width: 100%; border-radius: 4px; font-weight: 700; cursor: pointer; margin-top: 25px; text-transform: uppercase; }

        /* Modales flottantes */
        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--card); padding: 20px; border-radius: 8px; border: 1px solid var(--accent); z-index: 100; display: none; width: 300px; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="side-btn" style="background:var(--accent); color:white;"><i class="fas fa-home"></i></div>
    <div class="side-btn" onclick="toggleModal('m-author')"><i class="fas fa-user-edit"></i></div>
    <div class="side-btn" onclick="toggleModal('m-image')"><i class="fas fa-image"></i></div>
    <div class="side-btn" onclick="toggleModal('m-footer')"><i class="fas fa-quote-left"></i></div>
    <div class="side-btn" style="margin-top:auto;"><i class="fas fa-trash-alt"></i></div>
</div>

<div class="main">
    <div class="top-header">
        <i class="fas fa-bars" style="font-size: 20px; cursor: pointer;"></i>
        <div class="logo-box"></div>
        <i class="fas fa-th-large" style="font-size: 20px; color: var(--accent);"></i>
    </div>

    <div class="tabs">
        <div class="tab" onclick="setMode('text')">Contenu</div>
        <div class="tab" onclick="setMode('img')">Image</div>
        <div class="tab active" onclick="setMode('embed')">Embed</div>
    </div>

    <div class="discord-preview">
        <div class="avatar"></div>
        <div style="flex:1;">
            <div style="font-size:15px;"><span style="font-weight:700; color:white;">DraftBot</span> <span style="background:#5865f2; font-size:10px; padding:2px 4px; border-radius:3px; font-weight:700;">APP</span> <span style="color:#949ba4; font-size:12px; margin-left:5px;">11:06</span></div>
            
            <div class="embed">
                <div class="embed-thumb" id="p-thumb"><i class="far fa-image"></i></div>
                <div class="embed-author" id="p-author"><i class="far fa-image"></i> <span id="p-auth-name">Nom de l'auteur</span></div>
                <div class="embed-title" id="p-title">Role accès</div>
                <div class="embed-desc" id="p-desc">Débloque l'accès aux contenus réservés :
RP ✍️ : salons RP et ERP...</div>
                
                <div class="embed-banner" id="p-banner"><i class="far fa-image"></i></div>
                
                <div class="embed-footer" id="p-footer"><i class="far fa-image"></i> <span id="p-foot-text">Footer</span> <span style="margin-left:auto;">Aujourd'hui à 15:17</span></div>
            </div>
            
            <div style="display:inline-block; background:#4e5058; color:white; padding:6px 15px; border-radius:3px; font-size:14px; margin-top:10px;">Bouton</div>
        </div>
    </div>

    <div class="config-card">
        <label>Titre de l'embed</label>
        <div class="input-group"><input type="text" id="in-title" oninput="sync()" value="Role accès"></div>
        
        <label>Description</label>
        <div class="input-group"><textarea id="in-desc" rows="5" oninput="sync()">Débloque l'accès aux contenus réservés...</textarea></div>

        <button class="btn-add">Ajouter un rôle réaction</button>
    </div>
</div>

<div class="modal" id="m-author">
    <label>Nom de l'auteur</label>
    <div class="input-group"><input type="text" id="in-auth" oninput="sync()"></div>
    <label>URL Image Auteur</label>
    <div class="input-group"><input type="text" id="in-auth-img" oninput="sync()"></div>
    <button class="btn-add" onclick="toggleModal('m-author')">OK</button>
</div>

<div class="modal" id="m-image">
    <label>URL Image Principale (Bannière)</label>
    <div class="input-group"><input type="text" id="in-banner" oninput="sync()"></div>
    <label>URL Thumbnail (Petit carré)</label>
    <div class="input-group"><input type="text" id="in-thumb" oninput="sync()"></div>
    <button class="btn-add" onclick="toggleModal('m-image')">OK</button>
</div>

<div class="modal" id="m-footer">
    <label>Texte du footer</label>
    <div class="input-group"><input type="text" id="in-foot" oninput="sync()"></div>
    <button class="btn-add" onclick="toggleModal('m-footer')">OK</button>
</div>

<script>
    function toggleModal(id) {
        const m = document.getElementById(id);
        m.style.display = m.style.display === 'block' ? 'none' : 'block';
    }

    function sync() {
        document.getElementById('p-title').innerText = document.getElementById('in-title').value;
        document.getElementById('p-desc').innerText = document.getElementById('in-desc').value;
        document.getElementById('p-auth-name').innerText = document.getElementById('in-auth').value || "Nom de l'auteur";
        document.getElementById('p-foot-text').innerText = document.getElementById('in-foot').value || "Footer";
        
        // Gestion des images
        const bannerUrl = document.getElementById('in-banner').value;
        if(bannerUrl) document.getElementById('p-banner').innerHTML = `<img src="${bannerUrl}">`;
        
        const thumbUrl = document.getElementById('in-thumb').value;
        if(thumbUrl) document.getElementById('p-thumb').innerHTML = `<img src="${thumbUrl}" style="width:100%; border-radius:8px;">`;
    }
</script>
</body>
</html>

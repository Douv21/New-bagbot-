<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BagBot OS | Dashboard Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* --- CORE SYSTEM --- */
        :root {
            --accent: #ed4245;
            --accent-hover: #c03537;
            --bg-dark: #0b0b0b;
            --bg-side: #000000;
            --bg-card: #1e1f22;
            --bg-input: #111214;
            --border: #2b2d31;
            --text-main: #f2f3f5;
            --text-muted: #949ba4;
            --sidebar-w: 260px;
            --header-h: 60px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Whitney', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* --- SIDEBAR ENGINE --- */
        #sidebar {
            width: var(--sidebar-w);
            background: var(--bg-side);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            z-index: 999;
            transition: var(--transition);
        }

        .brand-zone {
            padding: 30px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 22px;
            font-weight: 900;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .nav-container { flex: 1; padding: 12px; }
        
        .nav-group-label {
            font-size: 11px;
            font-weight: 800;
            color: #4e5058;
            text-transform: uppercase;
            padding: 20px 12px 8px;
            letter-spacing: 0.5px;
        }

        .nav-link {
            padding: 12px 16px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 14px;
            color: var(--text-muted);
            text-decoration: none;
            cursor: pointer;
            transition: var(--transition);
            font-weight: 600;
            margin-bottom: 2px;
        }

        .nav-link:hover { background: rgba(255,255,255,0.05); color: #fff; }
        
        .nav-link.active {
            background: rgba(237, 66, 69, 0.1);
            color: var(--accent);
        }

        /* --- MAIN VIEWPORT --- */
        .viewport {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            position: relative;
            background: var(--bg-dark);
        }

        .top-nav {
            height: var(--header-h);
            background: rgba(5, 5, 5, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 24px;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .page-title {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            font-size: 15px;
        }

        .main-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            scroll-behavior: smooth;
        }

        /* --- EMBED ARCHITECTURE --- */
        .embed-container {
            width: 100%;
            max-width: 520px;
            background: var(--bg-card);
            border-radius: 4px;
            border-left: 4px solid var(--accent);
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            margin-bottom: 30px;
        }

        .embed-header-flex { display: flex; gap: 16px; }
        .fields-stack { flex: 1; }

        .title-in {
            background: transparent;
            border: none;
            color: #fff;
            font-size: 18px;
            font-weight: 700;
            width: 100%;
            margin-bottom: 10px;
        }

        .desc-in {
            background: transparent;
            border: none;
            color: #dbdee1;
            font-size: 14px;
            width: 100%;
            resize: none;
            min-height: 120px;
            line-height: 1.5;
        }

        .thumb-upload {
            width: 80px;
            height: 80px;
            background: rgba(0,0,0,0.2);
            border: 2px dashed #333;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #4e5058;
            transition: var(--transition);
        }

        .thumb-upload:hover { border-color: var(--accent); color: #fff; }

        .banner-box {
            width: 100%;
            height: 240px;
            background: #2b2d31;
            border-radius: 4px;
            margin-top: 20px;
            border: 1px dashed #333;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            overflow: hidden;
        }

        /* --- CONTROLS BOX --- */
        .control-panel { width: 100%; max-width: 520px; }
        
        .input-group { margin-bottom: 24px; }
        .label {
            display: block;
            font-size: 11px;
            font-weight: 800;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .custom-select {
            width: 100%;
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: #fff;
            padding: 14px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: var(--transition);
        }

        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 15px;
        }

        .btn {
            border: none;
            border-radius: 4px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: var(--transition);
        }

        .btn-gray { background: #4e5058; color: #fff; padding: 12px; }
        .btn-gray:hover { background: #6d6f78; }

        .btn-primary {
            width: 100%;
            background: var(--accent);
            color: #fff;
            padding: 18px;
            font-size: 16px;
            text-transform: uppercase;
            font-weight: 900;
            margin-top: 30px;
            box-shadow: 0 4px 15px rgba(237, 66, 69, 0.3);
        }

        .btn-primary:active { transform: scale(0.98); }

        /* --- ANIMATIONS & MODALS (JavaScript Dependancy) --- */
    </style>
</head>
<body>

    <aside id="sidebar">
        <div class="brand-zone">
            <i class="fas fa-shield-cat"></i>
            <span>BagBot</span>
        </div>
        
        <div class="nav-container">
            <div class="nav-group-label">Serveur</div>
            <div class="nav-link active"><i class="fas fa-pen-fancy"></i> Designer</div>
            <div class="nav-link"><i class="fas fa-list-check"></i> Auto-Mod</div>
            
            <div class="nav-group-label">Configuration</div>
            <div class="nav-link"><i class="fas fa-terminal"></i> Commandes</div>
            <div class="nav-link"><i class="fas fa-database"></i> Journaux</div>
            <div class="nav-link"><i class="fas fa-sliders-h"></i> Paramètres</div>
        </div>
        
        <div style="padding: 20px; text-align: center; border-top: 1px solid var(--border);">
            <div style="font-size: 10px; color: var(--text-muted); font-weight: 800;">BAGBOT V3.1.2-STABLE</div>
        </div>
    </aside>

    <div class="viewport">
        <header class="top-nav">
            <div class="page-title">
                <i class="fas fa-bars" style="color: var(--accent); cursor: pointer;"></i>
                <span>DASHBOARD</span>
            </div>
            <div style="display: flex; align-items: center; gap: 10px;">
                <span style="font-size: 11px; font-weight: 900; color: #23a559;">● BOT ACTIF</span>
            </div>
        </header>

        <div class="main-scroll">
            <div class="embed-container">
                <div class="embed-header-flex">
                    <div class="fields-stack">
                        <input type="text" class="title-in" value="Titre de l'Annonce" id="inp-title">
                        <textarea class="desc-in" id="inp-desc" placeholder="Rédigez votre message ici..."></textarea>
                    </div>
                    <div class="thumb-upload">
                        <i class="fas fa-camera"></i>
                        <span style="font-size: 9px; margin-top: 5px; font-weight: 800;">IMAGE</span>
                    </div>
                </div>
                <div class="banner-box">
                    <i class="fas fa-cloud-arrow-up" style="font-size: 40px; color: #333;"></i>
                </div>
            </div>

            <div class="control-panel">
                <div class="input-group">
                    <label class="label">Salon de destination</label>
                    <select class="custom-select" id="channel-list">
                        <option>Chargement des canaux...</option>
                    </select>
                </div>

                <div class="btn-grid">
                    <button class="btn btn-gray"><i class="fas fa-plus-circle"></i> Réaction</button>
                    <button class="btn btn-gray"><i class="fas fa-at"></i> Mentionner</button>
                </div>

                <button class="btn btn-primary" id="send-trigger">
                    <i class="fas fa-paper-plane" style="margin-right: 12px;"></i> Publier maintenant
                </button>
            </div>
        </div>
    </div>

    <script>
        // LOGIQUE DE CHARGEMENT API
        async function bootstrap() {
            try {
                const res = await fetch('/api/get_server_info');
                const data = await res.json();
                if (data.channels) {
                    const el = document.getElementById('channel-list');
                    el.innerHTML = data.channels.map(c => 
                        `<option value="${c.id}"># ${c.name}</option>`
                    ).join('');
                }
            } catch (e) {
                console.error("API Link Error");
            }
        }

        // Action bouton principal
        document.getElementById('send-trigger').onclick = () => {
            const chan = document.getElementById('channel-list').selectedOptions[0].text;
            alert("Envoi en cours vers " + chan);
        };

        window.onload = bootstrap;
    </script>
</body>
</html>

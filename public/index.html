<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BagBot Designer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #ed4245; --bg: #000000; --card: #111214; --border: #2b2d31; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; display: flex; height: 100vh; }
        
        #sidebar { width: 250px; background: #050505; border-right: 1px solid var(--border); padding: 20px; }
        .main { flex: 1; display: flex; flex-direction: column; overflow-y: auto; padding: 20px; align-items: center; }
        
        /* DESIGN EMBED */
        .embed-preview { width: 100%; max-width: 500px; background: #1e1f22; border-left: 4px solid var(--accent); padding: 15px; border-radius: 4px; position: relative; }
        
        .upload-zone { border: 2px dashed var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; background: rgba(0,0,0,0.3); }
        .thumb-upload { position: absolute; top: 15px; right: 15px; width: 80px; height: 80px; }
        .banner-upload { width: 100%; height: 150px; margin-top: 15px; }
        .upload-zone img { width: 100%; height: 100%; object-fit: cover; }

        input, textarea, select { width: 100%; background: transparent; border: none; color: white; outline: none; margin-bottom: 10px; }
        .title-in { font-size: 18px; font-weight: bold; }
        
        .controls { width: 100%; max-width: 500px; margin-top: 30px; }
        .btn { width: 100%; padding: 12px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-add { background: #2b2d31; color: white; }
        .btn-send { background: var(--accent); color: white; }
        
        .reaction-row { display: flex; gap: 10px; background: var(--card); padding: 10px; border-radius: 5px; margin-top: 10px; border: 1px solid var(--border); }
    </style>
</head>
<body>

<div id="sidebar">
    <h2 style="color:var(--accent)">BAGBOT</h2>
    <p><i class="fas fa-edit"></i> Designer</p>
</div>

<div class="main">
    <div class="embed-preview">
        <div class="upload-zone thumb-upload" onclick="triggerInput('thumb')">
            <i class="fas fa-plus" id="icon-thumb"></i>
            <img id="img-thumb" style="display:none">
        </div>

        <input type="text" class="title-in" value="Titre de l'Embed">
        <textarea placeholder="Contenu du message..." rows="4"></textarea>

        <div class="upload-zone banner-upload" onclick="triggerInput('banner')">
            <i class="fas fa-image" id="icon-banner" style="font-size: 2em;"></i>
            <img id="img-banner" style="display:none">
        </div>
    </div>

    <div class="controls">
        <label>SALON DE DESTINATION</label>
        <select id="chan-select" style="background:var(--card); padding:10px; border:1px solid var(--border)">
            <option>Chargement...</option>
        </select>

        <div id="reactions-list"></div>
        <button class="btn btn-add" onclick="addNewReaction()"><i class="fas fa-plus"></i> Ajouter une réaction</button>
        <button class="btn btn-send">DÉPLOYER</button>
    </div>
</div>

<input type="file" id="file-helper" style="display:none" onchange="handleFile(this)">

<script>
    let roles = [];
    let currentTarget = "";

    async function start() {
        try {
            const res = await fetch('/api/get_server_info');
            const data = await res.json();
            roles = data.roles;
            document.getElementById('chan-select').innerHTML = data.channels.map(c => `<option value="${c.id}"># ${c.name}</option>`).join('');
        } catch(e) {
            alert("Impossible de joindre le bot. Est-il lancé sur Termux ?");
        }
    }

    function triggerInput(type) {
        currentTarget = type;
        document.getElementById('file-helper').click();
    }

    function handleFile(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('img-' + currentTarget).src = e.target.result;
                document.getElementById('img-' + currentTarget).style.display = 'block';
                document.getElementById('icon-' + currentTarget).style.display = 'none';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function addNewReaction() {
        const div = document.createElement('div');
        div.className = 'reaction-row';
        div.innerHTML = `
            <div style="cursor:pointer">😀</div>
            <select style="margin-bottom:0">
                ${roles.map(r => `<option value="${r.id}">${r.name}</option>`).join('')}
            </select>
            <i class="fas fa-trash" onclick="this.parentElement.remove()" style="color:var(--accent); cursor:pointer"></i>
        `;
        document.getElementById('reactions-list').appendChild(div);
    }

    window.onload = start;
</script>
</body>
</html>

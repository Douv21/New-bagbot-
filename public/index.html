<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BagBot | Configuration Complète</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #ff4d4d; --bg: #0a0a0a; --panel: #161616; --side: #000000; --text: #ffffff; --subtext: #888; --draft-coral: #d37f6a; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; min-height: 100vh; }

        /* SIDEBAR RÉTRACTABLE */
        .sidebar { width: 260px; background: var(--side); height: 100vh; position: fixed; left: -260px; transition: 0.3s; z-index: 1000; border-right: 1px solid #222; }
        .sidebar.open { left: 0; }
        .nav-item { padding: 18px 25px; display: flex; align-items: center; gap: 12px; cursor: pointer; color: var(--subtext); }
        .nav-item.active { background: #111; color: var(--accent); border-left: 4px solid var(--accent); }

        .main { flex: 1; padding: 20px; width: 100%; box-sizing: border-box; }
        
        /* APERÇU DISCORD COMPLET */
        .discord-msg { background: #313338; border-radius: 8px; padding: 15px; display: flex; gap: 12px; border: 1px solid #222; margin-bottom: 20px; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
        .embed { background: #1e1f22; border-left: 4px solid var(--accent); border-radius: 4px; padding: 15px; position: relative; width: 100%; max-width: 450px; }
        
        /* Éléments Embed */
        .embed-author { display: flex; align-items: center; gap: 8px; font-size: 13px; margin-bottom: 8px; font-weight: 600; cursor: pointer; }
        .author-icon { width: 20px; height: 20px; border-radius: 50%; background: #333; overflow: hidden; }
        .embed-title { font-size: 16px; font-weight: 700; color: white; margin-bottom: 4px; outline: none; }
        .embed-desc { font-size: 14px; color: #dbdee1; margin-bottom: 10px; outline: none; white-space: pre-wrap; }
        .embed-thumb { position: absolute; top: 15px; right: 15px; width: 65px; height: 65px; border-radius: 4px; background: #111; border: 1px dashed #444; overflow: hidden; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .embed-img { width: 100%; border-radius: 4px; margin: 10px 0; background: #111; border: 1px dashed #444; cursor: pointer; overflow: hidden; min-height: 100px; display: flex; align-items: center; justify-content: center; }
        .embed-footer { font-size: 12px; color: #949ba4; display: flex; align-items: center; gap: 5px; margin-top: 8px; cursor: pointer; }

        /* CONFIGURATION */
        .card { background: var(--panel); border-radius: 12px; padding: 25px; border: 1px solid #222; max-width: 500px; margin: 0 auto; }
        label { display: block; font-size: 11px; color: var(--subtext); text-transform: uppercase; font-weight: 800; margin: 20px 0 8px; }
        select, .input-custom { width: 100%; background: #000; border: 1px solid #333; color: white; padding: 15px; border-radius: 8px; font-size: 16px; box-sizing: border-box; }

        /* RÉACTIONS & SÉLECTEUR */
        .reaction-row { background: #1e1e1e; border-radius: 8px; padding: 12px; display: flex; align-items: center; gap: 10px; margin-bottom: 10px; border: 1px solid #333; }
        .emoji-trigger { font-size: 22px; cursor: pointer; background: #0a0a0a; border: 1px solid #444; border-radius: 5px; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; }
        .role-mini { flex: 1; background: transparent; border: none; color: white; font-size: 14px; outline: none; }

        .btn-add-role { background: var(--draft-coral); color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; font-weight: 700; cursor: pointer; margin-top: 15px; }
        .btn-deploy { background: var(--accent); color: white; border: none; padding: 18px; width: 100%; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 15px; margin-top: 10px; }

        /* MODALE SÉLECTEUR EMOJI */
        .emoji-picker { position: fixed; bottom: 0; left: 0; width: 100%; background: #161616; border-top: 1px solid #333; display: none; grid-template-columns: repeat(6, 1fr); padding: 15px; gap: 10px; z-index: 3000; box-shadow: 0 -5px 20px rgba(0,0,0,0.5); }
        .emoji-picker span { font-size: 24px; cursor: pointer; text-align: center; padding: 5px; border-radius: 5px; }
        .emoji-picker span:hover { background: #333; }
    </style>
</head>
<body>

<div class="sidebar" id="sidebar">
    <div style="padding: 25px; display: flex; justify-content: space-between; align-items: center;">
        <span style="font-weight: 900; color: var(--accent);">BAGBOT</span>
        <i class="fas fa-times" onclick="toggleMenu()" style="cursor:pointer;"></i>
    </div>
    <div class="nav-item active"><i class="fas fa-bolt"></i> Rôles Réactions</div>
</div>

<div class="main">
    <div class="top-nav">
        <button onclick="toggleMenu()" style="background:none; border:none; color:white; font-size:24px;"><i class="fas fa-bars"></i></button>
        <h3 style="margin:0;">Éditeur de Message</h3>
    </div>

    <div class="discord-msg">
        <div class="avatar"></div>
        <div class="embed">
            <div class="embed-thumb" onclick="openMedia('thumb')">
                <div id="p-thumb"><i class="fas fa-image" style="color:#333;"></i></div>
            </div>
            <div class="embed-author" onclick="openMedia('author')">
                <div class="author-icon" id="p-auth-img"></div>
                <span id="p-auth-name">Nom de l'auteur</span>
            </div>
            <div class="embed-title" contenteditable="true">Role accès</div>
            <div class="embed-desc" contenteditable="true">Débloque l'accès aux contenus réservés :</div>
            <div class="embed-img" onclick="openMedia('banner')">
                <div id="p-banner"><i class="fas fa-image" style="color:#333; font-size: 24px;"></i></div>
            </div>
            <div class="embed-footer" onclick="openMedia('footer')">
                <div class="author-icon" id="p-foot-img" style="width:16px; height:16px;"></div>
                <span id="p-foot-text">Footer</span>
                <span style="color:#555">• Aujourd'hui à 16:13</span>
            </div>
        </div>
    </div>

    <div class="card">
        <label>Salon Discord</label>
        <select id="channelList"><option># bagbot-install</option></select>
        
        <div id="reactionRowsContainer"></div>

        <button class="btn-add-role" onclick="addNewReactionRow()">
            Ajouter un rôle réaction
        </button>

        <button class="btn-deploy" onclick="deploy()">DÉPLOYER SUR DISCORD</button>
    </div>
</div>

<div class="emoji-picker" id="emojiPicker">
    <span onclick="selectEmoji('😀')">😀</span><span onclick="selectEmoji('🔥')">🔥</span>
    <span onclick="selectEmoji('🔞')">🔞</span><span onclick="selectEmoji('🌙')">🌙</span>
    <span onclick="selectEmoji('🎭')">🎭</span><span onclick="selectEmoji('📸')">📸</span>
    <span onclick="selectEmoji('📜')">📜</span><span onclick="selectEmoji('✅')">✅</span>
    <div style="grid-column: span 6; padding: 10px; text-align: center; color: var(--subtext); font-size: 12px;" onclick="closeEmojiPicker()">FERMER</div>
</div>

<script>
    let activeEmojiRow = null;
    let rolesData = ["@Membre", "@VIP", "@NSFW", "@RP"];

    function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); }

    // SÉLECTEUR D'EMOJI
    function openEmojiPicker(btn) {
        activeEmojiRow = btn;
        document.getElementById('emojiPicker').style.display = 'grid';
    }

    function selectEmoji(emoji) {
        if(activeEmojiRow) activeEmojiRow.innerText = emoji;
        closeEmojiPicker();
    }

    function closeEmojiPicker() { document.getElementById('emojiPicker').style.display = 'none'; }

    // AJOUT DE LIGNE
    function addNewReactionRow() {
        const container = document.getElementById('reactionRowsContainer');
        const row = document.createElement('div');
        row.className = 'reaction-row';
        
        const roleOptions = rolesData.map(r => `<option>${r}</option>`).join('');

        row.innerHTML = `
            <div class="emoji-trigger" onclick="openEmojiPicker(this)">😀</div>
            <select class="role-mini">
                <option value="">Lier un rôle...</option>
                ${roleOptions}
            </select>
            <i class="fas fa-times" style="color:#444; cursor:pointer;" onclick="this.parentElement.remove()"></i>
        `;
        container.appendChild(row);
    }

    // GESTION DES MÉDIAS (Simplifiée pour l'exemple)
    function openMedia(zone) {
        const url = prompt("Entrez l'URL de l'image pour " + zone + " :");
        if(!url) return;
        
        if(zone === 'thumb') document.getElementById('p-thumb').innerHTML = `<img src="${url}" style="width:100%;">`;
        if(zone === 'banner') document.getElementById('p-banner').innerHTML = `<img src="${url}" style="width:100%; height:auto;">`;
        if(zone === 'author') {
            const name = prompt("Nom de l'auteur :");
            document.getElementById('p-auth-img').innerHTML = `<img src="${url}" style="width:100%;">`;
            document.getElementById('p-auth-name').innerText = name || "Auteur";
        }
    }

    function deploy() { alert("Déploiement sur Discord..."); }
</script>
</body>
</html>

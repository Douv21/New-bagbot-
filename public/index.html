<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BagBot | Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #ff4d4d; --bg: #0f0f0f; --side: #000000; --card: #1a1a1a; --text: #ffffff; --subtext: #a0a0a0; --discord-embed: #2b2d31; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar type DraftBot */
        .sidebar { width: 70px; background: var(--side); display: flex; flex-direction: column; align-items: center; padding-top: 20px; border-right: 1px solid #222; }
        .side-icon { width: 45px; height: 45px; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: var(--subtext); cursor: pointer; margin-bottom: 15px; transition: 0.3s; font-size: 20px; }
        .side-icon.active { background: var(--accent); color: white; box-shadow: 0 0 15px rgba(255, 77, 77, 0.4); }

        .content { flex: 1; padding: 30px; overflow-y: auto; }
        
        /* Titre & Tabs */
        .header-title { font-size: 24px; font-weight: 700; margin-bottom: 25px; color: var(--text); }
        .tabs { display: flex; gap: 10px; margin-bottom: 30px; }
        .tab-btn { padding: 10px 25px; border-radius: 25px; background: #222; color: var(--subtext); cursor: pointer; border: 1px solid transparent; font-size: 14px; }
        .tab-btn.active { background: rgba(255, 77, 77, 0.1); color: var(--accent); border-color: var(--accent); }

        /* L'APERÇU INTERACTIF */
        .discord-msg { background: #313338; border-radius: 8px; padding: 15px; max-width: 550px; display: flex; gap: 15px; border: 1px solid #222; margin-bottom: 30px; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
        .embed { background: #1e1f22; border-left: 4px solid var(--accent); border-radius: 4px; padding: 15px; margin-top: 8px; position: relative; }
        
        /* Zones cliquables */
        .clickable-zone { border: 1px dashed transparent; transition: 0.2s; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .clickable-zone:hover { border-color: var(--accent); background: rgba(255, 77, 77, 0.05); }
        
        .embed-author { font-size: 13px; font-weight: 600; color: white; margin-bottom: 10px; }
        .author-icon { width: 22px; height: 22px; border-radius: 50%; background: #444; display: flex; justify-content: center; align-items: center; font-size: 10px; }
        .embed-title { font-size: 16px; font-weight: 700; margin-bottom: 8px; outline: none; }
        .embed-desc { font-size: 14px; color: #dbdee1; outline: none; margin-bottom: 12px; }
        .embed-banner { width: 100%; min-height: 100px; background: #111; border-radius: 8px; margin-top: 10px; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .embed-banner img { width: 100%; height: auto; }
        .embed-footer { font-size: 11px; color: #949ba4; margin-top: 12px; border-top: 1px solid #333; padding-top: 8px; }

        /* Modale de saisie d'image */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-card { background: var(--card); padding: 25px; border-radius: 12px; width: 400px; border: 1px solid #333; }
        .modal-card h3 { margin-top: 0; color: var(--accent); font-size: 16px; text-transform: uppercase; }
        input[type="text"] { width: 100%; background: #000; border: 1px solid #333; color: white; padding: 12px; border-radius: 5px; margin: 10px 0; outline: none; box-sizing: border-box; }
        .btn-confirm { background: var(--accent); color: white; border: none; padding: 12px; width: 100%; border-radius: 5px; font-weight: 700; cursor: pointer; }

        /* Formulaire bas */
        .config-bottom { background: var(--card); border-radius: 12px; padding: 20px; max-width: 550px; border: 1px solid #222; }
        .btn-send { background: var(--accent); color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: 700; cursor: pointer; margin-top: 20px; transition: 0.2s; }
        .btn-send:hover { opacity: 0.9; transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="side-icon active"><i class="fas fa-bolt"></i></div>
    <div class="side-icon"><i class="fas fa-cog"></i></div>
    <div style="flex:1;"></div>
    <div class="side-icon" style="color:#ff4d4d;"><i class="fas fa-sign-out-alt"></i></div>
</div>

<div class="content">
    <div class="header-title">Configurer le message</div>

    <div class="tabs">
        <div class="tab-btn active">Embed Pro</div>
        <div class="tab-btn">Simple</div>
    </div>

    <div class="discord-msg">
        <div class="avatar"></div>
        <div style="flex:1;">
            <div style="font-weight:600; font-size:15px; margin-bottom:5px;">BagBot <span style="background:#5865f2; font-size:10px; padding:2px 4px; border-radius:3px;">BOT</span></div>
            
            <div class="embed" id="mainEmbed">
                <div class="clickable-zone embed-author" onclick="openImageModal('author')">
                    <div class="author-icon" id="previewAuthImg"><i class="fas fa-image"></i></div>
                    <span id="previewAuthName">Nom de l'auteur</span>
                </div>

                <div class="embed-title" contenteditable="true" id="previewTitle">Role accès</div>
                <div class="embed-desc" contenteditable="true" id="previewDesc">Cliquez sur les éléments pour les modifier...</div>

                <div class="clickable-zone embed-banner" onclick="openImageModal('banner')" id="previewBanner">
                    <i class="fas fa-plus-circle" style="font-size:24px; color:#444;"></i>
                </div>

                <div class="clickable-zone embed-footer" onclick="openImageModal('footer')">
                    <div class="author-icon" style="width:16px; height:16px;" id="previewFootImg"><i class="fas fa-image"></i></div>
                    <span id="previewFootText">Bas de page (Footer)</span>
                </div>
            </div>

            <div style="display:inline-flex; align-items:center; background:#4f545c; color:white; padding:6px 14px; border-radius:3px; font-size:14px; margin-top:10px; cursor:pointer;">
                <i class="fas fa-hand-pointer" style="margin-right:8px;"></i> <span id="previewBtnLabel">Récupérer le rôle</span>
            </div>
        </div>
    </div>

    <div class="config-bottom">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
            <div><label style="font-size:11px; color:var(--subtext); text-transform:uppercase;">Salon Discord</label><select id="cId" style="width:100%; background:#000; border:1px solid #333; color:white; padding:10px; border-radius:5px; margin-top:5px;"></select></div>
            <div><label style="font-size:11px; color:var(--subtext); text-transform:uppercase;">Rôle à donner</label><select id="rId" style="width:100%; background:#000; border:1px solid #333; color:white; padding:10px; border-radius:5px; margin-top:5px;"></select></div>
        </div>
        <button class="btn-send" onclick="send()">DÉPLOYER LE MESSAGE</button>
    </div>
</div>

<div class="modal" id="imageModal">
    <div class="modal-card">
        <h3 id="modalTitle">Modifier l'élément</h3>
        <input type="text" id="modalInputLink" placeholder="Lien de l'image (URL)">
        <p style="font-size:10px; color:var(--subtext); margin:-5px 0 10px 0;">Ou téléversement bientôt disponible...</p>
        <input type="text" id="modalInputText" placeholder="Texte associé">
        <button class="btn-confirm" onclick="saveModal()">VALIDER</button>
        <button class="btn-confirm" style="background:transparent; color:#888; margin-top:10px;" onclick="closeModal()">ANNULER</button>
    </div>
</div>

<script>
    let currentTarget = '';

    function openImageModal(type) {
        currentTarget = type;
        document.getElementById('imageModal').style.display = 'flex';
        const t = document.getElementById('modalTitle');
        const iText = document.getElementById('modalInputText');
        
        iText.style.display = (type === 'author' || type === 'footer') ? 'block' : 'none';
        t.innerText = type === 'author' ? "CONFIG. AUTEUR" : (type === 'banner' ? "IMAGE DE L'EMBED" : "CONFIG. FOOTER");
    }

    function closeModal() { document.getElementById('imageModal').style.display = 'none'; }

    function saveModal() {
        const link = document.getElementById('modalInputLink').value;
        const text = document.getElementById('modalInputText').value;

        if(currentTarget === 'author') {
            if(link) document.getElementById('previewAuthImg').innerHTML = `<img src="${link}" style="width:100%; border-radius:50%">`;
            if(text) document.getElementById('previewAuthName').innerText = text;
        } else if(currentTarget === 'footer') {
            if(link) document.getElementById('previewFootImg').innerHTML = `<img src="${link}" style="width:100%; border-radius:50%">`;
            if(text) document.getElementById('previewFootText').innerText = text;
        } else if(currentTarget === 'banner') {
            if(link) document.getElementById('previewBanner').innerHTML = `<img src="${link}">`;
        }
        closeModal();
    }

    async function load() {
        try {
            const [cR, rR] = await Promise.all([fetch('/api/channels'), fetch('/api/roles')]);
            const c = await cR.json(); const r = await rR.json();
            document.getElementById('cId').innerHTML = c.map(x => `<option value="${x.id}"># ${x.name}</option>`).join('');
            document.getElementById('rId').innerHTML = r.map(x => `<option value="${x.id}">${x.name}</option>`).join('');
        } catch(e) { console.log("Mode démo ou erreur API"); }
    }

    function send() { alert("Message déployé sur le salon sélectionné !"); }
    load();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BagBot Panel</title>
    <style>
        :root { --accent: #ff4d4d; --bg: #121212; --card: #1e1e1e; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); color: white; display: flex; }
        
        /* Sidebar avec Bouton Fermer */
        .sidebar { width: 280px; background: #000; height: 100vh; position: fixed; left: -280px; transition: 0.3s; z-index: 1000; border-right: 1px solid #333; }
        .sidebar.open { left: 0; }
        .sidebar-top { padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .close-btn { background: none; border: none; color: white; font-size: 30px; cursor: pointer; }
        
        .main { flex: 1; padding: 20px; }
        .panel { background: var(--card); padding: 20px; border-radius: 12px; max-width: 500px; margin: auto; }
        .tabs { display: flex; gap: 5px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 10px; text-align: center; background: #333; cursor: pointer; border-radius: 5px; }
        .tab.active { background: var(--accent); }
        
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; background: #111; border: 1px solid #333; color: white; border-radius: 5px; box-sizing: border-box; }
        label { font-size: 11px; color: #777; font-weight: bold; text-transform: uppercase; }
        
        .btn-deploy { width: 100%; padding: 15px; background: var(--accent); border: none; color: white; font-weight: bold; border-radius: 8px; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div class="sidebar" id="sidebar">
    <div class="sidebar-top">
        <b style="color: var(--accent)">BAG BOT V2</b>
        <button class="close-btn" onclick="toggleMenu()">×</button>
    </div>
    <div style="padding: 15px 20px; background: #1a1a1a; border-left: 4px solid var(--accent);">🎭 Rôles-Réactions</div>
</div>

<div class="main">
    <button onclick="toggleMenu()" style="background:#333; color:white; border:none; padding:10px; border-radius:5px; margin-bottom:15px;">☰ Menu</button>
    
    <div class="panel">
        <div class="tabs">
            <div class="tab active" id="tab-simple" onclick="setMode('simple')">Simple</div>
            <div class="tab" id="tab-embed" onclick="setMode('embed')">Embed</div>
        </div>

        <label>ID Message (Modifier)</label>
        <input type="text" id="messageId">

        <label>Salon</label>
        <select id="channelId"></select>

        <label>Rôle</label>
        <select id="roleId"></select>

        <div id="box-simple">
            <label>Contenu</label>
            <textarea id="simpleText" rows="3"></textarea>
        </div>

        <div id="box-embed" style="display:none">
            <label>Titre</label>
            <input type="text" id="title">
            <label>Description</label>
            <textarea id="desc" rows="3"></textarea>
            <label>Image</label>
            <input type="file" id="imageFile">
        </div>

        <label>Type</label>
        <select id="displayType">
            <option value="button">Bouton</option>
            <option value="select">Menu</option>
        </select>

        <button class="btn-deploy" id="btn" onclick="send()">DÉPLOYER SUR DISCORD</button>
    </div>
</div>

<script>
    let mode = 'simple';

    function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); }
    
    function setMode(m) {
        mode = m;
        document.getElementById('tab-simple').className = m === 'simple' ? 'tab active' : 'tab';
        document.getElementById('tab-embed').className = m === 'embed' ? 'tab active' : 'tab';
        document.getElementById('box-simple').style.display = m === 'simple' ? 'block' : 'none';
        document.getElementById('box-embed').style.display = m === 'embed' ? 'block' : 'none';
    }

    async function load() {
        const [c, r] = await Promise.all([fetch('/api/channels').then(res => res.json()), fetch('/api/roles').then(res => res.json())]);
        document.getElementById('channelId').innerHTML = c.map(x => `<option value="${x.id}">${x.name}</option>`).join('');
        document.getElementById('roleId').innerHTML = r.map(x => `<option value="${x.id}">${x.name}</option>`).join('');
    }

    async function send() {
        const chan = document.getElementById('channelId').value;
        const role = document.getElementById('roleId').value;

        // Si le navigateur bug encore, on l'arrête ici
        if (!chan || chan === "undefined") return alert("Attends le chargement du salon !");

        document.getElementById('btn').innerText = "PATIENTEZ...";
        
        const fd = new FormData();
        fd.append('mode', mode);
        fd.append('channelId', chan);
        fd.append('roleId', role);
        fd.append('messageId', document.getElementById('messageId').value);
        fd.append('displayType', document.getElementById('displayType').value);
        fd.append('content', document.getElementById('simpleText').value);
        fd.append('title', document.getElementById('title').value);
        fd.append('description', document.getElementById('desc').value);
        
        const file = document.getElementById('imageFile').files[0];
        if (file) fd.append('imageFile', file);

        const res = await fetch('/update-bot', { method: 'POST', body: fd });
        const data = await res.json();
        
        alert(data.success ? "✅ Envoyé !" : "❌ " + data.message);
        document.getElementById('btn').innerText = "DÉPLOYER SUR DISCORD";
    }

    load();
</script>
</body>
</html>

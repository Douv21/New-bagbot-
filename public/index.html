<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BagBot Designer Pro - Full Source</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ============================================================
           SECTION 1 : VARIABLES ET THEME (Fidèle à 10128.jpg)
           ============================================================ */
        :root {
            --accent-color: #d37f6a;
            --background-dark: #2b2d31;
            --background-sidebar: #1e1f22;
            --background-black: #111214;
            --text-main: #dbdee1;
            --text-muted: #949ba4;
            --discord-embed-bg: #313338;
            --border-color: #3f4147;
            --danger-color: #ed4245;
        }

        /* ============================================================
           SECTION 2 : RESET ET STRUCTURE DE BASE
           ============================================================ */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: 'Whitney', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--background-dark);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* ============================================================
           SECTION 3 : SIDEBAR (Menu Latéral)
           ============================================================ */
        .sidebar {
            width: 260px;
            background-color: var(--background-sidebar);
            display: flex;
            flex-direction: column;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
            border-right: 1px solid var(--background-black);
            flex-shrink: 0;
        }

        .sidebar.hidden {
            margin-left: -260px;
        }

        .sidebar-header {
            padding: 24px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: var(--background-black);
        }

        .sidebar-logo {
            font-weight: 800;
            color: var(--accent-color);
            font-size: 18px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .nav-items-container {
            padding: 20px 10px;
            flex-grow: 1;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 4px;
            cursor: pointer;
            color: var(--text-muted);
            margin-bottom: 5px;
            font-weight: 500;
            transition: background 0.2s, color 0.2s;
        }

        .nav-item:hover {
            background-color: rgba(78, 80, 88, 0.3);
            color: white;
        }

        .nav-item.active {
            background-color: rgba(211, 127, 106, 0.1);
            color: white;
            border-left: 4px solid var(--accent-color);
        }

        /* ============================================================
           SECTION 4 : CONTENU PRINCIPAL
           ============================================================ */
        .main-wrapper {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            position: relative;
        }

        .header-navbar {
            height: 60px;
            background-color: var(--background-dark);
            display: flex;
            align-items: center;
            padding: 0 20px;
            border-bottom: 1px solid var(--background-black);
            gap: 15px;
        }

        .menu-icon {
            font-size: 22px;
            color: var(--accent-color);
            cursor: pointer;
        }

        .header-title {
            font-weight: 700;
            font-size: 15px;
            color: white;
            text-transform: uppercase;
        }

        .content-area {
            flex-grow: 1;
            overflow-y: auto;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ============================================================
           SECTION 5 : DESIGN DE L'EMBED (Fidèle à 10128.jpg)
           ============================================================ */
        .embed-preview-container {
            width: 100%;
            max-width: 520px;
            background-color: var(--discord-embed-bg);
            border-radius: 4px;
            border-left: 4px solid var(--accent-color);
            padding: 16px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        /* Slots pour images */
        .drop-zone {
            border: 2px dashed #4e5058;
            border-radius: 4px;
            background-color: rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: 0.2s;
        }

        .drop-zone:hover {
            border-color: var(--accent-color);
        }

        .drop-zone img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* Thumbnail position */
        .thumbnail-slot {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 80px;
            height: 80px;
            z-index: 10;
        }

        /* Author Line */
        .author-line {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        .author-avatar-slot {
            width: 24px;
            height: 24px;
            border-radius: 50%;
        }

        /* Text inputs */
        .embed-input {
            border: none;
            background: transparent;
            color: white;
            outline: none;
            width: 100%;
            font-family: inherit;
        }

        .embed-title-input {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .embed-description-input {
            font-size: 14px;
            color: var(--text-main);
            line-height: 1.4;
            min-height: 20px;
            margin-bottom: 12px;
        }

        .banner-slot {
            width: 100%;
            height: 180px;
            margin-top: 15px;
        }

        /* ============================================================
           SECTION 6 : CONTROLES (SÉLECTEURS)
           ============================================================ */
        .controls-container {
            width: 100%;
            max-width: 520px;
            margin-top: 30px;
            padding-bottom: 100px;
        }

        .group-label {
            display: block;
            font-size: 12px;
            font-weight: 800;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .discord-select {
            width: 100%;
            background-color: var(--background-black);
            border: 1px solid rgba(0,0,0,0.5);
            color: white;
            padding: 14px;
            border-radius: 4px;
            font-size: 15px;
            margin-bottom: 25px;
            outline: none;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 15px center;
            background-size: 18px;
        }

        /* Rôles et Réactions rows */
        .reaction-item {
            display: flex;
            align-items: center;
            gap: 12px;
            background-color: var(--background-sidebar);
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 10px;
            border: 1px solid var(--border-color);
        }

        .emoji-box-btn {
            font-size: 24px;
            width: 48px;
            height: 48px;
            background: rgba(0,0,0,0.4);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .emoji-box-btn:hover {
            background-color: var(--accent-color);
        }

        .btn {
            border: none;
            border-radius: 4px;
            padding: 16px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            transition: 0.2s;
        }

        .btn-secondary {
            background-color: #4e5058;
            color: white;
            margin-bottom: 15px;
        }

        .btn-primary {
            background-color: var(--accent-color);
            color: white;
            box-shadow: 0 4px 15px rgba(211, 127, 106, 0.4);
        }

        /* ============================================================
           SECTION 7 : EMOJI PICKER MODAL
           ============================================================ */
        #emoji-picker-container {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 99999;
        }

        .picker-box {
            background-color: #2f3136;
            width: 90%;
            max-width: 420px;
            height: 550px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .picker-header-top {
            padding: 15px 20px;
            background-color: var(--background-black);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .search-emoji-box {
            padding: 15px;
            background-color: #202225;
        }

        .search-emoji-box input {
            width: 100%;
            padding: 12px;
            background: var(--background-black);
            border: none;
            border-radius: 4px;
            color: white;
            outline: none;
        }

        .emojis-display-grid {
            flex-grow: 1;
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
            padding: 15px;
            overflow-y: auto;
        }

        .emoji-unit {
            font-size: 28px;
            text-align: center;
            padding: 5px;
            cursor: pointer;
            border-radius: 4px;
            transition: 0.1s;
        }

        .emoji-unit:hover {
            background: rgba(255,255,255,0.1);
            transform: scale(1.15);
        }

        /* Mobile specific adjustments */
        @media (max-width: 768px) {
            .sidebar { position: absolute; height: 100%; }
            .sidebar.hidden { margin-left: -260px; }
        }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span class="sidebar-logo">BAGBOT DESIGNER</span>
            <i class="fas fa-chevron-left" onclick="toggleSidebar()" style="cursor:pointer; color: #555;"></i>
        </div>
        <div class="nav-items-container">
            <div class="nav-item active">
                <i class="fas fa-plus-square"></i>
                <span>Créer un Embed</span>
            </div>
            <div class="nav-item">
                <i class="fas fa-folder-open"></i>
                <span>Mes Sauvegardes</span>
            </div>
            <div class="nav-item">
                <i class="fas fa-cog"></i>
                <span>Configuration Bot</span>
            </div>
        </div>
    </div>

    <div class="main-wrapper">
        <div class="header-navbar">
            <i class="fas fa-bars menu-icon" onclick="toggleSidebar()"></i>
            <span class="header-title">Interface de Conception</span>
        </div>

        <div class="content-area">
            
            <div class="embed-preview-container">
                <div class="thumbnail-slot drop-zone" onclick="triggerFileSelect('thumb')">
                    <i class="fas fa-plus" id="icon-thumb"></i>
                    <img id="img-thumb" style="display:none">
                </div>

                <div class="author-line">
                    <div class="author-avatar-slot drop-zone" onclick="triggerFileSelect('author')" style="width:24px; height:24px;">
                        <img id="img-author" style="display:none">
                    </div>
                    <div contenteditable="true" class="embed-input" style="font-size: 14px; font-weight: 600;">Nom de l'auteur</div>
                </div>

                <div contenteditable="true" class="embed-input embed-title-input">Titre de l'embed</div>

                <div contenteditable="true" class="embed-input embed-description-input">Décrivez ici le contenu de votre message pour votre serveur Discord...</div>

                <div class="banner-slot drop-zone" onclick="triggerFileSelect('banner')">
                    <i class="fas fa-image" id="icon-banner" style="font-size: 35px; color: #4e5058;"></i>
                    <img id="img-banner" style="display:none">
                </div>
            </div>

            <div class="controls-container">
                <label class="group-label">Salon de destination</label>
                <select class="discord-select" id="select-channel-discord">
                    <option value="1349448439402561637"># 📂-storage</option>
                    <option value="1"># 💬-général</option>
                    <option value="2"># 📢-annonces</option>
                    <option value="3"># 🛠-staff</option>
                </select>

                <label class="group-label">Rôles et Réactions (Auto-Rôle)</label>
                <div id="reactions-list-container">
                    </div>

                <button class="btn btn-secondary" onclick="addNewReactionRow()">
                    <i class="fas fa-plus-circle"></i> Ajouter une réaction
                </button>

                <button class="btn btn-primary" onclick="deployFinalEmbed()">
                    <i class="fas fa-paper-plane"></i> ENVOYER SUR LE SERVEUR
                </button>
            </div>

        </div>
    </div>

    <div id="emoji-picker-container">
        <div class="picker-box">
            <div class="picker-header-top">
                <span style="font-weight: 800; color: white;">Bibliothèque d'Emojis</span>
                <i class="fas fa-times" onclick="closeEmojiModal()" style="cursor:pointer; color: #888;"></i>
            </div>
            <div class="search-emoji-box">
                <input type="text" id="search-emoji-input" placeholder="Rechercher par nom..." onkeyup="filterEmojiList()">
            </div>
            <div class="emojis-display-grid" id="emojis-grid-view">
                </div>
        </div>
    </div>

    <input type="file" id="file-uploader-hidden" style="display:none" onchange="previewImage(this)">

    <script>
        // ============================================================
        // JAVASCRIPT COMPLET (NON COMPRESSÉ)
        // ============================================================
        
        let targetSlot = null;
        let activeEmojiButton = null;

        // Liste des rôles simulée (Apparaîtra dans les sélecteurs)
        const rolesServer = [
            { id: "101", name: "Membre" },
            { id: "102", name: "VIP" },
            { id: "103", name: "Modérateur" },
            { id: "104", name: "Annonceur" },
            { id: "105", name: "Partenaire" }
        ];

        // Bibliothèque massive d'émojis
        const emojiLibrary = [
            "😀","😃","😄","😁","😆","😅","😂","🤣","😊","😇","🙂","🙃","😉","😌","😍","🥰","😘","😗","😙","😚","😋","😛","😝","😜","🤪","🤨","🧐","🤓","😎","🤩","🥳","😏","😒","😞","😔","😟","😕","🙁","☹️","😣","😖","😫","😩","🥺","😢","😭","😤","😠","😡","🤬","🤯","😳","🥵","🥶","😱","😨","😰","😥","😓","🤗","🤔","🤭","🤫","🤥","😶","😐","😑","😬","🙄","😯","😦","😧","😮","😲","🥱","😴","🤤","😪","😵","🤐","🥴","🤢","🤮","🤧","😷","🤒","🤕","🤑","🤠","😈","👿","👹","👺","🤡","💩","👻","💀","☠️","👽","👾","🤖","🎃","😺","😸","😹","😻","😼","😽","🙀","😿","😾","👋","🤚","🖐️","✋","🖖","👌","🤏","✌️","🤞","🤟","🤘","🤙","👈","👉","👆","🖕","👇","☝️","👍","👎","✊","👊","🤛","🤜","👏","🙌","👐","🤲","🤝","🙏","✍️","💅","🤳","💪","🦾","🦵","🦿","🦶","👂","🦻","👃","🧠","🦷","🦴","👀","👁️","👅","👄","💋","🩸","❤️","🧡","💛","💚","💙","💜","🖤","🤍","🤎","💔","❣️","💕","💞","💓","💗","💖","💘","💝","💟","✨","⭐","🌟","🔥","💥","🌈","☀️","🌙","☁️","❄️","🌊","🍌","🍕","🎮","💻","📱","🚗","✈️","🚩"
        ];

        // 1. Initialisation
        window.onload = function() {
            renderEmojiGrid();
            if(window.innerWidth < 768) {
                document.getElementById('sidebar').classList.add('hidden');
            }
        };

        // 2. Gestion de la Sidebar
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('hidden');
        }

        // 3. Gestion des images
        function triggerFileSelect(slot) {
            targetSlot = slot;
            document.getElementById('file-uploader-hidden').click();
        }

        function previewImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.getElementById('img-' + targetSlot);
                    const icon = document.getElementById('icon-' + targetSlot);
                    img.src = e.target.result;
                    img.style.display = 'block';
                    if(icon) icon.style.display = 'none';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        // 4. Gestion des réactions
        function addNewReactionRow() {
            const container = document.getElementById('reactions-list-container');
            const row = document.createElement('div');
            row.className = 'reaction-item';
            
            // Création du sélecteur de rôle pour cette ligne
            let roleOptions = rolesServer.map(r => `<option value="${r.id}">${r.name}</option>`).join('');
            
            row.innerHTML = `
                <div class="emoji-box-btn" onclick="openEmojiModal(this)">😀</div>
                <select class="discord-select" style="margin-bottom:0; flex-grow:1;">
                    <option value="">Associer à un rôle...</option>
                    ${roleOptions}
                </select>
                <i class="fas fa-trash-alt" onclick="this.parentElement.remove()" style="color:var(--danger-color); cursor:pointer; padding:10px;"></i>
            `;

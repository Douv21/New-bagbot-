<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BagBot Ultimate Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #ff4d4d; --bg: #111214; --card: #2b2d31; --text: #dbdee1; --sidebar: #0b0b0b; --draft-coral: #d37f6a; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 10px; display: flex; flex-direction: column; align-items: center; }

        /* EMBED DISCORD */
        .discord-msg { background: #313338; border-radius: 8px; padding: 15px; width: 100%; max-width: 500px; margin-bottom: 20px; box-sizing: border-box; }
        .embed { background: #1e1f22; border-left: 4px solid var(--accent); border-radius: 4px; padding: 12px; position: relative; }
        .up-slot { border: 1px dashed #4e5058; border-radius: 4px; display: flex; align-items: center; justify-content: center; cursor: pointer; background: rgba(0,0,0,0.2); overflow: hidden; position: relative; }
        .up-slot img { width: 100%; height: 100%; object-fit: cover; position: absolute; }
        .thumb-slot { position: absolute; top: 12px; right: 12px; width: 60px; height: 60px; }
        .banner-slot { width: 100%; min-height: 100px; margin: 10px 0; }
        .embed-title { font-size: 16px; font-weight: 700; color: white; outline: none; margin: 10px 0 5px; }
        .embed-desc { font-size: 14px; color: #dbdee1; outline: none; min-height: 40px; white-space: pre-wrap; }

        /* INTERFACE */
        .card { background: var(--card); border-radius: 12px; padding: 15px; width: 100%; max-width: 500px; box-sizing: border-box; margin-bottom: 15px; }
        .label-style { font-size: 10px; color: #b5bac1; text-transform: uppercase; font-weight: 800; margin-bottom: 8px; display: block; }
        select { width: 100%; background: #1e1f22; border: 1px solid #111; color: white; padding: 12px; border-radius: 8px; margin-bottom: 10px; outline: none; }
        .reaction-row { background: #1e1f22; border-radius: 8px; padding: 10px; display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .emoji-trigger { width: 40px; height: 40px; background: #2b2d31; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; overflow: hidden; }
        .emoji-trigger img { width: 28px; height: 28px; }
        .btn-deploy { background: var(--accent); color: white; border: none; padding: 16px; width: 100%; border-radius: 8px; font-weight: 800; cursor: pointer; margin-top: 10px; }

        /* MODALS */
        #imgModal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000; display: none; align-items: center; justify-content: center; }
        .modal-box { background: var(--card); padding: 20px; border-radius: 12px; width: 90%; max-width: 350px; text-align: center; }
        #emojiPicker { position: fixed; bottom: 0; left: 0; width: 100%; height: 75vh; background: #111214; display: none; flex-direction: column; z-index: 1000; border-radius: 20px 20px 0 0; }
        .emoji-scroll { flex: 1; overflow-y: auto; padding: 15px; }
        .emoji-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
        .emoji-item { font-size: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .emoji-item img { width: 32px; height: 32px; }
    </style>
</head>
<body>

    <h3 style="margin: 15px 0;">BagBot Dashboard</h3>

    <div class="discord-msg">
        <div class="embed">
            <div class="up-slot thumb-slot" onclick="openImgChoice('thumb')">
                <i class="fas fa-plus" id="ic-thumb"></i>
                <img id="v-thumb" style="display:none">
            </div>
            <div style="display:flex; align-items:center; gap:8px; font-size:13px; font-weight:600; color:white;">
                <div class="up-slot" onclick="openImgChoice('auth')" style="width:20px; height:20px; border-radius:50%">
                    <img id="v-auth" style="display:none">
                </div>
                <span contenteditable="true" id="txt-auth">Nom de l'auteur</span>
            </div>
            <div class="embed-title" contenteditable="true" id="txt-title">Titre du message</div>
            <div class="embed-desc" contenteditable="true" id="txt-desc">Cliquez ici pour modifier...</div>
            <div class="up-slot banner-slot" onclick="openImgChoice('banner')">
                <i class="fas fa-image" id="ic-banner" style="font-size: 24px;"></i>
                <img id="v-banner" style="display:none">
            </div>
        </div>
    </div>

    <div class="card">
        <span class="label-style">Salon</span>
        <select id="sel-chans"></select>

        <span class="label-style">Mode d'attribution</span>
        <select id="sel-mode">
            <option value="multiple">Multiple (Ajout/Retrait)</option>
            <option value="unique">Unique (Sélectif)</option>
            <option value="definitif">Définitif (Fixe)</option>
        </select>
        
        <div id="reacs-box"></div>
        <button onclick="addReacRow()" style="width:100%; padding:10px; background:#3a3c41; color:white; border:none; border-radius:5px; cursor:pointer;">+ AJOUTER UN RÔLE</button>
        <button class="btn-deploy" onclick="deploy()">🚀 DÉPLOYER SUR DISCORD</button>
    </div>

    <div id="imgModal">
        <div class="modal-box">
            <button onclick="document.getElementById('f-in').click()" style="width:100%; padding:10px; margin:5px; background:var(--draft-coral); border:none; color:white; border-radius:5px;">Téléverser</button>
            <button onclick="closeImgChoice()" style="background:none; border:none; color:white; margin-top:10px;">Annuler</button>
        </div>
    </div>

    <div id="emojiPicker">
        <div class="emoji-scroll">
            <p class="label-style">Émojis Serveur</p>
            <div class="emoji-grid" id="grid-srv"></div>
            <p class="label-style" style="margin-top:20px">Standards</p>
            <div class="emoji-grid" id="grid-std"></div>
        </div>
        <button onclick="document.getElementById('emojiPicker').style.display='none'" style="padding:15px; background:#000; color:red; border:none;">FERMER</button>
    </div>

    <input type="file" id="f-in" style="display:none" onchange="handleFile(this)">

<script>
    const API = "http://192.168.1.133:49501";
    let roles = [], activeBtn = null, curZone = null;

    async function init() {
        fetch(`${API}/api/channels`).then(r => r.json()).then(data => {
            document.getElementById('sel-chans').innerHTML = data.map(c => `<option value="${c.id}"># ${c.name}</option>`).join('');
        });
        fetch(`${API}/api/roles`).then(r => r.json()).then(data => roles = data);
        fetch(`${API}/api/emojis`).then(r => r.json()).then(data => {
            document.getElementById('grid-srv').innerHTML = data.map(e => `<div class="emoji-item" onclick="pickEmoji('${e.id}', true, '${e.url}')"><img src="${e.url}"></div>`).join('');
        });
        const stds = ['😀','✅','❌','🔥','⭐','✨','⚡'];
        document.getElementById('grid-std').innerHTML = stds.map(s => `<div class="emoji-item" onclick="pickEmoji('${s}', false)">${s}</div>`).join('');
    }

    function openImgChoice(z) { curZone = z; document.getElementById('imgModal').style.display = 'flex'; }
    function closeImgChoice() { document.getElementById('imgModal').style.display = 'none'; }

    async function handleFile(input) {
        if(!input.files[0]) return;
        let fd = new FormData(); fd.append('file', input.files[0]);
        let res = await fetch(`${API}/api/upload`, {method:'POST', body:fd});
        let data = await res.json();
        const v = document.getElementById(`v-${curZone}`);
        v.src = data.url; v.style.display = 'block';
        if(document.getElementById(`ic-${curZone}`)) document.getElementById(`ic-${curZone}`).style.display = 'none';
        closeImgChoice();
    }

    function addReacRow() {
        const div = document.createElement('div');
        div.className = 'reaction-row';
        div.innerHTML = `<div class="emoji-trigger" onclick="openPicker(this)">😀</div>
            <select style="margin:0; flex:1;">${roles.map(r => `<option value="${r.id}">${r.name}</option>`).join('')}</select>
            <i class="fas fa-trash" onclick="this.parentElement.remove()"></i>`;
        document.getElementById('reacs-box').appendChild(div);
    }

    function openPicker(b) { activeBtn = b; document.getElementById('emojiPicker').style.display = 'flex'; }
    function pickEmoji(val, isCust, url) {
        activeBtn.innerHTML = isCust ? `<img src="${url}" data-id="${val}">` : val;
        if(!isCust) activeBtn.removeAttribute('data-id');
        document.getElementById('emojiPicker').style.display = 'none';
    }

    async function deploy() {
        const reactions = Array.from(document.querySelectorAll('.reaction-row')).map(row => ({
            emoji: row.querySelector('.emoji-trigger img')?.getAttribute('data-id') || row.querySelector('.emoji-trigger').innerText,
            roleId: row.querySelector('select').value
        }));

        await fetch(`${API}/api/deploy`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                channelId: document.getElementById('sel-chans').value,
                mode: document.getElementById('sel-mode').value,
                title: document.getElementById('txt-title').innerText,
                description: document.getElementById('txt-desc').innerText,
                author: document.getElementById('txt-auth').innerText,
                author_img: document.getElementById('v-auth').src,
                thumbnail: document.getElementById('v-thumb').src,
                banner: document.getElementById('v-banner').src,
                reactions: reactions
            })
        });
        alert("Déployé !");
    }
    window.onload = init;
</script>
</body>
</html>

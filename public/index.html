<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BAGBOT ELITE V9</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #0a0a0a; --card: #141414; --accent: #ed4245; --border: #252525; --d-bg: #2b2d31; --success: #43b581; }
        * { box-sizing: border-box; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; }

        .header { position: fixed; top: 0; left: 0; right: 0; height: 65px; background: #000; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; z-index: 2500; }
        .burger { font-size: 22px; color: var(--accent); cursor: pointer; margin-right: 20px; }
        .logo { font-weight: 900; letter-spacing: 2px; color: var(--accent); }

        #sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100vh; background: #000; z-index: 3000; transition: 0.3s; border-right: 1px solid var(--border); }
        #sidebar.open { left: 0; }
        .nav-item { padding: 20px; border-bottom: 1px solid #111; cursor: pointer; display: flex; align-items: center; gap: 15px; color: #888; font-weight: bold; }
        .nav-item.active { color: var(--accent); background: #ed424510; border-right: 4px solid var(--accent); }

        main { height: 100vh; overflow-y: auto; padding: 85px 15px 180px; -webkit-overflow-scrolling: touch; }
        .section { display: none; max-width: 600px; margin: 0 auto; }
        .section.active { display: block; }

        .preview { background: var(--d-bg); border-left: 4px solid var(--accent); border-radius: 4px; padding: 15px; margin-bottom: 25px; }
        .pv-top { display: flex; justify-content: space-between; gap: 10px; }
        .pv-thumb { width: 65px; height: 65px; border-radius: 4px; background: #222; border: 1px dashed #444; overflow: hidden; cursor: pointer; }
        .pv-banner { width: 100%; height: 140px; border-radius: 8px; background: #222; border: 1px dashed #444; margin-top: 10px; overflow: hidden; cursor: pointer; }
        .pv-f-icon { width: 20px; height: 20px; border-radius: 50%; background: #222; border: 1px dashed #444; overflow: hidden; cursor: pointer; }
        img { width: 100%; height: 100%; object-fit: cover; }

        .card { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid var(--border); margin-bottom: 20px; }
        label { display: block; font-size: 11px; font-weight: 800; color: #555; text-transform: uppercase; margin: 15px 0 8px; }
        .var-box { background: #000; padding: 12px; border-radius: 10px; margin-top: 8px; border: 1px solid #222; font-size: 12px; line-height: 1.6; }
        .var-box b { color: var(--accent); font-family: monospace; }

        input, textarea, select { width: 100%; background: #000; border: 1px solid var(--border); color: #fff; padding: 14px; border-radius: 10px; font-size: 14px; outline: none; }
        input[type="color"] { height: 45px; padding: 5px; cursor: pointer; }

        .drop-btn { background: #000; border: 1px solid var(--border); padding: 14px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .drop-menu { display: none; background: #050505; border: 1px solid var(--border); border-radius: 10px; max-height: 200px; overflow-y: auto; margin-top: 5px; }
        .drop-menu.show { display: block; }
        .role-item { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid #111; cursor: pointer; }
        .role-item input { width: 18px; height: 18px; margin-right: 15px; }

        .btn { border: none; padding: 16px; border-radius: 12px; font-weight: 800; width: 100%; cursor: pointer; margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s; }
        .btn-save { background: var(--accent); color: #fff; }
        .btn-test { background: #5865f2; color: #fff; }
        .btn-test.success { background: var(--success) !important; }

        .gallery-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 15px; }
        .img-card { height: 100px; border-radius: 10px; border: 1px solid var(--border); overflow: hidden; position: relative; background: #000; }
        .del-img { position: absolute; top: 5px; right: 5px; background: var(--accent); color: white; border: none; border-radius: 4px; padding: 5px; z-index: 5; cursor: pointer; }

        .shop-item-card { background: #000; border: 1px solid #222; border-radius: 15px; padding: 15px; margin-bottom: 15px; position: relative; }
    </style>
</head>
<body>

    <div class="header">
        <i class="fas fa-bars burger" onclick="toggleSidebar(event)"></i>
        <div class="logo">BAGBOT ELITE</div>
    </div>

    <div id="sidebar">
        <div style="padding: 30px; text-align: center; color: var(--accent); font-weight: 900; letter-spacing: 3px;">BAGBOT</div>
        <div class="nav-item active" onclick="showTab('welcome', this)"><i class="fas fa-paper-plane"></i> BIENVENUE</div>
        <div class="nav-item" onclick="showTab('leave', this)"><i class="fas fa-sign-out-alt"></i> DÉPART</div>
        <div class="nav-item" onclick="showTab('shop', this)"><i class="fas fa-shopping-cart"></i> BOUTIQUE</div>
        <div class="nav-item" onclick="showTab('admin', this)"><i class="fas fa-user-shield"></i> PERMISSIONS</div>
        <div class="nav-item" onclick="showTab('gallery', this)"><i class="fas fa-images"></i> GALERIE</div>
    </div>

    <main id="main-scroll" onclick="closeSidebar()">
        <div id="welcome" class="section active">
            <div id="pv-box-welcome" class="preview">
                <div class="pv-top">
                    <div style="flex-grow:1">
                        <div id="pv-title-welcome" style="color:#00a8fc; font-weight:bold;">Titre</div>
                        <div id="pv-desc-welcome" style="font-size:14px; margin-top:5px; white-space:pre-wrap;">Description</div>
                    </div>
                    <div class="pv-thumb" onclick="openPicker('welcome', 'thumbnail')"><img id="w-img-thumb"></div>
                </div>
                <div class="pv-banner" onclick="openPicker('welcome', 'banner')"><img id="w-img-banner"></div>
                <div style="display:flex; align-items:center; gap:8px; margin-top:10px; font-size:12px; color:#b5bac1;">
                    <div class="pv-f-icon" onclick="openPicker('welcome', 'footer_icon')"><img id="w-img-footer"></div>
                    <span id="pv-footer-text-welcome">Footer</span>
                </div>
            </div>
            <div class="card">
                <h2>Bienvenue</h2>
                <label>Couleur</label><input type="color" id="w-color" oninput="sync('welcome')">
                <label>Titre</label><input type="text" id="w-title" oninput="sync('welcome')">
                <label>Message</label><textarea id="w-desc" rows="5" oninput="sync('welcome')"></textarea>
                <div class="var-box"><b>{user}</b> | <b>{server}</b> | <b>{count}</b></div>
                <label>Footer</label><input type="text" id="w-footer" oninput="sync('welcome')">
                <label>Rôles</label>
                <div class="drop-btn" onclick="toggleDrop(event, 'w-role-menu')"><span id="w-role-label">0 rôles</span> <i class="fas fa-chevron-down"></i></div>
                <div id="w-role-menu" class="drop-menu"></div>
                <label>Salon</label><select id="w-channel"></select>
                <button class="btn btn-save" onclick="save()">SAUVEGARDER</button>
                <button class="btn btn-test" id="w-btn-test" onclick="test('welcome')">TESTER</button>
            </div>
        </div>

        <div id="leave" class="section">
            <div id="pv-box-leave" class="preview">
                <div class="pv-top">
                    <div style="flex-grow:1">
                        <div id="pv-title-leave" style="color:#00a8fc; font-weight:bold;">Titre</div>
                        <div id="pv-desc-leave" style="font-size:14px; margin-top:5px; white-space:pre-wrap;">Description</div>
                    </div>
                    <div class="pv-thumb" onclick="openPicker('leave', 'thumbnail')"><img id="l-img-thumb"></div>
                </div>
                <div class="pv-banner" onclick="openPicker('leave', 'banner')"><img id="l-img-banner"></div>
                <div style="display:flex; align-items:center; gap:8px; margin-top:10px; font-size:12px; color:#b5bac1;">
                    <div class="pv-f-icon" onclick="openPicker('leave', 'footer_icon')"><img id="l-img-footer"></div>
                    <span id="pv-footer-text-leave">Footer</span>
                </div>
            </div>
            <div class="card">
                <h2>Départ</h2>
                <label>Couleur</label><input type="color" id="l-color" oninput="sync('leave')">
                <label>Titre</label><input type="text" id="l-title" oninput="sync('leave')">
                <label>Message</label><textarea id="l-desc" rows="5" oninput="sync('leave')"></textarea>
                <label>Footer</label><input type="text" id="l-footer" oninput="sync('leave')">
                <label>Salon</label><select id="l-channel"></select>
                <button class="btn btn-save" onclick="save()">SAUVEGARDER</button>
                <button class="btn btn-test" id="l-btn-test" onclick="test('leave')">TESTER</button>
            </div>
        </div>

        <div id="shop" class="section">
            <div class="card">
                <h2>Boutique Elite</h2>
                <label>Titre Boutique</label><input type="text" id="s-title">
                <label>Description Boutique</label><textarea id="s-desc" rows="3"></textarea>
                <label>Couleur Thème</label><input type="color" id="s-color">
                
                <hr style="border:0; border-top:1px solid #222; margin:20px 0;">
                <label>Articles en vente</label>
                <div id="shop-items-container"></div>
                <button class="btn" style="background:#222;" onclick="addShopItem()"><i class="fas fa-plus"></i> AJOUTER ARTICLE</button>
                
                <button class="btn btn-save" onclick="save()">SAUVEGARDER LA BOUTIQUE</button>
            </div>
        </div>

        <div id="admin" class="section">
            <div class="card">
                <h2>Permissions Admin</h2>
                <div class="drop-btn" onclick="toggleDrop(event, 'admin-menu')"><span id="admin-label">0 rôles</span> <i class="fas fa-chevron-down"></i></div>
                <div id="admin-menu" class="drop-menu"></div>
                <button class="btn btn-save" onclick="save()">APPLIQUER</button>
            </div>
        </div>

        <div id="gallery" class="section">
            <div class="card">
                <h2>Galerie</h2>
                <input type="file" id="file-input" onchange="uploadFile()">
                <div id="gallery-list" class="gallery-grid"></div>
                <button class="btn btn-save" onclick="showTab(lastTab)">RETOUR</button>
            </div>
        </div>
    </main>

    <script>
        let db = {}; let activeMode = ''; let activeType = ''; let lastTab = 'welcome'; let shopItems = [];

        async function init() {
            const res = await fetch('/api/get_data');
            db = await res.json();
            
            // Welcome
            const w = db.config.welcome;
            document.getElementById('w-title').value = w.title;
            document.getElementById('w-desc').value = w.desc;
            document.getElementById('w-footer').value = w.footer;
            document.getElementById('w-color').value = w.color;
            document.getElementById('w-channel').innerHTML = db.channels.map(ch => `<option value="${ch.id}"># ${ch.name}</option>`).join('');
            document.getElementById('w-channel').value = w.channel;
            setImg('welcome', 'thumbnail', w.thumbnail); setImg('welcome', 'banner', w.banner); setImg('welcome', 'footer_icon', w.footer_icon);
            
            // Leave
            const l = db.config.leave || { title: "", desc: "", footer: "", color: "#ed4245" };
            document.getElementById('l-title').value = l.title;
            document.getElementById('l-desc').value = l.desc;
            document.getElementById('l-footer').value = l.footer;
            document.getElementById('l-color').value = l.color;
            document.getElementById('l-channel').innerHTML = db.channels.map(ch => `<option value="${ch.id}"># ${ch.name}</option>`).join('');
            document.getElementById('l-channel').value = l.channel;
            setImg('leave', 'thumbnail', l.thumbnail); setImg('leave', 'banner', l.banner); setImg('leave', 'footer_icon', l.footer_icon);

            // Shop
            const s = db.config.shop || { title: "Boutique", description: "", color: "#ed4245", items: [] };
            document.getElementById('s-title').value = s.title;
            document.getElementById('s-desc').value = s.description;
            document.getElementById('s-color').value = s.color;
            shopItems = s.items || [];
            renderShopItems();

            renderChecklist('w-role-menu', db.config.welcome.trigger_roles || [], 'w-role-label');
            renderChecklist('admin-menu', db.config.admin_roles || [], 'admin-label');
            renderGallery(); sync('welcome'); sync('leave');
        }

        function parseVars(text) {
            if(!text) return "";
            return text.replace(/{user}/g, "@User").replace(/{server}/g, db.server_info.name).replace(/{count}/g, db.server_info.member_count);
        }

        function sync(mode) {
            const p = (mode === 'welcome') ? 'w' : 'l';
            document.getElementById(`pv-box-${mode}`).style.borderLeftColor = document.getElementById(`${p}-color`).value;
            document.getElementById(`pv-title-${mode}`).innerText = parseVars(document.getElementById(`${p}-title`).value);
            document.getElementById(`pv-desc-${mode}`).innerText = parseVars(document.getElementById(`${p}-desc`).value);
            document.getElementById(`pv-footer-text-${mode}`).innerText = document.getElementById(`${p}-footer`).value;
        }

        function renderShopItems() {
            const container = document.getElementById('shop-items-container');
            container.innerHTML = shopItems.map((item, i) => `
                <div class="shop-item-card">
                    <button class="del-img" onclick="removeShopItem(${i})">✕</button>
                    <label>Nom Article</label><input type="text" value="${item.name}" onchange="updateShopItem(${i}, 'name', this.value)">
                    <div style="display:flex; gap:10px;">
                        <div style="flex:1"><label>Prix</label><input type="number" value="${item.price}" onchange="updateShopItem(${i}, 'price', this.value)"></div>
                        <div style="flex:2"><label>Rôle (Nom)</label><input type="text" value="${item.role}" onchange="updateShopItem(${i}, 'role', this.value)"></div>
                    </div>
                </div>
            `).join('');
        }

        function addShopItem() { shopItems.push({name:"Nouvel Article", price:0, role:""}); renderShopItems(); }
        function removeShopItem(i) { shopItems.splice(i, 1); renderShopItems(); }
        function updateShopItem(i, k, v) { shopItems[i][k] = v; }

        function renderChecklist(menuId, selected, labelId) {
            document.getElementById(menuId).innerHTML = db.roles.map(r => `<div class="role-item" onclick="toggleCheck(this, '${labelId}')"><input type="checkbox" value="${r}" ${selected.includes(r)?'checked':''}><span>${r}</span></div>`).join('');
            updateCount(menuId, labelId);
        }

        function toggleCheck(el, labelId) { el.querySelector('input').checked = !el.querySelector('input').checked; updateCount(el.parentElement.id, labelId); }
        function updateCount(menuId, labelId) { const n = document.querySelectorAll(`#${menuId} input:checked`).length; document.getElementById(labelId).innerText = n + " rôle(s)"; }

        function openPicker(m, t) { activeMode = m; activeType = t; lastTab = m; showTab('gallery'); }
        function setImg(m, t, u) {
            const p = (m === 'welcome') ? 'w' : 'l';
            const idMap = {'thumbnail':`${p}-img-thumb`,'banner':`${p}-img-banner`,'footer_icon':`${p}-img-footer`};
            const el = document.getElementById(idMap[t]);
            if(u) { el.src = u; el.style.display = 'block'; el.dataset.url = u; }
            else if(el) { el.style.display = 'none'; el.dataset.url = ""; }
        }

        function selectImage(u) { if(activeMode) { setImg(activeMode, activeType, u); showTab(activeMode); sync(activeMode); } }
        async function uploadFile() {
            const fd = new FormData(); fd.append('file', document.getElementById('file-input').files[0]);
            const res = await fetch('/api/upload', { method: 'POST', body: fd });
            const r = await res.json(); if(r.path) { db.images.push(r.path); renderGallery(); selectImage(r.path); }
        }

        function renderGallery() { document.getElementById('gallery-list').innerHTML = db.images.map(img => `<div class="img-card"><button class="del-img" onclick="deleteImg('${img}', event)">✕</button><img src="${img}" onclick="selectImage('${img}')"></div>`).join(''); }
        async function deleteImg(p, e) { e.stopPropagation(); await fetch('/api/delete_image', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({path:p}) }); db.images = db.images.filter(i => i !== p); renderGallery(); }

        async function save() {
            const config = {
                welcome: {
                    title: document.getElementById('w-title').value, desc: document.getElementById('w-desc').value,
                    footer: document.getElementById('w-footer').value, color: document.getElementById('w-color').value,
                    channel: document.getElementById('w-channel').value,
                    thumbnail: document.getElementById('w-img-thumb').dataset.url || "",
                    banner: document.getElementById('w-img-banner').dataset.url || "",
                    footer_icon: document.getElementById('w-img-footer').dataset.url || "",
                    trigger_roles: Array.from(document.querySelectorAll('#w-role-menu input:checked')).map(i => i.value)
                },
                leave: {
                    title: document.getElementById('l-title').value, desc: document.getElementById('l-desc').value,
                    footer: document.getElementById('l-footer').value, color: document.getElementById('l-color').value,
                    channel: document.getElementById('l-channel').value,
                    thumbnail: document.getElementById('l-img-thumb').dataset.url || "",
                    banner: document.getElementById('l-img-banner').dataset.url || "",
                    footer_icon: document.getElementById('l-img-footer').dataset.url || ""
                },
                shop: {
                    title: document.getElementById('s-title').value,
                    description: document.getElementById('s-desc').value,
                    color: document.getElementById('s-color').value,
                    items: shopItems
                },
                admin_roles: Array.from(document.querySelectorAll('#admin-menu input:checked')).map(i => i.value)
            };
            await fetch('/api/save', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(config) });
            alert("Sauvegardé !");
        }

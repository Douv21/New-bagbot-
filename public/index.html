<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BagBot Ultimate Dashboard</title>
    <style>
        :root { --accent: #ff4d4d; --bg: #111214; --card: #2b2d31; --text: #dbdee1; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; width: 100%; max-width: 500px; margin-top: 20px; }
        .embed-preview { background: #1e1f22; border-left: 4px solid var(--accent); padding: 15px; border-radius: 4px; width: 100%; max-width: 470px; margin-bottom: 20px; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; border: none; }
        input, select { background: #111; color: white; }
        button { background: var(--accent); color: white; font-weight: bold; cursor: pointer; }
        .reaction-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
        .emoji-btn { width: 45px; height: 45px; background: #333; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 8px; }
    </style>
</head>
<body>

    <h2>BagBot Dashboard</h2>

    <div class="embed-preview">
        <div id="p-title" contenteditable="true" style="font-weight:bold; font-size:18px;">Titre de l'embed</div>
        <div id="p-desc" contenteditable="true" style="margin-top:10px;">Description ici...</div>
    </div>

    <div class="card">
        <label>Salon Discord</label>
        <select id="sel-chans"></select>

        <label>Mode d'attribution des rôles</label>
        <select id="sel-mode">
            <option value="multiple">Multiple (Ajout/Retrait)</option>
            <option value="unique">Unique (Un seul à la fois)</option>
            <option value="definitif">Définitif (Retrait impossible)</option>
        </select>

        <label>URL Image de fond (Bannière)</label>
        <input type="text" id="in-banner" placeholder="http://Lien-vers-image.png">

        <div id="reacs-container"></div>
        <button type="button" onclick="addReactionLine()" style="background:#444;">+ Ajouter un rôle</button>

        <button onclick="deploy()">🚀 DÉPLOYER SUR DISCORD</button>
    </div>

    <script>
        const API = "http://192.168.1.133:49501"; //
        let roles = [];

        async function init() {
            try {
                const rChans = await fetch(`${API}/api/channels`);
                const dChans = await rChans.json();
                document.getElementById('sel-chans').innerHTML = dChans.map(c => `<option value="${c.id}"># ${c.name}</option>`).join('');

                const rRoles = await fetch(`${API}/api/roles`);
                roles = await rRoles.json();
            } catch (e) { alert("Erreur de connexion au Bot !"); }
        }

        function addReactionLine() {
            const div = document.createElement('div');
            div.className = 'reaction-row';
            div.innerHTML = `
                <input type="text" placeholder="Emoji (ou ID)" style="width:80px;" class="reac-emoji">
                <select class="reac-role">${roles.map(r => `<option value="${r.id}">${r.name}</option>`).join('')}</select>
            `;
            document.getElementById('reacs-container').appendChild(div);
        }

        async function deploy() {
            const reactions = [];
            document.querySelectorAll('.reaction-row').forEach(row => {
                reactions.push({
                    emoji: row.querySelector('.reac-emoji').value,
                    roleId: row.querySelector('.reac-role').value
                });
            });

            const payload = {
                channelId: document.getElementById('sel-chans').value,
                mode: document.getElementById('sel-mode').value,
                title: document.getElementById('p-title').innerText,
                description: document.getElementById('p-desc').innerText,
                banner: document.getElementById('in-banner').value,
                reactions: reactions
            };

            const res = await fetch(`${API}/api/deploy`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });

            if (res.ok) alert("✅ Message envoyé !");
            else alert("❌ Erreur lors de l'envoi.");
        }

        window.onload = init;
    </script>
</body>
</html>

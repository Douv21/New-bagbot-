<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BAGBOT | Elite Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --bg: #050505; --side: #000; --card: #0f0f0f; --accent: #ed4245; 
            --border: #1a1a1a; --d-bg: #2b2d31; --text: #ffffff; --text-dim: #666;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; 
            margin: 0; display: flex; height: 100vh; overflow: hidden; 
        }

        /* --- SIDEBAR --- */
        #sidebar { 
            width: 280px; background: var(--side); border-right: 1px solid var(--border); 
            display: flex; flex-direction: column; flex-shrink: 0; transition: 0.4s ease;
            z-index: 2000;
        }
        .brand { 
            padding: 35px; font-size: 26px; font-weight: 900; color: var(--accent); 
            text-align: center; border-bottom: 1px solid var(--border); letter-spacing: 4px;
        }
        .nav-items { flex-grow: 1; padding: 20px 0; }
        .nav-item { 
            padding: 18px 30px; display: flex; align-items: center; gap: 15px; 
            color: var(--text-dim); cursor: pointer; transition: 0.3s; font-weight: bold;
            text-transform: uppercase; font-size: 13px;
        }
        .nav-item.active { 
            color: var(--accent); background: rgba(237, 66, 69, 0.05); 
            border-right: 4px solid var(--accent); 
        }

        /* --- HEADER MOBILE --- */
        .mobile-header { 
            display: none; position: fixed; top: 0; left: 0; right: 0; height: 70px;
            background: var(--side); border-bottom: 1px solid var(--border); 
            z-index: 1500; align-items: center; padding: 0 25px;
        }
        .burger { font-size: 26px; color: var(--accent); cursor: pointer; }

        /* --- MAIN AREA --- */
        main { flex-grow: 1; padding: 40px; overflow-y: auto; scroll-behavior: smooth; position: relative; }

        .section { display: none; max-width: 850px; margin: 0 auto; animation: fadeInUp 0.4s ease; }
        .section.active { display: block; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; } }

        /* --- DISCORD PREVIEW --- */
        .preview-container { 
            background: var(--d-bg); border-left: 4px solid var(--accent); border-radius: 4px; 
            padding: 20px; margin-bottom: 35px; box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        .pv-title { color: #00a8fc; font-weight: 700; font-size: 16px; margin-bottom: 8px; }
        .pv-desc { color: #dbdee1; font-size: 14px; line-height: 1.4; white-space: pre-wrap; }
        .pv-banner { 
            width: 100%; height: 180px; border-radius: 8px; background: #1e1f22; 
            margin-top: 15px; border: 1px dashed #444; overflow: hidden;
        }
        .pv-banner img { width: 100%; height: 100%; object-fit: cover; }

        /* --- CUSTOM MULTISELECT DROPDOWN --- */
        .dropdown-container { position: relative; width: 100%; }
        .dropdown-button {
            background: #000; border: 1px solid var(--border); padding: 15px; border-radius: 12px;
            cursor: pointer; display: flex; justify-content: space-between; align-items: center;
        }
        .dropdown-menu {
            display: none; position: absolute; top: 100%; left: 0; right: 0; 
            background: #0a0a0a; border: 1px solid var(--border); border-radius: 12px;
            margin-top: 5px; max-height: 250px; overflow-y: auto; z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        .dropdown-menu.show { display: block; }
        .dropdown-item {
            display: flex; align-items: center; gap: 12px; padding: 12px 20px;
            cursor: pointer; transition: 0.2s; border-bottom: 1px solid #111;
        }
        .dropdown-item:hover { background: #151515; }
        .dropdown-item input { width: 18px; height: 18px; accent-color: var(--accent); }
        .dropdown-item span { font-size: 14px; color: #ccc; }

        /* --- CARDS & FORM --- */
        .card { background: var(--card); border: 1px solid var(--border); padding: 30px; border-radius: 25px; margin-bottom: 30px; }
        label { display: block; margin: 25px 0 10px; color: #444; font-size: 11px; font-weight: 900; text-transform: uppercase; }
        input[type="text"], textarea, select { 
            width: 100%; background: #000; border: 1px solid var(--border); color: #fff; 
            padding: 16px; border-radius: 12px; font-size: 14px;
        }
        .btn-elite { 
            padding: 20px; border: none; border-radius: 15px; font-weight: 900; 
            cursor: pointer; transition: 0.3s; width: 100%; font-size: 16px;
            background: var(--accent); color: white; margin-top: 20px;
        }

        /* --- GALLERY --- */
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        .gallery-card { 
            background: #0a0a0a; border-radius: 15px; overflow: hidden; border: 1px solid var(--border); 
            position: relative; transition: 0.3s;
        }
        .gallery-card img { width: 100%; height: 120px; object-fit: cover; cursor: pointer; }
        .del-btn {
            position: absolute; top: 10px; right: 10px; background: rgba(237, 66, 69, 0.9);
            color: white; border: none; border-radius: 8px; width: 32px; height: 32px; cursor: pointer;
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 768px) {
            .mobile-header { display: flex; }
            #sidebar { position: fixed; left: -285px; height: 100vh; }
            #sidebar.open { left: 0; }
            main { padding: 100px 20px 40px; }
        }

        #toast {
            position: fixed; bottom: 30px; right: 30px; padding: 15px 30px;
            background: #2ecc71; color: white; border-radius: 12px; font-weight: bold;
            transform: translateY(150px); transition: 0.5s; z-index: 3000;
        }
    </style>
</head>
<body>

    <div class="mobile-header">
        <i class="fas fa-bars burger" onclick="toggleSidebar()"></i>
        <div style="font-weight: 900; color: var(--accent); margin-left: 20px;">BAGBOT</div>
    </div>

    <nav id="sidebar">
        <div class="brand">BAGBOT</div>
        <div class="nav-items">
            <div class="nav-item active" onclick="showTab('welcome', this)"><i class="fas fa-paper-plane"></i> BIENVENUE</div>
            <div class="nav-item" onclick="showTab('gallery', this)"><i class="fas fa-images"></i> GALERIE</div>
            <div class="nav-item" onclick="showTab('admin', this)"><i class="fas fa-user-shield"></i> PERMISSIONS</div>
        </div>
    </nav>

    <main onclick="closeSidebar()">
        <div id="welcome" class="section active">
            <div class="preview-container">
                <div id="pv-title" class="pv-title">Titre</div>
                <div id="pv-desc" class="pv-desc">Description...</div>
                <div class="pv-banner"><img id="pv-banner-img" src=""></div>
            </div>

            <div class="card">
                <h2>Configuration Bienvenue</h2>
                
                <label>Titre</label>
                <input type="text" id="w-title" oninput="sync()">
                
                <label>Message</label>
                <textarea id="w-desc" rows="5" oninput="sync()"></textarea>
                
                <label>Rôles de déclenchement</label>
                <div class="dropdown-container">
                    <div class="dropdown-button" onclick="toggleDropdown('w-roles-menu')">
                        <span id="w-roles-label">Choisir les rôles...</span>
                        <i class="fas fa-chevron-down"></i>
                    </div>
                    <div id="w-roles-menu" class="dropdown-menu"></div>
                </div>

                <label>Salon</label>
                <select id="w-channel"></select>

                <button class="btn-elite" onclick="saveData()">SAUVEGARDER L'ELITE</button>
            </div>
        </div>

        <div id="gallery" class="section">
            <div class="card">
                <h2>Bibliothèque Média</h2>
                <div id="gallery-list" class="gallery-grid"></div>
            </div>
        </div>

        <div id="admin" class="section">
            <div class="card">
                <h2>Permissions d'Accès</h2>
                <label>Rôles autorisés au panel</label>
                <div class="dropdown-container">
                    <div class="dropdown-button" onclick="toggleDropdown('a-roles-menu')">
                        <span id="a-roles-label">Choisir les rôles...</span>
                        <i class="fas fa-chevron-down"></i>
                    </div>
                    <div id="a-roles-menu" class="dropdown-menu"></div>
                </div>
                <button class="btn-elite" onclick="saveData()">APPLIQUER</button>
            </div>
        </div>
    </main>

    <div id="toast">ACTION RÉUSSIE !</div>

    <script>
        let fullData = {};

        async function init() {
            const res = await fetch('/api/get_data');
            fullData = await res.json();

            // Salons
            document.getElementById('w-channel').innerHTML = fullData.channels.map(c => 
                `<option value="${c.id}"># ${c.name}</option>`
            ).join('');

            // Rôles
            renderRoles('w-roles-menu', 'w-role-check', fullData.config.welcome.trigger_roles);
            renderRoles('a-roles-menu', 'a-role-check', fullData.config.admin_roles);

            // Inputs
            document.getElementById('w-title').value = fullData.config.welcome.title;
            document.getElementById('w-desc').value = fullData.config.welcome.desc;
            document.getElementById('w-channel').value = fullData.config.welcome.channel;
            if(fullData.config.welcome.banner) document.getElementById('pv-banner-img').src = fullData.config.welcome.banner;

            renderGallery();
            sync();
        }

        function renderRoles(containerId, className, selected) {
            const container = document.getElementById(containerId);
            container.innerHTML = fullData.roles.map(r => `
                <div class="dropdown-item" onclick="this.querySelector('input').click(); event.stopPropagation();">
                    <input type="checkbox" class="${className}" value="${r}" ${selected.includes(r)?'checked':''} onchange="updateLabel('${containerId}')" onclick="event.stopPropagation()">
                    <span>${r}</span>
                </div>
            `).join('');
            updateLabel(containerId);
        }

        function toggleDropdown(id) {
            document.getElementById(id).classList.toggle('show');
        }

        function updateLabel(id) {
            const checked = document.querySelectorAll(`#${id} input:checked`).length;
            const label = document.getElementById(id.replace('menu', 'label'));
            label.innerText = checked > 0 ? `${checked} rôle(s) sélectionné(s)` : "Choisir les rôles...";
        }

        function renderGallery() {
            document.getElementById('gallery-list').innerHTML = fullData.images.map(img => `
                <div class="gallery-card">
                    <button class="del-btn" onclick="deleteImg('${img}')"><i class="fas fa-trash"></i></button>
                    <img src="${img}" onclick="setBanner('${img}')">
                </div>
            `).join('');
        }

        async function deleteImg(path) {
            if(!confirm("Supprimer l'image ?")) return;
            const res = await fetch('/api/delete_image', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({path})
            });
            if(res.ok) {
                fullData.images = fullData.images.filter(i => i !== path);
                renderGallery();
                showToast("Image supprimée");
            }
        }

        function setBanner(url) {
            document.getElementById('pv-banner-img').src = url;
            fullData.config.welcome.banner = url;
        }

        function sync() {
            document.getElementById('pv-title').innerText = document.getElementById('w-title').value || "Titre";
            document.getElementById('pv-desc').innerText = document.getElementById('w-desc').value || "Description...";
        }

        async function saveData() {
            const config = {
                welcome: {
                    title: document.getElementById('w-title').value,
                    desc: document.getElementById('w-desc').value,
                    channel: document.getElementById('w-channel').value,
                    banner: fullData.config.welcome.banner,
                    trigger_roles: Array.from(document.querySelectorAll('.w-role-check:checked')).map(i => i.value)
                },
                admin_roles: Array.from(document.querySelectorAll('.a-role-check:checked')).map(i => i.value)
            };
            await fetch('/api/save', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(config)
            });
            showToast("Sauvegardé avec succès !");
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
        function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); }
        function showTab(id, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
            closeSidebar();
        }
        function showToast(m) {
            const t = document.getElementById('toast'); t.innerText = m;
            t.style.transform = "translateY(0)";
            setTimeout(() => t.style.transform = "translateY(150px)", 3000);
        }

        window.onclick = function(e) {
            if (!e.target.closest('.dropdown-container')) {
                document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('show'));
            }
        }

        window.onload = init;
    </script>
</body>
</html>

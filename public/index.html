<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BagBot Designer Mobile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #d37f6a; --bg: #1e1f22; --dark: #111214; --text: #dbdee1; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* SIDEBAR RÉTRACTABLE */
        .sidebar { position: fixed; left: -260px; top: 0; bottom: 0; width: 260px; background: var(--dark); transition: 0.3s; z-index: 1000; border-right: 1px solid #333; }
        .sidebar.open { left: 0; }
        .nav-item { padding: 15px 25px; display: flex; align-items: center; gap: 15px; color: #888; text-decoration: none; }
        .nav-item.active { color: var(--accent); background: rgba(211, 127, 106, 0.1); }

        /* MAIN */
        .main { width: 100%; min-height: 100vh; display: flex; flex-direction: column; }
        .header { background: var(--dark); padding: 15px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #333; position: sticky; top:0; z-index: 900; }
        
        /* BUILDER RESPONSIVE */
        .container { padding: 15px; display: flex; flex-direction: column; align-items: center; gap: 20px; box-sizing: border-box; }
        .embed-preview { background: #313338; border-radius: 8px; padding: 12px; width: 100%; max-width: 450px; position: relative; border-left: 4px solid var(--accent); }
        .slot { border: 1px dashed #4e5058; border-radius: 4px; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.2); cursor: pointer; position: relative; overflow: hidden; min-height: 40px; }
        .slot img { width: 100%; height: 100%; object-fit: cover; position: absolute; }
        .banner-slot { width: 100%; height: 140px; margin-top: 10px; }
        .thumb-slot { position: absolute; top: 12px; right: 12px; width: 60px; height: 60px; z-index: 10; }

        /* MODAL MEDIA (CHOIX LIEN / UPLOAD) */
        #mediaModal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-box { background: #2b2d31; padding: 25px; border-radius: 12px; width: 100%; max-width: 320px; text-align: center; }
        .modal-box input { width: 100%; padding: 10px; background: #111214; border: 1px solid #444; color: white; border-radius: 8px; margin: 15px 0; box-sizing: border-box; }
        .btn-main { background: var(--accent); color: white; border: none; padding: 12px 20px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; }

        /* EMOJI PICKER CATEGORIES */
        #emojiPicker { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 3000; display: none; align-items: flex-end; }
        .picker-content { background: var(--bg); height: 70vh; width: 100%; border-radius: 20px 20px 0 0; display: flex; flex-direction: column; overflow: hidden; }
        .picker-tabs { background: var(--dark); display: flex; padding: 10px; gap: 20px; overflow-x: auto; border-bottom: 1px solid #333; }
        .picker-grid { flex: 1; overflow-y: auto; display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 15px; }
        .emoji-item { font-size: 30px; text-align: center; padding: 10px; border-radius: 8px; }

        [contenteditable] { outline: none; }
        select { width: 100%; padding: 12px; background: var(--dark); border: none; color: white; border-radius: 8px; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div style="padding: 20px; border-bottom: 1px solid #333;">
            <img src="https://draftbot.fr/assets/img/logo.png" width="30">
        </div>
        <a href="#" class="nav-item active"><i class="fas fa-edit"></i> Builder</a>
        <a href="#" class="nav-item"><i class="fas fa-images"></i> Galerie</a>
    </div>

    <div class="main">
        <div class="header">
            <i class="fas fa-bars" onclick="document.getElementById('sidebar').classList.toggle('open')" style="color:var(--accent); font-size: 22px;"></i>
            <span style="font-weight: 900;">BAGBOT DASHBOARD</span>
        </div>

        <div class="container">
            <div class="embed-preview">
                <div class="thumb-slot slot" onclick="openMedia('thumb')">
                    <i class="fas fa-plus" id="ic-thumb"></i>
                    <img id="img-thumb" style="display:none">
                </div>
                <div style="display:flex; align-items:center; gap:8px; margin-bottom:10px;">
                    <div class="slot" onclick="openMedia('auth')" style="width:24px; height:24px; border-radius:50%; min-height:auto;">
                        <img id="img-auth" style="display:none">
                    </div>
                    <span contenteditable="true" id="txt-auth" style="font-size:14px; font-weight:600; color:white;">Nom de l'auteur</span>
                </div>
                <div id="txt-title" contenteditable="true" style="font-weight:bold; font-size:17px; margin-bottom:5px; color:white;">Titre du message</div>
                <div id="txt-desc" contenteditable="true" style="font-size:14px; color:#dbdee1;">Écrivez votre contenu ici...</div>
                <div class="banner-slot slot" onclick="openMedia('banner')">
                    <i class="fas fa-image" id="ic-banner" style="font-size: 30px; color:#4e5058"></i>
                    <img id="img-banner" style="display:none">
                </div>
            </div>

            <div style="width:100%; max-width:450px;">
                <label style="font-size: 11px; font-weight: 800; color:#888;">SALON DISCORD</label>
                <select id="sel-chans"></select>
                
                <div id="reacs-box" style="margin-top: 15px;"></div>
                <button onclick="addReacRow()" style="width:100%; padding:12px; background:#383a40; border:none; color:white; border-radius:8px; margin-top:10px; font-weight:bold;">+ AJOUTER UN RÔLE</button>
                <button class="btn-main" onclick="deploy()" style="margin-top: 15px; padding: 16px;">🚀 DÉPLOYER LE MESSAGE</button>
            </div>
        </div>
    </div>

    <div id="mediaModal">
        <div class="modal-box">
            <h3>Ajouter une image</h3>
            <button class="btn-main" onclick="document.getElementById('f-upload').click()">TÉLÉVERSER (MOBILE)</button>
            <p style="margin: 10px 0; color: #888;">— OU —</p>
            <input type="text" id="link-input" placeholder="Coller un lien (http...)">
            <button class="btn-main" onclick="useLink()" style="background:#444;">UTILISER LE LIEN</button>
            <button onclick="closeMedia()" style="background:none; border:none; color:#888; margin-top:20px;">ANNULER</button>
        </div>
    </div>

    <div id="emojiPicker">
        <div class="picker-content">
            <div class="picker-tabs">
                <i class="fas fa-smile"></i><i class="fas fa-cat"></i><i class="fas fa-pizza-slice"></i><i class="fas fa-car"></i>
            </div>
            <div style="padding:10px;"><input type="text" placeholder="Rechercher..." style="width:100%; padding:8px; background:var(--dark); border:none; color:white; border-radius:5px;"></div>
            <div class="picker-grid" id="emoji-list"></div>
        </div>
    </div>

    <input type="file" id="f-upload" style="display:none" onchange="handleUpload(this)">

<script>
    const API = "http://192.168.1.133:49501";
    let activeZone = null;
    let activeBtn = null;

    function openMedia(z) { activeZone = z; document.getElementById('mediaModal').style.display = 'flex'; }
    function closeMedia() { document.getElementById('mediaModal').style.display = 'none'; }
    function useLink() { const url = document.getElementById('link-input').value; if(url) updatePreview(url); closeMedia(); }

    async function handleUpload(input) {
        if(!input.files[0]) return;
        const fd = new FormData(); fd.append('file', input.files[0]);
        try {
            const res = await fetch(`${API}/api/upload`, { method: 'POST', body: fd }).then(r => r.json());
            if(res.url) updatePreview(res.url);
        } catch(e) { alert("Erreur serveur Termux. Vérifiez l'IP."); }
        closeMedia();
    }

    function updatePreview(url) {
        const img = document.getElementById(`img-${activeZone}`);
        const ic = document.getElementById(`ic-${activeZone}`);
        img.src = url; img.style.display = 'block';
        if(ic) ic.style.display = 'none';
    }

    async function init() {
        fetch(`${API}/api/channels`).then(r => r.json()).then(d => document.getElementById('sel-chans').innerHTML = d.map(c => `<option value="${c.id}"># ${c.name}</option>`).join(''));
        const emos = await fetch(`${API}/api/emojis`).then(r => r.json());
        document.getElementById('emoji-list').innerHTML = emos.map(e => `<div class="emoji-item" onclick="pickEmoji('${e.id}', true, '${e.url}')"><img src="${e.url}" width="32"></div>`).join('') + ["😀","🔥","✅","❌","🔞"].map(s => `<div class="emoji-item" onclick="pickEmoji('${s}', false)">${s}</div>`).join('');
    }

    function addReacRow() {
        const div = document.createElement('div');
        div.style = "background:var(--dark); padding:10px; border-radius:8px; margin-bottom:8px; display:flex; align-items:center; gap:10px;";
        div.innerHTML = `<div class="emoji-trigger" onclick="openPicker(this)" style="font-size:24px; cursor:pointer;">😀</div><select class="role-sel" style="flex:1; margin:0;"></select>`;
        document.getElementById('reacs-box').appendChild(div);
        fetch(`${API}/api/roles`).then(r => r.json()).then(d => div.querySelector('.role-sel').innerHTML = d.map(r => `<option value="${r.id}">${r.name}</option>`).join(''));
    }

    function openPicker(btn) { activeBtn = btn; document.getElementById('emojiPicker').style.display = 'flex'; }
    function pickEmoji(val, isCust, url) {
        activeBtn.innerHTML = isCust ? `<img src="${url}" data-id="${val}" width="24">` : val;
        document.getElementById('emojiPicker').style.display = 'none';
    }

    async function deploy() {
        const reacs = Array.from(document.querySelectorAll('#reacs-box > div')).map(row => ({
            emoji: row.querySelector('.emoji-trigger img')?.dataset.id || row.querySelector('.emoji-trigger').innerText,
            roleId: row.querySelector('.role-sel').value
        }));
        await fetch(`${API}/api/deploy`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                channelId: document.getElementById('sel-chans').value,
                title: document.getElementById('txt-title').innerText,
                description: document.getElementById('txt-desc').innerText,
                author: document.getElementById('txt-auth').innerText,
                author_img: document.getElementById('img-auth').style.display==='block' ? document.getElementById('img-auth').src : null,
                thumbnail: document.getElementById('img-thumb').style.display==='block' ? document.getElementById('img-thumb').src : null,
                banner: document.getElementById('img-banner').style.display==='block' ? document.getElementById('img-banner').src : null,
                reactions: reacs
            })
        });
        alert("✅ Déploiement envoyé !");
    }
    window.onload = init;
</script>
</body>
</html>

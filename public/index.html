<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BagBot Pro Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #ff4d4d; --bg: #111214; --card: #2b2d31; --text: #dbdee1; --sidebar: #0b0b0b; --draft-coral: #d37f6a; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 10px; display: flex; flex-direction: column; align-items: center; }

        /* --- EMBED --- */
        .discord-msg { background: #313338; border-radius: 8px; padding: 15px; width: 100%; max-width: 500px; margin-bottom: 20px; box-sizing: border-box; }
        .embed { background: #1e1f22; border-left: 4px solid var(--accent); border-radius: 4px; padding: 12px; position: relative; }
        .up-slot { border: 1px dashed #4e5058; border-radius: 4px; display: flex; align-items: center; justify-content: center; cursor: pointer; background: rgba(0,0,0,0.2); overflow: hidden; position: relative; }
        .up-slot img { width: 100%; height: 100%; object-fit: cover; position: absolute; }
        .thumb-slot { position: absolute; top: 12px; right: 12px; width: 60px; height: 60px; }
        .banner-slot { width: 100%; min-height: 100px; margin: 10px 0; }
        .embed-title { font-size: 16px; font-weight: 700; color: white; outline: none; margin: 10px 0 5px; border-bottom: 1px solid transparent; }
        .embed-title:focus { border-color: var(--accent); }
        .embed-desc { font-size: 14px; color: #dbdee1; outline: none; min-height: 40px; }

        /* --- UI ELEMENTS --- */
        .card { background: var(--card); border-radius: 12px; padding: 15px; border: 1px solid #1a1a1a; width: 100%; max-width: 500px; box-sizing: border-box; margin-bottom: 15px; }
        .label-style { font-size: 10px; color: #b5bac1; text-transform: uppercase; font-weight: 800; margin-bottom: 8px; display: block; }
        select { width: 100%; background: #1e1f22; border: 1px solid #111; color: white; padding: 12px; border-radius: 8px; margin-bottom: 10px; outline: none; }
        
        .reaction-row { background: #1e1f22; border-radius: 8px; padding: 10px; display: flex; align-items: center; gap: 10px; margin-bottom: 8px; border: 1px solid #111; }
        .emoji-trigger { width: 40px; height: 40px; background: #2b2d31; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; }
        .emoji-trigger img { width: 26px; }

        .btn-deploy { background: var(--accent); color: white; border: none; padding: 16px; width: 100%; border-radius: 8px; font-weight: 800; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn-deploy:active { transform: scale(0.98); opacity: 0.8; }

        /* --- MODAL IMAGE --- */
        #imgModal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000; display: none; align-items: center; justify-content: center; }
        .modal-box { background: var(--card); padding: 20px; border-radius: 12px; width: 90%; max-width: 350px; text-align: center; }
        .btn-opt { background: #444; color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; margin: 5px 0; cursor: pointer; }

        /* --- PICKER EMOJI --- */
        #emojiPicker { position: fixed; bottom: 0; left: 0; width: 100%; height: 70vh; background: #111214; border-top: 1px solid #333; display: none; flex-direction: column; z-index: 1000; border-radius: 20px 20px 0 0; }
        .emoji-body { display: flex; flex: 1; overflow: hidden; }
        .emoji-sidebar { width: 55px; background: var(--sidebar); display: flex; flex-direction: column; align-items: center; padding: 20px 0; gap: 20px; border-right: 1px solid #222; }
        .emoji-sidebar img { width: 24px; cursor: pointer; opacity: 0.5; }
        .emoji-scroll { flex: 1; overflow-y: auto; padding: 15px; }
        .emoji-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
        .emoji-item { font-size: 28px; text-align: center; cursor: pointer; }
        .emoji-item img { width: 28px; height: 28px; }
    </style>
</head>
<body>

    <h3 style="margin: 15px 0; font-weight: 600;">BagBot Dashboard</h3>

    <div class="discord-msg">
        <div class="embed">
            <div class="up-slot thumb-slot" onclick="openImgChoice('thumb')">
                <i class="fas fa-plus" id="ic-thumb"></i>
                <img id="v-thumb" style="display:none">
            </div>

            <div style="display:flex; align-items:center; gap:8px; font-size:13px; font-weight:600; color:white;">
                <div class="up-slot" onclick="openImgChoice('auth')" style="width:20px; height:20px; border-radius:50%">
                    <img id="v-auth" style="display:none">
                </div>
                <span contenteditable="true" id="txt-auth">Auteur</span>
            </div>

            <div class="embed-title" contenteditable="true" id="txt-title">Titre du message</div>
            <div class="embed-desc" contenteditable="true" id="txt-desc">Contenu du message...</div>

            <div class="up-slot banner-slot" onclick="openImgChoice('banner')">
                <i class="fas fa-image" id="ic-banner" style="font-size: 24px;"></i>
                <img id="v-banner" style="display:none">
            </div>
        </div>
    </div>

    <div class="card">
        <span class="label-style">Salon Discord</span>
        <select id="sel-chans"><option>Chargement des salons...</option></select>
        
        <div id="reacs-box"></div>
        <button onclick="addReacRow()" style="width:100%; padding:10px; background:#3a3c41; border:none; color:white; border-radius:5px; cursor:pointer; font-weight:bold;">+ AJOUTER UN RÔLE</button>
        
        <button class="btn-deploy" onclick="deploy()">🚀 DÉPLOYER SUR LE SERVEUR</button>
    </div>

    <div id="imgModal">
        <div class="modal-box">
            <h4 style="margin:0 0 15px">Source de l'image</h4>
            <button class="btn-opt" style="background:var(--draft-coral)" onclick="document.getElementById('f-in').click()">Téléverser un fichier</button>
            <button class="btn-opt" onclick="promptUrl()">Coller un lien URL</button>
            <button onclick="closeImgChoice()" style="background:none; border:none; color:#888; margin-top:10px; cursor:pointer;">Annuler</button>
        </div>
    </div>

    <div id="emojiPicker">
        <div class="emoji-body">
            <div class="emoji-sidebar">
                <img src="https://draftbot.fr/assets/img/logo.png" onclick="document.getElementById('sec-srv').scrollIntoView()">
                <i class="fas fa-smile" style="color:#666" onclick="document.getElementById('sec-std').scrollIntoView()"></i>
            </div>
            <div class="emoji-scroll">
                <div id="sec-srv">
                    <p class="label-style">Emojis du Serveur</p>
                    <div class="emoji-grid" id="grid-srv"></div>
                </div>
                <div id="sec-std" style="margin-top:20px">
                    <p class="label-style">Smileys Classiques</p>
                    <div class="emoji-grid" id="grid-std"></div>
                </div>
            </div>
        </div>
        <button onclick="document.getElementById('emojiPicker').style.display='none'" style="padding:15px; border:none; background:var(--sidebar); color:var(--accent); font-weight:800;">FERMER</button>
    </div>

    <input type="file" id="f-in" style="display:none" onchange="handleFile(this)">

<script>
    const API = "http://192.168.1.133:49500";
    let roles = [], activeBtn = null, curZone = null;

    async function init() {
        // 1. Charger Salons
        fetch(`${API}/api/channels`).then(r => r.json()).then(data => {
            document.getElementById('sel-chans').innerHTML = data.map(c => `<option value="${c.id}"># ${c.name}</option>`).join('');
        }).catch(() => document.getElementById('sel-chans').innerHTML = "<option>Erreur API</option>");

        // 2. Charger Rôles
        fetch(`${API}/api/roles`).then(r => r.json()).then(data => roles = data);

        // 3. Charger Emojis (Correction format)
        fetch(`${API}/api/emojis`).then(r => r.json()).then(data => {
            const grid = document.getElementById('grid-srv');
            if(data.length) {
                grid.innerHTML = data.map(e => {
                    const url = e.url || `https://cdn.discordapp.com/emojis/${e.id}.png`;
                    return `<div class="emoji-item" onclick="pickEmoji('${e.id}', true, '${url}')"><img src="${url}"></div>`;
                }).join('');
            } else { grid.innerHTML = "<p style='font-size:10px; color:#444'>Aucun emoji trouvé</p>"; }
        });

        // Charger smileys de base
        const stds = ['😀','😃','😄','😁','😆','😅','😂','🤣','😊','😇','🙂','🙃','😉','😌','😍','🥰','✅','❌','🔥','⭐','🔞'];
        document.getElementById('grid-std').innerHTML = stds.map(s => `<div class="emoji-item" onclick="pickEmoji('${s}', false)">${s}</div>`).join('');
    }

    // --- IMAGES ---
    function openImgChoice(z) { curZone = z; document.getElementById('imgModal').style.display = 'flex'; }
    function closeImgChoice() { document.getElementById('imgModal').style.display = 'none'; }
    function promptUrl() {
        const url = prompt("Collez le lien direct de l'image (http...) :");
        if(url) updateImg(url);
        closeImgChoice();
    }
    function handleFile(input) {
        if(input.files && input.files[0]) {
            const r = new FileReader();
            r.onload = e => updateImg(e.target.result);
            r.readAsDataURL(input.files[0]);
        }
        closeImgChoice();
    }
    function updateImg(src) {
        const v = document.getElementById(`v-${curZone}`);
        const ic = document.getElementById(`ic-${curZone}`);
        if(ic) ic.style.display = 'none';
        v.src = src; v.style.display = 'block';
    }

    // --- REACTIONS ---
    function addReacRow() {
        const div = document.createElement('div');
        div.className = 'reaction-row';
        div.innerHTML = `
            <div class="emoji-trigger" onclick="openPicker(this)">😀</div>
            <select style="margin:0; flex:1;"><option value="">Lier un rôle...</option>${roles.map(r => `<option value="${r.id}">${r.name}</option>`).join('')}</select>
            <i class="fas fa-trash" style="color:#444; cursor:pointer;" onclick="this.parentElement.remove()"></i>
        `;
        document.getElementById('reacs-box').appendChild(div);
    }
    function openPicker(b) { activeBtn = b; document.getElementById('emojiPicker').style.display = 'flex'; }
    function pickEmoji(val, isCust, url) {
        if(isCust) {
            activeBtn.innerHTML = `<img src="${url}" data-id="${val}">`;
        } else {
            activeBtn.innerText = val;
            activeBtn.removeAttribute('data-id');
        }
        document.getElementById('emojiPicker').style.display = 'none';
    }

    // --- DÉPLOIEMENT RÉEL ---
    async function deploy() {
        const btn = document.querySelector('.btn-deploy');
        btn.innerText = "⏳ ENVOI EN COURS...";
        
        const reactions = [];
        document.querySelectorAll('.reaction-row').forEach(row => {
            const emojiEl = row.querySelector('.emoji-trigger');
            const roleId = row.querySelector('select').value;
            if(roleId) {
                const img = emojiEl.querySelector('img');
                reactions.push({
                    emoji: img ? img.getAttribute('data-id') : emojiEl.innerText,
                    roleId: roleId
                });
            }
        });

        const data = {
            channelId: document.getElementById('sel-chans').value,
            title: document.getElementById('txt-title').innerText,
            description: document.getElementById('txt-desc').innerText,
            author: document.getElementById('txt-auth').innerText,
            author_img: document.getElementById('v-auth').src || null,
            thumbnail: document.getElementById('v-thumb').src || null,
            banner: document.getElementById('v-banner').src || null,
            reactions: reactions
        };

        try {
            const res = await fetch(`${API}/api/deploy`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            if(res.ok) {
                alert("✅ Succès ! Le message a été envoyé.");
            } else {
                alert("❌ Le bot a reçu la commande mais n'a pas pu envoyer le message.");
            }
        } catch(e) {
            alert("❌ Erreur : Impossible de joindre le bot (Vérifiez l'IP)");
        }
        btn.innerText = "🚀 DÉPLOYER SUR LE SERVEUR";
    }

    window.onload = init;
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BagBot Admin</title>
    <style>
        :root { --accent: #ff4d4d; --bg: #0f1012; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); color: white; display: flex; }
        .sidebar { width: 260px; background: #0b0c0e; height: 100vh; position: fixed; left: -260px; transition: 0.3s; z-index: 1000; }
        .sidebar.open { left: 0; }
        .main { flex: 1; padding: 20px; }
        .panel { background: #18191c; border-radius: 12px; padding: 20px; max-width: 500px; margin: auto; }
        .tabs { display: flex; margin-bottom: 20px; background: #2f3136; padding: 5px; border-radius: 8px; }
        .tab { flex: 1; text-align: center; padding: 10px; cursor: pointer; border-radius: 5px; }
        .tab.active { background: var(--accent); }
        label { display: block; margin: 10px 0 5px; font-size: 12px; color: #bbb; }
        select, input, textarea { width: 100%; padding: 10px; background: #202225; border: 1px solid #333; color: white; border-radius: 5px; box-sizing: border-box; }
        .btn { background: var(--accent); color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>
<div class="sidebar" id="sidebar">
    <div style="padding:20px; display:flex; justify-content:space-between;"><b>BAG BOT V2</b><button onclick="toggleMenu()" style="background:none; border:none; color:red; font-size:25px;">×</button></div>
</div>
<div class="main">
    <button onclick="toggleMenu()" style="margin-bottom:10px;">☰ Menu</button>
    <div class="panel">
        <div class="tabs">
            <div class="tab active" id="ts" onclick="setMode('simple')">Simple</div>
            <div class="tab" id="te" onclick="setMode('embed')">Embed</div>
        </div>
        <label>Salon</label><select id="channelId"><option>Chargement...</option></select>
        <label>Rôle</label><select id="roleId"><option>Chargement...</option></select>
        <div id="fs"><label>Message</label><textarea id="txt">Cliquez ici</textarea></div>
        <div id="fe" style="display:none;">
            <label>Titre</label><input type="text" id="tit">
            <label>Description</label><textarea id="des"></textarea>
            <label>Image</label><input type="file" id="fil">
        </div>
        <label>ID Message (Optionnel)</label><input type="text" id="mid">
        <label>Affichage</label><select id="dis"><option value="button">Bouton</option><option value="select">Menu</option></select>
        <button class="btn" id="btn" onclick="deploy()">DÉPLOYER</button>
    </div>
</div>
<script>
    let mode = 'simple';
    function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); }
    function setMode(m) {
        mode = m;
        document.getElementById('ts').className = m === 'simple' ? 'tab active' : 'tab';
        document.getElementById('te').className = m === 'embed' ? 'tab active' : 'tab';
        document.getElementById('fs').style.display = m === 'simple' ? 'block' : 'none';
        document.getElementById('fe').style.display = m === 'embed' ? 'block' : 'none';
    }

    async function load() {
        try {
            const baseUrl = window.location.origin;
            const [cR, rR] = await Promise.all([fetch(`${baseUrl}/get-channels`), fetch(`${baseUrl}/get-roles`)]);
            const c = await cR.json(); const r = await rR.json();
            document.getElementById('channelId').innerHTML = c.map(x => `<option value="${x.id}"># ${x.name}</option>`).join('');
            document.getElementById('roleId').innerHTML = r.map(x => `<option value="${x.id}">${x.name}</option>`).join('');
        } catch(e) { console.error(e); }
    }

    async function deploy() {
        const fd = new FormData();
        fd.append('channelId', document.getElementById('channelId').value);
        fd.append('roleId', document.getElementById('roleId').value);
        fd.append('mode', mode);
        fd.append('displayType', document.getElementById('dis').value);
        fd.append('messageId', document.getElementById('mid').value.trim());
        fd.append('content', document.getElementById('txt').value);
        fd.append('title', document.getElementById('tit').value);
        fd.append('description', document.getElementById('des').value);
        if (document.getElementById('fil').files[0]) fd.append('imageFile', document.getElementById('fil').files[0]);

        try {
            const res = await fetch(`${window.location.origin}/deploy-bot`, { method: 'POST', body: fd });
            const d = await res.json();
            alert(d.success ? "✅ Succès" : "❌ " + d.message);
        } catch(e) { alert("❌ Erreur connexion"); }
    }
    load();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BAGBOT ELITE V9</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #0a0a0a; --card: #141414; --accent: #ed4245; --border: #252525; --d-bg: #2b2d31; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { margin: 0; background: var(--bg); color: #fff; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* HEADER */
        .header { height: 60px; background: #000; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; z-index: 2500; }
        .burger { font-size: 22px; color: var(--accent); cursor: pointer; }
        .logo-text { margin-left: 20px; font-weight: 900; color: var(--accent); letter-spacing: 1px; }

        /* SIDEBAR */
        #sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100vh; background: #000; z-index: 3000; transition: 0.3s; border-right: 1px solid var(--border); }
        #sidebar.open { left: 0; }
        .nav-item { padding: 20px; border-bottom: 1px solid #111; cursor: pointer; display: flex; align-items: center; justify-content: space-between; color: #888; font-weight: bold; }
        .nav-item.active { color: var(--accent); background: rgba(237, 66, 69, 0.1); }
        .submenu { background: #050505; }
        .sub-item { padding: 15px 55px; cursor: pointer; color: #666; font-size: 14px; border-left: 3px solid transparent; }
        .sub-item.active { color: var(--accent); background: #111; border-left-color: var(--accent); }

        /* CONTENT */
        main { flex-grow: 1; overflow-y: auto; padding: 80px 15px 150px; }
        .section { display: none; max-width: 600px; margin: 0 auto; }
        .section.active { display: block; }

        /* PREVIEW DISCORD */
        .preview { background: var(--d-bg); border-left: 4px solid var(--accent); border-radius: 4px; padding: 15px; margin-bottom: 25px; }
        .pv-top { display: flex; justify-content: space-between; gap: 10px; }
        .pv-thumb { width: 65px; height: 65px; background: #1e1f22; border-radius: 4px; border: 1px dashed #444; overflow: hidden; }
        .pv-banner { width: 100%; height: 140px; background: #1e1f22; border-radius: 8px; margin-top: 10px; border: 1px dashed #444; overflow: hidden; }
        .pv-f-icon { width: 18px; height: 18px; border-radius: 50%; background: #1e1f22; overflow: hidden; }
        .pv-footer-cont { display: flex; align-items: center; gap: 8px; margin-top: 10px; font-size: 11px; color: #b5bac1; }
        img { width: 100%; height: 100%; object-fit: cover; display: none; }

        /* FORM */
        .card { background: var(--card); border-radius: 20px; padding: 25px; border: 1px solid var(--border); margin-bottom: 20px; }
        label { display: block; font-size: 11px; color: #777; text-transform: uppercase; margin: 15px 0 5px; font-weight: bold; }
        input, textarea, select { width: 100%; background: #000; border: 1px solid var(--border); color: #fff; padding: 14px; border-radius: 10px; outline: none; margin-bottom: 5px; }
        .var-badge { background: #1e1f22; color: #00a8fc; padding: 6px 12px; border-radius: 5px; font-size: 12px; cursor: pointer; display: inline-block; margin: 5px 5px 10px 0; border: 1px solid #2b2d31; }
        .btn-save { background: var(--accent); color: white; border: none; padding: 16px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 20px; }
        .btn-img { background: #333; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; margin-top: 5px; width: 100%; font-size: 12px; }

        /* GALLERY */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .g-img { height: 110px; border-radius: 10px; border: 1px solid var(--border); overflow: hidden; cursor: pointer; background: #000; }
    </style>
</head>
<body>

    <div class="header">
        <i class="fas fa-bars burger" id="burger-btn"></i>
        <div class="logo-text">BAGBOT ELITE V9</div>
    </div>

    <div id="sidebar">
        <div style="padding:40px 20px; text-align:center; color:var(--accent); font-weight:900;">PANEL CONFIG</div>
        <div class="nav-item"><span>MESSAGES</span><i class="fas fa-chevron-down"></i></div>
        <div class="submenu">
            <div class="sub-item active" onclick="tab('welcome')">Bienvenue</div>
            <div class="sub-item" onclick="tab('leave')">Départ</div>
        </div>
        <div class="nav-item" onclick="tab('gallery')"><span>GALERIE</span><i class="fas fa-images"></i></div>
    </div>

    <main>
        <section id="welcome" class="section active">
            <div class="preview" id="pv-w-box">
                <div class="pv-top">
                    <div style="flex-grow:1">
                        <div id="pv-w-title" style="color:#00a8fc; font-weight:bold;">Titre</div>
                        <div id="pv-w-desc" style="font-size:14px; margin-top:5px; white-space:pre-wrap;">Message...</div>
                    </div>
                    <div class="pv-thumb"><img id="img-w-thumbnail"></div>
                </div>
                <div class="pv-banner"><img id="img-w-banner"></div>
                <div class="pv-footer-cont">
                    <div class="pv-f-icon"><img id="img-w-footer_icon"></div>
                    <span id="pv-w-footer">Footer</span>
                </div>
            </div>
            <div class="card">
                <h2>Configuration Bienvenue</h2>
                <label>Couleur</label><input type="color" id="w-color" oninput="sync()">
                <label>Titre</label><input type="text" id="w-title" oninput="sync()">
                <label>Description</label><textarea id="w-desc" rows="4" oninput="sync()"></textarea>
                <div class="var-badge" onclick="addV('w-desc','{user}')">{user}</div>
                <div class="var-badge" onclick="addV('w-desc','{server}')">{server}</div>
                <label>Texte Footer</label><input type="text" id="w-footer" oninput="sync()">
                <label>Salon</label><select id="w-channel"></select>
                <button class="btn-img" onclick="pick('welcome','banner')">Changer Bannière</button>
                <button class="btn-img" onclick="pick('welcome','thumbnail')">Changer Miniature</button>
                <button class="btn-img" onclick="pick('welcome','footer_icon')">Changer Icone Footer</button>
                <button class="btn-save" onclick="save()">SAUVEGARDER</button>
            </div>
        </section>

        <section id="leave" class="section">
            <div class="preview" id="pv-l-box">
                <div id="pv-l-title" style="color:#00a8fc; font-weight:bold;">Titre</div>
                <div id="pv-l-desc" style="font-size:14px; margin-top:5px;">Message...</div>
                <div class="pv-banner"><img id="img-l-banner"></div>
            </div>
            <div class="card">
                <h2>Configuration Départ</h2>
                <label>Couleur</label><input type="color" id="l-color" oninput="sync()">
                <label>Titre</label><input type="text" id="l-title" oninput="sync()">
                <label>Description</label><textarea id="l-desc" rows="4" oninput="sync()"></textarea>
                <label>Salon</label><select id="l-channel"></select>
                <button class="btn-img" onclick="pick('leave','banner')">Changer Bannière</button>
                <button class="btn-save" onclick="save()">SAUVEGARDER</button>
            </div>
        </section>

        <section id="gallery" class="section">
            <div class="card">
                <h2>Galerie d'images</h2>
                <input type="file" id="up-input" onchange="upload()">
                <div id="g-list" class="grid" style="margin-top:20px;"></div>
                <button class="btn-save" style="background:#444" onclick="tab(localStorage.getItem('last'))">RETOUR</button>
            </div>
        </section>
    </main>

    <script src="/static/index.js"></script>
</body>
</html>

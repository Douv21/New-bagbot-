<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>BagBot Ultimate Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050505; --panel: #0f0f0f; --accent: #ed4245; --border: #1e1e1e; }
        body { background: var(--bg); color: white; display: flex; margin: 0; font-family: sans-serif; height: 100vh; }
        
        /* SIDEBAR FIXE */
        #sidebar { width: 260px; min-width: 260px; background: #000; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }

        .sidebar-header { padding: 30px; font-weight: bold; color: var(--accent); font-size: 20px; border-bottom: 1px solid var(--border); }
        .nav-item { padding: 18px 30px; cursor: pointer; color: #888; font-weight: bold; border-right: 3px solid transparent; }
        .nav-item.active { color: var(--accent); background: rgba(237,66,69,0.1); border-right-color: var(--accent); }

        .content-section { display: none; padding: 30px; flex-direction: column; align-items: center; }
        .content-section.active { display: flex; }

        .card { width: 100%; max-width: 600px; background: var(--panel); padding: 25px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; }
        
        /* ROLES ADMIN & DASHBOARD */
        .role-row { display: flex; align-items: center; gap: 12px; padding: 12px; border-bottom: 1px solid #1a1a1a; cursor: pointer; }
        .role-row input { width: 18px; height: 18px; accent-color: var(--accent); }

        .btn { padding: 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; width: 100%; color: white; text-transform: uppercase; margin-top: 10px; }
        .btn-save { background: var(--accent); }
    </style>
</head>
<body>
    <div id="login-screen" style="display:none; position:fixed; inset:0; background:black; z-index:9999; display:flex; align-items:center; justify-content:center;">
        <button class="btn btn-save" style="width:auto; padding:20px 40px;" onclick="window.location.href='/api/login'">Se connecter avec Discord</button>
    </div>

    <nav id="sidebar">
        <div class="sidebar-header">BAGBOT</div>
        <div class="nav-item active" onclick="show('BIENVENUE', this)">BIENVENUE</div>
        <div class="nav-item" onclick="show('ADMIN', this)">ADMIN DASHBOARD</div>
        <div class="nav-item" onclick="show('GALERIE', this)">GALERIE IMAGES</div>
    </nav>

    <main>
        <section id="section-BIENVENUE" class="content-section active">
            </section>

        <section id="section-ADMIN" class="content-section">
            <div class="card">
                <h3>Rôles autorisés sur le Dashboard</h3>
                <p style="font-size:12px; color:#888; margin-bottom:15px;">Sélectionnez les rôles qui peuvent accéder à ce panel. Votre ID est en accès permanent.</p>
                <div id="admin-roles-list"></div>
                <button class="btn btn-save" onclick="saveAdminRoles()">Sauvegarder les accès</button>
            </div>
        </section>

        <section id="section-GALERIE" class="content-section">
            </section>
    </main>

    <script>
        let configData = {};

        async function init() {
            const res = await fetch('/api/get_server_info');
            if (res.status === 401) {
                document.getElementById('login-screen').style.display = 'flex';
                return;
            }
            const data = await res.json();
            configData = data.config;

            // Liste des rôles pour l'accès Dashboard
            const adminContainer = document.getElementById('admin-roles-list');
            adminContainer.innerHTML = data.all_roles.map(r => `
                <div class="role-row" onclick="const ck=this.querySelector('input'); ck.checked=!ck.checked;">
                    <input type="checkbox" value="${r}" class="admin-ck" ${configData.admin_roles?.includes(r) ? 'checked' : ''}>
                    <span>${r}</span>
                </div>
            `).join('');
            
            // ... (Initialiser le reste comme avant)
        }

        async function saveAdminRoles() {
            const selected = Array.from(document.querySelectorAll('.admin-ck:checked')).map(i => i.value);
            configData.admin_roles = selected;
            await fetch('/api/save_config', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(configData)
            });
            alert("Accès mis à jour !");
        }

        function show(name, el) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('section-' + name).classList.add('active');
            el.classList.add('active');
        }

        window.onload = init;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BagBot Designer Pro - Sélecteurs</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* BASE & THEME (Fidèle à 10128.jpg) */
        :root {
            --accent: #d37f6a;
            --bg: #2b2d31;
            --sidebar-bg: #1e1f22;
            --dark-bg: #111214;
            --text-main: #dbdee1;
            --text-muted: #949ba4;
            --border-color: #3f4147;
            --input-bg: #1e1f22;
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body {
            margin: 0; padding: 0;
            font-family: 'Whitney', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--bg); color: var(--text-main);
            display: flex; height: 100vh; width: 100vw; overflow: hidden;
        }

        /* SIDEBAR STRUCTURE */
        .sidebar {
            width: 260px; background-color: var(--sidebar-bg);
            display: flex; flex-direction: column;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000; border-right: 1px solid var(--dark-bg); flex-shrink: 0;
        }

        .sidebar.hidden { margin-left: -260px; }

        .sidebar-header {
            padding: 24px 20px; display: flex; align-items: center; justify-content: space-between;
            background-color: var(--dark-bg);
        }

        .sidebar-logo { font-weight: 800; color: var(--accent); font-size: 18px; letter-spacing: 1px; }

        .nav-group { padding: 12px 8px; flex-grow: 1; }

        .nav-item {
            display: flex; align-items: center; gap: 12px; padding: 12px 16px;
            border-radius: 4px; cursor: pointer; color: var(--text-muted);
            font-weight: 500; margin-bottom: 4px; transition: 0.2s;
        }

        .nav-item.active { background-color: rgba(211, 127, 106, 0.1); color: white; }

        /* MAIN SECTION */
        .main-wrapper { flex-grow: 1; display: flex; flex-direction: column; min-width: 0; position: relative; }

        .top-navbar {
            height: 60px; background-color: var(--bg);
            display: flex; align-items: center; padding: 0 20px;
            border-bottom: 1px solid var(--dark-bg); gap: 15px;
        }

        .menu-toggle { font-size: 22px; color: var(--accent); cursor: pointer; display: flex; align-items: center; }

        .page-title { font-weight: 700; font-size: 15px; color: white; }

        /* CONTENT AREA */
        .content-scroll {
            flex-grow: 1; overflow-y: auto; padding: 24px 16px;
            display: flex; flex-direction: column; align-items: center;
        }

        /* EMBED BUILDER */
        .embed-container {
            width: 100%; max-width: 520px; background-color: #313338;
            border-radius: 4px; border-left: 4px solid var(--accent);
            padding: 16px; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .slot {
            border: 2px dashed #4e5058; border-radius: 4px; background-color: rgba(0,0,0,0.1);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; position: relative; overflow: hidden;
        }

        .slot img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }

        .thumbnail-slot { position: absolute; top: 16px; right: 16px; width: 80px; height: 80px; z-index: 2; }

        .author-area { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }

        .author-icon-slot { width: 24px; height: 24px; border-radius: 50%; }

        .author-name { font-size: 14px; font-weight: 600; color: white; outline: none; }

        .embed-title { font-size: 18px; font-weight: 700; color: white; margin-bottom: 8px; outline: none; }

        .embed-description { font-size: 14px; color: var(--text-main); line-height: 1.4; outline: none; margin-bottom: 12px; }

        .banner-slot { width: 100%; height: 180px; margin-top: 12px; }

        /* BUILDER CONTROLS & SELECTORS */
        .builder-controls { width: 100%; max-width: 520px; margin-top: 24px; padding-bottom: 50px; }

        .section-label {
            display: block; font-size: 11px; font-weight: 800;
            color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px;
        }

        /* SÉLECTEURS STYLISÉS */
        .custom-select {
            width: 100%; background-color: var(--dark-bg);
            border: 1px solid rgba(0,0,0,0.3); color: white;
            padding: 12px; border-radius: 4px; font-size: 14px;
            margin-bottom: 20px; outline: none; appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat; background-position: right 12px center; background-size: 16px;
        }

        .btn-group { display: flex; flex-direction: column; gap: 12px; }

        .btn {
            border: none; border-radius: 4px; padding: 14px; font-weight: 600;
            font-size: 15px; cursor: pointer; display: flex;
            align-items: center; justify-content: center; gap: 10px;
        }

        .btn-secondary { background-color: #4e5058; color: white; }
        .btn-primary { background-color: var(--accent); color: white; }

        /* REACTION ROW */
        .reaction-row {
            display: flex; align-items: center; gap: 10px; background: var(--sidebar-bg);
            padding: 8px; border-radius: 6px; margin-bottom: 8px; border: 1px solid var(--border-color);
        }

        .reaction-row select { margin-bottom: 0; flex-grow: 1; }

        .emoji-view { font-size: 20px; min-width: 30px; text-align: center; cursor: pointer; }

        @media (max-width: 768px) {
            .sidebar { position: absolute; height: 100%; }
            .sidebar.hidden { margin-left: -260px; }
        }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span class="sidebar-logo">BAGBOT</span>
            <i class="fas fa-angle-left" onclick="toggleSidebar()" style="cursor:pointer; color: #888;"></i>
        </div>
        <div class="nav-group">
            <div class="nav-item active"><i class="fas fa-pencil-alt"></i> Builder</div>
            <div class="nav-item"><i class="fas fa-layer-group"></i> Mes Embeds</div>
            <div class="nav-item"><i class="fas fa-cog"></i> Paramètres</div>
        </div>
    </div>

    <div class="main-wrapper">
        <div class="top-navbar">
            <div class="menu-toggle" onclick="toggleSidebar()">
                <i class="fas fa-bars"></i>
            </div>
            <div class="page-title">DESIGNER D'EMBED</div>
        </div>

        <div class="content-scroll">
            <div class="embed-container">
                <div class="thumbnail-slot slot" onclick="triggerFileUpload('thumb')">
                    <i class="fas fa-plus" id="plus-thumb"></i>
                    <img id="preview-thumb" style="display:none">
                </div>
                <div class="author-area">
                    <div class="author-icon-slot slot" onclick="triggerFileUpload('author')">
                        <img id="preview-author" style="display:none">
                    </div>
                    <div class="author-name" contenteditable="true" placeholder="Nom de l'auteur">Auteur</div>
                </div>
                <div class="embed-title" contenteditable="true" placeholder="Titre">Titre de l'embed</div>
                <div class="embed-description" contenteditable="true" placeholder="Description">Cliquez ici pour rédiger le contenu...</div>
                <div class="banner-slot slot" onclick="triggerFileUpload('banner')">
                    <i class="fas fa-image" id="plus-banner" style="font-size: 30px; color: #4e5058;"></i>
                    <img id="preview-banner" style="display:none">
                </div>
            </div>

            <div class="builder-controls">
                <span class="section-label">Salon de destination</span>
                <select class="custom-select" id="select-channel">
                    <option value="">Sélectionner un salon...</option>
                    </select>
                
                <span class="section-label">Rôles Réactions</span>
                <div id="reactions-container"></div>
                
                <div class="btn-group">
                    <button class="btn btn-secondary" onclick="addReactionRow()">
                        <i class="fas fa-plus-circle"></i> Ajouter un rôle-réaction
                    </button>
                    <button class="btn btn-primary" onclick="handleDeploy()">
                        <i class="fas fa-paper-plane"></i> DÉPLOYER L'EMBED
                    </button>
                </div>
            </div>
        </div>
    </div>

    <input type="file" id="global-file-input" style="display:none" accept="image/*" onchange="processImage(this)">

    <script>
        let currentUploadTarget = null;
        let botData = { roles: [], channels: [] }; // Pour stockage futur

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('hidden'); }

        function triggerFileUpload(target) {
            currentUploadTarget = target;
            document.getElementById('global-file-input').click();
        }

        function processImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.getElementById(`preview-${currentUploadTarget}`);
                    const icon = document.getElementById(`plus-${currentUploadTarget}`);
                    img.src = e.target.result;
                    img.style.display = 'block';
                    if(icon) icon.style.display = 'none';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        // AJOUTER UNE LIGNE DE RÉACTION (Émoji + Sélecteur de rôle)
        function addReactionRow() {
            const container = document.getElementById('reactions-container');
            const row = document.createElement('div');
            row.className = 'reaction-row';
            
            const emoji = prompt("Entrez l'émoji :", "✅") || "✅";
            
            row.innerHTML = `
                <div class="emoji-view">${emoji}</div>
                <select class="custom-select" style="margin-bottom:0">
                    <option value="">Choisir un rôle...</option>
                    ${botData.roles.map(r => `<option value="${r.id}">${r.name}</option>`).join('')}
                </select>
                <i class="fas fa-trash" onclick="this.parentElement.remove()" style="color:#ed4245; cursor:pointer; padding: 0 10px;"></i>
            `;
            container.appendChild(row);
        }

        function handleDeploy() {
            const chan = document.getElementById('select-channel').value;
            alert(chan ? "Envoi vers le salon " + chan : "Veuillez choisir un salon.");
        }

        if (window.innerWidth < 768) document.getElementById('sidebar').classList.add('hidden');
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BagBot Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050505; --panel: #0f0f0f; --accent: #ed4245; --border: #1e1e1e; --discord-bg: #2b2d31; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: var(--bg); color: white; display: flex; overflow-x: hidden; }

        /* SIDEBAR */
        #sidebar { 
            width: 260px; background: #000; border-right: 1px solid var(--border); 
            height: 100vh; position: fixed; left: 0; top: 0; z-index: 1000; transition: 0.3s;
        }
        main { flex: 1; margin-left: 260px; width: calc(100% - 260px); min-height: 100vh; display: flex; flex-direction: column; }

        @media (max-width: 900px) {
            #sidebar { left: -260px; }
            #sidebar.open { left: 0; }
            main { margin-left: 0; width: 100%; }
            .menu-toggle { display: block !important; }
        }

        .sidebar-header { padding: 25px; font-weight: 900; color: var(--accent); border-bottom: 1px solid var(--border); }
        .nav-item { padding: 15px 25px; cursor: pointer; color: #888; display: flex; align-items: center; gap: 10px; }
        .nav-item.active { color: var(--accent); background: rgba(237,66,69,0.1); }

        header { height: 60px; background: var(--panel); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding-left: 60px; font-weight: bold; }
        .menu-toggle { position: fixed; top: 12px; left: 12px; z-index: 2000; display: none; background: var(--accent); padding: 8px 12px; border-radius: 5px; cursor: pointer; }

        .content-section { display: none; padding: 20px; flex-direction: column; align-items: center; width: 100%; }
        .content-section.active { display: flex; }

        /* CARDS */
        .card { width: 100%; max-width: 500px; background: var(--panel); padding: 20px; border-radius: 10px; border: 1px solid var(--border); margin-top: 20px; }
        input, textarea, select { width: 100%; background: #000; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 5px; margin-bottom: 10px; }
        
        .btn { padding: 15px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; width: 100%; color: white; }
        .btn-save { background: var(--accent); margin-bottom: 10px; }
        .btn-test { background: #5865f2; }

        /* EMBED PREVIEW */
        .discord-embed { width: 100%; max-width: 500px; background: var(--discord-bg); border-left: 4px solid var(--accent); padding: 15px; border-radius: 4px; }
        .img-preview { border: 1px dashed #444; margin-top: 10px; height: 100px; display: flex; align-items: center; justify-content: center; cursor: pointer; background: #111; }
        .img-preview img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>
    <div class="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></div>
    
    <nav id="sidebar">
        <div class="sidebar-header">BAGBOT PANEL</div>
        <div class="nav-item active" onclick="show('BIENVENUE', this)">BIENVENUE</div>
        <div class="nav-item" onclick="show('ADMIN', this)">ADMIN</div>
    </nav>

    <main>
        <header id="main-title">BIENVENUE</header>

        <section id="section-BIENVENUE" class="content-section active">
            <div class="discord-embed">
                <div id="p-title" style="font-weight:bold; margin-bottom:5px;">Titre</div>
                <div id="p-desc" style="font-size:14px; color:#dcddde;">Description...</div>
                <div class="img-preview" onclick="alert('Ouvrir galerie')">Images (Thumbnail/Banner)</div>
            </div>

            <div class="card">
                <h3>Message de Bienvenue</h3>
                <input type="text" id="w-title" placeholder="Titre de l'embed" oninput="sync()">
                <textarea id="w-desc" placeholder="Description" rows="3" oninput="sync()"></textarea>
                
                <h3>Configuration du Salon</h3>
                <select id="w-chan"><option value="">Chargement...</option></select>

                <button class="btn btn-save" onclick="save()">SAUVEGARDER CONFIG</button>
                <button class="btn btn-test" onclick="testMessage()">ENVOYER TEST DISCORD</button>
            </div>
        </section>
    </main>

    <script>
        const API = window.location.origin;

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
        
        function show(name, el) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('section-' + name).classList.add('active');
            el.classList.add('active');
            document.getElementById('main-title').innerText = name;
            if(window.innerWidth < 900) toggleSidebar();
        }

        function sync() {
            document.getElementById('p-title').innerText = document.getElementById('w-title').value || "Titre";
            document.getElementById('p-desc').innerText = document.getElementById('w-desc').value || "Description...";
        }

        async function save() {
            const data = {
                welcome: {
                    title: document.getElementById('w-title').value,
                    desc: document.getElementById('w-desc').value,
                    channel: document.getElementById('w-chan').value
                }
            };
            const res = await fetch(`${API}/api/save_config`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            if(res.ok) alert("✅ Configuration enregistrée !");
        }

        async function testMessage() {
            await save(); // On sauvegarde avant de tester
            const res = await fetch(`${API}/api/test_welcome`, { method: 'POST' });
            const result = await res.json();
            if(res.ok) alert("🚀 Message envoyé sur Discord !");
            else alert("❌ Erreur : " + result.message);
        }

        async function init() {
            try {
                const res = await fetch(`${API}/api/get_server_info`);
                const data = await res.json();
                if(data.status === "loading") return setTimeout(init, 2000);

                const chanSelect = document.getElementById('w-chan');
                chanSelect.innerHTML = data.channels.map(c => `<option value="${c.id}"># ${c.name}</option>`).join('');
                
                if(data.config.welcome) {
                    document.getElementById('w-title').value = data.config.welcome.title || "";
                    document.getElementById('w-desc').value = data.config.welcome.desc || "";
                    document.getElementById('w-chan').value = data.config.welcome.channel || "";
                }
                sync();
            } catch(e) { console.error(e); }
        }
        window.onload = init;
    </script>
</body>
</html>

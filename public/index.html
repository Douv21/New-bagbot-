<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BagBot Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050505; --panel: #0f0f0f; --accent: #ed4245; --border: #1e1e1e; --discord: #2b2d31; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: white; display: flex; height: 100vh; overflow: hidden; }
        
        #sidebar { width: 260px; background: #000; border-right: 1px solid var(--border); }
        .nav-item { padding: 18px 25px; cursor: pointer; color: #888; display: flex; align-items: center; gap: 10px; font-weight: bold; }
        .nav-item.active { color: var(--accent); background: rgba(237,66,69,0.1); border-right: 3px solid var(--accent); }

        main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        header { height: 60px; background: var(--panel); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; font-weight: 900; }
        
        .content-section { display: none; flex-direction: column; align-items: center; padding: 20px; overflow-y: auto; flex: 1; }
        .content-section.active { display: flex; }

        .discord-embed { width: 100%; max-width: 450px; background: var(--discord); border-left: 4px solid var(--accent); padding: 16px; border-radius: 4px; position: relative; margin-bottom: 20px; }
        .thumb-preview { width: 80px; height: 80px; position: absolute; right: 16px; top: 16px; background: #000; border: 1px dashed #444; }
        .banner-preview { width: 100%; height: 120px; margin-top: 10px; background: #000; border: 1px dashed #444; }
        .img-zone img { width: 100%; height: 100%; object-fit: cover; }

        .card { width: 100%; max-width: 450px; background: var(--panel); border-radius: 12px; padding: 20px; border: 1px solid var(--border); margin-bottom: 20px; }
        input, textarea, select { width: 100%; background: #000; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 8px; margin-bottom: 15px; }
        
        .checkbox-list { background: #000; border: 1px solid var(--border); border-radius: 8px; max-height: 150px; overflow-y: auto; padding: 5px; margin-bottom: 15px; }
        .checkbox-item { display: flex; align-items: center; padding: 10px; gap: 10px; border-bottom: 1px solid #111; cursor: pointer; }
        .checkbox-item input { width: 18px; height: 18px; accent-color: var(--accent); }

        .btn { border: none; padding: 15px; border-radius: 8px; font-weight: 800; cursor: pointer; width: 100%; color: white; margin-bottom: 10px; transition: 0.2s; }
        .btn-save { background: var(--accent); }
        .btn-test { background: #5865F2; }
        .btn:active { transform: scale(0.98); }

        #gallery { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 450px; }
        .gallery-card { aspect-ratio: 1; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); cursor: pointer; }
        .gallery-card img { width: 100%; height: 100%; object-fit: cover; }

        @media (max-width: 900px) { #sidebar { display: none; } }
    </style>
</head>
<body>
    <nav id="sidebar">
        <div style="padding: 25px; font-size: 22px; font-weight: 900; color: var(--accent);">BAGBOT</div>
        <div class="nav-item active" onclick="show('accueil')"><i class="fas fa-home"></i> ACCUEIL</div>
        <div class="nav-item" onclick="show('images')"><i class="fas fa-images"></i> IMAGES</div>
    </nav>

    <main>
        <header id="bot-name">Chargement...</header>

        <section id="accueil" class="content-section active">
            <div style="width: 100%; max-width: 450px; color: #888; font-size: 14px; margin-bottom: 5px;">Ping : <span id="p-ping">@User</span></div>
            <div class="discord-embed">
                <div class="thumb-preview img-zone" onclick="document.getElementById('file-in').click(); target='thumb'">
                    <div id="box-thumb"></div>
                </div>
                <div id="p-title" style="font-weight: bold; margin-bottom: 5px; font-size: 16px;">Titre</div>
                <div id="p-desc" style="font-size: 14px; white-space: pre-wrap;">Description...</div>
                <div class="banner-preview img-zone" onclick="document.getElementById('file-in').click(); target='banner'">
                    <div id="box-banner"></div>
                </div>
            </div>

            <div class="card">
                <input type="text" id="in-title" placeholder="Titre..." oninput="sync()">
                <textarea id="in-desc" rows="3" placeholder="Description ({user}, {server}...)" oninput="sync()"></textarea>
                
                <label style="font-size:11px; color:#555">SALON DE DESTINATION :</label>
                <select id="chan-list"></select>

                <label style="font-size:11px; color:#555">DÉCLENCHEMENT (RÔLES) :</label>
                <div id="role-checkboxes" class="checkbox-list"></div>

                <button class="btn btn-save" onclick="save()">SAUVEGARDER CONFIG</button>
                <button class="btn btn-test" onclick="test()">ENVOYER UN TEST</button>
            </div>
        </section>

        <section id="images" class="content-section">
            <div class="card">
                <input type="file" id="file-in" onchange="up()" style="display:none">
                <button class="btn" style="background:#222" onclick="document.getElementById('file-in').click(); target='gallery'">AJOUTER IMAGE</button>
            </div>
            <div id="gallery"></div>
        </section>
    </main>

    <script>
        const API = window.location.origin;
        let target = '';
        let userData = { name: "Utilisateur" };

        function show(id) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'images') loadG();
        }

        function sync() {
            const t = document.getElementById('in-title').value;
            const d = document.getElementById('in-desc').value;
            document.getElementById('p-ping').innerText = "@" + userData.name;
            document.getElementById('p-title').innerText = t || "Titre de l'embed";
            document.getElementById('p-desc').innerText = d.replace(/{user}/g, userData.name) || "Message de bienvenue...";
        }

        async function up() {
            const fd = new FormData(); fd.append('file', document.getElementById('file-in').files[0]);
            const res = await fetch(`${API}/api/upload`, { method: 'POST', body: fd });
            const data = await res.json();
            if(target !== 'gallery') {
                document.getElementById('box-'+target).innerHTML = `<img src="${API+data.url}">`;
                document.getElementById('box-'+target).parentElement.dataset.path = data.url;
            } else { loadG(); }
        }

        async function loadG() {
            const res = await fetch(`${API}/api/images`);
            const d = await res.json();
            document.getElementById('gallery').innerHTML = d.images.map(img => `
                <div class="gallery-card" onclick="setImg('${img}')"><img src="${API+img}"></div>
            `).join('');
        }

        function setImg(path) {
            document.getElementById('box-banner').innerHTML = `<img src="${API+path}">`;
            document.getElementById('box-banner').parentElement.dataset.path = path;
            show('accueil');
        }

        async function save() {
            const roles = [];
            document.querySelectorAll('#role-checkboxes input:checked').forEach(i => roles.push(i.value));
            const p = {
                title: document.getElementById('in-title').value,
                desc: document.getElementById('in-desc').value,
                target_channel: document.getElementById('chan-list').value,
                trigger_roles: roles,
                thumb: document.querySelector('.thumb-preview').dataset.path || null,
                banner: document.querySelector('.banner-preview').dataset.path || null
            };
            await fetch(`${API}/api/save_config`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(p) });
            alert("✅ Enregistré !");
        }

        async function test() {
            const p = {
                channel: document.getElementById('chan-list').value,
                title: document.getElementById('in-title').value,
                desc: document.getElementById('in-desc').value,
                thumb: document.querySelector('.thumb-preview').dataset.path || null,
                banner: document.querySelector('.banner-preview').dataset.path || null
            };
            const res = await fetch(`${API}/api/test_message`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(p) });
            const data = await res.json();
            alert("Bot dit : " + data.status);
        }

        async function init() {
            const res = await fetch(`${API}/api/get_server_info`);
            if(!res.ok) { window.location.href = "/login"; return; }
            const d = await res.json();
            userData.name = d.user_connected;
            document.getElementById('bot-name').innerText = d.bot.name.toUpperCase();
            document.getElementById('chan-list').innerHTML = d.channels.map(c => `<option value="${c.id}" ${d.config.target_channel == c.id ? 'selected':''}># ${c.name}</option>`).join('');
            document.getElementById('role-checkboxes').innerHTML = d.all_roles.map(r => `
                <div class="checkbox-item">
                    <input type="checkbox" value="${r}" ${(d.config.trigger_roles || []).includes(r) ? 'checked' : ''}>
                    <label>${r}</label>
                </div>`).join('');

            if(d.config) {
                document.getElementById('in-title').value = d.config.title || "";
                document.getElementById('in-desc').value = d.config.desc || "";
                if(d.config.thumb) { document.getElementById('box-thumb').innerHTML = `<img src="${API+d.config.thumb}">`; document.querySelector('.thumb-preview').dataset.path = d.config.thumb; }
                if(d.config.banner) { document.getElementById('box-banner').innerHTML = `<img src="${API+d.config.banner}">`; document.querySelector('.banner-preview').dataset.path = d.config.banner; }
                sync();
            }
        }
        window.onload = init;
    </script>
</body>
</html>

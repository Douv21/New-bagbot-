<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Simple</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #121212; color: white; }
        
        /* Sidebar et bouton Fermer */
        .sidebar { width: 250px; background: #000; height: 100vh; position: fixed; left: -250px; transition: 0.3s; z-index: 10; border-right: 1px solid #333; }
        .sidebar.open { left: 0; }
        .sidebar-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; background: #000; }
        .close-btn { background: none; border: none; color: #ff4d4d; font-size: 30px; cursor: pointer; }
        
        .main { padding: 20px; }
        .panel { background: #1e1e1e; padding: 20px; border-radius: 8px; max-width: 400px; margin: auto; }
        
        label { display: block; margin: 15px 0 5px; color: #888; font-size: 12px; font-weight: bold; }
        select, textarea, input { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: white; border-radius: 4px; box-sizing: border-box; }
        
        .btn { width: 100%; padding: 15px; background: #ff4d4d; border: none; color: white; font-weight: bold; margin-top: 20px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <b style="color: #ff4d4d">BAG BOT V2</b>
        <button class="close-btn" onclick="toggleMenu()">×</button>
    </div>
    <div style="padding: 20px; border-left: 4px solid #ff4d4d;">🎭 Rôles-Réactions</div>
</div>

<div class="main">
    <button onclick="toggleMenu()" style="background:#333; color:white; border:none; padding:10px; margin-bottom:10px;">☰ Menu</button>
    
    <div class="panel">
        <h3 style="margin-top:0">Configuration Simple</h3>
        
        <label>Salon Discord</label>
        <select id="channelId"></select>

        <label>Rôle à donner</label>
        <select id="roleId"></select>

        <label>Texte du message</label>
        <textarea id="content" rows="3">Cliquez pour obtenir le rôle</textarea>

        <button class="btn" onclick="send()">DÉPLOYER</button>
    </div>
</div>

<script>
    function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); }

    async function load() {
        const cRes = await fetch('/api/channels');
        const rRes = await fetch('/api/roles');
        const channels = await cRes.json();
        const roles = await rRes.json();
        
        document.getElementById('channelId').innerHTML = channels.map(c => `<option value="${c.id}"># ${c.name}</option>`).join('');
        document.getElementById('roleId').innerHTML = roles.map(r => `<option value="${r.id}">${r.name}</option>`).join('');
    }

    async function send() {
        const cId = document.getElementById('channelId').value;
        const rId = document.getElementById('roleId').value;
        const txt = document.getElementById('content').value;

        // Sécurité ultime avant envoi
        if(!cId || cId === "undefined") return alert("Attends que les salons chargent !");

        const res = await fetch('/update-bot', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ channelId: cId, roleId: rId, content: txt })
        });

        const data = await res.json();
        alert(data.success ? "✅ Réussi !" : "❌ Erreur : " + data.message);
    }

    load();
</script>
</body>
</html>

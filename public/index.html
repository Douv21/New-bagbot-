<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BagBot Designer Pro - Full Version</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* --- VARIABLES DE THEME --- */
        :root {
            --accent-color: #d37f6a;
            --background-main: #2b2d31;
            --sidebar-background: #1e1f22;
            --dark-background: #111214;
            --text-primary: #dbdee1;
            --text-secondary: #949ba4;
            --border-standard: #3f4147;
            --input-background: #1e1f22;
            --modal-bg: #313338;
        }

        /* --- RESET & BASE --- */
        * {
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--background-main);
            color: var(--text-primary);
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* --- SIDEBAR (DESIGN 10128.jpg) --- */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-background);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
            z-index: 2000;
            border-right: 1px solid var(--dark-background);
            flex-shrink: 0;
        }

        @media (max-width: 768px) {
            .sidebar {
                position: absolute;
                height: 100%;
                transform: translateX(-100%);
            }
            .sidebar.active {
                transform: translateX(0);
            }
        }

        .sidebar-header {
            padding: 24px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: var(--dark-background);
        }

        .sidebar-brand {
            font-weight: 800;
            color: var(--accent-color);
            font-size: 18px;
            text-transform: uppercase;
        }

        .sidebar-nav {
            padding: 15px 10px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 5px;
            cursor: pointer;
            color: var(--text-secondary);
            margin-bottom: 5px;
            transition: 0.2s;
        }

        .nav-link.active {
            background-color: rgba(211, 127, 106, 0.15);
            color: white;
            border-left: 3px solid var(--accent-color);
        }

        /* --- MAIN CONTENT --- */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .top-navbar {
            height: 60px;
            background-color: var(--background-main);
            display: flex;
            align-items: center;
            padding: 0 20px;
            border-bottom: 1px solid var(--dark-background);
            gap: 20px;
        }

        .hamburger-menu {
            font-size: 22px;
            color: var(--accent-color);
            cursor: pointer;
        }

        /* --- BUILDER AREA --- */
        .builder-viewport {
            flex-grow: 1;
            overflow-y: auto;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .discord-embed {
            width: 100%;
            max-width: 520px;
            background-color: #313338;
            border-radius: 4px;
            border-left: 4px solid var(--accent-color);
            padding: 16px;
            position: relative;
        }

        .image-placeholder {
            border: 2px dashed #4e5058;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            background-color: rgba(0,0,0,0.1);
        }

        .image-placeholder img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
        }

        .embed-thumbnail {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 80px;
            height: 80px;
        }

        .author-icon { width: 24px; height: 24px; border-radius: 50%; }

        .embed-title-input { font-size: 18px; font-weight: 700; color: white; margin-bottom: 10px; outline: none; }
        .embed-description-input { font-size: 14px; color: var(--text-primary); line-height: 1.5; outline: none; min-height: 40px; }

        .embed-banner { width: 100%; height: 200px; margin-top: 15px; }

        /* --- SELECTORS & CONTROLS --- */
        .settings-panel {
            width: 100%;
            max-width: 520px;
            margin-top: 30px;
            padding-bottom: 60px;
        }

        .label-text {
            display: block;
            font-size: 11px;
            font-weight: 800;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .discord-select {
            width: 100%;
            background-color: var(--dark-background);
            border: 1px solid rgba(0,0,0,0.4);
            color: white;
            padding: 14px;
            border-radius: 5px;
            font-size: 15px;
            margin-bottom: 25px;
            outline: none;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 15px center;
            background-size: 18px;
        }

        /* --- REACTION SYSTEM --- */
        .reaction-row {
            display: flex;
            align-items: center;
            gap: 12px;
            background-color: var(--sidebar-background);
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 10px;
            border: 1px solid var(--border-standard);
        }

        .emoji-trigger {
            font-size: 22px;
            min-width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.3);
            border-radius: 4px;
            cursor: pointer;
            transition: 0.2s;
        }

        .emoji-trigger:hover { background: rgba(211, 127, 106, 0.2); }

        /* --- EMOJI PICKER MODAL --- */
        #emoji-picker-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            z-index: 3000;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .picker-content {
            background: var(--modal-bg);
            width: 90%;
            max-width: 350px;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 400px;
        }

        .picker-header {
            padding: 15px;
            background: var(--dark-background);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .emoji-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
            padding: 15px;
            overflow-y: auto;
        }

        .emoji-item {
            font-size: 24px;
            cursor: pointer;
            text-align: center;
            transition: transform 0.1s;
        }

        .emoji-item:hover { transform: scale(1.2); }

        /* --- BUTTONS --- */
        .btn-action {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 5px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .btn-add { background: #4e5058; color: white; margin-bottom: 12px; }
        .btn-deploy { background: var(--accent-color); color: white; margin-top: 10px; }

    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span class="sidebar-brand">BAGBOT PRO</span>
            <i class="fas fa-times" onclick="toggleSidebar()" style="cursor:pointer;"></i>
        </div>
        <div class="sidebar-nav">
            <div class="nav-link active"><i class="fas fa-edit"></i> Builder d'Embed</div>
            <div class="nav-link"><i class="fas fa-history"></i> Logs Messages</div>
            <div class="nav-link"><i class="fas fa-cog"></i> Paramètres</div>
        </div>
    </div>

    <div class="main-content">
        <div class="top-navbar">
            <div class="hamburger-menu" onclick="toggleSidebar()"><i class="fas fa-bars"></i></div>
            <div style="font-weight: 700;">Nouveau Message</div>
        </div>

        <div class="builder-viewport">
            
            <div class="discord-embed">
                <div class="embed-thumbnail image-placeholder" onclick="triggerFile('thumb')">
                    <i class="fas fa-plus" id="icon-thumb"></i>
                    <img id="img-thumb" style="display:none">
                </div>

                <div style="display:flex; align-items:center; gap:10px; margin-bottom:12px;">
                    <div class="author-icon image-placeholder" onclick="triggerFile('author')">
                        <img id="img-author" style="display:none">
                    </div>
                    <div contenteditable="true" style="font-size:14px; font-weight:600; color:white;">Nom de l'auteur</div>
                </div>

                <div class="embed-title-input" contenteditable="true">Titre de l'embed</div>
                <div class="embed-description-input" contenteditable="true">Contenu de votre message...</div>

                <div class="embed-banner image-placeholder" onclick="triggerFile('banner')">
                    <i class="fas fa-image" id="icon-banner" style="font-size:32px; color:#4e5058"></i>
                    <img id="img-banner" style="display:none">
                </div>
            </div>

            <div class="settings-panel">
                <span class="label-text">Salon de destination</span>
                <select class="discord-select" id="channel-list">
                    <option value="">Chargement des salons...</option>
                </select>
                
                <span class="label-text">Configuration Rôles-Réactions</span>
                <div id="reaction-area"></div>
                
                <button class="btn-action btn-add" onclick="addReactionRow()">
                    <i class="fas fa-plus-circle"></i> Ajouter une réaction
                </button>
                
                <button class="btn-action btn-deploy" onclick="alert('Déploiement initié !')">
                    <i class="fas fa-rocket"></i> DÉPLOYER LE MESSAGE
                </button>
            </div>
        </div>
    </div>

    <div id="emoji-picker-modal">
        <div class="picker-content">
            <div class="picker-header">
                <span style="font-weight:700;">Choisir un émoji</span>
                <i class="fas fa-times" onclick="closeEmojiPicker()" style="cursor:pointer;"></i>
            </div>
            <div class="emoji-grid" id="emoji-grid-container">
                </div>
        </div>
    </div>

    <input type="file" id="file-input" style="display:none" accept="image/*" onchange="previewImg(this)">

    <script>
        let currentZone = null;
        let currentEmojiBtn = null;

        // --- DONNÉES SIMULÉES (Seront remplacées par l'API Python plus tard) ---
        const fakeData = {
            channels: [
                { id: "1349448439402561637", name: "📂-storage" },
                { id: "1", name: "💬-général" },
                { id: "2", name: "📢-annonces" }
            ],
            roles: [
                { id: "101", name: "Membre" },
                { id: "102", name: "VIP" },
                { id: "103", name: "Staff" }
            ],
            emojis: ["✅", "❌", "🔥", "🔞", "⭐", "🎁", "🎉", "🚀", "📢", "🛠️", "👋", "🤖"]
        };

        // --- INITIALISATION ---
        window.onload = () => {
            // Remplir les salons
            const chanSelect = document.getElementById('channel-list');
            chanSelect.innerHTML = '<option value="">Choisir un salon...</option>' + 
                fakeData.channels.map(c => `<option value="${c.id}"># ${c.name}</option>`).join('');

            // Préparer la grille d'émojis
            const grid = document.getElementById('emoji-grid-container');
            grid.innerHTML = fakeData.emojis.map(e => `<div class="emoji-item" onclick="selectEmoji('${e}')">${e}</div>`).join('');
            
            if(window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('active');
        };

        // --- GESTION SIDEBAR ---
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
        }

        // --- GESTION IMAGES ---
        function triggerFile(zone) {
            currentZone = zone;
            document.getElementById('file-input').click();
        }

        function previewImg(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = document.getElementById(`img-${currentZone}`);
                    const icon = document.getElementById(`icon-${currentZone}`);
                    img.src = e.target.result;
                    img.style.display = 'block';
                    if(icon) icon.style.display = 'none';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        // --- GESTION RÉACTIONS ---
        function addReactionRow() {
            const area = document.getElementById('reaction-area');
            const row = document.createElement('div');
            row.className = 'reaction-row';
            
            row.innerHTML = `
                <div class="emoji-trigger" onclick="openEmojiPicker(this)">😀</div>
                <select class="discord-select" style="margin-bottom:0; flex-grow:1;">
                    <option value="">Attribuer un rôle...</option>
                    ${fakeData.roles.map(r => `<option value="${r.id}">${r.name}</option>`).join('')}
                </select>
                <i class="fas fa-trash" onclick="this.parentElement.remove()" style="color:#ed4245; cursor:pointer; padding:10px;"></i>
            `;
            area.appendChild(row);
        }

        // --- GESTION EMOJI PICKER ---
        function openEmojiPicker(btn) {
            currentEmojiBtn = btn;
            document.getElementById('emoji-picker-modal').style.display = 'flex';
        }

        function closeEmojiPicker() {
            document.getElementById('emoji-picker-modal').style.display = 'none';
        }

        function selectEmoji(emoji) {
            if(currentEmojiBtn) currentEmojiBtn.innerText = emoji;
            closeEmojiPicker();
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BagBot Designer Pro - Version Intégrale</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* CONFIGURATION DES COULEURS ET VARIABLES */
        :root {
            --accent-color: #d37f6a;
            --background-main: #2b2d31;
            --sidebar-background: #1e1f22;
            --dark-background: #111214;
            --text-primary: #dbdee1;
            --text-secondary: #949ba4;
            --border-standard: #3f4147;
            --input-background: #1e1f22;
        }

        /* RESET ET BASE */
        * {
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background-main);
            color: var(--text-primary);
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* STRUCTURE DE LA SIDEBAR (Fidèle à 10128.jpg) */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-background);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease-in-out;
            z-index: 2000;
            border-right: 1px solid var(--dark-background);
            flex-shrink: 0;
        }

        /* Sur mobile, on cache la sidebar par défaut */
        @media (max-width: 768px) {
            .sidebar {
                position: absolute;
                height: 100%;
                transform: translateX(-100%);
            }
            .sidebar.active {
                transform: translateX(0);
            }
        }

        .sidebar-header {
            padding: 24px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: var(--dark-background);
        }

        .sidebar-brand {
            font-weight: 800;
            color: var(--accent-color);
            font-size: 18px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .sidebar-nav {
            padding: 15px 10px;
            flex-grow: 1;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 5px;
            cursor: pointer;
            color: var(--text-secondary);
            font-weight: 500;
            margin-bottom: 5px;
            transition: background 0.2s, color 0.2s;
        }

        .nav-link:hover {
            background-color: rgba(78, 80, 88, 0.3);
            color: var(--text-primary);
        }

        .nav-link.active {
            background-color: rgba(211, 127, 106, 0.15);
            color: white;
            border-left: 3px solid var(--accent-color);
        }

        /* CONTENU PRINCIPAL */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            position: relative;
        }

        .top-navbar {
            height: 60px;
            background-color: var(--background-main);
            display: flex;
            align-items: center;
            padding: 0 20px;
            border-bottom: 1px solid var(--dark-background);
            gap: 20px;
            z-index: 100;
        }

        .hamburger-menu {
            font-size: 22px;
            color: var(--accent-color);
            cursor: pointer;
        }

        .navbar-title {
            font-weight: 700;
            font-size: 16px;
            color: white;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* ZONE DE CONSTRUCTION */
        .builder-viewport {
            flex-grow: 1;
            overflow-y: auto;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            scroll-behavior: smooth;
        }

        /* DESIGN DE L'EMBED DISCORD */
        .discord-embed {
            width: 100%;
            max-width: 520px;
            background-color: #313338;
            border-radius: 4px;
            border-left: 4px solid var(--accent-color);
            padding: 16px;
            position: relative;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }

        .image-placeholder {
            border: 2px dashed #4e5058;
            border-radius: 4px;
            background-color: rgba(0,0,0,0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.2s ease;
        }

        .image-placeholder:hover {
            border-color: var(--accent-color);
            background-color: rgba(211, 127, 106, 0.05);
        }

        .image-placeholder img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
        }

        .embed-thumbnail {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 80px;
            height: 80px;
            z-index: 10;
        }

        .embed-author {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .author-icon {
            width: 24px;
            height: 24px;
            border-radius: 50%;
        }

        .author-name-input {
            font-size: 14px;
            font-weight: 600;
            color: white;
            outline: none;
            border: none;
            background: transparent;
        }

        .embed-title-input {
            font-size: 18px;
            font-weight: 700;
            color: white;
            margin-bottom: 10px;
            outline: none;
            width: 80%;
        }

        .embed-description-input {
            font-size: 14px;
            color: var(--text-primary);
            line-height: 1.5;
            outline: none;
            min-height: 20px;
            margin-bottom: 15px;
        }

        .embed-banner {
            width: 100%;
            height: 200px;
            margin-top: 10px;
        }

        /* FORMULAIRE DE CONFIGURATION */
        .settings-panel {
            width: 100%;
            max-width: 520px;
            margin-top: 30px;
            padding-bottom: 60px;
        }

        .label-text {
            display: block;
            font-size: 12px;
            font-weight: 800;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }

        .discord-select {
            width: 100%;
            background-color: var(--dark-background);
            border: 1px solid rgba(0,0,0,0.4);
            color: white;
            padding: 14px;
            border-radius: 5px;
            font-size: 15px;
            margin-bottom: 25px;
            outline: none;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 15px center;
            background-size: 18px;
        }

        .reaction-container {
            margin-bottom: 25px;
        }

        .reaction-row {
            display: flex;
            align-items: center;
            gap: 12px;
            background-color: var(--sidebar-background);
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 10px;
            border: 1px solid var(--border-standard);
        }

        .emoji-box {
            font-size: 22px;
            min-width: 40px;
            text-align: center;
            cursor: pointer;
            background: rgba(0,0,0,0.2);
            padding: 5px;
            border-radius: 4px;
        }

        .role-select {
            flex-grow: 1;
            margin-bottom: 0 !important;
        }

        .btn-action {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 5px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.2s;
        }

        .btn-add-role {
            background-color: #4e5058;
            color: white;
            margin-bottom: 12px;
        }

        .btn-deploy-final {
            background-color: var(--accent-color);
            color: white;
            box-shadow: 0 4px 15px rgba(211, 127, 106, 0.3);
        }

        .btn-action:active {
            transform: scale(0.98);
        }

        .delete-btn {
            color: #ed4245;
            cursor: pointer;
            padding: 10px;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span class="sidebar-brand">BAGBOT PRO</span>
            <i class="fas fa-chevron-left" onclick="toggleSidebar()" style="cursor:pointer; color: #555;"></i>
        </div>
        <div class="sidebar-nav">
            <div class="nav-link active"><i class="fas fa-edit"></i> Builder d'Embed</div>
            <div class="nav-link"><i class="fas fa-server"></i> Serveur Logs</div>
            <div class="nav-link"><i class="fas fa-images"></i> Bibliothèque</div>
            <div class="nav-link"><i class="fas fa-cog"></i> Configuration</div>
        </div>
    </div>

    <div class="main-content">
        <div class="top-navbar">
            <div class="hamburger-menu" onclick="toggleSidebar()">
                <i class="fas fa-bars"></i>
            </div>
            <div class="navbar-title">Création de message</div>
        </div>

        <div class="builder-viewport">
            
            <div class="discord-embed">
                <div class="embed-thumbnail image-placeholder" onclick="openFilePicker('thumb')">
                    <i class="fas fa-plus" id="icon-thumb"></i>
                    <img id="img-thumb" style="display:none">
                </div>

                <div class="embed-author">
                    <div class="author-icon image-placeholder" onclick="openFilePicker('author')" style="width:24px; height:24px;">
                        <img id="img-author" style="display:none">
                    </div>
                    <div class="author-name-input" contenteditable="true">Nom de l'auteur</div>
                </div>

                <div class="embed-title-input" contenteditable="true">Titre de votre embed</div>

                <div class="embed-description-input" contenteditable="true">Écrivez ici le contenu principal de votre message Discord. Vous pouvez utiliser du Markdown.</div>

                <div class="embed-banner image-placeholder" onclick="openFilePicker('banner')">
                    <i class="fas fa-image" id="icon-banner" style="font-size: 35px; color: #4e5058;"></i>
                    <img id="img-banner" style="display:none">
                </div>
            </div>

            <div class="settings-panel">
                <span class="label-text">Salon de destination</span>
                <select class="discord-select" id="channel-picker">
                    <option value="">Sélectionner un salon...</option>
                    <option value="1349448439402561637"># 📂-storage</option>
                    <option value="1"># 💬-général</option>
                    <option value="2"># 📢-annonces</option>
                    <option value="3"># 🛠-staff</option>
                    <option value="4"># 🤖-bot-commandes</option>
                </select>
                
                <span class="label-text">Configuration des rôles-réactions</span>
                <div id="reaction-list-area" class="reaction-container">
                    </div>
                
                <div class="button-footer">
                    <button class="btn-action btn-add-role" onclick="createNewReactionRow()">
                        <i class="fas fa-plus-circle"></i> Ajouter une réaction
                    </button>
                    
                    <button class="btn-action btn-deploy-final" onclick="startDeployment()">
                        <i class="fas fa-rocket"></i> ENVOYER LE MESSAGE
                    </button>
                </div>
            </div>

        </div>
    </div>

    <input type="file" id="hidden-file-input" style="display:none" accept="image/*" onchange="handleImageSelection(this)">

    <script>
        let uploadType = null;
        
        // Données fictives pour les rôles (remplira le sélecteur)
        const serverRoles = [
            { id: "101", name: "Membre" },
            { id: "102", name: "VIP" },
            { id: "103", name: "Modérateur" },
            { id: "104", name: "Annonceur" },
            { id: "105", name: "Partenaire" }
        ];

        // GESTION SIDEBAR
        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            if (window.innerWidth <= 768) {
                sb.classList.toggle('active');
            } else {
                sb.style.width = (sb.style.width === '0px') ? '260px' : '0px';
                sb.style.borderRight = (sb.style.width === '0px') ? 'none' : '1px solid var(--dark-background)';
            }
        }

        // GESTION IMAGES
        function openFilePicker(type) {
            uploadType = type;
            document.getElementById('hidden-file-input').click();
        }

        function handleImageSelection(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.getElementById(`img-${uploadType}`);
                    const icon = document.getElementById(`icon-${uploadType}`);
                    
                    img.src = e.target.result;
                    img.style.display = 'block';
                    if(icon) icon.style.display = 'none';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        // CRÉATION DE LIGNE DE RÉACTION
        function createNewReactionRow() {
            const area = document.getElementById('reaction-list-area');
            const row = document.createElement('div');
            row.className = 'reaction-row';
            
            const emoji = prompt("Collez l'émoji ici (ex: ✅) :") || "⭐";
            
            let roleOptions = serverRoles.map(r => `<option value="${r.id}">${r.name}</option>`).join('');
            
            row.innerHTML = `
                <div class="emoji-box">${emoji}</div>
                <select class="discord-select role-select">
                    <option value="">Attribuer un rôle...</option>
                    ${roleOptions}
                </select>
                <i class="fas fa-trash-alt delete-btn" onclick="this.parentElement.remove()"></i>
            `;
            
            area.appendChild(row);
        }

        // BOUTON FINAL
        function startDeployment() {
            const channel = document.getElementById('channel-picker').value;
            if(!channel) {
                alert("Erreur : Vous devez sélectionner un salon de destination.");
                return;
            }
            alert("🚀 Préparation de l'envoi vers Discord terminée !");
        }

        // Initialisation mobile
        if(window.innerWidth <= 768) {
            document.getElementById('sidebar').classList.remove('active');
        }
    </script>
</body>
</html>

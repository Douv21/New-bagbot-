<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BagBot Designer - Stable</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #d37f6a; --bg: #2b2d31; --sidebar: #1e1f22; --text: #dbdee1; --dark: #111214; }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        /* SIDEBAR (Design 10128.jpg) */
        .sidebar { width: 260px; background: var(--sidebar); display: flex; flex-direction: column; transition: 0.3s; z-index: 1000; border-right: 1px solid var(--dark); }
        .sidebar.collapsed { margin-left: -260px; }
        .nav-header { padding: 25px 20px; font-weight: 900; color: var(--accent); font-size: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2b2d31; }
        .nav-item { padding: 15px 25px; display: flex; align-items: center; gap: 15px; cursor: pointer; color: #888; font-weight: 500; }
        .nav-item.active { background: rgba(211, 127, 106, 0.1); color: white; border-left: 4px solid var(--accent); }

        /* MAIN CONTENT */
        .main { flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative; }
        .top-nav { height: 60px; background: var(--sidebar); display: flex; align-items: center; padding: 0 20px; gap: 15px; border-bottom: 1px solid var(--dark); }
        .hamburger { font-size: 24px; cursor: pointer; color: var(--accent); }

        /* BUILDER AREA */
        .container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        
        /* EMBED CARD (Design Ultra-Fidèle) */
        .embed-card { background: #313338; border-radius: 8px; padding: 16px; width: 100%; max-width: 460px; position: relative; border-left: 4px solid var(--accent); box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        
        .slot { border: 2px dashed #4e5058; border-radius: 8px; background: rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; position: relative; }
        .slot:hover { border-color: var(--accent); background: rgba(211, 127, 106, 0.05); }
        .slot img { width: 100%; height: 100%; object-fit: cover; position: absolute; }
        
        .thumb-slot { position: absolute; top: 16px; right: 16px; width: 65px; height: 65px; z-index: 10; }
        .banner-slot { width: 100%; height: 160px; margin-top: 15px; }
        
        .auth-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
        .auth-img { width: 24px; height: 24px; border-radius: 50%; min-height: auto; }

        .input-title { font-size: 18px; font-weight: 700; color: white; margin-bottom: 8px; border: none; background: transparent; width: 100%; outline: none; }
        .input-desc { font-size: 14px; color: var(--text); min-height: 40px; outline: none; line-height: 1.4; }

        /* CONTROLS */
        .controls { width: 100%; max-width: 460px; margin-top: 25px; }
        .field-label { font-size: 11px; font-weight: 800; color: #8e9297; text-transform: uppercase; margin-bottom: 8px; display: block; }
        input[type="text"] { width: 100%; padding: 14px; background: #1e1f22; border: 1px solid #111; color: white; border-radius: 8px; margin-bottom: 20px; outline: none; }
        
        .btn-action { width: 100%; padding: 14px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s; }
        .btn-add { background: #4e5058; color: white; margin-bottom: 12px; }
        .btn-deploy { background: var(--accent); color: white; font-size: 16px; margin-top: 10px; }

        /* REACTION LIST */
        .reac-item { background: var(--dark); padding: 10px 15px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; border: 1px solid #222; }

        [contenteditable]:empty:before { content: attr(placeholder); color: #555; }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div class="nav-header">
            <span>BAGBOT</span>
            <i class="fas fa-times" onclick="toggleSidebar()" style="cursor:pointer; font-size: 18px;"></i>
        </div>
        <div class="nav-item active"><i class="fas fa-layer-group"></i> Builder</div>
        <div class="nav-item"><i class="fas fa-folder-open"></i> Mes Templates</div>
        <div class="nav-item"><i class="fas fa-cog"></i> Paramètres</div>
    </div>

    <div class="main">
        <div class="top-nav">
            <i class="fas fa-bars hamburger" onclick="toggleSidebar()"></i>
            <span style="font-weight: 700; letter-spacing: 0.5px;">ÉDITEUR D'EMBED</span>
        </div>

        <div class="container">

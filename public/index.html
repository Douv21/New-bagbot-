<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BagBot OS | Master Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --accent: #ed4245;
            --bg: #050505;
            --sidebar-bg: #000000;
            --card: #111214;
            --embed-bg: #2b2d31;
            --border: #2b2d31;
            --text: #ffffff;
            --text-m: #949ba4;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body { background: var(--bg); color: var(--text); font-family: 'Helvetica Neue', Arial, sans-serif; display: flex; height: 100vh; overflow: hidden; }

        /* --- SIDEBAR --- */
        #sidebar { width: 260px; background: var(--sidebar-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; transition: 0.3s; z-index: 1000; }
        #sidebar.closed { transform: translateX(-100%); position: absolute; height: 100%; }
        .sidebar-header { padding: 30px 24px; font-size: 22px; font-weight: 900; color: var(--accent); letter-spacing: 2px; }
        .nav-list { flex: 1; padding: 10px; }
        .nav-item { padding: 14px 20px; display: flex; align-items: center; gap: 12px; color: var(--text-m); cursor: pointer; transition: 0.2s; font-weight: 600; border-radius: 8px; margin-bottom: 5px; }
        .nav-item.active { background: rgba(237, 66, 69, 0.1); color: var(--accent); }
        .nav-item i { width: 20px; text-align: center; }

        /* --- MAIN VIEWPORT --- */
        .viewport { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        header { height: 60px; background: #080808; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; gap: 15px; }
        #burger { color: var(--accent); font-size: 22px; cursor: pointer; }

        .content { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; align-items: center; }

        /* --- EMBED MASTER --- */
        .designer-card { width: 100%; max-width: 600px; background: var(--card); border-radius: 12px; padding: 20px; border: 1px solid var(--border); }
        
        .embed-preview { background: var(--embed-bg); border-left: 4px solid var(--accent); border-radius: 4px; padding: 16px; position: relative; margin-bottom: 20px; }
        
        .author-zone { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; cursor: pointer; }
        .author-img { width: 24px; height: 24px; border-radius: 50%; background: #000; border: 1px solid #444; }
        .author-name { font-size: 13px; font-weight: 700; color: #fff; }

        .main-body { display: flex; justify-content: space-between; gap: 15px; }
        #p-title { font-size: 16px; font-weight: 700; color: #fff; margin-bottom: 8px; display: block; cursor: pointer; }
        #p-desc { font-size: 14px; color: #dbdee1; line-height: 1.4; display: block; cursor: pointer; }
        
        .thumb-zone { width: 80px; height: 80px; background: #1e1f22; border-radius: 4px; display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; border: 1px dashed #444; flex-shrink: 0; }
        .thumb-zone img { width: 100%; height: 100%; object-fit: cover; }

        .banner-zone { width: 100%; height: 160px; background: #1e1f22; margin-top: 15px; border-radius: 4px; display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; border: 1px dashed #444; }
        .banner-zone img { width: 100%; height: 100%; object-fit: cover; }

        .footer-zone { display: flex; align-items: center; gap: 8px; margin-top: 15px; cursor: pointer; }
        .footer-img { width: 20px; height: 20px; border-radius: 50%; background: #000; }
        #p-footer { font-size: 12px; color: var(--text-m); font-weight: 600; }

        /* --- EDITOR CONTROLS --- */
        .controls { background: #080808; border-radius: 8px; padding: 15px; margin-top: 15px; border: 1px solid var(--border); }
        label { font-size: 10px; font-weight: 800; color: var(--text-m); text-transform: uppercase; margin-bottom: 8px; display: block; }
        input, textarea, select { width: 100%; background: #111; border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 6px; margin-bottom: 10px; font-size: 13px; }
        
        .btn-deploy { width: 100%; background: var(--accent); color: white; border: none; padding: 16px; border-radius: 8px; font-weight: 900; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .btn-deploy:hover { filter: brightness(1.2); }

        .hidden { display: none; }
    </style>
</head>
<body>

    <aside id="sidebar">
        <div class="sidebar-header">BAGBOT</div>
        <div class="nav-list">
            <div class="nav-item active"><i class="fas fa-home"></i> ACCUEIL</div>
            <div class="nav-item"><i class="fas fa-shield-alt"></i> AUTO-MOD</div>
            <div class="nav-item"><i class="fas fa-ticket-alt"></i> TICKETS</div>
            <div class="nav-item"><i class="fas fa-cog"></i> PARAMÈTRES</div>
        </div>
    </aside>

    <div class="viewport">
        <header>
            <i class="fas fa-bars" id="burger"></i>
            <div style="font-weight: 900; letter-spacing: 1px; font-size: 14px;">CONFIGURATION ACCUEIL</div>
        </header>

        <div class="content">
            <div class="designer-card">
                <span style="font-size: 10px; font-weight: 800; color: var(--text-m); margin-bottom: 15px; display: block;">ÉDITEUR VISUEL (CLIQUEZ POUR MODIFIER)</span>
                
                <div class="embed-preview">
                    <div class="author-zone" onclick="openEdit('author', 'URL de l\'icône auteur')">
                        <img src="" id="p-author-img" class="author-img">
                        <span class="author-name" id="p-author-name">Chargement...</span>
                    </div>

                    <div class="main-body">
                        <div style="flex: 1;">
                            <span id="p-title" onclick="openEdit('title', 'Titre de l\'Embed')">Titre de l'accueil</span>
                            <span id="p-desc" onclick="openEdit('desc', 'Description du message')">Bienvenue {user} sur notre serveur !</span>
                        </div>
                        <div class="thumb-zone" id="p-thumb-box" onclick="openEdit('thumb', 'URL de la Miniature (carré)')">
                            <i class="fas fa-plus" style="color:#333"></i>
                        </div>
                    </div>

                    <div class="banner-zone" id="p-banner-box" onclick="openEdit('banner', 'URL de la Bannière (grande image)')">
                        <i class="fas fa-image" style="font-size: 24px; color:#222"></i>
                    </div>

                    <div class="footer-zone" onclick="openEdit('footer', 'Texte du Footer')">
                        <img src="" id="p-footer-img" class="footer-img">
                        <span id="p-footer">ID: {user_id} • BagBot OS</span>
                    </div>
                </div>

                <div class="controls">
                    <label>Salon de destination</label>
                    <select id="chan-list"></select>

                    <div id="edit-form" class="hidden">
                        <label id="edit-label">Modification</label>
                        <input type="text" id="edit-input" class="hidden">
                        <textarea id="edit-area" class="hidden" rows="3"></textarea>
                    </div>

                    <button class="btn-deploy" onclick="saveData()">Déployer le message</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentField = '';
        const burger = document.getElementById('burger');
        const sidebar = document.getElementById('sidebar');

        burger.onclick = () => sidebar.classList.toggle('closed');

        function openEdit(type, labelText) {
            currentField = type;
            document.getElementById('edit-form').classList.remove('hidden');
            document.getElementById('edit-label').innerText = labelText;
            
            const input = document.getElementById('edit-input');
            const area = document.getElementById('edit-area');

            input.classList.add('hidden');
            area.classList.add('hidden');

            if(type === 'desc') {
                area.classList.remove('hidden');
                area.value = document.getElementById('p-desc').innerText;
            } else {
                input.classList.remove('hidden');
                input.value = (type === 'title') ? document.getElementById('p-title').innerText : (type === 'footer') ? document.getElementById('p-footer').innerText : "";
            }
        }

        document.getElementById('edit-input').oninput = (e) => updatePreview(e.target.value);
        document.getElementById('edit-area').oninput = (e) => updatePreview(e.target.value);

        function updatePreview(val) {
            if(currentField === 'title') document.getElementById('p-title').innerText = val;
            if(currentField === 'desc') document.getElementById('p-desc').innerText = val;
            if(currentField === 'footer') document.getElementById('p-footer').innerText = val;
            if(currentField === 'thumb') document.getElementById('p-thumb-box').innerHTML = `<img src="${val}">`;
            if(currentField === 'banner') document.getElementById('p-banner-box').innerHTML = `<img src="${val}">`;
            if(currentField === 'author') document.getElementById('p-author-img').src = val;
        }

        async function saveData() {
            const settings = {
                title: document.getElementById('p-title').innerText,
                description: document.getElementById('p-desc').innerText,
                footer: document.getElementById('p-footer').innerText,
                channel: document.getElementById('chan-list').value
            };
            const res = await fetch('/api/save_settings', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({category: "accueil", settings})
            });
            const r = await res.json();
            alert("✅ " + r.message);
        }

        window.onload = async () => {
            try {
                const res = await fetch('/api/get_server_info');
                const data = await res.json();
                if(data.channels) {
                    document.getElementById('chan-list').innerHTML = data.channels.map(c => `<option value="${c.id}"># ${c.name}</option>`).join('');
                    document.getElementById('p-author-img').src = data.bot.avatar;
                    document.getElementById('p-author-name').innerText = data.bot.name;
                    document.getElementById('p-footer-img').src = data.bot.avatar;
                }
            } catch(e) { console.log("Erreur de liaison bot"); }
        };
    </script>
</body>
</html>

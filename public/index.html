<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BagBot Ultimate Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050505; --panel: #0f0f0f; --accent: #ed4245; --border: #1e1e1e; --discord-bg: #2b2d31; --discord-text: #dbdee1; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: white; display: flex; min-height: 100vh; overflow-x: hidden; }

        /* SIDEBAR */
        #sidebar { width: 260px; background: #000; border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 10000; transition: 0.3s; position: fixed; height: 100vh; left: -260px; }
        #sidebar.open { left: 0; }
        #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 9999; }
        #overlay.open { display: block; }
        
        .sidebar-header { padding: 30px 25px; font-size: 22px; font-weight: 900; color: var(--accent); letter-spacing: 2px; }
        .nav-item { padding: 18px 25px; cursor: pointer; color: #888; display: flex; align-items: center; gap: 12px; font-weight: bold; }
        .nav-item.active { color: var(--accent); background: rgba(237,66,69,0.1); border-right: 4px solid var(--accent); }

        /* MAIN CONTENT */
        main { flex: 1; display: flex; flex-direction: column; width: 100%; }
        header { height: 70px; background: var(--panel); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding-left: 75px; font-weight: 900; font-size: 18px; }
        .menu-toggle { position: fixed; left: 15px; top: 15px; font-size: 20px; color: var(--accent); cursor: pointer; z-index: 10001; background: #111; padding: 10px; border-radius: 8px; border: 1px solid var(--border); }

        .content-section { display: none; flex-direction: column; align-items: center; padding: 20px; width: 100%; }
        .content-section.active { display: flex; }

        /* PREVIEW DISCORD */
        .discord-embed { width: 100%; max-width: 500px; background: var(--discord-bg); border-left: 4px solid var(--accent); padding: 16px; border-radius: 4px; margin-bottom: 25px; }
        .embed-main { display: flex; justify-content: space-between; gap: 10px; }
        #p-title { font-weight: 600; color: #fff; margin-bottom: 4px; }
        #p-desc { font-size: 0.875rem; color: var(--discord-text); white-space: pre-wrap; }
        
        .img-click { cursor: pointer; border: 2px dashed rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .p-thumb { width: 80px; height: 80px; border-radius: 4px; flex-shrink: 0; }
        .p-banner { width: 100%; height: 140px; margin-top: 12px; border-radius: 8px; }
        .img-click img { width: 100%; height: 100%; object-fit: cover; display: none; }

        /* CARDS & INPUTS */
        .card { width: 100%; max-width: 550px; background: var(--panel); border-radius: 12px; padding: 25px; border: 1px solid var(--border); margin-bottom: 25px; }
        h3 { font-size: 11px; color: var(--accent); text-transform: uppercase; margin-bottom: 15px; letter-spacing: 1px; }
        input, textarea, select { width: 100%; background: #000; border: 1px solid var(--border); color: white; padding: 16px; border-radius: 10px; margin-bottom: 15px; outline: none; }
        
        /* AFFICHAGE LARGE DES ROLES */
        .roles-list-large { background: #000; border: 1px solid var(--border); border-radius: 10px; max-height: 250px; overflow-y: auto; margin-bottom: 15px; }
        .role-row { padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #111; cursor: pointer; }
        .role-row:hover { background: #111; }
        .role-row input { width: auto; margin: 0; }

        .btn { border: none; padding: 18px; border-radius: 10px; font-weight: 800; cursor: pointer; width: 100%; color: white; text-transform: uppercase; margin-top: 10px; }
        .btn-save { background: var(--accent); }
        .btn-test { background: #5865f2; }

        /* GALERIE */
        .gal-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; width: 100%; }
        .gal-item { position: relative; border-radius: 10px; overflow: hidden; border: 1px solid var(--border); aspect-ratio: 16/9; }
        .gal-img { width: 100%; height: 100%; object-fit: cover; cursor: pointer; }
        .btn-del { position: absolute; top: 8px; right: 8px; background: var(--accent); color: white; border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; }

        #modal-gal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 20000; padding: 20px; }
        .modal-inner { max-width: 500px; margin: 50px auto; background: var(--panel); padding: 30px; border-radius: 20px; border: 1px solid var(--border); }
    </style>
</head>
<body>
    <div id="overlay" onclick="toggleSidebar()"></div>
    <div class="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></div>

    <nav id="sidebar">
        <div class="sidebar-header">BAGBOT</div>
        <div class="nav-item active" onclick="show('BIENVENUE', this)"><i class="fas fa-home"></i> BIENVENUE</div>
        <div class="nav-item" onclick="show('ADMIN', this)"><i class="fas fa-shield-alt"></i> ADMIN</div>
        <div class="nav-item" onclick="show('GALERIE', this)"><i class="fas fa-image"></i> GALERIE</div>
    </nav>

    <main>
        <header id="main-title">BIENVENUE</header>

        <section id="section-BIENVENUE" class="content-section active">
            <div class="discord-embed">
                <div class="embed-main">
                    <div style="flex:1">
                        <div id="p-title">Titre</div>
                        <div id="p-desc">Description...</div>
                    </div>
                    <div class="img-click p-thumb" onclick="openGal('thumb')">
                        <i class="fas fa-camera" id="icon-thumb"></i>
                        <img id="img-thumb">
                    </div>
                </div>
                <div class="img-click p-banner" onclick="openGal('banner')">
                    <i class="fas fa-image" id="icon-banner"></i>
                    <img id="img-banner">
                </div>
            </div>

            <div class="card">
                <h3>Textes (Variables: {user})</h3>
                <input type="text" id="w-title" placeholder="Titre..." oninput="sync()">
                <textarea id="w-desc" rows="4" placeholder="Description..." oninput="sync()"></textarea>
                <input type="text" id="w-footer" placeholder="Footer..." oninput="sync()">
                
                <h3>Salon d'envoi</h3>
                <select id="w-chan"><option value="">Chargement des salons...</option></select>
                
                <h3>Rôles à attribuer</h3>
                <div id="list-roles-welcome" class="roles-list-large"></div>

                <button class="btn btn-save" onclick="save()">Sauvegarder</button>
                <button class="btn btn-test" onclick="testMsg()">Tester sur Discord</button>
            </div>
        </section>

        <section id="section-ADMIN" class="content-section">
            <div class="card">
                <h3>Rôles ayant accès au Panel</h3>
                <div id="list-roles-admin" class="roles-list-large"></div>
                <button class="btn btn-save" onclick="saveAdmin()">Enregistrer les accès</button>
            </div>
        </section>

        <section id="section-GALERIE" class="content-section">
            <button class="btn btn-save" onclick="document.getElementById('file-in').click()" style="margin-bottom:20px; max-width:300px">Ajouter une image</button>
            <input type="file" id="file-in" onchange="up()" style="display:none">
            <div id="admin-gal" class="gal-grid"></div>
        </section>
    </main>

    <div id="modal-gal">
        <div class="modal-inner">
            <span style="float:right; cursor:pointer" onclick="closeGal()">&times; Fermer</span>
            <h2 style="margin-bottom:20px">Choisir une image</h2>
            <div id="modal-gal-list" class="gal-grid"></div>
        </div>
    </div>

    <script>
        let CONFIG = {}; let targetSlot = ''; const API = window.location.origin;

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('open');
        }

        function show(name, el) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('section-' + name).classList.add('active');
            el.classList.add('active');
            document.getElementById('main-title').innerText = name;
            if(window.innerWidth < 900) toggleSidebar();
            if(name === 'GALERIE') loadAdminGal();
        }

        async function init() {
            try {
                const res = await fetch(`${API}/api/get_server_info`);
                const data = await res.json();
                
                if(data.status === "error") {
                    console.log("Bot pas prêt, nouvelle tentative...");
                    setTimeout(init, 2000);
                    return;
                }

                CONFIG = data.config || {};

                // Salons
                const chanSel = document.getElementById('w-chan');
                chanSel.innerHTML = data.channels.map(c => `<option value="${c.id}"># ${c.name}</option>`).join('');

                // Rôles (Format Large)
                const renderRoles = (id, selected) => {
                    document.getElementById(id).innerHTML = data.all_roles.map(r => `
                        <div class="role-row" onclick="const ck=this.querySelector('input'); ck.checked=!ck.checked;">
                            <span>${r}</span> <input type="checkbox" value="${r}" ${(selected || []).includes(r)?'checked':''}>
                        </div>
                    `).join('');
                };

                renderRoles('list-roles-welcome', CONFIG.welcome?.trigger_roles);
                renderRoles('list-roles-admin', CONFIG.admin_roles);

                // Load Config
                if(CONFIG.welcome) {
                    document.getElementById('w-title').value = CONFIG.welcome.title || "";
                    document.getElementById('w-desc').value = CONFIG.welcome.desc || "";
                    document.getElementById('w-footer').value = CONFIG.welcome.footer || "";
                    document.getElementById('w-chan').value = CONFIG.welcome.channel || "";
                    if(CONFIG.welcome.thumb) setImg('thumb', CONFIG.welcome.thumb);
                    if(CONFIG.welcome.banner) setImg('banner', CONFIG.welcome.banner);
                }
                sync();
            } catch(e) { setTimeout(init, 2000); }
        }

        function sync() {
            document.getElementById('p-title').innerText = document.getElementById('w-title').value || "Titre";
            document.getElementById('p-desc').innerText = document.getElementById('w-desc').value || "Description...";
        }

        function openGal(slot) {
            targetSlot = slot;
            fetch(`${API}/api/images`).then(r => r.json()).then(d => {
                document.getElementById('modal-gal-list').innerHTML = d.images.map(img => `
                    <div class="gal-item"><img src="${API+img}" class="gal-img" onclick="setImg('${targetSlot}', '${img}'); closeGal()"></div>
                `).join('');
                document.getElementById('modal-gal').style.display = 'block';
            });
        }
        function closeGal() { document.getElementById('modal-gal').style.display = 'none'; }

        function setImg(slot, path) {
            const imgEl = document.getElementById(`img-${slot}`);
            imgEl.src = API + path; imgEl.style.display = 'block'; imgEl.dataset.path = path;
            const icon = document.getElementById(`icon-${slot}`);
            if(icon) icon.style.display = 'none';
        }

        async function save() {
            CONFIG.welcome = {
                title: document.getElementById('w-title').value,
                desc: document.getElementById('w-desc').value,
                footer: document.getElementById('w-footer').value,
                channel: document.getElementById('w-chan').value,
                thumb: document.getElementById('img-thumb').dataset.path || "",
                banner: document.getElementById('img-banner').dataset.path || "",
                trigger_roles: Array.from(document.querySelectorAll('#list-roles-welcome input:checked')).map(i => i.value)
            };
            await fetch(`${API}/api/save_config`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(CONFIG) });
            alert("✅ Configuration sauvegardée !");
        }

        async function saveAdmin() {
            CONFIG.admin_roles = Array.from(document.querySelectorAll('#list-roles-admin input:checked')).map(i => i.value);
            await fetch(`${API}/api/save_config`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(CONFIG) });
            alert("✅ Accès admin mis à jour !");
        }

        async function testMsg() {
            const res = await fetch(`${API}/api/test_welcome`, { method: 'POST' });
            if(res.ok) alert("🚀 Test envoyé !"); else {
                const err = await res.json();
                alert("❌ Erreur : " + err.message);
            }
        }

        async function up() {
            const fd = new FormData(); fd.append('file', document.getElementById('file-in').files[0]);
            await fetch(`${API}/api/upload`, { method: 'POST', body: fd });
            loadAdminGal();
        }

        async function delImg(path) {
            if(!confirm("Supprimer cette image ?")) return;
            await fetch(`${API}/api/delete_image`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({image: path}) });
            loadAdminGal();
        }

        async function loadAdminGal() {
            const res = await fetch(`${API}/api/images`);
            const d = await res.json();
            document.getElementById('admin-gal').innerHTML = d.images.map(img => `
                <div class="gal-item">
                    <img src="${API+img}" class="gal-img">
                    <button class="btn-del" onclick="delImg('${img}')">&times;</button>
                </div>
            `).join('');
        }

        window.onload = init;
    </script>
</body>
</html>

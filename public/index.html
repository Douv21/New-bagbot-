<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BagBot | Dashboard Final</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #ff4d4d; --bg: #111214; --card: #2b2d31; --text: #dbdee1; --sidebar: #0b0b0b; --draft-coral: #d37f6a; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 10px; display: flex; flex-direction: column; align-items: center; }

        /* --- EMBED DISCORD --- */
        .discord-msg { background: #313338; border-radius: 8px; padding: 15px; display: flex; gap: 12px; width: 100%; max-width: 500px; margin-bottom: 20px; box-sizing: border-box; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
        .embed { background: #1e1f22; border-left: 4px solid var(--accent); border-radius: 4px; padding: 12px; position: relative; width: 100%; }
        
        .up-slot { border: 1px dashed #4e5058; border-radius: 4px; display: flex; align-items: center; justify-content: center; cursor: pointer; background: rgba(0,0,0,0.2); overflow: hidden; position: relative; min-height: 30px; }
        .up-slot img { width: 100%; height: 100%; object-fit: cover; position: absolute; }
        .thumb-slot { position: absolute; top: 12px; right: 12px; width: 60px; height: 60px; }
        .banner-slot { width: 100%; min-height: 100px; margin: 10px 0; }
        
        .embed-author { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600; color: white; margin-bottom: 8px; }
        .auth-img { width: 20px; height: 20px; border-radius: 50%; overflow: hidden; border: 1px solid #444; }
        .embed-title { font-size: 16px; font-weight: 700; color: white; outline: none; margin-bottom: 5px; }
        .embed-desc { font-size: 14px; color: #dbdee1; outline: none; min-height: 20px; }

        /* --- INPUTS LIENS IMAGES --- */
        .img-input-box { background: #1e1f22; border: 1px solid #111; padding: 5px; border-radius: 5px; margin-top: 5px; display: flex; gap: 5px; }
        .img-input-box input { background: transparent; border: none; color: #888; font-size: 11px; flex: 1; outline: none; }
        .img-input-box i { font-size: 12px; color: var(--draft-coral); cursor: pointer; }

        /* --- CONFIGURATION --- */
        .card { background: var(--card); border-radius: 12px; padding: 15px; border: 1px solid #1a1a1a; width: 100%; max-width: 500px; box-sizing: border-box; margin-bottom: 15px; }
        .label-style { font-size: 10px; color: #b5bac1; text-transform: uppercase; font-weight: 800; margin-bottom: 8px; display: block; }
        select { width: 100%; background: #1e1f22; border: 1px solid #111; color: white; padding: 12px; border-radius: 8px; margin-bottom: 10px; outline: none; }

        .reaction-row { background: #1e1f22; border-radius: 8px; padding: 10px; display: flex; align-items: center; gap: 10px; margin-bottom: 8px; border: 1px solid #111; }
        .emoji-trigger { width: 40px; height: 40px; background: #2b2d31; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; }
        .emoji-trigger img { width: 24px; }

        .btn-add { background: var(--draft-coral); color: white; border: none; padding: 14px; width: 100%; border-radius: 8px; font-weight: 700; cursor: pointer; }
        .btn-deploy { background: var(--accent); color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: 800; cursor: pointer; margin-top: 10px; }

        /* --- SÉLECTEUR EMOJI DRAFTBOT --- */
        #emojiPicker { position: fixed; bottom: 0; left: 0; width: 100%; height: 70vh; background: #111214; border-top: 1px solid #333; display: none; flex-direction: column; z-index: 10000; border-radius: 20px 20px 0 0; }
        .emoji-body { display: flex; flex: 1; overflow: hidden; }
        .emoji-sidebar { width: 50px; background: var(--sidebar); display: flex; flex-direction: column; align-items: center; padding-top: 20px; gap: 20px; border-right: 1px solid #222; }
        .emoji-sidebar i, .emoji-sidebar img { font-size: 18px; color: #666; cursor: pointer; }
        .emoji-sidebar .active { color: var(--accent); }
        .emoji-scroll { flex: 1; overflow-y: auto; padding: 15px; scroll-behavior: smooth; }
        .emoji-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
        .emoji-item { font-size: 28px; text-align: center; cursor: pointer; }
        .emoji-item img { width: 28px; }
    </style>
</head>
<body>

    <h3 style="font-weight: 500; margin: 15px 0;">Éditeur BagBot</h3>

    <div class="discord-msg">
        <div class="avatar"></div>
        <div class="embed">
            <div class="up-slot thumb-slot" onclick="triggerUpload('thumb')">
                <i class="fas fa-plus" id="ic-thumb"></i>
                <img id="v-thumb" style="display:none">
            </div>

            <div class="embed-author">
                <div class="up-slot auth-img" onclick="triggerUpload('auth')">
                    <img id="v-auth" style="display:none">
                </div>
                <span contenteditable="true" id="txt-auth">Auteur</span>
            </div>

            <div class="embed-title" contenteditable="true">Titre du message</div>
            <div class="embed-desc" contenteditable="true">Description...</div>

            <div class="up-slot banner-slot" onclick="triggerUpload('banner')">
                <i class="fas fa-image" id="ic-banner"></i>
                <img id="v-banner" style="display:none">
            </div>

            <div class="img-input-box">
                <input type="text" id="url-banner" placeholder="Coller un lien image (Bannière)..." onchange="applyUrl('banner', this.value)">
                <i class="fas fa-link"></i>
            </div>
        </div>
    </div>

    <div class="card">
        <span class="label-style">Salon de réception</span>
        <select id="sel-channels"><option>Chargement...</option></select>
        
        <div id="reacs"></div>

        <button class="btn-add" onclick="addRow()">AJOUTER RÉACTION</button>
        <button class="btn-deploy" onclick="deploy()">DÉPLOYER SUR DISCORD</button>
    </div>

    <div id="emojiPicker">
        <div class="emoji-body">
            <div class="emoji-sidebar">
                <img src="https://draftbot.fr/assets/img/logo.png" style="width:24px;" onclick="scrollToSec('sec-srv')">
                <i class="fas fa-smile active" onclick="scrollToSec('sec-std')"></i>
                <i class="fas fa-utensils" onclick="scrollToSec('sec-food')"></i>
            </div>
            <div class="emoji-scroll">
                <div id="sec-srv">
                    <p class="label-style">Émojis du serveur</p>
                    <div class="emoji-grid" id="grid-srv"></div>
                </div>
                <div id="sec-std">
                    <p class="label-style">Smileys</p>
                    <div class="emoji-grid" id="grid-std"></div>
                </div>
            </div>
        </div>
        <button onclick="closeEmoji()" style="padding:15px; border:none; background:var(--sidebar); color:var(--accent); font-weight:700;">FERMER</button>
    </div>

    <input type="file" id="f-in" style="display:none" onchange="handleFile(this)">

<script>
    const API_URL = "http://192.168.1.133:49500";
    let rolesData = [], activeBtn = null, curZone = null;

    async function init() {
        fillStdEmojis();
        try {
            // Chargement simultané de tout
            const [cR, rR, eR] = await Promise.all([
                fetch(`${API_URL}/api/channels`),
                fetch(`${API_URL}/api/roles`),
                fetch(`${API_URL}/api/emojis`).catch(() => null)
            ]);
            
            const channels = await cR.json();
            rolesData = await rR.json(); // Stockage des rôles
            
            // Remplir Salons
            document.getElementById('sel-channels').innerHTML = channels.map(c => `<option value="${c.id}"># ${c.name}</option>`).join('');

            // Remplir Émojis Serveur
            if(eR) {
                const srv = await eR.json();
                document.getElementById('grid-srv').innerHTML = srv.map(e => 
                    `<span class="emoji-item" onclick="pick('${e.id}',true,'${e.url}')"><img src="${e.url}"></span>`).join('');
            }
        } catch(e) { console.error("Erreur chargement données"); }
    }

    // --- IMAGES ---
    function triggerUpload(z) { curZone = z; document.getElementById('f-in').click(); }
    
    function applyUrl(z, url) {
        if(!url) return;
        const img = document.getElementById(`v-${z}`);
        const ic = document.getElementById(`ic-${z}`);
        if(ic) ic.style.display = 'none';
        img.src = url; img.style.display = 'block';
    }

    function handleFile(i) {
        if (i.files && i.files[0]) {
            const reader = new FileReader();
            reader.onload = e => applyUrl(curZone, e.target.result);
            reader.readAsDataURL(i.files[0]);
        }
    }

    // --- RÉACTIONS ---
    function addRow() {
        const div = document.createElement('div');
        div.className = 'reaction-row';
        div.innerHTML = `
            <div class="emoji-trigger" onclick="openEmoji(this)">😀</div>
            <select style="margin:0; flex:1;">
                <option value="">Lier un rôle...</option>
                ${rolesData.map(r => `<option value="${r.id}">${r.name}</option>`).join('')}
            </select>
            <i class="fas fa-trash" style="color:#444;" onclick="this.parentElement.remove()"></i>
        `;
        document.getElementById('reacs').appendChild(div);
    }

    // --- EMOJIS ---
    function openEmoji(b) { activeBtn = b; document.getElementById('emojiPicker').style.display = 'flex'; }
    function closeEmoji() { document.getElementById('emojiPicker').style.display = 'none'; }
    function pick(v,is,u) {
        if(is) activeBtn.innerHTML = `<img src="${u}">`; else activeBtn.innerText = v;
        closeEmoji();
    }
    function scrollToSec(id) { document.getElementById(id).scrollIntoView({behavior: "smooth"}); }

    function fillStdEmojis() {
        const std = ['😀','😃','😄','😁','😆','😅','😂','🤣','😊','😇','🙂','🙃','😉','😌','😍','🥰','😘','😗','😙','😚','😋','😛','😝','😜','🤪','🤨','🧐','🤓','😎','🤩','🥳','😏','😒','😞','😔','😟','😕','🙁','☹️','😣','😖','😫','😩','🥺','😢','😭','😤','😠','😡','🤬','🤯','😳','🥵','🥶','😱','😨','😰','😥','😓','🤗','🤔','🤭','🤫','🤥','😶','😐','😑','😬','🙄','😯','😦','😧','😮','😲','🥱','😴','🤤','😪','😵','🤐','🥴','🤢','🤮','🤧','😷','🤒','🤕','🔥','🔞','✅','❌','⭐'];
        document.getElementById('grid-std').innerHTML = std.map(e => `<span class="emoji-item" onclick="pick('${e}',false)">${e}</span>`).join('');
    }

    window.onload = init;
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BagBot Dashboard | Final Fix</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #ff4d4d; --bg: #111214; --card: #2b2d31; --text: #dbdee1; --sidebar: #0b0b0b; --draft-coral: #d37f6a; --delete: #ed4245; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 15px; display: flex; flex-direction: column; align-items: center; }

        /* --- EMBED DISCORD COMPLET --- */
        .discord-msg { background: #313338; border-radius: 8px; padding: 15px; display: flex; gap: 12px; width: 100%; max-width: 500px; margin-bottom: 20px; box-sizing: border-box; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
        .embed { background: #1e1f22; border-left: 4px solid var(--accent); border-radius: 4px; padding: 15px; position: relative; width: 100%; }
        
        /* Zones Images */
        .up-slot { border: 1px dashed #4e5058; border-radius: 4px; display: flex; align-items: center; justify-content: center; cursor: pointer; background: rgba(0,0,0,0.2); overflow: hidden; position: relative; }
        .up-slot:hover { border-color: white; background: rgba(255,255,255,0.05); }
        .up-slot img { width: 100%; height: 100%; object-fit: cover; position: absolute; }
        
        .thumb-slot { position: absolute; top: 15px; right: 15px; width: 65px; height: 65px; }
        .banner-slot { width: 100%; min-height: 120px; margin: 10px 0; }
        
        .embed-author { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600; color: white; margin-bottom: 8px; }
        .auth-img-slot { width: 22px; height: 22px; border-radius: 50%; }
        .embed-title { font-size: 16px; font-weight: 700; color: white; margin-bottom: 5px; outline: none; border-bottom: 1px solid transparent; }
        .embed-title:focus { border-color: #444; }
        .embed-desc { font-size: 14px; color: #dbdee1; outline: none; min-height: 20px; white-space: pre-wrap; }
        .embed-footer { font-size: 12px; color: #949ba4; display: flex; align-items: center; gap: 5px; margin-top: 10px; }

        /* --- CONFIGURATION --- */
        .card { background: var(--card); border-radius: 12px; padding: 20px; border: 1px solid #1a1a1a; width: 100%; max-width: 500px; box-sizing: border-box; margin-bottom: 20px; }
        .label-style { font-size: 11px; color: #b5bac1; text-transform: uppercase; font-weight: 800; margin: 15px 0 8px; display: block; }
        select { width: 100%; background: #1e1f22; border: 1px solid #111; color: white; padding: 14px; border-radius: 8px; font-size: 15px; margin-bottom: 10px; outline: none; }

        .reaction-row { background: #1e1f22; border-radius: 8px; padding: 12px; display: flex; align-items: center; gap: 12px; margin-bottom: 10px; border: 1px solid #111; }
        .emoji-trigger { width: 45px; height: 45px; background: #2b2d31; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 22px; cursor: pointer; }
        .emoji-trigger img { width: 28px; height: 28px; }

        .btn-add { background: var(--draft-coral); color: white; border: none; padding: 14px; width: 100%; border-radius: 8px; font-weight: 700; cursor: pointer; margin-top: 10px; width: 100%; }
        .btn-deploy { background: var(--accent); color: white; border: none; padding: 16px; width: 100%; border-radius: 8px; font-weight: 800; cursor: pointer; margin-top: 10px; }

        /* --- S├ΚLECTEUR EMOJI DRAFTBOT --- */
        #emojiPicker { position: fixed; bottom: 0; left: 0; width: 100%; height: 75vh; background: #111214; border-top: 1px solid #333; display: none; flex-direction: column; z-index: 10000; border-radius: 20px 20px 0 0; }
        .picker-header { padding: 15px; border-bottom: 1px solid #222; }
        .search-bar { width: 100%; background: #1e1f22; border: none; padding: 12px; border-radius: 6px; color: white; outline: none; box-sizing: border-box; }
        
        .emoji-body { display: flex; flex: 1; overflow: hidden; }
        .emoji-sidebar { width: 55px; background: var(--sidebar); display: flex; flex-direction: column; align-items: center; padding-top: 20px; gap: 25px; border-right: 1px solid #222; }
        .emoji-sidebar i, .emoji-sidebar img { font-size: 20px; color: #888; cursor: pointer; }
        .emoji-sidebar i.active { color: var(--accent); }

        .emoji-scroll { flex: 1; overflow-y: auto; padding: 15px; scroll-behavior: smooth; }
        .section-title { font-size: 11px; color: #949ba4; font-weight: 800; text-transform: uppercase; margin: 20px 0 10px; }
        .emoji-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; }
        .emoji-item { font-size: 30px; text-align: center; cursor: pointer; }
        .emoji-item img { width: 32px; height: 32px; }

        /* --- HISTORIQUE --- */
        .msg-item { background: #1e1f22; border-radius: 10px; padding: 15px; margin-bottom: 10px; border: 1px solid #333; display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 500px; box-sizing: border-box; }
    </style>
</head>
<body>

    <h2 style="font-weight: 500;">├Κditeur BagBot</h2>

    <div class="discord-msg">
        <div class="avatar"></div>
        <div class="embed">
            <div class="up-slot thumb-slot" onclick="chooseImageSource('thumb')">
                <i class="fas fa-plus" id="icon-thumb"></i>
                <img id="view-thumb" style="display:none">
            </div>

            <div class="embed-author" onclick="chooseImageSource('author')">
                <div class="up-slot auth-img-slot" id="slot-auth">
                    <i class="fas fa-user-plus" id="icon-author" style="font-size: 10px;"></i>
                    <img id="view-author" style="display:none">
                </div>
                <span contenteditable="true" id="txt-author">Nom de l'auteur</span>
            </div>

            <div class="embed-title" contenteditable="true" id="txt-title">Titre de l'embed</div>
            <div class="embed-desc" contenteditable="true" id="txt-desc">Cliquer ici pour ├σcrire...</div>

            <div class="up-slot banner-slot" onclick="chooseImageSource('banner')">
                <i class="fas fa-image" id="icon-banner" style="font-size: 24px;"></i>
                <img id="view-banner" style="display:none">
            </div>

            <div class="embed-footer" onclick="chooseImageSource('footer')">
                <div class="up-slot" style="width:16px; height:16px; border-radius: 50%;">
                    <img id="view-footer" style="display:none">
                </div>
                <span contenteditable="true" id="txt-footer">Texte du footer έΑλ Aujourd'hui</span>
            </div>
        </div>
    </div>

    <div class="card">
        <span class="label-style">Salon de r├σception</span>
        <select id="channels"><option value="">Chargement des salons...</option></select>
        
        <div id="reactions-list"></div>

        <button class="btn-add" onclick="addRow()">AJOUTER UN R├ΦLE</button>
        <button class="btn-deploy" onclick="deploy()">D├ΚPLOYER SUR DISCORD</button>
    </div>

    <div style="width:100%; max-width:500px; margin-top:20px;">
        <p class="label-style">Messages enregistr├σs</p>
        <div id="history-box"></div>
    </div>

    <div id="emojiPicker">
        <div class="picker-header"><input type="text" class="search-bar" placeholder="Rechercher un ├σmoji..."></div>
        <div class="emoji-body">
            <div class="emoji-sidebar">
                <img src="https://draftbot.fr/assets/img/logo.png" style="width:28px; border-radius:4px;" onclick="toSec('sec-srv')">
                <i class="fas fa-smile" onclick="toSec('sec-std')"></i>
                <i class="fas fa-utensils" onclick="toSec('sec-food')"></i>
                <i class="fas fa-lightbulb" onclick="toSec('sec-obj')"></i>
            </div>
            <div class="emoji-scroll">
                <div id="sec-srv">
                    <div class="section-title">├Κmojis du serveur</div>
                    <div class="emoji-grid" id="grid-srv"><p style="grid-column: span 6; font-size:12px; color:#444;">Aucun ├σmoji personnalis├σ</p></div>
                </div>
                <div id="sec-std">
                    <div class="section-title">Smileys & ├Κmotions</div>
                    <div class="emoji-grid" id="grid-std"></div>
                </div>
                <div id="sec-food">
                    <div class="section-title">Nourriture</div>
                    <div class="emoji-grid" id="grid-food"></div>
                </div>
                <div id="sec-obj">
                    <div class="section-title">Objets</div>
                    <div class="emoji-grid" id="grid-obj"></div>
                </div>
            </div>
        </div>
        <button onclick="closeEmoji()" style="padding:15px; background:var(--sidebar); border:none; color:var(--accent); font-weight:800; cursor:pointer;">FERMER</button>
    </div>

    <input type="file" id="media-in" style="display:none" onchange="handleFile(this)">

<script>
    const API = "http://192.168.1.133:49500";
    let roles = [], activeBtn = null, curZone = null;

    // 1. CHARGEMENT S├ΚCURIS├Κ
    async function loadChannels() {
        try {
            const res = await fetch(`${API}/api/channels`);
            const data = await res.json();
            document.getElementById('channels').innerHTML = data.map(c => `<option value="${c.id}"># ${c.name}</option>`).join('');
        } catch(e) { document.getElementById('channels').innerHTML = "<option>Erreur de chargement</option>"; }
    }

    async function loadOthers() {
        try {
            const [rR, eR, mR] = await Promise.all([
                fetch(`${API}/api/roles`), fetch(`${API_IP}/api/emojis`).catch(()=>null), fetch(`${API}/api/messages`).catch(()=>null)
            ]);
            if(rR) roles = await rR.json();
            
            // Emojis Serveur
            if(eR) {
                const srvEmojis = await eR.json();
                if(srvEmojis.length) {
                    document.getElementById('grid-srv').innerHTML = srvEmojis.map(e => 
                        `<span class="emoji-item" onclick="setE('${e.id}',true,'${e.url}')"><img src="${e.url}"></span>`).join('');
                }
            }
            // Historique
            if(mR) renderHistory(await mR.json());
        } catch(e) { console.log("Donn├σes optionnelles non charg├σes"); }
    }

    // 2. GESTION IMAGES (LIEN OU FICHIER)
    function chooseImageSource(zone) {
        curZone = zone;
        const choice = confirm("Voulez-vous utiliser un LIEN URL ?\n(Annuler pour choisir un FICHIER)");
        if(choice) {
            const url = prompt("Entrez l'URL de l'image :");
            if(url) applyImg(url);
        } else {
            document.getElementById('media-in').click();
        }
    }

    function handleFile(input) {
        if (input.files && input.files[0]) {
            const r = new FileReader();
            r.onload = e => applyImg(e.target.result);
            r.readAsDataURL(input.files[0]);
        }
    }

    function applyImg(src) {
        const v = document.getElementById(`view-${curZone}`);
        const ic = document.getElementById(`icon-${curZone}`);
        if(ic) ic.style.display = 'none';
        v.src = src; v.style.display = 'block';
    }

    // 3. R├ΚACTIONS & EMOJIS
    function addRow() {
        const d = document.createElement('div');
        d.className = 'reaction-row';
        d.innerHTML = `
            <div class="emoji-trigger" onclick="openEmoji(this)">ΏθαΑ</div>
            <select style="margin:0; flex:1;"><option value="">S├σlectionner r├┤le...</option>${roles.map(r => `<option value="${r.id}">${r.name}</option>`).join('')}</select>
            <i class="fas fa-trash" style="color:#444; cursor:pointer;" onclick="this.parentElement.remove()"></i>
        `;
        document.getElementById('reactions-list').appendChild(d);
    }

    function openEmoji(b) { activeBtn = b; document.getElementById('emojiPicker').style.display = 'flex'; }
    function closeEmoji() { document.getElementById('emojiPicker').style.display = 'none'; }
    function setE(v,is,u) {
        if(is) activeBtn.innerHTML = `<img src="${u}">`; else activeBtn.innerText = v;
        closeEmoji();
    }
    function toSec(id) { document.getElementById(id).scrollIntoView({behavior: "smooth"}); }

    function fillEmojis() {
        const std = ['ΏθαΑ','ΏθαΔ','ΏθαΕ','ΏθαΒ','ΏθαΗ','ΏθαΖ','ΏθαΓ','Ώθνμ','ΏθαΛ','ΏθαΘ','ΏθβΓ','ΏθβΔ','ΏθαΚ','ΏθαΝ','ΏθαΞ','Ώθξ░','Ώθαα','ΏθαΩ','Ώθαβ','Ώθαγ','ΏθαΜ','Ώθαδ','Ώθαζ','Ώθαε','Ώθνς','Ώθνρ','ΏθπΡ','ΏθνΥ','ΏθαΟ','Ώθνσ','Ώθξ│','ΏθαΠ','ΏθαΤ','Ώθαη','ΏθαΦ','Ώθαθ','ΏθαΧ','ΏθβΒ','έα╣Ύ╕Π','Ώθαμ','ΏθαΨ','Ώθατ','Ώθασ','Ώθξ║','Ώθαλ','Ώθαφ','Ώθαν','Ώθαι','Ώθακ','Ώθνυ','Ώθνψ','Ώθα│','Ώθξ╡','Ώθξ╢','Ώθα▒','Ώθαρ','Ώθα░','Ώθαξ','ΏθαΥ','ΏθνΩ','ΏθνΦ','Ώθνφ','Ώθντ','Ώθνξ','Ώθα╢','ΏθαΡ','ΏθαΣ','Ώθαυ','ΏθβΕ','Ώθαψ','Ώθαο','Ώθαπ','Ώθαχ','Ώθα▓','Ώθξ▒','Ώθα┤','Ώθνν','Ώθας','Ώθα╡','ΏθνΡ','Ώθξ┤','Ώθνλ','Ώθνχ','Ώθνπ','Ώθα╖','ΏθνΤ','ΏθνΧ','ΏθΦξ','ΏθΦη','έεΖ','έζΝ','έφΡ','ΏθΝβ','ΏθΤΟ','ΏθΟΒ','ΏθδκΎ╕Π','ΏθΥε','ΏθΥ╕','ΏθΟφ'];
        const food = ['ΏθΞΠ','ΏθΞΟ','ΏθΞΡ','ΏθΞΛ','ΏθΞΜ','ΏθΞΝ','ΏθΞΚ','ΏθΞΘ','ΏθΞΥ','ΏθΞΙ','ΏθΞΤ','ΏθΞΣ','Ώθξφ','ΏθΞΞ','Ώθξξ','Ώθξζ','ΏθΞΖ','ΏθΞΗ','ΏθξΣ','Ώθξο','ΏθξΡ','ΏθΞη','ΏθξΨ','Ώθξρ','Ώθξψ','ΏθπΑ','Ώθξγ','ΏθΞ│','Ώθξη','ΏθξΥ','Ώθξσ','ΏθΞΩ','ΏθΞΨ','ΏθΝφ','ΏθΞΦ','ΏθΞθ','ΏθΞΧ','ΏθΝχ','ΏθΝψ','Ώθξβ','Ώθξα','ΏθΞζ','ΏθΞε','ΏθΞ▓','ΏθΞδ','ΏθΞμ','ΏθΞ▒','Ώθξθ','ΏθΞν','ΏθΞβ','ΏθΞγ','ΏθΞα','ΏθΞξ','Ώθξι','Ώθξχ','ΏθΞλ','ΏθΞκ','ΏθΞπ','ΏθΞρ','ΏθΞο','Ώθξπ','ΏθπΒ','ΏθΞ░','ΏθΟΓ','ΏθΞχ','ΏθΞφ','ΏθΞυ','ΏθΞτ',' popcorn','ΏθπΓ','ΏθΞσ','ΏθΞς','ΏθΝ░','Ώθξε','ΏθΞψ','Ώθξδ','έαΧ','ΏθΞ╡','Ώθξν','ΏθΞ╢','ΏθΞ║','ΏθΞ╗','ΏθξΓ','ΏθΞ╖','ΏθξΔ','ΏθΞ╕','ΏθΞ╣','ΏθΞ╛'];
        const obj = ['έΝγ','ΏθΥ▒','ΏθΤ╗','έΝρΎ╕Π','ΏθΨ▒Ύ╕Π','ΏθΨρΎ╕Π','ΏθΧ╣Ύ╕Π','ΏθΩεΎ╕Π','ΏθΤ╜','ΏθΤ╛','ΏθΤ┐','ΏθΥΑ','ΏθΥ╝','ΏθΥ╖','ΏθΥ╕','ΏθΥ╣','ΏθΟξ','ΏθΥ╜Ύ╕Π','ΏθΟηΎ╕Π','ΏθΥη','έαΟΎ╕Π','ΏθΥθ','ΏθΥι','ΏθΥ║','ΏθΥ╗','ΏθΟβΎ╕Π','ΏθΟγΎ╕Π','ΏθΟδΎ╕Π','Ώθπφ','έΠ▒Ύ╕Π','έΠ▓Ύ╕Π','έΠ░','ΏθΧ░Ύ╕Π','έΠ│','έΝδ','ΏθΥκ','ΏθΦΜ','ΏθΦΝ','ΏθΤκ','ΏθΦο','ΏθΧψΎ╕Π','ΏθςΦ','Ώθπψ','ΏθδλΎ╕Π','ΏθΤ╕','ΏθΤ╡','ΏθΤ┤','ΏθΤ╢','ΏθΤ╖','ΏθΤ░','ΏθΤ│','ΏθΤΟ','έγΨΎ╕Π','Ώθπ░','ΏθΦπ','ΏθΦρ','έγΤΎ╕Π','ΏθδιΎ╕Π','έδΠΎ╕Π','ΏθΦσ','έγβΎ╕Π','Ώθπ▒','έδΥΎ╕Π','Ώθπ▓','ΏθΦτ','ΏθΤμ','Ώθπρ','ΏθςΥ','ΏθΦς','ΏθΩκΎ╕Π','έγΦΎ╕Π','ΏθδκΎ╕Π','Ώθγυ','έγ░Ύ╕Π','έγ▒Ύ╕Π','ΏθΠ║','ΏθΦχ','ΏθΥ┐','Ώθπ┐','ΏθΤΙ','έγΩΎ╕Π','ΏθΦφ','ΏθΦυ','ΏθΧ│Ύ╕Π','Ώθσ╣','Ώθσ║','ΏθΤΛ','ΏθΤΚ','Ώθσ╕','Ώθπυ','Ώθοι','Ώθπτ','Ώθπς','ΏθΝκΎ╕Π','Ώθπ╣','Ώθπ║','Ώθπ╗','Ώθγ╜','Ώθγ┐','ΏθδΒ','Ώθπ╝','ΏθςΤ','Ώθπ╜','Ώθπ┤','ΏθδΟΎ╕Π','ΏθΦΣ','ΏθΩζΎ╕Π','Ώθγς','ΏθςΣ','ΏθδΜΎ╕Π','ΏθδΠΎ╕Π','ΏθδΝ','Ώθπ╕','ΏθΨ╝Ύ╕Π','ΏθδΞΎ╕Π','ΏθδΤ','ΏθΟΒ','ΏθΟΙ','ΏθΟΠ','ΏθΟΑ','ΏθΟΛ','ΏθΟΚ','ΏθΟΟ','ΏθΠχ','ΏθΟΡ','Ώθππ','έεΚΎ╕Π','ΏθΥσ','ΏθΥρ','ΏθΥπ','ΏθΤΝ','ΏθΥξ','ΏθΥν','ΏθΥο','ΏθΠ╖Ύ╕Π','ΏθΥΒ','ΏθΥΓ','ΏθΩΓΎ╕Π','ΏθΥΖ','ΏθΥΗ','ΏθΩΣΎ╕Π','ΏθΩΤΎ╕Π','ΏθΩΥΎ╕Π','ΏθΥΘ','ΏθΥΙ','ΏθΥΚ','ΏθΥΛ','ΏθΥΜ','ΏθΥΝ','ΏθΥΞ','ΏθΥΟ','ΏθΨΘΎ╕Π','ΏθΥΠ','ΏθΥΡ','έεΓΎ╕Π','ΏθΩΔΎ╕Π','ΏθΩΕΎ╕Π','ΏθΩΣΎ╕Π','ΏθΦΤ','ΏθΦΥ','ΏθΦΠ','ΏθΦΡ','ΏθΦΣ','ΏθΩζΎ╕Π'];
        
        document.getElementById('grid-std').innerHTML = std.map(e => `<span class="emoji-item" onclick="setE('${e}',false)">${e}</span>`).join('');
        document.getElementById('grid-food').innerHTML = food.map(e => `<span class="emoji-item" onclick="setE('${e}',false)">${e}</span>`).join('');
        document.getElementById('grid-obj').innerHTML = obj.map(e => `<span class="emoji-item" onclick="setE('${e}',false)">${e}</span>`).join('');
    }

    function renderHistory(m) {
        const b = document.getElementById('history-box');
        if(!m || !m.length) { b.innerHTML = "<p style='color:#444;font-size:12px;'>Aucun message.</p>"; return; }
        b.innerHTML = m.map(msg => `
            <div class="msg-item">
                <div><b>${msg.title || "Sans titre"}</b><br><small style="color:#888">#${msg.channelName}</small></div>
                <div style="display:flex;gap:5px;">
                    <button style="background:#4e5058;border:none;color:white;padding:5px 10px;border-radius:4px;cursor:pointer;">EDIT</button>
                    <button style="background:rgba(237,66,69,0.1);border:1px solid #ed4245;color:#ed4245;padding:5px 10px;border-radius:4px;cursor:pointer;">DEL</button>
                </div>
            </div>
        `).join('');
    }

    async function deploy() { alert("D├σploiement vers Discord..."); }

    window.onload = () => {
        fillEmojis();
        loadChannels();
        loadOthers();
    };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>BAGBOT | Elite Dashboard V6</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050505; --side: #000; --card: #0f0f0f; --accent: #ed4245; --border: #1a1a1a; --d-bg: #2b2d31; --text: #fff; --text-dim: #666; }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* SIDEBAR & HAMBURGER FIXED */
        #sidebar { width: 280px; background: var(--side); border-right: 1px solid var(--border); display: flex; flex-direction: column; transition: 0.4s ease; z-index: 2000; }
        .brand { padding: 35px; font-size: 26px; font-weight: 900; color: var(--accent); text-align: center; border-bottom: 1px solid var(--border); letter-spacing: 4px; }
        .nav-item { padding: 18px 30px; display: flex; align-items: center; gap: 15px; color: var(--text-dim); cursor: pointer; transition: 0.3s; font-weight: bold; text-transform: uppercase; font-size: 12px; }
        .nav-item.active { color: var(--accent); background: rgba(237,66,69,0.05); border-right: 4px solid var(--accent); }

        .mobile-header { display: flex; position: fixed; top: 0; left: 0; right: 0; height: 70px; background: var(--side); border-bottom: 1px solid var(--border); z-index: 2500; align-items: center; padding: 0 25px; }
        .burger { font-size: 24px; color: var(--accent); cursor: pointer; z-index: 3000; }

        main { flex-grow: 1; padding: 90px 40px 40px; overflow-y: auto; width: 100%; }
        .section { display: none; max-width: 850px; margin: 0 auto; animation: fadeInUp 0.4s ease; }
        .section.active { display: block; }

        /* PREVIEW */
        .preview-container { background: var(--d-bg); border-left: 4px solid var(--accent); border-radius: 4px; padding: 15px; margin-bottom: 30px; }
        .pv-top { display: flex; justify-content: space-between; gap: 10px; }
        .pv-thumb { width: 60px; height: 60px; border-radius: 4px; background: #1e1f22; border: 1px dashed #444; overflow: hidden; cursor: pointer; }
        .pv-banner { width: 100%; height: 160px; margin-top: 10px; border-radius: 8px; background: #1e1f22; border: 1px dashed #444; overflow: hidden; cursor: pointer; }
        .pv-footer-area { margin-top: 10px; display: flex; align-items: center; gap: 8px; font-size: 11px; color: #949ba4; }
        .pv-footer-icon { width: 18px; height: 18px; border-radius: 50%; background: #1e1f22; border: 1px dashed #444; overflow: hidden; cursor: pointer; }
        img { width: 100%; height: 100%; object-fit: cover; }

        /* DROPDOWN ALIGNEMENT */
        .drop-menu { display: none; position: absolute; top: 100%; left: 0; right: 0; background: #0a0a0a; border: 1px solid var(--border); border-radius: 12px; z-index: 100; max-height: 200px; overflow-y: auto; }
        .drop-menu.show { display: block; }
        .drop-item { display: flex; align-items: center; padding: 12px 20px; cursor: pointer; border-bottom: 1px solid #111; }
        .drop-item input { margin-right: 15px; width: 18px; height: 18px; accent-color: var(--accent); flex-shrink: 0; }
        .drop-item span { text-align: left; flex-grow: 1; }

        /* UI */
        .card { background: var(--card); border: 1px solid var(--border); padding: 30px; border-radius: 25px; margin-bottom: 30px; position: relative; }
        label { display: block; margin: 20px 0 8px; color: #444; font-size: 11px; font-weight: 900; text-transform: uppercase; }
        input, textarea, select { width: 100%; background: #000; border: 1px solid var(--border); color: #fff; padding: 16px; border-radius: 12px; }
        .btn-elite { width: 100%; padding: 18px; border-radius: 15px; font-weight: 900; cursor: pointer; border: none; background: var(--accent); color: white; margin-top: 10px; }
        .btn-back { background: #333; margin-bottom: 20px; width: auto; padding: 10px 20px; }
        .btn-test { background: #5865f2; }

        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; margin-top: 20px; }
        .gallery-card { border-radius: 12px; border: 1px solid var(--border); position: relative; height: 100px; overflow: hidden; }
        .del-btn { position: absolute; top: 5px; right: 5px; background: var(--accent); border: none; color: white; border-radius: 5px; cursor: pointer; padding: 5px; }

        @media (max-width: 768px) { #sidebar { position: fixed; left: -285px; height: 100vh; } #sidebar.open { left: 0; } }
    </style>
</head>
<body>

    <div class="mobile-header">
        <i class="fas fa-bars burger" onclick="document.getElementById('sidebar').classList.toggle('open')"></i>
        <div style="font-weight:900; color:var(--accent); margin-left:20px;">BAGBOT</div>
    </div>

    <nav id="sidebar">
        <div class="brand">BAGBOT</div>
        <div class="nav-item active" onclick="showTab('welcome', this)"><i class="fas fa-paper-plane"></i> BIENVENUE</div>
        <div class="nav-item" onclick="showTab('gallery', this)"><i class="fas fa-images"></i> GALERIE</div>
        <div class="nav-item" onclick="showTab('admin', this)"><i class="fas fa-user-shield"></i> PERMISSIONS</div>
    </nav>

    <main onclick="if(window.innerWidth < 768) document.getElementById('sidebar').classList.remove('open')">
        <div id="welcome" class="section active">
            <div id="pv-container" class="preview-container">
                <div class="pv-top">
                    <div style="flex-grow:1">
                        <div id="pv-title" style="color:#00a8fc; font-weight:700;">Titre</div>
                        <div id="pv-desc" style="color:#dbdee1; font-size:14px;">Description...</div>
                    </div>
                    <div class="pv-thumb" onclick="openPicker('thumbnail')"><img id="img-thumb" style="display:none"></div>
                </div>
                <div class="pv-banner" onclick="openPicker('banner')"><img id="img-banner" style="display:none"></div>
                <div class="pv-footer-area">
                    <div class="pv-footer-icon" onclick="openPicker('footer_icon')"><img id="img-footer" style="display:none"></div>
                    <span id="pv-footer">Footer</span>
                </div>
            </div>

            <div class="card">
                <h2>Configuration</h2>
                <label>Couleur Embed</label><input type="color" id="w-color" oninput="sync()">
                <label>Titre</label><input type="text" id="w-title" oninput="sync()">
                <label>Message</label><textarea id="w-desc" rows="4" oninput="sync()"></textarea>
                <label>Texte Footer</label><input type="text" id="w-footer" oninput="sync()">
                <label>Rôles Déclencheurs</label>
                <div style="position:relative">
                    <div class="btn-elite" style="background:#000; border:1px solid var(--border); text-align:left; font-weight:normal;" onclick="document.getElementById('w-drop').classList.toggle('show')">
                        <span id="w-label">Chargement...</span> <i class="fas fa-chevron-down" style="float:right"></i>
                    </div>
                    <div id="w-drop" class="drop-menu"></div>
                </div>
                <label>Salon</label><select id="w-channel"></select>
                <button class="btn-elite" onclick="save()">ENREGISTRER L'ELITE</button>
                <button class="btn-elite btn-test" onclick="testMsg()">TESTER LE MESSAGE</button>
            </div>
        </div>

        <div id="gallery" class="section">
            <button class="btn-elite btn-back" onclick="showTab('welcome', document.querySelectorAll('.nav-item')[0])"><i class="fas fa-arrow-left"></i> RETOUR</button>
            <div class="card">
                <h2>Ajouter une image</h2>
                <label>Par lien URL</label>
                <div style="display:flex; gap:10px;">
                    <input type="text" id="url-input" placeholder="https://...">
                    <button class="btn-elite" style="width:auto; margin:0;" onclick="useUrl()">UTILISER</button>
                </div>
                <label>Par téléversement</label>
                <input type="file" id="file-input" onchange="uploadFile()">
                <hr style="border:0; border-top:1px solid var(--border); margin:20px 0;">
                <h2>Ma Galerie</h2>
                <div id="gallery-list" class="gallery-grid"></div>
            </div>
        </div>
    </main>

    <script>
        let db = {}; let activePicker = '';
        async function init() {
            const res = await fetch('/api/get_data'); db = await res.json();
            document.getElementById('w-channel').innerHTML = db.channels.map(c => `<option value="${c.id}"># ${c.name}</option>`).join('');
            document.getElementById('w-channel').value = db.config.welcome.channel;
            document.getElementById('w-color').value = db.config.welcome.color || "#ed4245";
            document.getElementById('w-title').value = db.config.welcome.title;
            document.getElementById('w-desc').value = db.config.welcome.desc;
            document.getElementById('w-footer').value = db.config.welcome.footer;
            renderDrop('w-drop', 'w-check', db.config.welcome.trigger_roles);
            setImg('thumb', db.config.welcome.thumbnail); setImg('banner', db.config.welcome.banner); setImg('footer', db.config.welcome.footer_icon);
            renderGallery(); sync();
        }

        function renderDrop(id, cls, sel) {
            document.getElementById(id).innerHTML = db.roles.map(r => `
                <div class="drop-item" onclick="this.querySelector('input').click(); event.stopPropagation();">
                    <input type="checkbox" class="${cls}" value="${r}" ${sel.includes(r)?'checked':''} onchange="upLab('${id}')" onclick="event.stopPropagation()">
                    <span>${r}</span>
                </div>`).join('');
            upLab(id);
        }
        function upLab(id) { document.getElementById(id.replace('drop', 'label')).innerText = document.querySelectorAll(`#${id} input:checked`).length + " rôles"; }
        function setImg(id, url) { if(url) { let el = document.getElementById('img-'+id); el.src = url; el.style.display = 'block'; el.dataset.url = url; } }
        function sync() {
            document.getElementById('pv-container').style.borderLeftColor = document.getElementById('w-color').value;
            document.getElementById('pv-title').innerText = document.getElementById('w-title').value || "Titre";
            document.getElementById('pv-desc').innerText = document.getElementById('w-desc').value || "Description...";
            document.getElementById('pv-footer').innerText = document.getElementById('w-footer').value || "Footer";
        }
        function renderGallery() {
            document.getElementById('gallery-list').innerHTML = db.images.map(i => `
                <div class="gallery-card"><button class="del-btn" onclick="delImg('${i}')"><i class="fas fa-trash"></i></button><img src="${i}" onclick="selectImg('${i}')"></div>`).join('');
        }
        function openPicker(t) { activePicker = t; showTab('gallery', document.querySelectorAll('.nav-item')[1]); }
        function selectImg(u) {
            if(!activePicker) return;
            let el = document.getElementById({'thumbnail':'img-thumb','banner':'img-banner','footer_icon':'img-footer'}[activePicker]);
            el.src = u; el.style.display = 'block'; el.dataset.url = u;
            activePicker = ''; showTab('welcome', document.querySelectorAll('.nav-item')[0]); sync();
        }
        function useUrl() { let u = document.getElementById('url-input').value; if(u) selectImg(u); }
        async function uploadFile() {
            let file = document.getElementById('file-input').files[0]; if(!file) return;
            let formData = new FormData(); formData.append('file', file);
            let res = await fetch('/api/upload', { method:'POST', body:formData });
            let r = await res.json(); if(r.path) { db.images.push(r.path); renderGallery(); selectImg(r.path); }
        }
        async function delImg(path) { await fetch('/api/delete_image', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({path}) }); db.images = db.images.filter(i => i !== path); renderGallery(); }
        async function save() {
            const config = {
                welcome: {
                    title: document.getElementById('w-title').value, desc: document.getElementById('w-desc').value,
                    footer: document.getElementById('w-footer').value, color: document.getElementById('w-color').value,
                    channel: document.getElementById('w-channel').value,
                    banner: document.getElementById('img-banner').dataset.url || "",
                    thumbnail: document.getElementById('img-thumb').dataset.url || "",
                    footer_icon: document.getElementById('img-footer').dataset.url || "",
                    trigger_roles: Array.from(document.querySelectorAll('.w-check:checked')).map(i => i.value)
                }, admin_roles: []
            };
            await fetch('/api/save', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(config) }); alert("Elite Sauvegardée !");
        }
        async function testMsg() {
            const config = { welcome: { title: document.getElementById('w-title').value, desc: document.getElementById('w-desc').value, footer: document.getElementById('w-footer').value, color: document.getElementById('w-color').value, channel: document.getElementById('w-channel').value, banner: document.getElementById('img-banner').dataset.url || "", thumbnail: document.getElementById('img-thumb').dataset.url || "", footer_icon: document.getElementById('img-footer').dataset.url || "" } };
            await fetch('/api/test_message', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(config) }); alert("Test Envoyé !");
        }
        function showTab(id, el) { document.querySelectorAll('.section').forEach(s => s.classList.remove('active')); document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); document.getElementById(id).classList.add('active'); el.classList.add('active'); }
        window.onclick = (e) => { if(!e.target.closest('.btn-elite')) document.querySelectorAll('.drop-menu').forEach(m => m.classList.remove('show')); };
        window.onload = init;
    </script>
</body>
</html>

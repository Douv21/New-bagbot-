<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>BagBot Panel v16</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050505; --panel: #0f0f0f; --accent: #ed4245; --border: #1e1e1e; --discord: #2b2d31; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        
        body { background: var(--bg); color: white; display: flex; height: 100vh; overflow: hidden; }

        /* SIDEBAR - Correction du décalage pour ne pas cacher le nom */
        #sidebar { 
            width: 260px; background: #000; border-right: 1px solid var(--border); 
            display: flex; flex-direction: column; z-index: 9999; transition: 0.3s; 
        }
        .sidebar-header {
            padding: 30px 25px; font-size: 22px; font-weight: 900; color: var(--accent);
            display: flex; align-items: center; justify-content:建设者; gap: 15px;
        }
        .nav-item { padding: 18px 25px; cursor: pointer; color: #888; display: flex; align-items: center; gap: 12px; font-weight: bold; }
        .nav-item.active { color: var(--accent); background: rgba(237,66,69,0.1); border-right: 4px solid var(--accent); }
        
        @media (max-width: 900px) { 
            #sidebar { position: fixed; transform: translateX(-100%); height: 100%; } 
            #sidebar.open { transform: translateX(0); } 
        }

        /* MAIN CONTENT */
        main { flex: 1; display: flex; flex-direction: column; overflow-y: auto; position: relative; }
        
        header { 
            height: 70px; min-height: 70px; background: var(--panel); border-bottom: 1px solid var(--border); 
            display: flex; align-items: center; padding-left: 80px; font-weight: 900; position: sticky; top: 0; z-index: 100; 
        }

        .menu-toggle { 
            position: fixed; left: 15px; top: 15px; font-size: 24px; color: var(--accent); 
            cursor: pointer; z-index: 10001; background: #111; padding: 10px; border-radius: 8px; border: 1px solid var(--border);
            display: none;
        }
        @media (max-width: 900px) { .menu-toggle { display: block; } }

        /* SECTIONS */
        .content-section { display: none; flex-direction: column; align-items: center; padding: 20px; }
        .content-section.active { display: flex; }

        /* PREVIEW DISCORD */
        .discord-embed { width: 100%; max-width: 450px; background: var(--discord); border-left: 4px solid var(--accent); padding: 16px; border-radius: 4px; position: relative; margin-bottom: 25px; }
        .embed-thumb { width: 75px; height: 75px; position: absolute; right: 16px; top: 16px; background: #1a1a1a; border-radius: 4px; overflow: hidden; border: 1px solid #333; }
        #p-title { font-weight: bold; font-size: 16px; padding-right: 85px; margin-bottom: 8px; color: #fff; }
        #p-desc { font-size: 14px; color: #dcddde; white-space: pre-wrap; line-height: 1.4; }
        .banner-preview { width: 100%; height: 140px; margin-top: 15px; background: #1a1a1a; border-radius: 4px; overflow: hidden; border: 1px solid #333; }
        .img-fill { width: 100%; height: 100%; object-fit: cover; }

        /* CARDS & INPUTS */
        .card { width: 100%; max-width: 450px; background: var(--panel); border-radius: 12px; padding: 20px; border: 1px solid var(--border); margin-bottom: 20px; }
        h3 { font-size: 11px; color: var(--accent); text-transform: uppercase; margin-bottom: 12px; letter-spacing: 1px; }
        input, textarea, select { width: 100%; background: #000; border: 1px solid var(--border); color: white; padding: 14px; border-radius: 8px; margin-bottom: 15px; font-size: 14px; outline: none; }

        /* SECTION VARIABLES - Nouvel affichage */
        .var-badge-container { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; padding: 10px; background: rgba(255,255,255,0.03); border-radius: 8px; border: 1px dashed #333; }
        .var-badge { background: #1a1a1a; color: var(--accent); padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; font-family: monospace; border: 1px solid #333; cursor: pointer; }
        .var-badge:hover { background: var(--accent); color: white; }

        /* MULTISELECT */
        .multiselect { position: relative; margin-bottom: 15px; }
        .select-box { background: #000; border: 1px solid var(--border); padding: 14px; border-radius: 8px; cursor: pointer; display: flex; justify-content: space-between; }
        .dropdown-content { display: none; position: absolute; top: 100%; left: 0; right: 0; background: #0d0d0d; border: 1px solid var(--border); z-index: 8000; max-height: 200px; overflow-y: auto; border-radius: 0 0 8px 8px; }
        .dropdown-content.show { display: block; }
        .option { padding: 12px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #1a1a1a; cursor: pointer; }

        .btn { border: none; padding: 18px; border-radius: 10px; font-weight: 800; cursor: pointer; width: 100%; color: white; text-transform: uppercase; }
        .btn-save { background: var(--accent); }

        #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 9000; }
        #overlay.show { display: block; }
        footer { padding: 20px; text-align: center; color: #333; font-size: 11px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="overlay" onclick="toggleSidebar()"></div>
    <div class="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></div>

    <div class="layout">
        <nav id="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-robot"></i> BAGBOT
            </div>
            <div class="nav-item active" onclick="show('welcome', this)"><i class="fas fa-door-open"></i> BIENVENUE</div>
            <div class="nav-item" onclick="show('admin', this)"><i class="fas fa-user-shield"></i> ACCÈS</div>
            <div class="nav-item" onclick="show('images', this)"><i class="fas fa-images"></i> GALERIE</div>
        </nav>

        <main>
            <header>PANEL DE CONFIGURATION</header>

            <section id="welcome" class="content-section active">
                <div class="discord-embed">
                    <div class="embed-thumb" id="p-thumb"></div>
                    <div id="p-title">Titre...</div>
                    <div id="p-desc">Message...</div>
                    <div class="banner-preview" id="p-banner"></div>
                </div>

                <div class="card">
                    <h3>Message d'accueil</h3>
                    <input type="text" id="w-title" placeholder="Titre (ex: {user} arrive !)" oninput="sync()">
                    <textarea id="w-desc" rows="4" placeholder="Description..." oninput="sync()"></textarea>
                    
                    <h3>Variables disponibles</h3>
                    <div class="var-badge-container">
                        <span class="var-badge" title="Mentionne l'utilisateur">{user}</span>
                        <span class="var-badge" title="Nom simple">{user_name}</span>
                        <span class="var-badge" title="Nom du serveur">{server}</span>
                        <span class="var-badge" title="Nombre de membres">{count}</span>
                    </div>

                    <h3>Salon</h3>
                    <select id="w-chan"></select>

                    <h3>Rôles Déclencheurs (Facultatif)</h3>
                    <div class="multiselect">
                        <div class="select-box" onclick="toggleDrop('drop-trigger')">Rôles <i class="fas fa-chevron-down"></i></div>
                        <div id="drop-trigger" class="dropdown-content"></div>
                    </div>

                    <button class="btn btn-save" onclick="save()">ENREGISTRER</button>
                </div>
            </section>

            <section id="admin" class="content-section">
                <div class="card">
                    <h3>Sécurité Panel</h3>
                    <div class="multiselect">
                        <div class="select-box" onclick="toggleDrop('drop-admin')">Rôles autorisés <i class="fas fa-chevron-down"></i></div>
                        <div id="drop-admin" class="dropdown-content"></div>
                    </div>
                    <button class="btn btn-save" onclick="save()">METTRE À JOUR</button>
                </div>
            </section>

            <section id="images" class="content-section">
                <input type="file" id="file-in" onchange="up()" style="display:none">
                <button class="btn btn-save" onclick="document.getElementById('file-in').click()">UPLOADER IMAGE</button>
                <div id="gallery" style="display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:20px; width:100%; max-width:450px;"></div>
            </section>
            <footer>BAGBOT &copy; 2026</footer>
        </main>
    </div>

    <script>
        let CONFIG = {}; const API = window.location.origin;

        function toggleSidebar() { 
            document.getElementById('sidebar').classList.toggle('open'); 
            document.getElementById('overlay').classList.toggle('show'); 
        }

        function toggleDrop(id) { document.getElementById(id).classList.toggle('show'); }

        function show(id, el) { 
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active')); 
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); 
            document.getElementById(id).classList.add('active'); el.classList.add('active');
            if(window.innerWidth <= 900) toggleSidebar(); 
            if(id === 'images') loadG();
        }

        function sync() {
            const t = document.getElementById('w-title').value || "Bienvenue {user}";
            const d = document.getElementById('w-desc').value || "Bienvenue sur {server} !";
            const replacements = {
                "{user}": "<span style='color:#5865F2; font-weight:500;'>@Pseudo</span>",
                "{user_name}": "Pseudo",
                "{server}": "Mon Serveur",
                "{count}": "150"
            };
            let ct = t, cd = d;
            for(let k in replacements) {
                ct = ct.split(k).join(replacements[k].replace(/<[^>]*>?/gm, ''));
                cd = cd.split(k).join(replacements[k]);
            }
            document.getElementById('p-title').innerText = ct;
            document.getElementById('p-desc').innerHTML = cd;
        }

        async function up() {
            const fd = new FormData(); fd.append('file', document.getElementById('file-in').files[0]);
            await fetch(`${API}/api/upload`, { method: 'POST', body: fd }); loadG();
        }

        async function loadG() {
            const res = await fetch(`${API}/api/images`); const d = await res.json();
            document.getElementById('gallery').innerHTML = d.images.map(img => `<img src="${API+img}" style="width:100%; border-radius:8px; cursor:pointer" onclick="setImg('${img}')">`).join('');
        }

        function setImg(path) {
            const target = confirm("Mettre en BANNIÈRE (OK) ou en THUMBNAIL (Annuler) ?") ? 'p-banner' : 'p-thumb';
            const box = document.getElementById(target);
            box.innerHTML = `<img src="${API+path}" class="img-fill">`;
            box.dataset.path = path;
        }

        async function save() {
            CONFIG.welcome = {
                title: document.getElementById('w-title').value,
                desc: document.getElementById('w-desc').value,
                channel: document.getElementById('w-chan').value,
                banner: document.getElementById('p-banner').dataset.path || "",
                thumb: document.getElementById('p-thumb').dataset.path || "",
                trigger_roles: Array.from(document.querySelectorAll('#drop-trigger input:checked')).map(i => i.value)
            };
            CONFIG.admin_roles = Array.from(document.querySelectorAll('#drop-admin input:checked')).map(i => i.value);
            await fetch(`${API}/api/save_config`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(CONFIG) });
            alert("Sauvegardé !");
        }

        async function init() {
            const res = await fetch(`${API}/api/get_server_info`); const data = await res.json();
            CONFIG = data.config;
            document.getElementById('w-chan').innerHTML = data.channels.map(c => `<option value="${c.id}"># ${c.name}</option>`).join('');
            const makeRoles = (id, saved) => {
                document.getElementById(id).innerHTML = data.all_roles.map(r => `
                    <div class="option" onclick="const ck=this.querySelector('input'); ck.checked=!ck.checked; event.stopPropagation();">
                        <input type="checkbox" value="${r}" ${saved.includes(r)?'checked':''}> <span>${r}</span>
                    </div>`).join('');
            };
            makeRoles('drop-admin', CONFIG.admin_roles || []);
            makeRoles('drop-trigger', (CONFIG.welcome && CONFIG.welcome.trigger_roles) ? CONFIG.welcome.trigger_roles : []);
            if(CONFIG.welcome) {
                document.getElementById('w-title').value = CONFIG.welcome.title || "";
                document.getElementById('w-desc').value = CONFIG.welcome.desc || "";
                document.getElementById('w-chan').value = CONFIG.welcome.channel || "";
                if(CONFIG.welcome.banner) { document.getElementById('p-banner').innerHTML = `<img src="${API+CONFIG.welcome.banner}" class="img-fill">`; document.getElementById('p-banner').dataset.path = CONFIG.welcome.banner; }
                if(CONFIG.welcome.thumb) { document.getElementById('p-thumb').innerHTML = `<img src="${API+CONFIG.welcome.thumb}" class="img-fill">`; document.getElementById('p-thumb').dataset.path = CONFIG.welcome.thumb; }
            }
            sync();
        }
        window.onload = init;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BagBot Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050505; --panel: #0f0f0f; --accent: #ed4245; --border: #1e1e1e; --discord: #2b2d31; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: white; display: flex; height: 100vh; width: 100vw; overflow: hidden; }
        
        /* SIDEBAR */
        #sidebar { 
            width: 260px; background: #000; border-right: 1px solid var(--border); 
            display: flex; flex-direction: column; flex-shrink: 0; z-index: 3000;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .nav-item { padding: 18px 25px; cursor: pointer; color: #888; display: flex; align-items: center; gap: 12px; font-weight: bold; }
        .nav-item.active { color: var(--accent); background: rgba(237,66,69,0.1); border-right: 4px solid var(--accent); }

        /* OVERLAY */
        #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2500; }

        @media (max-width: 900px) {
            #sidebar { position: fixed; left: -260px; top: 0; bottom: 0; }
            #sidebar.open { left: 0; }
            #overlay.show { display: block; }
        }

        main { flex: 1; display: flex; flex-direction: column; overflow-y: auto; width: 100%; position: relative; }
        
        /* HEADER AVEC BOUTON FIXÉ */
        header { 
            height: 60px; background: var(--panel); border-bottom: 1px solid var(--border); 
            display: flex; align-items: center; padding: 0 60px; /* Espace pour le bouton à gauche */
            font-weight: 900; position: sticky; top: 0; z-index: 100;
        }

        .menu-toggle { 
            display: none; position: absolute; left: 15px; top: 15px;
            font-size: 28px; color: var(--accent); cursor: pointer; z-index: 200;
        }

        @media (max-width: 900px) { .menu-toggle { display: block; } }

        /* MULTISELECT CORRIGÉ (POUR TES CAPTURES) */
        .multiselect { position: relative; margin-bottom: 15px; width: 100%; }
        .select-box { background: #000; border: 1px solid var(--border); padding: 12px; border-radius: 8px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        
        .dropdown-content { 
            display: none; position: absolute; top: 100%; left: 0; right: 0; 
            background: #0d0d0d; border: 1px solid var(--border); border-radius: 8px; 
            max-height: 250px; overflow-y: auto; z-index: 5000; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }
        .dropdown-content.show { display: block; }
        
        .option { 
            display: flex; align-items: center; justify-content: flex-start;
            padding: 12px 15px; gap: 15px; border-bottom: 1px solid #1a1a1a; 
            cursor: pointer; width: 100%; 
        }
        .option:hover { background: #1a1a1a; }
        .option input { width: 20px; height: 20px; accent-color: var(--accent); flex-shrink: 0; }
        .option span { font-size: 14px; color: #eee; flex: 1; text-align: left; }

        /* DISCORD EMBED & CARDS */
        .content-section { display: none; flex-direction: column; align-items: center; padding: 20px; width: 100%; }
        .content-section.active { display: flex; }
        .discord-embed { width: 100%; max-width: 480px; background: var(--discord); border-left: 4px solid var(--accent); padding: 16px; border-radius: 4px; position: relative; margin-bottom: 25px; }
        .thumb-preview { width: 80px; height: 80px; position: absolute; right: 16px; top: 16px; background: #000; border: 1px dashed #444; overflow: hidden; }
        .banner-preview { width: 100%; height: 140px; margin-top: 10px; background: #000; border: 1px dashed #444; overflow: hidden; }
        .img-zone img { width: 100%; height: 100%; object-fit: cover; }
        .card { width: 100%; max-width: 480px; background: var(--panel); border-radius: 12px; padding: 20px; border: 1px solid var(--border); margin-bottom: 20px; }
        h3 { font-size: 11px; color: var(--accent); text-transform: uppercase; margin-bottom: 10px; }
        input, textarea, select { width: 100%; background: #000; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 8px; margin-bottom: 15px; }
        .btn { border: none; padding: 15px; border-radius: 8px; font-weight: 800; cursor: pointer; width: 100%; color: white; margin-bottom: 10px; text-transform: uppercase; }
        .btn-save { background: var(--accent); }
        .btn-test { background: #5865F2; }

        /* GALLERY */
        #gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; width: 100%; max-width: 480px; }
        .gallery-card { aspect-ratio: 1; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); cursor: pointer; position: relative; }
        .gallery-card img { width: 100%; height: 100%; object-fit: cover; }
        .del-btn { position: absolute; top: 5px; right: 5px; background: rgba(0,0,0,0.8); color: white; border: none; width: 30px; height: 30px; border-radius: 6px; cursor: pointer; z-index: 10; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <div id="overlay" onclick="toggleSidebar()"></div>
    
    <nav id="sidebar">
        <div style="padding: 25px; font-size: 22px; font-weight: 900; color: var(--accent);">BAGBOT</div>
        <div class="nav-item active" onclick="show('accueil', this)"><i class="fas fa-home"></i> ACCUEIL</div>
        <div class="nav-item" onclick="show('admin', this)"><i class="fas fa-user-shield"></i> ADMIN</div>
        <div class="nav-item" onclick="show('images', this)"><i class="fas fa-images"></i> GALERIE</div>
    </nav>

    <main>
        <header>
            <i class="fas fa-bars menu-toggle" onclick="toggleSidebar()"></i>
            <span id="bot-name">DASHBOARD</span>
        </header>

        <section id="accueil" class="content-section active">
            <div class="discord-embed">
                <div class="thumb-preview img-zone" onclick="triggerUp('thumb')"><div id="box-thumb"></div></div>
                <div id="p-title" style="font-weight: bold; margin-bottom: 5px;">Titre</div>
                <div id="p-desc" style="font-size: 14px; white-space: pre-wrap; color: #dcddde;">Bienvenue...</div>
                <div class="banner-preview img-zone" onclick="triggerUp('banner')"><div id="box-banner"></div></div>
            </div>
            <div class="card">
                <h3>Configuration</h3>
                <input type="text" id="in-title" placeholder="Titre..." oninput="sync()">
                <textarea id="in-desc" rows="3" placeholder="Message..." oninput="sync()"></textarea>
                <h3>Salon</h3>
                <select id="chan-list"></select>
                <h3>Rôles Déclencheurs</h3>
                <div class="multiselect">
                    <div class="select-box" onclick="toggleDrop('drop-trigger')">Sélectionner <i class="fas fa-chevron-down"></i></div>
                    <div id="drop-trigger" class="dropdown-content"></div>
                </div>
                <button class="btn btn-save" onclick="save()">ENREGISTRER</button>
                <button class="btn btn-test" onclick="test()">TESTER</button>
            </div>
        </section>

        <section id="admin" class="content-section">
            <div class="card">
                <h3>Accès Dashboard</h3>
                <div class="multiselect">
                    <div class="select-box" onclick="toggleDrop('drop-admin')">Rôles autorisés <i class="fas fa-chevron-down"></i></div>
                    <div id="drop-admin" class="dropdown-content"></div>
                </div>
                <button class="btn btn-save" onclick="save()">VALIDER</button>
            </div>
        </section>

        <section id="images" class="content-section">
            <input type="file" id="file-in" onchange="up()" style="display:none">
            <button class="btn btn-save" style="max-width:480px" onclick="triggerUp('gallery')">UPLOADER</button>
            <div id="gallery" style="margin-top:20px"></div>
        </section>
    </main>

    <script>
        const API = window.location.origin;
        let targetImg = '';

        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            const ov = document.getElementById('overlay');
            sb.classList.toggle('open');
            ov.classList.toggle('show');
        }

        function show(id, el) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
            if(window.innerWidth <= 900) {
                document.getElementById('sidebar').classList.remove('open');
                document.getElementById('overlay').classList.remove('show');
            }
            if(id === 'images') loadG();
        }

        function toggleDrop(id) { 
            const drop = document.getElementById(id);
            const isVisible = drop.classList.contains('show');
            document.querySelectorAll('.dropdown-content').forEach(d => d.classList.remove('show'));
            if(!isVisible) drop.classList.add('show');
        }

        function sync() {
            document.getElementById('p-title').innerText = document.getElementById('in-title').value || "Titre";
            document.getElementById('p-desc').innerText = document.getElementById('in-desc').value || "Description...";
        }

        function triggerUp(t) { targetImg = t; document.getElementById('file-in').click(); }

        async function up() {
            const file = document.getElementById('file-in').files[0];
            if(!file) return;
            const fd = new FormData(); fd.append('file', file);
            const res = await fetch(`${API}/api/upload`, { method: 'POST', body: fd });
            const data = await res.json();
            if(targetImg !== 'gallery') {
                const box = document.getElementById('box-'+targetImg);
                box.innerHTML = `<img src="${API+data.url}">`;
                box.parentElement.dataset.path = data.url;
            } else loadG();
        }

        async function loadG() {
            const res = await fetch(`${API}/api/images`);
            const d = await res.json();
            document.getElementById('gallery').innerHTML = d.images.map(img => `
                <div class="gallery-card">
                    <button class="del-btn" onclick="event.stopPropagation(); deleteImg('${img}')"><i class="fas fa-trash"></i></button>
                    <img src="${API+img}" onclick="setBanner('${img}')">
                </div>`).join('');
        }

        async function deleteImg(path) {
            if(!confirm("Supprimer cette image ?")) return;
            await fetch(`${API}/api/delete_image`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({path}) });
            loadG();
        }

        function setBanner(path) {
            const t = (targetImg === 'thumb') ? 'thumb' : 'banner';
            const box = document.getElementById('box-'+t);
            box.innerHTML = `<img src="${API+path}">`;
            box.parentElement.dataset.path = path;
            show('accueil', document.querySelector('.nav-item'));
        }

        async function save() {
            const p = {
                title: document.getElementById('in-title').value,
                desc: document.getElementById('in-desc').value,
                target_channel: document.getElementById('chan-list').value,
                trigger_roles: Array.from(document.querySelectorAll('#drop-trigger input:checked')).map(i => i.value),
                admin_roles: Array.from(document.querySelectorAll('#drop-admin input:checked')).map(i => i.value),
                thumb: document.querySelector('.thumb-preview').dataset.path || null,
                banner: document.querySelector('.banner-preview').dataset.path || null
            };
            await fetch(`${API}/api/save_config`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(p) });
            alert("Sauvegardé !");
        }

        async function test() {
            const p = {
                channel: document.getElementById('chan-list').value,
                title: document.getElementById('in-title').value,
                desc: document.getElementById('in-desc').value,
                thumb: document.querySelector('.thumb-preview').dataset.path || null,
                banner: document.querySelector('.banner-preview').dataset.path || null
            };
            const res = await fetch(`${API}/api/test_message`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(p) });
            const d = await res.json();
            alert("Discord: " + d.status);
        }

        async function init() {
            const res = await fetch(`${API}/api/get_server_info`);
            const d = await res.json();
            document.getElementById('bot-name').innerText = d.bot.name.toUpperCase();
            document.getElementById('chan-list').innerHTML = d.channels.map(c => `<option value="${c.id}" ${d.config.target_channel == c.id ? 'selected':''}># ${c.name}</option>`).join('');
            
            const createRoles = (boxId, saved) => {
                const box = document.getElementById(boxId);
                box.innerHTML = d.all_roles.map(r => `
                    <div class="option" onclick="const ck=this.querySelector('input'); ck.checked=!ck.checked; event.stopPropagation();">
                        <input type="checkbox" value="${r}" ${saved.includes(r) ? 'checked' : ''} onclick="event.stopPropagation()">
                        <span>${r}</span>
                    </div>`).join('');
            };
            createRoles('drop-trigger', d.config.trigger_roles || []);
            createRoles('drop-admin', d.config.admin_roles || []);

            if(d.config) {
                document.getElementById('in-title').value = d.config.title || "";
                document.getElementById('in-desc').value = d.config.desc || "";
                if(d.config.thumb) { document.getElementById('box-thumb').innerHTML = `<img src="${API+d.config.thumb}">`; document.querySelector('.thumb-preview').dataset.path = d.config.thumb; }
                if(d.config.banner) { document.getElementById('box-banner').innerHTML = `<img src="${API+d.config.banner}">`; document.querySelector('.banner-preview').dataset.path = d.config.banner; }
                sync();
            }
        }
        window.onload = init;
    </script>
</body>
</html>

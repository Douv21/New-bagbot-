<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BagBot Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050505; --panel: #0f0f0f; --accent: #ed4245; --border: #1e1e1e; --embed: #2b2d31; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: white; height: 100vh; display: flex; overflow: hidden; }

        /* Sidebar - Ne prend pas tout l'écran */
        #sidebar { 
            width: 260px; background: #000; border-right: 1px solid var(--border); 
            position: fixed; height: 100%; z-index: 1000; transition: 0.3s;
            transform: translateX(-100%); /* Caché par défaut sur mobile */
        }
        #sidebar.open { transform: translateX(0); }
        
        /* Overlay pour fermer le menu en cliquant à côté */
        #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 900; }
        #overlay.active { display: block; }

        main { flex: 1; display: flex; flex-direction: column; height: 100vh; width: 100%; }
        
        header { 
            height: 60px; background: var(--panel); border-bottom: 1px solid var(--border); 
            display: flex; align-items: center; padding: 0 20px; flex-shrink: 0;
            justify-content: space-between;
        }

        .scroll-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; align-items: center; }

        /* Discord Preview */
        .discord-embed { 
            width: 100%; max-width: 400px; background: var(--embed); border-left: 4px solid var(--accent); 
            border-radius: 4px; padding: 15px; position: relative; margin-bottom: 20px; flex-shrink: 0;
        }
        .thumb-box { width: 60px; height: 60px; position: absolute; right: 15px; top: 15px; border-radius: 4px; border: 1px dashed #444; overflow: hidden; }
        .banner-box { width: 100%; height: 130px; margin-top: 10px; border-radius: 4px; border: 1px dashed #444; overflow: hidden; }
        img { width: 100%; height: 100%; object-fit: cover; }

        /* Formulaire */
        .config-card { width: 100%; max-width: 400px; background: var(--panel); border-radius: 12px; padding: 20px; border: 1px solid var(--border); }
        input, textarea, select { 
            width: 100%; background: #000; border: 1px solid var(--border); 
            color: white; padding: 12px; border-radius: 8px; margin-bottom: 12px; font-size: 14px; 
        }

        .var-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 15px; }
        .var-btn { font-size: 11px; background: #111; border: 1px solid #333; padding: 8px; text-align: center; color: var(--accent); border-radius: 6px; font-weight: bold; }

        .btn { border: none; padding: 16px; border-radius: 8px; font-weight: 800; cursor: pointer; width: 100%; color: white; margin-top: 10px; }

        /* SECURITÉ BAS DE PAGE */
        .bottom-spacer { height: 120px; flex-shrink: 0; }

        @media (min-width: 900px) {
            #sidebar { transform: translateX(0); position: relative; }
            #overlay { display: none !important; }
            header i { display: none; }
        }
    </style>
</head>
<body>
    <div id="overlay" onclick="toggleMenu()"></div>
    
    <nav id="sidebar">
        <div style="padding: 25px; color: var(--accent); font-weight: 900; font-size: 22px; display: flex; justify-content: space-between;">
            BAGBOT <i class="fas fa-times" onclick="toggleMenu()" style="cursor:pointer"></i>
        </div>
        <div style="padding: 15px 25px; color: #949ba4; font-weight: bold;"><i class="fas fa-home"></i> Accueil</div>
    </nav>

    <main>
        <header>
            <i class="fas fa-bars" onclick="toggleMenu()" style="color:var(--accent); font-size: 24px;"></i>
            <span id="bot-name" style="font-weight: bold;">New bagbot</span>
            <div style="width: 24px;"></div>
        </header>

        <div class="scroll-area">
            <div class="discord-embed">
                <div class="thumb-box" onclick="openModal('thumb')" id="box-thumb"></div>
                <div id="p-title" style="font-weight: bold; margin-bottom: 5px;">Bienvenue</div>
                <div id="p-desc" style="font-size: 13px; color: #dcddde; line-height: 1.4;">Configure ton message ci-dessous...</div>
                <div class="banner-box" onclick="openModal('banner')" id="box-banner"></div>
            </div>

            <div class="config-card">
                <input id="in-title" placeholder="Titre..." oninput="update()">
                <textarea id="in-desc" rows="4" placeholder="Description..." oninput="update()"></textarea>
                
                <div class="var-grid">
                    <div class="var-btn" onclick="addVar('{user}')">{user}</div>
                    <div class="var-btn" onclick="addVar('{server}')">{server}</div>
                    <div class="var-btn" onclick="addVar('{count}')">{count}</div>
                </div>

                <select id="chan-list"></select>
                <button class="btn" style="background:var(--accent)" onclick="save()">ENREGISTRER</button>
                <button class="btn" style="background:#5865F2" onclick="test()">TESTER SUR DISCORD</button>
            </div>

            <div class="bottom-spacer"></div>
        </div>
    </main>

    <div id="modal" style="position:fixed; inset:0; background:rgba(0,0,0,0.9); display:none; align-items:center; justify-content:center; z-index:2000; padding:20px;">
        <div style="background:var(--panel); padding:20px; border-radius:12px; width:100%; max-width:350px; border:1px solid var(--border);">
            <input type="file" id="file-in" style="display:none" onchange="upload()">
            <button class="btn" style="background:#222" onclick="document.getElementById('file-in').click()">CHOISIR UNE PHOTO</button>
            <button class="btn" style="background:transparent" onclick="document.getElementById('modal').style.display='none'">ANNULER</button>
        </div>
    </div>

    <script>
        let targetType = '';
        const API = window.location.origin;

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('active');
        }

        function update() {
            document.getElementById('p-title').innerText = document.getElementById('in-title').value || "Titre";
            document.getElementById('p-desc').innerText = document.getElementById('in-desc').value || "Description...";
        }

        function addVar(v) { document.getElementById('in-desc').value += v; update(); }
        function openModal(t) { targetType = t; document.getElementById('modal').style.display = 'flex'; }

        async function upload() {
            const fd = new FormData();
            fd.append('file', document.getElementById('file-in').files[0]);
            const res = await fetch(`${API}/api/upload`, { method: 'POST', body: fd });
            const data = await res.json();
            document.getElementById(`box-${targetType}`).innerHTML = `<img src="${API+data.url}">`;
            document.getElementById(`box-${targetType}`).dataset.path = data.url;
            document.getElementById('modal').style.display = 'none';
        }

        async function test() {
            const payload = {
                channel: document.getElementById('chan-list').value,
                title: document.getElementById('in-title').value,
                desc: document.getElementById('in-desc').value,
                thumb: document.getElementById('box-thumb').dataset.path || null,
                banner: document.getElementById('box-banner').dataset.path || null
            };
            await fetch(`${API}/api/test_message`, { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify(payload) 
            });
            alert("✅ Message envoyé !");
        }

        async function init() {
            const res = await fetch(`${API}/api/get_server_info`);
            const data = await res.json();
            document.getElementById('chan-list').innerHTML = data.channels.map(c => `<option value="${c.id}"># ${c.name}</option>`).join('');
            document.getElementById('bot-name').innerText = data.bot.name;
        }
        window.onload = init;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BagBot Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #ed4245; --bg: #0b0b0b; --card: #1e1f22; --sidebar: #000000; --border: #2b2d31; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: white; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; display: flex; height: 100vh; overflow: hidden; }

        /* SIDEBAR COMPLETE */
        #sidebar { width: 260px; background: var(--sidebar); border-right: 1px solid var(--border); flex-shrink: 0; display: flex; flex-direction: column; }
        .logo-area { padding: 30px 20px; font-size: 22px; font-weight: 900; color: var(--accent); letter-spacing: 1px; }
        .nav-group { flex-grow: 1; }
        .nav-item { padding: 15px 20px; display: flex; align-items: center; gap: 12px; color: #949ba4; cursor: pointer; border-left: 4px solid transparent; transition: 0.2s; }
        .nav-item:hover, .nav-item.active { background: rgba(237, 66, 69, 0.1); color: white; border-left-color: var(--accent); }
        .nav-item i { width: 20px; text-align: center; }

        /* CONTENU */
        .main { flex-grow: 1; display: flex; flex-direction: column; min-width: 0; }
        .header { height: 60px; background: #050505; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; gap: 15px; font-weight: bold; font-size: 13px; letter-spacing: 1px; }
        .container { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; align-items: center; }

        /* EMBED CARD - VERSION PHOTO */
        .embed-card { width: 100%; max-width: 500px; background: var(--card); border-left: 4px solid var(--accent); padding: 16px; border-radius: 4px; position: relative; margin-bottom: 20px; }
        .embed-header { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .embed-inputs { flex: 1; }
        .title-input { background: transparent; border: none; color: white; font-size: 18px; font-weight: bold; width: 100%; outline: none; margin-bottom: 5px; }
        .desc-input { background: transparent; border: none; color: #dbdee1; font-size: 14px; width: 100%; outline: none; resize: none; min-height: 60px; }
        
        .image-preview-placeholder { width: 80px; height: 80px; background: rgba(0,0,0,0.2); border: 2px dashed #444; border-radius: 4px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        
        /* LA GRANDE IMAGE (comme sur ta capture) */
        .main-image-box { width: 100%; height: 200px; background: #2b2d31; border-radius: 4px; margin-top: 15px; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px dashed #444; }
        .main-image-box img { width: 100%; height: 100%; object-fit: cover; }

        /* FORMULAIRE */
        .field-label { width: 100%; max-width: 500px; font-size: 11px; font-weight: 800; color: #949ba4; text-transform: uppercase; margin: 20px 0 8px; }
        .custom-select { width: 100%; max-width: 500px; background: #111214; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 4px; outline: none; }
        
        .btn-action { width: 100%; max-width: 500px; background: #2b2d31; color: white; padding: 12px; border: none; border-radius: 4px; font-weight: bold; margin-top: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-deploy { width: 100%; max-width: 500px; background: var(--accent); color: white; padding: 16px; border: none; border-radius: 4px; font-weight: bold; margin-top: 30px; cursor: pointer; font-size: 16px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="logo-area">BAGBOT</div>
        <div class="nav-group">
            <div class="nav-item active"><i class="fas fa-envelope-open-text"></i> Message</div>
            <div class="nav-item"><i class="fas fa-cog"></i> Paramètres</div>
        </div>
    </div>

    <div class="main">
        <div class="header">
            <i class="fas fa-bars" style="color: var(--accent);"></i> DASHBOARD
        </div>
        
        <div class="container">
            <div class="embed-card">
                <div class="embed-header">
                    <div class="embed-inputs">
                        <input type="text" class="title-input" value="Titre de l'Embed">
                        <textarea class="desc-input">Votre message ici...</textarea>
                    </div>
                    <div class="image-preview-placeholder"><i class="fas fa-plus"></i></div>
                </div>
                <div class="main-image-box">
                    <i class="fas fa-image" style="font-size: 30px; color: #444;"></i>
                </div>
            </div>

            <div class="field-label">Salon de destination</div>
            <select id="chan-list" class="custom-select">
                <option>Chargement...</option>
            </select>

            <button class="btn-action">
                <i class="fas fa-plus-circle"></i> Ajouter une réaction
            </button>

            <button class="btn-deploy">
                <i class="fas fa-paper-plane"></i> Déployer le message
            </button>
        </div>
    </div>

    <script>
        async function init() {
            try {
                const res = await fetch('/api/get_server_info');
                const data = await res.json();
                if (data.channels) {
                    document.getElementById('chan-list').innerHTML = data.channels.map(c => 
                        `<option value="${c.id}"># ${c.name}</option>`
                    ).join('');
                }
            } catch(e) {
                console.error("Erreur de liaison API");
            }
        }
        window.onload = init;
    </script>
</body>
</html>
